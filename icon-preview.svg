<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#D0683A"/>
      <stop offset="100%" stop-color="#A84820"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Terracotta background -->
  <rect width="512" height="512" fill="url(#bg)" rx="108"/>

  <!-- Basket image: multiply blend removes the white background -->
  <image
    href="./186738390-fresh-and-organic-vegetables-in-shopping-basket.jpg"
    x="6" y="50" width="500" height="420"
    preserveAspectRatio="xMidYMid meet"
    clip-path="url(#rounded)"
    style="mix-blend-mode:multiply"/>
</svg>
