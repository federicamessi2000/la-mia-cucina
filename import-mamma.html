1 ora.\n* Alle 14.20 Dividere il mix di semi, in una ciotola metterne 150gr e bagnarli con acqua molto calda (serviranno da inserire nell’impasto) e 50 gr di semini tenerli per la finitura della crosta.\n* Alle 14.30 Unite il prefermento e l’impasto che ha riposato in Autolisi\n* Impastate a mano o con planetaria per circa 10 minuti.\n* Aggiungete ora il sale e i semini bagnati di acqua (così aderiranno meglio all’impasto) e zucchero o miele \n* Continuate ad impastare fino a che sarà una massa bella compatta e omogenea.\n* Lasciare riposare coperta a campana sul piano di lavoro dalle 15.00 alle 15.30\n* Fare delle “pieghe a 3” in questo modo:\n* Schiacciate bene la pasta\n* Ripiegatela un terzo della pasta verso l’interno\n* Quindi sovrapponete l’altro terzo sopra l’impasto\n* Ripiegate in un terzo nel verso opposto\n* E quinti il terzo rimanente a coprire l’impasto tutto dalle 15.30 alle 16.00; dalle 16.00 alle 16.30; dalle 16.30 alle 17\n* Lasciate riposare 30 minuti, quindi ripetete la piegatura a tre esposta sopra per altre due volte con un intervallo di 30 minuti. tutto dalle 15.30 alle 16.00; dalle 16.00 alle 16.30; dalle 16.30 alle 17.00.\n* Alle 17.00 Date la forma a palla, facendo girare l’impasto con le mani sull’asse (Pirlatura)\n* Riponete a lievitare in un cestino ben infarinato con la “gemma” (la chiusura dell’impasto) rivolta verso l’alto.\n* Coprite e mettete a lievitare in frigorifero per circa 8-18 ore. (14)\n\nTERZO GIORNO (11.00)\n\nAlle 11.00 Tolto dal frigo lasciate tornare a temperatura ambiente, se non è ancora raddoppiato il volume attendete il momento idoneo per cuocere.\n\nAlle 14.15 Ribaltate l’impasto sulla teglia (scaldata in forno 240°C e cosparsa di semola o farina di mais x non far aderire in cottura), accarezzate l’impasto con le mani umide\n\nFate aderire i mix di semi che non avevamo ancora usato\n\neseguire con una lametta da barba un taglio.\n\nCottura:\nAlle 14.30\n* Infornate a forno gia caldo a 240°C e con all’interno un pentolino per creare del vapore (mezzo bicchiere d’acqua)\n* Abbassate la temperatura a 220°C e a 200°C dopo 20 minuti. (14.50)\n* Cuocete complessivamente per un’ora (15.30)\n* Gli ultimi 10 minuti, (15.20) create uno spiffero mettendo il cucchiaio di legno a bloccare il portello del forno, in modo da far sfiatare l’umidità residua.\n* Fare raffreddare sulla gratella all’interno del forno con il portello aperto.\n\nHo lasciato 13 ore il prefermento (18.50-07.50)\nPoi ultimo giorno fuori dal frigo per 8 ore prima di infornare\n  Su pietra refrattaria lasciata in forno da mezz’ora a 240 gradi\nCotto in 55 minuti \nMettere in basso la griglia sennò brucia","note":"","tags":[],"_importId":15350},{"nome":"RICETTA PASTA FROLLA OLIO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"uova"},{"qty":160.0,"unit":"ml","name":"olio di semi"},{"qty":200.0,"unit":"g","name":"zucchero"},{"qty":1,"unit":"n°","name":"bustina di lievito per dolci"},{"qty":600.0,"unit":"g","name":"farina"}],"procedimento":"Per prima cosa in una ciotola rompiamo le uova e lavoriamole con l'olio e lo zucchero, aggiungiamo anche la vanillina o scorza di limone e il lievito per dolci. A questo punto uniamo la farina un po’ alla volta e lavoriamo il composto prima con un cucchiaio e poi con le mani così da formare un panetto ben sodo e non appiccicoso. La nostra frolla è pronta, perfetta per essere utilizzata. Io ho realizzato una crostata con confettura di fragole, l’ho cotta a 180° in forno ventilato per 35-40 minuti. \nCon queste dose potete fare una crostata da 26-28cm o due da 24cm.","note":"","tags":[],"_importId":11247},{"nome":"Ricetta pinolata della Val d’Aveto 🏴󠁧󠁢󠁥󠁮󠁧󠁿😋","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":50.0,"unit":"g","name":"mandorle dolci"},{"qty":50.0,"unit":"g","name":"mandorle amare"},{"qty":2.0,"unit":"n°","name":"bianchi d'uovo"},{"qty":1.0,"unit":"pizzico","name":"bicarbonato"},{"qty":250.0,"unit":"g","name":"zucchero"},{"qty":200.0,"unit":"g","name":"pinoli"},{"qty":null,"unit":"q.b.","name":"zucchero a velo"}],"procedimento":"Preparazione\nTritare le mandorle non troppo finemente e unirle allo zucchero. Montare i bianchi a neve ed aggiungere un pizzico di bicarbonato. Creare un impasto omogeneo e sodo che dovrà essere versato in una teglia imburrata, cospargere la superficie con i pinoli e lo zucchero semolato. Infornare a 180° sino a quando avrà raggiunto un aspetto dorato. Questo impasto viene messo nella teglia precedentemente foderata di pasta frolla la quale ricopre il tutto.\nLa superficie viene poi cosparsa con alcuni pinoli e zucchero a velo.","note":"","tags":[],"_importId":14552},{"nome":"RICETTA PIZZA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Deborah De Marco guarda io l'ho lavorata sino ad incordatura gancio poi messa a riposare 30 Min\nPoi messa in frigo e sta matti mom na l'ho rigirata senza smontarla sporcarndomi le mani con olio.. poi rimessa in frigo fino a sta sera poi un ora prima di infornare l'ho girata fuori e po' divisa nelle teglie ne sono uscite 3","note":"","tags":[],"_importId":7869},{"nome":"RICETTA PIZZA CON LIEVITO MADRE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":150.0,"unit":"g","name":"lievito madre rinfrescato"},{"qty":200.0,"unit":"g","name":"farina manitoba"},{"qty":300.0,"unit":"g","name":"farina 0"},{"qty":400.0,"unit":"g","name":"acqua"},{"qty":2.0,"unit":"cucchiaio","name":"olio extravergine di oliva"},{"qty":10.0,"unit":"g","name":"sale"}],"procedimento":"Nella planetaria mettete le farine setacciate con il lievito madre, lavorate per alcuni minuti il composto, aggiungete metà dell’acqua e quando è assorbita aggiungete la restante insieme all’olio e per ultimo il sale.\nQuando avete un composto amalgamato spegnete la planetaria.\nSe fate impasto a mano seguite la seguenza degli ingredienti come per la planetaria.\nFate riposare l’impasto per 10 minuti, trasferitelo in una spianataia infarinata abbondantemente con farina di semola.\nSpolverizzate anche la superfice della pizza con la farina di semola, fate una forma rettangolare (l’impasto è morbidissimo ma è normale), ripiegate l’impasto su se stesso, (come per il pane) giratelo di 180° e piegatelo in tre.\nFate riposare l’impasto per 15 minuti e ripetete la piegatura di rinforzo, mettete l’impasto in un contenitore a chiusura ermetica e mettetelo in frigorifero nella parte più bassa per 24 ore.\nIl girno dopo tirate fuori l’impasto dal frigo un’ora prima dell’uso e lasciatela a temperatura ambiente, trascorsa l’ora mettetela sulla spianatoia con abbondante farina di semola e con i polpastrelli stendete l’impasto in modo molto delicato partendo dal basso verso l’alto, usate molta delicatezza per non rovinare la lievitazione della pasta,\nUngete una teglia di olio extravergine di oliva, spolverizzate con farina di semola, mettete l’impasto, stendetelo ancora bene con molto delicatezza, farcite la pizza con pomodoro, mozzarella e quello che preferite.\nFate cuocere a forno statico a 250° i primi 10 minuti nella parte bassa del forno, poi passate il forno a 230° e fate cuocere altri 10 minuti nella parte centrale del forno.\nPer praticità io divido l’impasto in tre parti dopo le pieghe e lo metto in tre contenitori a chiusura ermentica, cosi ottengo già l’impasto sezionato per tre teglie da pizza.","note":"","tags":[],"_importId":7864},{"nome":"Ricetta qui👇👇Pala rossa👇👇","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":700.0,"unit":"g","name":"farina 0 w350","sezione":"Per la biga"},{"qty":315.0,"unit":"g","name":"acqua","sezione":"Per la biga"},{"qty":7.0,"unit":"g","name":"lievito fresco","sezione":"Per la biga"},{"qty":150.0,"unit":"g","name":"farina 0","sezione":"Per la biga"},{"qty":150.0,"unit":"g","name":"farina integrale","sezione":"Per la biga"},{"qty":535.0,"unit":"g","name":"acqua","sezione":"Per la biga"},{"qty":20.0,"unit":"g","name":"sale","sezione":"Per la biga"},{"qty":20.0,"unit":"g","name":"olio","sezione":"Per la biga"},{"qty":4.0,"unit":"g","name":"lievito fresco","sezione":"Per la biga"},{"qty":3.0,"unit":"g","name":"malto se lo avete.","sezione":"Per la biga"}],"procedimento":"A impasto chiuso portate a quasi il raddoppio.\nStagliate pagnotte da circa 300 g per pale 40x15.\nAspettate di nuovo il raddoppio e infornate a circa 300 ° per 5 minuti .. \nFate raffreddare e condite con salsa di pomodoro cotta precedentemente con solo sale olio e basilico.\nIndornate nuovamente per 3/4 minuti .. \nNel forno di casa. ,come sempre modalità statica al massimo della temperatura 💣💣\n#pizza #palaromana","note":"","tags":[],"_importId":16098},{"nome":"Ricetta Strudel Mg","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"250gr farina 00 (io uso quella con già il lievito per dolci sennò aggiungi 1 cucchiaino di lievito per dolci)\n30/40 gr burro sciolto \n1 cucchiaio raso zucchero \n1 pizzico di sale\n1 uovo sbattuto poco\nLatte quanto basta per impastare il tutto\n1 bustina di vanillina\nMettere la farina in una zuppiera \nAggiungere zucchero, sale, vanillina, burro e mescolare con forchetta.\nAggiungere uovo e mescolare.\nAggiungere un po’ di latte poco alla volta.\nFormare una palla.\nMettere in tazza coperta con pellicola trasparente.\nFar scaldare un po’ di acqua in un recipiente piccolo.\nQuando è calda spegnere il fuoco e appoggiarci sopra la tazza con pasta. Lasciare riposare al caldo almeno mezz’ora. \nPreparare il ripieno\nIngredienti \n5 o 6 mele (io metto una pera al posto di una mela se ce l’ho)\nSucco di un limone (o arancia)\n3 cucchiai rasi di pane grattugiato \n40/50 gr Pinoli \n100 gr uvetta ammollata in acqua tiepida per mezz’ora \n6 cucchiai marmellata (facoltativo)\nUn cucchiaio raso di zucchero \nUna noce di burro \n\nSbucciare e Tagliare a fettine  le mele mettendole in una larga padella antiaderente.\nIrrorarle col succo del limone e aggiungere burro e zucchero. \nMettere sul fuoco e cuocere mescolando a fuoco basso per circa 10 min.\nAggiungere pinoli, uvetta strizzata e pane grattugiato.\nMescolare bene.\nDividere l’impasto in due parti.\nStendere aiutandosi con mattarello (foto).\nPiù sottile è, meglio è (foto).\nMettere mezzo ripieno sulla pasta stesa (foto).\nAggiungere 2 o 3 cucchiai di marmellata (albicocche, amarene, arance o altra)\nArrotolare e sigillare bene dopo aver bagnato i bordi con latte (o burro fuso).\nSpennellare con il latte o burro.\nMettere in forno a 180 gradi.\nCuocere per circa 45 min.\n\nSpolverare con zucchero a velo\nBuon appetito","note":"","tags":[],"_importId":4514},{"nome":"Ricetta Torta di pere","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":700.0,"unit":"g","name":"pere abate"},{"qty":150.0,"unit":"g","name":"farina"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":1.0,"unit":"n°","name":"tuorlo"},{"qty":1.0,"unit":"dl","name":"latte intero"},{"qty":0.5,"unit":"n°","name":"bustina di lievito in polvere"},{"qty":1.0,"unit":"n°","name":"limone biologico o non trattato"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"}],"procedimento":"ESECUZIONE RICETTA FACILE\nTEMPO PREPARAZIONE 25 MIN\nTEMPO COTTURA 40 MIN\nTEMPO LIEVITAZIONE 3 H\n\nLavate il limone, asciugatelo e grattugiatene la scorza. Sbucciate le pere, eliminate il torsolo e tagliatele a fettine sottili. Riunitele in una ciotola e bagnatele con il succo del limone per evitare che scuriscano.\n\nRompete le uova in una ciotola, aggiungete lo zucchero e un pizzico di sale e montate gli ingredienti con le fruste elettriche. Aggiungete la farina setacciata con il lievito, la scorza di limone, l'estratto di vaniglia, il latte e mescolate.\n\nUnite all'impasto le pere e trasferite il tutto nello stampo a cerniera da 22 cm di diametro foderato di carta forno. Cuocete a 180° per circa 40-45 minuti.\n\nFate raffreddare la torta di pere su una gratella da pasticceria, sformatela e servitela a piacere spolverizzandola con zucchero a velo.","note":"","tags":[],"_importId":92},{"nome":"RICETTA TORTA SACHER","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Come prima volta mi do un bel sei 😅non sarà perfetta ma è strabuona ...🤗Per la base al cioccolato. 130 g di cioccolato fondente di ottima qualità io ho usato il fondente al 50%.120 g di burro morbido 150 di zucchero 5 uova 120 g di farina un pizzico di sale mezza bustina di lievito. per la farcia e copertura 300g di marmellata di albicocche. Per la glassa 250 g di cioccolato fondente 200g di panna liquida . montare il burro morbido con lo zucchero fino a rendere una massa montata aggiungere le uova sempre mescolando poche per volta a questo punto il cioccolato sciolto a bagnomaria freddo e mescolare infine la farina il pizzico di sale e mezza bustina di lievito . Versare in una teglia da 20/22di diametro imburrata e infarinata in forno già caldo 170/180 g per 35/40 . Per la farcia scaldare la marmellata pochi minuti passare nel colino per eliminare i pezzetti di frutta e farcire l’interno l’esterno e i bordi mettere in frigo . Nel frattempo per la copertura tritare il cioccolato fondente scaldare la panna e portare a ebollizione togliere dalla fiamma e versare il cioccolato tritato mescolare affinché il cioccolato sarà sciolto . Attendere cinque minuti mescolando di tanto in tanto la glassa deve risultare fluida ma non troppo . È il momento di glassare la torta .","note":"","tags":[],"_importId":8033},{"nome":"RICETTA TORTELLI DI CASTAGNE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"n°","name":"ricotta"},{"qty":100.0,"unit":"n°","name":"parmigiano grattugiato"},{"qty":281.0,"unit":"g","name":"farina 0"},{"qty":168.0,"unit":"g","name":"farina castagne"},{"qty":150.0,"unit":"g","name":"esubero"},{"qty":10.0,"unit":"g","name":"sale"},{"qty":30.0,"unit":"g","name":"acqua"},{"qty":3.0,"unit":"n°","name":"uova"}],"procedimento":"RICETTA TORTELLI DI CASTAGNE \nRipieno tot 57 tortelli\n300 ricotta\n100 parmigiano grattugiato \nSale \nPepe\nUovo 1\n\nPasta all’uovo con farina di castagne \n281 gr farina 0\n168 gr farina castagne\n150 gr esubero \n10 gr sale\n30 gr acqua (?) meglio 60gr\n3 uova\nNotte in frigo \n\nContorno salsiccia o pesto","note":"","tags":[],"_importId":7909},{"nome":"RICETTA TRADIZIONALE Ingredienti: – 300 g di farina di","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"RICETTA TRADIZIONALE Ingredienti: – 300 g di farina di ceci – 1 l di acqua – Mezzo bicchiere di olio extra vergine di oliva più il necessario per ungere il testo – sale e pepe q.b.\nPreparazione: In una ciotola capiente disporre a fontana la farina di ceci setacciata. Unire un pizzico di sale e l’acqua, poco alla volta, mescolando con un cucchiaio di legno, evitando la formazione di grumi. Coprire con un piatto e far riposare almeno 5 ore, mescolando di tanto in tanto. Trascorso il tempo del riposo, eliminare l’eventuale schiuma che si è formata sulla superficie dell’impasto. Ungere il testo in rame e versarvi il composto, trascinando l’olio in eccesso dai bordi verso il centro. Infornare a 220 gradi (statico) per circa 15 minuti. Sfornare, spolverizzare di pepe e servire calda.\nMa oggi voglio proporvi anche una variante della farinata classica, e si tratta di una ricetta detta a voce da una vecchietta di Alassio conosciuta dai più come l’acciugara, dato che la si vede sempre pulire, deliscare e invasare le acciughe seduta su una sedia in legno sulla spiaggia, mentre mangia farinata come se non ci fosse un domani . Pelle segnata dal sole, rughe profonde, una voce bassissima e roca, e una passione indescrivibile per la cucina regionale… ma anche, perché no, per qualche deviazione dall’originale tradizione culinaria. Ed è proprio una sua variante che vi propongo perché la trovo davvero gustosa.\nLA VARIANTE CON LE ZUCCHINE Ingredienti: – 300 g di farina di ceci – 2 zucchine grandi – 1 cipolla – 1 l di acqua – 9 cucchiai do olio più il necessario per ungere il testo – ½ cucchiaio di curcuma – Sale e pepe q.b.\nPreparazione: In una ciotola setacciare la farina di ceci e stemperarla nell’acqua; unire la curcuma e mescolare bene. Lasciar riposare almeno 5 ore, mescolando di tanto in tanto. Trascorso questo tempo, eliminare con una schiumarola l’eventuale schiuma formatasi sulla superficie. Aggiungere 7 cucchiai di olio e mescolare. Nel frattempo affettare finemente la cipolla e tagliare le zucchine a rondelle. In una padella antiaderente soffriggere la cipolla in 2 cucchiai di olio extra vergine; unire le zucchine e cuocere per 10 minuti circa, fino a quando saranno tenere. Regolare di sale e pepe. Unire le zucchine al composto di farina di ceci e mescolare. Ungere il testo in rame e versarvi il composto. Infornare a 220 gradi (statico) per circa 15 minuti. Sfornare e servire calda.\nPartecipano come contributors:","note":"","tags":[],"_importId":1035},{"nome":"RICETTE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":125.0,"unit":"g","name":"burro"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":70.0,"unit":"g","name":"zucchero"},{"qty":220.0,"unit":"g","name":"farina"},{"qty":150.0,"unit":"g","name":"zucchero a velo"},{"qty":1.0,"unit":"cucchiaino","name":"zenzero macinato"},{"qty":1.0,"unit":"cucchiaino","name":"cannella macinata"}],"procedimento":"PREPARAZIONE\n\t\tImpasta il burro con l’uovo, lo zucchero, lo Zenzero macinato La Drogheria 1880, la Cannella macinata La Drogheria 1880, la scorza di limone e la farina. Fai riposare l’impasto in frigorifero 30 minuti. \n\t\tAccendi il forno a 180 °C. e nel frattempo, stendi l’impasto con un mattarello e ricava i biscotti della forma desiderata. Cuoci in forno per circa 20 minuti, o fino a che inizieranno appena a dorarsi, poi lascia raffreddare. \n\t\tNel frattempo, prepara la glassa mescolando lo zucchero a velo con poco succo di limone alla volta, fino a ottenere una pasta. Utilizzala per decorare i cookies.","note":"","tags":[],"_importId":11598},{"nome":"Richiesta di mio figlio ❤️","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Mamma è da tanto che non mi fai le zeppoline di pasta cresciuta con fior di zucca😜 Le ho fatte spesso, ma lui non c'era mai 😞ed eccolo accontentato. Ho aggiunto anche zucchine piccole e tenerissime😋\nSoddisfatto lui e tutti gli altri 😜\nRICETTA👇👇👇\nZeppoline di fiori di zucca\n500 gr di farina 00\n550 ml di acqua fredda,\n10 gr di lievito di birra fresco,200 di fiori di zucca (anche di più se piacciono più piene)\ndue cucchiai di formaggio parmigiano e 2 di pecorino (se piace)\ni fiori di zucchine tagliati a pezzetti non troppo piccoli e due/tre zucchine trifolate.\n2 cucchiai di olio di oliva\n20 gr di sale\nMescolare prima l'acqua con il lievito poi l'olio, il formaggio, la farina e in ultimo il sale e le zucchine. Mescolare bene e tenere in frigo   per un oretta.\nPoi togliere l'impasto dal frigo e lasciate lievitare almeno 2 ore,  \nDopo lievitato, friggete le zeppoline aiutandovi con due cucchiai in olio caldissimo.\nSaranno croccanti fuori e morbide dentro\nBuonissime😋😋😜","note":"","tags":[],"_importId":14814},{"nome":"Ricotta, 2 zucchine, farina, 1 uovo, sale e parmigiano","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"sale:"},{"qty":null,"unit":"q.b.","name":"burro:"},{"qty":null,"unit":"q.b.","name":"salvia fresca:"},{"qty":null,"unit":"q.b.","name":"parmigiano grattugiato:"}],"procedimento":"Preparazione:\n1. Scola la ricotta in un colino a maglie strette per almeno 2 ore.\n2. Grattugia le zucchine, salale leggermente e lasciale riposare 10 minuti. Poi strizzale bene con un canovaccio.\n3. In una ciotola, unisci la ricotta sgocciolata, l’uovo, il parmigiano e un pizzico di sale.\n4. Mescola fino a ottenere una crema liscia.\n5. Aggiungi le zucchine strizzate e mescola bene.\n6. Incorpora metà della farina, poco alla volta, fino a ottenere un impasto morbido ma non appiccicoso.\n7. Trasferisci l’impasto su un piano infarinato e lavoralo brevemente con le mani.\n8. Dividi l’impasto in porzioni e forma dei filoncini di circa 2 cm di diametro.\n9. Taglia i filoncini in tocchetti di circa 2 cm.\n10. In una padella fai sciogliere il burro e aggiungi qualche foglia di salvia, lasciando insaporire per un minuto.\n11. Cuoci gli gnocchi in acqua bollente salata; quando salgono a galla, scolali e versali nella padella col burro.\n12. Manteca delicatamente con un mestolo di legno.\n13. Servi gli gnocchi ben caldi con una generosa spolverata di parmigiano.","note":"","tags":[],"_importId":14377},{"nome":"ROCCIATA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"70 g uvetta 100 ml rum 3 mele 70 g noci 70 g zucchero 40 g pinoli 1 cucchiaino cannella in polvere 15 g cacao  scorza di limone q.b. \n\t\t olio d'oliva q.b.  150 ml alchermes  zucchero a velo q.b. \nMettiamo l’uvetta in una ciotola e aggiungiamo 50 millilitri di rum, poi lasciamo riposare per 20 minuti.\nNel frattempo, prepariamo l’impasto e mettiamo in una ciotola la farina, il sale, l’olio di oliva e l’acqua fredda.\nImpastiamo bene fino a ottenere un panetto omogeneo, morbido e lavorabile, avvolgiamolo con la pellicola per alimenti e facciamo riposare in frigorifero per un’ora.\nA questo punto possiamo preparare il ripieno mettendo in una ciotola capiente le mele tagliate a cubetti piccoli, le noci, lo zucchero, i pinoli, la cannella, il cacao, l’uvetta scolata, i 50 millilitri di rum che ci sono rimasti e infine la scorza di limone grattugiata.\nMescoliamo bene in modo da amalgamare tutti gli ingredienti e distribuirli in modo uniforme.\nStendiamo l’impasto su una spianatoia ricoperta con carta forno, fino a renderlo sottile e ampio circa 40 x 55 cm.\nDistribuiamo tutto il ripieno per formare uno strato uniforme, lasciando i bordi liberi.\nArrotoliamo l’impasto aiutandoci con la carta forno, e sigilliamo la chiusura e le estremità facendo pressione con le dita.\nPieghiamo il rotolo in modo da formare una spirale e mettiamolo su una placca foderata di carta forno. Poi spennelliamo la superficie con l’olio di oliva e cuociamo in forno statico preriscaldato a 180 °C per 35 minuti circa.\nSforniamo il dolce e versiamoci sopra l’alchermes immediatamente.\nSpostiamo la rocciata su una superficie pulita, decoriamo con abbondante zucchero a velo, tagliamola a fettine e serviamola!\nConservazione della rocciata\nLa rocciata si mantiene ottima per 2-3 giorni, consigliamo di conservarla sotto una campana di vetro al riparo da fonti di luce e di calore.","note":"","tags":[],"_importId":13025},{"nome":"Rosa Odessa te la mettiamo anche qui: PANCAKE STRUDEL 🍎✨","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":95.0,"unit":"g","name":"farina 00"},{"qty":4.0,"unit":"g","name":"lievito in polvere"},{"qty":1.0,"unit":"g","name":"bicarbonato"},{"qty":15.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":80.0,"unit":"g","name":"yogurt greco"},{"qty":40.0,"unit":"g","name":"latte"},{"qty":15.0,"unit":"g","name":"burro"},{"qty":1.0,"unit":"n°","name":"mela"},{"qty":15.0,"unit":"g","name":"uvetta"},{"qty":10.0,"unit":"g","name":"pinoli"},{"qty":null,"unit":"q.b.","name":"cannella"}],"procedimento":"PROCEDIMENTO\n– In una ciotola mescolate gli ingredienti secchi.\n– In un'altra unite burro sciolto, uovo, yogurt e latte.\n– Versate liquidi nei secchi e mescolate per 20 secondi.\n– Aggiungete mela a dadini, uvetta, pinoli e cannella.\n– Mescolate delicatamente solo per incorporare.\n– Cuocete a fuoco medio con coperchio, 2 minuti e mezzo per lato.\n– Servite con abbondante zucchero a velo. BUON PANCAKE 🙂\nP.S. Le mele devono essere tagliate piccolissime (0,5 cm max). Così cuociono nei 2 minuti e mezzo, senza restare crude.\n✨","note":"","tags":[],"_importId":16173},{"nome":"Rosaria Paglia certo!","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Inizia setacciando la farina e il lievito per dolci in polvere. Aggiungi il sale, metà porzione di zucchero semolato (190 gr), la Vanillina (o la polpa di vaniglia). Miscela brevemente le polveri usando la foglia.\nAggiungi i liquidi e mescola il composto.\nAggiungi la scorza di limone grattugiata, i tuorli, l’acqua e l’olio di semi di girasole. Mischia il tutto con la foglia, aumentando progressivamente la velocità fino ad ottenere un composto omogeneo.\nA parte monta a neve l’albume, aggiungendo prima il cremor tartaro e dopo un minuto circa (l’albume inizia ad aumentare sostanzialmente di volume) lo zucchero semolato rimanente. Frulla ad alta velocità fino a che tutto lo zucchero si sarà sciolto. Puoi verificare tastando l’albume con le dita.\nIncorpora l’albume nel primo composto\nQuindi incorpora l’albume montato nel composto con i tuorli, usando una spatola o un cucchiaio e con movimenti circolari dal basso verso l’alto per mantenere l’impasto gonfio e spumoso.\nPorta l’impasto nello stampo a ciambella\nVersa l’impasto nello stampo per Chiffon cake da 26 cm di diametro e usa uno stecchino per spiedini per distribuire uniformemente l’impasto ed eliminare eventuali bolle d’aria.\nInforna in forno statico preriscaldato a 160°C per circa 60-70 minuti. Al termine della cottura lascia raffreddare la Chiffon cake nello stampo mettendolo a testa in giù.\nAngela Mundo grazie per la ricetta e complimenti 👏👏👏 posso chiedere se ha messo succo di arancia ? O va bene acqua?\nIvana Savini grazie. Io l’ho fatta con acqua\nGiovanna Scardino 24 cm. Anch’io la adoro bella alta .","note":"","tags":[],"_importId":12572},{"nome":"SALAME AL CIOCCOLATO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"biscotti secchi"},{"qty":50.0,"unit":"ml","name":"liquore"},{"qty":50.0,"unit":"g","name":"zucchero"},{"qty":50.0,"unit":"g","name":"cacao amaro"},{"qty":70.0,"unit":"g","name":"frutta secca"},{"qty":150.0,"unit":"g","name":"cioccolato fondente"},{"qty":80.0,"unit":"g","name":"burro"}],"procedimento":"SALAME AL CIOCCOLATO \n  300gr biscotti secchi\n50ml liquore (rum, disaronno o latte, caffè)\n50gr zucchero\n50gr cacao amaro\n70gr frutta secca (io mandorle nocciole e arachidi)\n150gr cioccolato fondente\n80gr burro\nQ.b zucchero a velo","note":"","tags":[],"_importId":12331},{"nome":"SALSA DI NOCI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"ml","name":"latte"},{"qty":250.0,"unit":"g","name":"noci"},{"qty":140.0,"unit":"ml","name":"olio extravergine d’oliva"},{"qty":50.0,"unit":"g","name":"parmigiano reggiano"},{"qty":30.0,"unit":"g","name":"pinoli"},{"qty":1.0,"unit":"n°","name":"aglio"},{"qty":1.0,"unit":"n°","name":"maggiorana"}],"procedimento":"#allacciateilgrembiule #ricettetradizionali #ricettadelgiorno #ricettafacile #salsanoci","note":"","tags":[],"_importId":16003},{"nome":"Sarà la brioche più MORBIDA E SOFFICE mai assaggiata","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"latte","sezione":"Per il preimpasto"},{"qty":null,"unit":"q.b.","name":"granella di zucchero","sezione":"Per il preimpasto"}],"procedimento":"Preparazione:\n\n1- Prepara il preimpasto mescolando yogurt, lievito, zucchero e farina. Copri e lascia lievitare per 30 minuti.\n\n2- Aggiungi farina e zucchero al preimpasto e inizia a impastare.\n\n3- Quando l’impasto sarà elastico, unisci il burro morbido poco alla volta. Continua a impastare fino a ottenere un composto liscio.\n\n4- Copri e lascia lievitare per 1 ora e 30 minuti.\n\n5- Dividi l’impasto in palline da 120 g, imburra uno stampo da plumcake e sistemale all'interno.\n\n6- Copri e lascia lievitare per altri 90 minuti.\n\n7- Spennella con tuorlo e latte, aggiungi la granella di zucchero e inforna a 170°C per circa 25 minuti.\n\nSoffice e irresistibile!","note":"","tags":[],"_importId":14083},{"nome":"SAVOIARDI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"zucchero a velo,"}],"procedimento":"Aggiungete ai bianchi, il pizzico di sale, lo zucchero vanigliato e 30 grammi di quello semolato. Montateli a neve fermissima con le fruste elettriche.\nNel recipiente con i rossi, mettete lo zucchero semolato restante (30 g) e lavorate per 2 o 3 minuti con lo sbattitore per ottenere un composto denso e spumoso. Ora unite gli albumi, con movimenti delicati dal basso all’alto per non compromettere la consistenza soffice. Poi setacciate direttamente nella terrina la farina. In due, amalgamate perfettamente, quindi trasferite il tutto in una sac à poche.\nRealizzate direttamente sulla placca delle strisce spesse, della dimensione classica dei savoiardi. Spolverateli con lo zucchero a velo e infornateli per una decina di minuti. In verità, dipende dalle performance del vostro forno: la cottura può durare dagli 8 ai 12 minuti, controllateli spesso e quando risultano ben dorati in superficie, sfornateli.\nOra gustateli, sono una meraviglia!","note":"","tags":[],"_importId":10155},{"nome":"SAVOIARDI SARDI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"uova"},{"qty":50.0,"unit":"g","name":"farina 00"},{"qty":50.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"bustina","name":"vanillina"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":2.0,"unit":"cucchiaio","name":"zucchero a velo"}],"procedimento":"Istruzioni\nCome fare i savoiardi sardi\nPer fare i pistoccus o savoiardi sardi mettiamo uova e zucchero in una ciotola capiente, poi aggiungiamo un pizzico di sale. Montiamo con le fruste elettriche per almeno 10 minuti fino ad ottenere una crema chiara e spumosa. \nQuando le uova sono perfettamente montate aggiungiamo la farina setacciandola al momento di versarla nella ciotola, ne aggiungiamo un po' per volta. Mescoliamo l'impasto con una spatola facendo movimenti lenti dal basso verso l'alto per amalgamare la farina senza smontare le uova. \nUna volta che la farina si è amalgamata completamente al composto di uova l'impasto dei nostri biscotti sardi morbidi è pronto e possiamo preriscaldare il forno a 180°. Intanto prepariamo una teglia con un foglio di carta forno antiaderente. \nTrasferiamo l'impasto dei savoiardi in una sac-à-poche con il becco largo o se è riutilizzabile tagliamola in modo che fuoriescano 2 cm di impasto. In alternativa alla sac-à-poche si può usare un cucchiaio. Formiamo i savoiardi che dovranno essere lunghi circa 7-8 cm. \nPrima di infornare spolverizziamo dello zucchero a velo sui nostri biscotti tipo savoiardo sardi e inforniamo per 10-12 minuti. Quando il bordo dei nostri biscotti inizia a dorarsi è il momento di sfornarli. Non cercate di toglierli subito dalla teglia o si romperanno, invece aspettate che si raffreddino un po'. \nQuando si sono induriti un pochino possiamo trasferire i biscotti su una griglia per finire di farli raffreddare. Giunti a temperatura ambiente possiamo spolverizzare con altro zucchero a velo e servire per inzupparli nel latte, nel caffè o usarli per fare delle torte!","note":"","tags":[],"_importId":10118},{"nome":"SBRICIOLATA ALLA RICOTTA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":100.0,"unit":"g","name":"burro freddo"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":1.0,"unit":"bustina","name":"lievito"}],"procedimento":"Mescolate gli ingredienti iniziando dal primo e aggiungendone uno alla volta. Una volta pronto l'impasto mettetelo da parte .\n500 gr di ricotta \n150 gr zucchero \n15 grammi farina\n1 bustina vanillina \nMescolate tutti gli ingredienti sempre iniziando dal primo e aggiungendone uno alla volta fino a quando il composto risulterà cremoso e senza grumi dopodiché copritelo con la pellicola e mettetelo in frigo fino all'utilizzo .\nPreparazione del cioccolato fondente :\n80 grammi panna fresca \n150 gr cioccolato fondente a pezzetti \n Mettete in un pentolino a fuoco medio la panna fresca. Appena inizia a fare le bollicine aggiungete il cioccolato fondente a pezzetti,spegnete la fiamma e iniziate a mescolare velocemente fino allo scioglimento del cioccolato .\n\nUna volta imburrata la teglia( da 24cm se si vuole una torta più alta altrimenti 26)metteteci sul fondo della carta forno poi iniziate ad aggiungere una parte dell'impasto sbriciolato picchettando con le dita.Successivamente mettete il ripieno di  ricotta ( lasciate circa 1 cm dal bordo) poi aggiungete lo strato di cioccolato fondente sopra la ricotta.Dopo questa operazione coprite il tutto con il rimanente impasto sbriciolato.\n\nINFORNATE LA TORTA A 180/200 GRADI  FORNO STATICO PER CIRCA 35/40 MIN .\n\nCONSIGLIO: quando la torta sarà pronta ,una volta raffreddata ,mettetela in frigo circa 30 min prima di mangiarla !\n\nBUON APPETITO 🙂\n\nVideo ricetta nel primo commento 😀👇👇👇","note":"","tags":[],"_importId":7550},{"nome":"Sbriciolata alle mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":230.0,"unit":"g","name":"farina 00"},{"qty":null,"unit":"g","name":"farina di mandorle"},{"qty":1.0,"unit":"n°","name":"tuorlo medio"},{"qty":100.0,"unit":"g","name":"zucchero di canna"},{"qty":120.0,"unit":"g","name":"burro"},{"qty":1.0,"unit":"cucchiaino","name":"raso di lievito per dolci"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":60.0,"unit":"g","name":"zucchero di canna"},{"qty":3.0,"unit":"cucchiaio","name":"confettura di albicocche"},{"qty":1.0,"unit":"n°","name":"piccola noce di burro"},{"qty":null,"unit":"q.b.","name":"cannella"}],"procedimento":"Ho aggiunto anche della crema pasticcera al ripieno trovate la mia ricetta qui occorrerà metà dose. Se andate di fretta potete anche omettere questo passaggio. Se avete tempo vi consiglio di aggiungerla sarà ancora più cremosa. 😉\nProcedimento per la farcitura alle mele\nSbucciate e tagliate le mele a quadratini piccoli, irroratele con il succo di limone.\nAggiungete in una padella i tocchetti di mele, la noce di burro, la confettura e lo zucchero di canna. Cuocete a fiamma bassa fino a quando le mele non diventeranno morbide. Aggiungete la cannella, a piacere l’uvetta ammorbidita in acqua ben fredda per almeno dieci minuti e mescolate. Mettete da parte.\nProcedimento per la sbriciolata alle mele\nIn un mixer aggiungete il burro tagliato a pezzetti, lo zucchero di canna, la farina di mandorle e tutti gli altri ingredienti.\nAzionate fino a creare un composto sbricioloso e ben amalgamato.\nEstraete il composto dal mixer amalgamatelo leggermente con le mani. Non lavoratelo troppo. Rivestite una tortiera di 22 cm con carta forno. Prendete metà del composto sbriciolato e distribuitelo su tutta la base dello stampo schiacciando con un cucchiaio o con le mani.\nAggiungete tutta la farcitura alle mele.\nPrendete il restante composto e ricoprite per bene tutta la superficie.\nCuocete in forno statico a 180° per circa 45 minuti. La superficie dovrà dorarsi.\nTrascorso il tempo necessario fate raffreddare completamente la sbriciolata alle mele ed estraete dallo stampo.\nIl mio consiglio è di gustarla tiepida accanto ad un bel tè oppure aspettare che si raffreddi completamente… il giorno dopo sarà più buona.","note":"","tags":[],"_importId":996},{"nome":"Sbriciolata pasticciotto un'esplosione di bontà!!","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina"},{"qty":100.0,"unit":"g","name":"burro"},{"qty":150.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"n°","name":"uovo intero"},{"qty":2.0,"unit":"n°","name":"tuorli"},{"qty":8.0,"unit":"g","name":"lievito per dolci"},{"qty":650.0,"unit":"ml","name":"latte intero"},{"qty":4.0,"unit":"n°","name":"tuorli"},{"qty":90.0,"unit":"g","name":"zucchero"},{"qty":40.0,"unit":"g","name":"farina"},{"qty":2.0,"unit":"n°","name":"fialette di aroma al limone"},{"qty":200.0,"unit":"g","name":"amarene sciroppate"},{"qty":null,"unit":"q.b.","name":"zucchero a velo"}],"procedimento":"Preparazione:\n\n1- Preparate la crema: scaldate il latte con la scorza di limone senza farlo bollire. In una ciotola, montate i tuorli con lo zucchero, poi incorporate la farina setacciata. Versate il latte filtrato a filo, mescolando. Cuocete a fuoco basso, aggiungendo l’aroma al limone, fino a ottenere una crema densa. Coprite con pellicola a contatto e fate raffreddare in frigo per 3 ore.\n2- Preparate la frolla: in una ciotola unite farina, lievito, zucchero, burro freddo a pezzetti, scorza di limone, l’uovo e i tuorli. Lavorate velocemente fino a ottenere un composto sbriciolato.\n3- Assemblate nella tortiera: imburrate e infarinate uno stampo da 20 cm. Versate metà della frolla sbriciolata sul fondo, compattandola bene anche sui bordi fino a 2,5 cm di altezza.\n4- Aggiungete la crema e le amarene: versate la crema sulla base, livellandola. Distribuite sopra le amarene facendole affondare leggermente.\n5- Cottura: coprite con la restante frolla sbriciolata e infornate a 180°C per 40-50 minuti.\n6- Servizio: lasciate raffreddare completamente, sformate e cospargete con zucchero a velo.\n\nPerfetta per una colazione speciale o un dessert da condividere!","note":"","tags":[],"_importId":14951},{"nome":"Sbrisolona di patate","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"ammi"},{"qty":600.0,"unit":"g","name":"ammi"},{"qty":250.0,"unit":"n°","name":"gr"},{"qty":100.0,"unit":"n°","name":"gr"},{"qty":1.0,"unit":"n°","name":"unità"},{"qty":80.0,"unit":"n°","name":"gr"},{"qty":200.0,"unit":"n°","name":"gr"}],"procedimento":"Come prima cosa, immergi le patate con tutta la buccia in una pentola piena di acqua fredda e fai lessare per circa 30-40 minuti a partire dall’ebollizione. Quando riuscirai ad infilzarle senza resistenza con i rebbi di una forchetta vorrà dire che sono pronte.\nUna volta cotte, taglia le patate e schiacciale con lo schiacciapatate. Adagia il composto all’interno di una ciotola capiente e lascia raffreddare.\nNel mentre prendi una padella con un filo d’olio e salta le carote a julienne per qualche minuto. Aggiungi un pizzico di rosmarino per insaporire.\nAggiungi l’amido di mais, metà del parmigiano, un pizzico di sale, l’uovo intero e inizia lavorare l’impasto con le mani, fino ad ottenere un composto omogeneo.\nPrendi una pirofila o una tortiera (di circa 20 cm di diametro) e rivestila di carta forno. Versaci circa metà dell’impasto e forma una base omogenea e compatta, pressando con le dita. Adagia sulla base la scamorza affumicata, precedentemente tagliata a fettine grossolane, la pancetta e le carote. Ricopri tutto con la restante parte dell’impasto, facendo pressione per compattare. Sbriciola con le mani parte dell’impasto e ricopri il top della torta. Condisci con pepe e un filo d’olio extravergine di oliva. \nAggiungi il resto del parmigiano in superficie (anche un po’ di pangrattato) e cuoci per circa 25 minuti in forno statico preriscaldato a 180°. Trascorso il tempo, prosegui la cottura con la funzione grill per altri 7 minuti.\nSforna, lascia intiepidire e servi.\nCONSIGLI: Puoi arricchire la farcitura con altre verdure saltate in padella, come zucchine, melanzane, peperoni, scolandole bene dal liquido di cottura per evitare di bagnare eccessivamente la torta in cottura.\nAl posto dell’amido di mais puoi utilizzare la fecola di patate, con le stesse dosi. Al posto della pancetta puoi utilizzare il prosciutto cotto","note":"","tags":[],"_importId":11586},{"nome":"Sbrisolona ricotta cioccolato","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Vanillina 1 bustina (ma io ho messo la punta di un cucchiaino da far sentire appena il contrasto)\nLievito per dolci 1 bustina 16 g\nSale 1 pizzico\nZucchero 150 g\nRicotta 250 g\nCioccolato 100 g\nPREPARAZIONE: Mescolate in una capiente ciotola 100 g di zucchero di farina, poi il burro fuso e il sale ; aggiungete la vanillina e il lievito.\nRompete l’uovo e lavorate il composto con le dite formate tantissime briciole con le punta delle dita, che andrete a mettere in uno stampo infarinato e imburrato formando la base del dolce.\n  Intanto preparate anche la farcia frullando la ricotta setacciata o ben scolata con lo zucchero  setacciata ee per finire il cioccolato fondente sciolto.\nCoprite la base con il ripieno di ricotta e cioccolato, e poi ricoprite con la restante sbriciolata di frolla preparata .\nInfornate in forno preriscaldato a 180 gradi per 40 minuti all’altezza del forno medio bassa , se è ben dorata sfornate , la cottura dipende molto dai forni quindi gli ultimi minuti controllate 🙂\nQuesto dolce è molto versatile e puo’ dare spunto a tanti ripieni  e tante versioni la prossima preparatevi una versione nuova sfiziosa, in arrivo anche il video.","note":"","tags":[],"_importId":600},{"nome":"Sbucciare, e tagloare le mele a pezzettini. Mettere in","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Sbucciare, e tagloare le mele a pezzettini. Mettere in una ciottola con qualche goccia di succo di limone e tenere da parte.\nAmmollare l’uvetta in acqua tiepida. \nIn un’altra ciotola montare le uova con lo zucchero, usando le fruste elettriche. Unire l’estratto di vaniglia, il burro fuso ed il latte a filo. \nUna volta ben amalgamati tutti gli ingredienti, aggiungere la farina setacciata e il lievito. Mescolare con una spatola.\nStrizzare l’uvetta, asciugarla tamponando con carta assorbente e infarinarla. Aggiungerla all’impasto con i pinoli e le mele. \nDopo aver amalgamato bene, versare l’impasto all’interno di uno stampo imburrato e infarinato (24 cm) ed infornare a 180°C statico per circa 40/45 minuti.\nSfornare, lasciar raffreddare, togliere dallo stampo e spolvelizzare con zucchero al velo.\n  3\nUova\n110 g\nZucchero\n180 ml\nLatte\n60 g\nBurro fuso\n220 g\nFarina 00\n1 bustina\nLievito in polvere per dolci\n1\nLimone (scorza)\n3\nMele\n60 g\nUvetta\n40 g\nPinoli\nq.b.\nVaniglia\nq.b.\nZucchero a velo\nTeglia 24cm","note":"","tags":[],"_importId":14904},{"nome":"scalogno e/o cipolla tritata con radicchio tagliato a","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimen nella\n\nRipieno del budino:\n4 uova\n110 g (½ tazza + 1 cucchiaio) di zucchero\n1 cucchiaino di estratto di vaniglia\n3 cucchiai di zucchero vanigliato\n80 g di crema pasticcera in polvere\n870 ml (3⅔ tazze) di latte\n110 g (4 once) di burro\n\nTeglia: 35 cm x 30 cm\n\nCottura: 180°C / 356°F 45 minuti a fuoco superiore/inferiore","note":"","tags":[],"_importId":11836},{"nome":"Schiacciata di ceci: alta e super crunchy","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Schiacciata di ceci: alta e super crunchy! Una ricetta perfetta per un aperitivo speciale..#\nTi servono:\n • 100 g di farina 00 (va bene anche senza glutine)\n • 50 g di parmigiano grattugiato\n • 150 ml di acqua\n • Sale, pepe e olio extravergine d’oliva\n • 300 g di ceci (vanno benissimo quelli in lattina, ben scolati e asciugati)\n • Rosmarino q.b.\nMescola la farina, il parmigiano e l’acqua fino a ottenere una pastella densa. Aggiusta di sale, pepe e un filo d’olio. Unisci i ceci e il rosmarino, poi versa il composto in una teglia ben unta. Schiaccia bene il tutto con una spatola o con le mani, così da ottenere uno spessore uniforme.\nInforna a 230°C:\n– Prima 10 minuti nella parte bassa del forno\n– Poi sposta a metà altezza per altri 10 minuti\nTrovi la ricetta, passo passo su , ti lascio il link nelle storie.","note":"","tags":[],"_importId":14592},{"nome":"SCHIACCIATA DI PATATE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti:  600 gr di farina 00- 600 gr di.acqua - 200 gr di patate- 7 gr di sale- 4 gr di zucchero- 8 gr di.lievito secco\n( teglia 32×40)\nPreparazione: bollire le patate per 15 minuti con l'acqua  data nella ricetta, poi frullare tutto e freddare per un'ora. Sciogliere in questo pure' liquido il\nlievito e lo zucchero, poi unire metà  farina, mescolare, poi.il sale, mescolare , infine la restante farina e mescolare per due, tre minuti. Oliare un contenitore ,versarvi l'impasto, coprire e lievitare per due, tre ore, fino al raddoppio.\nFrattanto oliare o imburrare la teglia, poi.versarvi l'impasto, ungere le mani nell'olio e distenderlo su tutta la teglia. Ungerlo.con\nolio, cospargerlo di sale grosso, e fare i tradizionali buchi con le dita. Lievitare coperto per altri 60 minuti.\nForno\npreriscaldato a 200 gradi.e cuocere per 20-30 minuti.","note":"","tags":[],"_importId":7718},{"nome":"Scopri la delizia dei Mini Pane Palloncino Ripieno","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina-> -56gr= 444gr"},{"qty":300.0,"unit":"ml","name":"acqua tiepida -> -28gr = 272gr"},{"qty":10.0,"unit":"g","name":"sale"},{"qty":15.0,"unit":"g","name":"zucchero"},{"qty":7.0,"unit":"g","name":"lievito di birra secco m->84gr lievito madre"},{"qty":50.0,"unit":"ml","name":"olio d'oliva"},{"qty":200.0,"unit":"g","name":"prosciutto cotto a fette"},{"qty":150.0,"unit":"g","name":"formaggio a pasta filata a fette"},{"qty":100.0,"unit":"g","name":"spinaci cotti e strizzati"}],"procedimento":"Istruzioni:\n1. In una ciotola grande, mescola la farina, il lievito secco, lo zucchero e il sale.\n2. Aggiungi l'acqua tiepida e l'olio d'oliva. Impasta bene fino ad ottenere un impasto liscio ed elastico.\n3. Copri la ciotola con un coperchio o della pellicola trasparente e lascia lievitare per un'ora in un luogo caldo, fino al raddoppio del volume.\n4. Prendi l’impasto lievitato e dividilo in palline di circa 50 g ciascuna.\n5. Stendi ogni pallina in un disco sottile e farcisci il centro con un po' di prosciutto cotto, formaggio e spinaci.\n6. Ripiega il disco a metà, sigillando bene i bordi, per formare un piccolo panino.\n7. Disponi i panini ripieni sulla teglia rivestita di carta da forno e lascia lievitare per altri 30 minuti.\n8. Se desideri, spennella i panini con un po' d'olio e cospargi di semi di sesamo.\n9. Preriscalda il forno a 200°C e cuoci i panini per 15-20 minuti, fino a doratura.\n\nServi caldi o a temperatura ambiente. Questi Mini Pane Palloncino Ripieno possono essere preparati in anticipo e conservati in frigorifero per qualche giorno.","note":"","tags":[],"_importId":16024},{"nome":"SFORMATO DI ZUCCA FILANTE Un abbraccio di sapori in","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"zucca pulita"},{"qty":500.0,"unit":"g","name":"patate a dadini"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":80.0,"unit":"g","name":"formaggio grattugiato"},{"qty":80.0,"unit":"g","name":"pangrattato + per gratin"},{"qty":200.0,"unit":"g","name":"scamorza affumicata a fette"},{"qty":100.0,"unit":"g","name":"speck a fette"}],"procedimento":"PROCEDIMENTO\n\nMettiamo a lessare le patate tagliate a dadini in acqua bollente salata per 5 minuti. Tagliamo la zucca a cubetti e mettiamola in una ciotola.  Passati i 5 minuti, aggiungiamo la zucca alle patate e cuociamo per altri 10 minuti. Una volta ultimata la cottura di entrambe, scoliamo tutto in una ciotola e schiacciamo bene con una forchetta, poi lasciamo intiepidire per qualche minuto. Aggiungiamo le uova, il formaggio grattugiato e il pangrattato. Uniamo anche il prezzemolo tritato, il sale, il pepe e un filo d’olio e mescoliamo bene il tutto fino ad avere un composto omogeneo. Prendiamo una pirofila da 22×27 cm e ungiamola con dell’olio d’oliva. Versiamoci all’interno metà del composto di zucca e patate, allargandolo e livellandolo bene. Sistemiamo sopra le fette di speck e poi quelle di scamorza. Ricopriamo con il composto restante, livellandolo. Aggiungiamo dell’olio, spandendolo con il dorso di un cucchiaio, e cospargiamo la superficie con pangrattato. Facciamo cuocere in forno ventilato a 190 °C per 35 minuti (con il forno statico aumentiamo la temperatura di 10 °C). Una volta sfornato, lasciamo intiepidire e ricompattare il nostro sformato di zucca speck e formaggio per qualche minuto, poi portiamo in tavola e… buon appetito!","note":"","tags":[],"_importId":13191},{"nome":"Si certo","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"farina per pizza,"},{"qty":27.0,"unit":"g","name":"sale grosso sciolto in 300 gr di acqua,"},{"qty":1.0,"unit":"g","name":"lievito  di birra fresco sciolto in 200 gr di acqua"}],"procedimento":"Mettere in planetaria  la farina con acqua e sale, far girare poi unire acqua e lievito formare un impasto liscio e omogeneo (2' circa di lavorazione) mettere in un contenitore con coperchio e poi in frigo per 2 giorni. Togliere dal frigo  dopo un ora circa formare 6 oppure 7 panetti rimettete in frigo.\nAl terzo giorno controllare i panetti, se si sono allargati togliere dal frigo una o due ore prima di cuocere, se invece sono ancora sostenuti bisogna toglierli prima, ma questa è una storia lunga, entrano in gioco molti fattori,  tipo di farina, temperatura del frigo, temperatura  ambiente, se sei appassionato di lievitati queste cose le sai già,  comunque  chiedi nel mio piccolo se posso ti rispondo😘","note":"","tags":[],"_importId":6732},{"nome":"Sono riuscita, non so come, a cuocere ancora la","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Sono riuscita, non so come, a cuocere ancora la Baguette di Nonna Laura, e domani non potrò far nulla perchè mi consegneranno il forno nuovo. Purtroppo non è stata una cosa facile, perché i forni a gas non li fanno più, e questo non so come, mia figlia é riuscita a procurarselo. Ma torniamo alla ricetta della \nBAGUETTE DI NONNA LAURA.\nINGREDIENTI:  500 gr di acqua - 800 gr di farina da pane - 50 gr di olio evo - 4 gr di malto o zucchero - 29 gr di strutto - 7 gr di lievito secco (o 25 di lievito di birra) - 15 gr di sale.\nCi spega Vittorio Viarengo, suo figlio, che la mamma la fa con un suo speciale sistema, baguette sul diretto, cioè con un solo impasto e lievito di birra. La chiave di questo sistema sta nel dar forza alla pasta facendo delle pieghe.\nImpasto: sciogliere il sale nell'acqua, aggiungere malto, strutto olio evo, e metà della farina. Impastare per 2 minuti. aggiugere il lievito, la farina rimanente poco a poco, e impastare per 15 minuti. Fare una palla con l'impasto, coprire con pellicola e panno, e far riposare per 20 minuti. Dare un paio di pieghe alla pasta, e far lievitare altri 30 minuti. Spezzettare la pasta in 4 parti uguali,  e  creare 4 fioni ( io, come faccio sempre ,ho diviso l'impasto per 4, anche perchè non ero sicura del risultato del mio forno, che mi ha lasciato per sempre dopo 10 anni di onorato servizio, e mi ha accontentato per l'ultima volta). Metterli a riposare per bene coperti da pellicola e poi da un panno e farli riposare per 30 minuti. Dare ad  ogni filone la forma di baguette ( vedi foto), disporli su una teglia, e farli lievitare in un luogo dove non ci siano correnti o spifferi  (forno spento con luce accesa). \nSpruzzare un po' di acqua nel forno per creare del vapore o mettervi un pentolino con acqua.  Cuocere in forno preriscaldato a 220 gradi, per circa 20 minuti, secondo il proprio forno: (Se penso alle prove che dovrò fare col nuovo forno, che è anche ventilato, meglio non farlo. \nSempre grazie a Nonna Laura, che negli anni quante cose ci ha insegnato....","note":"","tags":[],"_importId":11238},{"nome":"Sottile, profumato e pieno di mele 🍎","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":170.0,"unit":"g","name":"farina 00","sezione":"Per la pasta tirata"},{"qty":1.0,"unit":"n°","name":"uovo medio","sezione":"Per la pasta tirata"},{"qty":1.0,"unit":"cucchiaio","name":"olio di semi","sezione":"Per la pasta tirata"},{"qty":50.0,"unit":"g","name":"acqua tiepida","sezione":"Per la pasta tirata"},{"qty":1.0,"unit":"pizzico","name":"sale","sezione":"Per la pasta tirata"},{"qty":750.0,"unit":"g","name":"mele","sezione":"Per il ripieno"},{"qty":50.0,"unit":"g","name":"zucchero semolato o di canna","sezione":"Per il ripieno"},{"qty":60.0,"unit":"g","name":"pangrattato","sezione":"Per il ripieno"},{"qty":30.0,"unit":"g","name":"burro per il pangrattato","sezione":"Per il ripieno"},{"qty":60.0,"unit":"g","name":"uvetta","sezione":"Per il ripieno"},{"qty":40.0,"unit":"g","name":"pinoli","sezione":"Per il ripieno"},{"qty":1.0,"unit":"cucchiaino","name":"cannella","sezione":"Per il ripieno"},{"qty":2.0,"unit":"cucchiaio","name":"rum","sezione":"Per il ripieno"},{"qty":10.0,"unit":"g","name":"burro fuso","sezione":"Per il ripieno"},{"qty":null,"unit":"q.b.","name":"zucchero a velo","sezione":"Per il ripieno"}],"procedimento":"Cuocete lo strudel in forno statico preriscaldato a 180°C per 40 minuti.\n#strudel #strudeldimele #dolcetradizionale #ricettatirolese #unafamigliaincucina #dolcidimontagna #mele #dolcifattiincasa #dessertautunnali #ricettedolci","note":"","tags":[],"_importId":15816},{"nome":"SPAGHETTI CACIO E PEPE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Antonella Sabatini acqua di cottura, pecorino e pepe tutto nel frullatore ad immersione. Tolga gli spaghetti, al dente, li metta in padella  con acqua di cottura, li smuova molto per far rilasciare l'amido, e quando gli spaghetti avranno finito di cuocere, aggiunga la crema creata con il frullatore, salti gli spaghetti un'ultima volta. Dopo aver impiattato, metta un'ultima spolverata di pepe...","note":"","tags":[],"_importId":9775},{"nome":"Speedy pizza 🚀🚀🚀","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina totale, di cui:"},{"qty":200.0,"unit":"g","name":"farina tipo 0 per pizza  vesuvio"},{"qty":100.0,"unit":"g","name":"farina tipo 1"},{"qty":4.0,"unit":"g","name":"lievito secco"},{"qty":180.0,"unit":"g","name":"acqua"},{"qty":10.0,"unit":"g","name":"olio extravergine di oliva"},{"qty":10.0,"unit":"g","name":"sale"}],"procedimento":"Procedimento:\nPreparazione dell’impasto:\nIn una ciotola capiente, setaccio insieme i 200 g di farina tipo 0 e i 100 g di farina tipo 1. Formo un buco al centro della farina.\nVerso i 180 g di acqua tiepida nel buco centrale, quindi aggiungo i 4 g di lievito secco. Mescolo con un cucchiaio solo al centro, incorporando gradualmente un po’ di farina dai bordi del buco, e lascio riposare il composto per 10 minuti per attivare il lievito.\n\nImpastamento:\nAggiungo l’olio extravergine di oliva e continuo a mescolare con il cucchiaio, incorporando gradualmente il resto della farina.\nDopo un paio di minuti, aggiungo il sale e mescolo fino a quando l’impasto diventa troppo denso per essere lavorato in ciotola.\nTrasferisco l’impasto sul piano di lavoro leggermente infarinato e lo lavoro con le mani per circa 5 minuti, fino a ottenere un panetto liscio, morbido ed elastico.\n\nlievitazione:\nRimetto il panetto nella ciotola, lo copro con un piatto e lo lascio lievitare per 15 minuti in un luogo tiepido.\n\nPieghe di rinforzo:\nDopo i 15 minuti, mi bagno la mano con acqua e lavoro l’impasto  dentro la ciotola. Tiro delicatamente i bordi dell’impasto verso il centro, ruotandolo per completare un giro completo: questo passaggio dona elasticità all’impasto.\nCopro con il piatto e lo lascio lievitare per 1 ora.\n\nFormazione delle palline:\nTrascorsa l’ora, trasferisco l’impasto sul piano di lavoro e lo divido in due parti uguali.\nSchiaccio leggermente ogni porzione con le dita, senza premere troppo per non eliminare l’aria incorporata. Arrotolo delicatamente ogni porzione per formare una pallina, poi pizzico l’impasto nella parte inferiore per farlo stare bene insieme, lavorando con cura per mantenere la leggerezza dell’impasto.\nCopro le palline con una ciotola capovolta e le lascio lievitare per circa 13 minuti (il tempo può variare leggermente in base alla temperatura dell’ambiente).\n\nStesura e cottura:\nPrendo una pallina e la stendo delicatamente con le mani su un piano leggermente infarinato, formando un disco e lasciando il bordo intatto per ottenere un cornicione alto e soffice.\nTrasferisco la base della pizza sulla pala in dotazione del forno  e condisco con  pomodoro mozzarella e altri ingredienti  a piacere . quindi la faccio scivolare sulla pietra refrattaria preriscaldata.\nCuocio nel forno elettrico GFerrari in modalità “pizza napoletana”, con la resistenza inferiore a 450°C e quella superiore a 400°C per circa 3-4 minuti al massimo .Controllo attentamente per evitare che il bordo si bruci.\nNote:\nI tempi di lievitazione possono variare leggermente in base alla temperatura ambiente: in un ambiente più caldo, potrebbe essere necessario meno tempo.\nPer un risultato ottimale, assicurati che il forno e la pietra refrattaria siano ben caldi prima di infornare.\nBuona pizza a tutti 😍","note":"","tags":[],"_importId":15496},{"nome":"SPESA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"SPESA\nMozza pizza 2\nOmogeneizzati 6\nFettine tacchino 2\n\n- [ ] Sugo mutti\n- [ ] Filetto 6\n- [ ] fettine Pollo x 2 \n- [ ] 5 zucchine \n- [ ] 4 melanzana \n- [ ] 3 pomodori \n- [ ] Torta salata brise 3\nRadicchio 2\nPatate rosse \nNoci\nScamorza \nSalumi \nBresaola confezionata\n- [ ] Limoni 2 confezioni coop\n- [ ] Mozzarella 3\n- [ ] Strisce per la ceretta sia grandi per gambe che piccole per bikini\n- basilico 3\n- Tahina\n- cipolle tropea\n\nLindt 70% 3\nUova\nSpesa solidale\nCrema lindt 1\nZucchero velo\nLatte 2 \nBurro coop\nBanane 3\nCarote 6\nCandeggina \nFarina azzurra Spadoni\nFettine lonza 6 coop\nFetta fontina\nPanini per cena domenica coop\n—————————————-\n\nSacchettini per piadine 12\nBurro\nFarina 00\n\nDuck sonny\n\nCarne tacchino\nCotto\nCrudo\nSesamo\nZuppiera\n\nSalame\nSesamo\nFarina 0 2\n\nBanane\nFrutti rossi \nUova\nVodafone \nElvive color-vive shampoo e balsamo \nScottex \nFazzoletti carta\nOmogeneizzati \nLatte HD 2 l \nIl tacchino fettine \nFarine \nBruse2\nSalumi\nCandeggina \nFormaggio \nParmigiano \nMelanzana \nCarote\nMandorle\nSedano \nPomodori 3 \nPomodorini","note":"","tags":[],"_importId":10733},{"nome":"SPUMONE AL CAFFÈ","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ecco allora gli ingredienti che vi serviranno per preparare lo spumone al caffè di Benedetta Rossi: cubetti di ghiaccio, 1 cucchiaio di caffè solubile, 5 grammi di zucchero a velo vanigliato, 150 ml di acqua naturale, cacao amaro per decorare.\nTritate il ghiaccio e mettetelo in una caraffa. Aggiungete caffè solubile, zucchero, acqua e frullate il tutto. Ora non vi resta che riempire i bicchieri, decorare il vostro spumone al caffè con cacao amaro e gustarlo. Pronto in men che non si dica, diventerà in poco tempo la vostra bevanda preferita.","note":"","tags":[],"_importId":11093},{"nome":"Stanca di far marmellata e fichi caramellati","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La ricetta è di Benedetta Rossi ed è velocissima:\n2 uova frullate a spuma con 130 g di zucchero di canna, poi si aggiungono 70 ml di olio di semi e 150 ml di latte, la scorza grattugiata di limone, 250 g di farina miscelata con una bustina di lievito.\nAll’impasto liscio si aggiungono 300g di fichi a pezzetti e si versa il composto in una teglia con cerniera da 24 cm imburrata e infarinata.\nSi mettono sulla torta altri fichi a rondelle, 5 noci tritate grossolanamente (io preferisco le mandorle a lamelle, ma non le avevo) e si finisce con due cucchiai di zucchero di canna. \nSi cuoce in forno preriscaldato a 175 C per 45-50 minuti.\n\nIl profumo è sublime ma brucia ancora…","note":"","tags":[],"_importId":14866},{"nome":"Stasera  cena senza sensi di colpa","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Stasera  cena senza sensi di colpa,  solo verdura frutta e una fetta di pane. Anziché fare  l'insalata,  ho cucinato i  finocch in padella  da crudi   con coperchio uno spicchio d'aglio, olio d'oliva , succo  di 2 arance  e una l'ho tagliata  a pezzi e aggiunta a metà  cottura,  sale  pepe e rosmarino .\nComunque ,  si possono servire  come contorno a della carne , formaggi , pesce o uova .","note":"","tags":[],"_importId":15886},{"nome":"Sto seguendo un certo regime alimentare e la ricetta","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Sto seguendo un certo regime alimentare e la ricetta di questa torta di mele mi è stata data dal mio doc. Vi lascio la ricetta.\n✅180 gr di farina di riso \n✅2 uova \n✅2 cucchiai di miele\n✅cannella\n✅2 mele ( una a pezzetti e una per la copertura) \n✅100 ml di bevanda vegetale o latte \n✅spremuta di 1 arancia\n✅1 bustina di lievito per dolci\nMescolare tutti gli ingredienti. Aggiungere la mela a dadini. Rimescolare e coprire con la mela a fettine. In forno a 180 gradi per 40 minuti circa .  Ho aggiunto anche un po’ di uvetta","note":"","tags":[],"_importId":13132},{"nome":"Strawberry Tart","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"flour"},{"qty":5.0,"unit":"g","name":"baking powder"},{"qty":5.0,"unit":"g","name":"vanilla powder"},{"qty":50.0,"unit":"ml","name":"vegetable oil"},{"qty":40.0,"unit":"g","name":"powdered sugar"}],"procedimento":"• 50 g yogurt (1 heaping tablespoon — make sure it’s thick, not watery, or your dough will be a disaster 😬😂)\n • 1 egg (Try to save just a little bit of the egg white — I know it’s not easy but you’ve got this!😅 You’ll only need a small amount later for brushing, no need to waste a whole egg🙂‍↔️)\n • 100 g room temperature butter\nInstructions\nFor the dough:\nCombine all the ingredients except the flour. Mix well. Add the flour gradually and knead into a soft dough. (Add the flour slowly — each flour behaves differently. If it’s not enough, you can add a bit more. The dough should be soft.) Cover it and let it rest in the fridge for about 15 minutes🙂‍↔️\nTake the dough out and roll it between two sheets of parchment paper into a round shape. Cut off the edges, wrap them in cling film, and send them off to the freezer to chill for about 15–20 minutes — you’ll be grating this part later for the crust edges.\nNow, place a wide-mouth bowl over the center of your rolled dough. Around the edges, spread chocolate and add sliced strawberries. Grate the chilled dough and add it over the strawberry edges to shape it. Brush the top with the reserved egg white. If you have slivered almonds, sprinkle them over — if not, no worries. Bake in a fully preheated fan oven at 170°C (340°F) for about 15–20 minutes.\nOnce completely cooled, dust with powdered sugar and serve.","note":"","tags":[],"_importId":14562},{"nome":"STRUDEL","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"160 gr di farina 00, 50 gr di acqua, 1 uovo intero, 1 cucchiaio di olio di semi di girasole, un pizzico di sale. \nOppure \nHo trovato anche\npasta tirata fatta con acqua(100ml )farina(300g) olio( 2 cucchiai), 1 uovo un cucchiaino di aceto e un pizzico sale\nEsubero 217\nFarina 200\nAcqua 50gr\n1 cucchiaio olio semi\n1 cucchiaio zucchero \n1 uovo\n1 pizzico sale\nIngredienti per il ripieno: \n5 mele (circa 800 gr), 4 cucchiai di zucchero, 50 gr di uvetta, 40 gr di pinoli, 3 cucchiai di rum, buccia grattugiata di 1 limone, 1 cucchiaino circa di cannella in polvere, 50 gr di burro fuso (da spalmare sulla pasta stesa), 80 gr di pan grattato, zucchero a velo per completare.\nProcedimento. \n\nPer il ripieno: \n\nsbucciare le mele e tagliarle a pezzettini piccoli. Mettere le mele in una ciotola e aggiungere zucchero, uvetta, buccia di limone grattugiata, rum e cannella. In una padella tostare, appena appena, i pinoli e aggiungerli alle mele solo dopo circa 30 minuti di marinatura. \n\nPer la pasta: \n\nadagiare in una ciotola la farina e il pizzico di sale, fare un buco al centro e aggiungere acqua, olio e uovo. Procedere dal centro inglobando man mano la farina e, quando i liquidi sono assorbiti, impastare con le mani, se necessario, aggiungendo un altro po’ di farina e formare una palla. Tagliare un pezzo adeguato di carta da forno, spolverata di farina, dove stendere la pasta (di circa 2 mm) con un mattarello cosparso farina, partendo sempre dal centro per realizzare un rettangolo piuttosto lungo e largo. Fondere il burro, lasciarlo raffreddare un po’ e pennellate tutta la superficie della pasta strudel per poi aggiungere una spolverata di pan grattato ( si può fare tostare in padella con qualche noce di burro). A questo punto, distribuire il ripieno di mele e altri ingredienti, lasciando circa 2 cm di bordo sui 4 lati: arrotolare lo strudel aiutandosi con la carta da forno. \n\nUna volta disposto in una teglia foderata di carta da forno, spennellarlo e con il restante burro fuso e cuocerlo in forno già ben caldo a 180° per circa 20/30 minuti, poi abbassare la temperatura a 170° e proseguire per altri 30 minuti. \n\nSfornare, raffreddare e servire lo strudel con una spolverata di zucchero a velo. \n\nCit: www. fassa .com","note":"","tags":[],"_importId":15088},{"nome":"STRUDEL CON PASTA MATTA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":160.0,"unit":"g","name":"farina00"},{"qty":1.0,"unit":"cucchiaio","name":"olio di semi"},{"qty":50.0,"unit":"g","name":"acqua tiepida"},{"qty":1.0,"unit":"n°","name":"pizz. di sale"},{"qty":90.0,"unit":"g","name":"uvetta","sezione":"Per il ripieno"},{"qty":40.0,"unit":"g","name":"pinoli","sezione":"Per il ripieno"},{"qty":1.0,"unit":"cucchiaio","name":"succo di limone","sezione":"Per il ripieno"},{"qty":1,"unit":"n°","name":"cucchiaino di cannella","sezione":"Per il ripieno"},{"qty":2.0,"unit":"n°","name":"o 3 cucchiai di zucchero.","sezione":"Per il ripieno"},{"qty":80.0,"unit":"g","name":"pane grattugiato e una noce di burro","sezione":"Per il ripieno"}],"procedimento":"In una ciotola versare la farina, aggiungere l'olio, il sale e l'acqua tiepida, mescolare un po' ma senza impastare. In una ciotola piccola sbattere leggermente l'uovo e aggiungerne metà al composto precedente (tenere da parte il restante uovo) e impastare fino ad ottenere un impasto liscio. Avvolgerlo in un pezzo di carta forno.\nFar bollire un po' d'acqua in un pentolino, buttare l'acqua e asciugare bene il pentolino, adagiarci l'impasto e coprire con il coperchio e far riposare un'oretta.\nNel frattempo mettere l'uvetta in ammollo in acqua o nel rum come preferite. Sbucciare  e affettare a piccoli pezzi le mele, metterle in una ciotola, irrorarle con il limone, aggiungere lo zucchero e l'uvetta ben strizzata e la cannella, mescolare bene. In una padella far tostare per qualche minuto i pinoli e aggiungerli alla farcia.\nLa pasta è più facile tirarla su una tovaglietta. Spolverare con un velo di farina e cominciare a tirare una sfoglia, la sfoglia è pronta a ricevere l'impasto quando si intravede il disegno della tovaglietta.\nFar tostare il pane grattugiato in una padella con un po' di burro, far sciogliere in un altro pentolino un po' di burro, spennellare la base della sfoglia con il burro e poi ricoprire con il pane grattugiato, versare la farcia stando attenti a non coprire i bordi.\nAiutandosi con la tovaglietta arrotolare lo strudel e adagiarlo sulla placca da forno.\nSpennellare con l'uovo rimasto e un po' di latte, bucherellare con una forchetta e infornare.\nPreriscaldare il forno a 180° e cuocere per 40 minuti.\nLasciar intiepidire se si vuole mangiare con una salsa alla vaniglia o con il gelato come mio nipote, oppure lasciar raffreddare che è buonissimo.","note":"","tags":[],"_importId":15111},{"nome":"STRUDEL DI MELE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"zucchero a velo","sezione":"PER IL RIPIENO"}],"procedimento":"Preparazione\nCome preparare lo Strudel di mele","note":"","tags":[],"_importId":1020},{"nome":"Strudel di mele che come dice l'autore: non è sfoglia","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Strudel di mele che come dice l'autore: non è sfoglia, non è frolla...ma è 'la pasta apposta '😁:\n250 g di farina \n2 cucchiai di olio di semi \n1pizzico di sale \n130 ml di acqua \n1 cucchiaino di zucchero \nL'impasto con pellicola si fa' riposare mezz'ora sotto una pentola che avrai riscaldato sul fuoco (non deve essere bollente...). Per rendere più elastico l'impasto.\n               Ripieno \n6 mele (possibilmente non succose...)\n2 manciate di noci \nCannella macinata a sentimento...\n2....3 cucchiai di zucchero \nBuccia grattugiata di 1 limone \n4 cucchiai di Pan grattato che si fa rosolare con un cucchiaio di zucchero in padella.\nStendere la pasta il più possibile chi è capace lo può fare da sotto con i polpastrelli.\nSi stende il pangrattato e si mettono le mele con tutto il resto.\nSi arrotola, si spennella con bevanda vegetale (io avena) o anche latte come un po' di zucchero di canna.\nIn forno statico 40 minuti circa a 170 gradi","note":"","tags":[],"_importId":15789},{"nome":"Strudel di mele- ricetta originale viennese","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":80.0,"unit":"ml","name":"acqua tiepida"}],"procedimento":"- 15 g olio di semi (mai prendere olio di oliva perché ha un sapore troppo forte, mentre l’olio di semi è neutrale nel sapore)\n- 150 g di farina \n- ½ cucchiaio di aceto o succo di limone\n- ca. 5 mele acidule\n- uva sultanina a piacere (io uso ca. 4 cucchiai)\n- 40 g burro\n- 80 g pane grattugiato\n- Cannella\n- Zucchero (ca. 3-4 cucchiai)\n- Burro fuso da spalmare (prima di infornare)","note":"","tags":[],"_importId":8191},{"nome":"Strudel di pasta tirata con fragole","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per la pasta tirata o pasta matta: 150 g di farina 60 ml di acqua tiepida ½ uovo 1 cucchiaino di olio 1 pizzico di sale ½ cucchiaino di aceto di vino bianco Olio per spennellare\nPer il ripieno: 800 g di fragole 60 g di biscotti tipo savoiardi o fette biscottate 30 g di mandorle tritate Il succo di 1/2 limone Zucchero (facoltativo) Olio per spennellare\nZucchero a velo per guarnire\nTempo di preparazione: 25 minuti Tempo di riposo: 30 minuti Tempo di cottura: 25 minuti a 180 gradi\nPer preparare lo strudel di pasta tirata con fragole iniziate preparando l’impasto. Mettete la farina in una ciotola e disponete a fontana. Inserite acqua, mezzo uovo, olio, sale e aceto bianco. Lavorate velocemente con le mani, poi trasferite sulla spianatoia ed impastate fino ad ottenere un impasto liscio ed elastico. Spennellate con olio, avvolgete con della pellicola e lasciate riposare per una mezz’oretta a temperatura ambiente. Nel frattempo preparate il ripieno. Tritate i savoiardi o le fette biscottate con il mixer e mescolate con le mandorle tritate. Lavate le fragole, togliete la parte verde e tagliatele in 4 spicchi. Mettete in una ciotola e mescolatele con il succo di limone. Se volete potete aggiungere dello zucchero, io non l’ho aggiunto in quanto ho utilizzato i savoiardi per la farcia, che sono già zuccherati. Trascorso il tempo di riposo dell’impasto, infarinate leggermente uno panno pulito e stendeteci la pasta matta con il mattarello. Per renderla sottilissima tiratela delicatamente con le mani, essendo molto elastica, difficilmente si spezza. Spennellate con il burro fuso. Distribuiteci biscotti e mandorle tritate e poi le fragole, avendo cura di lasciare liberi ca. 2-3 cm sul bordo dei due lati corti e su un lato lungo. Arrotolate lo strudel da quel lato lungo dove avrete distribuito la farcia di fragole fino al bordo. Unite l’impasto su ogni estremità come un fagottino e schiacciate per farlo aderire in modo da non fare fuoriuscire il ripieno. Trasferite su una teglia foderata con carta da forno. Spennellate con poco olio ed infornate a 180 gradi per 25-30 minuti. Servite il vostro strudel di pasta tirata con fragole spolverato con zucchero a velo. Ricetta by Julia","note":"","tags":[],"_importId":422},{"nome":"Strudel.....250 g di farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Strudel.....250 g di farina, 1 uovo, 2 cucchiai di olio semi, 50 ml circa di acqua, un pizzico di sale...escono 2 strudel\n  250 farina 1 uovo 1 cucchiaio di zucchero una noce di burro un pizzico di sale tutto nel robot e poi poco latte finché si forma la pallina. Riposare una mezz'ora poi stendere. Mele (se acquose cospargere con un pò di pangrattato) uvetta pinoli qualche cucchiaino di zucchero  cannella e qualche fiocchetto di burro. Avvolgere e sistemare nella teglia a ferro di cavallo. Spennellare con uovo. In forno 180/200° × 45 minuti circa (ognuno conosce il proprio forno). Ricetta della mia nonna......... buonissimo\nHo appena sfornato lo strudel per I miei amici di Bassano\nPasta dello strudel questa volta ho fatto con questi Ingr. \nPer 1 kilo di mele.\n200 gr di farina,75 ml di acqua ,50 gr di burro,un pizzico di sale.\nImpasto tutto e faccio una palla la metto vicino a una fonte di calore per mezz'ora.","note":"","tags":[],"_importId":11739},{"nome":"Sua maestà il pan di spagna( molto alto e senza","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Sua maestà il pan di spagna( molto alto e senza traccia di lievito!)........per ottenerlo poche semplici regole: innanzitutto  sappiate che per ogni uovo la regola vuole che ci vadano 30 gr. Zucchero e 30 gr. Farina ....nel mio caso mettete in planetaria 6 uova medie a temperatura ambiente e cominciate a montare aggiungendo,poco alla volta, 180 grammi di zucchero e buccia limone grattugiato..lasciate montare per 20 minuti a velocità media( l'aria inglobata durante questa fase funge da lievito!)... A quel punto staccate ciotola dalla planetaria e con l'aiuto di una marisa, aggiungete poco alla volta e mescolando molto delicatamente dal basso verso l'alto( per non smontare la massa) 180 gr. Farina 00 setacciando man mano che l'aggiungete...io qui ho utilizzato teglia dal fondo removibile da 20 cm. e alta 9 in cui ho messo sul fondo un disco di carta forno..in forno già caldo per 30 minuti( ma fate la prova stecchino dopo tale tempo) a 180 gradi...lasciate raffreddare in forno mettendo nello sportello una pallina di carta stagnola affinché lo stesso rimanga un poco aperto...","note":"","tags":[],"_importId":7929},{"nome":"Tacchino olio fagiolini pelati","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Tacchino olio fagiolini pelati\nPatata al microonde\nPassata con brie e cotto a pezzi\nPasta farina 00 semola(stessa quantità) uovo\nRiso nero \nPatata farina uovo","note":"","tags":[],"_importId":119},{"nome":"TAGLIATELLE DI FARINA DI CASTAGNE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":120.0,"unit":"g","name":"farina di castagne"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":150.0,"unit":"g","name":"pancetta"},{"qty":50.0,"unit":"g","name":"porro"},{"qty":100.0,"unit":"g","name":"pecorino stagionato"},{"qty":1.0,"unit":"bicchiere","name":"vino bianco secco"},{"qty":100.0,"unit":"g","name":"pancetta con porro e vino"},{"qty":50.0,"unit":"g","name":"fatta croccante in padella a parte"}],"procedimento":"Cotte le tagliatelle unire a porro e pancetta più pepe\nPoi nei piatti sopra metto pancetta croccante \nPESTO\nBasilico\nSale\nOlio\nParmigiano grattugiato \nPinoli","note":"","tags":[],"_importId":7205},{"nome":"Tante cose ho imparato da mia mamma questa è la prima","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":340.0,"unit":"g","name":"farina"},{"qty":150.0,"unit":"g","name":"zucchero"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":1.0,"unit":"bustina","name":"lievito x dolci"},{"qty":50.0,"unit":"ml","name":"olio di semi di girasole"}],"procedimento":"In una terrina mettere tutti gli ingredienti e lavorarli prima con una forchetta poi con le mani. Appena l’impasto si compatta metterlo su un tagliere e lavorarlo con le mani fini ad ottenere un panetto tondo e morbido. \nMettere il panetto su un foglio di carta fondo e con il palmo della mano schiacciare fino a formare un rettangolo (noi non usiamo il mattarello x questa preparazione) quando il rettangolo arriva alla dimensione giusta (2/3 millimetri) metto la marmellata d’uva (savor) (ma va bene anche con Nutella o altra marmellata . Aiutandosi con la carta arrotolare la pasta su se stessa. Con un pennello mettere un po’ di latte sulla superficie e un po’ di zucchero semolato. Infornare (io statico) a 170 gradi per 20 minuti (non deve essere troppo cotto). La cottura dipende dal forno di casa potrebbe cambiare. \nPer questa preparazione ho impiegato 10 minuti per l’impatto e la forma del bensone e 20 min @di cottura.","note":"","tags":[],"_importId":13215},{"nome":"Tatiana Daniela Torta di mele ❤️ 🥧","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina"},{"qty":5.0,"unit":"g","name":"lievito in polvere"},{"qty":5.0,"unit":"g","name":"vaniglia"},{"qty":80.0,"unit":"g","name":"zucchero a velo"},{"qty":75.0,"unit":"ml","name":"olio liquido"},{"qty":150.0,"unit":"g","name":"burro"},{"qty":75.0,"unit":"g","name":"yogurt"},{"qty":1.0,"unit":"n°","name":"uovo"}],"procedimento":"1 cucchiaino di cannella (l'ho aggiunto alla metà rimanente più tardi, non dimenticate 😬)\n4 grandi mele (cubo tagliato)\n5.6 gocce di succo di limone\n4 cucchiai di zucchero a velo\n1 cucchiaino di cannella in polvere\nSe vuoi puoi usare anche la noce Non l'ho aggiunto perché lo rende più scuro.\nMettete gli ingredienti necessari tranne la cannella, cuocete fino a quando le mele non si saranno scolate, aggiungete la cannella una volta raffreddata\nLa preparazione dell'impasto\nPrendete la farina in una ciotola da mescolare e formate una piscina al centro, aggiungete tutti gli ingredienti necessari e ottiene un impasto morbido, mettetelo in frigorifero, lasciate riposare per circa 15-20 minuti, alla fine dividete l'impasto in 2 pezzi uguali, aprite uno tra 2 fogli da forno, formalo come nel video, aggiungi sopra il sidro di mele.\nImpastare leggermente l'impasto rimasto, aprirlo in una forma non troppo densa né troppo sottile, e ottenere delle forme, aggiungerlo alle estremità della parte mela (Attenzione quando acquistate, è un impasto un po' delicato). Chi come me non ha l'elettrodomestico, congela l'impasto rimasto in frigorifero e grattugialo a cornice media, per cuocere, preriscalda completamente il forno a 170 gradi, media 15-20 minuti. cucinare in mezzo, dopo che si è completamente raffreddato, si può aggiungere lo zucchero a velo e servire, buon appetito 😋 ci vediamo, dai, me ne vado 🤗🙋🏻 ♀️","note":"","tags":[],"_importId":16178},{"nome":"TERZA E ULTIMA PROFEZIA DELLA VIRGINE FATIMA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"TERZA E ULTIMA PROFEZIA DELLA VIRGINE FATIMA - PRENDETEVI CONCIENZA. (Beata  Lucia):\n′′ Quando il mondo chiederà pace e sicurezza e rimpianti per tutto il male che ha fatto, l'improvvisa distruzione della nuova armagedon (Apocalisse) è arrivata e soffriranno \".\nQueste sono state le profezie della vergine di Fatima quando sono comparsi tre bambini nel 1917 e ha detto che in queste date del 2005 sarebbe finita.\nLucia aveva solo 10 anni quando avvennero le apparizioni, iniziate il 13 maggio 1917. Lucia e i suoi due cugini videro la Vergine Maria su un albero per un periodo di sei mesi.\nLa religiosa carmelita Lucia del Cuore Immacolato, ultima sopravvissuta dei tre bambini che hanno garantito di vedere la Vergine Maria nella località portoghese di Fatima, deceduta all'età di 97 anni febbraio 14, 2005. Morì nel convento di Coimbra dove viveva dal 1948.\nQuesto messaggio è stato letto da Papa Giovanni Paolo II che ha deciso di non rivelare questo segreto perché ha considerato che facendolo avrebbe portato al mondo panico e disperazione.\nOra viene rivelato un'altra parte di questo messaggio.\nNON PER CAUSARE IL PANICO, MA PERCHÉ SI CONSIDERA CHE LE PERSONE SONO GIÀ PREPARATE A CONOSCERLO E POSSONO PRENDERE CONCIENZA DI QUELLO CHE SI AVVICINA NELLE PROSSIME DATE.\nLa sorella Lucia ha diffuso il messaggio prima di tutto a Papa Giovanni Paolo II, che al termine di leggerlo stava tremando e ha deciso di non renderlo pubblico per paura della reazione.\nLa vergine ha detto testualmente a Lucia: ′′ Non aver paura, piccola mia. Sono la Madre del Cielo, che ti parla e ti chiede di rendere pubblico qu
