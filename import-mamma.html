crema e chiude il dolce con.le fette rimaste. Poi tutto in frigo, ben coperto dalla pellicola, meglio se dal giorno prima perché  si compatti perfettamente. Al momento del servizio  capovolgere la Zuppa Inglese sul piatto da portata. Io ho guarnito il dolce con il cuore di Ammira le  Marche\nUn doveroso ringraziamento all'amica blogger Natalia Cattelani, a cui mi sono ispirata seguendo i suoi insegnamenti...Anziana si, ma moderna e mi adeguo ai tempi come posso.","note":"","tags":[],"_importId":7870},{"nome":"• 1 uovo medio","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"uovo medio"},{"qty":180.0,"unit":"ml","name":"latte intero"},{"qty":130.0,"unit":"g","name":"zucchero semolato"},{"qty":250.0,"unit":"g","name":"farina manitoba"},{"qty":250.0,"unit":"g","name":"farina 00"},{"qty":8.0,"unit":"g","name":"lievito di birra"},{"qty":120.0,"unit":"g","name":"burro"}],"procedimento":"I bomboloni, o krapfen, sono dolci di origine austriaca, dal Trentino Alto Adige si sono diffusi in tutta la penisola. In ogni regione italiana hanno assunto delle caratteristiche diverse, soprattutto per quanto riguarda il ripieno e il nome con cui sono noti. Dalla Toscana alla riviera romagnola fino a Roma e Napoli li troviamo con la crema pasticcera, la marmellata oppure crema.\nI bomboloni nascono come dolci di Carnevale ma ormai si trovano tutto l'anno e fanno parte della colazione di molti di noi (con una frequenza che sconsigliamo quotidiana vista la carica calorica).\nChe si tratti di bombe, bomboloni o krapfen, la ricetta originale dei bomboloni prevede che siano fritti, in questo caso abbiamo preferito realizzarli al forno e lasciarli senza farcitura. Valutate voi con cosa arricchirli potete sempre optare per la crema pasticcera tradizionale oppure una crema pasticcera al cioccolato. Utilizzate una siringa per dolci , l'operazione di farcitura è molto semplice.\nCOME PREPARARE: BOMBOLONI AL FORNO\nIMAGES UP\n  CLEAR\n1\nseparatore\nPer preparare i bomboloni al forno, cominciate lavorando le uova con il latte e il lievito di birra. Aggiungete successivamente le farine (di manitoba e 00), lo zucchero e infine il burro.\nseparatore CLEAR CLEAR\nIMAGES UP\n  CLEAR\n2\nseparatore\nLasciate ora lievitare l'imposto nella ciotola, fino a quando sarà raddoppiato. Solo a quel punto stendete la pasta su una spianatoia di legno e ricavate dall'impasto 15 dischi da 8 cm con uno spessore di 1 cm.\nseparatore CLEAR CLEAR\nCLEAR\n3\nseparatore\nDisponete i bomboloni in una teglia rivestita di carta forno e lasciarli lievitare almeno altri 40/50 min. Infornare a 180° per circa 15 minuti.\nseparatore IMAGES RIGHT\n  CLEAR CLEAR\nCLEAR\n4\nseparatore\nQuando i bomboloni saranno cotti, sfornateli, spennellateli con del burro fuso e cospargerli di zucchero semolato.\nseparatore IMAGES RIGHT","note":"","tags":[],"_importId":253},{"nome":"• CLAFOUTIS AI MIRTILLI •","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"mirtilli freschi"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":100.0,"unit":"g","name":"zucchero di canna"},{"qty":100.0,"unit":"g","name":"farina 1"},{"qty":30.0,"unit":"g","name":"burro"},{"qty":300.0,"unit":"ml","name":"latte"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":null,"unit":"q.b.","name":"burro","sezione":"Per la teglia"},{"qty":null,"unit":"q.b.","name":"zucchero","sezione":"Per la teglia"}],"procedimento":"Procedimento:\n🫐\n- in una ciotola montate le uova con lo zucchero per 2/3 minuti, finché il composto è chiaro e spumoso \n- unite la farina setacciata e mescolate bene\n- versate il burro fuso, l’estratto di vaniglia, un pizzico di sale e mescolate ancora \n- unite il latte a filo e la scorza di limone, dovrete ottenere una pastella liscia e fluida\n- imburrate bene lo stampo e distribuite un cucchiaio abbondante di zucchero \n- disponete sul fondo dello stampo i mirtilli lavati e leggermente infarinati \n- versate la pastella sui mirtilli\n- fate cuocere a 170° modalità ventilato per circa 35 minuti o finché il clafoutis è dorato e ben cotto (fate la prova stecchino)\n- lasciate raffreddare leggermente e spolverate con zucchero a velo prima di servire\n\n** Alcuni accorgimenti per togliere il sapore di uova:\n- usate aromi come vaniglia, scorza di limone o liquore \n- assicuratevi che ci sia una buona quantità di frutta dolce e zucchero \n\n#silviaerosmarino #clafoutis #mirtilli #ricettefacili #ricettefacilieveloci #foodlovers #foodlover #cucinafacile #comfortfood #dessert #dolci","note":"","tags":[],"_importId":15963},{"nome":"● INGREDIENTI TORTA SOFFICE ALLA ZUCCA ●","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"4 uova 300 g di zucca grattugiata 220 g di zucchero 150 g di olio di girasole 100 g di amido di mais 300 g di farina 50 g di granella di mandorle 1 bustina di lievito (16g) zucchero a velo per decorare\nCOME FARE LA TORTA SOFFICE ALLA ZUCCA\nPrendiamo 300g di zucca già sbucciata e pulita e la grattugiamo completamente.\nIn una ciotola rompiamo 4 uova, frulliamo con uno sbattitore elettrico e nel frattempo aggiungiamo lo zucchero, l’olio di girasole, l’amido di mais, e solo metà della farina.\nA questo punto aggiungiamo la zucca grattugiata e la bustina di lievito, frulliamo ancora e poi aggiungiamo il resto della farina, per ultimo versiamo la granella di mandorle.\nIl nostro impasto per la torta soffice alla zuccaè pronto!\nUngiamo e infariniamo la teglia, io ne ho usato una da 28 cm di diametro, e ci versiamo l’impasto. Mettiamo in forno a 180° per 45 minuti (io uso il forno statico).\nSforniamo e lasciamo raffreddare, togliamo la torta dalla teglia e la sistemiamo su un piatto, ora passiamo alla decorazione con lo zucchero a velo.","note":"","tags":[],"_importId":1210},{"nome":"☺\"  Gnocchi alla Ricotta \" ☺ Dosi x 4/6 persone:","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"☺\"  Gnocchi alla Ricotta \" ☺ Dosi x 4/6 persone: Ingredienti :500 gr di ricotta, 2 uova, 200 gr di farina 00,farina di semola qb, 120 gr di formaggio grattuggiato, sale qb.Procedimento : Versa in una terrina, la ricotta, aggiungi il formaggio grattugiato e le uova( temperatura  ambiente),mescola aiutandoti con un cucchiaio di legno,poi aggiungi un pizzico di sale.Setaccia la farina e versala lentamente, amalgama tutto bene, forma un panetto morbido, poi trasferisci su un tavolo, spolverizzato con farina di semola. Forma ora dei salamini, poi aiutandoti con un coltello taglia a tocchetti piccoli ( la grandezza a piacere ). Con l'apposito attrezzo formate gli gnocchi, ( io ho usato una forchetta ) Ecco pronti x essere tuffati in acqua leggermente salata e conditi con salsa di gorgonzola.","note":"","tags":[],"_importId":14557},{"nome":"✨ POV: il byrek di mamma è sempre il più buono.","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"semola rimacinata"},{"qty":260.0,"unit":"ml","name":"acqua a temperatura ambiente"},{"qty":null,"unit":"g","name":"spinaci freschi"},{"qty":null,"unit":"q.b.","name":"olio di semi"}],"procedimento":"Procedimento \nIn una ciotola mescola la farina con l’acqua, aggiungi il sale e impasta con le mani fini ad ottenere un panetto morbido.\nLasciamo riposare per circa 15-20 minuti e poi dividilo in 8-10 piccoli panetti. \nStendi con il mattarello ogni panetto aiutandoti con dell’amido di mais e rispondi 4 o 5 sfoglie sulla base della teglia (irorando di olio tra una sfoglia e l’altra) aggiungi un mezzo gli spinaci lavati, tagliati e conditi con sale, pepe e olio.\nCopri con le altre 4-5 sfoglie, chiudi bene i bordi, spennella con olio la superficie e cuoci in forno statico a 200 gradi per circa 30-35 minuti.\n\nPiccolo trucco: una volta cotto, bucherella e aggiungi una spruzzata di acqua la byrek e cuoci altri 5 minuti. \n\n#byrek\n#byrekshqiptar\n#cucinaalbanese\n#ricettedifamiglia\n#cucinacasalinga\n#foodreelsitalia\n#ricettedelmomento","note":"","tags":[],"_importId":16108},{"nome":"✨ Vi lascio la mia ricetta del pane 100% semola siciliana ✨","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"semola siciliana 🌾"},{"qty":null,"unit":"q.b.","name":"acqua"}],"procedimento":"1 kg di semola o semola rimacinata con almeno 13 g di proteine (leggete bene l’etichetta)\n10 g lievito di birra fresco\n800 g acqua \n20 g sale\n5 g malto\nProcedimento:\nIl giorno precedente all’impastamento occorre preparare un prefermento con 300 g di semola (prelevati dalla ricetta), 210 g di acqua (70%) e 3 g di lievito. Mescolare fino a completo assorbimento, lasciare a temperatura ambiente per 90 minuti, quindi trasferire in frigorifero per 24 ore.\n\nIl giorno successivo preparare un’autolisi con la semola rimanente: in una ciotola unire la semola e 420 g di acqua, mescolare fino a completo assorbimento e lasciare riposare, coperto con un panno umido o con pellicola, per 1 ora.\n\nTrascorso il tempo, aggiungere al composto autolitico il prefermento, il restante lievito, il malto e una piccola parte di acqua. Quando l’impasto inizia a prendere struttura, unire il sale e, poco alla volta, la restante acqua a filo. L’impasto dovrà risultare ben incordato, liscio e omogeneo.\n\nTrasferirlo in un contenitore leggermente unto e lasciarlo lievitare fino a quasi il raddoppio (non esistono tempi precisi, ma conta l’aumento di volume). Una volta lievitato, stagliare le pezzature desiderate, dare una preforma in base alla forma desiderata e lasciarlo riposare per circa 30 minuti al caldo (in inverno forno spento con luce accesa)\n\nSuccessivamente, formare l’impasto e sistemarlo nei cestini di lievitazione (oppure in teglia foderata con un panno), quindi attendere il raddoppio. In alternativa, è possibile riporlo in frigorifero per 14–16 ore.\n\nAccendere il forno in modalità statica sopra/sotto a 250 °C, posizionando sul fondo un pentolino con acqua per creare vapore. Quando l’impasto sarà raddoppiato e il forno ben caldo, infornare:\n\n15 minuti a 250 °C con vapore;\npoi rimuovere il pentolino, abbassare a 225 °C e proseguire per altri 15 minuti;\ninfine completare la cottura a 200 °C fino a completa cottura. Il pane è cotto quando battendo nella base fa un suono “sordo”\n\nI tempi possono variare in base al forno.","note":"","tags":[],"_importId":14837},{"nome":"【Torta di Mele e Yogurt】","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1,"unit":"n°","name":"pizzico di sale fino"},{"qty":null,"unit":"q.b.","name":"cannella in polvere -"},{"qty":null,"unit":"q.b.","name":"zucchero integrale di canna"}],"procedimento":"Preriscaldare il forno a 180°c. \n\t\tSbucciare le mele e tagliarle a fettineIn una ciotola, mettere le fettine di mele e un po’ di succo di limone.\n\t\tScaldare il burro a bagnomaria, una volta fuso, lasciare raffreddare.\n\t\tIn una ciotola capiente, versare le uova e iniziare a sbattere, aggiungendo gradualmente lo zucchero.\n\t\tIn un’altra ciotola, mescolare farina, semi di lino in polvere, lievito e un pizzico di sale.\n\t\tAggiungere gradualmente gli ingredienti secchi, lo yogurt, la scorza di un limone e il burro fuso all’impasto, amalgamare bene.\n\t\tVersare la metà dell’impasto nella tortiera. \n\t\tMettere uno strato di fettine di mele. \n\t\tVersare l’altra metà dell’impasto.\n\t\tMettere il secondo strato di mele.\n\t\tSpolverizzare con lo zucchero di canna e la cannella in polvere.\n\t\tCuocere in forno preriscaldato a 180° per circa 45 minuti.\n\t\tSpolverizzare la torta con un po' di zucchero a velo :)","note":"","tags":[],"_importId":8565},{"nome":"𝑻𝒐𝒓𝒕𝒂 𝒅𝒊 𝒓𝒊𝒄𝒐𝒕𝒕𝒂 𝒆 𝒎𝒆𝒍𝒆 🍏","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"mele sbucciate"},{"qty":200.0,"unit":"g","name":"zucchero semolato"},{"qty":270.0,"unit":"g","name":"farina 00"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":250.0,"unit":"g","name":"ricotta fresca, ben sgocciolata"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":null,"unit":"q.b.","name":"granella di zucchero"},{"qty":null,"unit":"q.b.","name":"zucchero a velo"}],"procedimento":"Preparazione: \n1) Tagliare le mele a fettine, disporre le fettine in una ciotola e irrorare con il succo di limone, affinché non anneriscano. \n2) Mettere nel boccale qualche pezzetto di scorza di limone e lo zucchero: polverizzare 10 sec./vel. 8. Riunire sul fondo con la spatola. \n3) Aggiungere la farina, le uova, la ricotta e mescolare: 30 sec./vel. 5. \n4) Unire il lievito, mescolare: 10 sec./vel. 4. \n5) Trasferire l’impasto in una tortiera da 22 cm con fondo apribile rivestita con carta forno, oppure burro e farina. Sistemarvi le fettine di mela affossandole nell’impasto. A piacere cospargere la superficie con granella di zucchero. \n6) Cuocere in forno caldo (preriscaldato) a 180 gradi per 30/35 minuti. Fare la prova stecchino per verificare la cottura. \n7) Sfornare, lasciate intiepidire prima di servire. Cospargere con zucchero a velo.","note":"","tags":[],"_importId":7900},{"nome":"🌅 **Torta del Mattino a Basso Indice Glicemico**🌅","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"4️⃣ Aggiungi mirtilli, miele, olio di cocco e mescola fino a ottenere un composto umido.\n5️⃣ Versa nello stampo e livella.\n6️⃣ Inforna per 25-30 minuti, finché è dorata e asciutta.\n7️⃣ Lascia raffreddare, taglia a fette… e goditi la colazione! 😋\n---\n💡 **Consigli e varianti**\n🥄 Vegana? Sostituisci l’uovo con 1 cucchiaio di semi di lino + 3 cucchiai d’acqua.\n🍁 Niente miele? Vai di sciroppo d’agave o d’acero.\n🌱 Aggiungi semi di chia o zenzero per una marcia in più.\n---\n🌿 **I benefici a colazione**\n✔ **Fibre** per la sazietà e la digestione\n✔ **Antiossidanti** grazie ai mirtilli rossi\n✔ **Grassi buoni** e proteine dalle mandorle\n✔ **Zero farine raffinate** = leggerezza e benessere\n---\n🧊 **Conservazione**\n📦 In contenitore ermetico: 3-4 giorni\n❄️ A fette in freezer: sempre pronta all’uso!\n---\n☀️ **Un dolce semplice, sano e adatto a tutti**\nPerfetta per adulti e bambini, questa torta ti accompagna dalla colazione allo spuntino… con gusto e leggerezza!","note":"","tags":[],"_importId":15197},{"nome":"🌿 Farinata alle Verdure 🥄","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina di ceci"},{"qty":750.0,"unit":"ml","name":"acqua"},{"qty":4.0,"unit":"cucchiaio","name":"olio extravergine d’oliva + extra per ungere"},{"qty":1.0,"unit":"n°","name":"zucchina piccola"},{"qty":1.0,"unit":"n°","name":"peperone rosso"},{"qty":1.0,"unit":"n°","name":"cipolla rossa"},{"qty":null,"unit":"q.b.","name":"sale"},{"qty":null,"unit":"q.b.","name":"pepe nero"}],"procedimento":"Versa la farina di ceci in una ciotola e unisci l’acqua poco per volta, mescolando con una frusta per eliminare i grumi. Aggiungi sale e 2 cucchiai di olio. Lascia riposare coperto per almeno 2 ore.\nCuoci le verdure:\nTaglia a dadini la zucchina e il peperone, affetta la cipolla. Rosolale in padella con 2 cucchiai di olio per 5-7 minuti. Sala e pepa a piacere.\nAssembla la farinata:\nUngi una teglia ampia, versa la pastella e distribuisci le verdure in superficie. Se vuoi, aggiungi rosmarino.\nCuoci:\nInforna in forno caldo a 220°C per 30-35 minuti, finché sarà dorata e con bordi croccanti.\nServi:\nFai raffreddare leggermente, taglia a fette e gusta calda o a temperatura ambiente!\n⏱ Tempo di preparazione: 15 minuti + 2 ore di riposo\n🔥 Kcal per porzione (circa): 210","note":"","tags":[],"_importId":14886},{"nome":"🍋 Gelo di Limone Siciliano 🍋","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"ml","name":"acqua"},{"qty":150.0,"unit":"ml","name":"succo di limone fresco"},{"qty":150.0,"unit":"g","name":"zucchero"},{"qty":50.0,"unit":"g","name":"amido di mais"}],"procedimento":"Istruzioni:\n\nIn un pentolino, versa l'amido di mais setacciato e aggiungi lo zucchero.\n\nVersa lentamente l'acqua mescolando con una frusta per evitare grumi.\n\nAggiungi il succo di limone filtrato e la scorza grattugiata.\n\nPorta il composto a fuoco medio, mescolando continuamente finché si addensa (circa 5-7 minuti).\n\nQuando il gelo sarà denso e traslucido, spegni il fuoco.\n\nVersa il composto in coppette o stampini e lascia raffreddare a temperatura ambiente.\n\nRiponi in frigorifero per almeno 4 ore.\n\nServi ben freddo, decorando con scorza di limone o foglioline di menta.\n\n⏱ Tempo di preparazione: 15 minuti (+ raffreddamento)\n🔥 Kcal a porzione: circa 130\n\n#RicettaFacile #DolciSiciliani #GeloDiLimone #DessertLeggero #EstateInCucina #FattoInCasa","note":"","tags":[],"_importId":14513},{"nome":"🍋 🍋 🍋","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Semplice basterà lessare i limoni per preparare un elisir dalle mille proprietà benefiche e curative.\nPreparala già da questa sera e prova da domani a sorseggiarla prima di colazione.\nMetti in una pentola 3 limoni tagliati a metà in 600 ml di acqua e lasciar bollire per circa 3 minuti. Dopo che il composto si sarà raffreddato rimuovere i limoni e sorseggiarne a stomaco vuoto una tazza ogni mattina.\nLe dosi indicate sono sufficienti per 2/3 giorni, e il preparato può essere conservato in frigo e consumato freddo o scaldato nuovamente prima di essere assunto.\nSe lo gradisci dolce aggiungi un cucchiaino di miele.\nEcco i benefici di questa bevanda naturale a base di limone:\n– rinforza il sistema immunitario e prevenire così raffreddori e influenza,\n– favorisce il processo digestivo e stimola il metabolismo\n– bilancia il PH dell’organismo\n– favorisce la perdita di peso\n– libera l’organismo dalle tossine\n– rinfresca l’alito\n– aiuta il processo di guarigione negli stati di convalescenza\n– Idrata e mantiene la pelle giovane","note":"","tags":[],"_importId":1070},{"nome":"🍎 Torta di Mele con Pasta Fillo 🍎","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"👉 Per tortiera 22/24 cm: 1 rotolo intero di fillo + 2 mele, 3 uova, 100ml di latte 50 g di burro \n👉 Varianti:\n• aggiungi alle mele pinoli e/o uvetta per una versione più ricca\n• aggiungi qualche cucchiaio di crema pasticciera tra gli strati per una torta più golosa\n• oppure realizza delle monoporzioni usando stampini piccoli o da muffin: vengono perfette e super croccanti ✨\nPROCEDIMENTO\n1️⃣ Prepara le mele\nAffetta sottilmente una mela.\nAggiungi 1 cucchiaio di Zefiro Eridania + cannella.\nMescola con le mani: deve diventare un profumo meraviglioso.\n(Qui puoi aggiungere pinoli e uvetta se li ami.)\n2️⃣ Base liquida\nSbatti uova + latte + burro fuso in una ciotola.\n3️⃣ Prepara la fillo\nTaglia mezzo rotolo di pasta fillo a striscioline e poi separale con le mani.\n4️⃣ Assembla\nImburra e zucchera bene la teglia con Eridania.\nStrato di fillo → strato di mele → ancora fillo.\n(Se vuoi, aggiungi qualche cucchiaio di crema pasticciera tra gli strati.)\n5️⃣ Versa il composto\nDistribuisci il mix di uova, latte e burro su tutta la superficie.\n6️⃣ Cuoci\nForno a 180°C statico per 25–30 minuti, finché è dorata e croccante.\n7️⃣ Finitura\nLascia raffreddare bene e spolvera con Zefiro A Velo Eridania.\n \n✨ Leggera, croccante, profumata.\nUna torta di mele diversa dal solito, facilissima e che fa gola solo a guardarla.\n \n\nPost in collaborazione con @eridaniaitalia \n#EridaniaItalia #eridania #PastaFillo #PastaFilloLovers #TortaDiMele #DolciFacili #Ricette #FoodCreatorItalia #DolciFattiInCasa #IGFoodItalia #zucchero #zuccheroavelo #pastafillo #tortafattaincasa #applecake #zefiroeridania #ricettafacile","note":"","tags":[],"_importId":15983},{"nome":"🍕 Impasto Bonci per Pizza in Teglia","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"#PizzaBonci #PizzaInTeglia #ImpastoPerfetto #RicetteItaliane #PizzaLovers #PizzaTime #FattoInCasa","note":"","tags":[],"_importId":14872},{"nome":"🍞 Inauguriamo una nuova","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":". di farina"},{"qty":200.0,"unit":"g","name":". di zucchero"},{"qty":100.0,"unit":"g","name":". di burro o 80 gr olio"},{"qty":1.0,"unit":"n°","name":"limone"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":500.0,"unit":"g","name":". di ricotta"},{"qty":100.0,"unit":"g","name":". di zucchero a velo"},{"qty":3.0,"unit":"n°","name":"tuorli d’uovo"},{"qty":50.0,"unit":"g","name":". di frutti canditi tritati"},{"qty":50.0,"unit":"g","name":". di pinoli"}],"procedimento":"Procedimento:\n1. Disponete a fontana farina, zucchero, sale, lievito e la buccia grattugiata di un limone.\n\n2. Dopo averli mescolati insieme, aggiungete le uova e il burro ammorbidito ed impastate fino ad ottenere un composto ben solido.\n\n3. Mescolate a parte in una terrina la ricotta, lo zucchero a velo, i canditi tritati, e i pinoli,  legando il tutto con i tuorli delle uova.\n\n4. Foderate con la pasta una teglia rotonda imburrata ed infarinata, avendo cura di rialzare bene tutt’intorno i bordi della pasta.\n\n5. Riempite poi con il composto a base di ricotta, livellandone bene la superficie.\n\n6. Mettete la torta nel forno già caldo, a calore moderato, per circa mezz’ora o tre quarti d’ora  fino a quando il composto di ricotta sarà ben solido e la superficie dorata. Lasciate raffreddare la torta e servite.","note":"","tags":[],"_importId":14973},{"nome":"🍧🍓GELATO ALLA FRAGOLA🍓🍧","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"fragole"},{"qty":130.0,"unit":"g","name":"banana"},{"qty":35.0,"unit":"g","name":"zucchero a velo"},{"qty":70.0,"unit":"g","name":"latte"}],"procedimento":"✅Tagliare in piccoli pezzi fragola e banana e falli congelare in freezer\n✅metti tutti gli ingredienti ne frullatore\nIn pochi minuti un gustosissimo gelato🍓🍓\n#gelatofattoincasa #gelatoallafragola #gelato #gelatosenzagelatiera","note":"","tags":[],"_importId":14494},{"nome":"🍪 Biscotti alla Zucca: Deliziosi e Profumati! 🎃","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":150.0,"unit":"g","name":"zucca","sezione":"Per i biscotti"},{"qty":1.0,"unit":"n°","name":"uovo","sezione":"Per i biscotti"},{"qty":30.0,"unit":"ml","name":"olio di semi","sezione":"Per i biscotti"},{"qty":90.0,"unit":"g","name":"zucchero semolato","sezione":"Per i biscotti"},{"qty":250.0,"unit":"g","name":"farina 00","sezione":"Per i biscotti"},{"qty":0.5,"unit":"n°","name":"bustina di lievito in polvere per dolci","sezione":"Per i biscotti"}],"procedimento":"Preparazione:\n\n1. Preparare la Zucca:\n- Cuoci la zucca a vapore o lessala fino a renderla tenera. Scolala bene e frullala fino a ottenere una purea liscia.\n\n2. Mescolare gli Ingredienti:\n- In una ciotola, sbatti l'uovo con lo zucchero semolato fino a ottenere un composto spumoso.\n- Aggiungi l'olio di semi e la purea di zucca, mescolando bene per amalgamare gli ingredienti.\n\n3. Aggiungere gli Ingredienti Secchi:\n- Setaccia la farina e il lievito in polvere nella ciotola e mescola delicatamente fino a ottenere un impasto omogeneo.\n\n4. Formare i Biscotti:\n- Prepara una teglia rivestita di carta da forno. Con l'aiuto di due cucchiai, forma delle palline di impasto e posizionale sulla teglia, lasciando spazio tra di esse.\n- Spolvera la superficie dei biscotti con zucchero di canna.\n\n5. Cuocere:\n- Inforna in forno preriscaldato a 180°C per circa 15-20 minuti, o fino a quando i biscotti saranno leggermente dorati.\n\n6. Decorare:\n- Una volta raffreddati, spolvera i biscotti con zucchero a velo prima di servire.\n\n---\n\n🍽️ Buon Appetito!\nQuesti biscotti alla zucca sono un vero piacere autunnale! Morbidi e profumati, conquisteranno tutti! 🌟✨","note":"","tags":[],"_importId":13137},{"nome":"🍪 Biscotti alle Mandorle e Cioccolato Fondente 🍫","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":120.0,"unit":"g","name":"mandorle tostate e tritate 🌰"},{"qty":120.0,"unit":"g","name":"farina 00 🌾"},{"qty":100.0,"unit":"g","name":"zucchero 🍚"},{"qty":50.0,"unit":"g","name":"cioccolato fondente"},{"qty":1.0,"unit":"n°","name":"puntina di bicarbonato ✨"},{"qty":1.0,"unit":"cucchiaino","name":"cannella 🍂"},{"qty":10.0,"unit":"g","name":"cacao amaro 🍫"}],"procedimento":"1. In una ciotola capiente, mescola:\n- La farina,\n- Lo zucchero,\n- Il cacao amaro,\n- Il bicarbonato,\n- La cannella,\n- Le mandorle tritate,\n- Il cioccolato fondente,\n- Le bucce grattugiate di arancia e limone.\n---\n2️⃣ Impasta con acqua tiepida\n1. Aggiungi poco alla volta acqua tiepida, mescolando con una spatola o a mano, fino a ottenere un impasto compatto e modellabile.\n2. Forma una palla e lasciala riposare per 10-15 minuti.\n---\n3️⃣ Forma i biscotti\n1. Preleva piccole porzioni di impasto e forma delle palline o dei biscotti della forma desiderata.\n2. Disponili su una teglia foderata con carta da forno, lasciando un po’ di spazio tra un biscotto e l’altro.\n---\n4️⃣ Cuoci in forno\n1. Preriscalda il forno a 180°C.\n2. Cuoci i biscotti per circa 12-15 minuti, finché risultano leggermente dorati.\n---\n5️⃣ Finitura con zucchero a velo\n1. Una volta sfornati, lasciali raffreddare completamente su una gratella.\n2. Spolverali con zucchero a velo per un tocco finale.\n---\n✨ Consigli Extra\n- Varianti: Puoi aggiungere un pizzico di zenzero in polvere per un aroma più speziato.\n- Conservazione: Tienili in una scatola di latta o in un contenitore ermetico; si mantengono fragranti per diversi giorni.\n- Idea regalo: Confezionali in sacchetti trasparenti con un nastro decorativo per un dolce regalo fatto in casa.\n---\nBuona preparazione e buon appetito! 🍪🍫🍊","note":"","tags":[],"_importId":13335},{"nome":"🍰 Torta di Ricotta 🍰","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":700.0,"unit":"g","name":"ricotta"},{"qty":240.0,"unit":"g","name":"yogurt"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":50.0,"unit":"g","name":"burro fuso"},{"qty":150.0,"unit":"g","name":"zucchero"},{"qty":0.25,"unit":"cucchiaino","name":"sale"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"},{"qty":80.0,"unit":"g","name":"semolino o farina"}],"procedimento":"1. Preriscalda il forno a 180°C e prepara una teglia quadrata da 21x21 cm, ungendola con il burro fuso e cospargendola con il semolino o la farina. Questo aiuterà a prevenire che la torta si attacchi alla teglia durante la cottura.\n2. In una ciotola grande, mescola la ricotta con lo yogurt fino a ottenere un composto liscio e omogeneo.\n3. Aggiungi le uova una alla volta, continuando a mescolare dopo ogni aggiunta.\n4. Aggiungi il burro fuso, lo zucchero, il sale e l'estratto di vaniglia al composto di ricotta e mescola bene.\n5. Aggiungi il semolino o la farina e mescola fino a incorporare completamente gli ingredienti.\n6. Versa l'impasto nella teglia preparata e livella la superficie con una spatola.\n7. Inforna la torta nel forno preriscaldato e cuoci per circa 35 minuti, o fino a quando risulta dorata e uno stecchino inserito al centro esce pulito.\n8. Una volta cotta, lascia raffreddare la torta nella teglia per alcuni minuti, poi trasferiscila su una griglia per raffreddare completamente.\n9. Una volta raffreddata, taglia la torta di ricotta in quadrati e servila come dessert delizioso.\nPreparati a gustare ogni boccone di questa deliziosa Torta di Ricotta, perfetta per condividere momenti di dolcezza con famiglia e amici. Buon Appetito! 🍰😋✨","note":"","tags":[],"_importId":12605},{"nome":"🎭 Torta Russa di Verona – Dolce Tipico Veneto 🇮🇹","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"rotolo di pasta sfoglia rotonda 🌀"},{"qty":100.0,"unit":"g","name":"mandorle 🌰"},{"qty":30.0,"unit":"g","name":"zucchero"},{"qty":120.0,"unit":"g","name":"amaretti 🍪"},{"qty":3.0,"unit":"n°","name":"uova 🥚"},{"qty":90.0,"unit":"g","name":"zucchero"},{"qty":100.0,"unit":"g","name":"burro fuso 🧈"},{"qty":150.0,"unit":"g","name":"farina 00 🌾"},{"qty":8.0,"unit":"g","name":"lievito per dolci"},{"qty":1.0,"unit":"cucchiaio","name":"liquore all’amaretto o rum 🍷"},{"qty":1,"unit":"n°","name":"pizzico di sale 🧂"}],"procedimento":"1️⃣ Trita le mandorle con 30 g di zucchero fino a ottenere una farina grossolana.\n2️⃣ Sbriciola gli amaretti e mettili da parte.\n3️⃣ In una ciotola, monta le uova con 90 g di zucchero finché diventano spumose.\n4️⃣ Aggiungi il burro fuso, il liquore, il pizzico di sale, poi unisci le mandorle, gli amaretti, la farina e il lievito.\n5️⃣ Srotola la pasta sfoglia in una tortiera da 24 cm con carta forno. Versa il composto all’interno.\n6️⃣ Ripiega leggermente i bordi verso il centro per ottenere l'effetto “a turbante”.\n7️⃣ Cuoci in forno statico preriscaldato a 180°C per 40-45 minuti.\n8️⃣ Lascia raffreddare e spolvera con zucchero a velo. Pronta per essere gustata! 😍\n💡 Consigli\n✨ Ottima anche il giorno dopo: i sapori si intensificano!\n✨ Provala tiepida con un cucchiaio di crema o gelato alla vaniglia 🍦\n✨ Per una versione senza alcol, sostituisci il liquore con latte o succo d’arancia.\n🔖 Hashtag per i social:\n#TortaRussa #DolceVeneto #GirodItalia #Amaretti #DolciItaliani #CucinaTradizionale #TortaRipiena #RicetteRegionali #TortaVeronese #GiroDolceItalia","note":"","tags":[],"_importId":15154},{"nome":"👩🏻‍🍳TORTA AL VINO ROSSO 🥮🍷","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"🔴PREPARARE LA TORTA\nTritare il cioccolato fondente e scioglierlo al microonde o a bagno maria, poi lasciarlo intiepidire. \nCon l’aiuto di fruste elettriche, sbattere per almeno 10 minuti il burro morbido come una crema con lo zucchero fino ad ottenere un composto chiaro, gonfio e spumoso. \nNel frattempo, accendere il forno in funzione statica a 150° C e imburrare e cospargere di cacao uno stampo per bundt cake oppure uno con cerchio apribile del diametro di 24 cm.\nUnire il miele al composto di burro e zucchero, poi aggiungere le uova una alla volta. Sbattere per altri 5 minuti, dopodiché unire il vino rosso poco alla volta e il sale. Aggiungere quindi anche il cioccolato fuso.\nSpegnere lo sbattitore elettrico.\nSetacciare assieme la farina con il lievito, il cacao in polvere e le spezie e unirle al composto amalgamandole servendosi di un lecca pentola.\nVersare il composto nello stampo, livellare ed infornare la torta in forno statico preriscaldato a 150° per circa 70 minuti. Fare la prova stecchino per verificare che sia asciutto; dopodiché, sfornare e lasciarla intiepidire. \nDopo averla sfornata, far raffreddare 10 minuti e poi sformare su di una gratella e lasciarla raffreddare completamente.\n🔵 PREPARARE LA GLASSA\nPassare al setaccio lo zucchero a velo e il cacao in polvere e porli in una ciotola; far bollire il vino rosso ed aggiungerlo alle polveri mescolando fino ad ottenere una glassa liscia e lucida e versarla in una caraffa.\n🟢GLASSARE LA TORTA\nPorre sotto alla gratella dove è appoggiata la torta un foglio di carta forno per raccogliere la glassa che colerà; ricoprire la torta di glassa al cacao e vino versandola con un cucchiaino per distribuirla a nostro piacimento\nFar indurire la glassa. \nDisporre i frutti di bosco e la TORTA AL VINO ROSSO è pronta per essere servita‼️","note":"","tags":[],"_importId":8083},{"nome":"👩🏻‍🍳”PIZZA DOLCE” ABRUZZESE🎂🍾🥂","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":6.0,"unit":"n°","name":"uova"},{"qty":180.0,"unit":"g","name":"zucchero semolato"},{"qty":180.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"n°","name":"limone bio buccia grattugiata"},{"qty":1.0,"unit":"bustina","name":"vanillina"},{"qty":500.0,"unit":"ml","name":"latte intero"},{"qty":4.0,"unit":"n°","name":"tuorli d’uovo"},{"qty":4.0,"unit":"cucchiaio","name":"rasi zucchero"},{"qty":4.0,"unit":"cucchiaio","name":"rasi farina 00"},{"qty":1.0,"unit":"n°","name":"stecca di cannella"},{"qty":500.0,"unit":"ml","name":"latte intero"},{"qty":200.0,"unit":"g","name":"cioccolato fondente"},{"qty":120.0,"unit":"g","name":"zucchero semolato"},{"qty":50.0,"unit":"g","name":"farina 00"},{"qty":300.0,"unit":"g","name":"mandorle spellate, tostate e macinate"},{"qty":280.0,"unit":"g","name":"zucchero semolato"},{"qty":150.0,"unit":"n°","name":"acqua"},{"qty":1.0,"unit":"n°","name":"albume"},{"qty":200.0,"unit":"g","name":"zucchero"},{"qty":100.0,"unit":"g","name":"mandorle spellate, affettate e tostate"}],"procedimento":"Con uno sbattitore elettrico montare le uova a temperatura ambiente con lo zucchero per almeno 20/30 min, finché il composto non sarà gonfio e spumoso. Dopo 10 minuti aggiungere il limone e la vanillina senza fermare le fruste.\nAppena l'impasto sarà pronto, proseguire a mano. Aggiungere la farina precedentemente setacciata 1 cucchiaio alla volta e incorporarla con l’aiuto di una spatola con movimenti dal basso verso l’alto per non far smontare le uova.\nVersare il composto nella tortiera imburrata e infarinata, senza sbattere, né sbattere per livellarlo e nemmeno pareggiarlo con una spatola❗️\nInfornare ad una temperatura che va dai 160° ai 170° per 40/50 min. Non aprire il forno prima dei 30 min, altrimenti si sgonfierà❗️\nUna volta cotto, tirarlo fuori dal forno e, appena diventerà tiepido, toglierlo dallo stampo e farlo raffreddare su una gratella.\n🟡CREMA PASTICCIERA\nPortare ad ebollizione il latte con la buccia di limone e la stecca di cannella.\nIntanto, in una ciotola, con l’aiuto di una frusta a mano, sbattere i tuorli con lo zucchero e aggiungere poi la farina.\nQuando il latte bollirà aggiungerlo a filo all’impasto cremoso, fino ad ottenere un fluido \nliscio. Rimettere sul fuoco e nel giro di due minuti la crema si addenserà. Versarla in una ciotola, coprire con la pellicola a contatto e far raffreddare.\n🟤CREMA AL CIOCCOLATO\nPortare a bollore il latte con lo zucchero. \nIntanto, tagliare il cioccolato fondente a pezzetti e, quando il latte sarà caldo, aggiungerlo. Versare a filo alla farina setacciata e mescolare per evitare il formarsi di grumi. Riportare sul fuoco e addensare per pochi minuti. Versarla in una ciotola, coprire con la pellicola a contatto e far raffreddare.\n🟠 CREMA DI MANDORLE \nPortare ad ebollizione acqua e zucchero ed aggiungere un po’ alla volta 300 gr di mandorle spellate e tritate. Continuate a rimestare spegnendo il fuoco. Il composto deve avere la consistenza di una crema che avrà un colore grigio/beige. Versarla in una ciotola, coprire con la pellicola a contatto e far raffreddare.\n⚪️GHIACCIA REALE \nPrepararla appena prima di utilizzarla❗️\nAggiungere all’albume il succo di limone e schiumare il composto per qualche secondo con una frusta elettrica. Aggiungere lo zucchero e montare con le fruste elettriche per qualche secondo fino a compattare.\n🔴ASSEMBLAGGIO E DECORAZIONE\nTagliare in 4 dischi uguali il pan di Spagna preparato il giorno precedente.\nPreparare le 3 bagne, versando ciascun liquore in una ciotolina e allungandoli con acqua in modo da regolarne a piacere il grado alcolico.\nVersare ciascuna delle tre creme in una sac à poche. \nDisporre il primo disco di pan di Spagna sul piatto da portata e circondarlo con un anello apribile per far sì che la torta venga perfetta.\nCon l’aiuto di un pennello da cucina, bagnare il primo disco con la bagna a base di Caffè Sport Borghetti. \nAggiungere la crema al cioccolato. Livellare con una spatola. \nSovrapporre il secondo disco. Bagnare con alchermes. Disporre la crema di mandorle. \nSovrapporre il terzo disco. Bagnare don Anisetta. Aggiungere la crema pasticciera.\nBagnare con alchermes la parte interna dell’ultimo disco prima di sovrapporlo a contatto con la crema. \nBagnare esternamente con anisetta. Coprire con la pellicola e riporre a riposare la torta in frigo per almeno 12 ore. \nPreparare la ghiaccia reale.\nTirare la torta fuori dal frigo, liberarla dall’anello e ricoprirla delicatamente con la glassa bianca.\nFar aderire tutt’intorno le scaglie di mandorle tostate.\nDecorare la parte superiore con zuccherini o codette colorate o con scritte.\nLa pizza dolce è pronta per essere gustata‼️","note":"","tags":[],"_importId":8134},{"nome":"😇😇 SAN FRANCESCO e i 🍪MOSTACCIOLI : i biscotti che gli","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"200g di farina - 200g di mandorle pelate - 150g di miele - 2 albumi - 1 arancia - Mosto d’uva cotto - 1 noce di burro - 1 pizzico di lievito in polvere - Pepe nero - Cannella - Sale\n👩‍🍳🧑🏼‍🍳Preparazione\nAmalgamare il miele con le mandorle tritate, la scorza grattugiata dell’arancia, il burro e mezzo cucchiaino di cannella e pepe. Unire, quindi, la farina, il sale, il lievito e il mosto ad ottenere un composto consistente. Stendere l’impasto con il mattarello, non troppo spesso, e tagliarlo a rombi. Disporre i dolcetti su una placca oleata e cuocere in forno caldo per 15 minuti. Servire freddi, ricoperti di miele o mosto.\n😇😇😇😇😇😇😇STORIA\nFrancesco nasce ad Assisi nell'inverno del 1182 da una delle famiglie più agiate della città. La sua fanciullezza trascorse serenamente e potè studiare il latino, il volgare, il provenzale e la musica; le sue note, insieme alle sue poesie, furono sempre apprezzate nelle feste della città. Il padre commerciante di spezie e stoffe, desideroso di coinvolgerlo nell'attività di famiglia, lo educò per tale arte. Ma l'episodio che iniziò a trasformare l'esistenza di Francesco gli accadde all'età di vent'anni, quando partecipando alla guerra tra Assisi e Perugia fu catturato.\nLa prigionia e gli stenti plasmarono il suo animo e più il corpo si indeboliva, più cominciava a subentrare in lui il senso della carità e del bene verso gli altri. Grandissimo il patrimonio spirituale che il \"fraticello\" ha lasciato per illuminare il cammino di molti.\nSi racconta che Jacopa de' Settesoli, nobildonna romana, nata nella Città Eterna nel 1190 in seno ad una illustre famiglia residente a Trastevere. Si era sposata con un ricco signore di Roma, tale Graziano Frangipane e con lui aveva avuto due figli. Rimasta vedova presto, a soli 27 anni, era stata costretta a diventare l'amministratrice delle molte proprietà del marito fra cui la cittadina di Marino. Due anni dopo, nel 1219, san Francesco arrivò a Roma per predicare e Donna Jacopa lo conobbe, diventando da quel momento una sua fedele seguace e una sua ottima guida per le vie dell'Urbe. Da allora, Jacopa de' Settesoli si convertì nella più valida collaboratrice del neonato movimento francescano nella città dei Papi e anche delle Clarisse.\nFu lei ad ottenere dai Benedettini di San Cosimato in Trastevere la cessione dell'ospedale di San Biagio, che divenne il primo luogo romano dei Minori. Jacopa de' Settesoli era talmente attiva e risoluta, da indurre Francesco a chiamarla affettuosamente Frata Jacopa. La loro amicizia durò fino alla morte del santo, avvenuta la notte fra il 3 e il 4 ottobre del 1226. \nFu proprio durante quel suo primo soggiorno romano che Francesco assaggiò quello che sarebbe diventato il suo perenne \"peccato di gola\": certi biscotti “boni e profumosi”, diceva il santo, che la stessa Jacopa de' Settesoli preparava e che gli offrì un giorno a casa sua.\nTipici del periodo della vendemmia, erano fatti con la pasta di pane, miele, mandorle e mosto d'uva e detti forse per quest'ultimo ingrediente \"mostaccioli\": ma già nella Roma antica si conoscevano dei biscotti simili con il nome di \"mortarioli\", a base di miele e mandorle pestate nel mortaio.\nQuei  mostaccioli di Frata Jacopa de' Settesoli piacevano talmente tanto a san Francesco da desiderarli anche in punto di morte! Quando Francesco sentì avvicinarsi la sua ultima ora, volle dettare ad un frate una lettera alla sua cara amica Frata Jacopa, per informarla della sua morte imminente e chiedendole di raggiungerlo alla Porziuncola, portandogli una veste per la sepoltura e candele per il funerale e...quei dolci:\n“A donna Jacopa, serva dell'Altissimo, frate Francesco, poverello di Cristo, augura salute nel Signore e comunione nello Spirito Santo. Sappi, carissima, che il Signore benedetto mi ha fatto la grazia di rivelarmi che è ormai prossima la fine della mia vita. Perciò, se vuoi trovarmi ancora vivo, appena ricevuta questa lettera, affrettati a venire a Santa Maria degli Angeli. Poiché se giungerai più tardi di sabato, non mi potrai vedere vivo. E porta con te un panno di colore cenerino per avvolgere il mio corpo e i ceri per la sepoltura. Ti prego anche di portarmi quei dolci, che tu eri solita darmi quando mi trovavo malato a Roma”.","note":"","tags":[],"_importId":9870},{"nome":"😊\"Torta alle Mandorle  \"😊Ingredienti: 4 uova medio- grandi","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"😊\"Torta alle Mandorle  \"😊Ingredienti: 4 uova medio- grandi, 100 gr di zucchero semolato, 2 limoni(scorza grattugiata), 160 gr di farina di  mandorle,1/2 bustina di lievito x torte, 2 cucchiai  di aceto di mele, zucchero a velo qb, mandorle qb.Procedimento: Accendi il forno a 170°, imburra e infarina una tortiera di diametro 22,oppure ricopri con un foglio di carta forno. Separa i tuorli dagli albumi.Versa i tuorli ( temperatura  ambiente),in una ciotola con lo zucchero semolato, aggiungi la scorza grattugiata dei limoni e monta per qualche minuto  fino a creare una crema morbida e spumosa, aggiungi ora il lievito per torte, la farina di mandorle e l'aceto di mele.Mescola accuratamente con un cucchiaio di legno. Monta anche gli albumi a neve ferma e incorpora nella ciotola,  mescolando dall'alto verso il basso. Versa il composto nella  tortiera precedentemente imburrata e infarinata, livella sbattendo leggermente  la tortiera  sul tavolo,cuoci in forno caldo a180° x 30 minuti, modalità statico. Controlla la cottura qualche minuto prima,facendo la prova con uno stuzzicadenti se risulta asciutto la torta è pronta. Sforna, fai intiepidire poi trasferisci in un piatto da portata, decora a piacere con zucchero a velo e mandorle.Ps: l'aceto di mele serve a rendere più morbido impasto,  ed è  indispensabile  in questa ricetta, ed è  inodore😋😋😋","note":"","tags":[],"_importId":12018},{"nome":"😊\"Torta alle Mandorle senza farina \"😊Ingredienti: 4","fonte":"mamm var log=document.getElementById('status');
var prog=document.getElementById('prog');
function msg(text,cls){var p=document.createElement('p');p.style.margin='2px 0';p.className=cls||'info';p.textContent=text;log.appendChild(p);log.scrollTop=log.scrollHeight;}

async function deleteOld(){
  if(!firebase.auth().currentUser){msg('Fai il login prima.','err');return;}
  document.getElementById('btn-del').disabled=true;
  msg('Leggo tutte le ricette...','info');
  var snap=await db.ref('recipes').get();
  if(!snap.exists()){msg('Nessuna ricetta trovata.','info');return;}
  var toDelete=[];
  snap.forEach(function(c){var v=c.val();if(v.addedBy==='La mamma'||v._importId)toDelete.push(c.key);});
  msg('Cancello '+toDelete.length+' ricette vecchie...','info');
  for(var i=0;i<toDelete.length;i++){
    await db.ref('recipes/'+toDelete[i]).remove();
    if((i+1)%20===0)msg('Cancellate '+(i+1)+'/'+toDelete.length+'...','info');
  }
  msg('✅ Cancellate '+toDelete.length+' ricette. Ora clicca Importa.','ok');
  document.getElementById('btn-imp').disabled=false;
}

async function startImport(){
  if(!firebase.auth().currentUser){msg('Fai il login prima.','err');return;}
  document.getElementById('btn-imp').disabled=true;
  prog.style.display='block';prog.value=0;prog.max=RECIPES.length;
  msg('Inizio import di '+RECIPES.length+' ricette...','info');
  var ok=0,err=0;
  for(var i=0;i<RECIPES.length;i++){
    try{await db.ref('recipes').push(RECIPES[i]);ok++;}
    catch(e){err++;console.error(RECIPES[i].nome,e);}
    prog.value=i+1;
    if((i+1)%10===0)msg((i+1)+' / '+RECIPES.length+' importate...','info');
    if((i+1)%20===0)await new Promise(function(r){setTimeout(r,200);});
  }
  msg('✅ Completato! '+ok+' importate'+( err?' — '+err+' errori':'')+'.','ok');
}

firebase.auth().onAuthStateChanged(function(user){
  if(!user){
    msg('Accesso in corso...','info');
    firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(function(e){msg('Login fallito: '+e.message,'err');});
  }else{
    msg('✅ Loggata come '+user.email,'ok');
  }
});
</script>
