ia di limone grattugiata 1 bustina di vanillina 1 pizzico di sale\nE inoltre:\ngranella di zucchero\nPreparazione delle Veneziane alla crema\nPoco prima di iniziare la preparazione, tirate fuori il burro dal frigo, in modo che diventi morbido.\nTutti gli ingredienti devono essere a temperatura ambiente: il lievito di birra, l’acqua, il latte, le uova, ecc….\nLa preparazione delle Veneziane alla crema si svolgerà in 2 giornate. Ma non vi spaventate !! Non è difficile.\nPreparazione del preimpasto\n100 g. di farina manitoba – 10 g. di lievito di birra – 55 ml. di acqua\nImpastate gli ingredienti qui sopra fino ad ottenere una palla omogenea.\nSpennellate una ciotola con poco olio, riponete l’impasto, ricoprite con la pellicola trasparente e lasciate lievitare per 1 ora a temperatura ambiente o nel forno spento.\nPreparazione dell’impasto\n400 g. di farina manitoba – 100 g. di zucchero – 10 g. di miele di acacia – 150 g. di tuorli – 75 ml. di latte\nMettete nella planetaria lo zucchero, il miele e il latte e amalgamate con la frusta K o a foglia.\nTogliete la frusta e mettete il gancio per impastare. Pesate i tuorli e incorporate 1 tuorlo alla volta alternato con la farina. Impastate con una velocità medio-bassa e senza avere fretta di aggiungere i tuorli e la farina. A metà aggiungete anche il preimpasto preparato precedentemente.\nA parte amalgamate il burro con il resto degli ingredienti (200 g. di burro morbido – 1 stecca di vaniglia (o 2 bustine di vanillina) – 9 g. di sale – 5 g. di scorza di limone grattugiata – 8 g. di scorza di arancia candita triturata – 2 gocce di essenza di arancia).\nAggiungete all’impasto e sempre impastando poco burro (con gli aromi) alla volta. Continuate ad impastare a velocità medio-bassa, finchè il burro non sarà del tutto assorbito e il composto sarà liscio ed omogeneo. Impastate per ca. 10 minuti, senza fretta.\nUna volta pronto, mettete l’impasto in una ciotola capiente leggermente spennellata di olio, ricoprite con la pellicola trasparente e lasciate lievitare per 2 ore a temperatura ambiente o nel forno spento.\nTrascorse le 2 ore, mettete in frigo per tutta la notte.\nIl giorno dopo….\nTroverete l’impasto non tanto diverso dal giorno prima, ma si sarà equilibrato per quanto riguarda il lievito e gli aromi.\n\nFormate delle palline di ca. 50 g. (pesatele !). Fatele roteare sul piano di lavoro e posizionatele sulla teglia rivestita di carta da forno, piuttosto distanziate tra loro. Vi sembreranno delle palline piccolissime, ma non vi preoccupate: in lievitazione e durante la cottura cresceranno molto.\nLasciate lievitare per 4 ore a temperatura ambiente o nel forno spento.\nPreparazione della Crema pasticcera leggera\n250 ml di latte – 25 g. di farina – 70 g. di zucchero – 2 tuorli – 1 cucchiaino raso di buccia di limone grattugiata – 1 bustina di vanillina – 1 pizzico di sale\nAppena mettete a lievitare le veneziane, iniziate con la preparazione della crema. Mettete il lattea scaldare in un pentolino abbastanza capiente e antiaderente.\nA parte montate i tuorli con lo zucchero, la vanillina, la buccia del limone grattugiata e il pizzico di sale. Aggiungete, un cucchiaio alla volta, la farina setacciata. E’ importante che sia setacciata per evitare la formazione di grumi.\nQuando il latte è abbastanza caldo, aggiungetene la metà nel composto dell’uovo, amalgamate e versate il tutto nel pentolino del latte. Seguite il metodo che vi ho fatto vedere nella ricetta della Crema pasticcera e, amalgamate bene finchè la crema non avrà preso consistenza.\nUna volta pronta trasferitela in una scodellina e mescolate di tanto in tanto fino al completo raffreddamento. Mettete in frigo.\nCompletamento delle Veneziane alla crema\nAccendete il forno statico a 180°\n\nTrascorse le 4 ore di lievitazione, mettete la crema pasticcera in un sac a poche con bocchetta liscia e spremete poca crema pasticcera sopra ciascuna pallina. Aggiungete un po’ di granella di zucchero e infornate nel forno preriscaldato a 180° per ca. 18 minuti, fino a doratura. Regolatevi con i tempi del vostro forno.\nConservate le Veneziane alla crema all’interno di un sacchetto “gelo” fuori dal frigo. Potete anche congelarle.\nChe dire…. fantastiche !!! \n  E se non lo avete ancora fatto, provate i Buondì homemade ! Superfantastici !","note":"","tags":[],"_importId":95},{"nome":"Ingredienti per 1 vasetto","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":80.0,"unit":"g","name":"nocciole sgusciate e spellate"},{"qty":30.0,"unit":"g","name":"zucchero di canna"},{"qty":5.0,"unit":"g","name":"cacao amaro"},{"qty":25.0,"unit":"ml","name":"olio di semi"},{"qty":150.0,"unit":"g","name":"cioccolato al latte"},{"qty":2.0,"unit":"g","name":"occe di essenza di vaniglia"}],"procedimento":"Trasferite quindi il composto in una ciotola, aggiungete il cacao e incorporatelo al composto.\nPoi unite lentamente l'olio a filo e l'essenza di vaniglia.\nInfine, sciogliete il cioccolato al latte in un pentolino.\nUna volta fuso, aggiungetelo al composto a filo, mescolando con una spatola.\nAmalgamate bene, fino ad ottenere una crema liscia e omogenea.\nTrasferite ora la crema di nocciole in un vasetto di vetro, chiudete bene con il coperchio e riponete in frigo per circa 2 ore.\nUna volta raggiunta la giusta consistenza, potrete conservare la vostra meravigliosa nutella fatta in casa, ben chiusa, in dispensa.","note":"","tags":[],"_importId":13919},{"nome":"Ingredienti per fare i Finocchi alla mediterranea in padella","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"finocchi"},{"qty":40.0,"unit":"g","name":"olive taggiasche"},{"qty":50.0,"unit":"g","name":"pomodori secchi sott’olio"},{"qty":20.0,"unit":"g","name":"pinoli"},{"qty":20.0,"unit":"g","name":"uvetta"},{"qty":30.0,"unit":"ml","name":"vino bianco"}],"procedimento":"Per fare i finocchi in padella alla mediterranea, scegliete dei bei finocchi panciuti e freschi, privateli delle foglie esterne e della barba, quindi affettateli piuttosto sottilmente. Raccoglieteli in una padella dal fondo spesso, aggiungete un buon giro d’olio, sale e e pepe ecuocete con il coperchio per 10 minuti a fiamma moderata. Salandoli subito, i finocchi suderanno un po’ e la loro stessa acqua di vegetazione basterà a cuocerli, una volta ammorbiditi alzate la fiamma, versate il vino e lasciate che evapori prima di aggiungere le olive, i pomodori secchi sott’olio sgocciolati e tagliati a pezzetti, i capperi dissalati, l’uvetta e i pinoli. Cuocete 5 minuti a fiamma alta mescolando e insaporito il tutto spegnete il fornello. I finocchi spadellati sono ottimi da gustare caldi o tiepidi, ma potrete prepararli in anticipo e scaldarli leggermente al bisogno.","note":"","tags":[],"_importId":13239},{"nome":"INGREDIENTI PER FARINATA DI CECI (2 teglie diametro 24):","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina di ceci"},{"qty":1.0,"unit":"L","name":"acqua"}],"procedimento":"Mezzo bicchiere di olio extra vergine di oliva più il necessario per ungere il testo\nsale e pepe q.b.\nPREPARAZIONE FARINATA DI CECI:\nIn una ciotola capiente disporre a fontana la farina di ceci setacciata. Unire un pizzico di sale e l’acqua, poco alla volta, mescolando con un cucchiaio di legno, evitando la formazione di grumi. Lasciar riposare, coperta da un piatto o da un canovaccio, per almeno 5 ore. Trascorso questo tempo, eliminare l’eventuale schiuma formatasi in superficie.\nUngere il testo in rame con il mezzo bicchiere di olio e versarvi  il composto, trascinando l’olio in eccesso dai bordi verso il centro. Infornare a 220 gradi (statico) per circa 15 minuti. Sfornare, spolverizzare di pepe e servire calda.","note":"","tags":[],"_importId":1115},{"nome":"Ingredienti per la frolla (per uno stampo da 20 cm)","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"PER CUOCERE IL GRANO\nLatte intero 250 g\nGrano cotto 350 g\nStrutto 30 g\nScorza di limone 1\nRicotta vaccina 200 g\nRicotta di pecora 200 g\nZucchero 350 g\nUova 3\nCedro candito 50 g\nArancia candita 50 g\nAcqua di fiori d'arancio 15 g\nCannella in polvere 1 pizzico\nBaccello di vaniglia 1\nPER UNGERE E INFARINARE LO STAMPO\nStrutto q.b.\nFarina 00 q.b.\nPreparazione\nCome preparare la Pastiera napoletana\n  Per preparare la pastiera napoletana iniziate dalla pasta frolla. In una ciotola versate la farina e lo zucchero (1), poi unite lo strutto (2) e iniziate ad impastare a mano (3). \n  Non appena avrete ottenuto un composto sabbioso (4) unite anche i tuorli (5). Lavorate ancora con le mani (6)  \n  e non appena avrete ottenuto un composto uniforme trasferitelo su un piano di lavoro (7). Continuate a lavorare l'impasto, giusto il tempo di compattare gli ingredienti, fino a che avrete ottenuto un panetto liscio ed uniforme (8). Avvolgete nella pellicola per alimenti (9) e lasciate riposare per un'oretta in frigorifero.  \n  Nel frattempo versate il latte in un pentolino, aggiungete il grano precotto (10), lo strutto (11) e la scorza del limone grattugiata (12). \n  Accendete il fuoco e mescolando spesso (13), lasciate cuocere per circa 20 minuti a fuoco medio fino ad ottenere un composto cremoso (14) e lasciate raffreddare. Solo quando sarà ben freddo iniziate a preparare la crema. In una ciotola setacciate sia la ricotta vaccina che quella di pecora (15);\n  Unite lo zucchero (16) e mescolate con una frusta o con una spatola (17). Aggiungete poi le uova (18)\n  e il grano ormai freddo (19). Aggiungete anche i semi della bacca di vaniglia (20); poi tagliate a cubetti sia l'arancia che il cedro candito (21)\n  e inseriteli nel composto (22), insieme ad un pizzico di cannella (23) e all'acqua di fiori d'arancio (24). \n  A questo punto mescolate il tutto per amalgamare tutti gli ingredienti (25) e passate alla composizione della pastiera. Ungete uno stampo in alluminio da pastiera da 20 cm lo strutto e infarinatelo (26). Poi riprendete la pasta frolla e iniziate a stenderla con il mattarello (27)  \n  fino ad ottenere uno spessore di circa mezzo cm (28). A questo punto trasferitelo nello stampo (29) e con le mani fate in modo che aderisca bene su tutta la superficie (30). \n  Eliminate poi l'eccesso di pasta con un coltellino (31) e impastatelo nuovamente, servirà per realizzare le losanghe. Versate poi la crema all'interno del guscio di frolla (32) e livellatela. Quindi stendete il resto della pasta, sempre fino ad ottenere uno spessore di mezzo cm e realizzate le losanghe, larghe circa 1 cm e mezzo con una rotella taglia pasta (33). \n  Poi posizionatele sulla pastiera prima in un verso (34) e poi nell'altro (35), avendo cura di far coincidere le estremità con i bordi dello stampo. A questo punto cuocete in forno statico preriscaldato a 180° per circa 80 minuti, avendo cura di spostare la pastiera sul ripiano più basso negli ultimi 20 minuti di cottura. Se le losanghe dovessero scurirsi troppo coprite la pastiera con un foglio di alluminio. Poi sfornate la pastiera napoletana (36) e lasciatela raffreddare completamente. Prima di servirla potete spolverizzare la superficie con dello zucchero a velo a piacere.","note":"","tags":[],"_importId":636},{"nome":"Ingredienti per la preparazione della frittata di mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"mele golden"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":120.0,"unit":"ml","name":"yogurt bianco naturale"},{"qty":30.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"n°","name":"limone"},{"qty":60.0,"unit":"g","name":"farina"},{"qty":0.5,"unit":"cucchiaino","name":"lievito in polvere per dolci"}],"procedimento":"Per preparare la buonissima frittata di mele inizia con lo sbucciare le mele con un pelapatate e tagliarle a spicchi sottili\n  Pelapatate Professionale con Lama Laterale in Acciaio Inossidabile, Ideale per Pelare Patate, Carote e Verdure Varie e Frutta, Adatto per campeggi in Famiglia, Picnic e Viaggi\n9,99 €\nAcquista\nInseriscile in una ciotola e irrorale con il succo di mezzo limone, mescola e lascia insaporire per qualche minuto.\nRompi le uova in un’ altra ciotola e montale con le fruste elettriche insieme allo zucchero fino ad ottenere un composto spumoso. Poi, mischiando, aggiungi lo yogurt, o il latte nella stessa quantità, la farina e mezzo cucchiaino di lievito\n  Bosch Elettrodomestici MFQ3030 Sbattitore, Bianco\n22,75 €\nAcquista\ne per ultimo le mele e ammalgama bene il tutto con una spatola .\n  Lacor - 64464 - Spatola da cucina grigia, Spatola in silicone, Utensili da cucina, Manico ergonomico, Antiaderente, Resistente alle alte temperature, Lavabile in lavastoviglie, Lunghezza 27,5 cm\n4,99 €\nAcquista\nFai scaldare una padella  antiaderente d.20 imburrata e, una volta calda, versa il composto.\nFai cuocere a fuoco dolce e con coperchio per 10 minuti. Poi delicatamente capovolgi, con l’aiuto di un coperchio o di un piatto piano, la frittata e fai cuocere per altri 5 minti sempre con coperchio e a fuoco basso \n  Terminata la cottura lascia raffreddare completamente e spolvera con abbondante zucchero a velo","note":"","tags":[],"_importId":16334},{"nome":"Ingredienti per la Torta all’Acqua al Cacao","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ciotola grande: per mescolare gli ingredienti.\nFrusta: per amalgamare l’impasto.\nStampo per torta: di 22-24 cm di diametro.\nCarta da forno: per rivestire lo stampo.\nSetaccio: per setacciare la farina e il cacao.\n3. Procedimento per Preparare la Torta all’Acqua al Cacao\n3.1 Preparazione degli Ingredienti\nPreparare lo Stampo: Preriscalda il forno a 180°C (356°F). Rivesti lo stampo con carta da forno, oppure ungi e infarina leggermente lo stampo per evitare che la torta si attacchi.\nSetacciare gli Ingredienti Secchi: In una ciotola grande, setaccia la farina, il cacao amaro e il lievito per dolci. Aggiungi anche il pizzico di sale e mescola bene.\nPreparazione dell’Impasto\nMescolare gli Ingredienti Liquidi: In un’altra ciotola, unisci l’acqua, l’olio di semi e l’estratto di vaniglia. Mescola bene fino a ottenere un composto omogeneo.\nUnire gli Ingredienti: Aggiungi gli ingredienti liquidi agli ingredienti secchi. Mescola delicatamente con una frusta fino a ottenere un impasto liscio e senza grumi. Fai attenzione a non mescolare troppo; basta amalgamare gli ingredienti.\n3.3 Cottura della Torta\nVersare l’Impasto nello Stampo: Trasferisci l’impasto nello stampo preparato, livellando la superficie con una spatola.\nCuocere in Forno: Inforna la torta e cuoci per circa 30-35 minuti, o fino a quando uno stecchino inserito al centro esce pulito. Il tempo di cottura può variare a seconda del forno.\nRaffreddare: Una volta cotta, sforna la torta e lasciala raffreddare nello stampo per 10 minuti. Poi trasferiscila su una gratella per farla raffreddare completamente.\n3.4 Servire\nDecorare: Puoi servire la torta così com’è oppure spolverarla con zucchero a velo o cacao amaro. Per un tocco extra, puoi guarnirla con frutta fresca, come fragole o lamponi.\nTagliare e Gustare: Una volta fredda, taglia la torta a fette e gustala accompagnata da una tazza di tè o caffè.\nTorta all’Acqua al Cacao e Noci\nAggiungi 100 g di noci tritate all’impasto per dare un tocco croccante alla torta. Le noci si sposeranno perfettamente con il sapore del cacao.","note":"","tags":[],"_importId":13504},{"nome":"Ingredienti per la Zuppa di ceci zucca e patate","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":480.0,"unit":"g","name":"ceci precotti sgocciolati"},{"qty":400.0,"unit":"g","name":"zucca"},{"qty":1.0,"unit":"n°","name":"ciuffoprezzemolo"},{"qty":8.0,"unit":"fetta","name":"pane raffermo"}],"procedimento":"Preparazione della Zuppa di ceci zucca e patate\n\t\tPer la preparazione della ricetta di questa ricetta, i ceci da utilizzare possono essere sia quelli già acquistati precotti come ho fatto io, oppure possono essere utilizzati i ceci secchi. In questo secondo caso, i legumi vanno prima lavati e poi messi ammollo con dell’acqua tiepida, per un’intera notte. Il giorno dopo vanno cotti a fiamma moderata, aggiungendo dell’altra acqua se quella dell’ammollo si fosse completamente assorbita.  Quando i ceci saranno cotti, spegnere il fuoco. Si possono utilizzare per preparare qualsiasi ricetta, oppure possono essere porzionati e conservati in freezer, per un utilizzo futuro. Mettere dell’olio di oliva in un tegame assieme alla cipolla tagliata sottile. Lasciare scaldare e far rosolare a fiamma moderata. Togliere la buccia, sia alle patate, che alla zucca e alle carote e ridurre a cubetti.  Versare queste verdure nell’olio e lasciare rosolare anche queste, mescolando spesso con un cucchiaio di legno, per evitare che si attacchino. E’ ora il momento di unire anche i ceci, assieme al loro brodo di cottura, se li avete cotti voi, o di conservazione, se utilizzerete quelli nelle lattine, non prima, però, di aver aggiunto anche i pomodori pelati spezzettati. \n\t\tAggiungere ancora dell’acqua, fino a superare di alcuni centimetri il livello delle verdure. Salare e impepare e lasciare cuocere per 15-20 minuti, fino a quando la zuppa si restringe. Non dovrà essere né troppo asciutta, né troppo brodosa, per cui, se dovesse mancare il liquido, aggiungere altra acqua.  Lavare il prezzemolo, spezzettarlo grossolanamente e mettere anche questo in pentola. Intanto, lasciare scaldare una piastra e poggiarvi sopra le fette di pane, lasciandole tostare a fiamma moderata, da tutti e due i lati.   Una volta che la Zuppa con ceci zucca e patate sarà pronta, servitela calda, accompagnandola con i crostini di pane. Vedrete che bontà e, inoltre, scalderà le vostre mani e il vostro cuore. Buon appetito!","note":"","tags":[],"_importId":13518},{"nome":"Ingredienti per lo Strudel di Mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina manitoba","sezione":"Per la pasta da strudel"},{"qty":30.0,"unit":"g","name":"olio d'oliva","sezione":"Per la pasta da strudel"},{"qty":100.0,"unit":"g","name":"uova","sezione":"Per la pasta da strudel"},{"qty":110.0,"unit":"g","name":"acqua","sezione":"Per la pasta da strudel"},{"qty":5.0,"unit":"g","name":"sale","sezione":"Per la pasta da strudel"},{"qty":800.0,"unit":"g","name":"mele renette","sezione":"Per il ripieno"},{"qty":50.0,"unit":"g","name":"burro fuso","sezione":"Per il ripieno"},{"qty":120.0,"unit":"g","name":"zucchero","sezione":"Per il ripieno"},{"qty":10.0,"unit":"g","name":"cannella in polvere","sezione":"Per il ripieno"},{"qty":100.0,"unit":"g","name":"uvetta","sezione":"Per il ripieno"},{"qty":50.0,"unit":"g","name":"pinoli","sezione":"Per il ripieno"},{"qty":80.0,"unit":"g","name":"granella di nocciole","sezione":"Per il ripieno"},{"qty":50.0,"unit":"g","name":"succo di limone","sezione":"Per il ripieno"},{"qty":100.0,"unit":"g","name":"briciole di pan di spagna","sezione":"Per il ripieno"},{"qty":70.0,"unit":"g","name":"burro","sezione":"Per la finitura"}],"procedimento":"Preparare il ripieno: Iniziate con l’ammollare l’uvetta in acqua tiepida per circa 20 minuti. Una volta ammorbidita, sgocciolatela e strizzatela. Lavate, sbucciate e tagliate le mele a fette sottili. Mettetele in una ciotola capiente, aggiungete il burro fuso, lo zucchero, la cannella, i pinoli, la granella di nocciole, il succo e la scorza di limone, oltre alle briciole di pan di Spagna. Mescolate bene il tutto e lasciate insaporire mentre preparate la pasta.\nPreparare la pasta da strudel: In una ciotola, versate la farina Manitoba e aggiungete il sale, l'olio, le uova e l’acqua tiepida. Impastate fino a ottenere un impasto morbido e elastico. Trasferite l’impasto su un piano di lavoro infarinato e lavoratelo fino a renderlo liscio e omogeneo. Coprite con un canovaccio e lasciate riposare per 30 minuti.\nStendere la pasta: Infarinate bene il piano di lavoro e iniziate a stendere l’impasto. La pasta deve essere sottilissima, quasi trasparente. Utilizzate il mattarello per stendere la base, poi, con le mani infarinate, sollevate delicatamente l’impasto dal centro e tiratelo verso l’esterno per renderlo ancora più sottile.\nAssemblare lo strudel: Spennellate la superficie della pasta con il burro fuso (50 g), quindi distribuite uniformemente il ripieno preparato in precedenza. Arrotolate la pasta delicatamente per formare il classico strudel, facendo attenzione a non far fuoriuscire il ripieno. Per una versione più piccola, potete preparare due strudel più piccoli.\nCuocere lo strudel: Preriscaldate il forno a 170°C e cuocete lo strudel per circa 60 minuti, fino a quando la superficie non sarà dorata e croccante. Una volta cotto, estraetelo dal forno e lasciatelo raffreddare leggermente. Spennellate la superficie con 20 g di burro fuso per renderla lucida e spolverizzate con zucchero a velo vanigliato.\nServire: Lo strudel di mele è perfetto servito caldo, magari accompagnato da panna montata non zuccherata per un contrasto ancora più goloso.\nConsigli Utili per un Perfetto Strudel di Mele\nAttenzione alla farina: Ogni tipo di farina assorbe l’acqua in modo diverso, quindi potrebbe essere necessario aggiungere un po' più di acqua all’impasto, se risultasse troppo duro.\nPasta sottile: La chiave per un buon strudel è ottenere una pasta sottilissima e ben stesa, quasi trasparente. Non abbiate paura di lavorarla con le mani, è un impasto molto elastico e facile da gestire.\nVariante rapida: Se non volete preparare la pasta da strudel, potete usare la pasta sfoglia, per una versione più veloce ma ugualmente deliziosa.\nLo strudel di mele è un dolce perfetto per ogni occasione: da una colazione ricca a una merenda golosa, passando per un dessert da servire in un’occasione speciale. Con questa ricetta, preparato con la pasta da strudel fatta in casa, riuscirete a sorprendere i vostri ospiti con un dolce irresistibile e genuino.","note":"","tags":[],"_importId":16032},{"nome":"Ingredienti per preparare la crostata morbida della nonna","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"ml","name":"latte"},{"qty":125.0,"unit":"g","name":"zucchero"},{"qty":125.0,"unit":"g","name":"tuorlo"},{"qty":45.0,"unit":"g","name":"amido di mais"},{"qty":1.0,"unit":"n°","name":"bacca vaniglia"},{"qty":60.0,"unit":"g","name":"pinoli"}],"procedimento":"Metto nel boccale tutti gli ingredienti e avvio per un minuto a velocità 4. Verso l’impasto ottenuto nello stampo furbo e cuocio in forno precedentemente riscaldato a 180° per 15 minuti. Una volto cotta la lascio raffreddare bene prima di estrarla dalla stampo.\nCome farla con le fruste elettriche\nNella ciotola lavoro con le fruste elettriche le uova e lo zucchero rendendole belle cremose, aggiungo il burro morbido fatto a pezzetti e continuo a sbattere.\nUnisco i semini della bacca di vaniglia che ho precedentemente estratto e incorporo la farina e il lievito setacciati insieme, abbassando la velocità delle fruste.\nL’impasto è pronto, quindi lo verso nello stampo furbo e cuocio in forno precedentemente riscaldato a 180° per 15 minuti.\n  Preparo la crema pasticcera\nMetto il latte in un tegame antiaderente con i semini della vaniglia. In una ciotola metto lo zucchero, i tuorli e l’amido di mais setacciato. Lavoro bene con una frusta per far amalgamare il tutto.\nSuccessivamente porto il latte, sul fuoco deve sfiorare il bollore e lo verso nella ciotola dei tuorli. Poi rimetto tutto nel tegame e inizio a cuocere sul fuoco a fiamma bassa mescolando sempre con la frusta. Il composto si deve addensare senza creare grumi. Bene la crema è pronta! Quando è ben raffreddata la trasferisco in una ciotola la sigillo con la pellicola trasparente facendola aderire sulla superficie, questo per evitare che si secchi.\nPreparo la crostata morbida della nonna\nUnisco alla crema pasticcera i pinoli lasciandone una manciata come decorazione finale. Trasferisco la base della crostata morbida su un piatto per dolci, rigirandola in modo di avere l’incavo creato perfetto per essere farcito, quindi verso la crema pasticcera e decoro la superficie con i pinoli avanzati e una spolverata di zucchero a velo.\nConservazione\nPuoi conservare la crostata morbida della nonna chiusa in una campana per dolci in frigorifero per un massimo di due giorni.\nIn questa ricetta ci sono uno o più link di affiliazione.","note":"","tags":[],"_importId":11067},{"nome":"Ingredienti per preparare la marmellata di kiwi","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"kiwi"},{"qty":400.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"n°","name":"limone"}],"procedimento":"Ingredienti per preparare la marmellata di kiwi\n\t\t1 kg di kiwi\n\t\t400 g di zucchero\n\t\t1 limone","note":"","tags":[],"_importId":16037},{"nome":"Ingredienti per torta di mele glassata senza bilancia","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"uova","sezione":"Per la pasta frolla"},{"qty":3.0,"unit":"cucchiaio","name":"zucchero","sezione":"Per la pasta frolla"},{"qty":7.0,"unit":"cucchiaio","name":"olio di semi di girasole","sezione":"Per la pasta frolla"},{"qty":2.5,"unit":"bicchiere","name":"farina 00","sezione":"Per la pasta frolla"},{"qty":0.5,"unit":"n°","name":"bustina lievito in polvere per dolci","sezione":"Per la pasta frolla"},{"qty":2.0,"unit":"n°","name":"mele","sezione":"Per il ripieno"},{"qty":1.0,"unit":"cucchiaio","name":"burro","sezione":"Per il ripieno"},{"qty":2.0,"unit":"cucchiaio","name":"zucchero","sezione":"Per il ripieno"},{"qty":1.0,"unit":"n°","name":"albume","sezione":"Per la glassa"},{"qty":1.0,"unit":"n°","name":"confezione zucchero a velo","sezione":"Per la glassa"},{"qty":1.0,"unit":"n°","name":"stampo per crostate","sezione":"Per la glassa"},{"qty":1.0,"unit":"g","name":"attugia","sezione":"Per la glassa"}],"procedimento":"Preparare il ripieno\nLavare e sbucciare le mele. Tagliarle in quarti e grattugiarle con la grattugia, per ottenere delle scaglie.\n\nIn una padella antiaderente, aggiungere il burro, le mele, lo zucchero e un po’ di cannella (mezzo cucchiaino basta).\nFar cuocere a fuoco basso e mescolare, fino a quando le mele non avranno perso tutta l’acqua e non si sarà creata una sorta di pappetta.\nTrasferire il ripieno in una ciotola e lascia raffreddare completamente.\n\nPreparare la crostata\nPreparare la pasta frolla all’olio, ricetta QUI. Le dosi per la base di pasta frolla per la crostata di mele senza bilancia sono le stesse della ricetta della pasta frolla all’olio, abbiamo solo fatto la conversione in bicchieri e cucchiai.\n\nUna volta ottenuto il panetto di pasta frolla, dividerlo in due parti, di cui una leggermente più grande dell’altra.\nSpolverare il piano lavoro con farina, posizionare un panetto e spolverare anch’esso con un po’ di farina. Dunque, con un mattarello, stendere la pasta frolla fino ad ottenere una sfoglia di circa mezzo cm di spessore e circa 26 cm di diametro.\nImburrare uno stampo per crostata del diametro di 24 cm. Dunque adagiare la sfoglia di pasta frolla e far aderire per bene i bordi.\nCospargere la base della torta di mele glassata senza bilancia con qualche cucchiaio di marmellata, preferibilmente di albicocche. Non è necessario aggiungerne troppa.\n\nDunque, sullo strato di marmellata, stendere il ripieno di mele cotto precedentemente in padella. Livellare il tutto con un cucchiaio.\nA questo punto, stendere l’altro panetto di pasta frolla, coprire la base della crostata e ritagliare la pasta frolla in eccesso. Sigillare per bene i bordi con i rebbi di una forchetta e bucherellare uniformemente la superficie della torta di mele glassata senza bilancia con la stessa.\nCome ultimo passaggio, montare gli albumi con lo zucchero a velo, fino ad ottenere un compesto liquido ma denso. Versare tale composto sulla superficie della crostata.\nA questo punto, è possibile decorare la torta di mele glassata senza bilancia con un po’ di marmellata in una sac a poche.\nPreriscaldare il forno statico a 180°. Dunque infornare per circa 40 minuti. Dopo aver sfornato la torta di mele glassata senza bilancia, lasciar raffreddare completamente. Dunque tagliarla a fette e gustarla.","note":"","tags":[],"_importId":12033},{"nome":"INGREDIENTI PER UNA TORTA QUADRATA 22X22 cm oppure per","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"mele golden"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":150.0,"unit":"g","name":"farina 00"},{"qty":125.0,"unit":"g","name":"zucchero semolato"},{"qty":100.0,"unit":"g","name":"ricotta vaccina"},{"qty":8.0,"unit":"g","name":"lievito in polvere per dolci"},{"qty":1.0,"unit":"cucchiaio","name":"raso di cannella in polvere"}],"procedimento":"PROCEDIMENTO\nMondare e tagliare le mele a fettine molto sottili. Disporle in una ciotola con il succo di limone, perché non anneriscano.\nSbattere uova e zucchero con l’aiuto di uno sbattitore elettrico, fino ad ottenere un composto spumoso.\nQuindi, aggiungere la ricotta e mischiare bene.\nIncorporare la farina e il lievito setacciati. Se piace, aggiungere della cannella in polvere, che si abbina molto bene al gusto delle mele. In alternativa, potete usare anche della vaniglia.\nPer ultime, aggiungere le fettine di mela e girare energicamente con un cucchiaio di legno. A questo punto vi sembrerà di avere tante mele e pochissimo impasto, è normale, fa parte della ricetta.\nBagnare un foglio di carta forno e strizzarlo bene. Quindi disporlo sulla teglia scelta. Con questa tecnica la carta forno assumerà perfettamente la forma della teglia senza creare inestetismi sulla superficie della torta. Versare il composto di mele nella teglia e livellare bene.\nCuocere a 180 gradi forno statico per circa 40-45 minuti, a seconda dei forni. Attendere il raffreddamento prima di estrarre dalla teglia e tagliare a fette.","note":"","tags":[],"_importId":372},{"nome":"Ingredienti per una tortiera da 24 cm","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00"},{"qty":70.0,"unit":"ml","name":"olio extravergine di oliva"},{"qty":0.5,"unit":"n°","name":"cucchiaino di zucchero"},{"qty":70.0,"unit":"ml","name":"acqua tiepida"},{"qty":60.0,"unit":"ml","name":"vino bianco"},{"qty":1.0,"unit":"kg","name":"cipolle dorate","sezione":"Per il ripieno"},{"qty":4.0,"unit":"n°","name":"filetti di alici sott’olio","sezione":"Per il ripieno"},{"qty":40.0,"unit":"g","name":"olive nere","sezione":"Per il ripieno"},{"qty":60.0,"unit":"g","name":"olive verdi baresane","sezione":"Per il ripieno"},{"qty":150.0,"unit":"g","name":"pomodorini","sezione":"Per il ripieno"},{"qty":1.0,"unit":"cucchiaino","name":"ricotta forte","sezione":"Per il ripieno"}],"procedimento":"Ingredienti per una tortiera da 24 cm\n\nPer l’impasto:\n300 g farina 00\n70 ml olio extravergine di oliva\nMezzo cucchiaino di zucchero\nsale fino (un cucchiaino raso)\n70 ml acqua tiepida\n60 ml vino bianco\nPer il ripieno:\n1 kg  cipolle dorate (o sponsali)\n4 Filetti di alici sott’olio\n40 g olive nere\n60 g olive verdi baresane\n150 g pomodorini \n1 cucchiaino di ricotta forte (o una manciata di pecorino romano)\nq.b.Olio extravergine d’oliva\nq.b.Sale\n\nRicetta https://blog.giallozafferano.it/piovonoricette/pizza-di-cipolle/","note":"","tags":[],"_importId":15462},{"nome":"Ingredienti per una tortiera da 30 cm","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina 00"},{"qty":200.0,"unit":"g","name":"patate lesse"},{"qty":100.0,"unit":"ml","name":"olio extravergine d’oliva"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":20.0,"unit":"g","name":"sale fino"},{"qty":12.0,"unit":"g","name":"lievito di birra fresco"},{"qty":250.0,"unit":"g","name":"caciocavallo"},{"qty":150.0,"unit":"g","name":"mortadella"}],"procedimento":"Ricetta https://blog.giallozafferano.it/piovonoricette/pizza-rustica-con-mortadella-e-caciocavallo/","note":"","tags":[],"_importId":16226},{"nome":"Ingredienti per uno stampo di 23/24 cm di diametro:","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":260.0,"unit":"g","name":"farina 00","sezione":"Per la frolla"},{"qty":100.0,"unit":"g","name":"zucchero","sezione":"Per la frolla"},{"qty":1.0,"unit":"n°","name":"uovo","sezione":"Per la frolla"},{"qty":20.0,"unit":"g","name":"acqua","sezione":"Per la frolla"},{"qty":100.0,"unit":"g","name":"burro","sezione":"Per la frolla"},{"qty":1.0,"unit":"cucchiaino","name":"lievito per dolci","sezione":"Per la frolla"},{"qty":500.0,"unit":"g","name":"ricotta","sezione":"Per la farcitura"},{"qty":1.0,"unit":"n°","name":"uovo","sezione":"Per la farcitura"},{"qty":80.0,"unit":"g","name":"zucchero","sezione":"Per la farcitura"},{"qty":210.0,"unit":"g","name":"crema mou","sezione":"Per la farcitura"},{"qty":4.0,"unit":"n°","name":"amaretti","sezione":"Per la farcitura"},{"qty":30.0,"unit":"g","name":"gocce di cioccolato","sezione":"Per la farcitura"},{"qty":20.0,"unit":"g","name":"mandorle a lamelle","sezione":"Per la farcitura"},{"qty":1.0,"unit":"n°","name":"manciata di arachidi","sezione":"Per la farcitura"},{"qty":1.0,"unit":"n°","name":"tuorlo e poco latte per spennellare","sezione":"Per la farcitura"}],"procedimento":"Preparazione:\nPreparate la frolla seguendo lo stesso procedimento delle genovesi ericine, che trovate cliccando QUI. Per la torta Marilina utilizzeremo metà dose. Una volta preparata la frolla, mettetela a riposare in frigorifero avvolta nella pellicola per un paio d’ore.\nNe frattempo preparate la crema: in una ciotola mescolate la ricotta (ben strizzata) con lo  zucchero, poi aggiungete l’uovo leggermente sbattuto. Mescolate ed aggiungete le gocce di cioccolato e gli amaretti sbriciolati.\nAdesso riprendete la frolla. Staccatene un panetto e su di un ripiano infarinato stendetela con un mattarello lasciando uno spessore non troppo sottile. Ricoprite il fondo dello stampo già imburrato/infarinato, ricoprendo anche i bordi. Con un coltello tagliate l’eccesso di frolla. Ora versate la crema e livellate. Aggiungete anche la crema mou (eventualmente scaldatela un pò a bagno maria per renderla più molle) e livellate. Staccate un altro panetto e stendete con il mattarello sempre su un ripiano infarinato. Coprite la torta e ritagliate l’eccesso con il coltello.\nOra sbattete il tuorlo con un pò di latte e spennellate la superficie della torta. Spolverate con le mandorle a lamelle e le arachidi. Cuocete in forno già caldo a 180° per circa 30 o 40 minuti (regolatevi in base al vostro forno). Modalità statico, posizione centrale. Sfornate la torta Marilina e lasciatela raffreddare completamente. Prima di servire, spolverate con zucchero a velo.\nDimenticavo: con la pasta frolla avanzata potrete fare degli ottimi biscotti 😉","note":"","tags":[],"_importId":16168},{"nome":"Ingredienti ricetta di","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti ricetta di \nDaniele Badursi e Daniela Salfi:\n- Farina 00 350g\n- Uova 4\n- Zucchero 200g\n- Olio di semi di girasole 150g\n- Scorza grattugiata di 2 limoni\n- Succo di 1 limone\n- Acqua 120g\n- Lievito per dolci 1 bustina (16g)\n- Granella di zucchero\nIl Video è anche qui ▶︎\nhttps://youtu.be/Gu_WTtLvZGo?si=0i81q7uDHwcObIuw","note":"","tags":[],"_importId":14599},{"nome":"Ingredienti ricetta di Daniele e Daniela:","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti ricetta di Daniele e Daniela:\n-  Farina 00 500g\n- Uova 2\n- Zucchero 150g\n- Olio extravergine di oliva 40ml\n- Olio di semi di girasole 40ml\n- Latte 60ml\n- Scorza grattugiata di 1 limone\n- Ammoniaca per dolci 9g (o lievito per dolci)\nIl Video è anche qui ▶︎  \nhttps://youtu.be/eyBqsiGf-Z4?si=8DWgfmpX3DEtQTWw","note":"","tags":[],"_importId":13499},{"nome":"Iniziamo la settimana con una colazione golosa","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Cottura) \n\nIngredienti:\n250 ml di latte tiepido\n10g. di lievito di birra fresco\n250 g. di farina 00\n250.di farina Manitoba\n10 g. di sale\n1 uovo intero\n50g.di zucchero\n50g.di burro morbido. \nX farcire:\n50 g. di burro fuso.\n200g.di cioccolato (io quello delle uova al latte) \nLatte  x spennellare. \n1cucchiaio di marmellata di albicocca x lucidare. \n\nProcedimento:\nIn una ciotola capiente sciogliere il lievito nel latte tiepidi con un cucchiaio di zucchero e 3 pugni di farina presi dal totale...coprite e fate attivare il lievito x circa 20 min. \nPoi aggiungere l'uovo lo zucchero e il sale, mescolare e poco alla volta incorporare la farina, quando inizia a prendere consistenza unite pian piano il burro.\nVersate il composto su di un piano leggermente infarinato e lavoratelo un po' quando è bello liscio e sodo fate una pagnottella e mettetela in una ciotola pulita e infarinata, fate lievitare coperto fino al raddoppio per  circa 2-3 ore.\nRiprendere la pagnottella di impasto e ribaltatela su di una spianatoia,formate un filone e dividete in 8 pezzi da circa 90 g. ognuno, date la forma di una pallina \"pirlando\" L'impasto e far riposare 15 minuti coperte da un telo. Riprendere le palline e stendere con il mattarello una alla volta in una sfoglia sottile larga circa 20 cm. \ndividere il cerchio ottenuto a metà, spennellare con il burro fuso,farcire in un angolo con il cioccolato tritato, con un taglia pizza fare 5 tagli perpendicolari  e vicini nell' angolo opposto e iniziare ad arrotolate tipo cono, continuare così anche con le altre palline. \nPosizionare i coni uno accanto all'altro in una teglia coperta con carta forno.Con l'ultima pallina realizzare una rosa arrotolando insieme le due metà di cerchio e metterla al centro\nFate lievitare al coperto x 40-50 minuti.\nSpennellare poi con latte la superficie e cospargere con poco zucchero. \nInfine cuocere in forno caldo modalità statica a\n 180 gradi x circa 30-35 minuti.\nUna volta fredda riscaldare poca marmellata e lucidare la superficie.","note":"","tags":[],"_importId":8427},{"nome":"Io questa focaccia","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina tipo 0 @mulinomarino"},{"qty":100.0,"unit":"g","name":"farina di farro bianco"},{"qty":300.0,"unit":"g","name":"acqua nella prima parte"},{"qty":10.0,"unit":"g","name":"sale"},{"qty":40.0,"unit":"g","name":"acqua restante nella seconda parte"},{"qty":50.0,"unit":"g","name":"olio extravergine di oliva"}],"procedimento":"PROCEDIMENTO\n\nImpastare tutto gli ingredienti tranne sale, 40 gr di acqua e l’olio extravergine d’oliva per circa 10 minuti. \nDopodiché inserire il sale e la restante acqua lentamente fino a farla assorbire completamente ed avere l’impasto liscio ed omogeneo. Se necessario fermarsi 10 minuti e poi riprendere ad impastare. \nAlla fine aggiungere l’olio e farlo assorbire all’impasto. \n\nFar lievitare il composto in una ciotola coperta da pellicola per 1 ora a temperatura ambiente. \n\nStendere delicatamente l’impasto sulla teglia fino i bordi e far lievitare per 45 minuti a temperatura ambiente ungendo bene la focaccia di olio extravergine in superficie. \n\nCottura in forno statico a 250 gradi per circa 25/30 minuti.","note":"","tags":[],"_importId":16586},{"nome":"Johnny Bassotto è una ricetta della cucina unbra","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina di mais fine"},{"qty":3.0,"unit":"cucchiaio","name":"liquore all’arancia"},{"qty":2.0,"unit":"n°","name":"mele a dadini"},{"qty":100.0,"unit":"g","name":"noci tritate grossolanamente"},{"qty":30.0,"unit":"g","name":"pinoli"},{"qty":100.0,"unit":"g","name":"uvetta ammollata in acqua calda"},{"qty":2.0,"unit":"cucchiaio","name":"olio extravergine d’oliva"},{"qty":150.0,"unit":"g","name":"eritritolo, sciroppo d’agave o sciroppo d’acero"}],"procedimento":"1. In una ciotola grande versa la farina di mais e aggiungi poco per volta l’acqua calda, mescolando con un cucchiaio di legno fino a ottenere una polentina morbida e fluida.  \n2. Unisci il lievito e mescola bene. Copri l’impasto e lascialo riposare a temperatura ambiente per circa 4 ore, così si addensa e si sente il profumo.  \n3. Aggiungi il dolcificante scelto, la scorza di limone, le noci, l’uvetta scolata, i pinoli e le mele a dadini. Versa anche il liquore all’arancia e l’olio extravergine, mescola delicatamente per amalgamare tutti gli ingredienti.  \n4. Versa il composto in una tortiera da 22-24 cm unta d’olio, livella la superficie con un cucchiaio. Cuoci in forno statico preriscaldato a 180°C per circa 50 minuti, finché sarà ben dorata.  \n5. Fai intiepidire, spolvera con zucchero a velo se vuoi e taglia a fette generose: perfetta da gustare anche il giorno dopo, magari leggermente riscaldata per esaltare il profumo.  \n💡 Una torta semplice, genuina e leggera che porta in tavola il sapore delle tradizioni e delle cose fatte con il cuore. Provala e lasciati conquistare! 🍂","note":"","tags":[],"_importId":15939},{"nome":"La amiamo tutti la torta al formaggio: una specie di","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La amiamo tutti la torta al formaggio: una specie di star della rete, che rimbalza di bacheca in bacheca con consigli e varianti. È una ricetta della tradizione umbra, saporita e antispreco, molto antica: un emblema della cucina monastica che stiamo imparando a riscoprire grazie a programmi televisivi di grande successo. L'ultima novità è La Cucina delle Monache, in onda ogni sabato alle 17:45 su Food Network canale 33 e disponibile in streaming su Discovery+. «Amiamo molto la torta al formaggio» conferma Madre Noemi, abbadessa del Monastero delle Benedettine di Sant’Anna, a Bastia Umbria, in cui si gira il programma: un paradiso di silenzi, natura, dove le monache pregano, lavorano, aiutano chi ha bisogno, anche cucinando ricette come questa. «La prepariamo tutto l'anno, perché è ottima e consente di recuperare formaggi che altrimenti rischierebbero di essere perduti» prosegue Madre Noemi, che è una delle quattro monache giovani e decisamente smart protagoniste della novità televisiva: l'ennesima prova - per chi ne avesse bisogno - che sono ancora tanti gli stereotipi sulla vita monastica.\nChi sono monache di La Cucina delle Monache\nDestinata alla serie A di pallacanestro, Madre Noemi ha poi fatto un'altra felice scelta di vita. Come lei Suor Debora, architetto ed esperta in cucina, ma anche Suor Miriam, che ha in tasca ben quattro lauree e infine Suor Eleonora, novizia, laureata in Psicologia con specializzazione in Psicoterapia. In La Cucina delle Monache raccontano della vita in monastero e nel frattempo donano ricette e amore, preparando piatti semplici e confortanti come i tozzetti, il pancotto alle verdure o, appunto, questa torta al formaggio secondo noi particolarmente emblematica.\nLe ricette di La Cucina delle Monache\n«Tutte le ricette che proponiamo durante il programma sono dello stile della torta al formaggio: sono ricette quotidiane, che si fanno con quello che si ha in casa, cercando di riutilizzare ingredienti che altrimenti potrebbero essere buttati via. Piatti che servono anche per spendere meno, una necessità di tutti» spiega Madre Noemi.\n«Ci scrivono in tantissimi, tutti molto entusiasti di poter fare facilmente i piatti che proponiamo. È bello sapere che facciamo compagnia a chi ci segue, ci sono tanti anziani che così si sentono molto meno soli» dice Madre Noemi, raccontando che i telespettatori mandano spesso consigli e commenti sulle ricette. «In tanti, per esempio, ci hanno raccontato che la torta al formaggio si fa anche in Abruzzo e nelle Marche, in versioni leggermente diverse» prosegue l'abbadessa, che in questa intervista racconta del programma, della vita in monastero, del perché il cibo è un conforto, e deve essere la via della felicità.\no mangiando meno d'estate e in periodi come la Quaresima. Di sicuro, i più confortevoli sono i dolci. Pensi al cioccolato: è uno di quegli alimenti che Dio ci ha donato per essere felici».\nSi può davvero peccare con la gola? «Il confine tra peccato e disordine è un po’ labile. Il peccato di gola è una perversione, una distorsione nel modo di approcciarsi al cibo, per provare piacere in modo egoistico nei confronti di noi stessi ma anche del prossimo, quando si fa per togliere questo cibo agli altri. Se si mangia qualcosa che piace, invece, si fa bene alla vita. Il Signore ci vuole felici.\nE voi, lo siete anche mangiando? «Certo: beato chi cucina, e beato anche chi mangia».\nLa ricetta della torta al formaggio delle monache\n\t\t\n  1/6 Native Share  Ingredienti 5 uova 500 g di farina 70 g di parmigiano grattugiato 70 g di pecorino romano grattugiato 50 g di Emmenthal 50 g di burro 50 g di lievito di birra 1 cucchiaio di strutto 150 g di capocollo olio sale \n Foto La Cucina delle Monache, Food Network          \n\t\t\n  2/6 Native Share  Procedimento Mescolate 150 g di farina con metà lievito, precedentemente sciolto in poca acqua a temperatura ambiente, e lavorate l’impasto con le mani fino a ottenere un panetto. Lasciate lievitare in un recipiente coperto per 30 minuti. Nel frattempo unite la farina rimasta con le uova, l’altra metà di lievito sbriciolato con le mani, lo strutto, il burro, i formaggi grattugiati e l’olio. Lavorate fino a ottenere un composto omogeneo. Poi aggiungete il panetto lievitato e impastate: dovete ottenere una pasta soffice. Trasferite l’impasto in una tortiera dai bordi alti e aggiungete l’emmenthal tagliato a cubetti. Lasciate lievitare coperto per 2 ore, fino a raddoppiare l’impasto.  Infornate a 180 gradi per 60 minuti fino a doratura completa facendo attenzione a non bruciare la torta. Servite fredda guarnita con il capocollo.   Foto La Cucina delle Monache, Food Network          \n\t\t\n  3/6 Native Share  La Cucina delle Monache Madre Noemi e Suor Debora.          \n\t\t\n  4/6 Native Share  La Cucina delle Monache Suor Eleonora e Suor Miriam Foto La Cucina delle Monache, Food Network.","note":"","tags":[],"_importId":10642},{"nome":"La Biova Mantovana","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"550 g semola rimacinata di grano duro - 300 g acqua - 30 g olio extra vergine - 25 g lievito di birra - 15 g sale\nSi impasta, si stagliano e si dà forma ai panetti senza necessità di far lievitare. Si lasciano riposare i panetti 45', si taglia ciascun panetto in profondità al centro e si inforna immediatamente,  altrimenti non si aprono e non si allargano.\nCottura a 180° ventilato per 25-30'","note":"","tags":[],"_importId":7172},{"nome":"La conoscete tutti la posizione yoga del \"saluto al","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"・cannella","sezione":"Per lo sciroppo"}],"procedimento":"Procedimento  ✍🏻\nLa sera prima preparate l’impasto del babka mettendo in una ciotola tutti gli ingredienti tranne il burro. Incordate bene l’impasto e quando sarà pronto aggiungete il burro. Formate una palla e mettete a lievitare per tutta la notte in frigo a 4 gradi.\nIl giorno seguente (dopo circa 12 ore) prendete l’impasto che era in frigo e stendetelo con un mattarello con spessore di 1 cm.\nPreparate nel frattempo il ripieno sciogliendo cioccolato e burro, aggiungete poi zucchero e cacao amato e mescolate. Stendete sull’impasto e poi arrotolate. Tagliate per lungo a metà e poi intrecciate i due lembi. Mettete a lievitare in uno stampo da plumcake o da pane in cassetta fino a raddoppio.  Quando sarà pronto infornete in forno preriscaldato statico a 180 gradi. Cuocete per circa 45 minuti. Nel frattempo preparate lo sciroppo metttendo in un pentolino tutti gli ingredienti e lasciando in infusione. Quando sarà pronto il babka sformate il tutto e irrorate con lo sciroppo. Lasciate raffreddare e servite ancora leggermente tiepido.","note":"","tags":[],"_importId":15560},{"nome":"La fermentazione naturale con lievito madre offre","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La fermentazione naturale con lievito madre offre numerosi vantaggi rispetto all'uso del lievito di birra. Innanzitutto, i prodotti da forno risultano più voluminosi e soffici grazie alla produzione di esopolisaccaridi che trattengono l'umidità e migliorano la struttura del pane. Inoltre, il lievito madre contribuisce a sviluppare aromi più complessi e gradevoli, grazie alla varietà di microrganismi coinvolti nella fermentazione.\nUn altro aspetto importante è l'aumento della conservabilità dei prodotti, poiché il lievito madre ritarda il proliferare delle muffe e il fenomeno della retrogradazione dell'amido, che è la principale causa del raffermamento del pane. Inoltre, il pane prodotto con lievito madre può avere una maggiore digeribilità e una moderata riduzione dell'indice glicemico.\nInfine, il lievito madre può migliorare l'assimilabilità dei micronutrienti presenti nel pane, poiché l'acidità attiva le fitasi che neutralizzano l'acido fitico, liberando sali minerali altrimenti non assimilabili. Questi benefici rendono il lievito madre una scelta eccellente per chi cerca un pane più sano e nutriente.\n350g dallagiovanna uniqua blu (tipo 1 forte)\n150g dallagiovanna la ricca\n360g acqua\n120g licoli\n13g sale\nimpasto diretto in spirale senza autolisi, 30 minuti di riposo, una piega coil fold e puntata di 4 ore a 26°C, preformatura, 30 minuti di riposo, formatura finale, 13 ore di appretto in frigo (5°C), incisione e cottura in pentola di ghisa.","note":"","tags":[],"_importId":15643},{"nome":"La forza della farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La forza della farina, inoltre determina anche la quantità di acqua che l’impasto assorbirà. Una farina molto forte, con una W molto alta, assorbirà molta più acqua di una farina debole, ossia con un basso W.\nUna farina forte quindi, assorbirà molta acqua e avrà un impasto più resistente, con una maglia glutinica più sviluppata e, quindi, un impasto a base di farina forte, per gonfiarsi, avrà bisogno di più tempo: da qui la necessità delle lunghe lievitazioni. Questo spiega perchè le farine con W alto sono utilizzate per la panificazione.\nFARINE DEBOLI, FARINE MEDIE E FARINE FORTI\nSono definite farine deboli quelle che fino a W 170 : la classica farina per dolci del supermercato, per intenderci, solitamente ha un W 140 o, massimo, un W 170. Le farine deboli sono appunto idonee alla preparazione di dolci senza lievito di birra. Sono farine adatte quindi alla preparazione di biscotti, pan di spagna, crostate, cialde e creme.\nSono definite farine medie quelle che vanno da W 180 a W 260 e si utilizzano per pane, panini, pizza e pasta fresca. Assorbono, generalmente una quantità di acqua che va dal 55% al 65% del loro peso. Ossia, 100 g di farina media assorbono dai 55 ai 65 g di acqua.\nSono definite farine forti le farine da W 280 a W 350. Si utilizzano per panificare e per la prepazione di lievitati dolci e salati, ma necessitano di lunghe lievitazioni: le famose lievitazioni in frigorifero. Si utilizzano solitamente per pane, pizza, pan brioche, babà o anche per la pasta all’uovo. Una farina forte assorbe dal 65% al 75% del proprio peso in acqua. Ossia, 100 g di farina forte assorbono dai 65 g ai 75 g di acqua.\nSono definite farine di rinforzo le farine oltre i W 350: sono farine che si mischiano alle farine più deboli in modo da rafforzarne la maglia glutinica rendendole più adatte alla panificazione. Le farine forti possono assorbire fino al 100% di acqua. Ossia, 100 g di farina forte può assorbire fino a 100 g di acqua. Un esempio di farina di rinforzo è la farina Manitoba (una farina forte di grano tenero prodotto in Canada).\nPiù è alta la quantità di proteine contenute all’interno della farina, più la farina sarà forte, quindi maggiore sarà la sua W .\nPiù è alta la quantità di proteine, maggiore sarà la sua W e più lunghi saranno i tempi richiesti per la lievitazione","note":"","tags":[],"_importId":8255},{"nome":"La mia crostata","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina 00"},{"qty":100.0,"unit":"g","name":"burro"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":150.0,"unit":"n°","name":"zucchero"},{"qty":0.5,"unit":"n°","name":"bustina lievito per dolci"}],"procedimento":"Procedimento :\nImpastare tutti gli Ingredienti:\nFomare una palla, avvolgerla nella pellicola trasparente  e in frigo almeno per 30 minuti.\nNel frattempo lavare bene tre nocepesca e tagliarle a fettine, metterle in un tegame on zucchero semolato e farle caramellate aggiungendo una noce di burro  e  farle raffreddare. Dividere l impasto in due, allargare l impasto con un martarello e metterlo in una teglia già imburrata. Fare dei buchetti nell impasto e disporre le fettine caramellate di nocepesca . Con il resto dell ' impasto, aiutando i con uno stampino tondo, ho creato dei rotondini di pasta che ho disposto intorno al bordo della crostata che ho messo in forno già preriscaldato a 180 °per 30 /35 minuti.\n\nBuon Ferragosto a tutti⛱️⛱️⛱️🌊🌊🌞🌞","note":"","tags":[],"_importId":14823},{"nome":"La mia solita crostata che mi accompagna da quasi 40","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La mia solita crostata che mi accompagna da quasi 40 anni....che torta vuoi che ti porta ?e i miei amici rispondono la tua crostata. \nIngredienti:300 gr farina,170 gr.burro,150 gr di zucchero,2 tuorli e un pò di albume,1/4 bustina di lievito. \nMarmellata a piacere. \nFaccio la frolla e la metto in frigo avvolta nella pellicola. \nStendo la frolla metto la marmellata e con il pennello stendo l'albume nelle dichiarazioni. \nCucino a 180 ° per mezz'ora.","note":"","tags":[],"_importId":11826},{"nome":"La mia “Torta di Ricotta e mandorle al Limone”favolosaaaaaa","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La mia “Torta di Ricotta e mandorle al Limone”favolosaaaaaa! Senza glutine/gluten freeRicetta:Trittare nel frullatore oppure nel robot da cucina…200 g di mandorle con130 g di zucchero di cannaUna presa di sale eLa scorza di un limone (prelevata con un pela patate) un bel giro di mixer……Poi aggiungere al composto della vaniglia oppure del essenza….3 tuorli60 g di olio extravergine d’oliva Il succo spremuto di mezzo limone (30 ml)e 200 gr di ricotta vaccinaUn breve giro di mixer e il composto e pronto.i 3 albumi che sono rimasti….montare a neve ferma,dopodiché aggiungere al composto di mandorle,mescolare delicatamente x nn smontare il composto,dal alto verso il basso.Una volta fatto…versare il composto nella tortiera di 18-20 cm (rivestita di carta forno)E versare sopra la torta un po di mandorle trittate grossolanamente.In forno a 170 gradi x 40-50 minFare sempre la prova stecchino ok?Una volta cotta e raffreddata,spolverata di zucchero a velo.E una torta talmente buona che non è da credere! Umida…cremosa…senza glutine,burro,farina,lievito….Con questa torta farete centro….un figurone!Veramente veramente ottima!!!!!#lemoncake #tortaricottamandorlelimone #almondcake #dolciconricotta #senzaglutine #senzaburro #senzafarina #light #lightcongusto👍😉😍🤗 #buonobuono #tortaallimone🍋🍰 #tortaricottaelimone🍋 #ricettefit #ricettelight #senzapeccato #fit #proteincake #tortaproteica #tortapiubuonadelmondo #tortatop #ricettatop❤️❤️ #tortadimandorle #almondrecipes","note":"","tags":[],"_importId":14524},{"nome":"La pizza della domenica","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.5,"unit":"kg","name":"farina caputo nuvola"},{"qty":1.0,"unit":"L","name":". scarso di acqua"},{"qty":3.0,"unit":"g","name":". di lievito totale"},{"qty":13.0,"unit":"n°","name":"ore di lievitazione di cui 8.5 in frigorifero"}],"procedimento":"4.5 ore di appretto (= il tempo che passa da quando fai le palline a quando le stendi)\nSon contento , è venuta buonissima \nManca solo il basilico ma ormai è freddo 😔","note":"","tags":[],"_importId":15579},{"nome":"LA RICETTA DEL PASTICCIERE SAL DE RISO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina 00"},{"qty":100.0,"unit":"g","name":"burro"},{"qty":75.0,"unit":"g","name":"zucchero"},{"qty":75.0,"unit":"ml","name":"vino bianco"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":null,"unit":"q.b.","name":"scorza d'agrumi"},{"qty":null,"unit":"q.b.","name":"cannella"},{"qty":null,"unit":"q.b.","name":"vaniglia"},{"qty":null,"unit":"q.b.","name":"olio di girasole"}],"procedimento":"Per cominciare metti le uova intere, lo zucchero, un pizzico di cannella, un pizzico di sale, le bacche di vaniglia tutto insieme in una ciotola molto capiente o nella bacinella della planetaria. Comincia a mescolare e poi aggiungi la farina 00.\nAggiungi il vino bianco, o un altro tipo di alcolico e poi la buccia degli agrumi. Continua a miscelare e aggiungi il burro. L'impasto sarà pronto quando lo vedrai liscio e quando si staccherà dalle pareti della ciotola senza problemi.\nFai riposare per almeno un'ora e poi usa il matterello per creare una sfoglia sottolissima, simile a quella di una lasagna. Anche un tirapasta va bene, per aiutarti nel lavoro.\nTaglia la sfoglia, magari con una rotella zigrinata per dare alle chiacchiere la caratteristica forma dentata e metti a friggere in abbondante olio di girasole a 180 °C. Bastano pochissimi secondi di cottura, vista la sfoglia sottile: quando le vedrai belle dorate e gonfie puoi toglierle dalla pentola e adagiarle in un piatto precedentemente coperto dalla carta assorbente.\nLascia raffreddare e poi fai nevicare lo zucchero a velo sulle tue chiacchiere per quel delizioso tocco di golosità in più","note":"","tags":[],"_importId":13707},{"nome":"La ricetta del risotto con la verza appartiene","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La ricetta del risotto con la verza appartiene sicuramente a quella categoria di ricette povere che affondano le loro origini nella storia più remota, quando i cereali, come il riso ma non solo, venivano cucinati con qualche verdura. Ovviamente la scelta delle verdure non dipendeva dal riforimento del supermercato bensì dalla stagione e da ciò che l'orto produceva\nEcco a voi la mia ricetta per 4 persone\n RISO 330 gr\nCAVOLO VERZA 1\nSPICCHIO DI AGLIO 1\nOLIO(EVO) 3 cucchiai da tavola\nBRODO VEGETALE q.b. da preparare precedentemente \nPEPE Q.B\nPARMIGIANO GRATTUGIATO q.b.  \nPer preparare un buon risotto con la verza dovrete procurarvi una bella palla di cavolo verza. Pulitela rimuovendo le prime foglie se risultano rovinate, quindi sfogliatelo. A questo punto lavate le foglie ed affettatele finemente.\nIn una  padella piuttosto capiente versate un  giro d'olio extravergine d'oliva, diciamo 3/4cucchiai. La padella dovrà essere capiente perchè il cavolo verza è piuttosto voluminoso soprattutto all'inizio della cottura.\nAggiungete al fondo d'olio uno spicchio d'aglio spellato e schiacciato.  Per quanto riguarda l'aglio potrete operare una scelta: se non vi piace sentire il sapore forte dell'aglio potrete optare per utilizzarlo in camicia magari appena appena schiacciato. \nSe, al contrario, vi piace molto il sapore dell'aglio in abbinamento con la verza e successivamente con il riso, potrete pensare di tritarlo molto finemente per ritrovarlo poi nel piatto. \nUnite anche il pepe  nella quantità desiderata\nPrima d'accendere il fuoco unite alla padella anche la verza precedentemente affettata, quindi accendete il fuoco e lasciate che si stufi dolcemente. Il fuoco dovrà essere dolce per evitare di bruciare la verdura. \nTenete sempre a portata di mano del buon brodo vegetale, o tutt'al più dell'acqua calda, per utilizzarlo qualora la verdura inizi a prendere colore.\n In una casseruola a parte, o meglio una risottiera, versate un giro d'olio extravergine d'oliva e versatevi il riso che dovrà tostare.\nFate tostare il riso a fuoco vivace fino a che i chicchi non diventeranno traslucidi, dovrete prestare molta attenzione nel mescolare continuamente il riso in modo tale da evitare che si bruci.\nQuando il riso avrà assunto un bel colore dorato e i chicchi saranno traslucidi, potrete aggiungere la verza che ormai si sarà ben appassita. Mescolate bene per amalgamare i due ingredienti.\nSe avete utilizzato l'aglio intero, sbucciato o in camicia che sia, è il momento di toglierlo per evitare che ve lo ritroviate in qualche piatto! \nA questo punto versate il brodo vegetale che potrete preparare con facilità mettendo a bollire in semplice acqua le classiche verdure: cipolla, carota, sedano, una patata e una zucchina \nAbbiate cura di utilizzare il brodo sempre ben caldo, addirittura bollente se possibile, in questo modo il risotto manterrà la temperatura corretta per una cottura omogenea, infatti qualora il brodo fosse freddo il risotto subirebbe continui sbalzi di temperatura. Al termine della cottura del risotto dovrete procedere con la mantecatura, ovvero l'aggiunta di ingredienti grassi che rendano il risultato finale ancora più cremoso. Togliete la casseruola dal fuoco poiché la mantecatura deve avvenire sempre fuori dal fuoco e aggiungete, in questo caso, del buon parmigiano grattuggiato, quindi mescolate energicamente.\nOra non vi resta che impiattare e gustarvi questo delicatissimo risotto \nBuona domenica amici belli🥰\n#risotto #Risotti #Verza #pranzoitaliano","note":"","tags":[],"_importId":11799},{"nome":"La ricetta della Mousse al limone della Costiera di","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"uova","sezione":"Per il Pan di Spagna alla vaniglia"},{"qty":20.0,"unit":"g","name":"tuorli","sezione":"Per il Pan di Spagna alla vaniglia"},{"qty":120.0,"unit":"g","name":"zucchero","sezione":"Per il Pan di Spagna alla vaniglia"},{"qty":60.0,"unit":"g","name":"farina","sezione":"Per il Pan di Spagna alla vaniglia"},{"qty":60.0,"unit":"g","name":"fecola","sezione":"Per il Pan di Spagna alla vaniglia"}],"procedimento":"Procedimento\nMontare le uova con lo zucchero, il limone grattugiato e la vaniglia. Unire farina e fecola setacciate e amalgamare bene. Versare il composto in un anello d’acciaio del diametro di 22 cm. Cuocere a 160 °C per 8/10 minuti.\nPer la bagna al limoncello\n70 g di acqua\n70 g di zucchero\n140 g di limoncello\n1 limone (la scorza fine)\nProcedimento\nFare bollire l’acqua con lo zucchero, lasciare raffreddare e unire il limoncello.\nPer la pasta frolla\n500 g di farina intera frolla tipo 1\n200 g di zucchero\n300 g di burro morbido\n60 g di tuorli\n50 g di uova intere\n2,5 g di sale\n1/3 di baccello di vaniglia Bourbon\n¼ di limone (la scorza grattugiata)\nCannella in polvere q.b.\nProcedimento\nDisporre a fontana la farina precedentemente setacciata e al centro emulsionare i tuorli con l’uovo, il sale, i semini del baccello di vaniglia, lo zucchero, il burro e la scorza di limone grattugiata. Amalgamare bene tutti gli ingredienti e lasciare assorbire pian piano tutta la farina. Impastare per un minuto e formare un panetto. Avvolgerlo nella pellicola e riporlo in frigorifero a raffreddare. Utilizzare la pasta frolla fredda, alla temperatura di 8-10 °C, per evitare facili rotture. Stendete allo spessore di 5 mm e ricavare un disco del diametro di 22 cm, bucare e spolverizzare di cannella in polvere. Cuocere nel forno preriscaldato a 170 °C per 20 minuti.\nPer la crema al limone\n70 g di tuorlo\n70 g di zucchero\n70 g di succo di limone\n70 g di burro\n½ baccello di vaniglia Bourbon\nProcedimento\nMescolare lo zucchero con i tuorli. Portare a ebollizione il succo di limone con la vaniglia, aggiungere ai tuorli e cuocere a 80 °C. Lasciare raffreddare e unire il burro cremoso. Mixare.\nPer la crema pasticcera al profumo di limone\n175 g di latte\n75 g di panna\n90 g di tuorli\n75 g di zucchero\n18 g di maizena\n1 baccello di vaniglia Bourbon\n2 g di sale\n3 limoni (la scorza)\nProcedimento\nPortare a ebollizione il latte e la panna con il baccello di vaniglia e la buccia di tre limoni. Mescolare i tuorli con lo zucchero, l’amido e il sale. Aggiungere la miscela di latte e panna bollente. Cuocere la crema e lasciare raffreddare velocemente.\nPer la mousse al limone\n500 g di panna\n90 g di crema al limone\n75 g di crema pasticciera profumata al limone\n60 g di zucchero\n60 g di acqua\n50 g di albume\n8 g di gelatina\n35 g di acqua\nProcedimento\nPreparare la meringa all’italiana. Cuocere lo zucchero con l’acqua fino alla temperatura di 121 °C. Versare lo sciroppo bollente a filo sull’albume e montare la meringa fino a raffreddamento. Semimontare la panna e miscelarla con la crema al limone e la crema pasticcera. Aggiungere la gelatina sciolta e idratata in acqua fredda. Incorporare la meringa fredda. Utilizzare subito.\nPer il girotorta\n185 g di farina\n150 g di burro\n150 g di uova\n95 g di zucchero invertito\n90 g di zucchero a velo\n50 g di latte intero\n2 g di lievito in polvere\n1 g di sale\ncolorante alimentare verde idro q.b.\nProcedimento\nSetacciare la farina con il lievito in polvere e trasferire in una bacinella capiente. Unire lo zucchero a velo. A parte miscelare le uova con lo zucchero invertito, il latte intero, il sale e il burro fuso. Emulsionare tutti gli ingredienti e lasciare riposare il composto per qualche ora in frigorifero.\nStendere su un foglio di silicone 600 g di composto. A parte tingerne con il colorante verde una piccola parte e con l’aiuto di un sac à poche dalla punta molto sottile creare un decoro a piacere. Cuocere il girotorta in forno a 220 °C per 9 minuti. Lasciare raffreddare e tagliare a strisce alte 3,5 cm. Foderare un cerchio d’acciaio del diametro di 26 cm, alto 4 cm.\nPer la gelatina al limone\n225 g di gel glassa neutra\n0,05 g di colore idrosolubile giallo\n10 g di scorza di limone\n20 g di succo di limone\nProcedimento\nRiscaldare la glassa a 40 °C e aggiungere il succo di limone, la buccia e qualche goccia di colorante giallo. Glassare la superficie del dolce una volta raggiunta la congelazione.\nComposizione del dolce\nPreparare il girotorta e disporlo all’interno del cerchio d’acciaio. Adagiare al centro il biscotto di pasta frolla e ricoprire con uno strato di mousse al limone. Inserire un disco di Pan di Spagna inzuppato con la bagna al limoncello. Completare la torta con la mousse al limone fino al bordo del cerchio. Congelare in abbattitore, glassare con la gelatina al limone e decorare.","note":"","tags":[],"_importId":10955},{"nome":"La ricetta della torta di mele senza farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La ricetta della torta di mele senza farina\nIngredienti \n500 g di mele Golden 3 uova 80 g di zucchero 1 cucchiaio di miele 1 manciata di uvetta sultanina ammollata e strizzata 1 bicchierino di Marsala il succo e la scorza di un limone non trattato.\n\nProcedimento\nPer prima cosa sbucciate e tagliate a fettine le mele, mettetele in una ciotola e ricopritele con il succo di un limone, perché non anneriscano. \n\nA parte mescolate lo zucchero con le uova, aggiungete l'uvetta sultanina, il Marsala, il miele, la scorza grattugiata di un limone, metà delle mele sgocciolate e mettete tutto l'impasto in una tortiera ricoperta da carta da forno imburrata. \n\nDisponete le restanti mele sgocciolate a raggiera sulla superficie e infornate la torta a 170° per 50 minuti circa. \n\nQuando sarà cotta, aspettate una decina di minuti prima di sformarla. \nPotete servirla tiepida con del gelato alla crema.\n\nRicetta della torta di mele senza burro \nIngredienti\n200 g di farina integrale 3 mele rosse o Golden delicious 1 limone 2 uova 120 g di zucchero di canna 120 ml di latte  60 ml di olio di semi di arachidi  cannella in polvere qb noci qb 40 g di uvetta 1 bustina di lievito per dolci\\\n\nProcedimento\nTagliate le mele a fettine sottili e bagnatele con il succo di limone. Mettete in ammollo l’uvetta in acqua per 20 minuti e intanto in una ciotola montate le uova con lo zucchero di canna e la cannella fino ad ottenere un composto chiaro e spumoso. Aggiungete il latte sempre continuando a mescolare e unite la farina integrale setacciata insieme al lievito. Poi aggiungete l’olio di semi, sempre continuando a montare, e infine l’uvetta strizzata, la cannella e due mele tagliate a pezzettini piccoli. Mescolate delicatamente e trasferite il composto in una tortiera da 22 cm unta e infarinata.  Aggiungete le altre mele tagliate a fettine in superficie e qualche noce tritata grossolanamente. Aggiungete un po’ di zucchero in superficie e cuocete in forno preriscaldato e statico a 180° per circa 40 minuti.\nFarine alternative per la torta di mele\nPer la torta di mele senza burro, oltre alla classica farina integrale, potete utilizzare anche una farina integrale di farro se preferite, ma la consistenza sarà leggermente più \"gommosa\". Nell'impasto potete aggiungere 50 g di farina di nocciole o mandorle per renderlo più gustoso e anche più ricco e se volete potete sostituire le mele con le pere, oppure utilizzare entrambe i frutti. Per una versione glutee free utilizzate la stessa quantità di farina di riso. Non potete fare a meno delle gocce di cioccolato? Come darvi torto! Aggiungetele leggermente infarinate o congelate così non precipiteranno sul fondo durante la cottura.  Se volete invece rinunciare alle farine, potete anche provare una ricetta di torta di mele senza farina.\nStampi diversi, dolci diversi\nCon lo stesso procedimento e le stesse dosi potete preparare un plumcake, una ciambella o anche dei muffin. Potete tagliare a fette il plumcake e congelarlo per decongelarlo all'occorrenza.  Vale la stessa cosa ovviamente anche per la torta e i muffin.\n\nRipieno per torta cioccolato\nGli ingredienti da utilizzare per creare il ripieno sono:\n2 uova\n40 gr di farina 00\n60 gr di zucchero semolato\n130 gr di latte\n150 gr di noci\n200 gr di cioccolato fondente\n200 gr di ricotta\nPer preparare il ripieno, mentre il panetto riposa in frigo, facciamo sciogliere a bagnomaria il cioccolato e in un’altra ciotola tritiamo le noci. Successivamente versiamo in un’altra ciotola lo zucchero e la ricotta e cominciamo a mescolare il tutto. Dopo possiamo aggiungere il cioccolato, le uova e il latte. A questo punto possiamo unire le noci al composto e aggiungere la farina per renderlo più compatto.","note":"","tags":[],"_importId":10159},{"nome":"La ricetta della torta paesana di Davide Longoni","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La ricetta della torta paesana di Davide Longoni\nChi meglio di un panificatore per realizzare un’ottima torta di pane? La ricetta è di Davide Longoni, artigiano che conta sette insegne a Milano.\nIngredienti\n250 g di pane raffermo senza crosta\n1 l di latte\n200 g di biscotti secchi\n\n200 g di amaretti tipo Saronno\n2 uova\n150 g di cacao amaro\n100 g di cioccolato fondente a scaglie\n100 g di zucchero di canna\n200 g di uvetta ammollata\n50 g di cedro candito\nPinoli\nPangrattato\nRhum\nFar ammollare il pane nel latte in frigorifero per circa 2/3 ore. Aggiungere gli altri ingredienti e impastare fino a ottenere un composto omogeneo. Versare l'impasto in una teglia precedentemente imburrata e spolverare di pangrattato. Decorare con i pinoli e cuocere in forno a 180°C per 45 minuti.","note":"","tags":[],"_importId":12098},{"nome":"La ricetta di Fulvio Marino dei bordi di focaccia","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La ricetta di Fulvio Marino dei bordi di focaccia \nIngredienti bordi di focaccia: 500 g di farina 0, 6 g lievito di birra fresco, 300 ml di acqua, 25 ml olio, 12 g sale\n100 ml acqua, 100 ml olio evo, 15 g sale\nNella ciotola versiamo la farina 0 e l’acqua, il lievito fresco di birra sbriciolato e iniziamo a impastare con il cucchiaio, impastiamo bene poi anche con le mani sempre nella ciotola. Dop 10 minuti di lavoro aggiungiamo il sale e il resto dell’acqua, impastiamo ancora. Quando l’impasto ha una bella consistenza versiamo l’olio di oliva e completiamo l’impasto fino a fare assorbire tutto l’olio. Fulvio aggiunge l’olio in due tempi.\nFacciamo la prima lievitazione di due ore a temperatura ambiente. \nL’impasto lievitato lo allarghiamo un po’ sul tavolo, ci aiutiamo con un pochino di farina e otteniamo la forma di un filone spesso meno di mezzo cm. Tagliamo a fette spesse massimo 2 cm e disponiamo sulla teglia foderata con la carta forno. Con le mani allunghiamo un po’ queste fette di impasto. Copriamo e facciamo lievitare di nuovo a temperatura ambiente per circa 45 minuti. \nAdesso sarà più semplice tirare queste fette di impasto, le tiriamo dalle due estremità e le allunghiamo, devono raggiungere i bordi della teglia.\nPassiamo alla salamoia che facciamo con acqua, olio, sale mescolati. Spennelliamo la salamoia sulle strisce di impasto, lo facciamo con le dita creando le fossette tipiche della focaccia. Completiamo con sale grosso e mettiamo in forno statico a 230° per circa 15 minuti.","note":"","tags":[],"_importId":15173},{"nome":"LA SCROCCHIARELLA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 0"},{"qty":3.0,"unit":"cucchiaio","name":"olio evo"},{"qty":10.0,"unit":"g","name":"sale"},{"qty":150.0,"unit":"g","name":"acqua"}],"procedimento":"Tirare sottile e fare 3 pieghe, ripassare col mattarello e rifare le pieghe, questo per 3 volte.\nSpennellare con olio evo, mettere un po' di sale grosso e rosmarino (io non ne avevo)\nIn forno a 200 gradi per 15 minuti","note":"","tags":[],"_importId":12141},{"nome":"La super focaccia!","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La ricetta che non lascio più!\n330 gr acqua\n10 gr lievito di birra\n1 cucchiaino di zucchero\n550 gr farina ( semola e 00)\n30 ml olio di oliva\n1 cucchiaino di sale\nDivido l'impasto in due e lo stendo con le dita direttamente nelle teglie che ho unto con due cucchiai d'olio ognuna.\nFaccio lievitare per cca 2 ore nel forno con la luce accesa.\nPer spalmare sopra due cucchiai di olio e mezzo bicchiere di acqua,un cucchiaio di sale e erbe aromatiche ( origano e rosmarino)\n15/20 minuti, forno riscaldato 240 gradi.","note":"","tags":[],"_importId":9696},{"nome":"LA TISANA AL CARCIOFO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Gli arabi avevano importato il carciofo in occidente intorno al 1200, infatti il nome attuale carciofo deriva proprio dall'arabo al kharshuf. Già in medioriente erano note le proprietà benefiche del carciofo, pianta di cui si apprezzava anche la versatilità in cucina.\nL'infuso o la tisana preparati con le foglie di carciofo sono davvero miracolosi dal punto di vista distimolazione della diuresi ed eliminazione delle tossine. Il sapore è molto amaro, ma il beneficio è assicurato: la pancia si sgonfia, si eliminano liquidi in eccesso, si riattiva la circolazione.\nLe sostanze contenute nel carciofo come la cinarina,un principio attivo che favorisce la diuresi e la secrezione biliare, sono in grado infatti di depurare il fegato; il carciofo è un alimento ipocolesterolemizzante, ovvero che ha un effetto positivo anche sul sistema cardiocircolatorio, grazie alla presenza di inulina.\nÈ anche una fonte preziosa di potassio e sali di ferroe la presenza di acido colorogenico lo rende un fantastico antiossidante.\nSe il suo sapore vi piace in ricette con la pasta, con le uova o alla giudea, il carciofo può diventare leggermente amaro se bevuto come tisana. Ma con qualche ingrediente il più il suo gusto può diventare più gradevole.\nLeggi anche Il carciofo, amico valido del fegato\nTisana al carciofo, preparazione e uso\nLa preparazione di una tisana depurativa a base di carciofo è piuttosto semplice.\nSe ne possono preparare di 3 tipi:\nsolo con foglie di carciofo, per chi non teme l’amaro; \ncarciofo e finocchio (qualche frutto), per chi vuole aggiungere un’azione carminativa e sgonfiante; \ncarciofo (30 grammi), cicoria radice (15 grammi), un pezzetto di radice di liquirizia, poche foglie di menta piperita e melissa, per “addolcire” il sapore un po' sgradevole del carciofo.\nPer la preparazione delle 3 tisane, sarà sufficiente far bollire una tazza d’acqua, spegnere il fuoco e lasciare in infusione per un quarto d'ora circa.\nSuccessivamente si dovrà provvedere al filtraggio e poi si potrà bere, a piccoli sorsi. Si consiglia di non aggiungere del dolcificante, ma se non riuscite a farne a meno perché troppo amara, un cucchiaio di miele d’acacia potrà venirvi in aiuto.\nLa tisana a base di carciofo diventa un perfetto coadiuvante nelle diete depurative e disintossicanti, ideali per risvegliare l’organismo e schiudere il corpo all’arrivo della primavera.\nDiventa un ottimo alleato per contrastare gli effetti nocivi delle abbuffate invernali e rimettere in funzione i vari organi; l’ideale sarebbe assumerne un paio di tazze al giorno, lontano dai pasti, per un mese circa.\nNota bene: il mese di febbraio, il più breve, può essere scelto come mese depurativo per eccellenza: tisana di carciofo mattina e sera, depurazione con l’argilla verde appena svegli, tanto sport e niente alcolici!","note":"","tags":[],"_importId":1261},{"nome":"La torta mele e ricotta soffice","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La torta mele e ricotta soffice, facilissima da preparare, senza dover montare nulla, senza burro, morbida e umida all’interno. Golosissima, merenda o colazione perfetta per tutta la famiglia che si prepara in poco tempo e si inforna subito. Potrete farla fare direttamente ai bambini…si divertiranno tantissimo.\nE ora…\nBeh, allacciate il grembiule…!\nLulù\n  TORTA MELE E RICOTTA\nCategoria: Torte, dolci senza burro\nIngredienti per uno stampo da 20/22: 250 gr farina 00\n250 gr ricotta\n150 gr zucchero\n50 ml latte\n2 uova intere\n1 bustina di lievito per dolci\n2 mele grandi\nzucchero di canna\nzucchero a velo\nProcedimento per fare la torta mele e ricotta:\n\nMettete la farina in una ciotola insieme alla ricotta, le uova, il latte e lo zucchero e mescolate in modo da amalgamare tutto il composto. Unite per ultimo anche il lievito per dolci e mescolate in modo che non ci siano grumi. Va bene anche un cucchiaio. Unite una delle due mele sbucciate e tagliate a dadini e uniformate tutto. Versate il composto in una teglia con carta forno oppure oleata o imburrata e livellate la superficie. Decorate la superficie con l’altra mela sbucciata e tagliata a fettine sottili. Cospargete la superficie della torta con zucchero di canna e cuocete la torta in forno preriscaldato a 170° per 35/40 minuti circa. Fate sempre la prova stecchino per controllare se è cotta. Una volta completamente raffreddata potete spolverizzare con zucchero a velo.","note":"","tags":[],"_importId":1034},{"nome":"La Torta salata di verza","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00","sezione":"Per la pasta brisé"},{"qty":150.0,"unit":"g","name":"burro","sezione":"Per la pasta brisé"},{"qty":80.0,"unit":"g","name":"acqua fredda","sezione":"Per la pasta brisé"},{"qty":1,"unit":"n°","name":"pizzico di sale","sezione":"Per la pasta brisé"},{"qty":1.0,"unit":"n°","name":"cavolo verza","sezione":"Per la farcia"},{"qty":5.0,"unit":"n°","name":"patate del fucino","sezione":"Per la farcia"},{"qty":500.0,"unit":"g","name":"salsiccia luganega","sezione":"Per la farcia"},{"qty":1.0,"unit":"n°","name":"aglio","sezione":"Per la farcia"},{"qty":200.0,"unit":"g","name":"parmigiano","sezione":"Per la farcia"},{"qty":3.0,"unit":"n°","name":"uova","sezione":"Per la farcia"},{"qty":null,"unit":"q.b.","name":"pan grattato","sezione":"Per la farcia"},{"qty":null,"unit":"q.b.","name":"olio extravergine d’oliva","sezione":"Per la farcia"},{"qty":null,"unit":"q.b.","name":"sale","sezione":"Per la farcia"},{"qty":null,"unit":"q.b.","name":"pepe","sezione":"Per la farcia"}],"procedimento":"Procedimento\nPer la pasta brisée\nMettete il burro freddo a pezzetti in un mixer (cutter) insieme alla farina, al sale e all’acqua fredda. Frullate a più riprese, fino a ottenere un impasto amalgamato. Formate una palla, chiudetela nella pellicola e lasc
