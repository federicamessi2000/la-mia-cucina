piuttosto compatto e liscio (6).\n  Formate un panetto, avvolgetelo nella pellicola trasparente (7), quindi lasciatelo riposare in frigorifero per 30 minuti. \n\nNel frattempo preparate la crema alla ricotta e cioccolato: versate in un mixer dotato di lame la ricotta, lo zucchero semolato (8) e i semi di una bacca di vaniglia (9).\n  Aggiungete 1 uovo (10) e frullate fino ad ottenere un composto denso ed omogeneo (11). Trasferite la crema in una ciotola e aggiungete il cioccolato tritato finemente (12);\n  mescolate con una spatola (13), coprite con la pellicola trasparente e mettete in frigorifero. \n\nTrascorso il tempo necessario (14), stendete l’impasto al cacao con il mattarello, utilizzando meno farina possibile, ad uno spessore di 6-7 mm formando un cerchio (15).\n  Con un pennello imburrate leggermente uno stampo da torta da 24-25 cm (in alternativa potete usare uno stampo da crostata) (16). Con l’aiuto del mattarello foderate la tortiera con la frolla (17), facendo aderire bene i bordi (18).\n  Tagliate le parti di pasta in eccesso, tenendo il bordo alto almeno 2 cm: mettete da parte e ricompattate i ritagli, vi serviranno per la decorazione finale (19). Bucherellate il fondo con i rebbi di una forchetta (20), e coprite con un foglio di carta forno che riempirete con legumi secchi o sfere di porcellana per la cottura alla cieca (21). Infornate in forno statico preriscaldato a 175° per 20 minuti (o a 155° per 12 minuti se in forno ventilato). Trascorso questo tempo, rimuovete le sfere di ceramica (o i legumi) e la carta da forno e lasciate cuocere per altri 5 minuti sempre alla stessa temperatura. Una volta pronta, sfornate e lasciate raffreddare.\n  Versate la crema di ricotta all’interno della frolla ormai fredda (22) (potete anche porre il ripieno in una sac-à-poche senza bocchetta a cui praticare un foro) e livellate la farcitura con un cucchiaio (23). Stendete la frolla avanzata sul piano di lavoro leggermente infarinato e ricavate delle strisce larghe 6 mm e dello spessore di 2-3 mm con una rotella dentellata (24). \n  Sistemate le strisce di frolla sulla crema alla ricotta in obliquo (25) in modo da formare delle losanghe (26). Cuocete nuovamente in forno statico preriscaldato a 175° per 10-15 minuti (o a 155° per 8-10 minuti se in forno ventilato). Una volta pronta, fatela raffreddare completamente; infine potrete servire la vostra crostata al cacao con crema alla ricotta e cioccolato (27).\nConservazione\nPotete conservare la crostata al cacao con crema alla ricotta e cioccolato in frigorifero per 2-3 giorni, coperta con pellicola o posta in un contenitore ermetico. Quando dovete servirla, fatela riposare almeno 15 minuti a temperatura ambiente prima di offrirla. Si può congelare se avete utilizzato ingredienti freschi non decongelati.","note":"","tags":[],"_importId":260},{"nome":"Crostata al cioccolato e caramello con fleur del sel","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti (per 8 persone) Per la frolla 260 g di Farina tipo 00 per Dolci 150 g di burro freddo a cubetti 90 g di zucchero a velo 1 uovo 1 pizzico di sale fino\nPer il caramello salato 200 g di zucchero semolato 40 g di acqua 80 g di panna fresca (scaldata) 30 g di burro 1 pizzico di sale fino\nPer la glassa al cioccolato 120 g di cioccolato fondente 70%, tritato 100 g di panna fresca 30 g di miele\nPer finitura Fiocchi di sale Maldon\nProcedimento Per la frolla Per prima cosa, in una ciotola (o nel mixer con lame metalliche) unite farina, zucchero a velo e sale. A questo punto aggiungete il burro e lavorate velocemente con la punta delle dita fino a ottenere una consistenza sabbiosa. Ora incorporate l’uovo e impastate quanto basta per formare un panetto, poi appiattitelo con le mani, avvolgetelo nella pellicola e riponetelo in frigorifero per 1 ora. Trascorso il tempo di riposo, stendete la frolla a 3 mm di spessore e foderate uno stampo per crostate. Bucherellate il fondo con i rebbi di una forchetta e riponete nuovamente lo stampo in frigorifero per 30 minuti. Ora coprite la base con carta forno, ricoprite con sfere di ceramica o legumi secchi e cuocete l’impasto “in bianco” in forno statico, preriscaldato a 170°C per 22 minuti. Rimuovete quindi carta e pesetti e proseguite la cottura per altri 6–8 minuti, poi lasciate raffreddare completamente la frolla prima di sformarla.\nPer il caramello Versate zucchero e acqua in una casseruola dal fondo spesso, poi cuocete a fiamma media senza mescolare, ruotando il pentolino solo occasionalmente. Proseguite la cottura fino a ottenere un caramello dal colore ambra/nocciola, toglietelo dal fuoco e aggiungete la panna calda a filo, mescolando con una frusta. Unite il burro, amalgamate bene e aggiungete il sale, poi versate il caramello tiepido nel guscio di frolla e ruotate delicatamente la tortiera per distribuirlo in modo uniforme. Successivamente, lasciatelo raffreddare in frigorifero per 45–60 minuti.\nScaldate la panna con il miele fino al bollore, poi togliete dal fuoco e versate il composto caldo sul cioccolato tritato. Mescolate fino a ottenere una ganache liscia e lucida e, quando è tiepida, colatela in un unico gesto sul caramello ormai freddo e ruotate nuovamente la tortiera per farla distribuire uniformemente. Lasciate riposare 5 minuti, poi decorate con fiocchi di sale Maldon. Infine, trasferite la torta in frigorifero per 1–2 ore prima del taglio","note":"","tags":[],"_importId":15724},{"nome":"CROSTATA AL CIOCCOLATO E MARMELLATA DI ARANCE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":270.0,"unit":"g","name":"farina 00"},{"qty":30.0,"unit":"g","name":"cacao amaro in polvere"},{"qty":60.0,"unit":"g","name":"olio di semi o di oliva"},{"qty":80.0,"unit":"g","name":"zucchero"}],"procedimento":"Un cucchiaio mediano di marmellata di arance oppure la buccia grattugiata di un'arancia \n\t\t1 uovo \n\t\t1 cucchiaino Lievito in polvere per dolci\nMarmellata di arance\nCrema al cioccolato \n300 gr Ricotta asciutta\n70 gr Zucchero al velo \n75  gr Cioccolato Fondente Lindt 85%(fuso nel microonde)\nGranella di mandorle 1hg\nRicotta + zucchero \nPoi aggiungere cioccolato fuso e mandorle tritate\nBase di pasta frolla al cioccolato \nSopra marmellata di arance e sopra crema al cioccolato e mandorle \nFinire con strisce di pasta frolla \nTempo cottura 40 min a 180 gradi","note":"","tags":[],"_importId":8537},{"nome":"Crostata con crema al limone","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":320.0,"unit":"g","name":"pasta frolla pronta"},{"qty":2.0,"unit":"n°","name":"limoni bio"},{"qty":4.0,"unit":"n°","name":"uova"},{"qty":120.0,"unit":"g","name":"zucchero semolato"},{"qty":200.0,"unit":"ml","name":"panna fresca"},{"qty":30.0,"unit":"g","name":"amido di mais"}],"procedimento":"Preparazione\n● Foderate con la carta da forno la base di una tortiera da 22 cm di diametro, poi imburrate e infarinate i bordi. \n● Infarinate il panetto di frolla e tiratelo con il matterello allo spessore di poco più di 1/2 cm, quindi adagiate la sfoglia nella tortiera. Con i rebbi di una forchetta bucherellate il fondo e tagliate la pasta in eccesso.\n● Coprite il guscio di frolla con un foglio di carta da forno tagliato a misura, riempite con legumi secchi (o palline in ceramica o altro materiale idoneo) per non far aumentare di volume la pasta in cottura, e trasferite la tortiera in forno preriscaldato a 180°C per 10 minuti circa. \n● Nel frattempo occupatevi della farcitura. Lavate accuratamente i limoni, grattugiatene la scorza (solo la parte gialla) e spremetene il succo. \n● Versate scorza e succo in una ciotola e unite, sempre rimestando con la frusta a mano, l'amido di mais setacciato, lo zucchero e un pizzico di sale, mescolando bene per farli sciogliere. \n● Aggiungete le uova e mescolate ancora, senza montarle troppo; in ultimo versate la panna, quindi amalgamate sempre con le fruste fino a ottenere una crema omogenea.\n● Levate la base di frolla dal forno, eliminate la carta e i legumi, lasciatela intiepidire e versatevi la crema al limone, filtrandola con un colino.\n● Rimettete la crostata in forno a 170°C per altri 35 minuti circa, così da ultimare la cottura. Sfornate, fate raffreddare e spolverizzate con lo zucchero a velo setacciato prima di servire.\n\nCarla Marchetti\nI consigli di Carla\n● Per preparare la pasta frolla: 150 g di farina 0, 75 g di zucchero, 70 g di burro, 1 uovo, 1 limone bio, sale. Disponete la farina setacciata a fontana. Al centro versate lo zucchero, un pizzico di sale e unite il burro freddo di frigo e tagliato a pezzettini. Iniziate a mescolare con la punta delle dita zucchero e burro, poi aggiungete l'uovo e la scorza del limone grattugiata. Continuate a mescolare incorporando la farina poco alla volta: otterrete delle grosse briciole umide che dovrete compattare, senza però lavorare eccessivamente l’impasto. Formate una palla, schiacciatela e avvolgetela con la pellicola alimentare; fatela riposare in frigo per circa un'ora. Si conserva anche 2 giorni e la potete congelare (in freezer dura 3 mesi).\n● Questa crostata è buonissima appena raffreddata, ha un gusto aspro molto gradevole ma piuttosto forte. Se volete potete smorzare il sapore del limone utilizzando una dose ridotta di scorza. Ottima anche dopo 2 o 3 giorni: i sapori si fonderanno perfettamente. Va conservata in frigorifero.","note":"","tags":[],"_importId":846},{"nome":"CROSTATA CON LA MARMELLATA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ti svelo un piccolo trucco di famiglia: mettere un pochino di lievito per dolci nella farina! Credimi, la crostata sarà ancora più buona, più alta e morbida, fragrante e friabile. Ovviamente è solo un consiglio, e puoi non metterlo. \nCon queste dosi ottieni una crostata media da 8-10 fette per uno stampo da 26 cm, se la vuoi più grande o devi farne due, raddoppia semplicemente gli ingredienti (lievito in polvere compreso).\n\t\t250 gFarina 0 (oppure doppio zero)\n\t\t1Uova (intero, a temperatura ambiente)\n\t\t100 gZucchero\n\t\t100 gBurro (sciolto)\n\t\t300Marmellata (oppure Confettura, quella che preferisci)\n\t\tLievito in polvere per dolci (un cucchiaino raso )\nCOME PREPARARE LA CROSTATA CON LA MARMELLATA\n  Rompi l’uovo intero in una scodella, aggiungi lo zucchero e mescola con una frusta fino ad ottenere una crema liscia. Sciogli il burro al microonde oppure in un padellino, lascialo intiepidire e uniscilo alla crema, quindi mescola con vigore qualche secondo.\nOra versa la farina un po’ alla volta (alla quale avrai unito il lievito) e continua a mescolare, fino a rendere l’impasto consistente.\nCon le mani lavora velocemente l’impasto formando una palla\nRovesciala sul piano da lavoro, essendo una frolla piuttosto morbida e “unta”, spolvera il tavolo con un poco di farina, però mi raccomando lavora pochissimo l’impasto! La frolla non va maneggaiata tanto, altrimenti si rovina e perde friabilità.\nOra forma il panetto o la palla, avvolgila nella pellicola trasparente e lasciala riposare su un piatto in frigorifero per almeno due ore.\nCONSIGLIO PER NON ROMPERE LA FROLLA DURANTE LA STESURA\n\t\tLa pasta frolla è un tipo di impasto che, maneggiandolo troppo si scalda subito, diventando morbidissima. Questo spesso impedisce di lavorarla serenamente, impazzendo al momento della stesura del disco o delle losanghe. Il problema si risolve facilmente facendola riposare a lungo in frigorifero, in modo da farla rassodare perfettamente. Spesso io, la lascio in frigorifero anche tutta la notte, e poi il giorno dopo la tiro fuori dieci minuti prima di usarla. Il panetto resterà semiduro, e durante la stesura non avrà tempo di scaldarsi e rompersi! Inoltre, stendi il panetto tra due fogli di carta forno, sarà ancora più semplice. \nDopo aver fatto riposare la frolla, riprendi il panetto dal frigorifero e stacca un quarto di impasto che terrai da parte per le losanghe (rimettilo in frigorifero), e il resto stendilo tra due fogli di carta forno allo spessore di 4 millimetri circa, ottenendo un disco leggermente più grande del diametro dello stampo (per queste dosi usa uno stampo da 24 -26 cm).\n5                                \n  Dopo aver fatto riposare la frolla, riprendi il panetto dal frigorifero e stacca un quarto di impasto che terrai da parte \nImburra e infarina lo stampo battendo via la farina in eccesso (c’è chi imburra e basta, ma io infarino anche e si stacca benissimo restando ben biscottata sotto), quindi arrotola delicatamente il disco di frolla sul matterello, e poi srotolalo sopra lo stampo. Oppure aiutati con la carta forno, capovolgendolo sopra lo stampo. In ogni caso sii veloce e deciso nei movimenti, tanto poi l’aggiusti modellandola con le mani.\nSistema il disco di frolla con le dita, formando anche il bordo tutto intorno e tagliando via quello in eccesso, quindi bucherella il fondo con i rebbi di una forchetta.\nVersa la marmellata o la confettura che hai scelto all’interno della frolla e spalmala bene.\nSCALDA IL FORNO A 180°C STATICO, così nel frattempo che termini la crostata, arriva a temperatura.\nUtilizza i due fogli di carta forno in cui avevi steso la base della crostata, per stendere il pezzo di impasto che avevi staccato, così da fare le losanghe.\nStendi un nuovo disco, sempre di 3-4 millimetri, e con una rotella dentata ricava le strisce per la crostata. Prendi ogni losanga delicatamente e adagiala sulla superficie della crostata, mettendole a incrocio.\nInforna la crostata con la marmellata a forno statico a 180° C per circa 35 – 40 minuti, tutto dipende dal tuo forno. Quando la frolla sarà ben colorita e profumata, puoi sfornare!\nScalda il forno sia sopra che sotto, e inforna la crostata a metà o leggermente più in basso.\nIo, gli ultimi 5-6 minuti metto il forno ventilato, abbassando a 160-170° C…mi sembra che venga ancora più friabile (magari è solo un’impressione!)\nSforna la tua crostata con la marmellata ricetta classica della Nonna, e prima di gustarla per colazione e merenda, farla freddare benissimo.\nCOME CONSERVO LA CROSTATA CON LA MARMELLATA?\nConserva la crostata con la marmellata in un luogo fresco e asciutto, coperta con un canovaccio di cotone oppure all’interno di un porta torte. L’estate puoi tenerla anche in frigorifero.","note":"","tags":[],"_importId":9727},{"nome":"Crostata delizia di mandorle","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00","sezione":"Per la pasta frolla"},{"qty":120.0,"unit":"g","name":"burro freddo a pezzetti","sezione":"Per la pasta frolla"},{"qty":100.0,"unit":"g","name":"zucchero","sezione":"Per la pasta frolla"},{"qty":1.0,"unit":"n°","name":"uovo intero + 1 tuorlo","sezione":"Per la pasta frolla"},{"qty":1.0,"unit":"pizzico","name":"sale","sezione":"Per la pasta frolla"},{"qty":100.0,"unit":"g","name":"farina di mandorle","sezione":"Per la crema alle mandorle"},{"qty":100.0,"unit":"g","name":"zucchero","sezione":"Per la crema alle mandorle"},{"qty":100.0,"unit":"g","name":"burro morbido","sezione":"Per la crema alle mandorle"},{"qty":2.0,"unit":"n°","name":"uova","sezione":"Per la crema alle mandorle"},{"qty":1.0,"unit":"cucchiaio","name":"farina 00","sezione":"Per la crema alle mandorle"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di mandorla","sezione":"Per la crema alle mandorle"}],"procedimento":"1. Prepara la frolla:\nIn una ciotola capiente o in un mixer, unisci la farina con il burro freddo e lavora fino a ottenere un composto sabbioso.\nAggiungi lo zucchero, le uova, la scorza di limone e il sale.\nImpasta velocemente fino a formare un panetto omogeneo.\nAvvolgilo nella pellicola e lascialo riposare in frigo per almeno 30 minuti.\n2. Prepara la crema alle mandorle:\nMonta il burro morbido con lo zucchero fino a ottenere una crema liscia.\nAggiungi le uova una alla volta, poi la farina di mandorle e il cucchiaio di farina 00.\nSe desideri, profuma con l’estratto di mandorla.\n3. Montaggio della crostata:\nStendi la pasta frolla su un piano infarinato e rivesti uno stampo da crostata (circa 22-24 cm di diametro).\nBucherella la base con una forchetta.\nVersa la crema di mandorle e livella la superficie.\nDistribuisci sopra le mandorle a lamelle.\n4. Cottura:\nCuoci in forno statico preriscaldato a 180°C per circa 35-40 minuti, fino a doratura.\nLascia raffreddare completamente.\n5. Decorazione:\nUna volta fredda, spolvera con zucchero a velo per un tocco elegante e goloso.","note":"","tags":[],"_importId":14089},{"nome":"CROSTATA DELLE MONACHE 🎄 Scopri come preparare questa","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00","sezione":"per la pasta frolla"},{"qty":1.0,"unit":"pizzico","name":"sale","sezione":"per la pasta frolla"},{"qty":150.0,"unit":"g","name":"burro freddo","sezione":"per la pasta frolla"},{"qty":150.0,"unit":"g","name":"zucchero a velo","sezione":"per la pasta frolla"},{"qty":8.0,"unit":"g","name":"lievito per dolci","sezione":"per la pasta frolla"},{"qty":2.0,"unit":"n°","name":"uova","sezione":"per la pasta frolla"},{"qty":0.83,"unit":"g","name":"confettura di albicocche","sezione":"per la pasta frolla"},{"qty":150.0,"unit":"g","name":"noci tritate","sezione":"per la pasta frolla"},{"qty":80.0,"unit":"g","name":"uvetta","sezione":"per la pasta frolla"},{"qty":150.0,"unit":"g","name":"mandorle tritate","sezione":"per la pasta frolla"}],"procedimento":"PROCEDIMENTO \n\n1. Per la realizzazione di questa ricetta avrete bisogno di 2 ciotole, uno stampo da 22 o 24 cm, un mattarello e un cucchiaio.\n\n2. Iniziate dalla preparazione della pasta frolla: raccogliete in una ciotola la farina, il sale e il lievito per dolci. Unite il burro tagliato a tocchetti e, con la punta delle dita, strofinate il tutto fino ad ottenere un composto sabbioso.\n\n3. Aggiungete anche lo zucchero a velo e mescolate velocemente. Solo alla fine unite le due uova leggermente sbattute.\n\n4. Lavorate il composto dapprima con una forchetta o un cucchiaio di legno e, dopo, con le mani. Impastate la pasta frolla per pochissimo tempo.\n\n5. Ottenuto un panetto liscio, avvolgete nella pellicola alimentare e lasciate riposare per 3 ore (meglio se tutta la notte) in frigorifero.\n\n6. Trascorso il tempo di riposo, preparate il ripieno: mettete in ammollo l’uvetta in una ciotola con 2 cucchiai di rum o limoncello fino a quando non sarà morbida.\n\n7. Raccogliete la confettura in una ciotola ed unite le mandorle e le noci tritate; unite anche l’uvetta sgocciolata e mescolate bene il tutto.\n\n8. Riprendete la pasta frolla dal frigorifero e dividetela in due parti (una leggermente più grande dell’altra).\n\n9. Prendete il panetto più grande, lavoratelo velocemente e stendetelo sul piano di lavoro infarinato.\n\n10. Foderate lo stampo precedentemente imburrato e infarinato, ricoprite con cura il fondo e i bordi e bucherellate con i rebbi di una forchetta.\n\n11. Versate il ripieno e distribuitelo su tutta la superficie.\n\n12. Stendete la frolla rimasta e ricoprite, bucherellando ancora.\n\nCOTTURA \n13. Cuocete in forno statico a 180° per 25 minuti circa.\n\n14. Sfornate e lasciate raffreddare completamente, sformate la crostata e trasferitela su un piatto di portata.\n\n15. Guarnite con zucchero a velo prima di servire.\n\n16. La vostra crostata delle monache è pronta per essere servita e gustata.\n\nCOTTURA IN FRIGGITRICE AD ARIA: cuocete a 160° per circa 20 minuti, quindi controllate la cottura, se necessario cuocete ancora per 5 minuti.\n\n#Crostata #RicetteDiNatale #DolciDiNatale","note":"","tags":[],"_importId":14828},{"nome":"Crostata mele e marmellata di albicocche","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":"farina 00","sezione":"Per la frolla senza burro"},{"qty":90.0,"unit":"g","name":"olio di semi di mais","sezione":"Per la frolla senza burro"},{"qty":100.0,"unit":"g","name":"zucchero","sezione":"Per la frolla senza burro"},{"qty":1.0,"unit":"cucchiaino","name":"lievito in polvere per dolci","sezione":"Per la frolla senza burro"},{"qty":400.0,"unit":"g","name":"confettura di albicocche","sezione":"Per la farcitura"},{"qty":20.0,"unit":"g","name":"pinoli","sezione":"Per la farcitura"}],"procedimento":"Decorate con i pinoli, spolverate con un po’ di cannella in polvere (solo se vi piace) e con una manciata generosa di zucchero.  Fate cuocere in forno preriscaldato, modalità statica, a 180° per circa 30-40 minuti. Il tempo di cottura può variare da forno in forno. Appena diventa dorata sfornate.  Una volta pronta fate intiepidire e poi toglietela delicatamente dallo stampo. Fatela finire di raffreddare su una gratella.","note":"","tags":[],"_importId":9910},{"nome":"CROSTATA RICOTTA AL LIMONE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":8.0,"unit":"n°","name":"persone"},{"qty":0.5,"unit":"n°","name":"limone","sezione":"PER LA RICOTTA"},{"qty":0.5,"unit":"n°","name":"limone","sezione":"PER LA CREMA PASTICCIERA"}],"procedimento":"Procedimento\nPER LA PASTA FROLLA Step 1 Mescolate la farina con lo zucchero, qualche cucchiaio di acqua fredda e la scorza grattugiata dei limoni. Incorporate quindi l’uovo e il burro morbido e impastate, finché non otterrete un composto omogeneo. Aggiungete anche ¼ di bustina di lievito in polvere, impastate ancora, quindi dividete l’impasto in due parti, una di due terzi e una di un terzo.\nPER LA RICOTTA Step 2 Lavorate la ricotta con lo zucchero, finché non avrà acquistato una consistenza cremosa e omogenea, quindi profumatela con la scorza grattugiata di ½ limone.\nPER LA CREMA Step 3 Mescolate le uova con 2 cucchiai e ½ di zucchero, unite la scorza grattugiata del ½ limone; stemperatevi 1 cucchiaio e ½ di farina, aggiungete il latte a filo, continuando a mescolare; quindi portate sul fuoco e cuocete, sempre mescolando, fino al bollore. Trasferite la crema in una tasca da pasticciere.  Step 4 Stendete la parte di frolla più grande a uno spessore di circa 5 mm e con essa foderate il fondo e i bordi di una tortiera (ø 26 cm) precedentemente imburrata. Step 5 Distribuite la crema di ricotta sul fondo della torta, quindi coprite con la crema pasticciera. Step 6 Stendete la frolla rimasta e ricavate delle strisce; tagliatele con una rotella e distribuitele sulla superficie della torta per formare una grata. Cospargete la superficie con un paio di cucchiaini di zucchero. Infornate a 180 °C in modalità ventilata per circa 1 ora, finché la frolla non sarà dorata. Step 7 Sfornate la crostata e lasciatela raffreddare completamente a temperatura ambiente. Infine sformatela e servitela, dopo averla cosparsa, a piacere, con scorza di limone grattugiata.","note":"","tags":[],"_importId":10983},{"nome":"CROSTATA RICOTTA CAPRA E MARMELLATA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":140.0,"unit":"g","name":"mandorle pelate"},{"qty":160.0,"unit":"g","name":"farina d’orzo"},{"qty":70.0,"unit":"g","name":"zucchero integrale di canna"},{"qty":60.0,"unit":"g","name":"olio di cocco"},{"qty":60.0,"unit":"g","name":"acqua fredda"},{"qty":1.0,"unit":"cucchiaino","name":"lievito per dolci bio"},{"qty":2.0,"unit":"cucchiaio","name":"marmellata di fragole o frutti di bosco"},{"qty":400.0,"unit":"g","name":"ricotta fresca di capra"},{"qty":1.0,"unit":"cucchiaio","name":"scarso di miele d’acacia"}],"procedimento":"Prima di tutto tostate leggermente le mandorle in un padellino antiaderente per 5 minuti. Versatele in un robot e frullatele a scatti fino a ridurle in farina. Unitela alla farina d’orzo in una ciotola a aggiungete lo zucchero, il lievito e la scorza di limone. Date una prima mescolata.\nAggiungete ora l’olio di cocco e fatelo assorbire dalle farine, e di seguito l’acqua fredda, versandone poca per volta. Lavorate gli ingredienti velocemente fino ad ottenere un panetto che avvolgerete nella pellicola e metterete a riposare in frigo per almeno un’ora.\nPreparate la farcitura della crostata semplicemente mettendo la ricotta in una ciotola dopo averla ben scolata, . \nPREPARA L’IMPASTO DELLA CROSTATA\n\t\t Lessa le patate con la buccia, passale con lo schiacciapatate, raccogli nella ciotola e lascia raffreddare. Aggiungi poi la farina, l’uovo sgusciato, il Grana Padano grattugiato, regola con sale, pepe e qualche grattata di noce moscata. Mescola con il cucchiaio, lavora poi con le mani fino a formare un panetto morbido.    \n  PREPARA LA CROSTATA\n\t\t Imburra e cospargi di pangrattato uno stampo a cerniera del diametro di 20 cm. Io uso sempre questo e mi trovo benissimo!   Stendi nella tortiera l’impasto di patate sul fondo e lungo i bordi tenendoli alti 3 centimetri. Versa al suo interno il composto di peperoni e pancetta, aggiungi la ricotta a cucchiaiate e spolvera con il Grana padano rimasto e una manciata di pangrattato. Cuoci in forno già caldo a 180° per circa 40-45 minuti. Sforna e lascia raffreddare prima di togliere dallo stampo.            \n\nIn questa pagina sono presenti link di affiliazione che garantiscono a questo sito una piccola quota di ricavi, senza variazione del prezzo per l’acquirente.\n5,0 / 5\n\nPUBBLICATO IN\nTORTE SALATE\nMostra Commenti\n\nCOLOMBA DELLE ROSE\n\nBentrovati! Oggi voglio mostrarvi la colomba delle rose, un lievitato eccezionalmente soffice e goloso da servire durante il pranzo di Pasqua come dessert, e con il quale farete sicuramente un successone!\nAnche questa volta vi consiglio di provare la ricetta e aspetto come sempre i vostri pareri nel mio profilo  @isaporidicasa.\nALTRI DOLCI PASQUALI:\n\t\tTORTA COLOMBA al cioccolato e pistacchi\n\t\tCESTINI DI COLOMBA\n\t\tCOLOMBA PASQUALE – ricetta veloce\n  Colomba delle rose\n\t\tDifficoltàMedia\n\t\tTempo di preparazione30 Minuti\n\t\tTempo di riposo3 Ore\n\t\tPorzionistampo da 1 kg\n\t\tMetodo di cotturaForno\n\t\tCucinaItaliana\n\t\tStagionalitàPasqua\n\nIngredienti\n\n500 g farina 00\n7 g lievito di birra disidratato\n200 g burro\n200 ml latte\n50 g zucchero\n1 uovo\n1 scorza di limone\nINOLTRE\n350 g confettura di frutti di bosco\nlatte (per spennellare)\ngranella di zucchero\n\nStrumenti\n\nStampo per colomba da 1 kg\nCiotola\n\nSet Stampo COLOMBA (5pz - 1 Kg) + Aroma COLOMBA (50gr) + Sacchetti (5pz) con laccetto per chiusura - forma pirottino in Carta Forno Monouso - ideale per Colombe Pasquali ecc - 5 pezzi da 1000 gr\n13,99€\n\nAcquista\n\nPreparazione delle colomba delle rose\n\n  Nel pentolino scalda il latte con lozucchero senza portare a bollore, mescolando di frequente. Togli il latte dal fuoco versa nella ciotola e lascia intiepidire. Aggiungi poi illievito di birra secco, mescola con la frusta e lascia riposare per 5 minuti.\nAggiungi l’uovo e man mano la farina. Inizia ad impastare prima con il cucchiaio e poi con le mani\nAggiungi quindi il burro a pezzetti poco per volta, continuando ad impastare con cura per almeno 5 minuti Se usi la planetaria fai incordare per bene l’impasto al gancio e lavora per circa 10 minuti, fino a quando inizierà a staccarsi dalle pareti della ciotola.\nCopri la ciotola con la pellicola alimentare e lascia lievitare l’impasto in un luogo tiepido fino al raddoppio (ci vorranno circa 2 ore)\nRiprendi il panetto lievitato e appiattiscilo con le mani\nstendilo con il mattarello sula spianatoia lievemente infarinata fino a formare un rettangolo della misura di 50 x 35 cm.\n\nSpalma sulla superficie la confettura di frutti di bosco\nArrotola il rettangolo partendo dal basso cercando di arrotolarlo molto stretto e formando un lungo cilindro\nTaglia il cilindro in rotelle dello spessore di 3 – 4 cm\nPosiziona i cilindri nello stampo per colomba (io ho usato questo) distanziati tra loro di mezzo centimetro. Copri e lascia lievitare per un’altra ora. Passato il periodo spennella le girelle con il latte distribuisci sopra la granella di zucchero. Cuoci a forno già caldo a 180° per 30 minuti, sforna e lascia completamente raffreddare.\n\nColomba delle rose\n\nColomba delle rose\n\nSet Stampo COLOMBA (5pz - 1 Kg) + Aroma COLOMBA (50gr) + Sacchetti (5pz) con laccetto per chiusura - forma pirottino in Carta Forno Monouso - ideale per Colombe Pasquali ecc - 5 pezzi da 1000 gr\n13,99€\n\nAcquista\n\nIn questa pagina sono presenti link di affiliazione che garantiscono a questo sito una piccola quota di ricavi, senza variazione del prezzo per l’acquirente.\n5,0 / 5\n\nPUBBLICATO IN\nLIEVITATI LIEVITATI DOLCIRICETTE DELLE FESTE\nMostra Commenti\n\nI SAPORI DI CASA\n\nPossono interessarti\n  CROSTATA DI PATATE CON PEPERONI PANCETTA E RICOTTA\n  DOLCI PER PASQUA – 20 ricette facilissime\n  COLOMBA DELLE ROSE\n\nCondividi\n\n1","note":"","tags":[],"_importId":14159},{"nome":"CROSTATA SPECIALE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina"},{"qty":90.0,"unit":"g","name":"zucchero"},{"qty":100.0,"unit":"g","name":"burro"},{"qty":3.0,"unit":"n°","name":"tuorli grandi"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":150.0,"unit":"g","name":"marmellata di albicocche","sezione":"Per il ripieno"},{"qty":100.0,"unit":"g","name":"amaretti","sezione":"Per il ripieno"},{"qty":50.0,"unit":"g","name":"gocce di cioccolato fondente","sezione":"Per il ripieno"},{"qty":null,"unit":"q.b.","name":"caffè","sezione":"Per il ripieno"},{"qty":null,"unit":"q.b.","name":"alkermes","sezione":"Per il ripieno"},{"qty":30.0,"unit":"g","name":"mandorle pelate","sezione":"Per il ripieno"}],"procedimento":"#ricettedimenticate #crostataantica #saporedicasa #dolcidellatradizione #samboseto #cucinaconme #ricettedolci","note":"","tags":[],"_importId":14432},{"nome":"Crostata tentazione","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"2 uova 100 g zucchero 80 g olio di semi oppure 100 gr burro ammorbidito  8 g lievito per dolci 320 g farina circa \n\t\t500 g ricotta 40 g zucchero 100 g cioccolato fondente 150 g amarene sciroppate sgocciolate \nPER DECORARE\n\t\t zucchero a velo q.b.","note":"","tags":[],"_importId":13512},{"nome":"CROSTATINE  A FORMA DI FIORE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"della Blogger Natalia Cattelani, facili da fare, senza mattarello e senza  stampini, e si inizia facendo una semplice e ottima pasta frolla.\nIngredienti per la frolla: 200 gr di farina - 120 gr di burro - 80 gr di zucchero - 2 tuorli - un pizzico di sale.\nPreparazione: mettere in ciotola le uova con lo zucchero e mescolare, poi  il burro morbido pezzetti, il sale, la farina e mescolare ancora ( se avete il mixer, io metto tutto assieme dentro, e in pochissimo tempo la frolla è  pronta, meglio se  col burro  freddo a pezzetti). Portare poi tutto sul.piano di lavoro, fare un panetto con le  mani, coprirlo con la pellicola e metterlo in frigo minimo una mezz'ora, meglio se per qualche ora o addirittura dalla sera prima. Imburrare degli stampini mono porzione usa e getta  (vedi ultima foto), riprendere dal frigo la frolla indurita,  e lavorarla con le mani. Creare un rotolo e poi tagliarlo in 4 parti  tutte uguali, e da ognuna  creare 4  piccoli cilindri . Dividere ogni cilindro in sei fette,  di cui una più  grossa, che servirà  da base del fiore. Schiacciarla col pollice sul fondo dello stampino ben imburrato,  e con gli altri sei dischetti  sempre schiacciandoli col pollice, formare i petali . Una volta creati i fiori, versarvi dentro un po' di confettura a piacere e  sopra o granella di mandorle o granella di\npistacchi. \nCuocere in forno preriscaldato a 180 gradi.per circa 20 minuti. Far freddare bene prima di togliere il fiore dallo stampino.\n( io avevo fatto un po' di frolla in più  e mi son venuti 5 fiori e con i ritagli ho fatto dei cuoricini).","note":"","tags":[],"_importId":10446},{"nome":"Cruffin di Pasqua","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti Per l’impasto 250 g di Farina tipo 0 Manitoba 250 g di Farina tipo 00 250 g di latte intero 1 uovo medio 15 g di lievito di birra fresco 120 g di zucchero 50 g di burro morbido (a pomata) 2 prese di sale Zeste di 1 arancia bio Punta di cucchiaino di vaniglia in polvere\nPer la farcia 60 g di burro fuso ma raffreddato Zeste di 1 arancia bio 150 g di gocce di cioccolato\nPer decorare Zucchero a velo\nIngredienti Iniziate questa ricetta la sera precedente, intorno alle 18. Raccogliete il latte tiepido (a circa 30°C) e l’uovo sbattuto con lo zucchero nella ciotola della planetaria, inserite il gancio a foglia e iniziate a mescolare lentamente. Sbriciolate all’interno il lievito, mescolate per pochi secondi e successivamente aggiungete poca farina per volta, senza mai fermarvi. Impastate finché l’impasto non si sarà legato, poi incorporate il sale e un cubetto di burro morbido per volta. È importante che il cubetto precedente venga assorbito completamente prima di aggiungere il successivo: ci vorranno 10 minuti. Quando l’impasto si sarà ben incordato (dovrà risultare liscio, lucido ed elastico e si staccherà dalle pareti della ciotola), rovesciatelo sul piano di lavoro e dategli una forma tonda. Fatelo riposare per 20 minuti, fate delle pieghe di rinforzo e poi trasferitelo in una ciotola leggermente unta. Copritelo con pellicola alimentare e lasciatelo lievitare in un luogo tiepido (a circa 26-28°C) per due ore, o comunque fino al raddoppio. A questo punto sgonfiatelo, avvolgetelo nella pellicola stretta e riponetelo in congelatore per 10 minuti, spostandolo poi nella parte più bassa del frigo per 8 ore. Il giorno successivo, stendetelo in un rettangolo molto sottile di 37×45 cm, spennellate tutta la superficie con burro fuso mescolato a scorze d’arancia e distribuite le gocce di cioccolato. Partendo dal lato lungo, arrotolate il rettangolo ottenendo un salsicciotto molto stretto, tralasciando gli ultimi 4 cm di un’estremità. Dividete a metà il salsicciotto, arrotolate la prima metà a forma di chiocciola, la seconda metà in senso opposto, posizionandola sopra la prima: dovrete ottenere un “gomitolo” di impasto. Ora imburrate e foderate con carta da forno uno stampo a cerniera da 20 cm e posizionate all’interno la chioccola, copritela con pellicola e lasciatela lievitare al raddoppio, in un luogo tiepido. Preriscaldate il forno in modalità statica, a 175°C. Una volta raggiunta la temperatura, infornate il dolce nel ripiano centrale e cuocetelo per 25 minuti, abbassate la temperatura e proseguite la cottura per altri 25 minuti, ricordandovi di coprire la superficie del dolce con un foglio di alluminio onde evitare che si scurisca troppo. Sfornate il dolce, lasciate intiepidire nello stampo, sformate e una volta intiepidito, spolverizzatelo con zucchero a velo.","note":"","tags":[],"_importId":14248},{"nome":"Crêpes salate morbide e dorate","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"ml","name":"latte"},{"qty":125.0,"unit":"g","name":"farina 00"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":1.0,"unit":"cucchiaio","name":"burro fuso"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":200.0,"unit":"g","name":"funghi champignon affettati"},{"qty":150.0,"unit":"g","name":"zucca"},{"qty":1.0,"unit":"cucchiaio","name":"olio d’oliva"},{"qty":null,"unit":"q.b.","name":"sale e pepe"},{"qty":100.0,"unit":"g","name":"formaggio fuso o salsa al formaggio"}],"procedimento":"Preparazione:\n\n1. Preparare la pastella per le crêpes mescolando farina, uova, latte, burro e sale. Lasciare riposare 20 minuti.\n\n2. Cuocere le crêpes in padella antiaderente, sottili e dorate.\n\n3. In una padella, saltare i funghi e i cubetti di zucca (o carote) con olio, sale e pepe.\n\n4. Riempire le crêpes con le verdure saltate, piegarle a triangolo o a rotolo.\n\n5. Aggiungere sopra la salsa al formaggio e una spolverata di prezzemolo fresco.","note":"","tags":[],"_importId":15054},{"nome":"Dal libro di Lorenza Farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Dal libro di Lorenza Farina, A BRACCIA APERTE. SUOR PURA PAGANI, Edizioni Paoline, 2016, 2^ ed. 2019, 3^ ed. 2020:\n“Mamma Oliva ha le lacrime agli occhi mentre, in silenzio,\nabbraccia forte Carmela in procinto di partire per il\nsuo viaggio più lungo e importante. Carmelina, la sua\nbimba tanto cara e servizievole, se ne andrà per sempre.\n“Sia fatta la volontà di Dio”, dice in cuor suo.\nAnche Benedetto ha gli occhi lucidi e un groppo in gola\nche gli impedisce di parlare mentre sale a cassetta, stringendo\nforte le briglie del cavallo fin quasi a farsi male. Vi\nsalgono anche zia Sofia e Carmela che saluta tutti e con la\nmano manda baci.\nTra le lacrime la ragazza ammira per l’ultima volta i suoi\nmonti, il piccolo borgo che l’ha vista nascere, dove un\ngiorno, ne è sicura, farà ritorno in altre vesti. Le campane\ndel campanile suonano l’Ave Maria mentre il carro imbocca\nvelocemente contrada Pagani dirigendosi verso la chiesa.\nUn segno di croce e poi giù in un saliscendi di stradine\nfino a valle, dove prendono la corriera dirette a Castelletto,\npassando per Verona. Percorrono la Gardesana appena\nultimata con lo specchio d’acqua da un lato e le colline\ndisseminate di ulivi dall’altro.\nCarmela fissa le onde, mosse da un forte vento che\nsoffia dal monte Baldo, enorme sullo sfondo. Chiude gli\nocchi per un attimo.\n“Quei flutti assomigliano alle cime arrotondate delle\nmie montagne”, pensa mentre prova una lieve nostalgia\nper il mondo che ha lasciato alle spalle e un certo batticuore\nper ciò che l’attende.\nÈ il 28 giugno 1932 quando Carmela sente chiudere\ndietro di sé il portone dell’Istituto delle Piccole Suore di\nCastelletto, fondato quarant’anni prima da don Giuseppe\nNascimbeni. Il sant’uomo dal paradiso non si sarà scordato\ndi mandare una benedizione a quella sua nuova figlia”.\nI proventi per diritti d’autore derivanti dalla vendita \ndi questo volume saranno devoluti alla costruzione \ndella Casa Accoglienza «Madre della Misericordia», \nSantuario Parrocchia B.V.M. Salus Infirmorum di \nScaldaferro (VI).\nPer ricevere il libro su Suor Pura scrivere qui, oppure\nrivolgersi a: suorpura.eventi@gmail.com \nTel-sms-whatsapp 3498677259","note":"","tags":[],"_importId":8609},{"nome":"Dalle mie parti ( Lagonegro","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"cannella in polvere","sezione":"Per la sfoglia"},{"qty":null,"unit":"q.b.","name":"acqua tiepida","sezione":"Per la sfoglia"}],"procedimento":"PROCEDIMENTO\nPassate i ceci al setaccio fino a ottenere una crema liscia e omogenea. Amalgamateli al resto degli ingredienti, quindi il cioccolato fuso, il miele, lo zucchero, la cannella e l'arancia.\n\nPer la sfoglia: disponete la farina a fontana, aggiungete sale e cannella, quindi impastate con l'olio, il vino e tanta acqua quanto basta a ottenere un panetto elastico e omogeneo.\n\nRicavate dei pezzetti e stendeteli nella macchina per pasta in una sfoglia molto sottile. Ricavate dei cerchi con un bicchiere e posizionatevi al centro un cucchiaino di ripieno.\n\nRipiegate i dischetti per formare delle mezzelune e sigillate bene le estremità con le dita o con i rebbi di una forchetta. Friggete i calzoncelli dolci ai ceci in abbondante olio caldo.\n\nScolate i calzoncelli, lasciateli intiepidire, cospargeteli di zucchero a velo e serviteli.","note":"","tags":[],"_importId":13431},{"nome":"Detto fatto 😍","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":0.9,"unit":"g","name":"farina"},{"qty":180.0,"unit":"g","name":"zucchero"},{"qty":100.0,"unit":"ml","name":"olio"},{"qty":1,"unit":"n°","name":"po' di liquore a piacere"},{"qty":1.0,"unit":"bustina","name":"lievito x dolci"}],"procedimento":"Mandorle e semi di anice (io ho messo 200 g di mandorle e x gli anicini 4 cucchiai semi di anice)\nImpastare tutti gli ingredienti,formare dei filoncini e cuocere a 170* x 20 m.\nPoi  una volta tagliati altri 6/7 m. \n(Io ho fatto doppia dose,in una ho aggiunto l'anice e l'altra le mandorle.)","note":"","tags":[],"_importId":11329},{"nome":"di latte tiepido 100 grammi di zucchero semolato 1","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"di latte tiepido 100 grammi di zucchero semolato 1 uovo + 1 tuorlo 60 grammi di burro morbido gocce di cioccolato quanto basta nutella quanto basta zucchero a velo\n  Bombe al forno con gocce di cioccolato e nutella\nProcedimento\nScaldare il latte leggermente, deve essere tiepido e non bollente, altrimenti si comprometterà la riuscita delle bombe. Unire al latte il lievito ed un cucchiaino di zucchero preso dal totale dei 100 grammi che servono per la ricetta, mescolare bene e lasciare riposare per 10 minuti. Mettere nel cestello dell’impastatrice ; la farina, le uova, il burro,lo zucchero ed unire il latte con il lievito, azionare il gancio per gli impasti e lasciare lavorare la macchina per 15 minuti abbondanti, a questo punto unire anche le gocce di cioccolato e farle mescolare bene all’impasto. L’impasto si può fare anche a mano sulla spianatoia. Metterlo a lievitare fino a farlo triplicare di volume, a me ci sono volute 3 ore, ma molto dipenderà dal calore della vostra casa. Una volta che sarà ben lievitato, rivoltarlo su un piano da lavoro infarinato e tagliare dei pezzettini di 50/60 grammi ognuno, arrotondare i pezzetti con le mani e metterli sulla leccarda foderata di carta forno. Far cuocere le bombe in forno statico a 180° per circa 25 minuti, per tempi e cottura regolatevi con i vostri forni. Una volta gonfi e dorati tirarle fuori e farle raffreddare se decidiamo di farcirle con la nutella o con qualsiasi altra cosa il gusto ci suggerisce, le Bombe al forno con gocce di cioccolato e nutella sono davvero deliziose, parola della vostra Vale!","note":"","tags":[],"_importId":806},{"nome":"Di pasta frolla ne esistono tantissime tipologie e","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":320.0,"unit":"g","name":"farina 00"},{"qty":150.0,"unit":"g","name":"zucchero a velo"},{"qty":50.0,"unit":"g","name":"fecola di patate"},{"qty":250.0,"unit":"g","name":"burro"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":1.0,"unit":"n°","name":"tuorlo d’uovo"},{"qty":0.5,"unit":"bustina","name":"lievito per dolci"},{"qty":100.0,"unit":"g","name":"marmellata"},{"qty":200.0,"unit":"g","name":"cioccolato sciolto"}],"procedimento":"Preparazione:\nIn una ciotola mettere il burro a temperatura ambiente tagliato a tocchettini e con una frusta elettrica iniziare a montarlo. \nAggiungere lo zucchero a velo e montare il composto a lungo. \nAggiungere le uova poco alla volta e sempre montando incorporarle. \nPoi aggiungere la scorza di limone e la farina ed il lievito setacciati .\nContinuare a montare fin che l’impasto non sarà privo di grumi. \nMettere l’impasto in una sacca da pasticceria con una duja (bocchetta) rigata e fare dei biscotti a forma di crumiri.\nCuocere i biscotti in forno a 180 gradi forno statico per 15 minuti. \nFarli  raffreddare\nUnire due biscotti alla volta farciti con della marmellata ed intingerli  fino a metà nel cioccolato fondente.\nFarli raffreddare e servirli\nI biscotti di frolla montata devono rimanere chiarissimi, teneri e fragranti, quando escono dal forno potrebbero sembrare addirittura ancora morbidi ma non vi preoccupate che raffreddando diventeranno perfetti.","note":"","tags":[],"_importId":11098},{"nome":"Dolce frutta","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":800.0,"unit":"g","name":"succo arancia"},{"qty":2.0,"unit":"cucchiaio","name":"zucchero"}],"procedimento":"Bollire e versare sulla frutta tagliata a pezzi e messa in teglia plum-cake e in frigo per 4 ore \nTagliare e mangiare","note":"","tags":[],"_importId":12564},{"nome":"dolci","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Padella 24 cm, 2 mele, 150gr di farina00 , 135 ml di latte, burro fuso 50gr, zucchero 65 gr, 1 bustina di lievito per dolci, 2 uova,cannella \nLavorare con le fruste elettriche le uova e lo zucchero x 2 minuti, aggiungere il burro,il latte,la cannella, mezza mela fatta a pezzetti e,gradualmente, la farina con il lievito\nDisporre su una padella rivestita con carta forno le mele fatte a fettine sottili, spolverare con un po' di zucchero e cannella e versare sopra il composto. Mettere su fiamma bassa con spargifiamme per circa 30 minuti con coperchio. Capovolgere sul piatto di portata.\nIo ho cotto in padella con burro e pinoli una mezza mela a spicchi che ho poi disposto sulla torta","note":"","tags":[],"_importId":12176},{"nome":"Domenica giorno del dolce da condividere. Questa volta","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per la base: 110 gr di zucchero - 110 di farina 0 - un pizzico di sale - 40 gr di cacao amaro - 4 uova - 3 cucchiaini di lievito per dolci.\nPer lo sciroppo: un cucchiaino colmo di cacao amaro - 40 gr di zucchero a velo - 100 ml di latte - una tazzina di caffè .\nPer la mousse al cioccolato : 480 ml di panna fresca da montare - 150 gr di cioccolato fondente\nPer la decorazione : scaglie o codette di cioccolato.\nPreparazione: accendere il forno a 180 gradi e imburrare uno stampo a cerniera di 22 cm di diametro,  con la base foderata di carta forno .\nRompere le uova in una ciotola, unire lo zucchero, e con la frusta elettrica montarle per 6-8 minuti. Unire la farina setacciata col cacao, lievito e sale. Versare nella tortiera e cuocere per 30 minuti.\nPreparare lo sciroppo: in pentola mescolare cacao e zucchero, poi latte e caffè,  sciogliere bene poi  togliere dal fuoco. Inumidire con lo sciroppola torta LASCIATA NELLO STAMPO, e farla freddare bene.\nPreparare la mousse sciogliendo a bagnomaria o nel microonde per 3 minuti a 350 watt il cioccolato, poi tenetene da parte un bel cucchiaio colmo per la guarnitura finale.\nSemimontare la panna con la frusta elettrica ( ricordare di lavare perfettamente le fruste usate prima),  e unire la cioccolata fusa e intiepidita. Versare la mousse sulla torta lisciando la superficie con la spatola. Col cioccolato tenuto da parte, inserito in un cornetto apposito, disegnare delle righe sulla superficie della torta e con uno stecchino fare dei trattini (vedi foto). Mettere in frigo  per minimo un paio di ore e decorare con le codette.\nHo copiato fedelmente la ricetta della Cattelani e aggiungo pure i suoi consigli: prima di versare la mousse sulla torta, posizionare attorno al bordo ben unto di burro,\nun nastro di acetato lungo la circonferenza dello stampo. Non lo avevo in casa e ho ottenuto lo stesso risultato con una striscia di pellicola, incollata al burro spalmato sul bordo della tortiera. Se guardate bene si vede sulla foto della torta finita ma ancora nella tortiera. Io comunque l'ho surgelata facendola qualche giorno prima e tolta al mattino presto dal freezer e poi sempre nel frigo  prima dell'uso.","note":"","tags":[],"_importId":10072},{"nome":"Domenica, giorno dedicato al dolce, e questa volta ho","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Domenica, giorno dedicato al dolce, e questa volta ho scelto un dolce  che Vittorio Viarengo  ci ha proposto parecchie volte , e visto che lui è  in Italia con la moglie, l'ho fatto proprio per ringraziare tutti e due. Si tratta della\nTORTA AL RUM.\nIngredienti: 160 gr di farina 00 - 100 gr di fecola di patate - 330 gr di zucchero - 14 gr di lievito per torte  - 4 gr di sale - 5 uova intere  - 70 gr di olio di semi di girasole - 90 gr di latte - 80 gr di Rum - 3 gr di aroma di vaniglia - raschio di limone-\nFarcitura: 125  gr di burro - 60 gr di acqua - 70 gr di zucchero  - 80 gr di Rum - 2 gr di aroma di vaniglia .\nZucchero a velo per la finitura.\nPreparazione : mescolare gli ingredienti asciutti: farina, lievito,fecola, zucchero, sale. A parte mescolare i liquidi: uova, olio di semi, latte, Rum, vaniglia e raschio di limone. Unire metà  liquidi agli ingredienti asciutti e mescolare. Dopo\n1 minuto aggiungere i liquidi restanti. Mescolare e si ottiene una pastella piuttosto liquida. Imburrare una tortiera per ciambelle da 25  cm di diametro, versarvi l'impasto,   e cuocere in forno statico preriscaldato a 180 gradi per 45 -50 minuti circa, facendo sempre la prova stecchino.\nFarcitura : in un pentolino mettere Rum, zucchero, acqua, vaniglia e burro. Cuocere a fuoco medio sciogliendo bene zucchero e burro. Bucherellare la superficie della torta e versare il preparato sulla superficie e intorno ai bordi. Far riposare per 12-24 ore, poi tovesciare su un piatto da portata, spolverare di zucchero a velo e la torta è  pronta per essere servita.\nConsiglio: ricordo sempre il prezioso staccante di Natalia Cattelani : 70 gr di olio di semi - 50 gr di burro e 50 gr di farina, da mescolare bene e tenere per un mese nel frigo, per averlo sempre pronto all'occorrenza. \nMettete da parte questa ricetta,  puo' esservi utile per il prossimo Natale.","note":"","tags":[],"_importId":9988},{"nome":"E si poteva non provare il Pan brioches","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"E si poteva non provare il Pan brioches? Con due piccole variazioni rispetto alla ricetta originale. Ho sostituito il lievito di birra con il Licoli ( 100 gr togliendo 50 gr di farina e 50 di latte), e sostituendo una parte della farina da 240W con della farina 320W rigorosamente Molino Bogetto ( ho messo150  gr di farina 0 240W e 100Gr  320 W). Impastato come da ricetta e lasciato a lievitare 12 ore. Seguito poi i passaggi della video ricetta. aspettiamo che si raffreddi poi si assaggia ma già si capisce che è morbidissimo","note":"","tags":[],"_importId":8468},{"nome":"E stasera qualcosa che ho scoperto da poco","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"farina di ceci"},{"qty":300.0,"unit":"g","name":"patate lesse"},{"qty":200.0,"unit":"ml","name":"acqua"}],"procedimento":"E stasera qualcosa che ho scoperto da poco, ma che mi piace molto \nFarinata di Ceci (se la chiamo frittata Qualcuno storce il naso 😁) con patate \n\n100 g Farina di Ceci \n300 g Patate lesse \n200 ml Acqua \nSale e Pepe a piacere \n\nCalorie: 520\n\nMacro:\nCarboidrati 58 g\nProteine 22 g\nGrassi 6.7 g\nFibre 11 g","note":"","tags":[],"_importId":15079},{"nome":"Ecco gli ingredienti che vi serviranno","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ecco gli ingredienti che vi serviranno, queste sono le dosi per una tortiera da 22-26 cm:\n450 g di mandarini (8-9 mandarini)\n300 g di farina 00\n250 g di zucchero\n100 g di olio di semi\n100 g di latte\n3 uova\nuna bustina di lievito\nProcedimento:\n● Il pan di mandarini è facilissimo da preparare, come prima cosa sciacquate accuratamente i mandarini, asciugateli e sbucciateli. Eliminate tutti i semi e mettete i mandarini all’interno di un tritatutto, aggiungete anche la buccia di 3 mandarini, 50 g di zucchero e frullate il tutto. Preriscaldate il forno a 180 gradi.\n\n● In una ciotola montate le uova insieme allo zucchero rimanente fino ad ottenere un composto chiaro e spumoso. Unite i mandarini frullati, l’olio, il latte e mescolate.\n\n● Aggiungete infine la farina, il lievito e lavorate tutti gli ingredienti fino ad ottenere un composto omogeneo e senza grumi.\n\n● Versate il composto all’interno di una tortiera imburrata e lasciate cuocere il pan di mandarini per circa 35-40 minuti, verificate la cottura con uno stecchino.\n● Il pan di mandarini è pronto, formatelo su di un piatto e ultimate con una bella spolverata di zucchero a velo, è la fine del mondo,è profumatissimo","note":"","tags":[],"_importId":6696},{"nome":"Ecco la ricetta che mi avete chiesto","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ecco la ricetta che mi avete chiesto, queste sono \"Fraviole\" fatte dalla mia mamma ❤️\nEcco la ricetta:\n500 gr di farina 00\n3 cucchiai di zucchero\n2 uova\n50 gr di burro\nScorza di un'arancia grattugiata\nMezzo cucchiaino di lievito in polvere\nVino liquoroso q.b (circa mezzo bicchiere).\nImpastare il tutto aggiungendo a poco a poco il vino liquoroso finchè l'impasto non risulta sodo e pronto per essere steso.\nFarcire con la crema di ricotta e zucchero, chiudere bene e friggere.\nSpolverare con lo zucchero a velo e...le fraviole sono pronte 😊.","note":"","tags":[],"_importId":12234},{"nome":"Ecco la ricetta:","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"n°","name":"gr"},{"qty":250.0,"unit":"n°","name":"gr"},{"qty":180.0,"unit":"n°","name":"gr"},{"qty":150.0,"unit":"n°","name":"gr"},{"qty":130.0,"unit":"n°","name":"gr"},{"qty":80.0,"unit":"n°","name":"gr"},{"qty":80.0,"unit":"n°","name":"gr"},{"qty":80.0,"unit":"n°","name":"gr"},{"qty":20.0,"unit":"n°","name":"gr"},{"qty":15.0,"unit":"n°","name":"gr"},{"qty":15.0,"unit":"n°","name":"gr"}],"procedimento":"Prepara il mix di verdure fresche e tagliale finemente o tritale velocemente con un frullatore 1. Cuoci le verdure in padella con un filo d’olio extravergine di oliva per circa 10 minuti, mescolando. Aggiungi il sale fino 2, mescola e continua a cuocere per altri 10 minuti finché il composto si asciuga 3.\nTrasferisci tutto nel frullatore 4 e frulla fino a ottenere una crema liscia 5. Rimetti la crema in padella e falla asciugare ancora per 5-10 minuti per eliminare l’acqua residua 6.\nVersa il composto su una teglia, rivestita di carta forno, copri con un altro foglio e livella dandogli forma rettangolare (7). Metti in freezer per almeno 12 ore fino a congelamento completo. Taglia il panetto congelato a rettangoli di circa 3×2 cm per ottenere i dadi (8). Conserva i dadi in un contenitore ermetico, separati con carta forno (9) e usali all'occorrenza.\nIl dado vegetale si conserva in freezer, all'interno di un contenitore a chiusura ermetica, per 3-4 mesi. Puoi conservare anche ogni cubetto singolarmente con un quadratino di carta forno, così che non si attacchino tra loro.","note":"","tags":[],"_importId":15819},{"nome":"Ecco per voi anche la ricetta","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"la tradizionale napoletana,  senza crema,e un po' più alta perché a me piace anche così,  ma anche sottile e sempre una bonta,ve la presento  nella tortiera di vetro temperato, cosi avete meglio sotto controllo anche la parte di sotto,\ne anche per  una cottura uniforme e dorata,\nla pastiera e un dolce dai mille profumi,e dal sapore  inconfondibile,  in  cottura sprigiona  un profumo  irresistibile per tutta la casa, nel ricordo dei tempi passati ,quando  le mamme, le nonne, le donne di casa in questi periodi della Pasqua ,andavano e venivano con questi ruoti di pastiere, tortano, casatiello, biscotti e altro per le strade,tutte a  fare la fila vicino ai forni a legna per cuocere le proprie bontà,  che bei tempi,❤si sentiva un profumo  in ogni angolo delle strade, nei vicoli, e nelle case, \ntradizioni che sono svanite nel tempo,  ora si fa tutto in casa,\nma non si dimenticano ❤😔\nOk ma ora passiamo alla ricetta😜\nio la preparo la sera del  Giovedì Santo  la lascio in un luogo fresco ma non in frigo, proprio perché il sapore nei 3 giorni prima di Pasqua,diventa  molto più intenso, di ricette della pastiera ce ne sono tantissime,quella della nonna, della mamma ,di una zia, o di un amico... ecc,😜\nOgnuno la fa a modo suo,ma sicuramente\ncon amore ❤\nRicetta,👇👇\nPasta frolla\n500 g di farina 00\n250 g di burro\n250 g di zucchero a velo\n2 uova intere più  un tuorlo,\nun pizzico di sale\nscorza di un'arancia e limone grattugiata ,procedere così \nfare assorbire prima il burro con lo  zucchero e poi le uova  ,aggiungere la farina e in ultimo la vaniglia la buccia di arancia  e di limone grattugiato, formare un panetto,  mettere la pellicola trasparente e fare riposare in frigo per una mezz'oretta,\n700 gr di grano,\n100 gr di zucchero  \n350 gr di latte, un cucchiaio raso di sugna,facoltativo\n 50 gr di burro, o un cucchiaio di sugna\nvaniglia o vanillina,  un pizzico di sale e buccia di arancia e limone che poi toglierete alla cottura ,cuocere fino  a farla diventare una crema\ne fare  raffreddare.\n700  gr di ricotta di pecora sgocciolata, \n400 gr di zucchero, 6/ 7 uova intere scorzette di arancia e cedro,una fialetta millefiori,o fiori d'arancio \nun pizzico di  sale,, dopo unire le due creme aggiungere nella pasta frolla  preparata  nella tortiera dal diametro di\n24 cm, bucherellare un po la pasta frolla per non farla gonfiare troppo e per farla aderire meglio,procedere con le strisce e aggiungetele  creando dei rombi trasversali, a questo punto  fare\n cuocere a forno statico\na 150/ 160,  gradi\nper un un'ora e venti minuti , fate raffreddare e riposare per almeno due giorni ,\nsarà  molto più saporita\n e gustosa, 😋🥰","note":"","tags":[],"_importId":16513},{"nome":"Eccolo lì il mio comfort food x eccellenza: la crema","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ma io amo preparare questa leccornia\nMi fa bene sentire il suo profumo\nMi fa bene tornare con la mente a tempi andati\nMi fa tornare il sorriso\nCi sono mille versioni\nTutte eccellenti\nIo uso la ricetta di nonna, che è diventata di mamma che ora è mia\n2 uova (ovviamente intere: non c'era gz o televisione)\n4 cucchiai scarsi di zucchero \nBacca di vaniglia.  Ovviamente  i semi\n500g di latte\n2 cucchiai di farina.\nNon c'era la fecola\nQuando ero piccola non esisteva il latte in brik\nLa mattina passava il lattaio\nSi chiamava così \nSi utilizzava un recipiente di alluminio\nEra un  dosatore\nIl latte veniva bollito e si creava la panna\nFacevamo a gara x mangiarla\nE la crema aveva un altro sapore\nMa l'odore è quello di sempre\nHo il bimby ma preferisco fare la crema a mano\nÈ stata una settimana stressante e questo impegno giova alla mente\nHo fatto aromatizzare il latte con i semi\nHo mescolato uova zucchero e farina\nHo messo tutto sul piano e ho aggiunto il latte caldo profumato\nI ricordi inseguono il cucchiaio che gira x nn far fare grumi\nSi prepara in 7/9 minuti \nOra sono pronta x la giornata \nCon molta calma\nCi sono le coccole a Camarillo e il primo caffè \nBuon sabato a tutti:❤️❤️","note":"","tags":[],"_importId":12147},{"nome":"Fabiana Faraone"," ,"unit":"g","name":"lievito di birra secco"},{"qty":7.0,"unit":"g","name":"sale"}],"procedimento":"#allacciateilgrembiule #ricettasemplice #ricettafacile #compleanni   https://blog.giallozafferano.it/allacciateilgrembiule/panini-al-latte/?fbclid=IwZXh0bgNhZW0CMTEAAR2fi5PHlGKWA4fUlbEyPU6nm6gEhFyD-qwIXE90qxroqffSahw5n-wP9lQ_aem_MrzlDxCO7T7OM2lCLwfhrg","note":"","tags":[],"_importId":13963},{"nome":"farcire con quello che","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"albumi"},{"qty":1.0,"unit":"cucchiaio","name":"miele"},{"qty":30.0,"unit":"g","name":"amido di mais"},{"qty":1.0,"unit":"pizzico","name":"cannella"},{"qty":1.0,"unit":"cucchiaio","name":"gocce di cioccolato fondente"}],"procedimento":"1. Monta gli albumi con il miele e l’amido di mais usando le fruste elettriche fino a ottenere un composto chiaro e spumoso.\n 2. Aggiungi la scorza di limone, la cannella e le gocce di cioccolato, poi mescola delicatamente con una spatola.\n 3. Rivesti una teglia con carta da forno e, con un cucchiaio, preleva l’impasto formando dei mucchietti sulla teglia.\n 4. Inforna in forno statico preriscaldato a 180°C per circa 15 minuti, fino a doratura.","note":"","tags":[],"_importId":14024},{"nome":"FARINATA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Io ora vi do' la ricetta come lui ci ha insegnato,  e che da anni cuocio col sistema Crisp del microonde. A voi la scelta.\nIngredienti: 150 gr di farina di ceci  - 450 gr di acqua - 6 gr di sale - 35 gr di olio evo - un tegame tondo di 32 cm di  - un rametto di rosmarino.\nPreparazione:  l'ideale sarebbe avere un tegame di rame , ma possibilmente cercate di cuocerla in un tegame tondo antiaderente,\nper simulare la stagnatura. \nIn una ciotola mettere la farina di ceci setacciata , poi unire l'acqua  in tre quattro volte e mescolare, poi unire il sale e mettere dentro un rametto di rosmarino. Far riposare dalle  due alle sei ore. Dopo.aver acceso il forno solo col grill possibilmente a 250 gradi,  versare l'olio nella teglia  e distribuirlo facendo girare\nil tegame, ricoprendo tutta la superficie senza buchi. \nTogliere la schiuma che si e' formata nella ciotola. Mescolare il composto e stendere su una teglia usando un cucchiaio come scudo, per evitare di bucare il velo di olio. Mescolare dall'esterno verso l'interno i 2 liquidi, poi infornare e aprire ogni 5 minuti per far uscire il vapore. Cercare di posizionare il tegame più  vicino possibile al grill, e se si formano delle bolle, bucare con un oggetto appuntito. Dopo 25- 30 minuti la Farinata è  cotta, ma aspettare un minuto prima di tagliarla, e gustarla ancora calda con una bella macinata di pepe.\nIo ho fatto tutto come descritto, ho solo usato il metodo Crisp del microonde per 18 minuti unendo il rametto di rosmarino fresco, e aprendo ogni 5 minuti per rompere le bolle che si formano.","note":"","tags":[],"_importId":9778},{"nome":"FARINATA DI CECI","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti per un tegame di 32 cm di diametro: 150 gr di farina di ceci- 450 gr di acqua- 6 gr di sale - 55 gr di olio - un rametto di rosmarino fresco\nPreparazione: mettere in un recipiente la farina di ceci o setacciata o girata con una frusta, poi unire l'acqua in  tre, quattro volte mescolando, poi aggiungere il sale, e far riposare il tutto con un rametto di rosmarino fresco,  da 2 a 6 ore.\nAl momento di cuocerla, \naccendere il forno solo con il grill, inserire l'olio nella teglia, e distribuirlo su tutto il tegame, senza che si formino dei punti vuoti. ( Dopo il tempo di riposo togliere la eventuale schiuma). Versare la farina preparata nella teglia unta di olio, usando.il cucchiaio come scudo, per evitare che buchi il velo di olio. Mescolare dall'esterno verso l'interno i due liquidi, alzando il cucchiaio nel centro. Infornare ed aprire il forno ogni 5 minuti per far uscire il vapore, e contemporaneamente muovere il tegame. Raggiunta la giusta doratura (25-30 minuti) sfornare ed aspettare un minuto prima del taglio. Un po' di pepe a mulinello e   gustarla ben calda.\nDimenticavo: se per caso avete il microonde con la funzione CRISP, bastano 18 minuti di cottura, avendo l'accortezza di aprire il forno ogni tanto e di bucare le bolle che si formano. La mia della foto è  stata cotta in questo modo.","note":"","tags":[],"_importId":8125},{"nome":"Fatti veloci, 🥖 ciabatte.","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Procedimento;\n\nFarina 00 500gr\n\nAcqua 75%\n\nLievito di birra 1,5g\n\nSale 8 gr\n\nOlio Evo 2 cucchiai \n\nHo lasciato riposare 1 ora TA reimpastato e 12 ore in frigo. Il mattino dopo, fatto i panetti fatto riposare 3 ore TA poi 25 min a 200 gradi (anche 20 minuti andrebbero bene in realtà)\n\nPoi farciti con carne cavolfiore olio d’oliva .\n\nEccezionali. Uno lo abbiamo mangiato il mattino dopo, era favoloso 💝\n\n  Fiesta Undici li ho stagliati quella mattina stessa, e messi sulla teglia con un canovaccio sopra a temperatura ambiente per 3 ore. Grazie proverò anche con la pagnotta sono curiosa ❤️\n\nFiesta Undici ho fatto la cottura semplice, fatto i panetti alle 9 di mattina e cotti alle 13 circa. Porta sempre chiusa. Non ho ancora provato con il pentolino di acqua in forno, ho sentito di questa tecnica. Quale sarebbe il risultato in quel caso?","note":"","tags":[],"_importId":15614},{"nome":"Fatto in casa da Benedetta","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"verdure miste"}],"procedimento":"In una padella tagliamo a dadini 500g di verdure già pulite. Io uso una zucchina, un gambo di sedano, una patata piccola, due carote, mezza cipolla.\n(la combinazione di verdure può variare a piacere si possono anche usare spinaci, bietole, scalogno, piselli, prezzemolo, pomodorini, spezie ecc.)\nAggiungiamo un cucchiaio di olio extravergine di oliva. Portiamo sul fuoco e facciamo appassire per circa 10 minuti continuando a mescolare.\nAggiungiamo 150g di sale e continuiamo la cottura altri 10 minuti.\nOra frulliamo tutto in un mixer. Versiamo il composto in padella, facciamolo asciugare per circa 5 minuti mescolando.\nVersiamo il composto in un foglio di carta forno, con un cucchiaio formiamo un panetto rettangolare e mettiamo in freezer per 12 ore. Poi con un coltello formiamo i cubetti, ne otterremo 12 circa.\nEcco il nostro dado vegetale fatto in casa!\nPer conservare il dado vegetale usiamo un contenitore ermetico. Prendiamo dei quadratini di carta forno da mettere tra un dado e l’altro in modo che non si attacchino. Visto che non usiamo conservanti è importante tenere il contenitore in freezer.\nOra abbiamo la nostra piccola scorta personale di dado vegetale  e siamo pronti ad usarlo a piacere per tutti i nostri piatti preferiti :  il brodo vegetale, il risotto, la minestrina, o insaporire l’arrosto.\nProvatelo anche voi e fatemi sapere quali piatti prelibati preparate!\n.","note":"","tags":[],"_importId":329},{"nome":"FIAMMETTA CRUCIANI","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"ingredienti: 300 gr di farina 00 - 150 gr di farina Manitoba - 150 gr di lievito madre appena rinfrescato - un cucchiaino di malto o zucchero - un cucchiaino di miele - 8 gr di sale fino.\nPreparazione del.lavoro con planetaria:  nella ciotola della macchina  spezzettare il lievito madre che è stato rinfrescato, unire l'acqua tiepida o a temperatura ambiente, poi la farina 00, la farina Manitoba, il malto e il miele,   ( no il sale), e far andare la macchina a velocità  1 per 2 minuti, poi.inserire il sale fino,  e continuare  a velocità  4 per 5 minuti.\nPortare l'impasto sulla spianatoia, fare delle pieghe, poi riportare l'impasto nella ciotola, coprirlo e farlo lievitare per un'ora ad una temperatura di 20  gradi circa. Poi rimetterlo sulla spianatoia, farlo sgonfiare,  fare ancora delle pieghe, poi sistemarlo in un contenitore oliato, coprirlo e farlo lievitare tutta la notte in luogo tiepido.\nE così  siamo arrivati a stamattina,  quando di buon'ora , ho rovesciato l'impasto sul piano di lavoro,  con i polpastrelli ho formato un rettangolo, fatto 2 pieghe,  ripetuto 2 volte, poi ho formato un filoncino e l'ho messo nella \"panara\" di silicone a lievitare. E qui mi fermo e il seguito a più  tardi dopo.la lievitazione.\nSeguitando la spiegazione di quello che avevo fatto ieri dando inizio a preparare il mio \nPANE CON LA PASTA MADRE, \nsono arrivata  nelle spiegazioni a stamattina, quando dopo la lievitazione notturna, ho terminato di preparare il pane. Ho rovesciato sulla spianatoia coperta con della semola,  l'impasto che tutta la notte aveva lievitato, e ho dato la forma al pane formando con i polpastrelli un rettangolo, e per due volte ho fatto le pieghe, poi ho formato un filoncino e l'ho messo a lievitare nella \"panara\" di silicone. Dopo 4 ore l'ho trovato pronto per la cottura, l'ho inciso con la lametta dopo averlo spolverato di semola, e l'ho nebulizzato con acqua in modo che la crosta risultasse croccante.  Intanto  \navevo preriscaldato il forno  statico a 200 gradi, e ho infornato il  mio pane per 10  minuti a quella temperatura, poi ho abbassato il forno a 180 gradi lasciandolo  cuocere per altri  30 minuti, come diceva la ricetta, ma in effetti il mio forno a gas, ha richiesto un quarto d'ora in più.  E ecco nelle foto vi mostro il mio pane fatto con la pasta madre. \nLe prossime volte che lo farò,  mettero' solo\nle foto, è per chi volesse le spiegazioni,  darò  la ricetta,  che invito gli interessati che ora l'hanno seguita,  a copiarsela.  Grazie.","note":"","tags":[],"_importId":11168},{"nome":"FILONCINI DI PANE ALLE OLIVE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina di farro"},{"qty":280.0,"unit":"ml","name":"acqua"},{"qty":30.0,"unit":"g","name":"olio evo"},{"qty":3.0,"unit":"g","name":"lievito di birra secco"},{"qty":1.0,"unit":"cucchiaino","name":"sale fino"},{"qty":200.0,"unit":"g","name":"olive verdi denocciolate"}],"procedimento":"Preparazione\nA mano o in planetaria: metti la farina, aggiungi il lievito e poi l’acqua. Inizia ad impastare, poi unisci l’olio evo e infine il sale. Rovescia l’impasto sul piano ci lavoro e aggiungi le olive sminuzzate. Impasta fino ad incorporarle poi lavora l’impasto facendo delle pieghe (puoi ripeterle per 3 volte facendo riposare l’impasto).\nMetti a lievitare in ciotola fino al raddoppio (come sai, i tempi dipende dalle condizioni ambientali e di impasto) poi rovescia sul piano infarinato e dividi in filoncini. Adagiarli in teglia e fai riposare mezz’ora, intanto preriscalda il forno statico a 230º poi inforna nel ripiano centrale per circa 25 minuti o fino a doratura 🫶🏻\n\nhttps://www..com/share/v/15JYgHaXtBV/?mibextid=wwXIfr","note":"","tags":[],"_importId":14856},{"nome":"Filoncini semola.","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"semola caputo"},{"qty":650.0,"unit":"ml","name":"acqua"},{"qty":20.0,"unit":"g","name":"sale"},{"qty":200.0,"unit":"g","name":"si lievito madre"}],"procedimento":"Marco Zabaldano 4 piaghe di rinforzo ogni mezz'ora totale 2 ore.Faccio lievitare per altre 2 ore a 25 gradi.Divido a 8 pezzi di stesso peso ,di nuovo faccio riposare per mezz'ora e do la forma finale a mezza tovaglia di cotone spolverata di farina con le pieghe di stoffa in modo che stanno vicino e lascio lievitare per altre 2 orette.Cotturaa 230°C per 15 minuti con vapore e 15 minuti senza vapore","note":"","tags":[],"_importId":15632},{"nome":"Fiordilatte di Natale :","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"L","name":"latte fresco di mucca consenziente"},{"qty":8.0,"unit":"n°","name":"rossi d'uovo di gallina felice"},{"qty":250.0,"unit":"g","name":"zucchero semolato"},{"qty":50.0,"unit":"g","name":"zucchero a velo"},{"qty":1.0,"unit":"n°","name":"stecca di vaniglia"},{"qty":8.0,"unit":"n°","name":"chicchi di caffè"},{"qty":null,"unit":"q.b.","name":"zucchero per caramellare lo stampo"}],"procedimento":"Fai bollire a fuoco bassissimo il latte con lo zucchero semolato, la stecca di vaniglia aperta per la lunga ed i chicchi di caffè. (tienilo d'occhio perchè può montare e uscire all'improvviso e fa un macello...).\nVersa un pò di zucchero nello stampo del fiordilatte e fallo caramellare sul fuoco senza bruciarlo troppo poi lascialo raffreddare.\nQuando il latte è diventato la metà toglierlo dal fuoco e lasciarlo raffreddare.\nPoi montare con lo sbattitore i rossi d'uovo e lo zucchero a velo finchè non si gonfia e diventa più chiaro.\nIncorpora lentamente il latte con i rossi montati usando un colino per filtrarlo dal caffè, stecca di vaniglia & impurità varie.\nVersa il composto nello stampo da fiordilatte e mettilo a bagnomaria in una casseruola con 3 dita di acqua\nFallo bollire lentamente mezz'ora sul fornello poi trasferiscilo in forno già caldo a 180° posizionandolo in basso, li lo lasci 3/4 d'ora controllando che non scurisca troppo verso fine cottura.\nDevi infilarci uno stecchino e deve uscire asciutto.\nTips & tricks :\n1- se bollendo sul fuoco il fiordilatte fa della schiumina, toglila con un cucchiaio ( e mangiala...) prima di trasferirlo in forno perchè la schiuma cuoce subito e carbonizza, così dopo non si capisce più quando è cotto....deve diventare marroncino ma non nero.\n2- puoi mettere anche meno zucchero in rapporto al latte...provalo così e senti se per te è troppo dolce.","note":"","tags":[],"_importId":15948},{"nome":"Flauti a letto 🛌","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina"},{"qty":120.0,"unit":"g","name":"latte a piacere"},{"qty":120.0,"unit":"ml","name":"acqua"},{"qty":25.0,"unit":"g","name":"lievito fresco di birra o 7g secco di birra"},{"qty":7.0,"unit":"g","name":"sale"},{"qty":10.0,"unit":"g","name":"olio evo"},{"qty":200.0,"unit":"g","name":"cioccolato bianco per il ripieno"}],"procedimento":"Unisci tutti gli ingredienti e impasta a mano o con planetaria fino a formare la massa, poi aggiungi il sale e infine olio e uova, \nDopo trasferisci l’impasto sul piano e fai un giro di pieghe. Se non diventa subito liscio, fai una pausa di 10min (coperto con l’anno o pellicola) e ripeti. Metti in ciotola, copri con un panno e fai lievitare fino quasi al raddoppio. (30 min circa ma dipende dalla temperatura di casa). \nStendi l’impasto abbastanza sottile e forma 12 rettangoli. Incidi delle striscioline lungo ogni rettangolo per circa 2 terzi della lunghezza, metti il cioccolato sulla parte non incisa e arrotola. Fai lievitare fino al raddoppio, già in teglia e coperti da un panno. \nSpennella i flauti col latte e uovo sbattuti, cuoci in forno preriscaldato (statico) a 180gradi per 15-20min, fino a doratura.\nSi mantengono per giorni, non lasciarli all’aria. Con 30-40 secondi in microonde tornano morbidi, puoi anche congelarli se li mangi dopo 3-4 giorni\n#flauti #ricetta #materasso","note":"","tags":[],"_importId":14997},{"nome":"FOCACCIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina di tipo 1"},{"qty":250.0,"unit":"g","name":"farina 0"},{"qty":370.0,"unit":"g","name":"acqua tiepida"}],"procedimento":"15 g di ldb ( se avete solo il pom di tempo, se ne avete più potete usarne anche molto meno! Io ne ho usato 15g)\n1 cucchiaino di zucchero\n10 g di sale! Sciogliere il lievito nell'acqua, e aggiungere lo zucchero!  Poi fare un\nImpasto veloce in ciotola con tecnica no knead , lievitare 2 ore, quindi passare l'impasto su semola rimacinata, fare 2 o 3 pieghe! Stendere allargando l'impasto senza far uscire tutta l'aria! e far lievitare in teglia coperta x altre 2 ore! Emulsiono con acqua e olio, aggiungo un po di sale, poi Cottura 15 min a 250 ventilato!\nPer quella alla cipolla, invece ho seguito la ricetta di tutti a tavola \"pizza in teglia\"! Ottima cena!","note":"","tags":[],"_importId":7839},{"nome":"FOCACCIA  DI RECCO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: 270.ml.di acqua- 30 gr di.olio.evo- 10 gr di sale - 400 gr di.Manitoba - Per farcire:\nun.panetto di stracchino.\nPreparazione: mescolare acqua ,  olio e il.sale. Unire a poco a poco la farina.fino ad ottenere una pasta molto elastica. Coprire con.pellicola e sopra un telo e far riposare 2 ore. Ungere bene una teglia. Schiacciare col.mattarello la pasta, (2 cm di spessore). Spolverare il.dorso delle mani con.la farina, dividere la pasta a metà, e con.il suo.peso.farla scendere.verso il.basso, cercando di tirarla. Ricoprire una teglia da forno.unta di.olio, e sopra  collocare ben distanziati, dei mucchietti di  stracchino. Fare lo stesso trattamento.con.l'altra metà  della pasta, e coprire la teglia preparata con.lo.stracchino. Schiacciare bene i bordi.e ritagliare la pasta in eccedenza. Fare dei tagli sulla parte superficiale, coprire e far riposare.per 30-60.minuti. Salare la superficie, spennellare con olio evo.ed infornare. alla potenza massima del vostro forno fino.a cottura.\nI.nipoti.sentitamente ringraziano.Angelo Simonini.","note":"","tags":[],"_importId":7648},{"nome":"FOCACCIA AD ALTA IDRATAZIONE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Chiaramente ora la posso riguardare con comodo sul computer e mi son trovata Luca  il figlio di Vittorio Viarengo , ancora bambino, che faceva l'assaggiatore di quello che preparava il suo papà. \nIngredienti: 400 gr di farina Manitoba - 400 gr di acqua - 2 gr di lievito di birra fresco  ( oppure 1 gr di lievito secco) - 12 gr di sale - 14 gr di olio evo.\nPreparazione: per questa ricetta serve la impastatrice \nVersare l'acqua nella ciotola  lasciandone 100 gr da parte, poi  il lievito secco, inserire la foglia nella macchina, poi tutta la farina Manitoba  ( ad alto contenuto di  glutine), ed iniziare ad impastare. Unire poi \nil sale, e dopo qualche minuto,  fermare la macchina, staccare la pasta dalla foglia aiutandosi con un tarocco, e poi continuare ad impastare. Dopo 5 minuti di lavoro, staccare nuovamente la pasta dalla foglia, e montare, al suo posto,  il gancio. Riprendere ad impastare, mettere l'olio a filo sempre impastando , poi  poco a poco l'acqua tenuta da parte, cercando di far incordare di nuovo tutto. Aumentare la velocità  a 4, e nuovamente la pasta si staccherà  dal fondo.\nNel frattempo bagnare   con acqua il tavolo da lavoro , sopra mettere 2 fogli di  pellicola attaccati vicini, ungere con un po' di olio mani e fogli, poi adagiare sopra la pasta e iniziare a fare le pieghe. Dopo averle fatte due o tre volte, mettere la pasta in un contenitore ben oliato,  chiuderlo bene, e riporlo in frigo  per 24 ore. Trascorse le 24 ore, lo si mette a lievitare nel forno spento con.la luce accesa, fino al raddoppio, poi lo si rovescia sulla spianatoia unta, aiutandosi col tarocco unto di olio,  si fa una piega a tre, lo si porta su una teglia ben oliata,  lo si schiaccia con le mani, e  con le dita si fa arrivare fino ai bordi della teglia. Sopra si spennella con una emulsione di acqua e olio, e poi  aghi di rosmarino e sale grosso. Far lievitare coperto per 30  minuti. Cuocere in forno preriscaldato a 240 gradi, per 15 -20 minuti. \nFreddare su griglia.","note":"","tags":[],"_importId":12151},{"nome":"FOCACCIA BIANCA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Nada Beggiato è molto semplice ma ha un passaggio fondamentale....le pieghe di rinforzo altrimenti non viene...allora: 500 gr di Manitoba, 350gr acqua, 5 gr lievito di birra, 10 gr sale, 10 gr olio..... fatto l'impasto, (ti verrà piuttosto morbido ma non preoccuparti) coprilo e fallo riposare 20 minuti....dopo di che fai le pieghe e rimetti a riposo per altri 20 minuti.....ripeti l'operazione ancora una volta.....a questo punto, metti l'impasto in una ciotola con coperchio e lascia lievitare per 3 ore...a questo punto l'impasto è pronto per essere spezzato....puoi farci le pizze (fai le palline e fai rilievitare per 1 ora) altrimenti ungi la teglia del forno, stendi per bene l'impasto, fai rilievitare per 2 ore, poi metti sale e olio....schiacciala con i polpastrelli, e informa a 250 x 15/20 minuti....fammi sapere come ti è venuta!","note":"","tags":[],"_importId":7776},{"nome":"FOCACCIA BOLLOSA🌱💛 Semplicemente irresistibile🤤👇","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina 0"},{"qty":100.0,"unit":"g","name":"farina tipo 1"},{"qty":340.0,"unit":"g","name":"acqua"},{"qty":10.0,"unit":"g","name":"sale"},{"qty":5.0,"unit":"g","name":"lievito di birra fresco"}],"procedimento":"Procedimento\nImpastare tutti gli ingredienti lasciando per ultimo il sale. Data l’alta idratazione versare l’acqua poco alla volta. Una volta ottenuta una palla liscia lasciare a temperatura ambiente coperta con pellicola per 1 ora.  Passata l’ora mettere in frigo per 12 ore o comunque per tutta la notte. Per la teglia nel video che è quadrata con misure 23x23 cm stagliare 350 g di impasto e adagiarli sulla teglia. Se la vostra non e antiaderente aiutarsi con un foglio di carta forno. Con il resto dell’impasto fate altre focaccine simpatiche per grandi e picccini.\nLasciate la focaccia in teglia coperta con pellicola per un’altra ora e mezza o fino a che sarà molto facile stenderla. Scaldate il forno a 220 gradi modalità statica. Praticare i buchi, condite con sale in fiocchi e rosmarino. Cuocere la focaccia per 25 minuti, sfornarla e fare asciugare su gratella. Condire a piacere, noi ad esempio abbiamo usato della scamorza tagliata fine fine, poi abbiamo ripassato la focaccia in forno per 3 minuti.","note":"","tags":[],"_importId":10277},{"nome":"FOCACCIA CON LE CIPOLLE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina manitoba"},{"qty":200.0,"unit":"g","name":"farina ’00"},{"qty":365.0,"unit":"g","name":"acqua a temperatura ambiente"},{"qty":1.0,"unit":"cucchiaino","name":"lievito di birra secco – 8 gr di lievito d
