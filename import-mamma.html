7},{"nome":"PIZZOCCHERI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"patate"},{"qty":400.0,"unit":"g","name":"verza"},{"qty":400.0,"unit":"g","name":"farina di grano saraceno"},{"qty":150.0,"unit":"g","name":"burro"},{"qty":200.0,"unit":"g","name":"formaggio casera"},{"qty":100.0,"unit":"g","name":"farina 00 più un pó"},{"qty":270.0,"unit":"n°","name":"acqua calda"}],"procedimento":"PIZZOCCHERI\n\n500 g patate\n400 g verza\n400 g farina di grano saraceno\n150 g burro\n200 g formaggio casera\n100 g farina 00 più un pó\n6\nspicchi di aglio\ngrana grattugiato\nsale\n270 acqua calda","note":"","tags":[],"_importId":13120},{"nome":"Plumcake arancia e mandorle","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"uova,"},{"qty":100.0,"unit":"g","name":"olio ,"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":2,"unit":"n°","name":"arance succo e buccia ,"},{"qty":250.0,"unit":"n°","name":"farina"},{"qty":1,"unit":"n°","name":"bustina di lievito"},{"qty":100.0,"unit":"g","name":"mandorle frullate."}],"procedimento":"Montare uova e zucchero, aggiungere olio e mandorle, il succo e la buccia grattata delle arance,farina e lievito setacciati. Forno statico 180gradi per circa 40 minuti.","note":"","tags":[],"_importId":13628},{"nome":"Plumcake del buon mattino","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":50.0,"unit":"g","name":"zucchero"},{"qty":50.0,"unit":"ml","name":"olio di semi"},{"qty":250.0,"unit":"ml","name":"latte"},{"qty":1.0,"unit":"bustina","name":"vanillina"},{"qty":12.0,"unit":"g","name":"lievito in polvere per dolci"}],"procedimento":"Preparazione\nIn una capiente ciotola sbattete le uova con lo zucchero e l’olio di semi con una frusta fino a renderle un composto omogeneo.\nAggiungete il latte senza smettere di mescolare.\nUnite la vanillina e infine la farina e il lievito setacciati.\nImburrate e infarinate uno stampo da plumcake e versatevi i due terzi del composto preparato.\nDistribuite la marmellata che avete scelto sull’impasto con un cucchiaino.\nCoprite con l’impasto restante.\nInfornate in forno caldo, in modalità statica a 180° per mezz’ora.\nSfornate e lasciate intiepidire.\nTrasferite il vostro plumcake del buon mattino su di un vassoio o un piatto da portata e spennellatele la superficie con un po’ di marmellata riscaldata con poca acqua (in modo da renderla fluida), quindi cospargete con un po’ di granella di zucchero.\nLasciate raffreddare completamente e servite.","note":"","tags":[],"_importId":11810},{"nome":"POLLO ALLA CONTADINA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: un.pollo ( per  me che sono sola ho cotto un galletto) - sale fino - uno spicchio.di aglio- un rametto  di rosmarino - 2 carote -  2 cipolle - 2 coste di sedano - 2.patate - olio evo q. b . - vino bianco 100 ml.\nPreparazione: condire il pollo con sale e pepe. In ciotola a fette \nle carote, le cipolle, le patate e il sedano a pezzetti. Condire con olio evo, sale e pepe, e mescolare. Sul fondo di una teglia sistemare il.pollo con le verdure attorno  più  l'olio, lo spicchio di aglio e il rametto del rosmarino. Infornare a 190 gradi.per circa 90 minuti e a metà  cottura mettere il vino bianco. Una volta cotto  sistemare il pollo su un piatto da portata con una metà  delle verdure attorno. \nL'altra metà frullarla nel mixer assieme al liquido di cottura e usare questa.salsa come accompagnamento da servire col pollo. Vi assicuro che è  molto saporito.","note":"","tags":[],"_importId":10713},{"nome":"Polpette allo yogurt con piselli","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"sale"}],"procedimento":"Polpette allo yogurt con piselli\nCarne trita magra 600gr\nSalsiccia 250gr\nFarina 00 200gr\nYogurt 150gr o 200gr\nParmigiano 50gr\nUova 1 grande o due piccole\nSale qb","note":"","tags":[],"_importId":13351},{"nome":"Polpettone genovese","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Il nome può trarre in inganno, come vedete la forma è tutt'altro che quella di un polpettone, un piatto con pochi ingredienti che potrete modulare sui vostri gusti, che sa di estate e di campagne liguri, di sapori che ricordo sin da bambina, io questa volta l'ho fatto con tutti gli ingredienti ma si può rendere vegetariano ed anche vegano.\n500 gr patate \n350 gr fagiolini\n2 uova\n50 gr parmigiano\n50 gr mortadella\n2 funghi secchi\nCipolla \nMaggiorana\nSale \nPepe \nOlio\nLessare le patate con la buccia, in un'altra pentola i fagiolini, far intiepidire.\nIn una padella affettare un pò di cipolla e far appassire, scolati i fagiolini sminuzzarli insieme ai funghi secchi,fatti prima rinvenire,con un coltello o mezzaluna, aggiungerli alla cipolla e far insaporire per 7 - 8 minuti.\nSchiacciare le patate, aggiungere le uova, i fagiolini, il parmigiano, la mortadella sminuzzata al coltello, la maggiorana, aggiustare di sale e pepe.\nOliare una teglia, cospargetela di pangrattato, mettere il composto, con i rebbi di una forchetta si dovrebbero fare le classiche righe, io ho preso un coltello e fatto dei rombi.\nInfornare a 180° finché non si forma la crosticina.\nPotete omettere la mortadella, anche i funghi e viene buona ugualmente","note":"","tags":[],"_importId":14740},{"nome":"POLPETTONE VERZA E ALICI","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Cuocere bene aggiungendo acqua o brodo vegetale \nFar raffreddare \nFrullare\nTostare pane grattugiato con alici e capperi\nUnire il tutto con uno o due uova\nBollire in acqua per circa mezz’ora dopo averlo avvolto con un telo.","note":"","tags":[],"_importId":10220},{"nome":"Prendete carta e penna ✍️","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1000.0,"unit":"g","name":"semola rimacinata 13 g prot."},{"qty":800.0,"unit":"g","name":"acqua"},{"qty":7.0,"unit":"g","name":"lievito di birra fresco"},{"qty":5.0,"unit":"g","name":"malto diastasico"},{"qty":20.0,"unit":"g","name":"sale"}],"procedimento":"Procedimento:\n\n🌙 Il giorno precedente prepara un preimpasto con 500 g di semola rimacinata, 5 g lievito, 350 g acqua e 5 g sale. Lascia a temperatura ambiente per 90 minuti e poi frigo fino al giorno successivo.\n\n☀️ Il giorno seguente, aggiungi al preimpasto la restante parte degli ingredienti fino a formare un impasto ben incordato, liscio ed emogeneo.\n\n👉 Fai lievitare fino a quasi il raddoppio dopodiché spezza panetti da 550/600 g e fai una leggera preforma. Fai riposare per 30/40 minuti e poi forma per riporre nel cestino ben infarinato.\n\nLascia lievitare a temperatura ambiente per 30 minuti e poi posizionali in frigo coperti da pellicola per 16/20 ore.\n\n🔥 Cottura:\n\n15’ a 225 gradi con vapore\n\n15’ a 210 gradi \n\n10’ a 190 gradi \n\n5’ a 180 gradi a spiffero\n  Antonio Casu al di là del fatto che non è una biga ma un preimpasto, perché la biga esiste solo quella di Giorilli (44% di idratazione, 1% di lievito e gestita per 18 ore a 18 gradi, realizzata esclusivamente con farina bianca), chi ti ha detto che non si può mettere il sale? Aggiungere il sale è una scelta tecnica e non un tabù. Se vuoi, ti posso elencare tecnicamente i benefici","note":"","tags":[],"_importId":15439},{"nome":"Preparazione del piatto","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione del piatto\nCome preparare la torta ai mandarini\nLavate i mandarini per bene, tagliateli in 4, togliete solo i semi. Mettete in un frullatore i mandarini con le bucce e tutto assieme alle uova, l’olio, lo zucchero e la vaniglia. In una ciotola a parte mettete la farina e il lievito e mescolate con la parte liquida frullata. Mettete in una tortiera tonda di medie dimensioni o in uno stampo tipo plumcake e infornate a 170°C, in forno preriscaldato, per circa 30-40 minuti. La tarta mandarina così preparata si può servire anche rivestita di glassa di zucchero o di cioccolato, o con a lato cioccolato fondente fuso, a piacere. Per chi è intollerante al glutine o è celiaco, si può sperimentare la versione con farina di mandorle, al posto della farina normale, e usare un lievito naturalmente senza glutine.\nIngredienti \n  100 g Zucchero\n  200 g Farina\n  3 Mandarini\n  80 ml Olio di semi\n  bustina Lievito per dolci\n  q.b. Aroma alla vaniglia\n  3 Uova","note":"","tags":[],"_importId":15313},{"nome":"Primo pane con il mio lievito madre!","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":600.0,"unit":"g","name":".farina 0"},{"qty":400.0,"unit":"g","name":"farina di grano  duro"},{"qty":300.0,"unit":"g","name":"lievito madre"},{"qty":800.0,"unit":"ml","name":"acqua 💧"},{"qty":1,"unit":"n°","name":"cucchiaino  di miele"},{"qty":1,"unit":"n°","name":"cucchiaio  di sale"},{"qty":2.0,"unit":"cucchiaio","name":"olio  d'oliva"}],"procedimento":"In frigo  t.c tutta la notte,  mattino  presto tirato fuori dal frigo  attendo un'ora  , poi faccio i panetti \nmetto nei cestini dopo un'ora  metto in teglia su carta forno, cualche segno con la lametta,  \nPoi in forno a 250 g. Per 10 minuti 10 minuti  a 220g   20 muti a 200, con un pentolino  con acqua  la parte sotto del forno!","note":"","tags":[],"_importId":15702},{"nome":"Procedimento:","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Procedimento:\n500gr di Farina (W300)\n320-350gr di acqua fredda\n1gr di lievito fresco\nImpasto a mano utilizzando metà dell'acqua\nAggiungo 12gr di sale e poco alla volta aggiungo il resto dell'acqua.\nCopro I'impasto nella ciotola e attendo 30 minuti\nProcedo con la laminazione e Chiudo dal basso\nI'impasto.\nAttendo 2h a temperatura ambiente, poi in frigo\nfino al giorno successivo per 20h\nDivido in 3 panetti da 280gr e attendo 4 ore prima di infornare PiattiTipici\n\n#altaidratazione #imparaconaltaidratazione \n#piattitipiciregionali #impasto","note":"","tags":[],"_importId":15859},{"nome":"Pronti. P ","name":"sale,"},{"qty":null,"unit":"q.b.","name":"zucchero a velo,"}],"procedimento":"Per prima cosa versare in una ciotola le uova, lo zucchero, la vaniglia, l’olio e il latte.\nSTEP 2.\nMescolare bene fino ad ottenere una crema liscia e omogenea. Aggiungere le due farine e il lievito, setacciandole bene per evitare la formazione di grumi. Potete sostituire la farina di farro con della farina integrale.\nSTEP 3.\nInserire un pizzico di sale fino e continuare a mescolare bene con l’aiuto delle fruste elettriche. \nSTEP 4.\nVersare quindi il composto in una teglia quadrata dai bordi alti ben imburrata ed infarinata. \nSTEP 5.\nCuocere in forno statico a 160°C per 35/40 minuti. \nSTEP 6. \nUna volta che la torta sarà raffreddata, tagliare a metà e farcire con la confettura di albicocche. Potete utilizzare la confettura che preferite.\nSTEP 7.\nDecorare con zucchero a velo e tagliare in quadrotti a seconda della dimensione desiderata.","note":"","tags":[],"_importId":14010},{"nome":"Quando ero bambina a Palermo si chiamava Tronchetto","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Quando ero bambina a Palermo si chiamava Tronchetto all’arancia era in ogni pasticceria ed era anche uno dei miei dolci preferiti.\nAdesso è diventato famoso come Pan d’arancio… per me però resterà sempre il tronchetto che mi fa tornar bambina.\nCondivido la MIGLIORE RICETTA mai provata \n* 250 g arancia biologica \n* 250 farina 0\n* 200 zucchero\n* 3 uova\n* 100 ml di olio di arachidi\n* 1 bustina di lievito\nx la glassa\n* 1 arancia bio e mezzo\n* 120 g zucchero\nLava e Taglia l’arancia e frullala tutta intera fino a farla diventare una purea.\nMonta le uova con lo zucchero, aggiungi l’olio e la purea, in ultimo la farina setacciata con il lievito.\nRivesti uno stampo da plumcake e inforna a forno caldo a 180º statico per 45 minuti circa (prova stecchino finale)\nPer la glassa affetta mezza arancia, spremine una intera, metti tutto in una padella, aggiungi lo zucchero e fai cuocere a fuoco basso finché fa le bolle. Deve rimanere semi liquido.\nSforna il dolce, decoralo con le arance caramellate e versa la glassa (semmai si fosse rappresa troppo scaldala nuovamente)\n#dolci #ricette #arance #italianfood","note":"","tags":[],"_importId":16131},{"nome":"Quando l’ho sfornata","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"mele a fettine","sezione":"Per la base rovesciata"},{"qty":40.0,"unit":"g","name":"burro","sezione":"Per la base rovesciata"},{"qty":40.0,"unit":"g","name":"zucchero di canna","sezione":"Per la base rovesciata"},{"qty":2.0,"unit":"g","name":"cannella","sezione":"Per la base rovesciata"},{"qty":2.0,"unit":"n°","name":"uova medie","sezione":"Per la base rovesciata"},{"qty":120.0,"unit":"g","name":"zucchero di canna","sezione":"Per la base rovesciata"},{"qty":100.0,"unit":"g","name":"burro morbido","sezione":"Per la base rovesciata"},{"qty":1.0,"unit":"g","name":"cannella","sezione":"Per la base rovesciata"},{"qty":60.0,"unit":"g","name":"latte","sezione":"Per la base rovesciata"},{"qty":50.0,"unit":"g","name":"mandorle con la buccia","sezione":"Per la base rovesciata"},{"qty":150.0,"unit":"g","name":"farina 00","sezione":"Per la base rovesciata"},{"qty":10.0,"unit":"g","name":"lievito per dolci","sezione":"Per la base rovesciata"}],"procedimento":"Procedimento.\nInizia caramellando le mele: in padella sciogli burro e zucchero con la cannella. Aggiungi le mele tagliate a fette sottili e cuoci 3 minuti.\nDisponile sul fondo della tortiera foderata con carta forno.\nPrepara l’impasto: monta burro, scorza grattugiata d’arancia, cannella e zucchero.\nAggiungi in quest’ordine: uova, latte, polvere di mandorle, farina e lievito: impasto pronto.\nVersalo sopra le mele livellando bene.\nCuoci in forno preriscaldato a 170° statico per 45 minuti.\nLascia intiepidire, capovolgi e gusta!\n\n#tortadimele #rovesciata #mele #cannella","note":"","tags":[],"_importId":16085},{"nome":"Quel ripieno di ricotta e gocce di cioccolato ti","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00","sezione":"Per la pasta frolla"},{"qty":150.0,"unit":"g","name":"zucchero semolato","sezione":"Per la pasta frolla"},{"qty":100.0,"unit":"g","name":"burro morbido","sezione":"Per la pasta frolla"},{"qty":1.0,"unit":"n°","name":"uovo intero","sezione":"Per la pasta frolla"},{"qty":1.0,"unit":"n°","name":"tuorlo","sezione":"Per la pasta frolla"},{"qty":500.0,"unit":"g","name":"ricotta","sezione":"Per il ripieno"},{"qty":100.0,"unit":"g","name":"gocce di cioccolato fondente","sezione":"Per il ripieno"},{"qty":100.0,"unit":"g","name":"zucchero semolato","sezione":"Per il ripieno"},{"qty":2.0,"unit":"n°","name":"uova","sezione":"Per il ripieno"},{"qty":null,"unit":"q.b.","name":"zucchero a velo","sezione":"Per la finitura"}],"procedimento":"Preparazione:\n\n1️⃣ Prepara la pasta frolla:\nLavora il burro morbido con lo zucchero fino a ottenere una crema.\nAggiungi l’uovo intero e il tuorlo, poi la scorza di limone.\nIncorpora la farina setacciata e impasta fino a formare un panetto liscio.\nAvvolgilo nella pellicola e lascia riposare in frigo per 30 minuti.\n\n2️⃣ Prepara il ripieno:\nIn una ciotola, lavora la ricotta ben scolata con le uova.\nAggiungi lo zucchero e mescola con le fruste elettriche.\nAromatizza con la scorza d’arancia e la cannella.\nUnisci le gocce di cioccolato e mescola bene.\n\n3️⃣ Assembla la crostata:\nStendi metà della frolla su una superficie infarinata e rivesti uno stampo da 24 cm.\nVersa il ripieno di ricotta nel guscio di frolla.\nStendi la frolla rimanente e adagiala sopra, sigillando bene i bordi.\n\n4️⃣ Cottura:\nCuoci in forno statico a 180°C per 40 minuti, finché la superficie sarà dorata.\nLascia raffreddare completamente prima di spolverizzare con zucchero a velo.\nTaglia a fette e goditi questa crostata irresistibile! 😍🍰","note":"","tags":[],"_importId":13958},{"nome":"Quella che ti propongo è una delle mie torte di mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"mele"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":130.0,"unit":"g","name":"zucchero semolato"},{"qty":150.0,"unit":"g","name":"farina 00"},{"qty":6.0,"unit":"g","name":"lievito per dolci"},{"qty":150.0,"unit":"g","name":"mandorle tostate"},{"qty":150.0,"unit":"g","name":"burro"},{"qty":3.0,"unit":"g","name":"cannella"},{"qty":1.0,"unit":"g","name":"sale"}],"procedimento":"Procedimento\nInizia sbucciando le mele. Tagliale a fette sottili, irrora con il succo di limone e metti da parte.\nIn forno, in una padella o al microonde (puoi scegliere il modo che più preferisci) fai tostare le mandorle. Da fredde, riducile in polvere utilizzando un tritatutto.\nLavora in una ciotola con una frusta a mano (oppure in planetaria) il burro morbido con lo zucchero semolato, la scorza di limone e la cannella, fino ad ottenere una crema soffice; successivamente incorpora l’uovo.\nAggiungi la polvere di mandorle tostate, la farina, il lievito ed il sale. Mescola ed amalgama bene.\nStendi la metà dell’impasto nello stampo imburrato ed infarinato e poni al suo interno uno strato di mele.\nCopri con l’impasto rimasto e cuoci in forno preriscaldato a 170° statico per 30/35 minuti (fino a doratura).\nFai raffreddare e spolvera con zucchero a velo.\n\n#tortadimele #tortadimeleecannella #mandorle #mele","note":"","tags":[],"_importId":16042},{"nome":"Questa che vorrei  condividere tra i miei due Gruppi","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Questa che vorrei  condividere tra i miei due Gruppi, di Viva la Focaccia e  Ammira Le MARCHE e le sue piazze, come di solito faccio\nla domenica,  e dato che si tratta di una cosa abbastanza lunga, anticipo tutto da condividere\ndomani mattina, 23 giugno. Si tratta di una ricetta non certo mia, ma è stata scritta  dall'amica blogger Natalia Cattelani , e io l'lo copiata interamente. Dopo i moltissimi messaggi che mi.sono arrivati riguardo alla \" Maionese fatta col.microonde\" voglio farvi vedere cosa ne pensa lei, nel suo libro \" Le ricette salva bolletta\" , quando parla della \n             CREMA\n        PASTICCERA \n     AL MICROONDE:\n\" Quando l'ho vista preparare da un noto maestro pasticciere, almeno 10\nanni fa, ho capito subito che l'avrei fatta mia, e da quel\nmomento in poi, la crema l'ho sempre realizzata così.  Seguendo questa tecnica non avrete più  il terrore dei grumi, non dovrete più mescolare in continuazione e\nnon dovrete più  controllare la temperatura.\nLa crema non deve mai arrivare a bollore: sopra i 90 gradi l'uovo\nInizia a tirar fuori l'odore di zolfo che rende la crema meno\npiacevole. Se in casa avete il forno a microonde,  provatela e fatemi sapere.\nIngredienti per mezzo litro di latte: 150 gr di zucchero - 4 tuorli - \n40 gr di amido.di mais - 500 ml di latte intero.- la scorza di un limone bio o\nEstratto di vaniglia.\nProcedimento: in una ciotola per cottura al microonde versate\nlo zucchero e i tuorli e mescolate subito. Unite l'amido di mais e il latte un po' alla volta.\nAromatizzate a piacere con la scorza di un limone biologico intera ( che poi eliminerete  a crema finita), oppure con un po' di estratto di vaniglia. Inserite la ciotola nel microonde e impostate la massima temperatura\n  per 2 minuti.\nAllo scadere del tempo , togliere il recipiente e mescolare con la frusta, inserire di nuovo il recipiente nel microonde impostandolo allo stesso modo. Procedete così, due minuti alla volta, fino a quando.non vedrete la crema addensarsi. \nAttenzione, la crema deve cuocere, quindi assicuratevi che sia ben addensata.\nTrasferite subito la crema in un contenitore basso e possibilmente raffreddato , copritela con pellicola per alimenti e conservatela in frigorifero. Prima di utilizzarla, mescolate la crema con una frusta per donare di nuovo morbidezza e cremosita'. \nPer impreziosirla e arricchirlola di gusto, aggiungere alla crema calda 100 gr di cioccolato bianco tritato , e una volta raffreddata, 200 gr di panna montata.\nQuesta crema sarà  così perfetta per farcire millefoglie, bignè  e torte alla frutta. \nQuesta  è  la versione \nModernissima di Natalia, non vi potevo certo dare la mia, che sicuramente, come dite voi apparterra'  agli anni ottanta del secolo scorso...e che io ...orrore...faccio ancora adesso  con la mia vecchia dose:  4 rossi - 100 gr di zucchero  - 50 gr di farina - mezzo litro di latte. Ho un quaderno, peccato senza data, con tutte ricette divquell'epoca, per il microonde. \nBattere i rossi con lo zucchero, poi unire la farina passata al setaccio, poi il\nlatte.  Cuocere per 9 minuti, girandola spesso, a 350 gradi , fino a che si sia addensata. \nFar riposare per 2 minuti.\nNon ridete, ma io la faccio come ho nel mio quaderno di quei tempi,  che  contiene ricette  per  microonde a 600 watt di potenza. Non sono.giovane come la mia amica, che ha pubblicato il libro da cui ho tratto la sua ricetta, senza cambiare una virgola, esattamente nel 2023.\nNon potevo certo darvi la mia ricetta, e quella che vi ho dato è  di Benedetta Rossi, di qualche anno fa, secondo me pure molto valida. \nAnche la foto appartiene al libro di Natalia Cattelani,  e ripeto, vediamo se i commenti dureranno ancora per molto.","note":"","tags":[],"_importId":14643},{"nome":"Questa è la ciambella romagnola (brazadela) dal","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Questa è la ciambella romagnola (brazadela) dal quaderno di ricette di mia suocera \nCiambella anche se non ha il buco...\nHa una consistenza particolare, a metà tra il biscotto e una torta morbida \nIngredienti: 250 gr farina, 1 uovo, 10 gr lievito per dolci, 60 gr strutto (o burro), 115 gr zucchero, vaniglia, 1 pizzico di sale, 110 ml di latte intero \nSi inizia amalgamando strutto, sale e zucchero, poi uovo e vaniglia, il lievito e qualche cucchiaio di farina. Poi si aggiunge metà latte e ancora qualche cucchiaio di farina. Quando è tutto ben amalgamato si unisce il resto della farina e il latte a filo fino a raggiungere la consistenza di una frolla moooolto morbida. Si forma un filone su carta forno (con le mani umide perché piuttosto appiccicoso), si cosparge con abbondante zucchero a velo e/o granella di zucchero e si cuocere a 190° ventilato per circa 20 minuti","note":"","tags":[],"_importId":15034},{"nome":"Questa è una ricetta base","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Questa è una ricetta base, quella con cui ha imparato lui. Dove ti dicono 5 g di lievito di birra o compatto, tu metti 50 g del tuo lievito madre. Attenzione se usi la farina integrale, ti servirà un po’ più di acqua. Io però ti consiglio di fare 50:50 con quella bianca. \nLa cottura io la verifico con lo stecchino , come per le torte.","note":"","tags":[],"_importId":7963},{"nome":"Questo di oggi è  un pane molto semplice da fare","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Questo di oggi è  un pane molto semplice da fare, e anche veloce da preparare,ma ci vuole assolutamente l'impastatrice. Per farlo  Vittorio Viarengo  ha usato una ricetta con un solo impasto, con tutti gli ingredienti.\nSto parlando del \nPANE DI PASTA DURA\n   TIPO CARAVANINI, \nun pane che si mantiene bene per 2 o 3  giorni.\nIngredienti: 300 gr di acqua a temperatura ambiente - 10-12  gr di sale - 30 gr di olio  evo - 550 gr di farina 0 di media forza - 25 gr di lievito di birra fresco  (9  gr secco).\nPreparazione : sciogliere il lievito nell'acqua, unire l'olio evo, e metà  farina, impastare, poi aggiungere il lievito, e man mano la farina rimanente. Impastare per 15 minuti con l'impastatrice,  e quando l'impasto è  pronto, si prepara direttamente il pane, senza farlo riposare, e addirittura  si inforna subito, senza farlo lievitare.\nTagliare l'impasto in 4 parti uguali,  ( io in due parti, perché  come mio solito, ho usato metà  dose).\nDare la forma del CARAVANINO a due pani alla volta.\nIo, per seguire velocemente tutto quello che Vittorio Viarengo  ci insegna, ho pensato bene di mettere le sue foto, belle, chiare, e precise come al solito, per farvi  capire meglio il suo operato.\nCol mattarello appiattire il primo pezzo di pasta, .fino ad ottenere una striscia piatta, poi arrotolarla su se stesa. Questo procedimento serve a dare forza alla pasta, e più  forza le si da', e meglio si sviluppa quando la si taglia per infornarla.\nLa stessa cosa si ripete con gli altri tre pezzi di pasta.\nA questo punto, coprire con un canovaccio e lasciar lievitare per 45 minuti,  55 minuti in inverno.\nScaldare il forno a 200 gradi, e al momento  di infornare, con un coltello molto affilato, o con una lametta, effettuare un taglio molto profondo al centro di ogni panino, e infornare.\nDice Vittorio Viarengo: \" Il taglio fa la differenza tra una pagnotta venuta bene e una venuta \"orba\", come in gergo dicono i panettieri.\nDopo 5 minuti che sono nel forno, i CARAVANINI dovrebbero  cominciare ad aprirsi, dopo 10 minuti  dovrebbero essere belli aperti, e dopo 20 minuti, dovrebbero avere la forma finale.\nCuocere in tutto 50-55 minuti, poi far freddare su una gratella.","note":"","tags":[],"_importId":13570},{"nome":"RACCONTO DI NATALE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"C’era un gran fermento in cielo quel giorno. Qua e là gruppi di angeli discutevano animatamente, qualche angioletto svolazzava da un capannello all’altro, ascoltava, riferiva , chiedeva… insomma cercava di capire cosa stava succedendo. Si era diffusa la grande notizia: stava per nascere il Salvatore, proprio quel giorno..\nAd un tratto un angioletto volò verso il punto più alto del cielo e si presentò a Dio Padre.\n“Signore – disse rispettosamente – abbiamo saputo la grande novità. Bella notizia, grandiosa direi, però, se permettete, il luogo di nascita….Ecco, il luogo di nascita, Betlemme, non ci sembra adatto  al re dei re. Non dico di scegliere Roma, ma almeno Gerusalemme, una città insomma. Betlemme è una piccola cittadina, abbiamo fatto fatica a trovarla sulle carte.”\nDio Padre sorrise: “Fidati. Betlemme è il posto adatto.”\nQualche minuto dopo Dio Padre si trovò davanti un altro angelo.\n“Signore- esordì l’angelo con un leggero tono di rimprovero – splendida notizia, davvero ..però proprio di notte deve nascere il Salvatore? Già l’angelo Gabriele, quando è andato ad annunciarne la venuta, si aspettava una principessa e si è ritrovato in una casa modesta con una ragazza del popolo. Almeno facciamo nascere il Salvatore in pieno giorno, con un sole sfolgorante e tutta la gente sveglia, pronta ad adorarlo.”\nDio Padre sorrise: “Fidati. La notte è il momento migliore.”\nInfine si presentò il terzo angioletto, quello che si occupava delle comunicazioni con la Terra.\n“Signore – disse esitante – ci hanno comunicato la magnifica notizia. Bello, veramente bello però, se permettete, vorrei suggerirvi di aspettare ancora un po’…un paio di millenni direi, per noi sono nulla ma sulla Terra potremmo diffondere la notizia come si deve. Televisione, internet, whatsapp!\nTutti saprebbero che è nato il Salvatore.”\nDio Padre sorrise: “Fidati. Questa è l’epoca giusta.”\nEntro sera  gli angeli destinati a dare il grande annuncio si prepararono: ali lucidate, prove di canto e di schieramento. Appena Gesù nacque, la schiera degli angeli si precipitò a Betlemme, qui si accorsero che tutto taceva, loro si erano dimenticati di decidere a chi portare l’annuncio e Dio Padre non aveva dato istruzioni..\nIl capo degli angeli propose: “Andiamo da una mamma. Le mamme hanno il sonno leggero, sempre pronte a svegliarsi al minimo rumore. In quella casa vive una signora con quattro figli, è il tipo ideale.”\nDavanti alla porta gli angeli si scatenarono, luci fantasmagoriche e un canto a più voci “Gloria in cielo e pace in terra agli uomini di buona volontà”\nLa donna comparve sulla soglia, il capo fece il grande annuncio, ma appena nominò un bambino, la signora si ritirò\n“Un altro bambino, ci mancherebbe, ne ho già curati quattro, adesso che sono cresciuti e posso dormire, dovrei andare da un altro bambino? A far che? Ad aiutare? A stare sveglia di notte? Non se ne parla. Torno a dormire.”\n“E adesso?” – gli angeli si guardarono incerti. Il più colto degli angeli intervenne\n“Betlemme significa città del pane, quindi qui ci sono dei fornai che a quest’ora stanno sicuramente impastando il pane e sono ben svegli. Guardate, laggiù c’è un forno, andiamo.”\nGli angeli si presentarono alla porta, perfettamente schierati, con tanto di luci sfolgoranti e, ovviamente, un canto perfetto, meraviglioso.\nIl fornaio diede loro un’occhiata poi tornò ad impastare brontolando: “Ma io ho da lavorare, non ho tempo da perdere per andare da un bambino. Devo infornare il pane, altrimenti domani cosa do ai miei clienti? Andate a disturbare qualcun altro.”\nGli angeli si sentivano proprio demoralizzati. Fu allora che  l’angioletto più piccolo, con due alucce che quasi scomparivano davanti alle altre, suggerì timidamente: “Cerchiamo qualcuno abituato a vegliare, chi veglia guarda anche verso l’alto e presta attenzione a ogni segnale. Potremmo andare dai pastori.”\n“Pastori? State scherzando, vero? I pastori non sono raccomandabili, anzi sono un po’ selvaggi, puzzolenti, vivono fuori dal paese.”\n“Però sanno vegliare, sono attenti a ogni rumore, devono difendere il gregge.”\n“Poveretti fanno un lavoro duro, all’aperto, non possono curarsi di se stessi.”\n“Il tempo passa e noi dobbiamo dare l’annuncio. Ha ragione l’angioletto, non ci restano che i pastori, il Salvatore capirà. Andiamo.”\nIl campo dei pastori era immerso nel buio, le pecore dormivano, qua e là brillavano piccoli fuochi attorno ai quali alcuni pastori cercavano di scaldarsi.\nGli angeli si schierarono in cielo, proprio sopra il campo, e intonarono “Gloria in cielo e pace in terra agli uomini di buona volontà.”\nI pastori alzarono lo sguardo, incuriositi, il capo degli angeli fece il grande annuncio e incredibilmente i pastori si alzarono e si recarono senza indugio dal Bambino.\nOffrirono i loro poveri doni,  ma il bambino sorrise e i loro cuori si riempirono di dolcezza e tornarono al loro campo colmi di gioia\nFu così che il Salvatore fu accolto per primo da poveri pastori puzzolenti.","note":"","tags":[],"_importId":9094},{"nome":"Rai INo","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina 0"},{"qty":500.0,"unit":"g","name":"farina tipo 2"},{"qty":800.0,"unit":"g","name":"acqua"},{"qty":200.0,"unit":"g","name":"lievito madre"},{"qty":2.0,"unit":"g","name":"lievito di birra"},{"qty":25.0,"unit":"g","name":"sale"}],"procedimento":"Preparazione:\nIn una ciotola, o in planetaria, mettiamo le due farina, 0 e tipo 2, con il lievito madre e quello di birra fresco sbriciolato(o solo 8g di lievito di birra fresco e 50g di acqua in più) e gran parte dell'acqua fredda, che aggiungiamo pian piano. Mescoliamo e, ad impasto formato, inseriamo il sale e l'acqua rimasta(circa 50g). Impastiamo qualche minuto, fino ad ottenere un impasto liscio ed omogeneo. L'impasto apparirà appiccicoso: lo pieghiamo su se stesso usando il cucchiaio. Copriamo e lasciamo lievitare 4 ore a temperatura ambiente.\n\nDopo la prima ora a temperatura ambiente, diamo una prima piega all'interno della ciotola. Dopo un'altra ora, diamo una piega sul piano, formando una palla stretta. Lasciamo riposare ancora 2 ore(4 in totale). Allarghiamo l'impasto sul piano infarinato abbondantemente, con le mani. Ottenuto un rettangolo piuttosto spesso, lo tagliamo a rettangoli più piccoli e li disponiamo, capovolgendoli, su una teglia con carta forno. Schiacciamo leggermente con le dita, copriamo e lasciamo lievitare ancora 40 minuti al caldo. Cuociamo in forno caldo e statico a 240° C per 18 minuti.","note":"","tags":[],"_importId":16489},{"nome":"Ricarica Vodafone","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ricarica Vodafone \nLatte2\nMozza bufala\nMandorle\nNoci\nBanane\nFrutti rossi\nZucchero bianco \nCandeggina \nTrita Sonny 2 tacchino 1 vitellone\nBurro di panna di latte\nFarina 0 2kg\nFarina 00 2kg\n\nPhiladelphia light 2\nLindt 4\nUova entrambe\nCarote\nCotto\nMozza bufala","note":"","tags":[],"_importId":9250},{"nome":"Ricetta acciughe ripiene","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":800.0,"unit":"g","name":"acciughe fresche"},{"qty":150.0,"unit":"g","name":"pane raffermo"},{"qty":40.0,"unit":"g","name":"parmigiano"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":2.0,"unit":"n°","name":"patate"}],"procedimento":"Ammollare il pane con il latte, strizzatelo unite 6 o 7 acciughe tritate,inserite il formaggio, prezzemolo e aglio anch'essi tritati, 1 uovo  sale qb\nFate l'impasto e mettetelo in mezzo a 2 acciughe e passateli nel pan grattato \nLe  patate tagliate a fettine e sbollentate \nIn uno tegame di 26 centimetri mettere la carta forno ungete con poco olio..adagiate le patate e proseguite con le acciughe come in foto","note":"","tags":[],"_importId":12423},{"nome":"RICETTA BOMBA DI RISO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparare un ragù con mezzo chilo di trita scelta di vitellone e mezzo metro di salsiccia con trito di cipolla, carote e sedano.\nalla fine (facoltativo) si possono aggiungere i piselli in scatola.\nFar bollire per 15 min in acqua bollente e salata 1kg di riso arborio\nscolare\ncondire con burro e formaggio parmigiano grattugiato \nFoderare col riso le pareti e il fondo di una pirofila (precedentemente imburrata e spolverata con pane grattugiato).\nRiempire il buco con il ragù.\nCoprire con il riso restante.\nAggiungere fiocchetti di burro sulla superficie e spolverare con pane grattugiato.\nCuocere in forno a 200 gradi per 45 minuti circa ( deve formarsi una crosticina croccante)","note":"","tags":[],"_importId":4908},{"nome":"RICETTA CANEDERLI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":18.0,"unit":"n°","name":"canederli da 70 gr ciascuno"},{"qty":400.0,"unit":"g","name":"pane grattugiato"},{"qty":400.0,"unit":"g","name":"latte"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":100.0,"unit":"g","name":"parmigiano grattugiato"},{"qty":80.0,"unit":"g","name":"mortadella"},{"qty":80.0,"unit":"g","name":"salame"},{"qty":100.0,"unit":"g","name":"speck"},{"qty":2.0,"unit":"fetta","name":"prosciutto cotto"},{"qty":18.0,"unit":"n°","name":"cubetti di fontina o scamorza affumicata"}],"procedimento":"RICETTA CANEDERLI\n\n18 canederli da 70 gr ciascuno\n\n400gr pane grattugiato \n400 gr latte (300 latte e 100 acqua)\n2 uova\n100 gr parmigiano grattugiato \n80gr mortadella \n80gr salame\n100gr speck \n2 fette prosciutto cotto \n18 Cubetti di fontina o scamorza affumicata","note":"","tags":[],"_importId":9986},{"nome":"RICETTA Cappelletti","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"manzo per stracotto"}],"procedimento":"Quando sono un po’ stufate adagiare la carne e girarla in modo da scottarla su tutta la superficie. Poi bagnare con vino rosso in abbondanza per due volte. Salare e coprire. Aggiungere brodo vegetale o acqua calda in modo che resti coperto durante la cottura.\nCuocere per tante ore (almeno 5 o 6 a fuoco basso basso).\nAlla fine il sugo si riduce un po’ \nDeve essere sufficiente per scottare il pane grattugiato. Eventualmente aggiungere acqua.\nRipieno (*)\n500gr pane grattugiato scottato col sugo di verdure caldo passato col passaverdura.\n500gr parmigiano reggiano \nCarne stracotto tritata\n3 uova\nPasta\n12 uova+1,2 kg farina 00+5gr sale+ acqua se necessario\nPeso cappelletto 12/13gr\nTot 360/400 cappelletti\nDisporli su vassoio (tipo cartone per pasticcini) coperto con carta forno infarinata e mano a mano che si riempie metterlo in freezer (io ho fatto anche due strati sovrapposti su ogni vassoio). \nDopo due ore circa ( quando sono congelati) si possono trasferire in un sacchetto per freezer.\nCosì si conservano bene.\nAnche se si volessero mangiare il giorno successivo io consiglio comunque di congelarli.\nCucinarli in brodo di cappone o con burro fuso e salvia.\nTanto parmigiano.\nBuon lavoro e buon appetito \n(*) ripieno totale 2780gr \nPasta con esubero \n450gr farina 0\n10 gr sale\n150gr esubero\n150 gr uova (circa 3 uova)\n80 gr acqua (più o meno)\nNe ho fatte due ma della seconda ne è avanzata un po’.\nTotale 300 cappelletti (334)\nTempo di lavoro: 5 ore\nDalle 14.00 alle 19.00","note":"","tags":[],"_importId":3057},{"nome":"Ricetta del Pane fatto in casa morbido dentro e","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La ricetta per fare il pane in casa come fatto dal panificatore con istruzioni semplici e chiare, una volta fatto l'impasto si attende la lievitazione e s'inforna.\nPortata Pane\nCucina Italiana\nPreparazione 1 ora 15 minuti\nCottura 45 minuti\nTempo di lievitazione 12 ore\nTempo totale 14 ore\n\nDosi per 6 persone\nCalorie per porzione265kcal\nCosto Basso\nAltri dettagli\nFacile da realizzare\nNecessaria per la preparazione una pentola (preferibilmente in ghisa) resistente ad alte temperature.\nIngredienti\n375 g Farina di grano tenero tipo 00 (11.5 g proteine per la panificazione)\n5 g Lievito di birra (3 g lievito a lievitazione istantanea)\n5 g Sale\n310 g Acqua tiepida\n\nIstruzioni\nCome preparare il pane fatto in casa\nPer preparare il pane fatto in casa iniziamo mescolando in una ciotola la farina con il sale. In un'altra ciotolina invece sciogliamo il lievito in acqua tiepida. Noi abbiamo usato questa farina per panificazione. \nServendoci di una forchetta uniamo la farina con l'acqua e il lievito fino ad ottenere un composto ben mescolato e appiccicoso. A questo punto copriamo la ciotola con un panno e lasciamo lievitare a temperatura ambiente per 12 ore. In estate sono circa 22 °C e 12 ore bastano, ma in inverno potrebbero volerci dalle 18 alle 24 ore visto che la temperatura è più bassa. Dipende tutto dalla temperatura della stanza dove lasciate l'impasto del pane a lievitare. \nTrascorso il tempo della prima lievitazione infariniamo un piano da lavoro e rovesciamoci sopra l'impasto del nostro pane fatto in casa, infariniamo anche la superficie dell'impasto e lasciamo riposare 15 minuti così. L'impasto è molto molle a questo punto, ma non aggiungete altra farina perché non avete commesso alcun errore! Deve essere proprio così molle. \nAppiattiamo l'impasto con le mani e poi ripieghiamo i quattro lati dell'impasto su sè stesso, come fosse un tovagliolo da ripiegare. Si tratta semplicemente di ripiegare i 4 lembi di pasta verso il centro. Prendiamo un canovaccio, infariniamo anche il canovaccio e poi appoggiamo la pagnotta con i lembi ripiegati verso il basso. Ricopriamo con il canovaccio e lasciamo lievitare 1 o meglio se abbiamo anche 2 ore di tempo. Almeno mezz'ora prima di infornare, preriscaldiamo il forno ventilato a 250 °C con dentro la pentola (preferibilmente una pentola in ghisa con coperchio per pane), in modo che prenda la stessa temperatura del forno. \nQuando è il momento di infornare prendiamo la pentola calda e rovesciamoci dentro l'impasto del nostro pane fatto in casa ben lievitato. Le pieghe che abbiamo fatto precedentemente saranno quindi rivolte verso l'alto. Copriamo la pentola con il coperchio e lasciamo cuocere per 30 minuti. Togliamo il coperchio e terminiamo la cottura con forno statico a pentola scoperta per altri 10-15 minuti. Controlla il colore della crosta del tuo pane fatto in casa per capire quand'è pronto. \nQuand'è ben cotto il pane fatto in casa va tirato fuori dal forno e lasciato su una gratella in modo che possa raffreddarsi. Dobbiamo aspettare almeno un'ora prima di avere il piacere di affettarlo, perché altrimenti risulterà gommoso e poco croccante. Durante il raffreddamento se ascoltate bene vicino al pane (senza farvi prendere per pazzi) lo sentirete \"cantare\", qualche scricchiolio indica il momento in cui il vapore della mollica esce dalle microfessure della crosta. Dei micro geyser che sono essenziali per far uscire un pane quasi perfetto come quello del panificatore. Se tagliate il pane fatto in casa troppo presto infatti il vapore esce tutto insieme e risulterà poco cotto e con la mollica gommosa: meglio di no, visto che avete atteso più di un giorno per questo momento! Dopo che si è raffreddato un'ora lo potete già assaggiare, è il vostro pane fatto in casa!","note":"","tags":[],"_importId":10139},{"nome":"Ricetta della granita al limone","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"acqua 200 g di zucchero semolato 2 limoni"}],"procedimento":"Procedimento\nLavate i limoni e prelevate la parte gialla della scorza. In un pentolino versate l’acqua, lo zucchero e la scorza di limone, portate a bollore e poi lasciate raffreddare. Spremete i limoni fino ad ottenere 250 g di succo, versatelo nella pentola con lo sciroppo di zucchero e mescolate. Filtrate il composto e versatelo in una pirofila. Lasciatelo in congelatore per 4-5 ore, avendo cura di mescolare e rompere i cristalli di ghiaccio con una forchetta ogni 30 minuti circa. Servite la granita in una coppetta e decorate con uno spicchio di limone.\nCon il frullatore\nSe non avete tempo di mescolare la granita ogni 30 minuti, potete dividere il composto in più parti all'interno di uno stampino per ghiaccio e poi tritate tutto al momento di servire. In questo modo potrete anche decidere quanti cubetti utilizzare subito e quanti no e la granita si conserverà più a lungo in freezer. Potete prepararne di più e tenerla al fresco per 10 giorni per tritarla solo al bisogno. Scegliete un elettrodomestico resistente e performante perché non è facile tritare cubetti di ghiaccio.\nI 5 errori da non commettere per fare la granita\nNon preparate la granita al limone con dello sciroppo di limone commerciale. Non aggiungete latte o panna perché non sarebbe più una granita, ma un gelato al limone. Non usate limoni di scarsa qualità o nel peggiore dei casi trattati. Non riducete troppo la quantità di zucchero perché otterrete una limonata. Non aspettate troppo a servirla nelle coppette una volta fuori dal freezer.","note":"","tags":[],"_importId":11076},{"nome":"Ricetta Focaccia Elena Mariani","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"600 gr farina 25 gr lievito fresco 15 gr sale 2 cucchiaini di zucchero 400 ml acqua 140 olio\nSciogliere sale e zucchero nell'acqua tiepida più aggiungere 40 ml di olio poi metà farina e mescolare. Aggiungere il lievito sbriciolato e l'altra farina. Distribuire 50 ml di olio sulla teglia ( io ne ho messo meno avendo usato la carta forno) e distribuire l'impasto. Spennellare con un po' di olio e far lievitare per 1 h e mezza a 30gradi. Allargare ancora l'impasto, spennellare ancora con olio e del sale grosso, lievitare altri 30 minuti. Io per questioni lavorative l'ho lasciata nel forno per 4 ore.. non so se è stato il tocco magico.. Formare i buchi coi polpastrelli, versare l'ultimo olio e far lievitare ancora 30 minuti. Spruzzare di acqua e informare a 200 gradi per 15 minuti","note":"","tags":[],"_importId":4801},{"nome":"Ricetta germano-austro-ungarico-italiana: l’apfelstrudel","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":150.0,"unit":"g","name":"farina 00"},{"qty":75.0,"unit":"g","name":"acqua temperatura ambiente"},{"qty":15.0,"unit":"g","name":"olio di semi di girasole"},{"qty":15.0,"unit":"g","name":"sale"},{"qty":1.0,"unit":"n°","name":"tuorlo"},{"qty":1.0,"unit":"kg","name":"mele"},{"qty":50.0,"unit":"g","name":"uva passa"},{"qty":50.0,"unit":"g","name":"pan grattato"},{"qty":60.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"cucchiaino","name":"cannella"},{"qty":60.0,"unit":"g","name":"burro"}],"procedimento":"1 - Aggiungere il sale nella farina, mescolare ed aggiungere l’acqua, il tuorlo e l’olio di semi\n2 - Impastare prima con un cucchiaio e, quando l’impasto si forma, passalo su una spianatoia e continua a mano per circa 5-10 minuti (diventerà elastico). Se hai difficoltà per la troppa collosità, aggiungi pizzichi di farina.\n3 - Chiudi la palla d’impasto nella pellicola e fai riposare un’ora a temperatura ambiente\n4 - Pela ed affetta le mele\n5 - Aggiungi l’uvetta e mescola\n6 - Mescola insieme zucchero e cannella e mescola versandolo sulle mele\n7 - Recupera l’impasto ed inizia a stenderlo (aiutati con pizzichi di farina)\n8 - Trasferisci l’impasto su un canovaccio e continua ad allargarlo quanto puoi\n9 - Sciogli il burro e spennellalo sull’impasto\n10 - Spolvera con pan grattato e spargi bene il ripieno su tutto l’impasto. Cospargi con ulteriore pan grattato\n11 - Arrotola il tutto aiutandoti con il canovaccio (potrebbero essersi creati dei buchi. Puoi provare a chiuderli ma non è grave)\n12 - Spennella di burro la carta forno, appoggiaci sopra lo strudel e spennella anch’esso\n13 - Inforna nel terzo basso del forno per 35 minuti a 200°C\n14 - Sforna e spennella ancora di burro. Lascia raffreddare\n15 - Fai piovere zucchero a velo e servi!\n#ricetta #dolce #apfelstrudel #strudel","note":"","tags":[],"_importId":15955},{"nome":"RICETTA GNUDI (gnocchi verdi)","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":600.0,"unit":"n°","name":"gr"},{"qty":300.0,"unit":"n°","name":"gr"},{"qty":60.0,"unit":"n°","name":"gr"},{"qty":50.0,"unit":"n°","name":"gr"},{"qty":100.0,"unit":"n°","name":"gr","sezione":"PER IL CONDIMENTO"}],"procedimento":"RICETTA GNUDI (gnocchi verdi)\nIngredienti\n\nSPINACI FRESCHI\n600 gr\nRICOTTA DI PECORA\n300 gr\nPARMIGIANO GRATTUGIATO\n60 gr\nFARINA 00\n50 gr\nUOVO INTERO\n1\nPEPE NERO\nq.b.\nSALE\nq.b.\nNOCE MOSCATA\nq.b.\nPER IL CONDIMENTO\nBURRO\n100 gr\nSALVIA\nq.b.\nPARMIGIANO GRATTUGIATO\nq.b.\n\ncontinua su: https://www.cookist.it/gnudi-la-ricetta/p1/#m5zke9iq6pyesutrknp\nhttps://www.cookist.it/","note":"","tags":[],"_importId":13529},{"nome":"Ricetta in minuto🤩Questo dolce fa impazzire il mondo","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"burro"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":300.0,"unit":"g","name":"farina"},{"qty":700.0,"unit":"ml","name":"latte","sezione":"Per la crema"},{"qty":2.0,"unit":"n°","name":"uova","sezione":"Per la crema"},{"qty":130.0,"unit":"g","name":"zucchero","sezione":"Per la crema"},{"qty":5.0,"unit":"cucchiaio","name":"amido di mais","sezione":"Per la crema"},{"qty":8.0,"unit":"g","name":"zucchero vanigliato o vanillina pura","sezione":"Per la crema"}],"procedimento":"Ricetta in minuto🤩Questo dolce fa impazzire il mondo (il segreto della nonna)....!!!\nGli ingredienti:\n100gr Burro\n2 uova\n100gr Zucchero\nLa scorza grattugiata del limone\n300gr farina\nLievito in polvere da 8 gr\nLasciare raffreddare in freezer per 20 min\nPer la crema\n700 ml di latte\n2 uova\n130gr Zucchero\nLa scorza grattugiata del limone\n5 cucchiai di amido di mais\n8 gr Zucchero vanigliato o vanillina pura\nIl succo di mezzo limone\nDecorare le mandorle pelate\n200°25 min\nStampo da 28 cm imburrato e infarinato\nDecorare con zucchero a velo","note":"","tags":[],"_importId":11965},{"nome":"RICETTA MUFFIN CIOCCOLATO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":220.0,"unit":"g","name":"farina 00"},{"qty":30.0,"unit":"g","name":"cacao amaro in polvere"},{"qty":150.0,"unit":"g","name":"zucchero"},{"qty":200.0,"unit":"g","name":"latte"},{"qty":70.0,"unit":"g","name":"olio di semi di arachide"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"},{"qty":1.0,"unit":"bustina","name":"lievito in polvere per dolci"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":12.0,"unit":"cucchiaino","name":"nutella®"}],"procedimento":"Preparazione\n\t\tPer ottenere il cuore morbido alla nutella dobbiamo congelarla, disponete quindi 12 cucchiaini di nutella ben distanziati, su un vassoio foderato di carta da forno e metteteli in congelatore, devono diventare duri come un cubetto di ghiaccio.\n\t\tMettete in una ciotola la farina, il cacao, il lievito, setacciate il tutto e unite lo zucchero. Aggiungete l’uovo, la vaniglia, l’olio e iniziate a mescolare versando il latte poco alla volta, dovete ottenere un composto cremoso ed omogeneo.\n\t\tFoderate uno stampo da muffin con 12 pirottini, versate in ogni pirottino un cucchiaio di composto, poi adagiate al centro un cucchiaino di nutella congelato e coprite con un altro cucchiaio di impasto.\n\nCuocete i muffin per 18/20 minuti a 180° in forno preriscaldato. Posizionate lo stampo nella parte più bassa del forno e ricordatevi di verificare la cottura con lo stecchino.\nI muffin al cacao con cuore morbido di nutella sono pronti, sfornateli, fateli raffreddare e serviteli.","note":"","tags":[],"_importId":7816},{"nome":"RICETTA MUFFIN DI CIOCCOLATO BUONI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"uova"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":50.0,"unit":"n°","name":"latte"},{"qty":50.0,"unit":"n°","name":"olio"},{"qty":125.0,"unit":"n°","name":"yogurt bianco"},{"qty":200.0,"unit":"g","name":"farina"},{"qty":300.0,"unit":"g","name":"cacao amaro"},{"qty":8.0,"unit":"g","name":"lievito"}],"procedimento":"RICETTA MUFFIN DI CIOCCOLATO BUONI\n\n2 uova\n100 gr zucchero \n50 latte\n50 olio\n125 yogurt bianco \n200 gr farina\n300 gr cacao amaro\n8 gr lievito \n\nForno 180 per 20/25 minuti","note":"","tags":[],"_importId":7817},{"nome":"RICETTA PAN BAULETTO CON LIEVITO MADRE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Rinfresco del lievito – Ore 8.00 Rinfrescate il lievito (liquido o solido che sia) e mettetelo a 27°C in attesa che arrivi al picco. Se usate la pasta madre sinceratevi se ha bisogno o meno di un bagnetto, e nel caso fateglielo prima del rinfresco. A seconda del lievito dovrebbero volerci tra le 3,30 e le 5 ore.\n\t\tPreparazione del burro – Ore 8.15 Intanto tirate fuori dal frigo il burro, e mettete al caldo pure lui, così che diventi una pomata.\n\t\tAutolisi – Ore 11.30 Mezz’ora prima di impastare, versate nella ciotola della planetaria tutta la farina, tutto il latte e tutta l’acqua. Con il gancio a foglia amalgamate bene gli ingredienti assicurandovi che tutta la farina sia stata bagnata, e lasciate riposare. \n\t\tImpasto – Ore 12.00 Quando il lievito è al picco (licoli) o ha raddoppiato (pasta madre), versatelo nella ciotola della planetaria. Iniziate a impastare.   Appena si è incorporato a sufficienza, aggiungete il sale. E continuate a impastare per altri due minuti.   A questo punto aggiungete il miele, e amalgamate bene il tutto fino a che l’impasto non sarà in buona parte incordato.  A questo punto iniziate a inserire il burro. Dividetelo idealmente in tre dosi, e inseritine una alla volta. Tra un inserimento e l’altro assicuratevi che l’impasto rimanga incordato o riprenda l’incordatura. Non abbiate fretta.  Una volta che l’impasto rimarrà appeso al gancio, lasciando la ciotola pulita, e tirandolo con le mani creerà un velo, sarà pronto. (nel caso fosse molle molle aggiungere 3 o 4 cucchiai medi di  farina di semola rimacinata ma meglio di no anche se risultasse molto molle) Dovrebbe risultare piuttosto morbido, un po’ umido. E va bene così. L’importante è che sia incordato. Anche 20 minuti di impasto con kitchen aid\n\t\tPrima lievitazione – Ore 12.30  Mettete l’impasto in una ciotola abbastanza grande da contenere due volte il suo volume. Se è trasparente e con i bordi perpendicolari, segnate il livello con uno scotch o un pennarello. Altrimenti prendete un po’ di impasto e mettetelo in un bicchiere, sempre dalle sponde perpendicolari al piano, e segnate lì il livello. Vi servirà da spia. Dovrà aumentare fino al raddoppio.  Ci dovrebbero volere circa 4 ore tenuto a 27°C. È un impasto abbastanza lento a crescere. Se dovesse richiedere più tempo (o meno) assecondatelo. A voi interessa che raddoppi!  Quindi, dicevo, mettetelo in una zona calda, tra i 24 e i 27°C e aspettate che aumenti di una volta il suo volume iniziale.  Durante questo tempo, nelle prime due ore, fate delle pieghe in ciotola ogni 30 minuti ( tre volte). Serve a stimolare la formazione del glutine e rafforzarlo. Vedrete che man mano l’impasto sarà sempre più strutturato e asciutto. Dopo la 3a piega mettere limpasto in un contenitore trasparente coprirlo con domopak e aspettare un’ora primadi metterlo in frigo.  Se vedete bolle in superficie va bene, è normale. Se vi va di farle scoppiare è meglio. (Delle pieghe e delle bolle vedrò di scriverne in apposita pagina, appena possibile). \nMettere in frigo per la notte\n———————————————————\n\t\tStaglio e preforma- Ore 16.30 (Una volta raddoppiato l’impasto, versatelo sul piano lavoro appena spolverato di farina). Dividetelo in due parti se volete due pani da 800 g meglio 4 piccoli. ( 3 pani da 530gr )\nCon l’aiuto di un tarocco pirlate l’impasto creando tensione in superficie (ovvero formate una palla tonda e fatelo rotolare sul piano strisciandolo) e lasciatelo riposare all’aria per circa 30 minuti. Vi servirà sia per farlo rilassare di nuovo e renderlo più facile da formare, sia per asciugarlo un po’ e renderlo più semplice da maneggiare.\n\t\tFormatura – Ore 17.00 A questo punto siete pronti per formare il vostro pan bauletto. Infarinatevi le mani, spolverate il piano di appoggio, e appoggiateci sopra il panetto. Con le  mani tiratelo ai lati per spianarlo leggermente. Ora prendete il lembo sotto, quello più vicino a voi, e piegatelo verso l’alto fino a metà altezza dell’impasto. Ora prendete il lembo a destra portatelo verso sinistra, a poco più del centro del panetto, e ora quello di sinistra portatelo verso destra, fino all’estremità. Proseguite prendendo il lembo in alto e piegatelo verso il basso, fino al centro, e a quel punto sempre dall’alto verso il basso continuate ad arrotolare il tutto. Ecco fatto. Avete il vostro rotolo di impasto pronto per essere messo dentro lo stampo del pane. Posizionatelo in modo che la chiusura dell’impasto rimanga appoggiata sul fondo.\n\t\tSeconda lievitazione – Ore 17.30  Mettete l’impasto a lievitare in un luogo caldo, tra i 23 e i 27°C, per circa 4 ore. ( forno spento con luce accesa) spennellare con olio la superficie per evitare che si incolli alla pellicola \nAnche qui valutate voi se gli richiederà più o meno tempo per raddoppiare. Per verificare che sia pronto, fate il test del dito. Spingete appena col la punta del dito sull’impasto. Se affonderà e l’impasto non tornerà indietro vuol dire che dovete infornare immediatamente perché è già andato oltre il tempo. Se affonda e torna indietro subito vuol dire che è indietro e quindi lasciatelo ancora lì al calduccio. Se invece torna indietro lentamente è pronto!!\n\t\tCottura – Ore 21.30 Preriscaldate il forno, e cuocete in modalità statica a 220°C per circa 30 minuti (nella parte più bassa del forno sennò sopra brucia). Poi diminuite la temperatura a 190°C e cuocete per circa altri 10 minuti. Per verificare che sia cotto misurate la temperatura al cuore del pane. Se ha raggiunto i 94°C è pronto!\nCome conservare il Pan Bauletto con lievito madre\nIo appena sfornato lo tolgo subito dallo stampo, e lo metto a raffreddare su una griglia apposita. Essendo così morbido e umido si mantiene benissimo, e la mattina dopo, se tenuto coperto, vi sembrerà di averlo appena sfornato! È anche la magia del lievito madre!\nInutile dire che quando faccio il Pan Bauletto con lievito madre, ne faccio tanto. Poi lo taglio a fette, e ne tengo un po’ da parte, dentro un sacchetto di plastica o di carta, da consumare nelle 24-48 ore successive, e le altre le chiudo in una busta ermetica e le metto in freezer. Se restasse tutto fuori finirebbe in pochissimo tempo, mangiato con qualsiasi cosa capiti a tiro. È davvero un pane goloso, con quella sua morbidezza e leggera dolcezza! Provare per credere!","note":"","tags":[],"_importId":9167},{"nome":"Ricetta pane ciabatta","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ricetta pane ciabatta\n\nMary Molluso grazie, farina 2 (800 gr) e manitoba (200gr)","note":"","tags":[],"_importId":7046},{"nome":"RICETTA PANE INTEGRALE CON SEMI E PREFERMENTO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Il giorno dopo alle 12.30 fuori dal frigo poi informato alle 19.00 (pietra alle 17.20 in forno a 240gradi)\nNote: se faccio primo rinfresco partendo dalla mattina del primo giorno poi un secondo rinfresco Poi dopo circa 4 ore faccio il preimpasto (sono le 19.00 o più tardi) lascio riposare e poi la mattina successiva alle 6.30 faccio farina+acqua riposa un’ora e alle 7.30 inizio a impastare.\nPer le 10.00 circa metto in frigo.\nLa mattina alle 4.00/5.00 tiro fuori dal frigo e lascio ambientare fino alla mattina successiva \nLa mattina dopo alle 10.00 accendo forno con pietra refrattaria a 240 gradi\nAlle 11.00 circa comincio a cuocere\nIn inverno uso 20gr lievito madre ( invece di 10gr)\nInoltre ho messo 180gr integrale\n70gr farina 0 e 100 farina per pane con semi\nRicetta Pane Integrale con Semi - Le Ricette di VivaLaFocaccia\n  PRIMO GIORNO (16.00)\nTolgo il lievito madre dal frigo alle 16.00.\nPrima di tutto rinfresco il lievito madre alle 16.50\nFinisco alle 17.00\nDopo 4 ore cioè alle 21.00 inizio\nIngredienti Prefermento Idratato all’80%: (l’80% di 150farina è 120acqua)\n10 gr di Pasta Madre o licoli (oppure 1 g di lievito di Birra fresco)\n120 gr di acqua,\n150 gr di farina forte o Manitoba e\n1/2 cucchiaino di zucchero o miele\nProcedimento Preparazione Prefermento\nAlle 21.00 Sciogliere prima il lievito nell’acqua e zucchero (miele)\nAmalgamare grossolanamente il tutto. (Farina e acqua con lievito sciolto)\nCoprire e lasciare riposare a temperatura ambiente (non sopra i 25°C) fino a che cresce al massimo di volume e dà cenno di cedimento. Potrebbero volerci 10-12 ore o più , ma dipende dalla temperatura.\n(Con il lievito di birra si può fare la stessa cosa partendo con circa 1gr di lievito in panetto, i tempi possono variare.)\n\nSECONDO GIORNO (13.30)\n\nIngredienti Impasto Principale Pane Integrale\n280 gr di prefermento (realizzato prima come sopra indicato),\n350 gr di farina Integrale di grano tenero (Bio),\n200 gr di acqua fredda,\n15 gr di sale, (2 cucchiaini)\n5 gr di zucchero o miele (mezzo cucchiaino)\n200 gr di mix di semi vari (per esempio sesamo chiaro, sesamo nero, lino biondo, girasole decorticato e fiocchi piccoli d’avena…) bagnati solo 150 con 50 gr di acqua calda.\n\nPreparazione del mix di semi\nIo compro i semi in sacchetti separati poi mi creo a mio piacere i mix in base a cosa voglio realizzare. In questo mix ho messo 40 gr per 5 tipi diversi di semi, per un totale di 200 gr circa. Le varietà usate sono: sesamo chiaro, sesamo nero, lino biondo, girasole decorticato e fiocchi piccoli d’avena ma ci sono molti altri tipi di granaglie idonee che potete utilizzare.\n\nProcedimento Impasto Principale \n\nAlle 13.30 In una ciotola mescolare grossolanamente la farina integrale (350gr) con l’acqua fredda (200 gr), non bisogna impastare ma fare soltanto assorbire bene tutta l’acqua alla farina (Tecnica dell’Autolisi)\ncoprire e lasciare riposare da 30 minuti ad 1 ora.\nAlle 15.20 Dividere il mix di semi, in una ciotola metterne 150gr e bagnarli con 50gr di acqua molto calda (serviranno da inserire nell’impasto) e 50 gr di semini tenerli per la finitura della crosta.\nAlle 14.30 Unite il prefermento e l’impasto che ha riposato in Autolisi\nImpastate a mano o con planetaria per circa 10 minuti.\nAggiungete ora il sale (15gr=2 cucchiaini) e i semini bagnati di acqua (così aderiranno meglio all’impasto) e zucchero o miele (1/2 cucchiaino)\nContinuate ad impastare fino a che sarà una massa bella compatta e omogenea. (Circa 10 min)\nLasciare riposare coperta a campana sul piano di lavoro dalle 15.00 alle 15.30\nFare delle “pieghe a 3” in questo modo:\nSchiacciate bene la pasta\nRipiegatela un terzo della pasta verso l’interno\nQuindi sovrapponete l’altro terzo sopra l’impasto.\nRipiegate in un terzo nel verso opposto.\nE quindi il terzo rimanente a coprire l’impasto.\nLasciate riposare 30 minuti, quindi ripetete la piegatura a tre esposta sopra per altre due volte con un intervallo di 30 minuti. tutto dalle 15.30 alle 16.00; dalle 16.00 alle 16.30; dalle 16.30 alle 17.00.\nAlle 17.00 Date la forma a palla, facendo girare l’impasto con le mani sull’asse (Pirlatura)\nRiponete a lievitare in un cestino ben infarinato con la “gemma” (la chiusura dell’impasto) rivolta verso l’alto.\nCoprite e mettete a lievitare in frigorifero per circa 8-18 (ore.15.40 15/10/25)\n\nTERZO GIORNO (11.00)\nD’inverno meglio 8 ore fuori dal frigo prima di infornare\n\nAlle 11.00 Tolto dal frigo lasciate tornare a temperatura ambiente, se non è ancora raddoppiato il volume attendete il momento idoneo per cuocere.\n\nAlle 14.15 Ribaltate l’impasto sulla teglia (scaldata in forno 240°C e cosparsa di semola o farina di mais x non far aderire in cottura), accarezzate l’impasto con le mani umide\n\nFate aderire i mix di semi che non avevamo ancora usato\n\neseguire con una lametta da barba un taglio.\n\nCottura:\nAlle 14.30\nInfornate a forno gia caldo a 240°C e con all’interno un pentolino per creare del vapore (buttarci mezzo bicchiere d’acqua)\nAbbassate la temperatura a 220°C e a 200°C dopo 20 minuti. (14.50)\nCuocete complessivamente per un’ora (15.30)\nGli ultimi 10 minuti, (15.20) create uno spiffero mettendo il cucchiaio di legno a bloccare il portello del forno, in modo da far sfiatare l’umidità residua.\nFare raffreddare sulla gratella all’interno del forno con il portello aperto.","note":"","tags":[],"_importId":7859},{"nome":"RICETTA PANE NERO AI 7 CEREALI","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"In una ciotola versare 500 g di miscela pane nero, una bustina di lievito secco spadoni che si trova all’interno del sacchetto in mezzo alla farina e due cucchiai di olio extravergine di oliva.\nVersare poco per volta 280ml di acqua tiepida , mescolando (scaldare 180 e aggiungere 100 fredda).\nLavorare l’impasto su di un piano infarinato per almeno 10 minuti, ripiegandolo anche su se stesso molte volte.  Coprire con un panno e fare lievitare per 15 minuti in luogo tiepido a 28° circa, per esempio dentro al forno con luce accesa.\nOliare bene le teglie\nSu di un piano infarinato allungare delicatamente l’impasto dandogli una forma cilindrica, tagliarlo con un coltello in 2 o 3 parti uguali in base al numero delle teglie e alla loro dimensione (lasciare gli stampi voti almeno a metà.  ).\nCoprire con un panno e fare lievitare in luogo tiepido fino al triplicare del volume, per circa tre ore.\n  infornare in forno caldo a 200° non ventilato sul piano inferiore per 25 minuti circa, facendo attenzione che la crosta non annerisca; le forme piccole cuociono più in fretta e i formati diversi non vanno cotti contemporaneamente.\nSpegnere, sfornare i pani, toglierli dagli stampi e infornarli ancora per 10 minuti. \nFarli raffreddare su di una griglia prima di tagliarli.","note":"","tags":[],"_importId":7019},{"nome":"RICETTA PANE. Https ma INTEGRALE CON SEMI E PREFERMENTO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":10.0,"unit":"g","name":"pasta madre o"},{"qty":120.0,"unit":"g","name":"acqua,"},{"qty":150.0,"unit":"g","name":"farina forte o manitoba e"},{"qty":0.5,"unit":"cucchiaino","name":"zucchero"},{"qty":280.0,"unit":"g","name":"prefermento"},{"qty":350.0,"unit":"g","name":"farina integrale di grano tenero"},{"qty":200.0,"unit":"g","name":"acqua fredda,"},{"qty":15.0,"unit":"g","name":"sale,"},{"qty":5.0,"unit":"g","name":"zucchero,"}],"procedimento":"200 gr di mix di semi vari (per esempio sesamo chiaro, sesamo nero, lino biondo, girasole decorticato e fiocchi piccoli d'avena...)\n\t50 gr di acqua calda\nPRIMO GIORNO (16.00)\nTolgo il lievito madre dal frigo alle 16.00.\nPrima di tutto rinfresco
