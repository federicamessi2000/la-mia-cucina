var RECIPES=[{"nome":"1 kg di farina Caputo:600g Manitoba ( dicono meglio di","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"1 kg di farina Caputo:600g Manitoba ( dicono meglio di no manitoba per il pane, si usa per le brioche ) + 400g semola.700 ml di acqua.200g di lievito madre.20g di sale \nolio evo = bicchierino di caffè.\n(Pane 1 kg di farina Caputo in cui 250 g Manitoba +250g Aria +500g Semola.700 ml di acqua.200g di lievito madre 20 g di sale olio evo)\n  Marco Senn  Uso lievito madre il mio ha 6 anni.Tempi sono lunghissimi. Inizio di sera impasto a mano tutti ingredienti faccio le pieghe di rinforzo ogni 30 minuti per 4 volte totale 2 ore.Lascio lievitare in temperatura ambiente almeno per 4 ore e successivamente metto impasto nel frigo per almeno 10 ore. Indomani esco dal frigo lascio ambientare impasto per mezz'ora, dopo preformo e di nuovo lascio riposare per mezz'ora. Finalmente faccio forma finale metto nel cestini e lascio lievitare ancora per un ora sul tavolo.Tempo trascorso riscaldo il forno a 250 gradi metto il pane nel forno con vapore per 30 minuti.Poi abbasso temperatura a 220 gradi lascio andare per altre 30 minuti senza vapore...Tutto qui😅","note":"","tags":[],"_importId":15595},{"nome":"1 Mondo Di Ricette Semplici","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":600.0,"unit":"g","name":"farina 00"},{"qty":130.0,"unit":"g","name":"zucchero"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":80.0,"unit":"g","name":"margarina a temperatura ambiente"},{"qty":50.0,"unit":"ml","name":"olio"},{"qty":250.0,"unit":"ml","name":"latte"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":1.0,"unit":"bustina","name":"vanillina"},{"qty":10.0,"unit":"g","name":"lievito di birra fresco"},{"qty":null,"unit":"q.b.","name":"acqua per la superficie"},{"qty":null,"unit":"q.b.","name":"zucchero semolato per la superficie"}],"procedimento":"Preparazione:\nPer preparare le treccine con lo zuccherosetacciate la farina in una ciotola, aggiungete lo zucchero, il sale, l’olio, la margarina,la vanillina e l’olio. Scaldate il latte e scioglieteci dentro il lievito. Versate il latte e il lievito al resto degli ingredienti e impastate fino ad ottenere un composto liscio e morbido. Se l’impasto dovesse risultare appiccicoso, ungetevi le mani con un po’ d’olio e continuate ad impastare. Lasciate lievitare il panetto fino al raddoppio, per circa 3 ore (anche di più).\nUna volta terminata la lievitazione prelevate circa 80 g di impasto, formate un salsicciotto e intrecciatelo.\n\nContinuate così fino a terminare l’impasto. Disponete le treccine su una teglia rivestita di carta forno e lasciatele lievitare per altri 30 minuti. Spennellate la superficie delle treccinecon un po’ di latte e infornatela in forno statico preriscaldato a 180° per circa 20 minuti. Quando le treccine saranno ben colorite sfornatele e lasciatele intiepidire, poi spennellate la superficie delle treccine con un po’ d’acqua e premetele sullo zucchero semolato in modo che si attacchi alle treccine.\n  su Un Mondo Di Ricette Semplici per essere sempre aggiornati sulle mie ricette!","note":"","tags":[],"_importId":120},{"nome":"1159 - TORTA DI PASQUA CON FORMAGGIO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"che uso tutt'ora. La conobbi in tempi lontanissimi, quando andavo al Liceo , e me la insegnò  la nonna , oriunda di Città  di Castello, della mia compagna di banco. Da allora l'ho modernizzata facendo tante modifiche.\nIngredienti: 250 gr di pasta lievitata ( ora la si trova pronta  e ben lievitata al supermercato,  io la compero da Conad, un giorno di meno di lavoro) - 150 gr di farina Manitoba  ( allora la farina era universale, e la Manitoba  non esisteva davvero). 100 gr di olio evo - 100 gr di pecorino tenero - 100 gr di parmigiano grattugiato  - 100 gr di prosciutto crudo a dadini - 5 uova-  strutto  per ungere la teglia ( io posseggo lo stampo alto adatto alla Pizza di Pasqua) - sale q.b.\nPreparazione: rompere in ciotola tre uova intere e 2 tuorli, salare, unire il formaggio pecorino a dadini, il prosciutto crudo pure a dadini, il parmigiano grattugiato, mescolare e unire l'olio evo. Lasciar riposare per 4 ore, poi portare sulla spianatoia la pasta  da\npane bel lievitata (ora nella planetaria), unirvi la farina Manitoba, impastare, e versare poco a poco il composto preparato, facendolo assorbire dalla pasta.  Riportare l'impasto sulla spianatoia, fare le pieghe, poi  sistemarlo in un contenitore   ben unto, coprire ermeticamente,  e far lievitare in luogo tiepido ( come ci ha insegnato il nostro Vittorio Viarengo , nel forno spento con luce accesa), per almeno due ore.\nUngere poi lo stampo dove si cuocera' la Pizza con lo strutto, e sistemare sul fondo un tondo di carta forno  (meraviglia delle invenzioni moderne). Far lievitare ancora un'ora.\nCuocere a 180 gradi ( un tempo Ada Boni diceva a calore medio, non esisteva i gradi e i termometri da forno), e portare a cottura  per circa 30 -40 minuti.\nLa Pizza si accompagna  con fette di salame e uova sode, e  a Roma  funge da prima colazione per il mattino di Pasqua.\nBuona Pasqua a tutti!!!\n,","note":"","tags":[],"_importId":14239},{"nome":"2 barbabietole di medie dimensioni","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"barbabietole di medie dimensioni"},{"qty":450.0,"unit":"g","name":"ricotta"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":75.0,"unit":"g","name":"parmigiano macinato fresco"},{"qty":140.0,"unit":"g","name":"farina"},{"qty":100.0,"unit":"g","name":"noci tritate grossolanamente","sezione":"Per il burro di noci e saldia"},{"qty":120.0,"unit":"g","name":"burro","sezione":"Per il burro di noci e saldia"},{"qty":4.0,"unit":"n°","name":"salvia","sezione":"Per il burro di noci e saldia"}],"procedimento":"Preriscaldare il forno a 200°C CircoTherm®.\nMetti le barbabietole lavate in un piatto a prova di fuoco e copri con il coperchio. In alternativa puoi usare un foglio di alluminio per coprire il piatto.\nCuocere per 1 ora, quindi spegnere il forno e lasciare il piatto nel calore rimanente per altri 15 minuti.\nSbucciare le barbabietole sotto l'acqua corrente. Usa una bilancia per misurare 200 grammi di barbabietola. Macinare finemente. Mescolare con ricotta, uovo, parmigiano, sale, pepe e spezie. Aggiungere la farina.\nCoprire una teglia con burro morbido. Mettere circa 80 gr di farina in una ciotola di miscelazione. Usa due cucchiaini per estrarre l'impasto quanto basta per ogni gnocchi - in totale saranno 90 gnocchi che arrotolerai nella ciotola di miscelazione con le mani. Mettere sulla teglia.\nImmergere una forchetta prima nella farina e poi negli gnocchi per creare delle linee.\nArrostire le noci in una padella finché non si possono sentire l'odore. Aggiungere il burro e le foglie di salvia e soffriggere per tre minuti fino a quando il burro diventa leggermente dorato.\nCuocere gli gnocchi al vapore a 100°C per dieci minuti. Aggiungere il pepe e servire con burro di noci e parmigiano.\nIdea: puoi anche far bollire gli gnocchi in acqua salata. Formare gli gnocchi e metterli immediatamente in acqua bollente. Se li lasci fuori, tendono ad attaccarsi alla superficie. Dopo che sono affiorati, lasciali sobbollire per altri due minuti prima di messarli su un piatto.","note":"","tags":[],"_importId":12945},{"nome":"2 uova, 120 gr zucchero, 150 gr burro, 450 gr farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"2 uova, 120 gr zucchero, 150 gr burro, 450 gr farina 00, latte per spennellare, granella di zucchero per decorare e marmellata o cioccolata (a piacere)\nUna bustina lievito","note":"","tags":[],"_importId":12041},{"nome":"2-3 patate, farina, acqua e lievito!","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina 0"},{"qty":10.0,"unit":"g","name":"lievito di birra fresco"},{"qty":210.0,"unit":"ml","name":"acqua"},{"qty":150.0,"unit":"g","name":"patate"},{"qty":n [{"qty":250.0,"unit":"g","name":"farina del tipo che preferite"},{"qty":100.0,"unit":"ml","name":"acqua tiepida"},{"qty":4.0,"unit":"cucchiaio","name":"d’olio"},{"qty":2,"unit":"n°","name":"pizzichi di sale fino"}],"procedimento":"Per preparare la Pasta Matta si fa davvero presto, è talmente semplice che non crederete ai vostri occhi una volta fatta..in una ciotola capiente versare la farina e aggiungere il sale,l’olio e l’acqua..impastare semplicemente amalgamando tutti gli ingredienti..vedrete che in pochi minuti il lavoro sarà presto fatto..la Pasta Matta si lavora benissimo quindi non val la pena stare a prendere la planetaria..io faccio tutto con una semplice ciotola..una volta pronta potete iniziare a lavorarla per creare la vostra ricetta scelta..la Pasta Matta è Pronta!!","note":"","tags":[],"_importId":774},{"nome":"250 gr latte","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"latte"},{"qty":250.0,"unit":"g","name":"farina 00"},{"qty":250.0,"unit":"g","name":"farina manitoba"},{"qty":120.0,"unit":"g","name":"zucchero"},{"qty":50.0,"unit":"g","name":"strutto"},{"qty":1.0,"unit":"n°","name":"uovo + 2 tuorli"},{"qty":6.0,"unit":"g","name":"sale"}],"procedimento":"10 g Lievito di birra fresco buccia di 2 arance grattugiate buccia di 1 limone grattugiato\n1 cucchiaio e mezzo di miele d'acacia o\nmillefiori\n1 cucchiaio di essenza di vaniglia\n1 tuorlo e latte per spennellare\nMettete l'impasto in una ciotola e fate lievitare fino al raddoppio ben coperto. (secondo la temperatura esterna possono volerci da 1 a 2 ore)Dopo dividetelo e formate i vostri brioche\ncol tuppo.\nMettete le brioche ben distanziati su una teglia rivestita con carta da forno. Coprite con uno strofinaccio e fate lievitare per circa 1 ora, fino a quando sono ben gonfie. Trascorso il tempo, spennellate delicatamente con il tuorlo sbattuto con il latte. Infornate 180 gradi circa\n20-25 min.Una volta sfornate spennellare con poca acqua calda.","note":"","tags":[],"_importId":12134},{"nome":"2kg di Caputo Pizzeria manitoba  (-32gr 1968gr)","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"2kg di Caputo Pizzeria manitoba  (-32gr 1968gr), 1,5 lt di acqua(-16gr 1484gr)), 50 gr di sale, 4 gr di lievito fresco (lievito madre 48gr), impastata a mano, 2 pieghe a distanza di 30 minuti, frigo per 24 ore circa, uscita dal frigo aspettato mezz'ora a temperatura ambiente, fatti i panetti da 250gr l' uno e dopo 3 ore si mangia 🤤","note":"","tags":[],"_importId":15455},{"nome":"3 uova+80 gr zucchero","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"uova+80 gr zucchero"},{"qty":50.0,"unit":"g","name":"olio girasole"},{"qty":110.0,"unit":"g","name":"acqua"},{"qty":140.0,"unit":"g","name":"farina00"},{"qty":4.0,"unit":"n°","name":"o 5 mele"},{"qty":180.0,"unit":"g","name":"50 minuti"}],"procedimento":"3 uova+80 gr zucchero \nBuccia limone\n50 gr olio girasole\n110 gr acqua \n140 gr farina00\nCannella\n1/2 busta lievito per dolci\n4 o 5 mele\n\n180 gr 50 minuti","note":"","tags":[],"_importId":13525},{"nome":"311275806_446340330820866_4653202936519498179_n-1-1536x","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":110.0,"unit":"g","name":"burro"},{"qty":110.0,"unit":"g","name":"olio di cocco bio"},{"qty":250.0,"unit":"g","name":"zucchero"},{"qty":390.0,"unit":"g","name":"farina 00"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":1.0,"unit":"cucchiaino","name":"scorza di limone"},{"qty":60.0,"unit":"ml","name":"succo di limone"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":150.0,"unit":"ml","name":"latte"},{"qty":300.0,"unit":"g","name":"mirtilli freschi"}],"procedimento":"Procedimento:\nIn una ciotola media, aggiungo i mirtilli e 1 cucchiaio di farina (prendo il cucchiaio di farina dalla dose che userò per la torta) e li infarino per bene. Lascio da parte Preriscaldo il forno a 175 gradi forno ventilato (185 gradi forno statico). Imburro e infarino uno stampo a cerniera da 25 cm.\nPasso a setacciare farina e lievito. Metto da parte\n\nIn una ciotola capiente aggiungo il burro a temperatura ambiente e l’olio di cocco, aziono lo sbattitore elettrico e dopo qualche minuto unisco lo zucchero. Sbatto fino a ottenere un composto cremoso, chiaro e spumoso. Aggiungo un pizzico di sale. Rompo le uova ne incorporo una per volta, quando è amalgamato per bene il primo uovo procedo con il secondo e poi con il terzo. Aggiungo l’estratto di vaniglia, il succo di limone e la scorza di limone e mescolo per bene fino ad ottenere un composto omogeneo.\n\nSempre con lo sbattitore elettrico, comincio ad aggiungere la farina setacciata con il lievito e alterno il latte alla farina, e continuo alternando fino a che non ho finito gli ingredienti. Unisco i mirtilli spolverati di farina e, aiutandomi con un cucchiaio di legno o una spatola, li incorporo delicatamente all’impasto.\nInserisco l’impasto nello stampo imburrato ed infarinato, aggiungo qualche mirtillo fresco e metto in forno. Il forno, come già accennato in precedenza, deve essere preriscaldato, cuocio la torta a 165 gradi in forno ventilato (175 forno statico) per 55 minuti. Mi raccomando, facciamo sempre la prova stecchino.\n\nSforno e faccio raffreddare bene prima di spolverare con zucchero a velo e …. DIVORARLA!","note":"","tags":[],"_importId":12005},{"nome":"4 arance biologiche","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"arance biologiche"},{"qty":2.0,"unit":"n°","name":"carote medie"},{"qty":1.0,"unit":"cucchiaino","name":"cannella in polvere"}],"procedimento":"Preparazione degli ingredienti:\nSbucciate le arance e dividetele in spicchi.\nPelate e grattugiate le carote finemente.\nSe desiderate un tocco extra di dolcezza, sbucciate e tritate finemente la mela.\nCottura delle arance e carote:\nIn una pentola capiente, aggiungete gli spicchi di arancia, le carote grattugiate e il succo di limone.\nAggiungete anche la mela tritata, se la state usando.\nCuocete a fuoco medio per circa 20-25 minuti, mescolando occasionalmente.\nAggiunta della cannella (opzionale):\nUtilizzate uno schiacciapatate o una forchetta per schiacciare leggermente la miscela di arance e carote per ottenere una consistenza più spalmabile.\nAggiungete la cannella in polvere, se desiderato, per un tocco aromatico.\nRegolare la consistenza:\nSe la marmellata risulta troppo densa, aggiungete un po’ d’acqua per ottenere la consistenza desiderata.\nContinuate a cuocere a fuoco medio-basso per altri 10-15 minuti, mescolando frequentemente.\nTest del piatto freddo:\nMettete un piccolo piattino nel congelatore per alcuni minuti. Poi, versate una piccola quantità di marmellata sul piatto freddo. Se la marmellata si addensa e forma una pellicola, è pronta.\nConservazione:\nVersate la marmellata calda in vasetti sterilizzati.\nChiudete bene i vasetti e capovolgeteli per creare il sottovuoto.\nLasciate raffreddare completamente prima di conservarli in frigorifero.\nQuesta marmellata di arance e carote senza zucchero è un’opzione deliziosa e salutare per arricchire  colazioni e spuntini.\nLa dolcezza naturale delle arance e delle carote, unita alla mela e alla cannella, crea una marmellata piena di gusto senza il bisogno di aggiungere zucchero.\nPersonalizzala secondo i tuoi gusti, godendo di un’opzione più salutare e gustosa rispetto alle marmellate tradizionali.","note":"","tags":[],"_importId":11992},{"nome":"4 uova","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"uova"},{"qty":1.0,"unit":"bicchiere","name":"latte"},{"qty":2.0,"unit":"bicchiere","name":"zucchero"},{"qty":3.0,"unit":"bicchiere","name":"farina “00”"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":1.0,"unit":"bicchiere","name":"olio di semi di arachidi"},{"qty":1.0,"unit":"n°","name":"limone biologico"},{"qty":2.0,"unit":"n°","name":"mele golden grandi"}],"procedimento":"Procedimento: in una ciotola capiente montate le uova con lo zucchero e fatele diventare spumose, aggiungete la buccia del limone e l’olio di semi, quindi versate anche il latte e infine aggiungete la farina e una bustina di lievito (tutto setacciato)\nImburrate e infarinate uno stampo a ciambella da 26 cm di diametro e versateci dentro il composto, quindi livellate e disponete le mele tagliate a fette, poi spoverate il dolce con un cucchiaino di zucchero di canna.\nCuocete la vostra ciambella al bicchiere con mele in forno a 180°C per 40 minuti  forno statico, dopodiché sfornate il dolce e spolveratelo con abbondante zucchero a velo.\nFate sempre la prova stecchino, perché ogni forno a i suoi tempi e modi di cottura, infilatelo nella torta avendo cura di farlo arrivare fino in fondo. Se uscirà pulito e asciutto vuol dire che la torta è pronta per essere sfornata.","note":"","tags":[],"_importId":393},{"nome":"500 g di farina (puoi scegliere farina di tipo 0 o 00","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"500 g di farina (puoi scegliere farina di tipo 0 o 00 per una consistenza più morbida) - 200gr\n300 ml di acqua tiepida10 g di sale. -100gr\n10 g di zucchero (opzionale, aiuta la lievitazione)\n7 g di lievito di birra secco (oppure 25 g di lievito fresco) 300 gr lievito madre \nPreparazione del Pane Fatto in Casa\n\t\tAttivare il lievito: Se stai usando lievito di birra secco, mescolalo in una ciotola con acqua tiepida e zucchero. Lascia riposare per circa 10 minuti, finché non inizia a formarsi una schiuma sulla superficie. Questo è un segno che il lievito è attivo.\n\t\tImpasto: In una ciotola capiente, versa la farina e il sale. Aggiungi il lievito attivato e mescola fino a ottenere un impasto morbido. Se l'impasto risulta troppo appiccicoso, aggiungi un po' di farina, un cucchiaio alla volta. Se è troppo asciutto, aggiungi poca acqua alla volta.\n\t\tLavorare l’impasto: Trasferisci l'impasto su una superficie di lavoro pulita e impasta per circa 10 minuti, finché l'impasto diventa liscio ed elastico. Questo passaggio è fondamentale per sviluppare la struttura del pane.\n\t\tLievitazione: Metti l'impasto in una ciotola unta d'olio e copri con un canovaccio umido. Lascia lievitare per circa 1 ora o fino a che l’impasto non raddoppia di volume.\n\t\tFormare il Pane: Una volta che l'impasto è lievitato, sgonfialo e forma una pagnotta o dei panini a seconda delle tue preferenze. Puoi anche metterlo in uno stampo da plumcake per un pane più uniforme.\n\t\tSeconda Lievitazione: Lascia lievitare ancora per 30-40 minuti, coperto, in modo che l'impasto riprenda a crescere.\n\t\tCottura: Preriscalda il forno a 220°C. Fai un'incisione sulla parte superiore del pane con un coltello affilato, quindi inforna per circa 30-35 minuti. Il pane è pronto quando suona vuoto se picchiettato sul fondo.\n\t\tRaffreddamento: Una volta cotto, lascia raffreddare il pane su una griglia prima di affettarlo.\nConsigli per un Pane Perfetto\nUsa farina di buona qualità: La farina è la base di un buon pane. Scegli una farina di tipo 0 o 00 per una texture leggera e soffice.\nControlla la temperatura dell’acqua: L’acqua non deve essere troppo calda, altrimenti il lievito morirà. La temperatura ideale è intorno ai 25-30°C.\nNon trascurare la lievitazione: La pazienza è fondamentale. Non accelerare la lievitazione, poiché un buon impasto ha bisogno di tempo per sviluppare sapore e struttura.\nPerché Fare il Pane in Casa?\nFare il pane in casa è un'ottima scelta per chi cerca di evitare conservanti e ingredienti artificiali. Inoltre, il pane fatto in casa ha un sapore unico che difficilmente si trova nei prodotti industriali. Con pochi ingredienti e un po’ di pratica, puoi sfornare ogni giorno un pane fragrante e sano, perfetto per la colazione o come accompagnamento ai tuoi piatti preferiti.\nConclusioni\nPreparare il pane fatto in casa in modo semplice non richiede attrezzature particolari né esperienze avanzate. Seguendo questi passaggi e con un po’ di pazienza, potrai gustare un pane fresco, morbido e fragrante direttamente dalla tua cucina. Non ti resta che metterti all'opera e scoprire il piacere di sfornare il pane","note":"","tags":[],"_importId":13486},{"nome":"500g di farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":2.0,"unit":"n°","name":"tuorli"},{"qty":25.0,"unit":"g","name":"lievito"},{"qty":150.0,"unit":"ml","name":"latte"},{"qty":75.0,"unit":"g","name":"yogurt magro bianco"},{"qty":90.0,"unit":"g","name":"zucchero"}],"procedimento":"Iniziamo mettendo la farina in una ciotola e poi aggiungiamo i due tuorli e iniziamo a mescolare. Ora aggiungiamo anche il lievito e poi delicatamente incorporiamo il latte poco alla volta. Amalgamiamo per bene tra loro in modo di far diventare l'impasto liscio. Alla fine aggiungiamo anche lo yogurt magro e impastiamo per bene. Quando avremo creato un impasto liscio, omogeneo e non appiccicoso, possiamo metterlo al centro di una ciotola.\n\t\tLasciamo lievitare l’impasto coperto da pellicola trasparente per 1 ora.\n\t\tOra stendiamo l’impasto e con un tagliapasta disegniamo la sagoma di tanti triangolini. Separiamoli tra loro e al centro di ognuno mettiamo un cucchiaino di confettura di albicocche. Poi, partendo dal lato più ampio alla punta, arrotoliamo e creiamo la classica forma del croissant ripiegando verso l'interno le punte del croissant.\n\t\tLasciamo lievitare ancora 30 minuti coperti da pellicola. Ora sbattiamo un uovo in una ciotolina e spennelliamo ogni croissant di uovo per far sì che una volta cotto, sia ben dorato e croccante in cima. poi Inforniamo poi a 170°C per 20 minuti. Una volta sfornati le nostre brioche morbide e soffici saranno pronte. Spolveriamo con dello zucchero a velo e poi potremo fare colazione con un buon bicchiere di latte caldo e le nostre brioche all'albicocca.","note":"","tags":[],"_importId":13769},{"nome":"500gr farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina"},{"qty":210.0,"unit":"g","name":"farina"},{"qty":61.0,"unit":"g","name":"esubero"},{"qty":160.0,"unit":"n°","name":"liquidi.   143 liquidi"},{"qty":70.0,"unit":"n°","name":"olio semi"},{"qty":73.0,"unit":"n°","name":"vino"}],"procedimento":"500gr farina\n145gr\n190+150 liquidi\n\n210gr farina\n61gr esubero\n160 liquidi.   143 liquidi\n70 olio semi\n73 vino\n\n500:210=145:x\n\n500x=210x145\n\nX =60,9\n\n340:145=x:61\n\nX=340x61:145\n\nX=143","note":"","tags":[],"_importId":10360},{"nome":"525 g di farina manitoba","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":525.0,"unit":"g","name":"farina manitoba"},{"qty":250.0,"unit":"g","name":"acqua tiepida"},{"qty":50.0,"unit":"g","name":"olio di semi"},{"qty":15.0,"unit":"g","name":"zucchero semolato"},{"qty":10.0,"unit":"g","name":"lievito di birra secco"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":220.0,"unit":"g","name":"burro vegetale"},{"qty":220.0,"unit":"g","name":"zucchero semolato"}],"procedimento":"Nella ciotola della planetaria pesiamo con la bilancia integrata la farina manitoba, lo zucchero semolato e il lievito di birra secco. Uniamo la scorza grattugiata del limone e un pizzico di sale; azioniamo la planetaria alla velocità 1 e versiamo poco alla volta l’olio e l’acqua. Lasciamo impastare per 10 minuti. Passato questo tempo trasferiamo l’impasto su un piano di lavoro e diamo un paio di pieghe a mano. Rimettiamo nella ciotola, copriamo con pellicola o con un panno e lasciamo lievitare in forno caldo per un’ora o comunque fino al raddoppio.\n2Prepariamo il ripieno\nMentre aspettiamo la lievitazione prepariamo il ripieno: in una ciotola uniamo lo zucchero semolato e il burro vegetale, li lavoriamo finché non otteniamo un composto morbido e cremoso. Lo lasciamo poi fuori dal frigorifero mentre aspettiamo, così che possa ammorbidirsi meglio.\n3Stendiamo l’impasto\nUna volta lievitato trasferiamo l'impasto su un piano di lavoro infarinato e stendiamo con un mattarello fino a formare un rettangolo di 60 x 35 cm. Con l’aiuto di una spatola stendiamo la nostra crema di burro sull’impasto, arrotoliamo il tutto dal lato più lungo e tagliamo 12 rotolini di circa 5 cm di larghezza ciascuno. Sigiliamo il sotto di ogni rosellina in modo che non fuoriesca il ripieno in cottura. Riponiamo le roselline in una teglia rotonda ricoperta con carta da forno, lasciandole distanziate perchè cresceranno ancora sia durante la lievitazione che in cottura. Chiudiamo con pellicola, rimettiamo in forno e lasciamo lievitare per 45 minuti.\nPassato questo tempo le spennelliamo con un po’ di latte vegetale e inforniamo in forno statico a 180°C per 20-25 minuti, finché non risultano dorate in superficie.\nI CONSIGLI DELLO CHEF\nPer far lievitare al meglio l’impasto possiamo mettere nel forno un pentolino d’acqua calda, così da creare il giusto grado di umidità. In alternativa, accendiamo il forno a 40°C poi spegniamo e inseriamo l’impasto: il calore residuo sarà perfetto per una lievitazione soffice e uniforme.","note":"","tags":[],"_importId":15832},{"nome":"A FAINÀ","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La sua calma, il suo essere costantemente rilassata, la sua sicurezza nelle dosi, nei gesti, nei tempi, la rendevano imbattibile.\nPartiva sempre con la sua tazza bianca, sapete quella  che si prendeva con due mani per bere il latte appena munto con su un dito di panna spesso? E con questa ciotola, dicevo, partiva la misurazione. \nRapporto 1 a 3.\n2 tazze di farina di ceci\n6 tazze di acqua\n1 cucchiaino raso di sale.\nIniziava alla mattina perché doveva riposare almeno fino a pranzo e ogni tanto andava a rimestarla col suo cucchiaio di legno consumato e bruciato ai bordi.\nIl nonno accendeva il fuoco almeno un’ora prima con le fascine di ulivo e quando lui urlava “ie caodo”\nLei arrivava con la sua teglia di rame, la metteva davanti alla bocca del forno per scaldarla un po’ e poi giù…versava quell’oro giallo nella teglia, lentamente, fino a che non copriva tutto il fondo, e poi olio a filo, partendo dal centro e  girando tutt’intorno. L’antro bianco( perché il forno è pronto quando le sue pareti diventano bianche)la riceveva, e la nonna la spingeva, attenta che non ne uscisse neppure una goccia.\nQuando da fuori si sentiva il profumo, allora era pronta, con le sue crepe lunari, il suo colorito ambrato, i bordi croccanti. Un’estasi.\nNon ho mai conosciuto nessuno che facesse la farinata come lei, c’era amore nei suoi gesti, e pazienza e saggezza","note":"","tags":[],"_importId":10878},{"nome":"A San Valentino prepara i ❤️ Pancake proteici a cuore","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"A San Valentino prepara i ❤️ Pancake proteici a cuore con yogurt greco 🥣🥛 Poco zucchero, zero sensi di colpa e super soffici!\n👇 Salva la ricetta e provali anche tu! 🌱\nIngredienti: • 1 uovo • 1 cucchiaino e mezzo di zucchero o miele • 150 g yogurt greco • 120 g farina • 2 cucchiai di latte • 1 cucchiaino lievito per dolci • 50 g gocce di cioccolato fondente • Zucchero a velo per decorare\nProcedimento: Monta con una frusta l’uovo (a temperatura ambiente) con zucchero e yogurt. Aggiungi poco alla volta farina e latte, poi il lievito e mescola bene. Unisci infine le gocce di cioccolato.\nUngi un padellino e due stampi a cuore. Metti gli stampi in padella e versa 2 cucchiai di impasto per ciascun cuore. Copri e cuoci 3–4 minuti, poi gira e completa la cottura. Rimuovi con attenzione e guarnisci con miele e zucchero a velo. ✨\n🔥 Ricetta completa su www.ricettealvolo.it 📌 SALVA la ricetta per dopo ❤ Tagga qualcuno che li vorrebbe \n#pancakes #sanvalentino #pancakeproteici #pancakeslover","note":"","tags":[],"_importId":16251},{"nome":"Affetta le patate molto sottili","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"sale"},{"qty":null,"unit":"q.b.","name":"pepe nero"},{"qty":null,"unit":"q.b.","name":"rosmarino"}],"procedimento":"Procedimento:\n\n1. Sbuccia e affetta le patate molto sottili\n\n2. Trasferiscile in una ciotola con acqua e lasciale in ammollo per 20 minuti\n\n3. In un’altra ciotola mescola farina, parmigiano, sale, acqua e olio extravergine d’oliva, poi sbatti fino a ottenere un composto omogeneo\n\n4. Scola le patate e aggiungile al composto, lasciandone alcune da parte per la decorazione\n\n5. Mescola bene in modo che le patate siano completamente ricoperte dalla pastella\n\n6. Versa il tutto in una teglia rivestita con carta forno e livella il composto\n\n7. Aggiungi in superficie le fettine di patate tenute da parte, pepe, sale, rosmarino e un filo d’olio\n\n8. Cuoci in forno statico preriscaldato a 180 °C per circa 30 minuti, fino a doratura\n\n9. Una volta cotta, trasferisci su un tagliere, taglia in quadrati e servi ben calda","note":"","tags":[],"_importId":14208},{"nome":"Albumi da smaltire?... questo dolce è perfetto!","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Torta Nuvola di nome e di fatto, semplicissima da fare, morbida e leggera;  in più è senza burro ne olio, senza uova ,senza lievito e senza farina 😅\nMa vi assicuro che è di una bontà indescrivibile.\n la ricetta è della mitica @silviabruzin😁\n\nDosi x una teglia da 22 cm \n\nDifficoltà: facilissima \n\nTempo di preparazione 25min (+cottura )\n\nIngredienti :\n200g di mandorle a farina \n180 g. di zucchero fine\n25 g.di farina di riso \nBuccia dì 1 limone (opzionale)\n180 g.di albumi \n2 g.di sale\nMandorle a lamelle \n\nProcedimento:\nMontare gli albumi a neve, quando  iniziano a schiumare unire a pioggia  lo zucchero.\nMescolare la farina di mandorle con la farina di riso,il sale e la buccia di limone grattugiata.\nCon una spatola incorporare gli albumi alle farine facendo attenzione a non smontarli. \nImburrate e foderate con carta forno una teglia a cerniera, cospargete la base con le mandorle a lamelle,versare il composto e livellate benissimo.\nCuocere in forno caldo modalità statico a 170 gradi x circa 25-30 min.\nUna volta fredda sformare la torta e capovolgere su di un piatto da portata, decorare con zucchero a velo.(Si conserva morbida una settimana coperta da una campana)","note":"","tags":[],"_importId":14383},{"nome":"Alzi la mano che ama lo Strudel ...🙋‍♀️","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"uovo medio","sezione":"Per la pasta matta"},{"qty":75.0,"unit":"g","name":"acqua","sezione":"Per la pasta matta"},{"qty":250.0,"unit":"g","name":"farina 00","sezione":"Per la pasta matta"},{"qty":40.0,"unit":"g","name":"olio di semi","sezione":"Per la pasta matta"},{"qty":1.0,"unit":"pizzico","name":"sale","sezione":"Per la pasta matta"},{"qty":4.0,"unit":"n°","name":"mele  golden","sezione":"Per il ripieno"},{"qty":90.0,"unit":"g","name":"zucchero","sezione":"Per il ripieno"},{"qty":40.0,"unit":"g","name":"burro fuso","sezione":"Per il ripieno"},{"qty":40.0,"unit":"g","name":"pinoli leggermente tostati in padella o noci a pezzetti","sezione":"Per il ripieno"}],"procedimento":"Un pugno di uva sultanina (facoltativo...che avrete ammollato una decina di minuti in un pochino di acqua tiepida oppure in un po di limoncello)\nPangrattato qb\nCannella q.b\nLimone scorza\nPer decorare\nZucchero a velo \nPreparate la pasta e fate riposare in una ciotola coperta con pellicola a temperatura ambiente per 1 ora .\nDopo prendete un grande canovaccio cospargete di farina e stendete in forna rettangolare la pasta aiutandovi con il mattarello ( mi raccomando sottile  )\nNel frattempo sbucciate le mele e fatele a fettine sottili mettete lo zucchero la scorza di limone grattugiata la cannella i pinoli l uvetta.\nDopo avere steso la pasta con il burro fuso spennellate i bordi \nCospargete con   il pangrattato lasciando libero 1 cm tutto intorno .\nVersare il composto di mele \nAiutandovi con il canovaccio chiudete lo strudel arrotolandolo.\nSpennellatelo con il burro fuso rimasto \nLa chiusura dello strudel va sotto..quindi pian piano spostate dal canovaccio alla teglia.\nIo consiglio di cuocerlo nella leccarda del vostro forno rivestita di carta forno \nCuocete in forno caldo statico a 190 gradi fino a doratura (almeno 30 minuti)\nAppena si sarà raffreddato cospargete di zucchero a velo e se volete osare accompagnate con una pallina di gelato alla vaniglia 🥰🥰🥰\n#taniucciaeisuoipasticci\n#strudel #mele","note":"","tags":[],"_importId":12923},{"nome":"alzi la mano chi sollevando il coperchio non ha mai","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":". di farina 00"},{"qty":200.0,"unit":"g","name":".di burro"},{"qty":90.0,"unit":"g","name":".di zucchero fine"},{"qty":1.0,"unit":"n°","name":"uovo intero"},{"qty":1.0,"unit":"pizzico","name":"sale"}],"procedimento":"Procedimento:\n\nLavorare burro a cubetti e zucchero,il pizzico di sale e la vaniglia fino ad ottenere una consistenza cremosa,aggiungere l' uovo leggermente sbattuto far incorporare completamente; Unire  poco alla volta la farina setacciata ed impastare velocemente fino ad ottenere un panetto liscio e omogeneo.\n\nDividete in tre parti uguali per comodità di lavorazione, da ogni pezzo creare un rotolo di circa 25/30 cm.di lunghezza.Spennellare i rotoli ottenuti con burro fuso e far rotolare su di un vassoio con lo zucchero comprimendo leggermente per far aderire bene.Fate riposare in frigo avvolto in pellicola \n\n Per 1 ora almeno o fino a completo indurimento.\n\nTagliate ,con un coltello a lama liscia in fette spesse 1cm.Sistemate i biscotti sulla teglia foderata con carta forno,cuocete a 170 gradi ventilato per circa 12/14 minuti (dipende dal vostro forno).\n\nSi conservano a lungo in barattoli ermetici.","note":"","tags":[],"_importId":15742},{"nome":"AMARETTI MORBIDI DI GAVI E VOLTAGGIO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"AMARETTI MORBIDI DI GAVI E VOLTAGGIO,  preparati con la ricetta di Angelo Simonini.\nIngredienti: 350 gr di farina di mandorle o mandorle pelate - 50 gr di mandorle amare ( ma non si trovano più  in vendita) e si.possono sostituire  con una fiala di aroma di mandorle unita a 50 gr di mandorle - 300 gr di zucchero  -  100 gr di albumi - 5 gr di bicarbonato.\nPreparazione : nel mixer frullare le mandorle pelate,( se non si usa la farina di mandorle), assieme allo zucchero e ai 50 gr di mandorle, con la fialetta.di aroma  di mandorle, poi tutto in ciotola. Aggiungere il bicarbonato , mescolare, poi gli albumi, e continuare  a mescolare finona completo assorbimento.  L'impasto deve essere omogeneo. Formare allora delle palline da 25 gr, ripassarle nello zucchero a velo  e poi porle su una teglia ricoperta di carta forno. Farle riposare fino al giorno dopo, in un.luogo riparato.\nIl giorno  dopo, pizzicare la sommità  di ogni pallina con tre dita, per dare la classica forma. Cuocerecin forno statico preriscaldato  a 180-190  gradi, per 10-15  minuti. Appena  gli AMARETTI  prendono colore, sfornarli e farli freddare su una gratella. Non van mangiati subito, perche' prendono sapore dopo almeno un'ora .","note":"","tags":[],"_importId":12225},{"nome":"Antipasto Rio Basco: gamberetti soncino noci patate","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Antipasto Rio Basco: gamberetti soncino noci patate lesse scaglie parmigiano olio limone sale \nSedano?\nRisotto con zafferano salsiccia funghi\nRigatoni pomodorini melanzane stracciatella o ricotta\nVitello tonnato\nFiore zucca fritti\nSalumi\nGelato alla crema","note":"","tags":[],"_importId":951},{"nome":"Antitarme","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"200 gr di grano precotto - 200 gr di latte-   300 gr di ricotta vaccina - 170 gr di zucchero - 3 tuorli.- 3 albumi a neve - una fialetta di aroma di arancia - un pizzicone di cannella - 100 gr d canditi misti di arancio e cedro - buccia di limone.","note":"","tags":[],"_importId":10399},{"nome":"Arancia, carote e limone La torta ace andrà a ruba,","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"uova"},{"qty":200.0,"unit":"g","name":"zucchero"},{"qty":2.0,"unit":"n°","name":"carote"},{"qty":1.0,"unit":"n°","name":"limone grande"},{"qty":2.0,"unit":"n°","name":"arance"},{"qty":80.0,"unit":"ml","name":"olio di semi di girasole"},{"qty":40.0,"unit":"g","name":"fecola di patate"},{"qty":300.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":null,"unit":"q.b.","name":"zucchero a velo"}],"procedimento":"Preparazione:\n1. Pela le carote, lavale, tagliale a pezzetti e frullale con l’olio di semi fino a ottenere una purea liscia.\n2. In una ciotola, sbatti le uova con lo zucchero fino a ottenere un composto chiaro e spumoso.\n3. Aggiungi la purea di carote e mescola delicatamente.\n4. Unisci la scorza grattugiata delle arance e del limone.\n5. Versa il succo di limone e il succo d’arancia filtrati.\n6. Aggiungi la farina setacciata e la fecola di patate, mescolando bene.\n7. Incorpora il lievito per dolci e amalgama il tutto fino a ottenere un impasto omogeneo.\n8. Versa l’impasto in uno stampo a ciambella imburrato e infarinato.\n9. Cuoci in forno preriscaldato a 180°C per 45-50 minuti, verificando la cottura con uno stecchino.\n10. Sforna la torta e lasciala intiepidire nello stampo prima di sformarla.\n11. Una volta fredda, spolverizzala con zucchero a velo.","note":"","tags":[],"_importId":14745},{"nome":"Avevo finito il pane...niente paura...con la nuova","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Avevo finito il pane...niente paura...con la nuova planetaria la cosa è  molto più  semplice:\nPANE CON PASTA MADRE\n Si comincia dal mattino precedente rinfrescando la pasta madre, nel tardo pomeriggio si fa un primo impasto e lo si fa lievitare per un'ora,  poi. Si prepara un panetto a lievitare tutta la notte, e il mattino dopo si da la forma al pane, di nuovo a lievitare per circa 4 ore, poi lo si inforna per la cottura, e il pane è  pronto....\nPagnotta fatta con 450 ml di acqua tiepida - 450 gr di farina 00  -  225 gr di Manitoba - 225 gr di lievito madre - un cucchiaino e mezzo di zucchero - uno di miele - 12 gr di sale fino.\n-","note":"","tags":[],"_importId":10404},{"nome":"Avevo promesso di fare qualcosa per la Pasquetta","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Avevo promesso di fare qualcosa per la Pasquetta, ultima  condivisione per la Settimana Santa col Gruppo di Ammira Le MARCHE e le sue piazze,  ed ecco la\nTORTA PASQUALINA,\nche in effetti non avevo mai fatto, e che ho voluto fare per voi, di  Benedetta Fatto in casa. \nUna torta salata molto facile da fare e anche molto veloce, con un impasto di ricotta e spinaci, e uova crude.\nIngredienti : 150 gr (-42gr)di acqua  - 150 gr (-42gr) di olio di semi di girasole - 6,5 gr di sale fino - 7,5 gr di lievito istantaneo per torte salate oppure 252gr lievito madre 50% - \n400 (-168 gr)=232gr farina\n gr di farina  ( oppure molto semplicemente, e io ho fatto così,  due rotoli di.pasta sfoglia o di pasta brisée).\nFarcia : 250 gr di ricotta - 450 gr di spinaci  bolliti - 24 gr di grana grattugiato  - noce  moscata - un pizzico di sale fino e 3 uova .\nPreparazione : lessare gli spinaci, strizzarli, e farli a pezzetti. Preparare la pasta. ( o stendere la pasta sfoglia e inserire un rotolo in una tortiera e bucherellarlo con la forchetta.)\nMescolare la ricotta con gli spinaci, unire il formaggio grattugiato, il sale e un pizzico di noce moscata. Versare tutto nella tortiera preparata,  poi con un cucchiaio scavare 3 cavità nel ripieno. Rompere le tre uova ognuna nell'interno delle 3 cavità . Coprire il tutto con l'altro foglio di pasta sfoglia, chiudere bene i bordi pressando con le dita, ( io ho dato una spennellata di rosso d'uovo sulla pasta), e far cuocere in forno preriscaldato a 180 gradi per 45 minuti e la Torta Pasqualina è  pronta per voi e i vostri eventuali amici.\nSe avete preparato.la pasta matta, dividerla in due e tirarla col mattarello.","note":"","tags":[],"_importId":10439},{"nome":"BAGEL","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 0"},{"qty":200.0,"unit":"g","name":"farina tipo 1"},{"qty":12.0,"unit":"g","name":"lievito di birra"},{"qty":12.0,"unit":"g","name":"sale"},{"qty":300.0,"unit":"ml","name":"acqua"},{"qty":15.0,"unit":"g","name":"olio di semi di mais/girasole"},{"qty":2.0,"unit":"n°","name":"l di acqua","sezione":"Per la bollitura"},{"qty":1.0,"unit":"cucchiaio","name":"bicarbonato","sezione":"Per la bollitura"},{"qty":1.0,"unit":"cucchiaio","name":"sale","sezione":"Per la bollitura"},{"qty":20.0,"unit":"g","name":"zucchero di canna","sezione":"Per la bollitura"}],"procedimento":"2 cucchiai di maionese mescolati con 2 cucchiai di yogurt greco e scorza di limone\n150 g Valeriana\n30 Pomodorini confit\n40 fette di Zucchine alla scapece\n4 mozzarelle di bufala\n200 g di Prosciutto di San Daniele\nINSTRUCTIONS\nUnire farina, lievito e acqua, quindi mescolare fino a ottenere un impasto grezzo.\nAggiungere il sale e un filo d’olio, poi impastare fino a raggiungere una consistenza liscia e ben incordata. Coprire e lasciare lievitare fino al raddoppio del volume, per circa 2 ore.\nDividere l’impasto in 10 panetti da 80-90 g ciascuno, formare delle palline lisce e regolari e lasciarle lievitare nuovamente, coperte, per 1 ora e mezza o 2 ore.\nPraticare un foro al centro di ogni pallina, modellare delicatamente la forma del bagel e lasciar riposare, sempre coperti, per altri 30-60 minuti.\nPortare a bollore una pentola d’acqua con due cucchiai di zucchero di canna, un pizzico di sale e bicarbonato. Cuocere i bagel uno alla volta per 1 minuto per lato, poi scolarli delicatamente.\nDisporli su una teglia, spennellare la superficie con uovo sbattuto e cospargere con semi di sesamo e papavero.\nCuocere in forno ventilato preriscaldato a 220°C per circa 20 minuti, posizionando la teglia nel ripiano basso, fino a doratura uniforme. Sfornare e lasciar raffreddare completamente su una griglia.\nFarcire con un velo di maionese allo yogurt e scorza di limone, aggiungere valeriana fresca, Prosciutto di San Daniele, fette di bufala, pomodorini confit e zucchine alla scapece.","note":"","tags":[],"_importId":14446},{"nome":"Bastoncini alle olive🌾🫒","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina tipo 0"},{"qty":280.0,"unit":"ml","name":"acqua"},{"qty":6.0,"unit":"g","name":"lievito di birra fresco"},{"qty":8.0,"unit":"g","name":"sale"},{"qty":150.0,"unit":"g","name":"olive denocciolate"}],"procedimento":"Procedimento \n 1 Mescolare tutti gli ingredienti insieme eccetto le olive fino ad ottenere un impasto omogeneo e far riposare 20 minuti.\n 2 Fare delle pieghe sul tavolo da lavoro. Bisognerà ottenere un impasto  elastico (se necessario fate una pausa in più e poi delle altre pieghe).\n 3 Far riposare 30 minuti sul banco da lavoro e allargare poi l'impasto per Inserire le olive ben sgocciolate e far lievitare fino a raddoppio.\n 4 Ribaltare l'impasto sul tavolo tagliare le strisce di pasta e posizionarle su una teglia con olio alla base allungandoli. \n 6 Cuocere in forno statico a 240°C per circa 15 Min o fino a completa doratura.\n\n#panealleolive #paneolive #pane #pizza #bastoncinialleolive impasto\n\nPane alle olive \nBastoncini alle olive","note":"","tags":[],"_importId":16574},{"nome":"BIANCO MANGIARE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Si tratta di una crema-budino preparata di solito per non sprecare del latte rimasto inutilizzato.\nIn un litro di latte scioglire 100gr di amido di mais, 200 gr di zucchero semolato, scorze di limone.\nMettere sul fuoco a fiamma media e girare con un cucchiaio per circa 15 minuti.\nNon appena il composto avra' acquisito una buona densita', togliere le bucce di limone, versare in un piatto e aggiungervi sopra della cannella o delle scaglie di cioccolata e mettere in frigo.\nAnticamente veniva versata in delle formine e una volta freddate rovesciate su delle foglie di limone.\nCostituiva la merenda perfetta per i bambini o la base per realizzare delle torte con dei biscotti secchi inzuppati nel vermuth.","note":"","tags":[],"_importId":10836},{"nome":"bicchierini oppure fatela","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"cacao,"}],"procedimento":"CREMA DI CAFFÈ ALL'ACQUA\n\nSolo 4 ingredienti per preparare la tua nuova merenda estiva preferita: crema di caffè all'acqua ☕️ siamo sicuri che questa ricetta di Michela in Cucina la farai tutti i giorni 😎\n\n🕐Tempo di preparazione: 5 minuti\n🕐Tempo di riposo: 20 minuti per il raffreddamento dell'acqua\n😊Difficoltà: Facile \n🍽Dosi: Per 8-10 porzioni \n🤑Costo: Basso\n\nIngredienti:\n\nZucchero a velo, 150 g;\nAcqua gelida, 200 ml;\nCaffè solubile, 20 g;\nGocce di cioccolato, q.b. ;\nCacao, q.b.\n\nConsigli:\nPuoi decorare la crema al caffè anche con cannella e/o amaretti sbriciolati.","note":"","tags":[],"_importId":12658},{"nome":"BISCOTTI ALLO ZENZERO  (OMINO)","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione\nPer realizzare i biscotti di Pan di zenzero iniziate dalla frolla speziata: nella ciotola di un mixer munito di lame (o in una zuppiera) versate la farina (1) e tutte le spezie: i chiodi di garofano macinati, la cannella in polvere, la noce moscata grattugiata e lo zenzero in polvere (2). Aggiungete anche 1/4 di cucchiaino di bicarbonato (3),\nlo zucchero semolato (4). Quindi unite un pizzico di sale (5) e versate il miele (6).\nPer ultimo versate il burro freddo di frigo tagliato a dadini (7), frullate il composto ad intermittenza per non scaldare eccessivamente l'impasto fino a ottenere una consistenza sabbiosa (8). Versate il composto sul piano di lavoro e formate la classica fontana (9).\nVersate l’uovo al centro (10) e incorporatelo all’impasto prima con la forchetta (11) poi con le mani. Impastate velocemente (12) e una volta che l’impasto avrà preso consistenza (13), formate un panetto piatto e copritelo con pellicola trasparente (14). Ponete l’impasto a rassodare in frigorifero per almeno 30 minuti. Trascorso il tempo di riposo, riprendete l’impasto, stendetelo con il mattarello su una spianatoia infarinata ad uno spessore tra i 7 mm e 1 cm (15).\n\nRitagliate la frolla con le formine natalizie che preferite, noi abbiamo scelto i classici omini di Pan di zenzero (16). Se volete, in questa fase potete forare i biscotti all'altezza della testolina degli omini per far passare un nastrino e poterli appendere all’albero. Con le dosi indicate otterrete circa 15 biscotti (in base al tipo di forme usate e alle dimensioni il numero potrebbe variare). Trasferite i biscotti su una leccarda rivestita con carta da forno (17) e cuocete i biscotti in forno statico preriscaldato a 170° per circa 15 minuti: i tempi sono indicativi poiché ogni forno ha una potenza diversa, è consigliabile perciò fare una prova, con un paio di pezzi per accertarsi che la cottura nel proprio forno sia ottimale. A cottura ultimata, sfornate i biscotti e lasciateli raffreddare completamente (18), meglio se su una gratella.\n\nIntanto preparate la ghiaccia reale: versate gli albumi in una ciotola (19), iniziate a montare con le fruste elettriche a media velocità e incorporate poco a poco lo zucchero a velo aiutandovi con un cucchiaio (20): dovrete aggiungerne fino ad ottenere un composto omogeneo della consistenza desiderata (21).\n\nTrasferite la glassa in una sac-à-poche usa e getta (22) e ritagliate la punta creando un piccolo foro (23) quindi decorate i biscotti ricalcando la sagoma e arricchendo di particolari gli omini a vostro piacimento. I biscotti di pan di zenzero sono pronti per essere gustati (24).","note":"","tags":[],"_importId":2858},{"nome":"Biscotti fantastici Simonetta","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina"},{"qty":280.0,"unit":"n°","name":"zucchero"},{"qty":1.0,"unit":"n°","name":"tuorlo"},{"qty":1,"unit":"n°","name":"pizzico sale"},{"qty":1.0,"unit":"cucchiaino","name":"lievito"},{"qty":190.0,"unit":"n°","name":"forno 25/30 minuti"},{"qty":170.0,"unit":"n°","name":"forno 5/10 min"},{"qty":6.0,"unit":"q.b.","name":"ni"},{"qty":500.0,"unit":"n°","name":"farina"},{"qty":100.0,"unit":"n°","name":"zucchero"},{"qty":6.0,"unit":"n°","name":"tuorli"}],"procedimento":"Biscotti fantastici Simonetta\nCantucci\n500gr farina\n280 zucchero \n4uova\n1 tuorlo\n1hg burro bagno maria \nUn pizzico sale\n1 cucchiaino lievito\nBuccia arancia \n\nUvette\n190 forno 25/30 minuti\nLi taglio\n170 forno 5/10 min\n\n6 filoni\n\n500 farina\n100 zucchero\n3hg burro\nVaniglia\n6 tuorli \nNo lievito","note":"","tags":[],"_importId":2850},{"nome":"BISCOTTI marocchine al limone","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Una ciotola per mescolare\nPellicola trasparente\nTeglia da forno\nCarta forno\nGrattugia e spremiagrumi\nProcedimento:\nIn una ciotola capiente, sbatti 1 uovo con 3 cucchiai di zucchero a velo fino a ottenere un composto omogeneo.\nAggiungi 50 ml d'olio al composto.\nGratta la scorza di 1 limone e aggiungila al composto insieme al succo del limone.\nIncorpora un pizzico di sale per esaltare i sapori.\nAggiungi 200 gr di farina 00 precedentemente setacciata e 10 gr di lievito per dolci, amalgamando bene gli ingredienti fino a formare un impasto omogeneo.\nForma una palla con l'impasto, avvolgila con della pellicola trasparente, e lasciala riposare nel frigorifero per 10 minuti.\nPreriscalda il forno a 180 gradi Celsius.\nRivesti una teglia con della carta forno.\nTrascorso il tempo di riposo, prendi l'impasto dal frigo e forma dei piccoli biscotti della forma desiderata.\nDisponi i biscotti sulla teglia rivestita con la carta forno.\nInforna i biscotti a 180 gradi per 20 minuti o fino a che non siano leggermente dorati.\nUna volta cotti, sfornali e lasciali raffreddare.\nDecorazione:\nCospargi i biscotti con dello zucchero a velo per un tocco di dolcezza e un aspetto invitante.\nSuggerimenti:\nAssicurati di utilizzare la scorza di limoni non trattati per evitare residui di pesticidi.\nLa quantità di zucchero a velo può essere regolata in base ai gusti personali.\nAspetta che i biscotti siano completamente raffreddati prima di spolverarli con lo zucchero a velo, altrimenti si scioglierà.\n\nGrazie per il tuo supporto! 🥰😘 Ricorda di valutare il da 1 a 10. Buon Appetito!","note":"","tags":[],"_importId":12124},{"nome":"Biscotti Morbidi alla Semola 🍪😋","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"uova"},{"qty":150.0,"unit":"g","name":"zucchero"},{"qty":150.0,"unit":"g","name":"olio di semi"},{"qty":150.0,"unit":"g","name":"yogurt naturale"},{"qty":2.0,"unit":"cucchiaio","name":"marmellata di albicocche"},{"qty":500.0,"unit":"g","name":"semola"},{"qty":16.0,"unit":"g","name":"lievito in polvere"},{"qty":null,"unit":"q.b.","name":"noci","sezione":"Per la decorazione"},{"qty":25.0,"unit":"g","name":"cocco grattugiato","sezione":"Per la decorazione"}],"procedimento":"Preparazione\n\n1. Preparare l'impasto:\n   - In una ciotola, sbattere le uova con lo zucchero fino a ottenere un composto spumoso.\n   - Aggiungere l'olio di semi, lo yogurt naturale, la scorza di limone grattugiata e la marmellata di albicocche. Mescolare bene.\n\n2. Incorporare la semola:\n   - Aggiungere la semola e il lievito in polvere al composto, mescolando fino a ottenere un impasto omogeneo.\n   - Lasciare riposare l'impasto per 5 minuti per permettere alla semola di assorbire i liquidi.\n\n3. Formare i biscotti:\n   - Bagnarsi le mani con acqua e formare delle palline con l'impasto.\n   - Arrotolare le palline nel cocco grattugiato.\n\n4. Cottura:\n   - Disporre i biscotti su una teglia rivestita di carta forno.\n   - Cuocere in forno preriscaldato a 180°C per circa 20 minuti, fino a doratura.\n\n5. Servizio:\n   - Lasciare raffreddare i biscotti prima di servirli.\n   - Gustare i biscotti che si sciolgono in bocca!\n\nBuon appetito! 🌼😊","note":"","tags":[],"_importId":12494},{"nome":"Biscotti morbidi con farina di mandorle","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina di mandorle"},{"qty":175.0,"unit":"g","name":"zucchero"},{"qty":2.0,"unit":"n°","name":"albumi"},{"qty":100.0,"unit":"g","name":"granella di mandorle"},{"qty":4.0,"unit":"g","name":"occe essenza di mandorle amare"}],"procedimento":"1) Prendete una ciotola capiente, e lavorate un composto fatto con 250 g di farina di mandorle, 175 g di zucchero, 2 albumi e 3-4 gocce di essenza di mandorle amare; coprite con un panno da cucina e fate riposare l’impasto per 10 minuti.\n2) Aiutandovi con un cucchiaino prendete dei pezzi d’impasto delle dimensioni di una piccola noce e lavoratelo tra le mani formando circa 60 palline, schiacciatele delicatamente tra i palmi delle mani e disponetele su una piastra foderata con carta da forno.\n3) Riscaldate il forno a 180°C e infornate per 20 minuti circa; quando i biscotti acquistano la doratura, ma risultano morbidi dentro, prelevateli dal forno e fateli raffreddare. Potete conservarli in una scatola di latta rivestita da carta velina oppure in un vaso di vetro per biscotti.","note":"","tags":[],"_importId":6114},{"nome":"BISCOTTI PAN DI ZENZERO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione\nPer realizzare i biscotti di Pan di zenzero iniziate dalla frolla speziata: nella ciotola di un mixer munito di lame (o in una zuppiera) versate la farina (1) e tutte le spezie: i chiodi di garofano macinati, la cannella in polvere, la noce moscata grattugiata e lo zenzero in polvere (2). Aggiungete anche 1/4 di cucchiaino di bicarbonato (3),\nlo zucchero semolato (4). Quindi unite un pizzico di sale (5) e versate il miele (6).\nPer ultimo versate il burro freddo di frigo tagliato a dadini (7), frullate il composto ad intermittenza per non scaldare eccessivamente l'impasto fino a ottenere una consistenza sabbiosa (8). Versate il composto sul piano di lavoro e formate la classica fontana (9).\nVersate l’uovo al centro (10) e incorporatelo all’impasto prima con la forchetta (11) poi con le mani. Impastate velocemente (12) e una volta che l’impasto avrà preso consistenza (13), formate un panetto piatto e copritelo con pellicola trasparente (14). Ponete l’impasto a rassodare in frigorifero per almeno 30 minuti. Trascorso il tempo di riposo, riprendete l’impasto, stendetelo con il mattarello su una spianatoia infarinata ad uno spessore tra i 7 mm e 1 cm (15).\n\nRitagliate la frolla con le formine natalizie che preferite, noi abbiamo scelto i classici omini di Pan di zenzero (16). Se volete, in questa fase potete forare i biscotti all'altezza della testolina degli omini per far passare un nastrino e poterli appendere all’albero. Con le dosi indicate otterrete circa 15 biscotti (in base al tipo di forme usate e alle dimensioni il numero potrebbe variare). Trasferite i biscotti su una leccarda rivestita con carta da forno (17) e cuocete i biscotti in forno statico preriscaldato a 170° per circa 15 minuti: i tempi sono indicativi poiché ogni forno ha una potenza diversa, è consigliabile perciò fare una prova, con un paio di pezzi per accertarsi che la cottura nel proprio forno sia ottimale. A cottura ultimata, sfornate i biscotti e lasciateli raffreddare completamente (18), meglio se su una gratella.\n\nIntanto preparate la ghiaccia reale: versate gli albumi in una ciotola (19), iniziate a montare con le fruste elettriche a media velocità e incorporate poco a poco lo zucchero a velo aiutandovi con un cucchiaio (20): dovrete aggiungerne fino ad ottenere un composto omogeneo della consistenza desiderata (21).\nTrasferite la glassa in una sac-à-poche usa e getta (22) e ritagliate la punta creando un piccolo foro (23) quindi decorate i biscotti ricalcando la sagoma e arricchendo di particolari gli omini a vostro piacimento. I biscotti di pan di zenzero sono pronti per essere gustati (24).","note":"","tags":[],"_importId":6111},{"nome":"BOMBOLONI - KRAPFEN FATTI IN CASA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"che propongo come dolce della domenica, da condividere con gli amici di Ammira Le MARCHE e le sue piazze. \nIngredienti: 250 gr di farina 0 - 250 gr di farina Manitoba  - 250 gr di acqua - 60 gr di burro - 75 gr di zucchero - 10 gr di lievito secco - 1 uovo - 2 gr di sale fino - raschio di limone  - aroma di vaniglia. ( come al solito ho fatto meta' dose, con la dose intera vengono 15 bomboloni).\nPreparazione: sciogliere il lievito in acqua a temperatura ambiente,  aggiungere lo zucchero,  poi metà  farina, l'uovo, il burro a pezzetti a temperatura ambiente,  il raschio di limone,  e la vaniglia. Cominciare ad impastare con l'impastatrice,  unire il sale, poi poco alla volta la farina rimanente. Durante l'impasto fermare la macchina due volte, raschiare la pasta dai bordi e dal gancio, e rovesciare l'impasto su se stesso per aiutare lo sviluppo del glutine. La pasta è  pronta quando si stacca dalle pareti. Per  vedere se è  pronta, prendere un pizzico di pasta, allargarlo con le dita, non si deve rompere, se no si deve impastare ancora. Una volta pronto l'impasto, si fa una palla, poi si mette in ciotola e si copre  con la pellicola e un.panno. Far riposare per 15 - 20 minuti. \nSchiacciare poi la pasta e fare una piega a tre. Fare di nuovo una palla, coprire bene e far lievitare per 60 minuti\nfino al raddoppio. Schiacciare la pasta e  stenderla col.mattarello in un tondo di 36 cm di diametro, con uno spessore di 1,5 cm. Con un coppapasta o un bicchiere, incidere dei cerchi  di 8 cm. Farli lievitare posizionati su carta forno sulla spianatoia , coprirli con pellicola e poi con un panno, e farli lievitare per circa 30 minuti . Con gli scarti si possono fare delle frittelle. Friggere poi i KRAPFEN in olio di semi a 170-180  gradi, e girarli una volta con una paletta molto delicatamente, per farli  cuocere dai due lati. Vanno poi ripassati nello zucchero semolato e riempiti da un lato, con una siringa, o con marmellata o con crema pasticcera,  o con nocciolata.  ( Per i nipoti chiaramente ho dovuto scegliere la nocciolata).\nPossono anche cuocere in forno a 220 gradi per 8-10  minuti.","note":"","tags":[],"_importId":10664},{"nome":"BORDI DI FOCACCIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Semplice...basta guardare la ricetta di Angelo Simonini e farseli...e poi come fa lui, intingerli nel cappuccino per colazione... \nIngredienti:   340 gr di farina, - 210 gr di acqua - 21 gr di olio evo - 3 gr di zucchero - 6 gr di lievito secco - 8 gr di sale - \nPreparazione: Mettere nella ciotola acqua, malto, lievito, mescolare, poi unire l'olio, mescolare ancora, poi  metà farina, ed impastare. Poco dopo unire la restante farina,  insieme al sale, e continuare ad impastare fino a quando si vedrà l'impasto staccarsi dalle pareti. A questo punto toglierlo dalla ciotola, portarlo sulla spianatoia, fare le solite pieghe per dar forza alla pasta, poi fare una palla e metterla in una ciotola unta di olio , chiuderla bene, e farla   lievitare fino al raddoppio per circa 45-.60 minuti.\n Riportare la pasta sulla spianatoia, ancora pieghe, poi fare un rettangolo lungo quanto la teglia che andrà in forno, e largo metà di essa. Il rettangolo si divide poi in 16 parti (dal lato della larghezza),  e otto parti andranno sulla teglia ben unta di olio, tirando ogni pezzo con molta delicatezza fino a raggiungerne i bordi , e le altre  avranno lo stesso trattamento su una teglia gemella. Spennellare con olio le strisce di pasta. \nIo come il solito . faccio sempre metà dose, e ho riempito una sola teglia. Coprire le teglie e tenerle al caldo per altri 45-60 minuti. Riscaldare intanto il forno a 230 gradi,  e una volta pronte per essere infornate, spennellare con abbondante olio e salare.  Cuocere ogni teglia per 15 mimuti, poi far freddare su una griglia. \nOrmai l'ora del cappuccino era passata, e dovrò aspettare domattina per \"pucciare\"nel cappuccino, sempre che non mi sia mangiata tutti i bordi prima che finisca la giornata. Troppo buoni...","note":"","tags":[],"_importId":10368},{"nome":"Briosh per granita","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Rossana Napoli Ciao Rossana, non hanno commentato e dunque magari non serviva ricetta e videotutorial.Ti lascio il video \nhttps://www..com/watch?v=d_N0P9dYSLg\nVuoi fare un corso con me e il mio Team?\nVuo avere info sulle centinaia di corsi che ogni giorno si svolgono nella nostra scuola online?\nScrivi su whatsapp al 3491953885 per tutti i dettagli e per ottenere l'intera offerta didattica. \nGRUPPI DEDICATI SEMPRE APERTI H24, ASSISTENZA POST CORSO ILLIMITATA, ORARI FLESSIBILI, VIDEOTUTORIAL IN STREAMING E IN DOWNLOAD SCARICABILI E CONSULTABILI SENZA LIMITE DI TEMPO. \nENTRA ANCHE TU NELLE NOSTRE CLASSI E DIVENTA CAPACE, INDIPENDENTE E INTELLIGENTE. \nSTUPISCI I TUOI AMICI O I TUOI CLIENTI.\nL' ARTE BIANCA E' SEMPLICISSIMA, MA UN INSEGNAMENTO ERRATO PUO' FARVI  SBAGLIARE TUTTO. \nNOI SIAMO IL METODO E NON LA RICETTA. \nNOI SIAMO IL PONTIFICATO !\nQUESTA E' LA BRIOCHE TIPICA DEI BAR ADATTA ALLA GRANITA : SEMPLICE, VELOCISSIMA, VAPOROSA E AVVOLGENTE\nBrioches idrobeate all'olio extravergine di oliva in lievitazione mista (omettete o sostituite ciò che non avete)\n• 250 g farina 00 oppure 0 con W 280-350 \n• 137 g acqua\n• 20 g ldbf\n• 20 grammi ca. di li.co.li. o pasta madre solida\n• 30 g zucchero\n• 20 g zucchero invertito o miele\n• 4 g sale\n• 10 g olio E.V.O. o strutto o sugna o margarina tecnica \n• 15 g bouquet aromatico (white albas, pasta di arancia, carol bouquet, aroma estico ecc)\n• 6 g latte in polvere\n• 2,5 g malto diastasico\n• vaniglia o vanillina\n• aroma burro\n•giallo uovo \nDopo impasto e chiusura sul banco, mettere in un contenitore chiuso con\npellicola e lasciare lievitare fino al raddoppio. \nPassare dal frigo prima dello staglio per un tempo a vostra scelta vi aiuterà se le temperature sono infernali come le nostre messinesi, formare palline della base con chiusura a margherita o a buns e fare lo stesso\nper i tuppi.Puoi formare anche col metodo classico.Non esiste una giusta via, ma quella più adatta alle tue corde.\nPeso base 55 g e tuppo 15 g.\nQuando saranno raddoppiate, spennellare con tuorlo e panna, tuorlo e latte,\ntuorlo e olio evo o con l'emulsione che amate maggiormente.\nCottura 170 ° statico secondo scalino fino a cottura imperiale, coprire con\nallumino per non far bruciare il tuppo.\nPotete cambiare / variare / modificare dopo la prima prova qualunque ingrediente (tipo di grassi e di farine, grammature, bouquet, aggiunta di uova o tuorli, mezze birre).  Siete alla ricerca della ricetta, ma ciò che vi manca è la logica e il metodo. E i miei corsi vi aiutano a ragionare e diventare i numeri uno.\nGARANTITO!\nIl vostro prodotto sfornato alla fine dovrà avere orientativamente queste caratteristiche:                70gr circa da cotta\nLa Base 57gr. \nH. 3,3 cm diam. 10 cm\nIl Tuppo 12 gr\nH. 3 diam. 5,5 cm \nGrazie infinite al mio team, a Roberta Lauro per il suo prezioso supporto, a tutti i miei numerosissimi corsisti e utenti e a Maria Milanese per la bellissima foto :-)\niIl mio shop online\nhttps://www.amazon.it/shop/influencer...\nUSO SOLO Molino Bogetto! Vuoi uno sconto per acquistare queste meravigliose farine? \nScrivimi!\nEndorser Vulcan Piastre","note":"","tags":[],"_importId":9617},{"nome":"Bruschette burro e alici con cipolle caramellate...😁","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Io ho usato il mio pan bauletto alla zucca ma va bene anche altro tipo di pane... Ho messo in una pentola piccola un pezzo di burro 60 gr.circa, tagliato una bella cipolla rossa lunga sui 300 gr. con la mandolina, aggiunto 2 cucchiaini rasi di zucchero di canna e 2 pizzichi di sale, messo il coperchio e cominciato a stufare a fiamma bassissima fuoco piccolo mescolando ogni tanto, dopo 15 minuti ho aggiunto 3 cucchiai di aceto di mele e stufato  avanti per altri 10 minuti, ho aggiunto ancora 2 cucchiai di aceto balsamico di Modena quello buono e fatto andare altri 10 minuti, gli ultimi 5 senza coperchio (sempre mescolando ogni tanto) e poi fatte raffreddare... Tostato il pane sulla bistecchiera ben calda 2 minuti per parte e lasciato raffreddare, in una ciotola avevo messo un po' (qb.per spalmare le bruschette) ad ammorbidire il burro (io ho quello di malga) , tritato a coltello qualche filetto di alice di quelle buone sott'olio e mescolato per bene con il burro, spalmato sul pane e aggiunto le cipolle... Un' estasi di sapori... 😋😁","note":"","tags":[],"_importId":12757},{"nome":"Buchteln secondo una ricetta austriaca","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":125.0,"unit":"ml","name":"latte tiepido"},{"qty":17.0,"unit":"g","name":"lievito fresco"},{"qty":250.0,"unit":"g","name":"farina"},{"qty":25.0,"unit":"g","name":"zucchero a velo"},{"qty":0.5,"unit":"cucchiaino","name":"sale"},{"qty":1.0,"unit":"cucchiaino","name":"zucchero vanigliato"},{"qty":1.0,"unit":"n°","name":"tuorlo d’uovo grande"},{"qty":30.0,"unit":"g","name":"burro morbido"},{"qty":150.0,"unit":"g","name":"marmellata di prugne","sezione":"Per il ripieno e la finitura"},{"qty":60.0,"unit":"g","name":"burro fuso","sezione":"Per il ripieno e la finitura"}],"procedimento":"Metodo di Preparazione\nPreparare l’impasto:\nScalda il latte fino a renderlo tiepido, poi sciogli il lievito nel latte usando una frusta.\nIn una ciotola, unisci la farina, lo zucchero a velo, il sale e lo zucchero vanigliato.\nAggiungi il tuorlo, il burro morbido, la scorza di limone e il latte con il lievito.\nImpasta per circa 5 minuti fino a ottenere un composto liscio e morbido.\nCopri la ciotola con un panno e lascia lievitare l’impasto per circa 30 minuti in un luogo caldo.\nPreparare i panini:\nSciogli 60 g di burro e lascialo raffreddare.\nUngi una pirofila con burro morbido.\nDividi l’impasto in pezzi uniformi, circa 12-15, a seconda della dimensione desiderata.\nStendi ogni pezzo su una superficie leggermente infarinata, metti un cucchiaino di marmellata al centro e richiudi formando una pallina.\nAssemblare i panini:\nImmergi ogni pallina nel burro fuso e posizionale nella pirofila con la chiusura verso il basso.\nCopri e lascia lievitare per altri 20 minuti.\nCuocere i panini:\nPreriscalda il forno a 170°C in modalità statico.\nCuoci i panini sul secondo ripiano dal basso per circa 25-30 minuti, fino a quando saranno dorati in superficie.\nServire:\nSpolvera i panini con zucchero a velo prima di servirli. Gustali tiepidi per apprezzarne al meglio la morbidezza e il sapore.\nSuggerimenti per Servire\nAccompagnali con una tazza di tè o caffè per una pausa perfetta.\nPuoi aggiungere una pallina di gelato alla vaniglia accanto per una versione più golosa.\nConsigli di Cucina\nRipieno alternativo: Puoi sostituire la marmellata con crema di nocciole o burro di arachidi per variare i gusti.\nForma personalizzata: Realizza forme diverse, come trecce o ciambelle, per un tocco creativo.\nGlassa extra: Per una finitura lucida, spennella i panini con un po’ di latte prima di infornarli.\nBenefici Nutrizionali\nLatte e burro: Forniscono calcio e grassi sani.\nMarmellata: Una fonte di zuccheri naturali e, a seconda del tipo, anche di fibre.\nLimone: Ricco di vitamina C, aggiunge freschezza e aroma.\nSuggerimenti per la Conservazione\nConserva i panini in un contenitore ermetico a temperatura ambiente per 2-3 giorni.\nPer un periodo più lungo, congelali e riscaldali brevemente in forno prima di servirli.\nPerché Amerai Questa Ricetta\nSemplice e veloce: Richiede pochi ingredienti e passaggi, con risultati garantiti.\nVersatile: Perfetti per colazione, merenda o dessert.\nMorbidi e golosi: Una combinazione irresistibile di impasto soffice e ripieno dolce.\nConclusione\nPreparare questi panini dolci ripieni di marmellata sarà un’esperienza piacevole e gratificante. Ideali per deliziare la famiglia o sorprendere gli ospiti, ti conquisteranno con il loro sapore unico e la loro consistenza soffice. Provali e goditi ogni boccone!","note":"","tags":[],"_importId":13396},{"nome":"Budino arancia","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"ml","name":"succo arance bio"},{"qty":2.0,"unit":"n°","name":"tuorli"},{"qty":200.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"n°","name":"arancia bio"},{"qty":30.0,"unit":"g","name":"maizena"},{"qty":8.0,"unit":"cucchiaio","name":"coulis arancia"},{"qty":8.0,"unit":"fetta","name":"arancia caramellata"},{"qty":200.0,"unit":"ml","name":"latte"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"n°","name":"arancia bio succo"},{"qty":2.0,"unit":"cucchiaio","name":"maizena"},{"qty":1.0,"unit":"n°","name":"arancia bio"},{"qty":100.0,"unit":"g","name":"zucchero"}],"procedimento":"Procedimento:\n- Budino:\nRicava 100 ml di succo di arancia filtrato. Metti da parte. In una ciotola sbatti con una frusta i tuorli con lo zucchero fino a renderli chiari. Aggiungi la maizena, la buccia grattata, il succo d’arancia e il latte. Miscela togliendo tutti i grumi. Cuoci ora in un tegame a fiamma bassa continuando a mescolare finché non lo vedrai rapprendere. Versa il composto in pirottini bagnati in acqua fredda. Fai raffreddare e metti poi in frigo per 4/5 ore circa a rassodare.Trascorso il tempo servi accompagnado con coulis di arance e arance caramellate (ricetta di seguito)🥰.\n- Coulis:\nCuoci in padella lo zucchero con il succo d’arancia e la maizena, fin quando non bollira’ e si rassodera’ diventando lucido. Mescola per non farlo attaccare. Trasferisci in una ciotola e metti da parte.\n- Arance caramellate:\nRicava da un’arancia bio 7 o 8 fette e una tazzina di succo d’arancia.Versa lo zucchero in una padella e posiziona le fette di arancia sopra. Cuoci a fuoco lento e sfuma con il succo. Cuocere fino a caramellare le fette d’arancia completamente. Mettete da parte le due preparazioni. Puoi usarle per guarnire il budino🧡!","note":"","tags":[],"_importId":10111},{"nome":"Buon pomeriggio a tutti ☺️ Lo so bene che questo non è","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Buon pomeriggio a tutti ☺️ Lo so bene che questo non è tempo di plumcake e altre torte simili, troppo caldo 😅🌡️Ma ieri ho visto uno dei tanti video che passano su  e ho voluto provare...\nQuesto è il risultato: un plumcake perfetto con un semplice trucchetto...provate per credere 😘\nP.s. se volete oltre il \"trucchetto\" finale vi lascio anche la ricetta che ho seguito.\nRicetta: \n160 gr di farina 00\n3 uova\n60 gr di olio\n170 gr di yogurt greco\n100 gr di zucchero\nEstratto di vaniglia\nUna busta di lievito in polvere per dolci\n20 gr di cacao amaro (da aggiungere ad una piccola parte di impasto per ottenere la parte al cioccolato)\nUna fialetta al rum da aggiungere al composto al cioccolato \n25 gr di burro freddissimo da mettere in mezzo prima di infornare (vedi foto).","note":"","tags":[],"_importId":10858},{"nome":"Buon pomeriggio e grazie per avermi accettato.","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":5.0,"unit":"n°","name":"uova medie"},{"qty":300.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"bicchiere","name":"olio"},{"qty":1.0,"unit":"bicchiere","name":"latte"},{"qty":400.0,"unit":"g","name":"farina"},{"qty":1.0,"unit":"bustina","name":"lievito"},{"qty":1,"unit":"n°","name":"pizzico di sale"}],"procedimento":"bene lo zucchero con le uova. Aggiungere l' olio a filo e poi alternare farina setacciata  con il lievito,  gli aromi e latte non facendo smontare l'impasto.","note":"","tags":[],"_importId":12447},{"nome":"Buona serata amici..vi saluto con una bella","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Buona serata amici..vi saluto con una bella focaccia..buonissima..volete farla anche voi?Allora vi lascio la ricetta..e buona serata a tutti🍕🍕🌆🌅🌄🌃🌉🌇\n500gr di farina 0..300ml di acqua tiepida..9 gr di lievito..un cucchiaino di zucchero..13 gr di sale..speck..mettere la farina in una ciotola..aggiungere acqua tiepida dove si è sciolto il lievito con lo zucchero..mescolare un po con la forchetta e aggiungere sale e speck..mescolare con la forchetta e mettere a lievitare..dopo 40 minuti fare pieghe in ciotola e mettere a lievitare..al raddoppio versare la pasta nella teglia oliata.. e lasciarla riposare x 15 minuti..stendere l'impasto con le dita..facendo dei buchi..mettere in un bicchiere metà acqua .. olio e sale..e con il pennello versarlo sullimpasto..mettere in forno a 250..già riscaldato..dopo 15 minuti abbassare a 220 fino a cottura😋😋😋😋😋","note":"","tags":[],"_importId":9106},{"nome":"Buondì....oggi voglio parlarvi del GHEE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Buondì....oggi voglio parlarvi del GHEE, ovvero burro chiarificato. Sappiate che in India esso è  considerato sacro e si offre agli dei o ai sacerdoti brahim, inoltre gli si riconoscono spiccate proprietà  digestive ed antiossidanti ...Ma cos'è nella fattispecie? Il burro che noi acquistiamo è  composto da oltre 80% da grassi, poi da acqua e da lattosio.Se noi eliminiamo il lattosio e l'acqua,  resteranno solo i grassi a catena corta, assorbiti dall'organismo come i carboidrati( vale a dire in modo simile)..Anche la quantità  di colesterolo resta minima.Quindi ideali per le fritture( il suo punto di fumo è  più  alto dell'olio normale)e non solo. A casa mia non manca mai. Questo l'ho appena preparato. Nella prima foto appare limpido perché appena fatto: nella seconda è freddo da frigo..Si mantiene per molti mesi: se vi dovesse interessare posterò il semplice procedimento....e ora veniamo a due libri che oggi vi voglio proporre: \n1) la cucina indiana( di madre in figlia) ...un excursus sulla cucina indiana di casa( piccolo inciso: io adoro questa cucina e spesso la preparo) raccontato da Anjali Mendes( modella di alta moda fra le più celebri negli anni '70) con semplicità  e passione...\n2) Dolci ebraici della tradizione veneziana. Le ricette presenti in questo libricino sono state tramandate da madre in figlia...\nPermettetemi di fare una breve deroga dall'ambito culinario e di consigliarvi un libro che io amo oltre ogni dire: \" le botteghe color cannella\" di Bruno Schulz: l'autobiografia di questo geniale e sfortunatissimo scrittore e disegnatore( leggetela prima di tuffarvi nella eventuale lettura del libro) vi catturerà e le sue parole piroetteranno sul vostro cuore e sulla vostra lingua, lasciando mille odori e un caleidoscopio meraviglioso di colori e sapori....buona giornata a tutti\nRicetta Ghee\nMettere in un pentola dell'acqua e sopra, in un pentolino, mettere il burro( prendetene di ottima qualità) a bagnomaria...aspettate che si sciolga e continuate a far sobbollire , senza mai mescolare, fino a che sul fondo non vedrete una patina bianca...se si forma della schiuma in superficie, lavatela delicatamente con una schiumarola...dopo una ventina di minuti l'acqua e la caseina si saranno depositate sul fondo( lo vedete attraverso il burro diventato trasparente)...Spegnete e con un colino a maglie strette( oppure una garza) travasate molto delicatamente in un barattolo...fatelo con estrema cura perché il fondo non deve mischiarsi al resto..quando sarete arrivati alla patina bianca raccogliete con un cucchiaio, molto delicatamente, se è rimasto ancora un po' di liquido trasparente e buttate il fondo...conservate in frigo.","note":"","tags":[],"_importId":8105},{"nome":"Buongiorno  a tutti...adoro cucinare e fare la pasta","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina"},{"qty":150.0,"unit":"g","name":"barbabietola  rossa  precotta , frullata e setacciata"},{"qty":200.0,"unit":"g","name":"gorgonzola dolce"},{"qty":70.0,"unit":"g","name":"noci  tritate"},{"qty":200.0,"unit":"n°","name":"ricotta"},{"qty":250.0,"unit":"g","name":"panna","sezione":"condimento"},{"qty":0.7,"unit":"g","name":"parmigiano","sezione":"condimento"}],"procedimento":"scaldare panna e aggiungere parmigiano fino ad ottenere la crema di parmigiano \nbon apetit 😉","note":"","tags":[],"_importId":13594},{"nome":"Buongiorno a tutti panificatori casalinghi.","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":20.0,"unit":"g","name":"sale e 20 di olio."}],"procedimento":"Dopo aver lasciato la biga 18 h in frigo ed impastato ho lasciato riposare 1 h, fatto 3 volte le pieghe con pause da 30 Min ed un'ultima ora di lievitazione.\nCottura con pentolino di acqua in forno, 220 g 30 Min, 200 g 25 Min, 180 g 20 Min.\nNulla rispetto a tantissimi pani che vedo qui sul gruppo ma per me é stato molto soddisfacente come risultato, consapevole che c'è solo da imparare e migliorarsi 😊.\nHo dimenticato la foto della pagnotta aperta ma é durata meno del tempo di cottura 😅😁.\nGrazie per lo spazio.\nScrivo il procedimento qui nei commenti sperando di rispondere a tutti:\n- il giorno precendente preparo una biga con 5 g di lievito di birra fresco, 500 g di acqua ed 1kg di semola, lascio riposare in frigo tutta la notte.\n- alle 15 del giorno successivo prendo la biga e la metto nell'impastatrice aggiungendo 3 g di lievito di birra fresco, un cucchiaio di miele e 150 g di acqua a filo, aggiungendola ogni volta che l'impasto la assorbe, quando mancano pochi g di acqua aggiungo i 20 g di sale (meglio 16gr) e la restante acqua per farlo assorbire.\nTermino il tutto con l'olio fino ad assorbimento totale.\n-terminato l'impasto metto tutto sul banco e faccio due o tre pieghe di rinforzo e faccio riposare un'ora, ogni mezz'ora poi e per tre volte faccio le pieghe di rinforzo per poi formare il pane e farlo riposare 1h in uno stampo (ho usato una normalissima pirofila)\n-terminata l'ultima lievitazione metto a forno già ben caldo con i tempi di cottura indicati nel post 😊.\nTutte le lievitazioni (ad esclusione della biga) sono state fatte a temperatura ambiente e per le pieghe di rinforzo sul banco ho usato l'olio per non fare attaccare l'impasto utilizzando la semola solo all'ultima lievitazione.\nSpero di essere stato chiaro e se ci sono dubbi, critiche o consigli scrivete senza problemi che sbagliando si impara e non si smette mai di farlo 😁","note":"","tags":[],"_importId":15627},{"nome":"Buongiorno a tutti","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Buongiorno a tutti! Vi lascio una ricettina super sfiziosa e senza sensi di colpa!\nI brutti ma buoni salati di \"fatto in casa da Benedetta\". \n3 albumi (100ml circa)\n200 g noci\n100 g pecorino grattugiato oppure parmigiano \n1 pizzico di pepe \nSi frullano grossolanamente le noci. In una ciotola a parte si montano gli albumi a neve ferma, si aggiunge piano piano il formaggio scelto  e infine le noci. In fine, con l'aiuto di due cucchiaini si formano delle palline da sistemare sopra una teglia con carta da forno.\nInfornare per 10/15 minuti a 180°\nIo li preparo spesso per quando sono invitata da amici per aperitivo o cena così so cosa mangio ed evito di mangiare preparazioni a me non consentite! \nSono velocissimi da fare e molto goduriosi! 😀 (Attenti perché uno tira l'altro 🤣)\nBuona domenica a tutti 😘","note":"","tags":[],"_importId":13782},{"nome":"Buongiorno,mi presento con la ciambella che faccio","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":200.0,"unit":"g","name":".di zucchero"},{"qty":100.0,"unit":"g","name":".di uvetta ammollare"},{"qty":100.0,"unit":"g","name":".di noci tritate grossolanamente"},{"qty":2.0,"unit":"n°","name":"mele a cubetti oppure grattugiata grossolanamente"},{"qty":35.0,"unit":"ml","name":".di rum"},{"qty":65.0,"unit":"ml","name":".di acqu
