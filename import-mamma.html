a"},{"qty":80.0,"unit":"ml","name":".di olio di girasole."},{"qty":1,"unit":"n°","name":"bustina di lievito per dolci."}],"procedimento":"Buongiorno,mi presento con la ciambella che faccio spesso per colazione.:\nIngredienti\n300gr di farina\n3 uova\n200 gr.di zucchero\n100 gr.di uvetta ammollare\n100 gr.di noci tritate grossolanamente\n2 mele a cubetti oppure grattugiata grossolanamente\n35 ml.di rum\n65 ml.di acqua\n80 ml.di olio di girasole.\nuna bustina di lievito per dolci.","note":"","tags":[],"_importId":13975},{"nome":"burro perfetti sia per la","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":125.0,"unit":"g","name":"yogurt"},{"qty":80.0,"unit":"ml","name":"olio di semi"}],"procedimento":"Polvere o scorza di limone (trovate il video completo per la polvere di limone nella sezione Reel qui su IG)\n100g di zucchero\n8g di lievito per dolci\n350g di farina 0\nCrema di nocciole (qualche cucchiaio a piacere)\ner prima cosa realizziamo la pasta frolla senza uova, in una ciotola uniamo lo yogurt, lo zucchero e l’olio di semi. Mescoliamo bene e aromatizziamo con la mia polvere di limone o scorza di limone. Aggiungiamo a questo punto la farina un po’ alla volta fino a formare un panetto sodo e non appiccicoso. Stendiamo la nostra frolla formando una sfoglia quadrata, ricaviamo così due bei rettangoli e farciamo ogni rettangolo con la crema di nocciole, chiudiamo formando un filoncino. Sistemiamo i nostri filoncini su un foglio di carta forno e cuociamoli in forno ventilato a 180° per circa 20-25 minuti. Una volta pronti lasciamoli intiepidire e poi con un coltello tagliamo i nostri biscotti nascondini. Lasciamoli raffreddare per bene e sì conserveranno ben chiusi in un sacchetto per 7-8 giorni.\n#nascondini #biscotti #ricettafacile #recipe #biscottisenzauova #senzauova #settimanadellecolazioni","note":"","tags":[],"_importId":12770},{"nome":"CALAMARI RIPIENI","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Tritate i tentacoli e cuoceteli dolcemente in padella con 2 cucchiai di olio, aglio, un pizzico di sale, pepe e vino bianco per 5-6’. Liberate la padella e nella stessa tostate a fuoco vivo la mollica con un filo di olio. \nFrullare tentacoli con capperi\nmescolate pane con i tentacoli, l’uovo, un cucchiaio di grana e prezzemolo tritato. (Provare con acciughe) Aiutandovi con un cucchiaio riempite i sacchi dei calamari solo per metà (in cottura si ritireranno).\nChiudete i sacchi fermandoli con uno stecchino. Rosolate vivacemente i calamari ripieni in padella con 2 cucchiai di olio con aglio pomodorini e piselli per 1-2’, bagnateli con un bicchiere di acqua o di vino bianco, riducete la fiamma, coprite con il coperchio e cuocete per altri 20’ circa.","note":"","tags":[],"_importId":6113},{"nome":"Camille","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"carote fresche"},{"qty":200.0,"unit":"g","name":"farina"},{"qty":100.0,"unit":"g","name":"farina di mandorle"},{"qty":180.0,"unit":"g","name":"zucchero a velo"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":80.0,"unit":"ml","name":"olio di semi di girasole"},{"qty":100.0,"unit":"ml","name":"succo d’arancia"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"}],"procedimento":"Preparazione:\nPreparare le carote:\n\nPelate le carote e grattugiatele finemente. Mettetele da parte in una ciotola.\nPreparare l’impasto:\n\nIn una ciotola grande, montate le uova con lo zucchero a velo fino a ottenere un composto leggero e spumoso.\nAggiungete l'olio di semi di girasole e continuate a mescolare.\nUnite il succo d'arancia e la scorza d’arancia grattugiata.\nIncorporare gli ingredienti secchi:\n\nSetacciate la farina e il lievito, poi aggiungeteli al composto.\nAggiungete la farina di mandorle e le carote grattugiate, mescolando delicatamente fino a ottenere un impasto omogeneo.\nCottura:\n\nPreriscaldate il forno a 180°C.\nVersate l’impasto negli stampi per muffin o mini-cake leggermente imburrati.\nCuocete in forno per circa 20-25 minuti, fino a quando le tortine saranno dorate e uno stecchino ne uscirà pulito.\nFinitura:\n\nLasciate raffreddare prima di sformare. Se desiderate, spolverate con zucchero a velo prima di servire.\nConsiglio:\nQueste Camille sono ancora più buone il giorno dopo e si conservano bene in una scatola ermetica. Buon appetito!","note":"","tags":[],"_importId":12935},{"nome":"CAMILLE FATTE IN CASA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"carote già pelate 🥕"},{"qty":200.0,"unit":"g","name":"farina 00 🍚"},{"qty":150.0,"unit":"g","name":"uova"},{"qty":170.0,"unit":"g","name":"zucchero a velo 🧁"},{"qty":100.0,"unit":"g","name":"farina di mandorle o nocciole 🥜"},{"qty":100.0,"unit":"g","name":"acqua o succo d’arancia 🍊"},{"qty":80.0,"unit":"g","name":"olio di semi 🌻"},{"qty":16.0,"unit":"g","name":"lievito per dolci ✨"},{"qty":1.0,"unit":"pizzico","name":"sale 🧂"}],"procedimento":"Passo 1: Grattugia finemente le carote e raccoglile nel mixer.Passo 2: Aggiungi il succo d'arancia e l'olio di semi alle carote e frulla il tutto fino a ottenere una crema omogenea e liscia.Passo 3: In una terrina, rompi le uova e aggiungi lo zucchero a velo.Passo 4: Monta il composto con le fruste elettriche per qualche minuto, finché non diventa chiaro e spumoso.Passo 5: Aggiungi la farina di mandorle e mescola delicatamente, poi profuma il tutto con la scorza grattugiata dell'arancia.Passo 6: Unisci la crema di carote al composto di uova e amalgama bene il tutto con una spatola.Passo 7: Setaccia la farina insieme al lievito e a un pizzico di sale, poi aggiungili all'impasto mescolando delicatamente fino a ottenere un composto liscio e senza grumi.Passo 8: Versa l'impasto negli stampini a cupoletta o nei pirottini per muffin, riempiendoli per circa 3/4.Passo 9: Cuoci in forno statico preriscaldato a 180°C per circa 25 minuti. Fai la prova stecchino per verificare la cottura: se esce pulito, sono pronte.Passo 10: Sforna le camille, lasciale intiepidire e poi trasferiscile su una gratella per farle raffreddare completamente.\n🍽️ Come Servire e Conservare:\nLe camille sono perfette per la colazione o la merenda, magari accompagnate da un bicchiere di latte. Si conservano in un contenitore ermetico a temperatura ambiente per 2-3 giorni, mantenendo la loro morbidezza. 🍽️\n🎨 Consigli & Varianti:\nSe non hai la farina di mandorle, puoi usare della farina di nocciole o frullare le mandorle intere fino a ridurle in polvere fine.\nPer un tocco in più, puoi aggiungere delle gocce di cioccolato all'impasto.\nPuoi decorare le camille con dello zucchero a velo o una glassa leggera all'arancia una volta raffreddate. 🎨\n⏱️ Tempo di Preparazione:\nTempo di preparazione: 20 minuti | Tempo di cottura: 25 minuti | Tempo totale: 45 minuti | Porzioni: 10-12 camille ⏱️\nSpero che questa ricetta ti aiuti a ritrovare il gusto genuino della merenda fatta in casa! Se le prepari, fammi sapere se ti sono piaciute e con chi le hai condivise. Buon appetito! 😋","note":"","tags":[],"_importId":15160},{"nome":"CAMILLE, TORTINE ALLE CAROTE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: 150 gr di farina 00 - 1 uovo - 50 ml di olio evo o di semi di girasole - 50 ml di latte - 50 gr di mandorle spellate - 100 gr di carote - 100 gr di zucchero di canna ( o semolato) - 2 cucchiaini abbondanti di lievito per dolci - buccia di limone bio grattugiata .\nPreparazione : accendere il forno a 190 gradi. Pelare le carote, tagliarle a tocchetti e inserire nel mixer con le mandorle, il latte, l'olio e ridurre tutto in crema. Montare con una frusta elettrica per 2-3 minuti l'uovo con lo zucchero, aggiungere la crema di carote, mescolare, e da ultimo unire la farina setacciata con il lievito. Distribuire il composto in pirottini monoporzione precedentemente imburrati. Cuocere nel forno preriscaldato per circa 15-18 minuti e controllare la cottura con uno stecchino.\nLe tortine possono essere anche congelate  e si scongelato in un paio di ore  oppure si conservano morbide per due o tre giorni.\nSi possono anche preparare con 50 gr di fondente tritato .","note":"","tags":[],"_importId":10395},{"nome":"CANEDERLI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":600.0,"unit":"g","name":"pane grattugiato"},{"qty":500.0,"unit":"g","name":"salumi tritati"},{"qty":150.0,"unit":"g","name":"formaggio grattugiato"},{"qty":1.0,"unit":"L","name":"liquidi per scottare"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":27.0,"unit":"n°","name":"canederli di 80 grammi ciascuno"}],"procedimento":"Cottura 12 minuti (se freschi)\nQuando vengono a galla","note":"","tags":[],"_importId":10311},{"nome":"Canederli MG","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"pane grattugiato"},{"qty":100.0,"unit":"g","name":"formaggio grattugiato"},{"qty":2.0,"unit":"n°","name":"uova"}],"procedimento":"150 gr di speck Campiglio tritato o in mancanza altro salume simile (o anche più tipi)\n2hg formaggio rettangolare di Pinzolo o fontal Pinzolo \nPrezzemolo tritato se piace\nBurro fuso con salvia\n\"Scottare\" il pane grattugiato con il latte o con il brodo ovvero il pane dev'essere appena bagnato non di più \nAggiungere formaggio grattugiato, lo speck tritato, le uova e il prezzemolo (se piace).\nImpastare tutto bene\nFormare delle palle di circa 5/6 cm di diametro (se sono un po' bagnate passarle nel pane grattugiato) \nInserire in ogni palla un cubetto di formaggio rettangolare o fontal e riformare la palla.\nMettere i canederli su vassoi coperti da carta forno e pan grattato (se appiccicassero)\nFar bollire una bella pentola di acqua\nNon salare\nQuando bolle buttare i canederli\nE bollire piano per 10 min circa\nScolare e versarvi sopra burro (fuso con salvia) e formaggio grattugiato \nBuon appetito","note":"","tags":[],"_importId":212},{"nome":"CANTUCCI ALLE MANDORLE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"I miei cantucci alle mandorle: tostare leggermente in forno 200gr di mandorle con la buccia,\nMescolare bene con la frusta 250gr  di zucchero, 2 uova intere e 2 rossi,un pizzico di sale,un cucchiaio di miele, una bustina di vanillina, aggiungere le mandorle tostate che nel frattempo si saranno freddate, Unire 300 gr di farina 0, 10 gr di lievito per dolci e impastare.bene. aiutandosi con un po' di farina si formano dei cilindri di circa tre cm di diametro, sì dispongono sulla placca foderata di carta forno, distanti perché si allargano in cottura. Sbattere le chiare avanzate e spennellare bene ogni cilindro,infornare in forno statico a 180 gradi per una ventina di minuti . A cottura ultimata tagliare subito i biscottini con un coltello a lama liscia e rimettere in forno spento per alcuni minuti .La ricetta è di una pasticceria fiorentina","note":"","tags":[],"_importId":12500},{"nome":"CAPRESE ALL' ARANCIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: 180 gr di farina di mandorle - 40 gr di fecola di patate - 2 arance ( succo e buccia) - 8 gr di lievito per dolci - 50 gr di zucchero a velo - 50 gr di cioccolato bianco -  3 uova -  zucchero a velo q.b.   (volendo unire 30 ml di olio di semi . Io li ho messi )\nTortiera di 22 cm.\n Preparazione:  in ciotola la farina di mandorle, lo zucchero a velo , il lievito e la fecola di patate setacciati .\nGrattugiare le bucce delle arance  poi tagliarle a metà  e spremerle. Filtrare la spremuta e tenerla da parte. Unire alle polveri la scorza di  arance grattugiata . Tritare finemente il cioccolato bianco e unirlo alle poleri e alla scorza di arancia.\nA parte montare le uova e quando  sono gonfie e spumose, unire il succo d'arancia e l'olio, e unirli al composto di polveri e cioccolato bianco, mescolando dal basso verso l'alto.\nVersare tutto in una tortiera imburrata e infarinata, e cuocere in forno preriscaldato a 160 gradi per 40 minuti. Dopo aver  sfornato la torta, farla freddare completamente prima di toglierla dallo stampo, e spolverizzare con zucchero a velo.\nIo ho guarnito le mie tortine con una fettina di arancio.","note":"","tags":[],"_importId":10234},{"nome":"CARCIOFI ALLA GIUDIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"che sono pure un vanto della cucina alla Romana. Per essere sicura di quello che dico, vi ho messo anche la ricetta in vernacolo, in modo da non avere discussioni in \nmerito.\nAcquistare  6 grossi carciofi, togliere  le foglie esterne piu' dure, e spiumateli. In una terrina  lavorare 3 cucchiai di pangrattato, con 2 spicchi di aglio finemente tritato, prezzemolo anch'esso tritato, sale pepe e olio quanto basta per amalgamare bene il composto. Inserire la farcia tra le foglie, e al centro dei carciofi che poggerete dalla parte del gambo, uno accanto all'altro, in un tegame. Diluire con 3 bicchieri di vino ed uno di acqua,  coprire il tegame, e farli cuocere a fuoco moderato per circa un'ora. Terminate poi la cottura a tegame scoperto, in modo che i carciofi possano rosolare ed acquistare colore.\nA Roma questi sono chiamati Carciofi alla Romana ,   ( quelli alla Giudia , i cimaroli,  sono cotti in abbondate olio evo, a testa in giu' , senza ripieno), e al posto del prezzemolo, si usano foglie di mentuccia Romana fresca,  usata proprio per i carciofi.","note":"","tags":[],"_importId":10400},{"nome":"Casseruola di Mele con Ricotta e Yogurt","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"ricotta"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":100.0,"unit":"g","name":"yogurt naturale"}],"procedimento":"Procedimento:\n\n1. Inizia preriscaldando il forno a 180 gradi Celsius e ungendo leggermente una teglia da forno con burro, se desideri.\n\n2. Sbuccia le mele e tagliale a fette, quindi irrorale con succo di limone per mantenerne il colore.\n\n3. In una ciotola capiente, mescola la ricotta con lo yogurt e l'uovo fino a ottenere un composto liscio e omogeneo. Non serve un mixer; un semplice spatola andrà benissimo.\n\n4. Distribuisci le fette di mela sul fondo della teglia preparata, creando uno strato uniforme.\n\n5. Versa il composto di ricotta e yogurt sopra le mele, assicurandoti che sia ben distribuito.\n\n6. Spolvera la superficie con una generosa dose di cannella per un tocco aromatico.\n\n7. Inforna la casseruola nel forno preriscaldato e cuoci per 35-40 minuti, oppure fino a quando risulterà dorata e le mele saranno tenerissime.\n\n8. Quando la casseruola è pronta, lasciala raffreddare leggermente prima di servirla.\n\n9. Questa deliziosa casseruola di mele può essere gustata sia come dessert che come colazione nutriente. Buon Appetito!\n\nNutritional Information:\nCalories per serving: 180\nCarbohydrates: 22 g\nProteins: 7 g\nFats: 7 g\n\nPreparazione: 15 minuti | Cottura: 40 minuti.","note":"","tags":[],"_importId":14891},{"nome":"CASTAGNACCIO?","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Le castagne vengono utilizzate in moltissime preparazioni sia dolci che salate, e con la loro farina si fa il Castagnaccio, di cui ora vi do' la ricetta, presa dal solito libro di Manuela Di Chiara, Marchigiana DOC.\nIngredienti: 400 gr di farina di castagne - 80 gr di zucchero - 4 cucchiai  di olio di oliva  - 50 gr di uva passa - 50 gr di pinoli - un rametto di rosmarino - semi di finocchio - sale.\nForno preriscaldato a 180-200 gradi.\nPreparazione: mettere a mollo l'uvetta in acqua tiepida per circa mezz'ora. Mescolare la farina di castagne con lo zucchero, aggiungere l'olio, una presina di sale, e l'acqua quanto basta per avere una pastella fluida (circa 900 ml).\nOliare una teglia e versarvi il composto fino all'altezza di 2-3 cm. Cospargere con l'uvetta lavata e strizzata, i pinoli, gli aghi di un rametto di rosmarino o i semi di finocchio. Far scendere a filo un paio di cucchiai di olio di oliva, e infornare in forno  preriscaldato a 180-200 gradi, per circa 50 minuti.\nServire il dolce a quadrati o a losanghe, cosparso con un po' di zucchero.","note":"","tags":[],"_importId":9937},{"nome":"CASTAGNE cotte in PENTOLA A PRESSIONE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Chiudere bene la pentola a pressione. Accendere il fuoco a fiamma media. Quindi abbassare la fiamma al minimo quando la pentola a pressione incomincia a fischiare e proseguire la cottura con i seguenti tempi:\ncastagne con buccia esterna e incise: 15 minuti\ncastagne sbucciate con la pellicina: 5 minuti\nArrostisci le castagne, sbucciale e spellale. Taglia il fegatino a pezzetti e rosolali in poco burro. Togli dal fuoco e unisci il panino ammorbidito nel latte e sbriciolato, le castagne tritate, le salsicce spellate, le uova, il vino, sale e pepe. Amalgama il tutto e riempi con il composto il petto del tacchino per 3 quarti. Ripiega la pelle del collo verso la schiena e cucila con refe da cucina. \n3) Sala il tacchino e disponilo in una casseruola con poco olio, una noce di burro e un bicchiere d'acqua; metti il coperchio e cuoci a fuoco basso per un'ora. Togli il coperchio e fai rosolare il tacchino uniformemente bagnandolo con il suo sugo, finché la pelle sarà dorata. Lascia riposare per 5 minuti e servi il tacchino a fette con, se ti piace, castagne lesse caramellate.","note":"","tags":[],"_importId":6180},{"nome":"Cerca di mangiarli ogni giorno","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"mela"},{"qty":150.0,"unit":"g","name":"yogurt naturale"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":100.0,"unit":"g","name":"farina"},{"qty":1.0,"unit":"cucchiaino","name":"lievito per dolci"},{"qty":1,"unit":"n°","name":"pizzico di sale"}],"procedimento":"PREPARAZIONE:\n\n1.\tIn una ciotola, mescola lo yogurt, l’uovo, la mela grattugiata e un pizzico di sale.\n\n2.\tAggiungi la farina, il lievito e la cannella. Amalgama bene fino a ottenere un composto omogeneo.\n\n3.\tScalda una padella con un po’ d’olio. Versa un cucchiaio di impasto nella padella e cuoci a fuoco medio per circa 2-3 minuti per lato, fino a doratura.\n\nBuon appetito! 😊","note":"","tags":[],"_importId":13718},{"nome":"CHALLAH","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"farina forte,"},{"qty":400.0,"unit":"n°","name":"acqua,"},{"qty":50.0,"unit":"n°","name":"olio,"},{"qty":1.0,"unit":"n°","name":"uovo,"},{"qty":3.0,"unit":"cucchiaio","name":"zucchero,"},{"qty":1.0,"unit":"cucchiaino","name":"sale"},{"qty":2.0,"unit":"n°","name":"buste di lievito."}],"procedimento":"Impasti tutto 3 ore a riposare poi dividi in pezzi per le treccio (io le faccio a 4) o piccoli panini. Intrecci 20, minuti a lievitare un pochino, spennelli con rosso d’uovo e acqua e spolveri di sesamo o papavero. 1/2 ora in forno a 180/200 gradi.","note":"","tags":[],"_importId":8096},{"nome":"Cheese cake alla marmellata di lamponi.","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ripieno: 2 confezioni di Philadelphia da 175gr,1 confezione panna 200 ml io uso Oplà,4 uova,60 gr di zucchero,il succo di 1 limone,2 cucchiai di farina,1 bustina di vanillina. \nMarmellata a piacere.\nTrito le fette biscottate le metto in una ciotola con il burro fuso e lo zucchero. \nMescolo bene.\nFodero la tortiera con una carta forno e stendo la base premendo molto in maniera di compattare bene.Va messa in frigo per mezz'ora. \nSbatto gli albumi a neve \nIn una ciotola monto bene i tuorli con lo zucchero poi la panna,la Philadelphia. \nAggiungo la farina,la vanillina,il succo del limone infine gli albumi delicatamente. \nVerso sulla base e inforno a 180° per mezz'ora poi a 140° per 15 minuti. \nQuando è fredda spalmo la marmellata che precedentemente ho fatto sciogliere per poco tempo in un pentolino. \nMetto in frigo.....e poi la mangio .","note":"","tags":[],"_importId":12516},{"nome":"Cheesecake con marmellata di mirtilli d","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Gr 250 ricotta gr 250 Philadelphia gr200 zucchero 1 vanillina 4uova la buccia di un limone grattugiata +un cucchiaio di succo 2 cucchiai di farina: montare i tuorli con lo zucchero molto bene , aggiungere uno alla volta gli altri ingredienti alla fine gli albumi montati a neve . Forno a 180 per 35 minuti. Capovolgere la torta sul piatto da portata immediatamente così si forma il bordo e spalmarci la marmellata di mirtilli . Io aggiungo alla marmellata 2 cucchiai di succo di limone. Non so se è la stessa della signora ma io la faccio da anni e ha sempre molto successo\nElisa Gambetti teglia 24 con questa ricetta\nLa teglia no non serve imburri la teglia la infarini e versi il composto cremoso, l’importante è che tu la capovolgi appena sfornata il bordo ti viene in automatico da solo e metti la marmellata immediatamente\nEcco la ricetta per chi l'ha chiesta: \nEcco come l'ho preparata \n250 grammi di farina 00\n1 uovo intero \n100 grammi di burro morbido \n100 grammi di zucchero \nLa buccia di un limone grattugiato \n1 cucchiaino di lievito per dolci \n500 gr di mascarpone \n500gr di yogurt greco \n3 uova intere \n100 gr di zucchero \n20 gr di fecola di patate  \n1 bustina di vanillina \nLa buccia grattugiata di un limone \nPreparate la frolla avvolgete l'impasto in una pellicola e lasciate riposare in frigo per mezz'ora \nNel frattempo preparate il ripieno \nIn una ciotola capiente mescolare con lo sbattitore zucchero e tuorli, aggiungete limone grattugiato e vanillina mescolando, aggiungete il latte mescolando e il formaggio, mescolate bene con lo sbattitore, aggiungere la fecola senza formare grumi \nMontare a neve ferma gli albumi, aggiungere al composto preparato delicatamente con una spatola dal basso verso l'alto \nStendete la frolla, rivestite con carta forno sotto una teglia a cerniera di 24 centimetri, con l'altra frolla formate intorno alla teglia un bordo \nAggiungete il composto liquido e infornate per circa 50 minuti forno preriscaldato statico a 180 gradi,se si dovesse scurire coprite con carta forno \nQuando è cotta lasciate raffreddare bene, togliete dallo stampo il giorno successivo,il formaggio si deve addensare \nAdagiate su un vassoio e spolverate i bordi con zucchero a velo e un vasetto di marmellata di mirtilli 🫐\nFormaggio = 500g di mascarpone, e 500g di yogurt greco.","note":"","tags":[],"_importId":12381},{"nome":"CHIACCHIERE di Iginio Massari","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"per l’impasto 400 g di farina Manitoba 100 g di farina 00 60 g di zucchero semolato 60 g di burro morbido 175 g di uova intere 50 g di Marsala (se non vi piace utilizzate Rum o grappa ma profumeranno meno l’impasto) 4 g di sale scorza grattugiata di 1 limone naturale\nper la frittura olio di semi di arachide\nzucchero a velo vanigliato q.b.\nProcedimento\nPotete realizzare le Chiacchiere di Carnevale impastandole a mano oppure in planetaria. Per impasti così semplici preferisco impastare a mano ma voi scegliete il metodo che preferite.\nSetacciate le farine, versatele in una ciotola, unite il burro morbido e lo zucchero.\n\nIn una ciotolina unite il sale alle uova e sbattetele leggermente in modo che l’albume si amalgami al tuorlo e perda tensione.\n\nA questo punto aggiungete le uova, la scorza di limone grattugiata finemente e il marsala nella ciotola con le farine. Impastate il tutto e, quando il composto sarà ben amalgamato, versatelo su una spianatoia e lavoratelo per una decina di minuti (deve diventare sodo e liscio).\nCoprite l’impasto con pellicola alimentare e fatelo riposare per 1 ora.\n\nMassari raccomanda di realizzare una sfoglia sottilissima, potete utilizzare il mattarello oppure la macchinetta per tirare la pasta, in questo caso dovrete arrivare all’ultima tacca.\n\nTagliate dei rettangoli e fate due piccoli tagli al centro.\nVersate abbondante olio in una larga padella e portatelo a 175°. Friggete 3 o 4 chiacchiere alla volta, cuocendole pochi secondi per ogni lato. Scolatele e adagiatele su un vassoio foderato di carta assorbente in modo che perdano l’olio in eccesso.\nFate raffreddare le chiacchiere di Carnevale, spolverizzate con zucchero a velo e servite.","note":"","tags":[],"_importId":10233},{"nome":"Ci avviciniamo al periodo dell'anno che preferisco di","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ci avviciniamo al periodo dell'anno che preferisco di più (va bene... uno dei tanti 😄) e voglio proporvi una ricetta al giorno fino alla vigilia di #Natale! \nIo adoro la cannella e il suo profumo nell'aria in questo periodo mi mette proprio d'umore \"natalizio\": ecco la prima ricetta del pane alla cannella (per 8 persone): \n• 450 g di farina -200g=250gr\n• 60 g di zucchero \n• 60 g di burro\n• 10 g di sale\n• 225 ml di latte-100gr=125gr\n• 1 cubetto di lievito di birra = 300gr lievito madre \n• 65 g di zucchero \n• 10 g di cannella \nProcedimento:\nMescolare la farina con il lievito e il latte. Unire il burro fuso, il sale e lo zucchero. Impastare bene per una decina di minuti in modo da attivare la lievitazione, quindi trasferire l’impasto in una ciotola coperta da un canovaccio o dalla pellicola per alimenti. Lasciare riposare per circa un’ora. Nel frattempo, mescolare in una ciotola a parte lo zucchero e la cannella. Concluso il tempo di lievitazione, stendere l’impasto su un foglio di carta forno lasciandolo alto circa un dito e dandogli una forma rettangolare, quindi farcirlo con il mix di zucchero e cannella. Arrotolare il pane con l’aiuto del foglio di carta forno e trasferirlo in uno stampo da plumcake. Se non si va di fretta, lasciar lievitare ancora per 20-30 minuti, altrimenti cuocere subito a 190 °C, in forno statico, per 35 minuti. \n\nEd ecco pronto il vostro rotolo di cannella tutto da gustare! #benedettaparodi","note":"","tags":[],"_importId":15905},{"nome":"Ciabatta di pane: ecco come farlo in casa croccante","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":450.0,"unit":"g","name":"farina","sezione":"Per la fermentazione"},{"qty":450.0,"unit":"ml","name":"acqua","sezione":"Per la fermentazione"},{"qty":10.0,"unit":"g","name":"lievito fresco","sezione":"Per la fermentazione"},{"qty":300.0,"unit":"g","name":"farina","sezione":"Per la fermentazione"},{"qty":120.0,"unit":"ml","name":"acqua","sezione":"Per la fermentazione"},{"qty":15.0,"unit":"g","name":"sale","sezione":"Per la fermentazione"}],"procedimento":"PREPARAZIONE\nSciogliete il lievito nell’acqua. Aggiungete la farina e mescolate. Coprite con un panno e lasciate lievitare.\nAggiungete l’acqua, la farina, il sale e impastate con un cucchiaio di legno. Lavorate l’impasto su una superficie unta.\nBagnate la ciotola con l’olio d’oliva e posate l’impasto. Lasciate lievitare l’impasto 2 volte per almeno due ore ogni volta.\nDividete l’impasto in 3 parti e fate dei buchi con le mani.\nCuocete sul ripiano inferiore del forno a 270° per 5 minuti. Successivamente mettetelo sul ripiano centrale e cuocete a 220° per 10 minuti.\n---------------------------","note":"","tags":[],"_importId":6744},{"nome":"Ciambella al bicchiere con mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"uova"},{"qty":1.0,"unit":"bicchiere","name":"latte"},{"qty":2.0,"unit":"bicchiere","name":"zucchero"},{"qty":3.0,"unit":"bicchiere","name":"farina “00”"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":1.0,"unit":"bicchiere","name":"olio di semi di arachidi"},{"qty":1.0,"unit":"n°","name":"limone biologico"},{"qty":2.0,"unit":"n°","name":"mele golden grandi"}],"procedimento":"Procedimento: in una ciotola capiente montate le uova con lo zucchero e fatele diventare spumose, aggiungete la buccia del limone e l’olio di semi, quindi versate anche il latte e infine aggiungete la farina e una bustina di lievito (tutto setacciato)\nImburrate e infarinate uno stampo a ciambella da 26 cm di diametro e versateci dentro il composto, quindi livellate e disponete le mele tagliate a fette, poi spoverate il dolce con un cucchiaino di zucchero di canna.\nCuocete la vostra ciambella al bicchiere con mele in forno a 180°C per 40 minuti  forno statico, dopodiché sfornate il dolce e spolveratelo con abbondante zucchero a velo.","note":"","tags":[],"_importId":379},{"nome":"Ciambella al limone 🍋🍋🍋","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Mescolare lo zucchero con la buccia grattugiata del limone (la ricetta del Bimby li faceva polverizzare ma non penso ci siano problemi) poi aggiungere farina, uova olio, latte. Dopo aver mescolato tutto, aggiungere il lievito e mescolare nuovamente.\nInfornare a forno statico preriscaldato mezz'ora a 180°.","note":"","tags":[],"_importId":6091},{"nome":"Ciambella alla carote","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Quattro uova,190 g zucchero, 190 g farina più 70 g fecola,370 g carote frullate a crudo ,120 g olio di girasole,una bustina di lievito per i dolci, buccia d'arancia grattugiata, vanillina \nHo sbattuto le uova con lo zucchero schiuma,ho aggiunto l'olio,le carote ,poi farina con lievito , ho infornato per 40 minuti","note":"","tags":[],"_importId":15070},{"nome":"Ciambella alla ricotta","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione\nMezz’ora prima di preparare la ciambella, tirate fuori dal frigorifero la ricotta, versatela in una scodella e lavoratela con una forchetta fino a renderla cremosa. Questo passaggio è molto importante per la perfetta riuscita della ricetta, in cui la ricotta va appunto utilizzata a temperatura ambiente e già lavorata. \nSciogliete il burro in un padellino sul fornello, oppure al microonde, dopodiché fatelo freddare. Nel frattempo pesate la farina, mescolatela al lievito e tenetela da parte in una scodella con un cucchiaio.\nIn una ciotola grande rompete le uova, unite lo zucchero e montate tutto con una frusta elettrica, fino a raddoppiare il volume, ottenendo un composto cremoso e spumoso. Versate a filo il burro fuso freddo, e continuate a frullare con la frusta. Ora unite un cucchiaio di farina e continuate a frullare, quindi aggiungete la ricotta, lavorate il tutto con la fruste fino a far amalgamare bene il composto. \nIniziate ad unire la farina un poco per volta continuando a mescolare, quando il composto inizia ad essere un po’ duro, aggiungete i due cucchiai di latte, mescolate, finite di unire la farina e mescolate ancora fino ad ottenere il classico impasto cremoso da ciambellone. \nUngete e infarinate lo stampo, versate il composto e cuocete a forno preriscaldato a 175 / 180 gradi per 30 / 35 minuti. Ogni forno è diverso, per questo vi consiglio di controllare la vostra ciambella senza allontanarvi troppo, trascorsa la mezz’ora aprite il forno (mai prima altrimenti smonta la lievitazione), e fate la classica prova dello stecchino (quello lungo da spiedino), inseritelo al centro, se esce asciutto è pronta, se esce bagnato occorrono ancora 5 minuti di cottura.\nSfornate, fate freddare, sformate dallo stampo con delicatezza e spolverate con lo zucchero a velo.","note":"","tags":[],"_importId":34},{"nome":"Ciambella dolce al radicchio di Treviso","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":375.0,"unit":"g","name":"farina 0"},{"qty":250.0,"unit":"g","name":"burro morbido"},{"qty":250.0,"unit":"g","name":"zucchero semolato"},{"qty":320.0,"unit":"g","name":"radicchio rosso di treviso pulito"},{"qty":3.0,"unit":"n°","name":"uova medie"},{"qty":1.0,"unit":"cucchiaio","name":"colmo di grappa"},{"qty":0.67,"unit":"ml","name":"latte o panna"},{"qty":2.0,"unit":"g","name":"sale"},{"qty":18.0,"unit":"g","name":"lievito per dolci"}],"procedimento":"Una ciambella speciale da preparare solo quando viene davvero freddo: è in quel momento infatti che il radicchio tardivo di Treviso è al massimo della sua espressione aromatica. L’impasto burroso con note di grappa regala - fuori cottura - un profumo e un gusto unico nel suo genere. Questa è la ciambella dolce al radicchio di Treviso\nProcedimento\n1Prepara lo stampo e il radicchio\nPer prima cosa porta tutti gli ingredienti a temperatura ambiente, in particolare burro, uova e panna/latte. Inizia preparando il radicchio: lavalo, asciugalo molto bene e taglialo a listarelle sottilissime, in modo che poi si distribuisca in maniera uniforme nell’impasto e tienilo da parte. Imburra accuratamente lo stampo da ciambella, avendo cura di arrivare bene in tutti gli incavi, poi spolverizzalo con un velo leggero di farina, scuotendo via l’eccesso.\n2Prepara la massa montata di burro\nNella ciotola della planetaria pesa il burro morbido, lo zucchero semolato, il sale e la scorza grattugiata dell’arancia biologica. Con la spatola gommata lavora il composto a medio alta velocità e monta a lungo fino a ottenere una massa chiara, gonfia e spumosa: dev’essere una vera “spuma bianca”.  A parte rompi e sbatti con una forchetta le uova, sempre a temperatura ambiente, giusto per romperne la struttura. A questo punto inizia a versarle nel burro montato poco alla volta, lavorando sempre ad alta velocità: attendi che ogni aggiunta sia perfettamente inglobata prima di versare la successiva, così il composto non si separa. In questa fase aggiungi anche un po’ di cannella a piacere e continua a montare finché avrai una crema liscia, lucida e omogenea.\n3Incorpora le polveri\nIn un’altra ciotola setaccia la farina insieme al lievito. Ora inizia a incorporarla al composto di burro, zucchero e uova alternandola con la panna (o il latte): qualche cucchiaio di polveri, poi un goccio di parte liquida e via così.  Quando l’impasto è omogeneo, profumalo con un cucchiaio di grappa, mescolando ancora per poco e a bassa velocità.  Solo alla fine aggiungi il radicchio di Treviso preparato in precedenza, incorporandolo a bassa velocità, in modo che rimanga ben distribuito ma senza lavorare troppo l’impasto.\n4Cottura\nTrasferisci il composto nello stampo da ciambella imburrato e infarinato, aiutandoti con una tasca da pasticcere e livellando la superficie con la spatola. Dai qualche colpetto sul piano di lavoro in modo tale da fare uscire le bolle d’aria. Posiziona lo stampo nel ripiano medio–basso del forno preriscaldato a 180 °C e cuoci per circa 50 minuti: verso la fine della cottura fai la prova stecchino al centro della ciambella, che dovrà uscire asciutto o con poche briciole umide. Sforna, lascia assestare qualche minuto nello stampo, poi sforma la ciambella su una gratella e falla raffreddare completamente prima di affettarla. Spolverizza con zucchero a velo.","note":"","tags":[],"_importId":15934},{"nome":"CIAMBELLA INTEGRALE 🩵 RICETTA DA SALVARE  👇  👇  👇","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Montate in una ciotola le 2 uova intere con lo zucchero per 7-8 minuti, sino ad avere un composto soffice, chiaro e spumoso. Unite ora il vasetto di yogurt e l’olio di semi. Io ho utilizzato un vasetto di yogurt bianco, ma potete adoperare dello yogurt alla frutta del gusto che preferite. \nUnite poca per volta la farina integrale setacciata con il lievito per dolci e mescolate per bene. Oliate ed infarinate uno stampo a ciambella di 20 cm di diametro e versateci dentro il composto. \nFate cuocere la Ciambella nel forno caldo per 35-40 minuti, fate sempre la prova stecchino per verificare la cottura anche all’interno. Laciatela raffreddare, sformatela su un piatto e spolverizzatela a piacere con dello zucchero a velo.","note":"","tags":[],"_importId":14275},{"nome":"CIAMBELLA GOLOSA MANDORLE E CAROTE CON IL FRULLATORE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti per stampo a ciambella da 25 cm di diametro: 250 g di farina 00 200 g di zucchero semolato buccia di limone 300 g di carote 100 g di mandorle pelate 120 g di olio di semi 3 uova 1 bustina di lievito per dolci zucchero a velo q.b. per decorare\nProcedimento:\nLaviamo le carote, le sbucciamo, le tagliamo in pezzetti di circa 3 cm.\nMettiamo carote, zucchero, le mandorle e buccia di limone nel frullatore, azioniamo al massimo per 15 secondi.\nRaccogliamo il tutto sul fondo della boccale del frullatore ed aggiungiamo le uova, la farina, l’olio ed il lievito, frulliamo ancora per 20 secondi a velocità media, l’impasto è pronto.\nCon il Bimby mettiamo le carote a pezzetti nel boccale con lo zucchero, le mandorle e la buccia del limone, 10 sec. vel. 10., raccogliamo il tutto sul fondo con la spatola.\nAggiungiamo uova, l’olio, farina e lievito 15 sec. vel. 5.\nVersiamo l’impasto ottenuto in uno stampo a ciambella imburrato ed infarinato all’interno e via in forno statico preriscaldato a 180° per circa 40 minuti.\nUna volta cotta la nostra ciambella golosa mandorle e carote con il frullatore, la facciamo freddare, la copriamo con lo zucchero a velo e ce la gustiamo, una bontà, la troverete eccezionale, parola della vostra Vane.","note":"","tags":[],"_importId":380},{"nome":"CIAMBELLONE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Tra le tante che preparo questa la adoro perche' e' la classica ricetta delle nonne di un tempo che in una semplice ciotola lavoravano con due forchette lavoravano con tanta semplicita' e come per magia sfornavano una grande e soffice ciambella.  \nRicetta\n5 uova piccole\nGr. 280 di zucchero\nMl.90 di olio di oliva\nMl.190 di latte\nGr.420 di farina 00\nUna bustina di lievito \nBuccia di arancia tritata grossolanamente\nGocce di cioccolato fondente.\nProcedimento:\nIn una ciotola lavorare le uova con lo zucchero finche' diventa chiaro e spumoso.\nVersare a filo l'olio e incorporarlo.\nPoi versare il latte.\nAggiungere a cucchiaiate la farina.\nVersare in una tortiera imburrata \ndi cm. 25 di diametro e aggiungere un cucchiaio di zucchero semolato sull'impasto.\nInfornare a 180° per 45 minuti.\nSfornare e lasciare raffreddare.","note":"","tags":[],"_importId":10143},{"nome":"CIAMBELLONE AL BICCHIERE PANNA E CIOCCOLATO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Qui non ci sono dosi esatte, ma basta servirsi di un bicchiere, senza bisogno della bilancia .\nIngredienti per 8 persone:  4 uova - 2 bicchieri di zucchero - mezzo bicchiere di olio di semi di girasole - 1 bicchiere di panna fresca - una bustina di.lievito per dolci da 15 gr - una bustina di vaniglia - 125 gr di gocce di cioccolata - 3 bicchieri di farina 00.\nPreparazione:  in una ciotola capiente montare con la frusta elettrica le uova fino ad ottenere un composto spumoso e chiaro,  poi unire lo zucchero e continuare a montare, poi l'olio di semi, e   infine la panna.  A questo punto  unire, un bicchiere alla volta, la farina , la vaniglia e il lievito,  sempre  mescolando. \nLe gocce di cioccolata è  meglio inserirle a mano con una spatola. \nVersare tutto in uno stampo a ciambella di\n24-26 cm   imburrato e infarinato , e cuocere in forno statico preriscaldato a 190 gradi, per circa 35-40 minuti.\nFreddare completamente prima di toglierlo dallo stampo. In un sacchetto,  si può conservare per 4-5 giorni.\nIl bicchiere puo' essere di qualsiasi grandezza, gli ingredienti  si modificheranno in proporzione.","note":"","tags":[],"_importId":10415},{"nome":"CIAMBELLONE ALLA NUTELLA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"uova medie a temperatura ambiente"},{"qty":180.0,"unit":"g","name":"farina 00"},{"qty":20.0,"unit":"g","name":"cacao amaro"},{"qty":150.0,"unit":"g","name":"zucchero semolato"},{"qty":80.0,"unit":"ml","name":"olio di semi"},{"qty":100.0,"unit":"ml","name":"acqua tiepida"},{"qty":4.0,"unit":"cucchiaio","name":"nutella"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"}],"procedimento":"Procedimento\nSeparare i tuorli dagli albumi, montare gli albumi a neve ben ferma e tenerli da parte.\nA parte montare i tuorli con lo zucchero, e quando saranno soffici, unire la farina, il cacao, il lievito, l’acqua,l’olio e mescolare bene.\nUnire anche i 4 cucchiai di nutella e mescolare ancora con una spatola.\nIncorporare delicatamente gli albumi mescolando il composto dal basso verso l’alto.\nVersare metà impasto nello stampo, mettere sull’impasto qualche cucchiaino di nutella, e ricoprire con il restante impasto.\nFar cuocere il ciambellone in forno statico , preriscaldato a 170° per circa 45 minuti.\nRegolarsi sempre con i propri forni e comunque dopo 30 minuti di cottura fare sempre la prova stecchino per vedere se è cotto l’interno del dolce.\nUna volta che il ciambellone sarà cotto, farlo raffreddare, bene prima di toglierlo dallo stampo.\nIl CIAMBELLONE ALLA NUTELLA il più soffice del mondo è pronto, una morbidezza, ed una golosità indescrivibili, parola della vostra Vale!","note":"","tags":[],"_importId":1128},{"nome":"Ciambellone alle mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"zucchero"},{"qty":5.0,"unit":"n°","name":"uova"},{"qty":200.0,"unit":"g","name":"olio di semi"},{"qty":200.0,"unit":"g","name":"latte"},{"qty":400.0,"unit":"g","name":"farina"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":4.0,"unit":"n°","name":"mele"}],"procedimento":"Ciambellone alle mele\n\n400gr di zucchero\n5 uova\nscorza di un limone \n200gr di olio di semi\n200gr di latte\n400gr di farina \n1 bustina di lievito per dolci\n4 mele\n\nstampo circa 30 cm\n\nStatico 170/175 gradi per 25 minuti \nVentilato 160 gradi per circa 30 minuti","note":"","tags":[],"_importId":7734},{"nome":"Ciambellone con ricotta e mele🍏","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: 3 uova,180 gr zucchero, 80 gr olio di semi di girasole,buccia di 🍋 non trattato,250gr ricotta, 250 gr farina, 1 bustina di lievito per dolci.Sbucciare 2 mele grandi e tagliarle a tocchetti, mettere in una terrina con un  cucchiaio di zucchero e il succo di mezzo limone.\nSbattere bene le uova con lo zucchero, aggiungere l'olio,la buccia di  🍋la ricotta, la farina setacciata con lievito ed aggiungere all'impasto le mele. Mischiare tutto, versare in  uno stampo per ciambellone  (24-26cm) imburrato ed infarinato e spargere sulla superficie un cucchiaio di zucchero. Forno preriscaldato 180 per 40 minuti.Fare sempre la prova stecchino.","note":"","tags":[],"_importId":13312},{"nome":"Ciambellone con succo di Arancia e gocce di cioccolato","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ciambellone con succo di Arancia e gocce di cioccolato ...Ricetta: 5 uova 200 gr di zucchero la buccia di un arancia grattugiata  più il succo 50gr di olio di oliva un bicchiere metà latte metà acqua farina io metto ad occhio piano piano affinché ho un impasto cremoso poi aggiungo le gocce di cioccolato ed infine il lievito vanigliato. Poi inforno a180 ° per circa 40/45 minuti","note":"","tags":[],"_importId":13246},{"nome":"CIAMBELLONE DI MELE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":7.0,"unit":"n°","name":"mele"},{"qty":150.0,"unit":"g","name":". farina"},{"qty":150.0,"unit":"g","name":". burro fuso"},{"qty":150.0,"unit":"g","name":". zucchero semolato"},{"qty":3.0,"unit":"cucchiaio","name":"zucchero di canna"},{"qty":1.0,"unit":"n°","name":"limone"},{"qty":4.0,"unit":"n°","name":"albumi"},{"qty":4.0,"unit":"n°","name":"tuorli"},{"qty":1.0,"unit":"cucchiaino","name":"lievito per dolci"},{"qty":null,"unit":"q.b.","name":"cannella"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":180.0,"unit":"g","name":"adi per 50-60 min"},{"qty":2.0,"unit":"n°","name":"uova grandi o 3 piccole"},{"qty":12.0,"unit":"cucchiaio","name":"colmi di farina 00"}],"procedimento":"10 o 12 cucchiai rasi di zucchero semolato ( se preferite meno dolce aggiungetene solo 10)\n12 cucchiai di olio di semi di arachidi o girasole\n12 cucchiai di latte intero\n1 bustina di lievito per dolci\ncannella q.b. o 1 cucchiaino di aroma vaniglia\n1 pizzico di sale\n2 mele piccole per il ripieno\n1 mela grande a fettine per la superficie","note":"","tags":[],"_importId":2686},{"nome":"Ciambellone marchigiano","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Lavorare 150 gr di burro morbido con 100 gr di zucchero. Aggiungere 2 uova, buccia di limone, 450 gr di farina, una bustina di lievito e un pizzico di sale. Stendere un rettangolo alto 1 cm, farcire con la nutella (o con la marmellata) e chiudere a portafoglio. Spennellare con il latte per far attaccare la granella. 180 gradi 30 minuti.","note":"","tags":[],"_importId":14056},{"nome":"Ciao a tutti. La focaccia crea assuefazione. I miei","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ciao a tutti. La focaccia crea assuefazione. I miei figli ormai vogliono solo questa per merenda per la scuola. Solita ricetta..per ogni teglia 30x40 ho messo 330 gr di farina molino Bogetto blu, 170 ml di acqua, 15 ml di olio, 8 gr di sale, 5 gr di malto in sciroppo e 7 gr di lievito secco (avevo provato con 5 e non era lievitata bene ultimamente). Impastato, staglio, lievitazione su teglia, allargata e cosparsa di farina. Dopo un'ora ho praticato le fossette e ho oliato bene e messo il sale. Dopo mezz'ora ho versato solo acqua nei fori e dopo mezz'ora ho infornato a fuoco un po più alto delle scorse volte.","note":"","tags":[],"_importId":8178},{"nome":"Ciao Vale","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Le lascio comunque un biscotto grande spezzato e schiacciato con qualche striscia di anatra (soft strips of duck)\nSe ti abbaia vuol dire che vuole un salamino essiccato che si trova in bagno dove ci sono i biscotti. il salamino va tagliato a pezzettini prima di darglielo.\nCambia sempre l’acqua.\nAlle 12.30/13.00 cuoccio con un goccio di olio una fettina di manzo con una fettina di carne bianca che può essere o tacchino o lonza (no pollo) in genere aggiungo a fine cottura un po’ di acqua per fare un po’ di sughino dove mettere la carne tagliata per renderla meno asciutta e per poi versarla nella ciotola (oppure si può inzuppare un po’ di pane a pezzettini e metterli nella ciotola) \nSe usi carne congelata io la metto 5 minuti in un contenitore con acqua per scongelarla e poi la cuoccio.\nAlcune fette di carne (vitellone, lonza, tacchino) sono nel cassetto più basso del freezer.\nLa carne va tagliata a pezzettini piccoli.\nAlla sera dopo  le 19.00 le do un omogenizzato di manzo e carote (si trovano sotto la tv in cucina)  e, se vedi che cerca ancora da mangiare dalle anche 30 gr di prosciutto cotto sminuzzato o omogenizzato di prosciutto.\nUltimamente nel boccetto dell’ omogeneizzato di manzo, una volta svuotato, aggiungo acqua fino a metà per raccogliere bene il contenuto e lo scaldo 10 secondi nel microonde e ci metto dentro dei piccoli pezzi di pane.\nLi lascio ammorbidire e poi glieli metto nella ciotola prima di andare a dormire per la notte.\nDi notte lasciale sempre qualcosa\nDei grissini oppure del pane a pezzi o anche un omogenizzato al prosciutto se non lo avesse già mangiato.\nLe piacciono anche i biscotti “TURCO” della Galbusera che ti lascio sulla tavola. Al massimo gliene do tre.\nDomani prendo qualche fetta di carne per 2 o 3 giorni poi userai le fettine in freezer.\nIn frigo ci sono le gocce di cannabis\nNon gliele ho mai date\nSe fosse noiosa di notte prova a darle una goccia prima di dormire. \nLa medicina Rimadyl è un antinfiammatorio.","note":"","tags":[],"_importId":11333},{"nome":"Ciao.ho preparato un mix di farine amidi e fecole naturali","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ciao.ho preparato un mix di farine amidi e fecole naturali , privi di glutine e da me miscelati.ne ho prelevati 150g. E con 150ml Di acqua ho pteparato il poolish ma al posto del LB ho usato il mio neo lievito madre ne ho messo 50 gr. Ma nn so se è sufficiente. Pensavo poi di aggiungerne altro ancora nell’impasto. E sbagliato questo procedimento?\nPolish\n\t\t250 gr Farina 00\n\t\t250 gr Acqua\n\t\t5 gr Lievito di birra=\nLievito madre 60gr\nFarina -40gr ~~> 210gr\nAcqua-20gr ~~>230gr\nPanettone\n160gr licoli 100% = 120 pasta madre + 40 gr acqua","note":"","tags":[],"_importId":8068},{"nome":"Cinzia Guida io faccio così:","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Nel frattempo pelo tre mele le taglio a dadini le passo in padella ( una decina di  minuti) con una noce di burro , 3/4 cucchiai di zucchero un po'di succo e buccia di 🍋 un po'di cannella.\nNon frullo perché mi piace trovare pezzettini lascio raffreddare.\nDivido la frolla in due.\nTiro la frolla in un disco sulla carta forno, la metto in tortiera alzando bene i bordi\nVerso le mele\nFaccio altro disco di frolla poso sopra sigillo bene i bordi \nIntorno a 180° x 35/40 minuti","note":"","tags":[],"_importId":8199},{"nome":"Cioccolata calda","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"ml","name":"latte"},{"qty":5.0,"unit":"cucchiaio","name":"cacao amaro in polvere"},{"qty":5.0,"unit":"cucchiaio","name":"zucchero"},{"qty":2.0,"unit":"cucchiaio","name":"amido di mais"},{"qty":1.0,"unit":"pizzico","name":"cannella in polvere"}],"procedimento":"Preparazione Ricetta Cioccolata calda\n\nSetacciare l’amido di mais e il cacao in un pentolino e aggiungere lo zucchero e un pizzico di cannella. Mescolare con la frusta a mano e a filo incorporare il latte cercando di non far formare i grumi.\n\nPortare sul fuoco a fiamma media e mescolare continuamente fino a quando non si addensa.\n\nFar sobbollire per qualche minuto.\n\nSpegnere e lasciar riposare per 2 minuti.\n\nServire con panna montata, biscottini e una spolverata di cacao o zucchero a velo.\n\nMi raccomando, non dimenticate di setacciare le polveri e cosa più importante, dovete sempre mescolare la vostra cioccolata caldo fino al termine della cottura.\n#cioccolatacalda #inverno #dicembre #natalestaarrivando #ricetta #glutenfree #simangia #cucinaitaliana #ricettegustose #food #instacook #food #incucinaconleistamamme #dolcetto","note":"","tags":[],"_importId":13285},{"nome":"COLOMBA PASQUALE VELOCE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"pida- 100 gr di zucchero semolato -  25 gr di lievito di birra- 1 uovo intero- un rosso d'uovo- 80 gr di burro- 2 gr di sale- 100 gr di scorza di arancio\nGlassa: 75.gr di zucchero semolato- 30.gr di albume- 18 gr di mandorle-  7 gr mandorle amare o aroma di mandorla.\nDecorazione: 50 gr\n di.mandorle- 20 gr di zucchero a velo- 40 gr di zucchero in granella  una ciliegia candita\nPreparazione: iniziare con acqua latte a 36 gradi,  sciogliere il.lievito, aggiungere un uovo e un rosso d'uovo  poi lo zucchero e gli aromi. Aggiungere la farina e impastare. Quando l'impasto si è incordato, aggiungere il burro a temperatura ambiente a pezzetti e continuare ad impastare a lungo. Alla fine unire i canditi, poi rovesciare l'impasto sulla spianatoia fare una palla  e far lievitare fino al raddoppio per una o due ore. Tagliare per la formatura  la pasta in due parti, una una più  grossa dell'altra, e la parte più  piccola in due. Fare pieghe con.la parte più  grossa, poi arrotolare e sistemare il corpo nello stampo, in.modo che testa e coda siano più assottigliste, e con lo stesso sistema , formare le ali dentro lo stampo. ( dose per stampo da 750 gr,  29 × 20 cm). Disporre lo stampo su una teglia foderata di carta forno, e far lievitare nel forno spento con la luce accesa e un.pentolino di acqua bollente . Ci.vogliono una o due ore fino a che la pasta non raggiunga\nil bordo.\nIntanto preparare la glassa: mandorle e zucchero nel frullatore  poi unire l'albume ottenendo una crema densa.  Spalmare sulla colomba lievitata, disporre  mandorle sulla superficie, e zucchero a granella,  e su tutto zucchero a velo. Sistemare la ciliegina come occhio,  facendo un taglietto sulla testa.\nInfornare  a forno statico preriscaldato a 180 gradi e cuocere per 40- 50  minuti circa,  facendo la prova stecchino. Il sapore migliora dopo due giorni, e va chiusa ermeticamente in un sacchetto.","note":"","tags":[],"_importId":8394},{"nome":"Come preparare la pie ai fichi e crema al miele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":"farina 00"},{"qty":200.0,"unit":"g","name":"burro"},{"qty":300.0,"unit":"ml","name":"latte"},{"qty":250.0,"unit":"g","name":"fichi secchi"},{"qty":50.0,"unit":"g","name":"mollica di pane"},{"qty":30.0,"unit":"g","name":"fecola"},{"qty":3.0,"unit":"cucchiaio","name":"miele"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":3.0,"unit":"cucchiaio","name":"zucchero a velo"},{"qty":1.0,"unit":"cucchiaino","name":"cannella"},{"qty":1.0,"unit":"bustina","name":"vanillina"},{"qty":1.0,"unit":"n°","name":"limone"}],"procedimento":"Come preparare la pie ai fichi e crema al miele\n\nSetacciate la farina con la cannella e un pizzico di sale e impastate con il burro morbido a pezzetti e 2 cucchiai di acqua fredda. Stendete la pasta con il matterello, ripiegatela in 3 parti poi stendetela di nuovo. Ripetete questa operazione per 3 o 4 volte, quindi avvolgete la pasta nella pellicola e mettete in frigorifero a riposare per circa 1 ora. Nel frattempo, montate le uova con la fecola, amalgamate il miele e diluite con il latte. Cuocete la crema a fuoco basso e sempre mescolando per circa 5 minuti. Quando la crema si sarà addensata toglietela dal fuoco e lasciatela raffreddare, mescolando ogni tanto. Tagliate i fichi a pezzetti e la scorza di limone a striscioline sottilissime. Tritate nel frullatore la mollica di pane. Mescolate i fichi, il pane e la scorza di limone e amalgamate il composto alla crema. Accendete il forno a 190 °C. Infarinate uno stampo di 25 cm di diametro. Stendete la pasta e ricavate 2 dischi, uno più grande dell’altro. Adagiate il disco più grande nello stampo e pareggiate i bordi. Versate il composto di crema e fichi e richiudete con il secondo disco di pasta, facendo aderire i due strati lungo i bordi. Cuocete nel forno già caldo per circa 45 minuti. Sfornate la pie ai fichi e crema al miele e lasciate riposare 5 minuti poi estraetela dallo stampo e fatela raffreddare sulla gratella. Spolverizzate con lo zucchero a velo prima di servire.\nIngredienti\n350 g Farina 00\n  200 g Burro\n  300 ml Latte\n  250 g Fichi secchi\n  50 g Mollica di pane\n  30 g Fecola\n  3 cucchiai Miele\n  2 Uova\n  3 cucchiai Zucchero a velo\n  1 cucchiaino Cannella\n  1 bustina Vanillina\n  1 Limone\n  q.b. Sale","note":"","tags":[],"_importId":15252},{"nome":"Commenti: 1","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Mentre la mia nipotina dormiva ho preparato lo strudel di mele con pasta matta 🍏🍏 se siete interessati vi posto la ricetta ❤️\nfatto pasta matta con 260gr di farina,60gr di olio evo e 110gr di acqua fredda e mezzo cucchiaino di sale\nLa pasta matta va sempre fatta riposare sotto una pentola calda almeno 20/30 minuti! Rimane più elastica e la si stende più facilmente!\nMariaLudovica Berardi io la faccio addirittura il giorno prima. La metto in frigo e la tolgo un po' prima di usarla. E poi uso la farina Manitoba\nPer il ripieno 1kg di mele 100gr di zucchero di canna, 50gr di uvetta ammollata col rum , 50 gr di pangrattato, 1 limone e un pizzico di sale , 50 gr di pinoli e un cucchiaio abbondante di cannella \nPelato le mele e fatte saltare con lo zucchero, una noce di burro ,il succo del limone e la scorza grattuggiata e la cannella per 5 minuti fino che si asciuga il liquido \nFare raffreddare e mettere l'uvetta,i  pinoli e il pangrattato \nTirare la pasta mettere il composto e arrotolare ,fare qualche taglio sopra, spennellare con zucchero e burro \nInfornare per 45 minuti in forno a 180°","note":"","tags":[],"_importId":12998},{"nome":"Con questa ricetta saporita non mangerai le solite","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":6.0,"unit":"n°","name":"uova"},{"qty":1.0,"unit":"n°","name":"peperone"},{"qty":1.0,"unit":"n°","name":"zucchina"},{"qty":50.0,"unit":"g","name":"prosciutto a cubetti"},{"qty":50.0,"unit":"g","name":"formaggio"},{"qty":null,"unit":"q.b.","name":"parmigiano"},{"qty":null,"unit":"q.b.","name":"sale"}],"procedimento":"1. Rompi le uova nei pirottini\n2. Aggiungi a piacere peperoni, zucchine, prosciutto e formaggio.\n3. Inforna a 190°C per 25 minuti.\n4. I tuoi muffin sono pronti! Gustali con un contorno e avrai una cena super saporita.","note":"","tags":[],"_importId":14538},{"nome":"Con questo impasto PIENO DI BOLLE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"farina nuvola"},{"qty":800.0,"unit":"ml","name":"acqua"},{"qty":7.0,"unit":"g","name":"lievito di birra secco"},{"qty":20.0,"unit":"g","name":"sale"}],"procedimento":"Preparazione:\n1. In una ciotola mescola l'acqua e il lievito.\n2. Poi versa nella farina e inizia a mescolare.\n3. Aggiungi il sale e lascia riposare per 15 minuti.\n4. Poi lavora a mano e inizia i vari giri di pieghe con un'alternanza di 15 minuti.\n5. Infine forma un panetto omogeneo, dividilo in due porzioni e lascia lievitare 2 ore.\n6. Stendi l'impasto nella teglia e fai riposare ancora 30 minuti.\n7. Condisci e inforna a 180° per 15/20 minuti.","note":"","tags":[],"_importId":13970},{"nome":"Condividi su Facebook","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":150.0,"unit":"g","name":"burro"},{"qty":50.0,"unit":"ml","name":"acqua"},{"qty":null,"unit":"q.b.","name":"latte"},{"qty":1.0,"unit":"kg","name":"mele renette","sezione":"Per il ripieno"},{"qty":1.0,"unit":"n°","name":"limone","sezione":"Per il ripieno"},{"qty":1.0,"unit":"pizzico","name":"sale","sezione":"Per il ripieno"},{"qty":1.0,"unit":"cucchiaino","name":"cannella","sezione":"Per il ripieno"},{"qty":100.0,"unit":"g","name":"zucchero","sezione":"Per il ripieno"},{"qty":1.0,"unit":"cucchiaio","name":"farina","sezione":"Per il ripieno"}],"procedimento":"persone 8 Difficoltà Media Tempo di preparazione 30minuti Tempo di cottura 40minuti Costo Medio \nTAPPE DI PREPARAZIONE\nTAPPA 1\nImpasta la farina con il sale e il burro in una ciotola.  Aggiungi l'acqua ben fredda e continua ad impastare.  Forma una palla con l'impasto e avvolgila nella pellicola.  Lascia riposare in frigorifero per almeno 30 minuti.\nTAPPA 2\nPrepara il ripieno tagliando le mele sbucciate a spicchi.  Mescola alle mele, il succo di limone, il sale, la cannella, lo zucchero e la farina.  Stendi poco più di metà della pasta.\nTAPPA 3\nRivesti la base e i bordi di una tortiera da 25 cm imburrata e infarinata.  Versa il ripieno e aggiungi qualche fiocco di burro.  Stendi la pasta rimasta e forma un cerchio.  Adagialo sul ripieno e sigilla i bordi con i rebbi di una forchetta.  Spennella la superficie con del latte e bucherellala con una forchetta.\nTAPPA 4\nInforna a 200° per 20 minuti poi a 180 per altri 20 minuti e a 170° per altri 20 minuti.  Cospargi la superficie con lo zucchero semolato e lascia raffreddare in forno.\nAggiungi una grattugiata di noce moscata al ripieno, sentirai che aroma.  Servi l'Apple Pie accompagnata da panna montata.  Al posto del succo di limone puoi mettere mezzo bicchiere di succo di mela.  Al posto del burro la ricetta americana prevede lo struto, lascio a te la scelta!","note":"","tags":[],"_importId":51},{"nome":"CONFETTURA DI UVA FRAGOLA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"uva fragola"},{"qty":600.0,"unit":"g","name":"zucchero"}],"procedimento":"Lava bene l’uva e versa tutti i chicchi in una casseruola (meglio se antiaderente). Unisci il succo del limone, lo zucchero, e fai cuocere a fuoco medio per mezz’ora, fino a quando non sarà uscito tutto il succo degli acini. Mescola di tanto in tanto.  \n\t\tUna volta terminato, armati di un colino e filtra il succo un po’ alla volta dentro una scodella, in modo da scartare tutti i semi e la buccia dei chicchi. Ora, rimettilo nel tegame e fallo bollire per 10  minuti scarsi a fuoco medio, non di più, anche se ti sembrerà liquida, ricorda che una volta fredda la confettura si rapprenderà! Se la fai cuocere troppo avrà una consistenza dura invece che cremosa. Adesso puoi versarla nel barattolo sterilizzato, io ho usato quello classico da confetture, con il gancio. Se vuoi sapere come sterilizzare i barattoli, leggi QUI  \nNote\nConserva la confettura di uva fragola in un luogo fresco e al buio, una volta aperta tienila in frigorifero.","note":"","tags":[],"_importId":9724},{"nome":"Contemporanea con prefermento👇👇","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":800.0,"unit":"g","name":"farina w320","sezione":"Per il prefermento"},{"qty":400.0,"unit":"g","name":"acqua","sezione":"Per il prefermento"},{"qty":5.0,"unit":"g","name":"lievito fresco","sezione":"Per il prefermento"},{"qty":200.0,"unit":"g","name":"farina w260","sezione":"Per il prefermento"},{"qty":350.0,"unit":"g","name":"acqua","sezione":"Per il prefermento"},{"qty":20.0,"unit":"g","name":"olio","sezione":"Per il prefermento"},{"qty":25.0,"unit":"g","name":"sale","sezione":"Per il prefermento"},{"qty":3.0,"unit":"g","name":"lievito fresco","sezione":"Per il prefermento"}],"procedimento":"Formate palline da circa 270 g e mette a raddoppiare.. \nCottura circa 400 gradi per 120 secondi..","note":"","tags":[],"_importId":16549},{"nome":"COOKING","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"arance non trattate","sezione":"Per la torta"},{"qty":200.0,"unit":"g","name":"zucchero","sezione":"Per la torta"},{"qty":3.0,"unit":"n°","name":"uova","sezione":"Per la torta"},{"qty":150.0,"unit":"g","name":"farina","sezione":"Per la torta"},{"qty":1.0,"unit":"bustina","name":"lievito in polvere","sezione":"Per la torta"},{"qty":1.0,"unit":"pizzico","name":"sale","sezione":"Per la torta"},{"qty":100.0,"unit":"g","name":"burro fuso","sezione":"Per la torta"},{"qty":50.0,"unit":"g","name":"zucchero","sezione":"Per la torta"}],"procedimento":"Istruzioni:\nPreriscaldare il forno: Iniziate preriscaldando il forno a 180°C (punto di riferimento per il gas 6) e imburrando e infarinando una tortiera di 24 cm di diametro.\nPreparazione delle arance: Lavate accuratamente le due arance e fattele bollire intere in una pentola d’acqua per circa 30 minuti. Una volta cotte, scolatele e lasciatele raffreddare.\nFrullare le arance: Tagliate le arance raffreddate in quarti, rimuovete i semi e frullatele fino a ottenere una purea densa.\nPreparazione dell’impasto: In una grande ciotola, sbattete le uova e lo zucchero fino a ottenere un composto spumoso. Aggiungete la purea d’arancia, quindi la farina setacciata, il lievito, il sale e il burro fuso. Mescolate bene fino a ottenere un impasto omogeneo.\nCottura della torta: Versate l’impasto nella tortiera preparata e cuocete in forno per circa 30-35 minuti o fino a quando la torta sarà dorata e uno stuzzicadenti uscirà pulito.\nPreparazione dello sciroppo d’arancia: Nel frattempo, mentre la torta cuoce, preparate lo sciroppo d’arancia. In un pentolino, scaldate il succo delle due arance con lo zucchero, mescolando finché lo zucchero non si è completamente sciolto. Fate sobbollire per alcuni minuti per addensare leggermente.\nFinitura della torta: Una volta cotta, togliete la torta dal forno e bucherellatela in più punti con una forchetta. Versate delicatamente lo sciroppo d’arancia caldo sulla torta, assicurandovi che sia distribuito uniformemente.\nRaffreddamento e servizio: Lasciate raffreddare la torta nella teglia per circa 10 minuti, quindi sformatela su una griglia per farla raffreddare completamente. Una volta raffreddata, la torta può essere spolverata con zucchero a velo o gustata così com’è.\nLa torta fondente all’arancia è una delizia fruttata che conquisterà il vostro palato con il suo sapore unico e avvolgente. Perfetta per ogni occasione, questa torta è un inno all’arancia, che offre una piacevole alternativa ai classici dessert. Preparatela seguendo questa semplice ricetta e preparatevi a vivere un’esperienza gustativa straordinaria. Buon appetito!","note":"","tags":[],"_importId":11538},{"nome":"Cornetti Brioche soffici alla crema Pan di Stelle e","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":550.0,"unit":"g","name":"farina 00"},{"qty":50.0,"unit":"ml","name":"olio di girasole"},{"qty":200.0,"unit":"ml","name":"latte tiepido"},{"qty":15.0,"unit":"g","name":"lievito di birra"},{"qty":0.5,"unit":"cucchiaino","name":"sale"},{"qty":25.0,"unit":"g","name":"sale"},{"qty":1.0,"unit":"n°","name":"uovo intero"},{"qty":1.0,"unit":"n°","name":"albume"},{"qty":50.0,"unit":"g","name":"burro"}],"procedimento":"Cacao ( quantità a piacere da mescolare ) se volete poi dividere la pasta e farla bicolore\nImpastare tutto assieme lasciare lievitare x 90 minuti . Stendere suddividere in 2 panetti  tondi grandi spalmare il burro fuso sovrapponete i dischi , dare forma ai tagli , usate a vostro piacere , nutella o confetture ecc.. arrotolate fate riposare x 25 minuti coperti . Sbattere rosso d’uovo e latte  cuocere a forno ventilato a 180 x x 15 minuti\n50ml olio di girasole ( o mais)\n200 ml latte tiepido\n 15 gr lievito di birra\n1/2 cucchiaino di sale \n25gr di sale\n1 uovo intero \n1 albume\n50gr di burro \nCacao ( quantità a piacere da mescolare ) se volete poi dividere la pasta e farla bicolore\nImpastare tutto assieme lasciare lievitare x 90 minuti . Stendere suddividere in 2 panetti  tondi grandi spalmare il burro fuso sovrapponete i dischi , dare forma ai tagli , usate a vostro piacere , nutella o confetture ecc.. arrotolate fate riposare x 25 minuti coperti . Sbattere rosso d’uovo e latte  cuocere a forno ventilato a 180 x x 15 minuti","note":"","tags":[],"_importId":7787},{"nome":"Cornetti briosh","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"In una ciotola mescolare le farine, il lievito secco, 2 cucchiaini di zucchero di canna e un pizzico di sale.\nIn una seconda ciotola unire acqua tiepida, uovo, zucchero di canna (50 gr), burro fuso (80 gr) miele e mescolare con un cucchiaio. Aggiungere pian piano le farine e impastare fino ad ottenere un panetto. Metterlo a lievitare per 3 ore.\nRiprendere l'impasto, lavorarlo delicatamente per sgonfiarlo e formare un filoncino da cui ricaverete otto palline.\nStendere ogni pallina in un disco sottile di circa 2 mm, su un piano spolverato di farina. Poggiare il primo disco su carta da forno, spennellare con burro fuso e cospargere di zucchero di canna. Appoggiarvi sopra il secondo disco, spennellarlo con burro e zucchero di canna e così via fino all'ultimo disco che non sarà spennellato.\nUna volta impilati tutti i dischi appiattire con il mattarello fino ad un'altezza di mezzo centimetro. Dividere in 16 spicchi e arrotolare. Far lievitare altri 30 minuti e poi cuocere a 180 gradi per 25 minuti in forno statico preriscaldato. Appena cotti, spennellarli con miele caldo. Possono anche essere farciti, io ho preferito lasciarli vuoti.","note":"","tags":[],"_importId":7026},{"nome":"CORNETTI DA BAR","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: farina Manitoba 250 gr - farina 0 250 gr - burro 50  gr -  latte 150 gr - zucchero 170 gr - 2 uova  intere - 9 gr di lievito secco.\nFarcia: crema di nocciole  o marmellata.\nFiniture: rosso D'uovo per spennellare  e zucchero a velo.\nPreparazione: nella ciotola della planetaria sciogliere il lievito in un po'  di latte tiepido  a 30-35  gradi, mescolare la farina, poi unire il burro a temperatura ambiente fatto a pezzetti, poi le uova, e.impastare, poi unire l'altro latte sempre a temperatura di 30-35 gradi,  e continuare ad impastare per 5 minuti. Raschiare bene la farina ai bordi della impastatrice e aumentare la velocita' lavorando per altri 7-8 minuti. ( in tutto si è  lavorato per  15-17 minuti). L'impasto terminato dovrà  essere liscio ed elastico.\nPortare sulla spianatoia, fare una palla e dividere in due. (Come al solito ho lavorato solo su metà  dose di impasto). \nMettere in due contenitori separati e far lievitare il composto per due ore  a 25 gradi (forno spento con luce accesa).\nDopo la lievitazione prendere un impasto alla volta dei due contenitori,  e col mattarello  fare  un cerchio di 30 cm di diametro. Dividerlo in 8 parti ( vedi foto) e su ogni triangolo mettere alla base un cucchiaino di ripieno ( io naturalmente per i nipoti ho scelto la crema di nocciole). Bagnare leggermente con acqua la punta dei triangoli, e arrotolarli  partendo dalla parte larga. Dare poi una forma leggermente arrotondata e disporli su una teglia foderata di carta forno. Coprire con pellicola,  e farli lievitare ancora per 3-4 ore fino al raddoppio, lontano da spifferi. Accendere il forno a 180 gradi. Prima di cuocerli spennellarli con un rosso d'uovo unito ad un goccio di latte e cuocerli nel forno statico preriscaldato, per circa 15 minuti.\nFreddare su una gratella e poi cospargerli di zucchero a velo.","note":"","tags":[],"_importId":9241},{"nome":"Cose da portare alla Pantana","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Cose da portare alla Pantana\nAntizanzare\nStuoia \nFrullatore con i suoi pezzi\nMattarello\nAsse legno\nCucchiaio e cicchiaino\nContenitori vetro\nDomopac\nElastici\nBicchieri plastica \nAcqua naturale \nBilancia\nLimoni\n\nFarina 00\nFarina 0\nFarina Manitoba \nFarina semola \nCrema marroni 2","note":"","tags":[],"_importId":8747},{"nome":"Cotolette di o cotolette di","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Non sono fritte e sono vegetariane! E allora che dite, cotolette di zucca sí o cotolette di zucca no? 😁\nLista della spesa 👩🏼‍🍳\n- 250 g di zucca \n- 500 g di ricotta \n- 1 uovo \n- 50 g di parmigiano grattugiato \n- 100 g di pangrattato (il mio è di mais ma va bene anche quello classico) \n- Sale \n- Olio \n- Uova (facoltativo) \n- Pangrattato \nProcedimento 👩🏼‍🍳\n- Tagliate la zucca a fette e cuocetela in forno a 180° con un filo per 25/30 minuti. \n- Una volta pronta fatela raffreddare e poi schiacciatela (tamponandola con della carta assorbente se dovesse rilasciare troppa acqua). \n- Aggiungete la ricotta, l’uovo, il pangrattato di mais (o classico), il parmigiano, e il sale e mescolate per far amalgamare bene gli ingredienti. \n- Con l’aiuto di un coppapasta, oppure dandogli la forma con le mani, preparate le cotolette. Pressatele bene, poi passatele nell’uovo sbattuto e nel pangrattato e cuocetele con un filo d’olio in friggitrice ad aria oppure in forno per 20/25 minuti. \n\nE ta taaaaan! Allora, sí o no? 😁\n.\n.\n.\n#ricetta #ricotta #zucca #vegetariano #verdura #mangiaresano #mangiarebene   Altra versione \nCOTOLETTA DI ZUCCA\r\nIngredienti per 6 cotolette tonde\r\n400 g zucca cruda\r\n130 g ricotta\r\n40 g parmigiano\r\n20 g pangrattato + pangrattato per rivestire\r\nCurcuma\r\nSale e pepe\r\n\r\nCuoci la zucca in forno a 180 gradi (statico) per circa 40 minuti oppure a vapore per una ventina di minuti. Schiaccia la zucca con una forchetta poi aggiungi ricotta, curcuma, parmigiano, pangrattato, sale e pepe. Mescola bene fino ad amalgamare tutti gli ingredienti. Forma ora dei mini burger (spessore poco meno di 1 cm) e passali nel pangrattato. Cuoci in padella leggermente oliata per 2-3 minuti a lato oppure in friggitrice ad aria per 10 minuti a 180 gradi.\r\n•\n•\n#zucca #cotoletta #cucina #ricette #pumpkin","note":"","tags":[],"_importId":13039},{"nome":"Cotolette di pollo e zucca","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"pollo"},{"qty":320.0,"unit":"g","name":"zucca"},{"qty":50.0,"unit":"g","name":"grana o parmigiano"},{"qty":1.0,"unit":"n°","name":"scalogno"},{"qty":1.0,"unit":"n°","name":"aglio"}],"procedimento":"Togliere la buccia dalla zucca e tagliarla a pezzetti poi metterla in un mixer assieme al pollo, lo scalogno, l’aglio senza l’animella, sale, pepe, qualche foglia di basilico o prezzemolo. \nFrullare tutto assieme ottenendo un composto con una consistenza piuttosto morbida .\nBagnare una teglia con olio extravergine d’oliva, e spolverizzare sopra una manciata di pangrattato e formaggio grattugiato . Mettere un paio di cucchiai per ciascuna cotoletta, da allargare con un cucchiaio bagnato dando la forma rotonda e allungata delle cotolette. Spennellare con olio, Spolverare con una manciata di pangrattato e formaggio grattugiato e infornare in forno o friggitrice ad aria, la cottura è di circa 20-25 minuti a 180 °C, girandole a metà cottura.\n#cotolette #cotolettezucca #cotolettedipollo #cottialforno #ricetteconlazucca #buonissimo #rossellainpadella #rossellainpadellaricette #giallozafferano","note":"","tags":[],"_importId":13303},{"nome":"CREKER AI CEREALI","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Arianna Pinto , grazie! 😊 Son gustosi, ma sono una rottura da fare, perché l’impasto non e’ cosí facile da lavorare.\nEccola:\n100 gr farina d’orzo e legumi\n50 gr farina di farro\n50 gr farina di cereali misti\n50 gr farina 00\n120 gr acqua\n6 gr sale\n35 gr olio evo\nacqua e olio per spennellare \nImpastare. Far riposare per circa 1 h avvolto da pellicola.\nFare le forme, spennellare con acqua e olio e bucherellare con i rebbi di una forchetta.\nCuocere a  200 gradi per 10 minuti circa, capovolgere e cuocere per altri 5 minuti.","note":"","tags":[],"_importId":7752},{"nome":"Crema al cioccolato senza uova","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"500 ml di latte intero o parzialmente scremato (sostituibile con bevanda vegetale per intolleranti al lattosio)\n40 g di amido di mais\n100 g di zucchero semolato\n1 cucchiaio raso di cacao amaro\nAroma preferito: vaniglia in bacca, aroma vaniglia, cannella\n1 noce di burro ( opzionale) ma serve per renderla più lucida\n150 g- 200 g di cioccolato fondente","note":"","tags":[],"_importId":13662},{"nome":"Crema alle mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"latte"},{"qty":3.0,"unit":"n°","name":"mele"},{"qty":50.0,"unit":"g","name":"miele"},{"qty":35.0,"unit":"g","name":"amido di mais"},{"qty":1.0,"unit":"bustina","name":"vaniglia"}],"procedimento":"Per preparare la crema alle mele, sbucciate le mele, privatele del torsolo e tagliatele a tocchetti. In una padella scaldate il latte con le mele, fino a sfiorare il bollore. Abbassate la fiamma o allontanate la pentola dal fuoco e frullate il tutto con il mixer a immersione in modo da ottenere una consistenza liscia e omogenea, (io ho preferito lasciarla con qualche pezzettino di mela). Quindi unite l’amido di mais sciolto in un goccio di latte, la vaniglia o vanillina e il miele.\nRimettete tutto sul fuoco e fate addensare sempre mescolando in modo che la crema non si attacchi. A cottura ultimata versate il composto in una coppa e coprite con pellicola per alimenti, fino a completo raffreddamento. Otterrete così una crema pasticcera alle mele senza zuccheri artificiali, perfetta anche per i più piccoli. La vostra crema pasticcera alle mele e pronta per farcire i vostri dolci o gustarla semplicemente così. BUON APPETITO!!!","note":"","tags":[],"_importId":13472},{"nome":"CREMA ALL’ARANCIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Come si prepara la crema all'arancia\nPrendete un'arancia, spremetene il succo e grattugiatene la buccia.\n\nIn un recipiente versate i tuorli delle uova e lo zucchero. Mescolate forte e aggiungete pian piano la farina setacciata.\n\nUnite il latte e continuate ad amalgamare fin quando non avrete ottenuto un composto omogeneo.\n\nA questo punto, fate cuocere la crema a fuoco basso, continuando a mescolare e senza portare a ebollizione.\n\nAggiungete il succo e la buccia d'arancia e fate rapprendere il vostro composto.\n\nLa crema all'arancia è pronta per farcire le vostre torte. In attesa che la utilizziate, conservatela in un recipiente ricoperto con pellicola trasparente.","note":"","tags":[],"_importId":4179},{"nome":"Crema di castagne veloce","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":10.0,"unit":"cucchiaio","name":"farina di castagne"},{"qty":4.0,"unit":"n°","name":"tazze di latte di riso"},{"qty":0.5,"unit":"n°","name":"stecca di vaniglia"},{"qty":2.0,"unit":"n°","name":"mele cotte"}],"procedimento":"Stemperare 10 cucchiai di farina di castagne in 4 tazze di latte di riso con un pizzico di sale e mezza stecca di vaniglia; fare cuocere a fuoco basso mescolando spesso per 10-15 minuti.\nTogliere dal fuoco e mescolare con una composta di 2 mele cotte e un pizzico di sale. È possibile sostituire due o tre cucchiai di castagne con altrettanti di cacao amaro.","note":"","tags":[],"_importId":2784},{"nome":"CREMA GANACHE AL CIOCCOLATO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"panna"},{"qty":1.0,"unit":"n°","name":"burro"},{"qty":1.0,"unit":"cucchiaino","name":"miele"},{"qty":200.0,"unit":"g","name":"cioccolato fondente"}],"procedimento":"CREMA GANACHE AL CIOCCOLATO \nIngredienti \n200gr panna\n1 noce di burro \n1 cucchiaino di miele \n200gr cioccolato fondente","note":"","tags":[],"_importId":9938},{"nome":"Crepes","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"farina"},{"qty":200.0,"unit":"g","name":"latte"},{"qty":1.0,"unit":"n°","name":"uovo"}],"procedimento":"Crepes\n\n100 gr farina\n200 gr latte\n1 uovo","note":"","tags":[],"_importId":12084},{"nome":"Crepes ricetta base","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"uova medie"},{"qty":350.0,"unit":"ml","name":"latte"},{"qty":150.0,"unit":"ml","name":"acqua frizzante"},{"qty":210.0,"unit":"g","name":"circa di farina 00 o 0"},{"qty":1,"unit":"n°","name":"pizzico di sale"}],"procedimento":"PREPARAZIONE:\nPer le Crepes ricetta base, iniziare a preparare la pastella. In una ciotola sbattere le uova e un pizzico di sale, con una frusta. Mescolare il latte con l’acqua frizzante e setacciare la farina. Ora aggiungere alle uova sbattute, il latte e l’acqua frizzante, mescolare e alternare con la farina, sempre girando con la frusta per non formare grumi.\n\nIn caso che si siano formati dei grumi, potete passare la pastella al setaccio, oppure frullare con un mixer a immersione.\n  Coprire la ciotola con la pellicola e far riposare per almeno mezz’ora. Dopodiché scaldare una padella antiaderente (esistono anche quelle basse per crepes, la mia è di 25 cm), a fuoco medio alto. Togliere la padella dal fuoco, unire due gocce di olio e muovere la padella, in modo che l’olio si distribuisca bene. Mescolare la pastella e prenderne un mestolo, versare nella padella e con movimenti rotatori, farla distribuire bene.\nCuocere da un lato per circa un minuto o finché inizierà a staccarsi dalle pareti. Girare dall’altra parte , con l’aiuto di una paletta o semplicemente con le mani. Lasciare un’altro minuto circa, e poi mettere la crepes su un piatto. Continuare così, fino a finire tutta la pastella.\n  Ora le Crepes ricetta base sono pronte e le potete usare nel modo che preferite 😀. Se non le usate subito, copritele con pellicola a contatto, in modo che rimangano morbide. Si possono anche conservare in frigo per qualche giorno, oppure congelare separate da fogli di pellicola… ma sicuramente meglio prepararle e consumarle. 😉","note":"","tags":[],"_importId":356},{"nome":"Crostata al cioccolato con crema ricotta/cioccolato","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione\n  Per preparare la crostata al cacao con crema alla ricotta e cioccolato incominciate dalla pasta frolla al cacao; setacciate la farina (1), il cacao amaro in polvere (2) e lo zucchero a velo, poi versate le polveri in un mixer insieme al burro freddo da frigorifero tagliato a tocchetti (3). Frullate tutto fino ad ottenere un composto sabbioso e farinoso,\n  poi aggiungete i tuorli (4) e continuate a frullare. Trasferite l’impasto (che risulterà ancora farinoso e non amalgamato) su di una spianatoia (5) ed impastate energicamente con le mani fino ad ottenere un impasto
