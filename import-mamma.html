iatela riposare in frigorifero per un’ora circa. Per stendere la pasta più facilmente mettetela tra due fogli di carta forno e appiattitela con il mattarello, girandola più volte fino ad arrivare a uno spessore di 3/4 millimetri.\nPer la torta \nPer cuocere la pasta brisée foderate lo stampo che volete utilizzare, precedentemente imburrato, con la pasta, bucandola con l’aiuto di una forchetta. Copritela con carta forno e cospargetela con dei legumi secchi su tutta la superficie per evitare che si gonfi in cottura. Cuocetela in forno ventilato a 170° gradi per 10 min. Togliete legumi e carta forno e lasciatela da parte.\nNel frattempo cuocete le patate, già lavate accuratamente, in una teglia con abbondante sale grosso in forno a 180° gradi per 50 minuti. Utilizzate questo metodo di cottura per far asciugare bene le patate ricche di acqua. Schiacciate le patate con l’aiuto di uno schiaccia patate e lasciatele da parte.\nCuocete la verza tagliata a julienne in una capiente casseruola con olio extravergine d’oliva e uno spicchio d’aglio. Lasciate stufare per circa 30 minuti girando spesso dopodiché aggiungete la salsiccia luganega, senza pelle, tagliata a pezzi non troppo grandi e ultimare la cottura per altri 15 minuti.\n\nRaffreddare. In una grossa ciotola unire la verza cotta con la salsiccia, le patate schiacciate, le uova, il parmigiano, sale e pepe.\nDisporre sulla base di pasta brisée precedentemente cotta, cospargere di pan grattato e parmigiano. Cuocere in forno a 180° gradi per 20 minuti. Servire.","note":"","tags":[],"_importId":8500},{"nome":"La tua nuova ricetta preferita con il broccolo. E","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La tua nuova ricetta preferita con il broccolo. E anche il tuo salvacena ne sono certo. Morbidi, saporiti e golosi, nient’altro da aggiungere. Solo da farli il prima possibileee. E con questi tra l’altro fai un carico di nutrienti che fanno gran bene 🥦\nx 3 persone: \n• 2 broccoli\n• 250 g di farina o fecola \n• Sale, pepe\n• 2 cucchiai di olio extra vergine \n• 1 bicchiere d’acqua \n• 1 spicchio di aglio\n• 4 - 5 cucchiai di olio extravergine\n• 1/2 peperoncino \n• Prezzemolo \nMi raccomando il condimento fatelo andare a fiamma bassissima perché l’aglio è il peperoncino devo dolcemente profumare l’olio.\nDa un’idea della meravigliosa @eatsgiulia","note":"","tags":[],"_importId":16277},{"nome":"La vera ricetta del Brasato al Barolo","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Il brasato al Barolo è un piatto tradizionale della cucina piemontese, che combina la delicatezza della carne con la potenza e l'aroma del vino Barolo.\nLa ricetta che segue è per 4 persone: \nIngredienti:\n\n1 kg Cappello del prete *(vedi i dettagli sul taglio di carne)\n750 ml Barolo\n160 g carote\n100 g sedano\n180 g cipolle dorate\n1 spicchio d’aglio\n1 rametto di rosmarino\n2 foglie d’alloro\n3 chiodi di garofano\nBacche di ginepro\n4 grani di pepe nero\n1 stecca di cannella\n50 g olio extravergine d’oliva\n15 g burro\nSale fino \n\n*Per preparare un buon brasato, è fondamentale scegliere un taglio di carne proveniente dal muscolo della spalla o della coscia, poiché questi tagli contengono la giusta quantità di grasso e nervature, essenziali per mantenere la carne morbida e succulenta durante la cottura. I tagli più utilizzati per il brasato sono solitamente la noce, il pesce o il cappellodel prete.\nScegliere il Barolo giusto per il Brasato.\nEcco il procedimento per il Brasato al Barolo, dettagliato e suddiviso per punti:\nPrepara gli aromi: crea un sacchettino con chiodi di garofano, pepe, bacche di ginepro e cannella. Lega il rosmarino e l’alloro con spago da cucina.\nPrepara gli ingredienti: taglia a pezzi sedano, carota, cipolla e lascia l’aglio intero.\nMarinatura: in una ciotola, aggiungi carne, verdure e aromi, poi copri col vino Barolo (è importante coprire bene tutto il taglio di carne, quindi potrebbe non bastare una bottiglia di vino, cosa fare con il resto? 4 calici è la risposta). Sigilla e lascia marinare per almeno 12 ore.\nRosola la carne: asciuga la carne, scalda olio e burro in padella e rosola su tutti i lati.\nCottura: sposta carne e verdure in una pentola grande. Aggiungi metà del liquido di marinatura, copri e cuoci a fuoco basso per almeno 2 ore (controlla con una forchetta che la carne sia morbida), girando a metà cottura.\nPrepara la salsa: rimuovi gli aromi, frulla le verdure e il fondo di cottura per creare una salsa densa.\nServizio: affetta la carne e servi p la salsa preparata. \nQual è il contorno migliore per il Brasato al Barolo? Il grande classico che vi consigliamo è una purea di patate.\nScegliere un buon Barolo per il brasato è fondamentale perché la qualità del vino influisce direttamente sul gusto e sulla complessità del piatto. Il Barolo, con la sua struttura tannica, aromi intensi e acidità equilibrata, riesce a conferire alla carne una profondità di sapore unica durante la lunga cottura. Un vino di alta qualità esalta la dolcezza delle verdure, ammorbidisce la carne e arricchisce la salsa con note aromatiche distintive, rendendo il brasato un’esperienza gastronomica indimenticabile.\nScegliere il Barolo giusto per il Brasato.\nIl brasato al Barolo è un piatto che si presta perfettamente per essere gustato durante le serate fredde, accompagnato da una fetta di pane per poter assaporare la deliziosa salsa di vino e verdure. \nNota: La cottura potrebbe variare in base alla qualità e alla taglia del pezzo di carne, si consiglia di controllare la cottura della carne con una forchetta","note":"","tags":[],"_importId":13143},{"nome":"La crostata di mele alsaziana al cacao è una torta molto","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"mele"},{"qty":1.0,"unit":"cucchiaio","name":"marmellata di albicocche"},{"qty":2.0,"unit":"n°","name":"biscotti secchi"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":35.0,"unit":"g","name":"zucchero"},{"qty":100.0,"unit":"ml","name":"panna"},{"qty":1.0,"unit":"cucchiaio","name":"rum"}],"procedimento":"Preparate la pasta frolla e tenetela in frigo per una mezz’oretta, avvolta nella pellicola. Toglietela dal frigo e usatela per foderare una teglia da 24 cm (possibilmente con cerniera) imburrata e infarinata o rivestita di carta forno bagnata. Bucherellate il fondo con i rebbi di una forchetta e spalmateci la marmellata di albicocche. Disponete a raggiera le mele sbucciate e tagliate a spicchi non troppo sottili. Sbiciolate grossolanamente i biscotti e aggiungete anche quelli. Infornate a 180° per crica 25 minuti. Nel frattempo lavorate con una frusta l’uovo e lo zucchero, poi aggiungete la panna e il liquore e mescolate bene. Tirate fuori la torta dal forno, aggiungete piano piano la crema e infornate di nuovo per altri 30 minuti. Sfornate e fate raffreddare la vostra crostata di mele alsaziana al cacao prima di sformarla e servirla, decorandola, se volete, con dello zucchero a velo.","note":"","tags":[],"_importId":414},{"nome":"Le meringhe erano il dolce che non mancava mai in casa","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":6.0,"unit":"n°","name":"chiare"},{"qty":300.0,"unit":"g","name":"zucchero extra fino"},{"qty":1,"unit":"n°","name":"pizzico di sale"}],"procedimento":"Procedimento\nCon un tovagliolo imbevuto di aceto pulire bene la capiente ciotola in cui si monteranno gli albumi. Montare le chiare a neve ferma con un pizzico di sale, unire un cucchiaio alla volta di zucchero continuando a montare. Quando lo zucchero è finito, continuare a montare per altri sette minuti alla massima velocità delle fruste o della planetaria.\nCon un cucchiaio da minestra fare dei mucchi grossi all’incirca come palle da tennis e disporli, ben separati, su teglie rivestire con carta da forno.\nScaldare il forno ventilato a 140°.\nInfornare anche su due teglie contemporaneamente e cuocere per 45 minuti se si vuole il cuore soffice, se si preferisce il cuore duro, cuocere per un’ora.\nSpengere il forno, aprirlo e lasciarvi le meringhe fino a quando si saranno ben raffreddate.","note":"","tags":[],"_importId":14154},{"nome":"Le mie NOCI DOLCI con un ripieno \"strabuono\" 😋😋😋🍁🍂","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina 00","sezione":"Per la pasta"},{"qty":2.0,"unit":"n°","name":"uova","sezione":"Per la pasta"},{"qty":125.0,"unit":"g","name":"burro fuso","sezione":"Per la pasta"},{"qty":125.0,"unit":"g","name":"zucchero","sezione":"Per la pasta"},{"qty":3.0,"unit":"g","name":"cacao","sezione":"Per la pasta"},{"qty":4.0,"unit":"g","name":"lievito per dolci","sezione":"Per la pasta"},{"qty":0.5,"unit":"n°","name":"bustina di vanillina","sezione":"Per la pasta"},{"qty":150.0,"unit":"g","name":"biscotti tritati","sezione":"Per la crema"},{"qty":150.0,"unit":"g","name":"nocciole tritate","sezione":"Per la crema"},{"qty":30.0,"unit":"g","name":"zucchero a velo","sezione":"Per la crema"},{"qty":7.0,"unit":"g","name":"cacao amaro","sezione":"Per la crema"},{"qty":60.0,"unit":"g","name":"martini o altro liquore a piacere","sezione":"Per la crema"},{"qty":80.0,"unit":"g","name":"caffè","sezione":"Per la crema"},{"qty":100.0,"unit":"g","name":"nutella","sezione":"Per la crema"}],"procedimento":"Procedimento\n\nPer prima cosa fondere il burro.\nIn una ciotola setacciare la farina insieme al cacao , al lievito e alla vanillina.\nIn un’altra ciotola montare con le fruste elettriche le uova con lo zucchero fino ad ottenere un composto gonfio e spumoso.\nAggiungere il burro fuso a filo e continuare a montare. Unire a cucchiaiate la farina setacciata e mescolare bene in modo che non si formino grumi. Fare riposare per dieci minuti a temperatura ambiente.\nSpennellare la piastra con un po’ di olio e accenderla. Quando arriva temperatura, prelevare dei pezzettini di impasto del peso di 5 grammi ciascuno, aiutandosi con un cucchiaino o con le mani, tanto l’impasto non è appiccicoso.\nPosizionare ogni pezzettino all’interno di ogni incavo e cuocere per due – tre minuti circa, controllare la cottura, non devono scurirsi troppo.\nAiutandosi con uno stuzzicadenti, togliere delicatamente i gusci dalla piastra, trasferirli in un vassoio e fare raffreddare. Continuare fino ad esaurimento dell’impasto. Non preoccupatevi se l’impasto fuoriesce dal bordo, quando i gusci saranno freddi, basta rifilare i bordi con delle forbici, raccogliendo i resti in una ciotola, serviranno per il ripieno.\nOra procedere a preparare la crema: tritare i resti dei gusci insieme alle nocciole ( se i resti dei gusci non bastassero a raggiungere il peso, unire biscotti secchi ). Mettere in una ciotola ed unire tutti gli altri ingredienti e mescolare bene.\nFarcire ogni mezzo guscio con la crema ottenuta, accoppiarli in modo da ottenere una noce intera.\nSistemare le noci dolci ripiene in un vassoio e servire.","note":"","tags":[],"_importId":9976},{"nome":"Le patate a spirale sono un'idea sfiziosa e davvero","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Le patate a spirale sono un'idea sfiziosa e davvero originale! I bambini le adoreranno e la loro forma stupirà senza dubbio i vostri invitati! GLI INGREDIENTI 5 patate medie 20g di parmigiano 20g di fecola di patate 1 uovo sale pepe LA PREPARAZIONE Amalgamate le patate con l'uovo, la fecola, il parmigiano e gli aromi. Trasferite il composto all'interno di un sac à poche e con molta attenzione, versate il composto nell'olio caldo (180°) formando pian piano una spirale. Fate cuocere circa 5 minuti per lato e fate assorbire l'olio con della carta forno. È importante che il composto non sia troppo molle, altrimenti le vostre spirali si romperanno durante la cottura. Inoltre l'olio non deve essere bollente, ma caldo e dovete cercare di mantenere sempre la stessa temperatura. Giratele solamente quando saranno ben dorate sotto, altrimenti rischiereste nuovamente di romperle. Servite tiepide e gustate con le salse che preferite!","note":"","tags":[],"_importId":1346},{"nome":"Le treccine allo yogurt sono delle brioche","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":"farina 00"},{"qty":150.0,"unit":"g","name":"farina manitoba"},{"qty":200.0,"unit":"g","name":"yogurt bianco"},{"qty":140.0,"unit":"g","name":"zucchero semolato"},{"qty":1.0,"unit":"n°","name":"uovo grande o 2 medie"},{"qty":13.0,"unit":"g","name":"lievito di birra fresco"},{"qty":1.0,"unit":"pizzico","name":"sale"}],"procedimento":"Preparazione\nPer preparare le treccine allo yogurtdisponete le due farina a fontana sul piano di lavoro. Al centro aggiungete l’uovo leggermente sbattuto, lo zucchero e il lievito di birra sciolto in poco latte tiepido, (circa mezzo bicchiere) e lo yogurt poco alla volta. Cominciate ad amalgamare tutti gli ingredienti ed infine aggiungete un pizzico di sale. Impastate il tutto fino ad ottenere un impasto liscio ed omogeneo, lavoratelo per almeno 10 minuti. Mettetelo in una ciotola coperto da pellicola a lievitare per circa 3 ore in un luogo abbastanza caldo e lontano da correnti d’aria, fino al raddoppio. Trascorso il tempo riprendete l’impasto e dividetelo in 8 panetti (o anche più, con queste dosi le treccine sono abbastanza grandi) e ciascun panetto dividetelo in 3 parti in modo da fare dei cordoncini che andrete ad intrecciare. Fate le treccine e riponetele su leccarla ricoperta da carta forno. Rimettete a lievitare coperte da un panno per altre 2 ore (a seconda sempre della temperatura del vostro ambiente), se l’ambiente è piuttosto caldo basterà anche 1 ora.  Infornate in forno preriscaldato a 180° per circa 15-20 minuti fino a che non risultano dorate in superficie. All’impasto potete aggiungere della vanillina o delle gocce di limone. Le treccine allo yogurt sono perfette anche così semplicemente con dello zucchero a velo, per la colazione, oppure farcite con Nutella per una merenda golosa…i vostri bambini saranno felicissimi.","note":"","tags":[],"_importId":695},{"nome":"Legera t Limone","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina 00"},{"qty":150.0,"unit":"g","name":"zucchero"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":150.0,"unit":"ml","name":"latte"},{"qty":2.0,"unit":"n°","name":"mele renette"},{"qty":1.0,"unit":"n°","name":"limone biologico"},{"qty":1.0,"unit":"bustina","name":"lievito in polvere per dolci"}],"procedimento":"TORTA DI MELE AL PROFUMO DI LIMONE\n  INGREDIENTI\n250 g di farina 00\n150 g di zucchero\n2 uova\n150 ml di latte\n2 mele renette\n1 limone biologico (scorza e succo)\n1 bustina di lievito in polvere per dolci\nzucchero a velo per decorare","note":"","tags":[],"_importId":161},{"nome":"Lettera  indirizzata da Giuseppe Mazzini esule in","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Lettera  indirizzata da Giuseppe Mazzini esule in Svizzera alla madre. Salita dei Pubblici Forni n.1197 . Sestiere di Prè. Genova. \"Voglio attenere la mia promessa e soddisfare un mio capriccio. Eccovi la ricetta di quel dolce che vorrei faceste e provaste, perché a me piace assai. Traduco alla meglio, perché di cose di cucina non m'intendo, ciò che mi dice una delle ragazze in cattivo francese: pelate e pestate fine fine tre once di mandorle con tre once di zucchero, fregato prima ad un limone, pestato finissimo. Prendete il succo del limone, poi due gialli d'uovo, mescolate il tutto per alcuni minuti, poi sbattete i due bianchi d'uovo quanto potete - en neige, dice essa, come la neve - cacciate anche questi nel gran miscuglio, tornate a muovere. Ungete una tourtière, cioè un testo da torte, con butirro fresco, coprite il fondo della tourtière con pasta sfoglia, ponete il miscuglio sul testo, su questo strato di pasta sfogliata spargete sopra dello zucchero fino, e cuocete il tutto al forno. Avete inteso? Dio lo sa. Mi direte poi i risultati: intanto ridete (Grenchen, 28-XII-1835)","note":"","tags":[],"_importId":16005},{"nome":"LIEVITO MADRE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Iniziato il 9/6 martedì ore 15.30 impastando 100gr farina 0 e 50 gr acqua . Messo con croce incisa in bicchiere vetro trasparente coperto da pellicola trasparente bucherellata con stuzzicadenti \nGiovedì 11 alle 15.30 primo rinfresco \nPrenderne 50 gr ( togliere parti secche se ci sono) e impastare con 50gr di farina e 25 gr acqua potabile a temperatura ambiente \nFare cioè in modo di avere sempre una pallina di 100gr circa\nSciacquare il barattolo solo con acqua calda\nSabato 13\nLunedì 15\nMercoledì 17\nVenerdì 19 \nPoi ogni giorno per 15 volte\nFino al 4/7\nIl lievito è pronto solo se in 4 ore triplicherà il volume\nSolo allora potrò metterlo in frigo\nVa rinfrescato ogni 4/5 giorni per i primi 2/3 mesi ( quindi fino a ottobre)\nPoi ogni 5/7 giorni \nPer rinfrescare il lievito in frigo:\nTogliere dal frigo \nFarlo riposare 1 ora\nPeso il lievito\nLo impasto con la quantità di farina = al suo peso e metà acqua (es se il lievito pesa 100gr\nAggiungo 100gr farina 0 e 50 gr acqua e impasto)\nRiposare 1 ora\nRimettere in frigo\nCon 500gr farina metto 125-150 gr lievito madre già rinfrescato\nQuindi \nTiro fuori dal frigo \nAspetto 1 ora\nRinfresco\nAspetto 4 ore\nUso per preparare quello che voglio","note":"","tags":[],"_importId":7472},{"nome":"Liliana Dovera","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Visto l'interesse  per gli gnocchi di pane,  questa è la ricetta che faccio io,  veramente buona anche se poverissima.\nAssomigliano ai capunsei, come forma, e ai pisarei, come abbinamenti dei condimenti.Non è la ricetta ricca, con le uova  proposta in tante versioni, ma quella povera dei contadini e dei montanari per i quali le uova erano preziose perché  erano una fonte di reddito.\nPer i puristi non sono né pisarei né capunsei ma\nGNOCCHI DI PANE DELLA NONNA\nIl pane, specialmente nella tradizione contadina, è sempre stato guardato con rispetto, anche perché c'è ne era poco, costava parecchio e praticamente non ne avanzava mai e non tutti potevano permetterselo. Col passare degli anni, negli anni del boom economico, però le cose cambiarono e anche il pane restò sulle tavole avanzato e nelle credenze.\nLe nonne, che si ricordavano dei periodi in cui era prezioso, pensarono di utilizzarlo in cucina in mille modi e uno è questo.\nDosi per persona:\n* gr. 70 pane grattuggiato (io ho utilizzato quello già pronto in busta, l'importante è che sia fresco e di buona qualità, senza grassi e aromi vari aggiunti)\n* gr. 25 farina \n* q.b. brodo \"bollente\" (circa 150 gr. circa)\n* pepe a piacere\nUnire al pane grattuggiato il brodo, usando una forchetta. L'impasto non deve essere eccessivamente duro perché va aggiunta la farina.\nDopo aver aggiunto la farina impastare, meglio con dei guanti (visto la temperatura), aiutandosi con della farina sul piano di lavoro\nFare dei filoncini e tagliarli a pezzetti in sbieco come dalla foto\nAdagiarli delicatamente su un vassoio infarinato e farli scorrere avanti e indietro per infarinarli\nCottura in acqua salata per 3/4 minuti dall'inizio del bollore. Passarli direttamente nella padella del condimento raccogliendoli delicatamente con una schiumarola.\nCondire a piacere: con burro e salvia, oppure con abbondante sugo di pomodoro, o con fagioli stufati in salsa di pomodoro  che è  la versione  originale.\nParmigiano reggiano a pioggia.","note":"","tags":[],"_importId":12388},{"nome":"Lingue di pizza: vi avviso, non potrete più farne a meno! 😋","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina 00"},{"qty":350.0,"unit":"g","name":"d’acqua"},{"qty":3.0,"unit":"g","name":"lievito di birra"},{"qty":5.0,"unit":"g","name":"zucchero"},{"qty":11.0,"unit":"g","name":"sale"},{"qty":40.0,"unit":"g","name":"olio extravergine d’oliva"}],"procedimento":"PROCEDIMENTO\nVersare all’interno di una ciotola la farina, l’acqua e lievito e iniziare a impastare. Aggiungere lo zucchero, il sale e infine l’olio. Impastare fino ad ottenere un impasto liscio e setoso. Dopo la prima lievitazione di 40 minuti a temperatura ambiente, formare le palline e lasciar lievitare nuovamente per mezz’ora a temperatura ambiente. Stendere le pizzette con il mattarello per ottenere la tipica forma sottile e allungata. Condire con la passata di pomodoro fino ai bordi - io la condisco con olio, sale e origano siciliano.\n\nLIEVITAZIONI\nImpasto: 40 minuti a temperatura ambiente\nPalline: mezz’ora a temperatura ambiente\n\nCOTTURA\nForno statico al massimo della temperatura 280/300 per 10/15 minuti, finchè non diventano croccanti.","note":"","tags":[],"_importId":16707},{"nome":"Lo strudel vero, ma quello vero, vero","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"�Qui non si parla di sfoglie industriali o frolle tristi.�Questa è la ricetta di famiglia, quella che profuma di mani infarinate, libri sgualciti e finestre che danno sulle montagne.�La pasta da strudel vera, quella che si tira sottile come un segreto sussurrato.�Se poi qualcuno insiste a farlo con la frolla… oh beh, che gli antiche spiriti delle cucine contadine abbiano pietà di loro �\nDOSI PER LA PASTA\n- 250gr farina\n- 2 cucchiai di olio di semi\n- un pizzico di sale\n- 130ml di acqua\n- 1 cucchiaino di zucchero\nImpasta tutti gli ingredienti assieme fino ad ottenere un pasta liscia e morbida che avvolgerai con pellicola e metterai a riposo per 30 minuti sotto una pentola che avrai riscaldato sul fuoco, deve essere calda, non bollente, vogliamo una SPA rilassante non una camera di tortura. \nDOSI PER IL RIPIENO:\n- 6 mele (vanno bene tutte purchè non troppo succose e magari anche un pò vecchiotte)\n- due manciate di noci (o pinoli se volte scialacquare tutti i vostri risparmi)\n- due manciate di uvetta\n- cannella in polvere\n- 2/3 cucchiai di zucchero\n- buccia di 1 limone gratuggiata\n- 4 cucchiai abbondanti di pane grattuggiato\nSbucciate le mele e tagliatele a fette, quando la pasta è pronta cominciate a tirarla sulla spianatoia, potete usare il mattarello ma se vi sentite dei pro lo potete fare anche con i polpastrelli (è una pasta molto elastica e, anche se si dovesse bucare qui e la poco importa perché poi arrotoliamo tutto)\nDistribuite sulla pasta il pane grattuggiato che avrete precedentemente tostatoo con 1 cucchiaino di zucchero, poi distribuite le mele uniformemente che avrete già mescolato con i 3 o 4 cucchiai di zucchero e la buccia di limone, poi sopra le noci , uvetta e cannella come se piovesse. Arrotolate, spennellate con latte vegetale (noi abbiamo usato latte di riso mescolato con 1 cucchiaino di zucchero) e infornate a 170 gradi per 40 minuti. Quelle che dovrà succedere una volta sfornato già lo sapete.\n�Unisciti alla nostra community su: lastria.eu\n#LaStria\n#strudel #strudelvegano #ricettadellatradizione #dolcitipici #vegan   https://www..com/share/v/16Yp1fm97E/?mibextid=wwXIfr","note":"","tags":[],"_importId":15799},{"nome":"MA STA CROCCANTELLA DI ZUCCHINE QUANTO È BONA! MAMMA MIAAA😍😍","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"zucchine"},{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":50.0,"unit":"g","name":"farina di mais per polenta"},{"qty":50.0,"unit":"g","name":"parmigiano"},{"qty":350.0,"unit":"ml","name":"acqua"},{"qty":50.0,"unit":"ml","name":"olio evo"}],"procedimento":"Aggiungi l'acqua e l'olio evo. Mescola per avere una bella pastella liscia senza grumi.\nAggiungi le zucchine.\nVersa l'impasto in teglia con carta da forno oliata.\nLivella l'impasto e metti sopra altro poco di farina di mais e un filo di olio evo. \nCuoci in forno preriscaldato ventilato a 190 gradi per mezzora.","note":"","tags":[],"_importId":14107},{"nome":"MAIONESE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"uova sode"},{"qty":30.0,"unit":"g","name":"acqua"},{"qty":1.0,"unit":"cucchiaio","name":"olio di oliva"},{"qty":1.0,"unit":"cucchiaino","name":"senape o aceto"},{"qty":null,"unit":"q.b.","name":"sale"}],"procedimento":"MAIONESE\nINGREDIENTI \n\n3 uova sode\nIl succo di mezzo limone\n30g acqua\n1 cucchiai di olio di oliva \n1 cucchiaino di senape O ACETO\nSale q.b.\n\nScarica la nostra app “Glutinary” su App Store o Google Play, oggi!","note":"","tags":[],"_importId":14576},{"nome":"Maionese con uova sode di Elena Borgese","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"uove"},{"qty":120.0,"unit":"g","name":"formaggio spalmabile,"},{"qty":1,"unit":"n°","name":"cucchiaino di senape."}],"procedimento":"Per preparare la maionese senza uova crude e senza olio per prima cosa mettete a rassodare le uova in un pentolino con acqua fredda, portate a bollore e lasciatele cuocere per 9 minuti, trasferite poi le uova sode in una ciotola con acqua fredda e lasciatele raffreddare.\nSgusciate le uova cotte e mettetele nel boccale del frullatore a immersione.\nAggiungete il succo di un limone ed il formaggio cremoso e la senape.\nFrullate benissimo gli ingredienti fino ad ottenere una crema vellutata, se trovate difficoltà nel frullare o viene un composto molto denso, potete aggiungere poco latte.\nTrasferite la Maionese con le uova sode in un barattolo e conservatela in frigorifero almeno 1 ora prima di servirla.","note":"","tags":[],"_importId":14797},{"nome":"Maionese di pesca","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"pesca sbucciata a pezzi, basilico, erba Luisa, sale, olio, yogurt greco una punta di senape, una punta di miele, uno spruzzo di aceto e frullare\nFranca Sanacore, forse lippia, cedrina ti è più conosciuta ? È un erba che ha un forte sentore limonato e credo sia presente ovunque anche se forse non spontanea. In ogni caso, va bene anche solo basilico, e magari qualche foglia di melissa","note":"","tags":[],"_importId":9655},{"nome":"Maionese fatta con uova sode","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"uova sode"},{"qty":100.0,"unit":"ml","name":"olio"},{"qty":1.0,"unit":"cucchiaino","name":"senape"}],"procedimento":"Preparazione:\n\n1.\tPreparare le uova:Per preparare la maionese gialla, inizia facendo bollire le uova. Metti le uova in una pentola con acqua fredda, porta ad ebollizione e fai cuocere per circa 10 minuti. Poi, trasferiscile in acqua fredda per raffreddarle rapidamente. Sguscia le uova e tagliale a pezzetti. Metti i pezzetti in un contenitore alto che faciliterà la miscelazione.\n\n2.\tAggiungere gli ingredienti:Aggiungi la senape, il succo di limone, il sale, il pepe e, se desideri, l’aceto di mele per un sapore speciale. Poi versa l'olio, iniziando con una piccola quantità e aggiungendo di più se necessario.\n\n3.\tFrullare:Usa un frullatore a immersione (o un frullatore normale) per mescolare tutti gli ingredienti fino ad ottenere una consistenza liscia e cremosa. Continua a frullare finché la maionese non diventa completamente omogenea. Assicurati che non rimangano pezzi e che la consistenza sia setosa.\n\n4.\tCondire:Dopo aver frullato, assaggia la maionese e aggiungi sale o pepe a piacere. Se desideri un sapore più intenso, puoi aggiungere un po' di succo di limone o senape.\n\n5.\tConservazione:Metti la maionese pronta in un barattolo pulito (preferibilmente di vetro) e conservala in frigorifero. La maionese fatta in casa con uova sode si conserva per 3-4 giorni, ma assicurati di chiudere bene il barattolo per mantenerla fresca.\n\nFatto!Goditi la maionese fatta in casa senza uova crude, che sicuramente ti conquisterà con il suo sapore! È perfetta per insalate, panini o come salsa per verdure. Buon appetito!","note":"","tags":[],"_importId":15168},{"nome":"Maria Giggie","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La ricetta è  questa, però,  il lievito è  stato aggiunto ai liquidi e non alla farina, ho utilizzato farina non tipo 0 ma tipo 00 Farina per Briosche Molino Della Giovanna, fornitore del maestro Massari, ed ho aggiunto il classico mix aromatico che si usa anche per i panettoni, arancia, limone, miele, estratto bourbon di vaniglia, rhum in infusione per 4 ore prima dell'impasto ed inserito prima dei cubetti di burro.","note":"","tags":[],"_importId":11309},{"nome":"MARMELLATA ANGURIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"kg","name":"polpa anguria"},{"qty":1.0,"unit":"L","name":"acqua"},{"qty":800.0,"unit":"g","name":"zucchero"}],"procedimento":"Sciogliere zucchero in 1lt acqua (sciroppo) aggiungere la polpa per 20 min bollire poi frullare con frullino ad immersione poi sul fuoco ancora 10 min e poi aggiungere brandy\nFatta","note":"","tags":[],"_importId":576},{"nome":"MARMELLATA DI ARANCE AMARE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Levate la parte gialla della buccia di 12 arance ben lavate usando un pelapatate poi togliere la parte bianca pelando così a vivo le arance. Tagliare i frutti in quarti levando i semi e metterli insieme alla buccia, precedentemente levata, in una pentola con poca acqua e cuocere X 20'. Levare dall'acqua e pesare la poltiglia (se si desidera si può frullare poco fino ad ottenere una consistenza grossolana). Mettere a cuocere la poltiglia con uguale quantità di zucchero e un bicchiere scarso del liquido ricavato dalla prima cottura di bucce e frutto cuocere X un'oretta finche' si raggiunge la giusta consistenza poi invasare in vasetti puliti e sterilizzati.","note":"","tags":[],"_importId":439},{"nome":"Marmellata di Mela e Arancia🍊🍏🍎 Senza Zucchero in 10 Minuti","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"arance"}],"procedimento":"Procedimento:\n\n1️⃣ Preparazione delle mele e delle arance:\n\nPer prima cosa, lava accuratamente le mele e sbucciale. Una volta sbucciate, tagliale a pezzetti e rimuovi il torsolo. Le mele dolci come le Golden o Fuji sono perfette per questa ricetta, poiché rilasciano una naturale dolcezza durante la cottura. Spremi le due arance per ottenere il succo e grattugia la scorza (solo la parte arancione, per evitare il gusto amaro della parte bianca). Il succo e la scorza d’arancia daranno alla marmellata un profumo irresistibile e un tocco di freschezza.\n\n2️⃣ Cottura rapida:\n\nMetti i pezzetti di mela in una pentola abbastanza capiente insieme al succo d’arancia e alla scorza grattugiata. Aggiungi un pizzico di cannella in polvere per dare alla marmellata una nota aromatica. Se ami il gusto speziato, puoi aumentare la quantità di cannella a piacere. Cuoci a fuoco medio per circa 10 minuti, mescolando frequentemente. Durante la cottura, le mele inizieranno a diventare morbide e a sfaldarsi, e il profumo di mela e arancia si diffonderà in tutta la cucina.\n\n3️⃣ Frullare:\n\nUna volta che le mele sono morbide e si sono quasi completamente sfaldati, prendi un frullatore a immersione e frulla il composto fino ad ottenere una consistenza liscia e cremosa. Se preferisci una marmellata con una consistenza più rustica, puoi decidere di lasciare qualche pezzetto di mela non frullato, per dare più corpo alla marmellata. Frullare la marmellata rende il composto più uniforme, ma sta a te decidere quanto rustica o liscia la vuoi.\n\n4️⃣ Conservazione:\n\nQuando la marmellata è pronta, versala immediatamente nei barattoli sterilizzati, mentre è ancora calda. Chiudi i barattoli ermeticamente e lasciali raffreddare a temperatura ambiente. Se vuoi conservare la marmellata per più tempo, puoi sterilizzare i barattoli facendoli bollire in acqua per qualche minuto prima di versarci dentro la marmellata. In alternativa, basta riporre la marmellata in frigo, dove si conserva per circa 7 giorni.\n\nConsigli:\n\nLa marmellata di mela e arancia senza zucchero è perfetta da spalmare su fette di pane integrale, oppure da aggiungere nello yogurt per una colazione sana e gustosa.\n\nSe preferisci una marmellata più dolce, puoi aggiungere un cucchiaino di miele durante la cottura, ma la ricetta così com’è è naturalmente dolce grazie alle mele mature.\n\nSe hai bisogno di una conservazione a lungo termine, non dimenticare di sterilizzare i barattoli prima di conservare la marmellata.","note":"","tags":[],"_importId":15735},{"nome":"Mezze maniche Con pesto di","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":"carote"},{"qty":50.0,"unit":"g","name":"olio extravergine d’oliva"},{"qty":50.0,"unit":"g","name":"parmigiano reggiano dop"},{"qty":25.0,"unit":"g","name":"acqua"},{"qty":20.0,"unit":"g","name":"mandorle"}],"procedimento":"Per preparare il pesto di carote, per prima cosa occupati delle carote.  Pelale e lavale per bene.  Taglia le carote a tocchetti, anche senza essere troppo precisi.     Nel bicchiere del frullatore metti le carote, aggiungi l’olio evo, l’acqua, il parmigiano, le mandorle e aggiusta di sale e pepe. Frulla fino ad ottenere una crema liscia ed omogenea.  Buon appetito! \nConservazione\n\t\tSi conserva in frigo, in un contenitore a chiusura ermetica, fino a una settimana, avendo l’accortezza di irrorare la superficie con un filo d’olio evo, per non farla seccare.","note":"","tags":[],"_importId":13950},{"nome":"Mi ero.segnata le cose che Vittorio Viarengo","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Mi ero.segnata le cose che Vittorio Viarengo desiderava farci fare , e visto che da tanto tempo.\nnon mi ero preparata una pizza, io, che non vado pazza per le lunghe lievitazioni, .mi sono.preparata la :\n         PIZZA  FATTA\n            IN CASA\n             SENZA\n          LIEVITAZIONE,\nsaporita, croccante, molto veloce, ritrovata tra i miei quaderni dove scrivevo tutte le ricette viste in TV.\nIngredienti: 250 gr di acqua - 40 gr di olio.evo - 400-500 gr di farina - 10 gr di sale ( come mio solito fatta metà  dose.)\nPreparazione : nella ciotola della planetaria, mettere acqua, olio, sale, metà  farina e impastare col gancio . Quando la farina è  assorbita, spegnere la planetaria, coprire l'impasto, farlo riposare per 15 minuti per favorire il processo di autolisi.\nAggiungere tutta la farina rimasta \nRiprendere poi ad impastare per 7-8.minuti a media velocità,  per ottenere un impasto asciutto  ed elastico.\nIo ho scelto una teglia forata, da poggiare sulla pietra refrattaria  che ho da anni nel forno. Col mattarello ho steso la pasta sulla spianatoia infarinata, poi l'ho stesa sulla teglia leggermente unta..L'ho semplicemente condita con la passata  di pomodoro, mozzarella grattugiata, sale, origano,olio evo, e messa a cuocere nel forno preriscaldato al massimo. Vittorio Viarengo  consiglia di cuocere la pizza per 7-10\nminuti in un forno potente, ma il mio è  a gas e l'ho dovuta cuocere di più  anche perché  non posso accendere grill e forno assieme. Ed ecco il risultato.","note":"","tags":[],"_importId":14650},{"nome":"Mia suocera mi ha insegnato una ricetta vecchia di 100 anni","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"uova"},{"qty":200.0,"unit":"n°","name":"ml"},{"qty":600.0,"unit":"n°","name":"grammi"},{"qty":80.0,"unit":"n°","name":"ml"},{"qty":45.0,"unit":"n°","name":"grammi"},{"qty":1.0,"unit":"n°","name":"1/2 cucchiaino"}],"procedimento":"Istruzioni:\n\nPreparare l'impasto:\nin una ciotola mescolare il latte, lo zucchero e il lievito secco. Lasciare riposare per 5-10 minuti finché il lievito non diventa schiumoso. Aggiungete al composto di lievito le uova, l’olio e il sale e mescolate bene. Aggiungere gradualmente la farina al composto, mescolando continuamente fino a formare un impasto. Lavorare l'impasto su una superficie infarinata per circa 10 minuti finché non diventa liscio ed elastico. Mettete l’impasto in una ciotola unta, coprite con un canovaccio umido e lasciate lievitare in un luogo tiepido per circa 1 ora o fino al raddoppio del volume.\n\nFormare i panini:\npreriscaldare il forno a 170°C (340°F).\nStendete la pasta lievitata e dividetela in piccole porzioni, modellando ciascuna porzione in un rotolo. Disporre i rotoli su una teglia foderata con carta da forno.\n\nAggiungere il ripieno:\ncospargere ogni rotolo con lo zucchero. Metti 1 cucchiaino di burro su ogni rotolo.\nGuarnire i panini con tutti frutti, uvetta, mandorle tritate e un po' di scorza d'arancia.\n\nCuocere al forno:\ncuocere i panini nel forno preriscaldato per 25-30 minuti o fino a quando saranno dorati e cotti. Il tempo di cottura può variare a seconda del vostro forno.\n\nServire:\nTogliere i panini dal forno e lasciarli raffreddare leggermente su una gratella.\nServiteli caldi e gustatevi questi deliziosi panini dolci e fruttati!","note":"","tags":[],"_importId":14270},{"nome":"Millefiori","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00"},{"qty":200.0,"unit":"g","name":"farina manitoba"},{"qty":15.0,"unit":"g","name":"lievito di birra fresco"},{"qty":250.0,"unit":"ml","name":"acqua"},{"qty":50.0,"unit":"g","name":"strutto"},{"qty":80.0,"unit":"g","name":"zucchero"},{"qty":10.0,"unit":"g","name":"sale"},{"qty":30.0,"unit":"g","name":"uva passa"},{"qty":1.0,"unit":"n°","name":"tuorlo e poco latte"}],"procedimento":"Preparazione:\nMettete le farine dentro l’impastatrice, assieme allo strutto e lo zucchero. Versate pian piano l’acqua dove avrete fatto sciogliere il lievito di birra e impastate per qualche minuto. Appena il composto risulta abbastanza omogeneo, aggiungete poco alla volta il sale ed infine l’uva passa. Incordare per bene. Formate una palla spolverando poca farina sulla superficie. Ponetela in un ciotola di plastica  con il fondo infarinato, con un coltello fate una croce sulla superficie, coprite con un panno bagnato e mettete a riposare dentro al forno spento con la lucina accesa fino al raddoppio (circa 3 ore).\nRiprendete l’impasto. Staccate delle palline, arrotolate formando dei cilindri ed incrociate le treccine (cercate di farle tutte della stessa misura). Disponetele su una teglia coperta con carta da forno e fate lievitare ancora per circa 2 ore. Mescolate il tuorlo al latte e spennellate la superficie dei millefiori. Infornate in forno già caldo a 190° per circa 20/25 minuti (regolatevi con il vostro forno).","note":"","tags":[],"_importId":16119},{"nome":"Mirta Dalpiaz Il 90% delle mie torte sono realizzate","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"La stessa ricetta che scriverò sotto la uso pure per fare le torte ed in questi casi non divido mai le quantità , ma l’intero impasto lo divido  in due stampi da 20cm ciascuno alti 10cm \nLa ricetta corrisponde ad una  chiffon normale alla vaniglia , ma sostituendo l’acqua ( totalmente o parzialmente ) con succo di arance , limoni compresa scorza grattugiata , si possono avere naturalmente la variante all’arancia ( come in foto ) al limone eccecc … \nStesse identiche dosi uso per la versione al cacao … dove sostituisco 50g di farina con 50g di cacao ( uso questa dose di cacao perché la farina in questi casi è 360g … se fosse meno di 300 potrei usare tranquillamente 40 g di cacao ) \nSpero di esserci stata utile e chiara ☺️ \nPER STAMPO DI CM 26 \n360 farina \n380 zucchero ( extrafine ) \n1 busta lievito \nCremor tartaro 8 g o un cucchiaino regolare \n9 uova grandi ( intere per cui 9 albumi e 9 tuorli ) \n250 g acqua ( o altro liquido ) \n150 g olio semi di girasole \nVaniglia ( la uso in pasta o se riesco stecca ) … \nForno statico a 165* \nPer 70minuti unico stampo chiffon … 60 due stampi da 20cm ( controllate sempre prima di sfornare definitivamente …. \n      Procedimento \nSeparo le uova dai tuorli …. Comincio a montare gli albumi con metà ( g 190 ) di zucchero appena gli albumi cominciano a schiumare aggiungo lo zucchero in tre tempi e appena diventano bianchi aggiungo il cremor tartaro sempre continuando a montare … \nIntanto in altra ciotola abbastanza capiente mescolo e setaccio zucchero farina e lievito …. Aggiungo tuorli acqua e olio di girasole … mescolo semplicemente con spatola e aggiungo vaniglia e/o scorza di agrumi se è prevista …. \nAlla fine unisco gli albumi ben montati che …vista la presenza del cremor tartaro manterranno comunque un aspetto spumoso ! \nMetto nello stampo e via in forno","note":"","tags":[],"_importId":12477},{"nome":"Morbide, fragranti e irresistibili: queste girelle","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Morbide, fragranti e irresistibili: queste girelle danesi sono la brioche perfetta da colazione.\nImpasto semplice, crema pasticcera golosa e uvetta (o cioccolato 😍).\nLa ricetta completa sul mio blog: www.unafamigliaincucina.com\nPer 20 girelle:\nPer l’impasto:\n275 g farina 00\n275 g farina Manitoba\n250 ml latte\n15 g lievito di birra fresco ((oppure 5 g di quello secco))\n1 uovo\n80 g zucchero\n60 g burro morbido\n200 g uvetta (o gocce di cioccolato)\n6 tuorli\n150 g zucchero\n500 ml latte\n50 g amido di mais (maizena)\nzucchero a velo (facoltativo)\nMettete in ammollo l’uvetta.\n In una ciotola mescolate farine, zucchero e uovo. Unite il latte tiepido con il lievito sciolto e lavorate fino a ottenere un impasto liscio ed elastico.\n Aggiungete il burro morbido poco per volta, aspettando che sia ben assorbito, poi un pizzico di sale.\n Coprite e lasciate lievitare fino a triplicare (2–3 ore).\nPreparate la crema pasticcera e lasciatela raffreddare a temperatura ambiente.\n Stendete l’impasto in un rettangolo di 30x40 cm , spalmate la crema, distribuite l’uvetta e arrotolate dal lato lungo.\n Tagliate 20 girelle, sistematele in 2 teglie e fate lievitare ancora 30 minuti.\n Cuocete a 180°C statico per 20–25 minuti. Una spolverata di zucchero a velo e sono pronte 🤍\n❄️ CONSERVAZIONE & VARIANTI\nSi conservano soffici 1 giorno a temperatura ambiente e poi 2 giorni in frigo (scaldatele poi al microonde), oppure si possono congelare dopo la l’ultima lievitazione, le scongelate 1 notte in frigo e al mattino seguente le cuocete in forno.\n Via libera anche a cioccolato o frutta secca per cambiare versione.\n#girelledanesi #briochefatteincasa #lievitatidolci #colazionegolosa","note":"","tags":[],"_importId":16138},{"nome":"Morbidi sono morbidi","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"LA RICETTA:\n\n🌾 - 500 g semola rimacinata di grano duro\n- 380 g acqua \n- 10 g lievito di birra \n- 1 uovo medio intero + 1 tuorlo\n- 50 g zucchero\n- 10 g sale\n- 50 g burro \n\n✅PROCEDIMENTO:\n\n- Preparare un water roux in un pentolino a fuoco medio con 50 g di semola e 200 g di acqua. Mescolare finché non diventerà un gel. Coprire e usare a completo raffreddamento\n\n- Impastare 450 g di semola con 180 g di acqua, il gel e il lievito fino a che tutto sarà assorbito, inserire l’uovo intero e incordare. Di seguito inserire il tuorlo e incordare di nuovo\n\n- Inserire zucchero , sale e burro in più volte sempre attendendo che il precedente sia assorbito. Terminare quando l’impasto è ben incordato\n\n- Lasciar lievitato fino ad un aumento del 50% del volume iniziale\n\n- Spezzare in palline da 80/90 g. Se necessario usare uno spolvero di semola. Chiudere bene le palline e farle raddoppiare di volume\n\n- Spennellare con tuorlo e latte e cospargere di sesamo, cuocere in forno statico preriscaldato a 180 gradi per circa 15 minuti \n\n#burgerbun #semola #panini #ricetta #èunacosaseria \n\nBurger bun di semola\nRicetta","note":"","tags":[],"_importId":16566},{"nome":"MOZZARELLA IN CARROZZA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti  per 4 persone: 3 mozzarelle - pane in cassetta - 3 uova - una manciata di farina - poco latte - sale - olio di oliva o di arachidi q.b.\nPreparazione: scolare bene le mozzarelle, asciugarle, e ricavare delle fette regolari di un cm di spessore.\nRicavare  dal pane 16 fette e privarle della crosta, poi sistemare ogni fetta di mozzarella tra 2 fette di pane. Infarinare leggermente i tramezzini specie sui lati, e accomodarli su un piatto. Battere le uova con 5 cucchiai di latte e un pizzico di sale e immergere i tramezzini da entrambi i lati, e farli riposare fino ad assorbimento dell'uovo.\nA questo  punto o si possono friggere in olio a 180 gradi e girarli dopo 4-5 minuti fino a doratura, o si possono cuocere in forno preriscaldato a 200 gradi per 7-8  minuti sempre fino a doratura. pane in cassetta da ricetta di Vittorio Viarengo,  la mozzarella in carrozza  sarà  ancora più  buona. Nella ricetta romana è  anche prevista un pezzetto di alice sott'olio nel tramezzino, ma quando li ho preparati, mi sono accorta di non averle in casa....","note":"","tags":[],"_importId":10729},{"nome":"Muffin Ricotta e Arancia","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":80.0,"unit":"ml","name":"succo d'arancia"},{"qty":200.0,"unit":"g","name":"ricotta"},{"qty":100.0,"unit":"g","name":"zucchero semolato"},{"qty":50.0,"unit":"g","name":"fecola di patate"},{"qty":1.0,"unit":"bustina","name":"lievito in polvere per dolci"},{"qty":2.0,"unit":"n°","name":"uova medie"},{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":80.0,"unit":"ml","name":"olio di semi"}],"procedimento":"Preparazione\n\n1. Inizia preparando l'arancia: lavala, asciugala e poi grattugia la scorza, facendo attenzione a non prendere la parte bianca. Spremi il succo e metti da parte entrambi.\n\n2. Prendi una ciotola capiente e unisci la farina 00, la fecola di patate, il lievito setacciato, lo zucchero semolato, la scorza grattugiata dell'arancia e un pizzico di sale. Mescola bene tutti gli ingredienti secchi.\n\n3. In un'altra ciotola, lavora la ricotta con l'olio di semi, le uova e il succo d'arancia fino ad ottenere un composto omogeneo.\n\n4. Versa il composto liquido nella miscela di ingredienti secchi e mescola delicatamente, usando una spatola o un cucchiaio di legno, finché non ci sono più grumi. Fai attenzione a non mescolare troppo.\n\n5. Riempie i pirottini di carta per muffin per circa 3/4 della loro capacità. Se preferisci, puoi usare anche pirottini monodose in alluminio.\n\n6. Inforna nel forno statico preriscaldato a 180°C per 25-30 minuti. Per verificare la cottura, fai la prova stecchino: infilalo nel centro di un muffin; se esce asciutto, sono pronti.\n\n7. Una volta cotti, lascia raffreddare i muffin a temperatura ambiente. Se desideri, spolverali con abbondante zucchero a velo prima di servirli.\n\nI tuoi Muffin Ricotta e Arancia sono pronti per essere gustati! Un delizioso abbinamento che regala freschezza e morbidezza ad ogni morso.\n\nNutritional Information\nApproximate nutritional content per serving: \nCalories: 180 \nCarbohydrates: 22 g \nProteins: 4 g \nFats: 8 g \n\nPreparation time: 15 minutes | Cooking time: 30 minutes.","note":"","tags":[],"_importId":13320},{"nome":"MUFFINS AL DOPPIO CIOCCOLATO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"100 gr di gocce) - 100 gr di burro  - 100 ml di latte - 180 gr di farina 00 - 120 gr di zucchero - una bustina di lievito per dolci - 4 uova ( 2 tuorli e 4 albumi).\nDecorazione: un'abbondante cucchiaiata di formaggio spalmabile  - una cucchiaiata di crema di nocciole - piccole meringhe.l\nPreparazione: in un tegamino mettere a sciogliere il cioccolato a pezzi con il burro e il latte, a fiamma moderata. Togliere dal fuoco e freddare.\nIn una ciotola mescolare farina zucchero e lievito, aggiungere la crema al cioccolato, i due tuorli ( tenendo da parte gli albumi), le gocce di cioccolato, e amalgamare il tutto. Unire  i due albumi a quelli tenuti  da parte, e0 montarli a neve ferma, poi versarli nella ciotola e delicatamente unirli al composto preparato, mescolando a mano con una spatola, dal basso verso l'alto. Cuocere in forno preriscaldato a 180 gradi, per 20 minuti. \nUna volta cotti e freddati su una gratella, mescolare  il formaggio spalmabile con la crema di cioccolato,  metterne un po' su ogni muffin, e terminare a piacere o con una meringhetta, o con mezza ciliegia candita, o con un lampone, insomma come preferi tempo\nMa io sono sempre attenta e controllo di continuo l'andamento della cottura \nÈ stato apprezzato","note":"","tags":[],"_importId":11354},{"nome":"NUVOLE DI ZUCCHINE E FORMAGGIO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"zucchine"},{"qty":1.0,"unit":"n°","name":"peperone rosso"},{"qty":2.0,"unit":"n°","name":"uova grandi"},{"qty":null,"unit":"q.b.","name":"sale e pepe"},{"qty":130.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"cucchiaino","name":"lievito per dolci"}],"procedimento":"PREPARAZIONE:\n\nLavate, asciugate e spuntate le zucchine.\nGrattugiate le zucchine nella grattugia a fori grossi.\nGrattugiate anche il peperone rosso.\nIn una ciotola rompete le uova, aggiungete sale e pepe a piacere e iniziate a sbattere.\nAggiungete le zucchine, il peperone, il formaggio  grattugiato sempre nella grattugia a fori grossi e mescolate.\n\nUnite la farina, il lievito e amalgamate.\n\nVersate il composto nello stampo per muffins e fate cuocere in forno a 200 gradi per 25 minuti circa.\nSformate le nuvole di zucchine e formaggio e mangiatele calde.\nOttime anche fredde.","note":"","tags":[],"_importId":9612},{"nome":"O R E C C H I E T T E","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1,"unit":"n°","name":"ricetta semplice ma da un sapore sublime.🧑‍🍳❤️"}],"procedimento":"O R E C C H I E T T E\n                      Z U C C A  \n                             e  \n                   G A M B E R I\nZucca a cubetti,gamberi,aglio,olio Evo,peperoncino fresco,vino bianco\ne prezzemolo!\nUna ricetta semplice ma da un sapore sublime.🧑‍🍳❤️\nBuon mercoledì al gruppo👍🌞","note":"","tags":[],"_importId":7731},{"nome":"Oggi ho deciso di parlare della","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Dice Angelo, che la cottura è semplice, ma richiede un po' di pratica, dato che la tradizione vuole che andrebbe cotta nel forno a legna con un tegame di rame stagnato.\nChiaramente non tutti la possono fare in questo modo, e Angelo ha risolto  usando un tegame antiaderente e rotondo e riguardo al forno, il trucco è  quello di aprire il forno ogni 5 minuti.per far uscire il vapore, che impedisce una cottura ottima della Farinata.\nPreparazione: in una ciotola mettere la farina di ceci, meglio se setacciata, aggiungere l'acqua poco a poco, sempre mescolando a mano con una frusta. Poi si fa riposare, così  la farina ha tempo di assorbire l'acqua. Nella ciotola si inserisce un rametto di rosmarino. Si copre e la si fa riposare da due a sei ore.\nPassato questo tempo, si mette l'olio al centro della teglia e la  si smuove  per coprire tutta la base.\nTogliere la schiuma de\ndall'impasto, e versare il composto nella teglia sopra l'olio, usando un cucchiaio come scudo, per non far cadere la Farinata direttamente sull'olio, così  non si romperà il velo di olio che si era formato . Per questo è  molto importante che il tegame sia\n antiaderente. Poi raschiare i bordi facendo in modo che l'olio si distribuisca per bene nel composto, dall'esterno verso il centro. La Farinata  è  pronta  per  essere infornata .\nIl forno intanto è  stato preriscaldato al massimo accendendo grill e forno, ma quando si inforna la teglia,  deve restare acceso solo il grill. Dopo 5 minuti si apre lo sportello per fare uscire  il vapore , e si smuove la teglia. In genere  , per ottenere la giusta doratura, occorrono dai 20 ai 30 minuti,  e ogni volta che si apre lo sportello, si smuove un po' la teglia perché  la cottura sia uniforme. \nQuando la Farinata è  solida, per rompere le bolle che si formano in cottura, si bucherellano con la punta di in coltello. \nUna volta che la Farinata è cotta, Angelo la sfila dal tegame con facilità , e la posa su un tagliere di legno, e dopo qualche secondo la taglia a quadrotti. La Farinata è  pronta per essere  servita con sopra una spolverata  di pepe. \nNelle due foto si vede Angelo Simonini con la sua Farinata pronta da servire, e la mia Farinata preparata per l'occasione.","note":"","tags":[],"_importId":13947},{"nome":"Oggi ho fatto questa torta di Antonio Paolino cuoco","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"uova"},{"qty":170.0,"unit":"g","name":"zucchero"},{"qty":60.0,"unit":"ml","name":"olio di semi"},{"qty":50.0,"unit":"ml","name":"latte"},{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":1.0,"unit":"cucchiaio","name":"estratto di vaniglia"},{"qty":1.0,"unit":"pizzico","name":"cannella"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":2.0,"unit":"n°","name":"mele"},{"qty":300.0,"unit":"g","name":"prugne"},{"qty":250.0,"unit":"g","name":"ricotta","sezione":"Per la farcitura"},{"qty":1.0,"unit":"cucchiaio","name":"zucchero","sezione":"Per la farcitura"},{"qty":40.0,"unit":"g","name":"farina di mandorle","sezione":"Per la farcitura"},{"qty":1.0,"unit":"cucchiaio","name":"zucchero a velo","sezione":"Per la farcitura"},{"qty":2.0,"unit":"n°","name":"ciuffi di menta","sezione":"Per la farcitura"}],"procedimento":"Procedimento\n \nSbucciare le mele, tagliarle a fettine e metterle in una ciotola con acqua fredda. In una ciotola, mescolare la ricotta con lo zucchero e la farina di mandorle, fino a ottenere una crema omogenea.\nMontare le uova con lo zucchero in planetaria per circa 5 minuti, fino a ottenere un composto chiaro e spumoso. Aggiungere l’olio a filo, continuando a montare, poi unire il latte, l’estratto di vaniglia, la cannella e un pizzico di sale. Continuare a lavorare l’impasto per qualche minuto, in modo da amalgamare bene tutti gli ingredienti. Setacciare la farina insieme al lievito e aggiungerli delicatamente al composto, amalgamando con cura. Incorporare quindi metà delle fettine di mela e le prugne, mescolando fino a distribuirle uniformemente.\nVersare il composto in una tortiera imburrata e infarinata. Aggiungere, a cucchiaiate, la crema di ricotta lavorata precedentemente distribuendola all’interno dell’impasto, poi decorare la superficie con le fettine di mela rimaste e le prugne. Cuocere in forno preriscaldato a 175°C per circa 35-40 minuti. \nUna volta pronta, lasciar raffreddare la torta, quindi cospargere a piacere con zucchero a velo e decorare con dei ciuffi di menta prima di servire. #èsempremezzogiorno #cool #ricette #recipe #blog #torta #mele #chef","note":"","tags":[],"_importId":15425},{"nome":"Oggi i miei primi biscotti di Natale. Ricetta: 350","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Oggi i miei primi biscotti di Natale. Ricetta: 350 grammi farina 0 ,150 di burro, morbido 100gr di zucchero semolato, 1bustina di Vaniglia zucchero, buccia grattugiata di arancia,un pizzico di sale, una punta di coltello di lievito per dolci, 1uovo +un tuorlo. Impastare tutti gli ingredienti che siamo a temperatura ambiente, fare un panetto liscio e omogeneo avvolgere in pellicola e lasciare riposare per almeno mezz'ora in frigo stendere la pasta di uno spessore non troppo sottile ma nemmeno troppo spesso. Ritagliare le forme e cuocere a forno preriscaldato a 160 gradi. Forno statico per circa 10 minuti. Con marmellata a piacere e zucchero a velo decorare.","note":"","tags":[],"_importId":13256},{"nome":"Oggi PASSATELLI…","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"pane grattugiato fine"},{"qty":300.0,"unit":"g","name":"parmigiano reggiano grattugiato 30 mesi"},{"qty":100.0,"unit":"g","name":"farina"},{"qty":7.0,"unit":"n°","name":"uova grandi"},{"qty":null,"unit":"q.b.","name":"noce moscata"},{"qty":2.0,"unit":"L","name":"circa di brodo di carne"}],"procedimento":"In una terrina mescolo pangrattato, parmigiano e farina, aggiungo le uova, sale e noce moscata.\nImpasto bene e ottengo un composto ben compatto.\nFaccio riposare per almeno 30 minuti prima di cuocerli.\nPasso lo stampo da passatelli sul composto e li creo.\nQuando il brodo raggiunge il bollore butto i passatelli e come vengono a galla sono pronti per essere serviti.","note":"","tags":[],"_importId":9906},{"nome":"Oggi pizza speciale","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina"},{"qty":450.0,"unit":"g","name":"aqua"},{"qty":15.0,"unit":"g","name":"sale"},{"qty":5.0,"unit":"g","name":"lievito di birra"}],"procedimento":"Oggi pizza speciale,\n500g Farina\n450g aqua\n 15g sale\n    5g lievito di birra \n\nLievitazione 48 ore.","note":"","tags":[],"_importId":8460},{"nome":"Oggi semplice riso","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Oggi semplice riso, cotto direttamente nel sugo di pomodoro, allungato al bisogno con il brodo vegetale, a cottura ultimata aggiunta di melanzane, uova, mozzarella, formaggio grattugiato e una spolverata di pangrattato.\n20 min in forno a gratinare","note":"","tags":[],"_importId":9838},{"nome":"Oggi, domenica, giorno del dolce condiviso tra Viva la","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Oggi, domenica, giorno del dolce condiviso tra Viva la Focaccia e Ammira le Marche e le sue piazze.  Avrei scelto   dell'amica blogger  Natalia Cattelani ,\n come lei lo definisce, un grande classico della merenda e della colazione, il\n       CIAMBELLONE\n            CLASSICO \n  .    E  SOFFICISSIMO\nIngredienti : 3 uova - 200 gr di zucchero.- 120 gr di olio di semi di girasole - buccia grattugiata di un limone bio - succo di un limone - 120 gr di yogurt bianco intero - 400 gr di farina 0 o 00- \nUna bustina di lievito per dolci - un pizzico di sale - granella di zucchero o zucchero semolato  q.b.\nPreparazione: imburrare uno stampo a ciambella di 24 cm di diametro e accendere il forno a 170 gradi. Grattugiare la buccia di limone e metterla nell'olio . Rompete le uova in una ciotola assieme allo zucchero, e montare con le fruste elettriche per circa 5 minuti. Con le fruste in movimento unire a filo l'olio aromatizzato dal limone. Incorporare il succo del limone, lo\nYogurt e infine la farina setacciata col lievito e un pizzico di sale. Versare il composto nello stampo e sopra la granella di zucchero o lo zucchero semolato.\nCuocere nel forno preriscaldato per circa 35 minuti.\nAppena sfornato, coprire il ciambellone  con un foglio di alluminio e lasciarlo così per almeno 10 minuti. Infine toglierlo dallo stampo e conservarlo sotto una campana di vetro, così  rimarrà  morbidissimo per diversi giorni.\nIl ciambellone potrà  essere profumato anche con l'arancia o il lime.\nSuggerimento di Natalia: non cuocere il ciambellone oltre il tempo di cottura, e coprirlo col foglio di alluminio per trattenere l'umidità,  che col calore tende a evaporare, e così  resterà  soffice più  a lungo.","note":"","tags":[],"_importId":14112},{"nome":"Ogni tanto si ha bisogno del","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"e allora non resta che cercare la ricetta di Vittorio Viarengo  e farselo in casa, e così  ho fatto. \nIngredienti: ( Vittorio ci fornisce le dosi per 2 pani in cassetta,  per 2 stampi  da 24×13 cm, e scrivo la sua ricetta, ma come sempre faccio, ho diviso per me la dose a metà,  e  per chi ne volesse fare due, do' la ricetta completa)\n930 gr di farina 00 - 35 gr di zucchero - 4 gr di malto ( opzionale) - 80 gr di burro a temperatura ambiente -  12  gr di lievito secco - 24 gr di sale.\nPreparazione: sciogliere il lievito nell'acqua, unire il malto ( opzionale) e lo zucchero, e mescolare, poi metà  farina. Cominciare a impastare , e quando la farina è  assorbita, unire il burro a pezzetti, a temperatura ambiente. Aggiungere il sale, a poco a poco la restante farina, e dopo 4-5  minuti, fermare l'impastatrice. Rovesciare la pasta su se stessa, raschiare le pareti, e continuare ad impastare per 8-10 minuti. Poi spolverare la spianatoia di farina, rovesciarvi l'impasto, e con le  mani fare una palla. Spolverare anche questa di farina, e chiuderla con la pellicola trasparente, in.modo che non faccia la crosta. Coprire e far lievitare per 45 minuti. ( se è  d'inverno usare il sistema del forno spento con la luce accesa). A questo punto, dividere la pasta in due, e preparare i due stampi per il.pane in cassetta, ben imburrati. \nPiegare in tre  ogni parte di pasta,  coprire e far riposare per 10.minuti,  poi schiacciare  i due impasti facendo di ognuno un rettangolo  largo come le teglie.  Piegare un terzo di ogni impasto su se stesso,  poi  sovrapporre il resto della pasta sulla prima piega, e fare rotolare, ottenendo 2 cilindri. Inserire i due cilindri nei due stampi imburrati,  con il taglio posizionato al di sotto. Spennellare con un rosso  d'uovo misto ad un goccio di acqua, coprire con  pellicola, e  far lievitare per per 60-75 minuti. Forno preriscaldato a.220 gradi, infornare e abbassare subito a 190 gradi, e cuocere per 30-35 minuti. Freddare bene i pani prima di toglierli dagli stampi.","note":"","tags":[],"_importId":9333},{"nome":"originale)","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"n°","name":"zucchero"},{"qty":200.0,"unit":"ml","name":"latte circa"},{"qty":4.0,"unit":"n°","name":"uova"},{"qty":200.0,"unit":"ml","name":"olio"}],"procedimento":"Ricetta\nFarina 1 kg\n300 di zucchero \n200 ml di latte circa\n4 uova\n200 ml di olio \nAmmoniaca per dolci da sciogliere in latte tiepido(sottrarre dai 200 ml)\n180° x 20/25 minuti","note":"","tags":[],"_importId":13099},{"nome":"Pan Brioche Dolce Infallibile Sofficissimo","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina manitoba"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":3.0,"unit":"n°","name":"uova a temperatura ambiente"},{"qty":80.0,"unit":"g","name":"burro morbido"},{"qty":150.0,"unit":"ml","name":"latte tiepido"},{"qty":12.0,"unit":"g","name":"lievito di birra fresco"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":1.0,"unit":"n°","name":"tuorlo d’uovo + 2 cucchiai di latte"},{"qty":null,"unit":"q.b.","name":"zucchero a velo"},{"qty":null,"unit":"q.b.","name":"granella di zucchero"}],"procedimento":"Preparazione:\n1. Sciogli il lievito nel latte tiepido con 1 cucchiaino di zucchero e lascia riposare per 10 minuti finché si formerà una leggera schiuma in superficie.\n2. Versa nella ciotola la farina setacciata, lo zucchero e il latte con il lievito sciolto.\n3. Inizia a impastare e aggiungi le uova una alla volta, facendole assorbire bene.\n4. Unisci l’estratto di vaniglia o la scorza e aggiungi il sale.\n5. Aggiungi il burro morbido poco alla volta continuando a impastare fino a ottenere un impasto liscio, elastico e ben incordato.\n6. Forma una palla, trasferiscila in una ciotola unta, copri con pellicola e lascia lievitare 2–3 ore fino al raddoppio.\n7. Trasferisci l’impasto su una spianatoia infarinata, dividilo in 3 pezzi e forma dei filoni.\n8. Intreccia i filoni o forma delle palline, poi metti in uno stampo da plumcake imburrato e infarinato.\n9. Copri e lascia lievitare nuovamente per 40–60 minuti.\n10. Preriscalda il forno a 180°C statico o 170°C ventilato.\n11. Spennella il pan brioche con il tuorlo d’uovo e il latte.\n12. Cuoci per 30–35 minuti finché sarà gonfio e dorato, coprendo con alluminio se si scurisce troppo.\n13. Lascia raffreddare su una gratella e spolvera con zucchero a velo.","note":"","tags":[],"_importId":14939},{"nome":"PAN BRIOSH AL LATTE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina 0"},{"qty":200.0,"unit":"ml","name":"latte intero"},{"qty":100.0,"unit":"ml","name":"panna fresca liquida"},{"qty":80.0,"unit":"g","name":"zucchero"},{"qty":30.0,"unit":"g","name":"burro"},{"qty":8.0,"unit":"g","name":"lievito di birra fresco"},{"qty":8.0,"unit":"n°","name":"q.b.zucchero a velo"}],"procedimento":"Preparate dapprima un lievitino: fate sciogliere il lievito di birra in 100 ml di latte appena tiepido. Aggiungete 100 grammi di farina e mescolate con una forchetta a formare una densa pastella. Coprite la ciotola con la pellicola e lasciate lievitare per circa 2 ore.  \n\t\tPotete preparare l’impasto del pan brioche sia a mano che con una impastatrice. Mescolate il lievitino con il resto del latte e la panna liquida. Aggiungete lo zucchero e il resto della farina. Aggiungete anche il burro fuso continuando a mescolare.  \n\t\tImpastate per bene e a lungo fin quando l’impasto si staccherà dalle pareti della ciotola. Trasferitelo sul piano di lavoro e stendetelo e ripiegatelo più volte su se stesso per dare forza all’impasto. Formate poi una palla, trasferitela in una ciotola infarinata, copritela con la pellicola e lasciatela lievitare per circa 3 ore in un luogo tiepido. \n\t\tRiprendete l’impasto e dividetelo in tre parti uguali. Arrotolateli a formare tre salsicciotti e intrecciateli tra loro a formare una treccia. Oliate uno stampo da plumcake di 30 cm di lunghezza e sistemateci all’interno la treccia di Pan brioche. Lasciate lievitare per circa 1 ora o finché l’impasto arriverà al bordo superiore dello stampo.  \n\t\tSpennellate la superficie del Pan brioche al latte con del latte e lasciatelo ancora lievitare intanto che il forno si riscalda. Preriscaldate il forno a 180°. Fate cuocere il Pan brioche nel forno caldo per circa 20-25 minuti. Se notate che scurisce troppo in superficie, copritelo con un foglio di carta stagnola. Lasciatelo raffreddare prima di estrarlo dallo stampo e spolverizzatelo a piacere con dello zucchero a velo.  \nI consigli di Loredana\nPuoi sostituire il burro fuso con 40 ml di olio di semi e la panna liquida con 100 ml di latte intero\nIl Pan brioche si conserva morbidissimo per più giorni in un contenitore o in una busta per alimenti. Puoi anche surgelarlo a fette e riscaldarlo per pochissimi minuti nel forno caldo","note":"","tags":[],"_importId":10312},{"nome":"PAN D'ARANCIO  Frulla gli ingredienti e versa in teglia","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione:\n\n1. Taglia le arance a pezzetti, lasciando la buccia.\n\n2. Metti le arance nel mixer con l’olio di semi.\n\n3. Aggiungi il latte e frulla per 1-2 minuti.\n\n4. Unisci le uova e continua a frullare.\n\n5. Aggiungi lo zucchero e frulla di nuovo per amalgamare.\n\n6. Incorpora la farina, la fecola e il lievito. Frulla fino a ottenere un composto liscio e senza grumi.\n\n7. Versa l’impasto in uno stampo a cerniera da 20 cm foderato con carta forno.\n\n8. Cuoci in forno statico a 180 °C per 50 minuti (prova stecchino per sicurezza).\n\n9. Lascia raffreddare completamente, poi sforma e spolvera con zucchero a velo.","note":"","tags":[],"_importId":14306},{"nome":"Pan di mela","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"zucchero —> io ne metto 70 gr"}],"procedimento":"2 uova ne ho messe 3 piccole (tuorlo con zucchero poi per ultimi nell’impasto aggiungo albumi a neve)\n50 gr olio di semi\nBuccia e succo di mezzo limone (la buccia la frullo con la mela)\n300 gr di mela senza torsolo e a tocchetti\n180 gr farina 00 (io uso @farinaistinta )—> io ho messo 80 farina di riso\nAmido di mais 60 gr\nFarina azzurra con lievito 60 gr (tot 200gr) setacciata con bicarbonato \n1 bustina di lievito per dolci—> io ho messo 10 gr bicarbonato di sodio (2 cucchiaini)\nPinoli tostati 5 min in padella\nUvetta e frutti rossi ammorbiditi in acqua calda per mezz’ora (latte? Da provare) e scolati \n(Albumi montati)\nDimensione stampo diam 20 cm\nCottura: posto basso del forno\npreriscaldato a 180 gradi per 50/60 min","note":"","tags":[],"_importId":15994},{"nome":"pan di Spagna in casa","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: 6 uova - 225 gr di zucchero - 225 gr di farina 00 - un pizzico di sale.\nPreparazione: MONTARE PER 15 MINUTI LE UOVA CON UN PIZZICO DI SALE,  (messo in maiuscolo perché  il trucco è  tutto  qui, e parlo di fruste elettriche, non un  minuto di meno. Setacciare bene la farina,  unirla al composto di uova lavorando a mano,  dall'alto verso il basso, senza lavorare troppo per non smontare le uova. Imburrare  una teglia da 24 cm e usare la carta forno o meglio lo Staccante che vi ho insegnato tante volte ,  sempre della Catellani : 50 gr di burro, 50 di farina, 70 di olio di semi uniti assieme. Lo staccante  si mantiene per un mese nel frigo.\nCuocere il Pan di Spagna in forno statico preriscaldato a 180 gradi per 30 minuti , facendo sempre la prova stecchino.\nFreddare su gratella.\nCopiate questa ricetta per averla sempre sotto mano. \nTutto questo lo avevo spiegato a giugno, ma repetita Juvant, in vista del dolce da preparare, naturalmente per chi è  interessato .","note":"","tags":[],"_importId":9654},{"nome":"PAN D’ARANCIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"400 g di arance non trattate (con la buccia) noi usiamo quelle che arrivano a ferrara e sono in vendita presso un negozio di prodotti siciliani (hanno tutti ottimi prodotti), 120 g di latte, 100 g di olio di arachide, 230 g di zucchero semolato, 3 uova, 250 g di farina 00, 50 g di fecola di patate, lievito per dolci 1 bustina, 1 pizzico di sale, zucchero a velo per guarnire la torta\nIl pan d'arancia è chiamato anche pan d'arancio, è un dolce tipico siciliano che prevede nell'impasto l'aggiunta di arance intere, buccia compresa.\nL'importante è usare arance  non trattate in superficie quindi buccia edibile.\nProcedimento;\nCome prima cosa si lavano le arance quindi si asciugano, si tagliano a pezzi senza sbucciarle. Controllare non vi siano semi metterle in un mixer insieme all’olio e al latte. Si frulla il tutto. \nAggiungere le uova, lo zucchero e la farina setacciata con la fecola. Frullare di nuovo per poco tempo.\nSi mette il lievito, il sale si frulla ad ottenere un composto omogeneo. \nSi mette il composto  in una teglia da forno rivestita da carta forno.\nForno preriscaldato a 180°C, si inforna per circa 50 minuti controllando alla fine la cottura con uno stecchino. Aprire il forno e far raffreddare il dolce.\nUna volta tiepido si toglie e si fa raffreddare completamente e si spolvera con zucchero a velo…\nOttimo dolce con ogni volta un diverso grado di dolcezza dipende dalla dolcezza della arance.","note":"","tags":[],"_importId":15848},{"nome":"PAN FOCACCIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"della blogger Natalia Cattelani , da lei preparato  senza impastatrice , ma lavorando solo in ciotola. Certo sarebbe venuto meglio usando la dose che ora vi fornisco. \nIngredienti: 500 gr di farina 0 ( w 270 - proteine 13) - 400 gr di acqua a temperatura ambiente -  3 g di lievito secco - 3 cucchiai di olio evo più  quello per ungere la teglia e  per condire - 10 gr di sale - rosmarino.\nPreparazione: in ciotola mettere farina e  lievito, mescolare, poi tutta l'acqua a temperatura  ambiente e amalgamare per bene, coprire e far riposare per 10 minuti. Poi sempre in ciotola, fare due giri di pieghe dall'esterno verso l'interno, unire il sale,  e continuare a mescolare facendo sempre le pieghe, fino a non sentire più  il sale sotto le mani. Coprire e fare ancora un riposo di dieci minuti. Riprendere l'impasto, ed è  giunto il momento di aggiungere l'olio evo, continuando a fare il giro di pieghe per almeno due o tre minuti. A questo punto coprire nuovamente e far riposare fino al raddoppio, per almeno 30 minuti. \nFar nuovamente un giro di pieghe per rinforzare l'impasto, che diventerà  sempre più  liscio. Coprire nuovamente e ancora riposo per 40 minuti..Portare  sulla  spianatoia infarinata, continuando a fare le pieghe fino a formare una palla. Ungere una teglia  da forno, fare un panetto morbido, collocarlo al centro della teglia, e con le dita fare I soliti buchi fino a raggiungere i bordi della teglia. Aromatizzare con rosmarino e condire con olio evo e sale. Infornare in forno statico preriscaldato a 200 gradi per 20 minuti nella parte più  bassa del forno,  e per altri 5 minuti a metà  altezza del forno.","note":"","tags":[],"_importId":10463},{"nome":"Pan Tranvai","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina integrale o di tipo 2"},{"qty":400.0,"unit":"g","name":"uvetta"},{"qty":300.0,"unit":"ml","name":"acqua"}],"procedimento":"Le ricette moderne prevedono l’utilizzo di farine forti, tecniche, piene di glutine, per avere alveolature grandi, ma vi garantisco che 100 anni fa se vendevi un pane con buchi grossi ti avrebbero accusato di vendere aria. Restiamo nella tradizione.\nMetti la farina in una ciotolona, fai il buco al centro e versa l’acqua a temperatura ambiente. Aggiungi il lievito o la pasta madre e li sciogli bene. Unisci sale e olio o strutto e mischia. Aggiungi l’uvetta senza ammollarla e impasta fino a ottenere un composto omogeneo, rustico, non troppo liscio.\nConsiglio dello chef\nSe hai della pasta di pane o pizza avanzata per qualche motivo utilizza direttamente quella aggiungendo solo l’uvetta.\nFai lievitare qualche ora finché non vedi il raddoppio del volume dell’impasto.\nRovescia sul tavolo, reimpasta velocemente, forma 2 o 3 filoncini e infarinali molto bene.\nAppoggiali su una teglia, coprili con un canovaccio e mettili subito in frigorifero per 8–10 ore. Conviene farli la sera per la mattina.\nAl mattino tira fuori dal frigo, accendi il forno e portalo a 200°C.\nFai un’incisione profonda mezzo centimetro per la lunghezza del pane e inforna per 30 minuti.\nIl pane deve essere ben cotto.\nOttimo anche il giorno dopo, anzi, secondo me è migliore.","note":"","tags":[],"_importId":15920},{"nome":"PANCAKE ALLA NUTELLA 🤎","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":95.0,"unit":"g","name":"farina 00"},{"qty":4.0,"unit":"g","name":"lievito in polvere"},{"qty":1.0,"unit":"g","name":"bicarbonato"},{"qty":20.0,"unit":"g","name":"zucchero"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":80.0,"unit":"g","name":"yogurt greco"},{"qty":40.0,"unit":"g","name":"latte"},{"qty":15.0,"unit":"g","name":"olio"}],"procedimento":"– Mescolate ingredienti secchi\n– Mescolate ingredienti liquidi\n– Unite i due, mescolate 20 secondi\n– Versate 1 cucchiaio di impasto sulla padella\n– Mettete 1 cucchiaino di Nutella al centro\n– Coprite con mezzo cucchiaio di impasto\n– Cuocete con il coperchio, 2 minuti per lato. BUON PANCAKE : )\nTRUCCO EDEN: coprite bene la Nutella con l'impasto. Se resta scoperta, brucia.","note":"","tags":[],"_importId":16237},{"nome":"PANCAKES DI MELE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"mele"},{"qty":150.0,"unit":"g","name":"farina 00 🌾"},{"qty":50.0,"unit":"ml","name":"latte 🥛"},{"qty":50.0,"unit":"g","name":"zucchero semolato 🍚"},{"qty":30.0,"unit":"ml","name":"olio di semi 🌻"},{"qty":2.0,"unit":"n°","name":"uova 🥚"},{"qty":1.0,"unit":"cucchiaino","name":"lievito in polvere per dolci 🧁"}],"procedimento":"Olio di semi q.b. per cuocere 🌻\n👩‍🍳 Preparazione\n👇😍😍\n  Passo 1: In una ciotola capiente, rompi le uova e aggiungi lo zucchero e la scorza grattugiata del limone. Sbatti il tutto con una frusta a mano fino ad ottenere un composto omogeneo e leggermente spumoso.Passo 2: Aggiungi il latte e l’olio di semi, continuando a mescolare bene.Passo 3: Incorpora la farina setacciata insieme al lievito per dolci, lavorando la pastella fino a renderla liscia e senza grumi.Passo 4: Pulisci e taglia le mele a piccoli cubetti, quindi uniscile all’impasto. Mescola delicatamente per distribuire la frutta in modo uniforme.Passo 5: Scalda una padella antiaderente e spennellala con un po’ di olio di semi. Versa un mestolino di pastella nella padella calda e forma un dischetto. Lascia cuocere a fuoco medio finché sulla superficie compaiono delle bollicine, poi gira con attenzione il pancake e cuoci anche l’altro lato.Passo 6: Impila i pancakes pronti su un piatto e spolvera con abbondante zucchero a velo. Servili ancora caldi.\n🍽️ Come Servire & Conservare\nQuesti pancakes sono deliziosi appena fatti. Si conservano in un contenitore ermetico in frigorifero per un giorno e possono essere riscaldati in una padella antiaderente o al microonde. 🍽️\n🎨 Consigli & Varianti\nPer un sapore più intenso, puoi aggiungere all'impasto un pizzico di cannella in polvere. Se vuoi, puoi anche aggiungere una manciata di noci o mandorle tritate. Servili con sciroppo d'acero, miele o una pallina di gelato per una merenda ancora più golosa. 🎨\n⏱️ Tempo di Preparazione\nTempo di Preparazione: 15 minuti | Tempo di Cottura: 2-3 minuti per pancake | Tempo Totale: 25 minuti | Calorie: non specificate | Porzioni: non specificate ⏱️\nSpero che questi pancakes ti rendano felice come un bambino! Fammi sapere nei commenti se li hai provati e con cosa ti piace abbinarli. Buon Appetito! 😊","note":"","tags":[],"_importId":15342},{"nome":"PANE AL ROSMARINO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Abituata per anni a fare il pane di pasta madre il sabato, ora che lo faccio solo per me, è  diventato un avvenimento. Ma con la nuova planetaria, regalo a Natale di mia figlia, è  veramente anche un gioco. Prima cominciavo il giovedì per avere il pane il sabato, ora basta iniziare dal giorno  prima. Al mattino rinfresco la madre e nel pomeriggio parte la biga col primo impasto che tutta la notte  lievita  a temperatura ambiente. Al mattino seguente si da' forma al pane, e stavolta ho scelto di fare la pagnotta al rosmarino,  come ci ha insegnato Vittorio Viarengo , terminata con la spennellata di burro fuso , rosmarino e  sale grosso. E il risultato è  questo che vi mostro nelle foto.","note":"","tags":[],"_importId":10376},{"nome":"PANE AL ROSMARINO CON LIEVITO MADRE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"300gr di acqua tiepida - 300 gr farina 00 -'150 gr Manitoba. 150 gr di.lievito madre ,- 1 cucchiaino di malto - 1 cucchiaino di.miele  - 8 gr sale fino.\nGancio a spirale ( il seguito a dopo)\nA Lucio Fruet:\nSpezzare il lievito madre in ciotola, più  acqua a temperatura ambiente, poi la farina 00, la Manitoba, il malto e il miele,  mettere la planetaria a velocità  1 per 2 minuti, poi il sale fino, e a velocità 4 × 5 pminuti.\nSul piano di lavoro infarinato mettere la pasta, fare due pieghe, poi mettere l'impasto in ciotola, coprire e far lievitare per un'ora.  Poi sgonfiare l'impasto, fare 2 pieghe, mettere in contenitore oliato, coprire ermeticamente e far lievitare per tutta la notte.\nPIl giorno dopo rovesciare sul.piano di lavoro  formare un rettangolo con  i polpastrelli, fare 2 pieghe. Ripetere questa  operazione per 2 volte, poi formare o una pagnotta o un filoncino. Sistemare su una teglia con carta forno, coprire con pellicola e con un canovaccio, e far lievitare al raddoppio. Scaldare intanto il forno. Con una lametta fare del tagli trasversali, e per rendere la crosta croccante, nebulizzare la superficie con acqua.  Cuocere per 10 minuti, poi abbassare il forno a 180 gradi e proseguire per 40 minuti. Freddare  come ci ha insegnato Vittorio Viarengo , su una griglia , \nnel forno con parte dello sportello aperto, \nRicetta della Planetaria Kenwood.","note":"","tags":[],"_importId":12301},{"nome":"PANE ALL’ARANCIA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Questo è  un pane un po' diverso dal solito, preparato. da Fulvio Marino e visto inTV a \" È  sempre mezzogiorno\" e subito  copiato:\nPANE ALL' ARANCIA\n Premetto che all'inizio.credevo fosse un dolce e invece, pur essendo vagamente dolce, una volta pronto lo hanno unito a salumi e formaggi.\nIngredienti.per 2 filoni (io come mio solito ho diviso tutto in due, ma la ricetta la do' per 2 filoni,  come l'hanno fatta in T.V.): 500 gr farina tipo 0 - 500 farina tipo 2 - 200 gr di  pasta madre rinfrescata oppure 7 gr di lievito di birra secco - 400 gr di acqua- 200 gr di succo di arancia - 30 gr di olio di semi-  100 gr di arancia candita a cubetti - 100  gr di.pistacchi sgusciati -
