i birra fresco"},{"qty":0.5,"unit":"cucchiaino","name":"zucchero"},{"qty":18.0,"unit":"g","name":"sale"},{"qty":600.0,"unit":"g","name":"cipolle bianche"}],"procedimento":"Inserire in una ciotola le farine, il lievito, lo zucchero e il sale. Mescolare e versare al centro  l'acqua. Girare con un cucchiaio. Coprire con una pellicola e far lievitare fino a quando non ha triplicato il volume.\nRovesciare l'impasto sul piano di lavoro e procedere con pieghe, due a portafoglio. \nTrasferire l'impasto cosi com'è nella teglia oliata e stenderlo con i polpastrelli allargando fino ai bordi. \nAdagiare sopra le cipolle tagliate a fettine precedentemente su tutta la superfice. Condire con l'olio e il sale grosso. \nLasciar lievitate per 45 minuti e poi infornare a forno preriscaldato a 200° per 25 minuti circa (dipende da forno a forno) e in fine 5 min nella parte superiore attivando il grill. 👋","note":"","tags":[],"_importId":7234},{"nome":"Focaccia con scarola","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":0.5,"unit":"n°","name":"dose:","sezione":"PER IL RIPIENO"}],"procedimento":"fatto pasta matta con 260gr di farina,60gr di olio evo e 110gr di acqua fredda e mezzo cucchiaino di sale\n334:242=260:x\nX=242x260:334=188,","note":"","tags":[],"_importId":13156},{"nome":"Focaccia con sola semola","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"È pronta in poche ore e sarà abbastanza semplice da preparare. \n- 520 g Semola rimancinata di grano duro\n- 415 g Acqua fredda \n- 5 g Lievito di birra fresco (2 g LdB secco)\n- 5 g Malto diastasico (facoltativo)\n- 12 g Sale\n- 20 g Olio EVO\nPer l’emulsione\n- 50 g Acqua \n- 30 g Olio EVO\n- 4 g Sale\n🔸In una ciotola impasta brevemente e in modo grezzo la semola con 375 g di acqua. Copri la ciotola e falla riposare 30/60 minuti in frigorifero (in estate).\n🔸Impasta a velocità medio/bassa l’impasto di semola e acqua con il lievito, il malto e poca acqua. Quando si formerà una massa compatta, aumenta la velocità e versa l’acqua rimanente poco per volta. Con l’ultima parte metti il sale, aumenta la velocità, e dopo qualche minuto versa l’olio a filo, poco per volta. Continua fino ad avere un impasto liscio. \n🔸Mettilo sul piano, coprilo e dopo 20 minuti fai una piega di rinforzo \n🔸Sistema l’impasto in un contenitore unto e fai lievitare fino al raddoppio del suo volume iniziale. Al caldo,\ncirca 2 ore.\n🔸Rovescia l’impasto sulla teglia unta di olio e allargalo, senza sgonfiarlo, fino a coprire tutta la superficie. Se si ritrae, copri e riprova dopo 10/15 minuti. \n🔸Copri la teglia e fai lievitare fino al raddoppio del suo volume. Meno di 2 ore a 28 gradi.\n🔸Prepara l’emulsione, mescolando energicamente gli ingredienti, versala sulla focaccia e schiaccia con le dita.\n🔸nforna in basso su pietra refrattaria o nella parte bassa del forno a 250 gradi per circa 20 minuti, o fino a doratura. \n🔸Sforna e per un fondo più friabile, metti subito la focaccia a raffreddare su una griglia. \n📌Salva il video e vedi nel mio canale YT il procedimento completo. Per una focaccia di semola fantastica! \n#focaccia #focacciafattaincasa #semola #semolarimacinata","note":"","tags":[],"_importId":14990},{"nome":"FOCACCIA DI SAN GIUSEPPE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Impasto le farine aggiungendo il lievito sciolto nell'acqua tiepida, l'olio, il vino e il sale [1]. Lavoro l'impasto a lungo, a mano o con la planetaria, fino a renderlo liscio e non appiccicoso. Formo un panetto e faccio lievitare coperto fino al raddoppio di volume [2].\n  Ammollo l'uvetta in acqua tiepida. Nel frattempo, pulisco i cipollotti eliminando la base terrosa e la parte verde più dura [3]. Li taglio per il lungo in quarti [4].\nTrasferisco i cipollotti in una padella con un filo d'olio e li cuocio a fuoco dolce [4]. Aggiungo un pizzico di sale e 2 cucchiai di acqua, quindi li faccio stufare per 15 minuti circa fino a che l'acqua non sarà evaporata. Tengo da parte [5].\n  Riprendo l'impasto lievitato, lo stendo sul piano di lavoro infarinato, allargandolo con le mani per ottenere un rettangolo di circa 50x30 cm [6]. Distribuisco i cipollotti stufati su tutta la superficie [7]\n  Aggiungo le acciughe a pezzetti e le olive [8] Concludo con l'uvetta ben strizzata e un filo d'olio [9].\n  Arrotolo partendo dal lato lungo fino a formare un rotolo uniforme. Lo avvolgo su sé stesso per formare una spirale e trasferisco l'impasto in una teglia leggermente oliata di 24-26 cm di diametro. Faccio lievitare per un'ora, quindi spennello con l'olio e inforno la focaccia a 220 gradi in forno ventilato per 30 minuti circa.","note":"","tags":[],"_importId":16426},{"nome":"FOCACCIA GENOVESE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti:190 ml di acqua a temperatura ambiente - 320 gr di farina 0- 20 gr di.olio evo- 7 gr di sale- 3 gr di malto o di miele- 6 gr di lievito di birra disidratato o  17 gr fresco.\n  Preparazione: versare nella ciotola della impastatrice l'acqua, l'olio evo, il.malto, mescolare, poi meta' farina e mescolare ancora. Quando\nla farina è  assorbita, unire il lievito sciolto a 30 gradi, e poco alla volta la farina restante. Coprire e far riposare per 10-15 minuti. Versare dell'olio su una teglia 40.per 25, e dopo.il riposo fare sulla spianatoia delle pieghe, formare un\npanetto di circa 540 gr, postarlo sulla teglia unta, rivoltarlo, coprire e far lievitare per 30-60 minuti. Schiacciarlo con\nle mani,  fino ai bordi della teglia, sopra del sale grosso,  della cipolla a fette sottilissime, condita con\nolio e sale ,dopo averla cotta e poi freddata, per circa 2 minuti  nel microonde. A questo punto ho scelto di cuocere la mia Focaccia il giorno dopo, l'ho coperta molto bene con pellicola, e l\"ho messa nel frigorifero, nella parte meno fredda a 5 gradi, e stamattina, calcolando che fosse pronta per pranzo, l'ho tolta alle 10,30, l'ho messa nel forno spento con la luce accesa, e alle 12,30, l'ho infornata a 220 gradi nel forno preriscaldato, per 15 minuti circa . Mi sembra che sia venuta molto bene, nel.pomeriggio verra' il nipote a prendersela . Ma stavolta, dato che un pezzo me la sono tenuta per me, ho voluto mantenere la promessa fatta ad Angelo Simonini e a nonna Laura, di pucciare la Focaccia nel cappuccino, e finalmente la promessa l'ho mantenuta, pucciando la vera Genovese, con tanto di cipolla, nel cappuccino... Comincio a diventare anche io un po' Genovese ...Niente male...davvero...e non mi resta che dire: \" Viva la Focaccia!\"","note":"","tags":[],"_importId":7955},{"nome":"FOCACCIA LIGURE (dose per due teglie da forno)","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"acqua"},{"qty":800.0,"unit":"g","name":"farina 00"},{"qty":150.0,"unit":"g","name":"lievito madre"},{"qty":8.0,"unit":"g","name":"miele"},{"qty":20.0,"unit":"g","name":"sale"},{"qty":50.0,"unit":"g","name":"olio"}],"procedimento":"Tempo totale (15+15+60+40+60+20=3 ore e 30 min senza lavorazione quindi direi circa 4 ore tot \nSe devo fare prima rinfresco aggiungo 4 ore per un tot di 8 ore\nPer focaccia per cena alle 19.30 inizio col rinfresco alle 11.30)\nPROCEDIMENTO\n\nAcqua (480 gr) 1/2lt+ olio 50gr+ sale 20gr+ miele 8gr \n1/2 farina => impasto in modo che l’acqua sia tutta assorbita poi \nLievito + tutta la farina rimasta\nLavoro 15 minuti con la planetaria o a mano\nMetto su base di legno e copro bene con canovaccio \n15 min a riposo\n\nFaccio 1 o 2 pieghe a metà \nOlio su teglia\nLa appoggio e la giro per ungerla anche sopra \nIn forno con luce accesa 1 ora\n\nStendo bene senza tirare ma schiacciando con dita poi metto sale sopra e in forno spento con luce per 30/40 min circa\n\nPreparo condimenti\n\nSopra acqua tiepida e olio\nLi spargo bene sulla superficie \nFaccio buchi con le dita\nMetto condimenti ( cipolle o pomodorini ecc)\nIn forno spento per 60 min\n\nAccendo forno a 220 gradi metto la focaccia 20 minuti \nTiro fuori su gratella\nSpennello subito un po’ di olio buono sulla focaccia e...\nbuon appetito!!!","note":"","tags":[],"_importId":7876},{"nome":"Focaccia millebolle di Fulvio Marino","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 0"},{"qty":250.0,"unit":"ml","name":"acqua"},{"qty":90.0,"unit":"ml","name":"acqua"},{"qty":4.0,"unit":"g","name":"lievito di birra fresco"},{"qty":10.0,"unit":"g","name":"sale"},{"qty":50.0,"unit":"ml","name":"olio extravergine di oliva"},{"qty":300.0,"unit":"g","name":"pomodorini","sezione":"Per il condimento"},{"qty":100.0,"unit":"g","name":"olive snocciolate","sezione":"Per il condimento"},{"qty":null,"unit":"q.b.","name":"olio extravergine di oliva","sezione":"Per il condimento"},{"qty":null,"unit":"q.b.","name":"origano","sezione":"Per il condimento"},{"qty":null,"unit":"q.b.","name":"sale","sezione":"Per il condimento"},{"qty":null,"unit":"q.b.","name":"pepe","sezione":"Per il condimento"}],"procedimento":"Preparazione:\n1. In una ciotola capiente, mescolate la farina con l’acqua fino a ottenere un impasto sodo.\n2. Coprite e lasciate riposare per 45 minuti.\n3. Aggiungete il lievito sbriciolato e l’acqua rimanente, mescolando fino a incorporare.\n4. Unite il sale e lavorate l’impasto per qualche minuto.\n5. Versate l’olio e continuate a impastare fino a completo assorbimento.\n6. Coprite e lasciate lievitare per 90 minuti a temperatura ambiente.\n7. Trasferite l’impasto in una teglia ben oliata, stendendolo delicatamente senza schiacciare.\n8. Coprite e fate lievitare per 1 ora e mezza.\n9. Condite con pomodorini tagliati a metà, olive, origano, sale, pepe e un filo d’olio.\n10. Lasciate lievitare per altri 20 minuti.\n11. Cuocete in forno preriscaldato a 240°C per circa 30 minuti.","note":"","tags":[],"_importId":14506},{"nome":"Focaccia nel Mastro","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":520.0,"unit":"g","name":"farina"},{"qty":25.0,"unit":"g","name":"miele"},{"qty":315.0,"unit":"g","name":"acqua"},{"qty":25.0,"unit":"g","name":"olio"},{"qty":7.0,"unit":"g","name":"sale"},{"qty":25.0,"unit":"g","name":"lievito di birra fresco"},{"qty":40.0,"unit":"g","name":"olio evo","sezione":"Per la salamoia"},{"qty":150.0,"unit":"g","name":"acqua","sezione":"Per la salamoia"},{"qty":10.0,"unit":"g","name":"sale","sezione":"Per la salamoia"}],"procedimento":"Ungere la teglia e stenderla più uniforme possibile lasciare riposare 5 minuti e finire di stendere sino ai bordi.\nLasciare lievitare per 60/90 minuti a 28° con un canovaccio sopra deve raddoppiare\nPassata un'ora bucare con le mani e mettere la salamoia sopra\nLasciare lievitare  sempre a 28° x 50 minuti\nCottura 80% cielo 70% platea x 10/12 minuti 260°\nI ❤️ Calory-Forni","note":"","tags":[],"_importId":15670},{"nome":"Focaccia ritorta: il segreto che sorprende – Hai mai","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina 00"},{"qty":250.0,"unit":"g","name":"farina manitoba"},{"qty":7.0,"unit":"g","name":"lievito di birra disidratato"},{"qty":320.0,"unit":"g","name":"acqua fredda"},{"qty":10.0,"unit":"g","name":"sale"},{"qty":30.0,"unit":"g","name":"olio extravergine di oliva + q.b. per il piano"},{"qty":1.0,"unit":"cucchiaino","name":"miele"}],"procedimento":"Focaccia ritorta: il segreto che sorprende – Hai mai assaggiato una focaccia che profuma d’estate e nasconde un tocco dolce di miele nell’impasto? Scopri il trucco che la rende unica! 🌿👇\n\n🌞 **INGREDIENTI**\n• 250g farina 00\n• 250g farina Manitoba\n• 7g lievito di birra disidratato\n• 320g acqua fredda\n• 10g sale\n• 30g olio extravergine di oliva + q.b. per il piano\n• 1 cucchiaino di miele\n\n📝 **PROCEDIMENTO**\n1️⃣ **Preparazione impasto**\n• Sciogli il sale nell'acqua fredda\n• Metti farine e lievito nella planetaria con gancio\n• Aggiungi acqua a filo e il miele\n• Impasta fino a che si stacca dalle pareti\n\n2️⃣ **Pieghe e riposo**\n• Ungi piano di lavoro e forma una palla\n• Lascia riposare 15 minuti sotto una ciotola\n• Esegui pieghe a croce: superiore-inferiore, destro-sinistro\n• Ripeti dopo 15-20 minuti di riposo\n\n3️⃣ **Formatura e cottura**\n• Crea un bastoncino di 3,5m lungo e 2,5cm spesso\n• Piega a U e attorciglia i due filoni\n• Arrotola a spirale in teglia oliata (Ø 28-30cm)\n• Lascia lievitare 45 minuti in forno spento\n• Cuoci a 200°C per 30 minuti con ciotolina d'acqua sul fondo\n\n✨ Gustala tiepida per un'esplosione di sapore!\n\n#focaccafatta incasa #lievitatispeciali #ricettafacile #panificazionecasalinga","note":"","tags":[],"_importId":15759},{"nome":"FOCACCINE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"con 600 ml di acqua a temperatura ambiente ho sciolto 6 gr di lievito  disidratato oppure mezzo cubetto di lievito di birra fresco, aggiunto 4  cucchiai di olio di oliva, e piano piano la farina(400 gr di farina  Manitoba,400 gr di semola rimacinata), 15 gr circa di sale fino,ho  impastato tutto per bene,messo in una ciotola  con della pellicola per  coprire tutto l'impasto. Io l'impasto lo ho preparato ieri pomeriggio e  messo in frigo,stamattina ho messo fuori e lasciato lievitare per altre 3  ore! Ho messo abbondante semola su un piano e tagliato le focaccine  ,circa 10. Ho messo in forno a 180/200 gradi per 35 minuti! Dipende dal forno, nel mio anche 45 minuti","note":"","tags":[],"_importId":6972},{"nome":"FOCACCINE ALLO YOGURT IN PADELLA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingfedienti: 350 gr di farina 0 - 1 gr di sale fino - 125 gr di yogurt  bianco - 70 ml di acqua  - 20 ml di olio evo - 8 gr di lievito istantaneo per torte salate  - olio evo per la cottura.\nPreparazione  : in ciotola farina e sale, poi lo yogurt  bianco, l'acqua, l'olio evo e il lievito. Mescolare tutto, poi proseguire a lavorare, anche a mano, fino ad ottenere un panetto liscio. Coprire e far riposare per 10 minuti . Dividere in sei parti per fare 6 focaccine. (Come son solita fare, ho fatto solo metà  dose). Dare una forma tonda alle palline preparate, e stendere con le mani per ottenere dei dischetti non troppo sottili. Cuocerli in padella con olio caldo per 3 minuti per lato. Migliori se serviti caldi.","note":"","tags":[],"_importId":9762},{"nome":"Focaccine Morbide","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina 00"},{"qty":130.0,"unit":"g","name":"acqua a temperatura ambiente"},{"qty":120.0,"unit":"g","name":"latte intero a temperatura ambiente"},{"qty":10.0,"unit":"g","name":"lievito di birra fresco"},{"qty":80.0,"unit":"g","name":"olio extravergine d'oliva"},{"qty":1.0,"unit":"cucchiaio","name":"zucchero"},{"qty":7.0,"unit":"g","name":"sale fino"},{"qty":40.0,"unit":"g","name":"olio extravergine d'oliva"},{"qty":null,"unit":"q.b.","name":"fiocchi di sale"}],"procedimento":"Preparazione 👩‍🍳\nPreparare l'impasto:\n\nVersa la farina nella ciotola di una planetaria munita di foglia e aggiungi il lievito di birra sbriciolato. Inizia a mescolare, aggiungendo poco alla volta acqua e latte.\nUna volta che la farina ha assorbito i liquidi, sostituisci la foglia con il gancio e continua a impastare. Aggiungi lo zucchero, il sale e l'olio d'oliva a filo.\nImpasta fino a ottenere un composto omogeneo che si stacca dalle pareti della ciotola.\nPrima lievitazione:\n\nTrasferisci l'impasto su una spianatoia e lascialo riposare sotto una ciotola per circa 10 minuti.\nForma un panetto liscio e riponilo in una ciotola capiente. Copri con un canovaccio e lascia lievitare a temperatura ambiente per 3 ore.\nSeconda lievitazione:\n\nDopo le 3 ore, copri la ciotola con della pellicola e metti l'impasto in frigorifero a lievitare per altre 10 ore.\nFormare le focaccine:\n\nRecupera l'impasto dal frigorifero e lascialo a temperatura ambiente per circa 30 minuti.\nDividi l'impasto in 8 pezzi da circa 90 g ciascuno. Lavora i pezzetti con le mani per dare loro una forma arrotondata e lasciali riposare per 5 minuti.\nPassa ogni pezzetto nella farina e stendilo con un mattarello per ottenere focaccine di circa 6-7 cm di diametro.\nCottura:\n\nSpennella una teglia con dell'olio d'oliva e disponi le focaccine. Versa un filo d'olio sopra ciascuna e lasciale riposare per 1 ora.\nBucherella le focaccine con la punta delle dita e cospargi con fiocchi di sale.\nCuoci in forno statico preriscaldato a 220°C per 12-13 minuti, finché le focaccine saranno dorate.\nServire:\n\nLascia intiepidire le focaccine su una gratella e servile calde o a temperatura ambiente.\nConsigli 📝\nPuoi farcire le focaccine con salumi, formaggi o verdure grigliate per trasformarle in uno spuntino completo.\nSe desideri conservarle, tienile in un sacchetto di carta per un paio di giorni o congelale dopo la cottura.\nBuon appetito! 😊","note":"","tags":[],"_importId":13070},{"nome":"Formiche","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"cucchiaio","name":"zucchero"},{"qty":4.0,"unit":"cucchiaio","name":"farina"},{"qty":3.0,"unit":"cucchiaio","name":"dentifricio"},{"qty":3.0,"unit":"cucchiaio","name":"acqua"}],"procedimento":"1. **Preparazione dell'impasto**: Mescolare in una ciotola lo zucchero, la farina, il dentifricio e l'acqua fino a ottenere una pasta omogenea.\n2. **Formare delle palline**: con questo impasto, formare delle piccole palline che serviranno da esca per attirare gli insetti.\n3. **Collocare le esche**: posizionare le palline nelle zone in cui sono presenti formiche e acari (cucina, dispensa, dietro i mobili...).\n4. **Azione mirata**: lo zucchero attira gli insetti, mentre il dentifricio agisce come un veleno, eliminandoli rapidamente.\n5. **Ripetizione necessaria**: ripetete l'operazione da 2 a 3 volte alla settimana fino alla completa scomparsa degli insetti. La regolarità è essenziale per ottenere risultati duraturi.\nE questo è quanto! Un metodo semplice, naturale ed efficace per dire addio a formiche e acari.","note":"","tags":[],"_importId":13779},{"nome":"FORNO PRERISCALDATO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"uova"},{"qty":200.0,"unit":"n°","name":"zucchero"},{"qty":1.0,"unit":"cucchiaino","name":"sale"},{"qty":1.0,"unit":"n°","name":"tazza yogurt"},{"qty":300.0,"unit":"n°","name":"farina"},{"qty":1.0,"unit":"cucchiaino","name":"lievito"},{"qty":2.0,"unit":"n°","name":"mele sopra"}],"procedimento":"4 uova\n200 zucchero \n1 cucchiaino sale\nVaniglia\n1/2 tazza olio\n1 tazza yogurt \n300 farina \n1 cucchiaino lievito\n2 mele sopra","note":"","tags":[],"_importId":11279},{"nome":"Forno Tradizionale - Ricetta Plumcake","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina ’00"},{"qty":250.0,"unit":"g","name":"yogurt intero"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":170.0,"unit":"g","name":"zucchero"},{"qty":80.0,"unit":"ml","name":"olio di semi"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci vanigliato"},{"qty":null,"unit":"q.b.","name":"sale"},{"qty":120.0,"unit":"g","name":"gocce di cioccolato"}],"procedimento":"Procedimento\nSbattete le uova con lo zucchero. Dopodiché, aggiungete un pizzico di sale, l’olio, lo yogurt e la buccia grattugiata dell’agrume che avete scelto. Continuate a mescolare e incorporate il lievito e la farina un po’ alla volta. Lavorate gli ingredienti fino a quando non avrete un impasto omogeneo. Infine, aggiungete le gocce di cioccolato e mescolate nuovamente con una spatola. Versate il composto nel nostro contenitore in alluminio, leggermente oleato e infarinato, e infornate per 50 minuti a 170°.\nFate la prova dello stecchino per controllare che il vostro Plumcake con gocce di cioccolato sia cotto. Servite a temperatura ambiente.","note":"","tags":[],"_importId":11591},{"nome":"FRAPPE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ieri con i ricordi arrivati da F. B., mi sono accorta che eravamo entrati nel Carnevale. Una festa che da bambina, quando stavo sfollata in Piemonte a casa dei miei nonni, mi piaceva molto, perché  in paese il Carnevale si viveva  in un  altro modo, giorno per giorno, mentre da quando son tornata a Roma, non so nemmeno cosa sia. Comunque, sempre su F. B. , ho rivisto foto dei dolci di Carnevale , e  subito ho pensato alle Frappe che faceva la mia mamma. Un rito che lei, bravissima a friggere, ha sempre fatto, e io non ho mai osato mettermi al suo confronto. Confesso che la frittura non era il mio forte, poi nei tempi attuali,  con le friggitrici elettriche regalo di mia figlia, mi sono emancipata,  ma le frappe non ho mai voluto farle. Ieri comunque ho ripreso un foglietto dove mamma aveva annotato la sua ricetta personale, e  ho provato a farle. Stavolta non seguo né  Viva la Focaccia, né  Ammira Le MARCHE,  anzi  come per la domenica,  condivido il mio lavoro, dato che se penso che in ogni regione Italiana ha le sue frappe,  fatte con nomi diversi, frappe,  sfrappe, galani, bugie ,etc, io le chiamo Frappe di mamma, e penso che siano quelle di Roma. \nIngredienti per quelle semplici: 300 gr di farina - 20 gr di burro - un rosso d'uovo e un uovo intero  - una precisa di sale - un cucchiaio di zucchero e abbondate olio per friggere .\nPer quelle ripiene, l'involucro è  sempre fatto con questa ricetta, e il ripieno, dato che non l'ha scritto, ma era  , come ricordo,  con la ricotta, cacao, zucchero e un pizzico di cannella.\nPreparazione: impastare tutto con unnpo' di vino bianco, e l'impasto ricorda quello della pasta fatta in casa. Questa pasta deve riposare prima di stenderla e ritagliare con la rotella, delle strisce o dei rettangoli, che poi si friggono in olio abbondante. \nHo seguito questa sua descrizione,  e per quelle ripiene, ho fatto come se preparassi i ravioli. Se penso che mamma, mancata a 101 anni, fino a 95 le friggeva con la classica padella di ferro, regalandole  nel suo palazzo a tante persone ...no,  non mi sono  MAI messa in sua competizione, ma ieri , con le  mie attrezzature moderne, ci ho provato, ed ecco il risultato  ...","note":"","tags":[],"_importId":10229},{"nome":"Frittelle al forno 🥯","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"3 uova 3 cucchiai di olio evo 270 g.farina 00  impasto morbido ,lessati ,lasciati asciugare..cotti al forno 200'per circa mezz ora ..poi dopo aver fatto una glassa con 250g.di zucchero 50ml di acqua e la buccia grattugiata di un limone vengono sciroppati..(messi nel tegame della glassa e mescolati un po sul fuoco e un po fuori) nelle Marche biscottin sciroppati 👋","note":"","tags":[],"_importId":11990},{"nome":"Frulla i limoni con farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"zucchero a velo:","sezione":"Per la superficie"}],"procedimento":"Preparazione:\n\n1- Grattugia la scorza di limone e metti da parte.\n2- Frulla il restante limone, cercando di eliminare il più possibile la parte bianca.\n3- Aggiungi uova e olio di semi.\n4- Frulla fino a ottenere una crema liscia.\n5- Aggiungi zucchero, farina e lievito e frulla ancora.\n6- Aggiungi la scorza di limone e mescola con una spatola.\n7- Versa nello stampo da plumcake.\n8- Cuoci a 180°C per 45 minuti. Trascorso questo tempo, sforna il dolce.\n9- Sformalo e spolverizzalo con lo zucchero a velo. Il tuo pan di limone è pronto per essere servito.\n\nBuon appetito!","note":"","tags":[],"_importId":15065},{"nome":"Frulla zucchine, basilico, mandorle, parmigiano e aglio","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":180.0,"unit":"g","name":"pasta"},{"qty":2.0,"unit":"n°","name":"zucchine piccole"},{"qty":1.0,"unit":"n°","name":"d’aglio"},{"qty":15.0,"unit":"g","name":"mandorle"},{"qty":null,"unit":"q.b.","name":"olio evo"},{"qty":null,"unit":"q.b.","name":"sale"},{"qty":null,"unit":"q.b.","name":"parmigiano grattugiato"}],"procedimento":"Preparazione:\n\n1. Taglia le zucchine a pezzi, lessale 5‑6 min con l’aglio e un pizzico di sale; scola conservando un dito d’acqua di cottura.\n\n2. Frulla zucchine, basilico, mandorle, un filo d’olio e poca acqua di cottura fino a ottenere un pesto cremoso; regola di sale.\n\n3. Cuoci la pasta al dente, scolala e manteca in padella con il pesto. Completa con parmigiano e un filo d’olio.\n\nPronto in 15 minuti, fresco e irresistibile!","note":"","tags":[],"_importId":14618},{"nome":"FUGASSA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Pasqua si avvicina, per noi vicentini la fugassa è il lievitato delle grandi occasioni. \nOra in casa non si prepara quasi più, perché è un dolce lungo a più impasti.\nPazienza e tempo danno ottimi risultati,sia a livello qualitativo e soddisfazione personale.\nGuida.\n1 impasto \n75 grammi acqua tiepida \n8 grammi lievito fresco \n130 grammi farina per grandi lievitati (io panettone z).\n2 impasto \nQuando il lievitino ha raddoppiato \nSbattete in una fondina 1 uovo con 40 grammi di zucchero 30 grammi di burro morbido e impastate con 120 grammi farina, poi aggiungete il primo panetto lievitato e lavorate per circa 15.minuti..io planetaria. \n3 impasto \nTrascorso il periodo di lievitazione \nSbattete 1 uovo con 50 grammi di zucchero, aggiungete 30 grammi di burro e impastate con 120 grammi farina, aggiungete il 2 impasto e lavorate ancora per circa 15 minuti. \n4 impasto \nUna volta lievitato il 3 impasto ( circa 3 ore)\nSbattete 1 uovo con 50 grammi zucchero, 30 grammi di burro e formate un panetto con 130 grammi di farina, poi aggiungete al 3 impasto \nAggiungere, gli aromi,vaniglia, 30 grammi di miele l'arancia, la buccia grattugiata di limone o arancia,7 Gr di sale.Impastate ancora per circa 15 minuti. \nLasciate riposare per circa mezz'ora. \nPoi formate il panetto e mettete nello stampo con la parte arrotondata e liscia verso l'alto.\nLievitazione per circa altre 4 ore.\nAccendere il forno statico a 150..\nFate il classico taglio a croce ,spennellate con l'albume e decorate a piacere con granella di zucchero e nocciole, a piacere le mandorle. \nInfornare per circa 15 minuti a 150..poi aumentare la temperatura a 160 per altri 15 minuti, terminare la cottura a 170 per altri 15 minuti. \nDi solito si serve con un buon bicchiere di vino dolce.","note":"","tags":[],"_importId":8350},{"nome":"GAUFFRES","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina","sezione":"Per la frolla"},{"qty":100.0,"unit":"g","name":"burro","sezione":"Per la frolla"},{"qty":100.0,"unit":"g","name":"zucchero","sezione":"Per la frolla"},{"qty":1.0,"unit":"bustina","name":"vanillina","sezione":"Per la frolla"},{"qty":1.0,"unit":"cucchiaino","name":"lievito in polvere per dolci","sezione":"Per la frolla"},{"qty":1.0,"unit":"pizzico","name":"sale","sezione":"Per la frolla"},{"qty":30.0,"unit":"g","name":"burro","sezione":"Per il ripieno"},{"qty":1.0,"unit":"cucchiaio","name":"marmellata di albicocche","sezione":"Per il ripieno"},{"qty":2.0,"unit":"cucchiaio","name":"zucchero di canna","sezione":"Per il ripieno"},{"qty":1.0,"unit":"pizzico","name":"cannella in polvere","sezione":"Per il ripieno"},{"qty":1.0,"unit":"cucchiaino","name":"fecola di patate","sezione":"Per il ripieno"}],"procedimento":"Metti nel mixer la farina con il burro freddo tagliato a pezzetti, assieme alle uova, zucchero, vanillina, la scorza di un limone e un pizzico di sale. Impasta velocemente fino a formare una palla. Avvolgi la palla nella pellicola e fai riposare per un’ora in frigorifero\nMentre la frolla riposa in frigorifero prepara il ripieno. Sbuccia le mele e riduci in piccoli pezzi. Metti nella casseruola con la marmellata, il burro, lo zucchero di canna, la cannella in polvere e il succo di limone. Cuoci per 3-4 minuti mescolando frequentemente. A questo punto sciogli la fecola in mezzo bicchiere d’acqua e metti nella padella pentola con le mele. Cuoci fino a quando saranno morbide\n\t\tCon il frullatore ad immersione frulla il composto fino ad ottenere una crema. Fai raffreddare  \nImburra e infarina lo stampo a cerniera del diametro di 20 cm Stendi la frolla con il mattarello su di una spianatoia infarinata, rivesti lo stampo tenendo i bordi alti 3 cm circa. Bucherella il fondo con i rebbi della forchetta, versa al suo interno il composto di mele e livella con la spatola Con i ritagli di pasta avanzati ricava tante striscioline e forma il classico reticolato. Spennella infine con un po’ di latte Cuoci in forno già caldo a 180° per 40 minuti","note":"","tags":[],"_importId":11338},{"nome":"GIARDINIERA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Eccomi con la ricetta : verdure a pezzi a seconda della grandezza del barattolo, quest’anno ho usato un po’ di fantasia e oltre alle solite carote e peperoni ho messo dentro ad ogni barattolo precedentemente sterilizzato anche cetrioli sedano fagiolini rapa bianca e finocchi, tutto a crudo. In pentola metto a bollire acqua vino bianco e aceto bianco o di mele un litro per ogni, più un bicchiere di sale e uno di zucchero e pepe nero in granì. Se piace anche qualche foglia di alloro a mia mamma non piace quindi quest’anno niente 😂quando arriva a bollore armatevi di mestolo ed imbuto e riempite i barattoli fino al bordo. Chiudete e mettete i vasi capovolti sopra un panno se dopo qualche ora non si è creato il sottovuoto classico sistema di nuovo in pentola e bollire x 20 minuti . Dopo un mese li potete consumare 🔝😍😍","note":"","tags":[],"_importId":9915},{"nome":"Giovedì","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Mattina alle 6.00 tirare fuori pane stagliarlo e dopo 1/2 ora formare i pani, pennellarli con olio, coprirli con pellicola e metterli in forno nella parte bassa 6.40\nPane hamburger (?)\nAlle 12 tirare fuori l’altro pane a cassetta e procedere come sopra\nPane hamburger (?)\n14.00 piadine\nDosi pane per hamburger \n\t\t340 gr farina 00 ->680 gr\n\t\t1 cucchiaio zucchero->2\n\t\t25 gr burro-> 50\n\t\t100 ml acqua-> 200 ml\n\t\t100  ml latte-> 200 ml\n\t\t2 uova -> 3\n\t\t150 gr lievito madre (rinfrescato)-> 300 gr\n\t\t1 pizzico sale-> 2\n\t\tq.b. semi di sesamo\nPer preparare i vostri panini per hamburger e hot dog cominciate mescolando il lievito madre in una terrina con il latte e l’acqua tiepida. Lavorate con la forchetta finché il lievito sia del tutto sciolto.\nAggiungete una delle due uova e continuate a mescolare. Trasferite il composto nella planetaria e aggiungete la farina, lo zucchero e un pizzico di sale (se impastate a mano mettete la farina a fontana sulla spianatoia e versatevi al centro il composto di lievito e uova).\nCominciate a lavorate l’impasto aggiungendo in un secondo momento il burro morbido.\nTrasferite ora l’impasto sulla spianatoia ben infarinata e formate una palla arrotondandola con le mani.\nCoprite con una pellicola e lasciate lievitare per circa tre ore.\nTrascorso questo tempo procedete con una serie di pieghe di rinforzo, ricoprite con la pellicola e lasciate lievitare ancora un’ora, quindi eseguite una seconda serie di pieghe.\nLasciate lievitare un’altra ora sempre coperto con la pellicola.\nConclusa la fase di lievitazione dividete l’impasto in 10 pezzi tagliandolo con la spatola, formate delle pagnottelle rotonde oppure dei panini allungati a seconda se volete preparare panini per hamburger oppure per hot dog.\nMettete i panini a lievitare per l’ultima volta direttamente su una teglia rivestita di carta forno. Copriteli con un canovaccio e lasciateli riposare ancora un’oretta, quindi prima di infornarli spennellateli con l’altro uovo sbattuto e, nel caso dei panini per hamburger, cospargeteli con i semi di sesamo.\nCuocete in forno a 220° per 15-20 minuti. Lasciateli intiepidire prima di farcirli; se non li consumate subito conservateli in un sacchetto ben chiuso per evitare che si asciughino e riscaldateli prima di servirli.","note":"","tags":[],"_importId":10747},{"nome":"GIRELLE CREMA E UVETTA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":250.0,"unit":"ml","name":"latte tiepido"},{"qty":12.0,"unit":"g","name":"lievito di birra"},{"qty":60.0,"unit":"g","name":"olio"},{"qty":80.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"bustina","name":"vanillina"},{"qty":550.0,"unit":"g","name":"farina"},{"qty":250.0,"unit":"ml","name":"latte","sezione":"PER LA CREMA"},{"qty":1.0,"unit":"n°","name":"uovo","sezione":"PER LA CREMA"},{"qty":50.0,"unit":"g","name":"zucchero","sezione":"PER LA CREMA"},{"qty":15.0,"unit":"g","name":"amido di mais","sezione":"PER LA CREMA"},{"qty":100.0,"unit":"g","name":"uvetta","sezione":"PER LA CREMA"}],"procedimento":"GIRELLE CREMA E UVETTA\nPER L’IMPASTO:\n1 uovo \n250 ml latte tiepido \n12 grammi lievito di birra \n60 grammi olio \n80 grammi zucchero \n1 bustina vanillina \n550 grammi farina (meglio metà 00 metà manitoba)\nPER LA CREMA:\n250 ml latte \n1 uovo \n50 grammi zucchero \n15 grammi amido di mais \n1/2 buccia di limone \n100 grammi uvetta","note":"","tags":[],"_importId":532},{"nome":"Gli ingredienti","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per dodici porzioni circa ti servono: 200 grammi di farina di granturco; due bicchieri di acqua tiepida; un cucchiaino di zucchero; mezzo dado di lievito di birra, sbriciolato; mezza bustina di lievito per dolci non vanigliato; olio di semi di girasole q.b.; sale q.b.\nLa preparazione\nPrendi una ciotola e ci mescoli l’acqua, lo zucchero, il lievito di birra e un primo bicchiere di farina; lavori il tutto con una frusta fino a che ottieni un impasto omogeneo, dopodiché aggiungi il resto della farina, poco per volta, e infine trasferisci la massa sul tuo piano di lavoro (che avrei unto con dell’olio di semi).\nLavora con le mani a formare un panetto liscio e compatto che poi corpi con della pellicola trasparente. Lascia riposare un quarto d’ora, poi riprendi a lavorare la massa, avendo cura, come detto, di ungere spesso le dita.\nQuando l’impasto è pronto, ne prendi delle palline, un poco alla volta, le modelli con le mani e poi le copri con la pellicola, anche stavolta per un quarto d’ora.\nFrattanto avrai preparato una ciotola con dentro mezzo bicchiere di olio di semi e mezzo cucchiaino di lievito per dolci e un’altra con dentro la farina di granturco.\nUngi le mani e riprendi le tue palline. Le stendi con le mani fino a formare una sorta di “pizza” alla quale però darai una forma quadrata e che cospargerai con l’olio e la farina di granturco (per l’olio va benissimo un pennello da cucina).\nAdesso solleva la parte destra dell’impasto e la ripieghi su se stessa verso l’interno, coprendola con la miscela olio-farina di cui sopra e fai la stessa cosa con la parte sinistra.\nAdesso pieghi l’impasto anche in senso verticale, prima la parte sopra e poi quella inferiore, sempre cospargendo con olio e farina.\nMetti da parte e poi prosegui il lavoro con le altre palline di pasta. Quando hai esaurito le palline, scaldi una piastra liscia o una padella antiaderente che avrai unto con dell’olio di semi.\nLa cottura prenderà circa tre minuti, durante i quali dovrai voltare spesso l’impasto per non bruciarlo.\nSe la farcitura che hai in mente è salata, a questo punto puoi cospargere il pane con del sale.","note":"","tags":[],"_importId":10332},{"nome":"Gli ingredienti della Pite: cosa serve per prepararla","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ecco gli ingredienti necessari per realizzare una Pite per uno stampo di 20 cm di diametro:\n200 g di farina 00\n40 g di zucchero\n1 cucchiaio di panna fresca\nLa scorza di un limone (non trattato)\n1 bicchierino di rhum\n1/2 bustina di lievito per dolci\n150 g di burro (fuso)\n6 mele di media grandezza (preferibilmente piccole mele rosse)\n60 g di zucchero\n50 g di gherigli di noci tritati grossolanamente\n30 g di pinoli\n50 g di uvetta sultanina\nUn pizzico di cannella\nLa buccia grattugiata di un limone\nCome preparare la Pite: procedimento\n1. Preparare la pasta\nSu una spianatoia, disponi la farina a fontana e crea un buco al centro. Aggiungi lo zucchero, il lievito, la buccia grattugiata del limone, il burro fuso, la panna e il rhum. Impasta il tutto fino a ottenere un panetto omogeneo e liscio. Avvolgi il panetto nella pellicola trasparente e lascialo riposare in frigorifero per circa 30 minuti.\n2. Preparare il ripieno\nSbuccia le mele, tagliale a fettine sottili e mettile in una ciotola. Aggiungi lo zucchero, le noci tritate, i pinoli, l’uvetta precedentemente ammollata e strizzata, un pizzico di cannella e la buccia di limone grattugiata. Mescola bene il tutto.\n3. Assemblare la torta\nStendi la pasta in una sfoglia sottile sulla spianatoia infarinata. Usa una parte della pasta per foderare il fondo e i lati di una tortiera imburrata e infarinata. Riempi con il composto di mele e frutta secca. Con il resto della pasta, copri la torta, sigillando bene i bordi. Fai un piccolo foro al centro per permettere al vapore di uscire durante la cottura.\n4. Cottura\nCuoci la Pite in forno preriscaldato a 150-160°C per circa 30 minuti, finché non sarà dorata in superficie. Prima di servirla, cospargila con zucchero a velo. È perfetta da gustare ancora calda!\nIl fascino dei sapori autentici\nLa Pite è molto più di una semplice torta di mele: è un dolce che porta con sé la storia e la cultura di una regione montana che ha saputo valorizzare i suoi ingredienti locali. Il mix di mele e frutta secca, unito alla friabilità della pasta senza uova, crea un equilibrio di sapori perfetto, adatto per ogni occasione, dalle merende in famiglia alle tavole festive.","note":"","tags":[],"_importId":13008},{"nome":"Gnam.","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":360.0,"unit":"n°","name":"farina zero"},{"qty":310.0,"unit":"n°","name":"acqua"},{"qty":10.0,"unit":"g","name":"olio extra vergine"},{"qty":10.0,"unit":"n°","name":"sale"},{"qty":12.0,"unit":"g","name":"lievito madre essiccato, ma si anche 2 g in più."}],"procedimento":"Allora acchiappa la ciotola, metti dentro la farina, piano, piano, che fai? Delicatamente altrimenti fa grumi. Ok aggiungi lievito, sale, e l'olio, mescola  mescola, aggiungi l'acqua lentamente, impasta, impasta e continua a mettere acqua fino alla fine, io uso il lecca padelle per impastare dal basso verso l'alto per caricare di aria, ok quando vedi che hai impastato bene, deve essere fluido, chiudi la ciotola con la pellicola e coprila. Prenditi una pausa di vediamo, mmmm 30 minuti. Ok passata la pausa piega l'impasto 4, 5 volte, richiudi e altri 30 minuti. Dopo queste pennichelle svuota l'impasto su di un piano e, io ho sparso farina di semola, fai le forme infarina anche sopra e dividile. Hai acceso il forno 5 minuti prima? Bene inforna a 220° per 15 minuti se vuoi più croccante, ma si 20-25 minuti. Gnam è pronto. Buono aperto con  spezzatino tenero al sugo.","note":"","tags":[],"_importId":12432},{"nome":"Gnocchi di fagioli cannellini e farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Capita di dover ricorrere alle risorse in scatola se sei momentaneamente bloccata a casa....\nLe dosi sono: 500 gr di cannellini lessati e passati, 150 gr di farina, 1 uovo .....io le ho dimezzate,  è  evidente che potendo programmare sono meglio quelli secchi ammollati dalla sera prima\nCondimento: sugo di pomodoro, cipolla rossa e tonno","note":"","tags":[],"_importId":11975},{"nome":"GNOCCHI DI PANE IN BRODO.","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"A chi  non capita di avere il pane raffermo in casa, che nessuno vuole più? Vabbe' che esiste il pangrattato  da fare che serve sempre,  ma mai mi sarebbe venuto in mente di preparare gli gnocchi, che ho  sempre e solo fatti con le patate ...\nIngredienti per 2 persone: 150 gr di pane raffermo senza crosta - 1 uovo - 20 gr di pecorino grattugiato fine - pepe  - 20 gr di farina 0 - pangrattato ( se serve)\nBrodo: di carne o vegetale a piacere\n ( per usare una ricetta Marchigiana  con questi gnocchi).\nPreparazione: ammollare il pane con un po' di acqua e lasciarlo ammorbidire, importante  che sia privo di crosta o che abbia una crosta sottile. Una  volta ammorbidito, scolarlo bene, strizzarlo il più  possibile,  e metterlo in ciotola.  Unire l'uovo, il.pecorino fine, un po' di pepe, e la farina. Se il composto dovesse risultare troppo morbido, aggiungere un paio di cucchiaiate di pangrattato. Far riposare.\nPoi cominciare a preparare gli gnocchi: ricavare dell'impasto dei rotolini e successivamente  col coltello tagliare tanti piccoli cilindri,  aiutandosi con un po' di farina. Mettere a bollire il brodo preparato, e quando.bolle , versare gli gnocchi un po' alla volta e farli cuocere per 5 minuti. Poi condirli con del parmigiano grattugiato e un po' di noce moscata, e nessuno  si accorgerà che gli gnocchi o\nin brodo che siete soliti fare, sono cambiati!!!","note":"","tags":[],"_importId":10743},{"nome":"Gnocchi di ricotta con sugo di pomodorini","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per la riuscita e' fondamentale fa scolare la ricotta dai propri liquidi per almeno un paio d'ore\n In una ampia ciotola mescolare prima la ricotta con il parmigiano e le uova sbattute con il sale. Aggiungere poi poco per volta la farina . Una volta ottenuto l'impasto lavorarlo su di un piano leggermente spolverati con della semola. Fare dei filoncini e poi tagliare gli gnocchi come si preferisce. Quando l'acqua e' a bollore tuffarli in 3 volte per evitare che si attacchino. Quando vengono a galla sono pronti e possono essere conditi con il sugo che preferite. Io ne ho fatto uno semplice con pomodorini, olio evo, aglio .","note":"","tags":[],"_importId":9930},{"nome":"GNOCCHI DI ZUCCHINE VELOCISSIMI.","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti per 4 persone  ( come al solito nelle mie foto gli ingredienti sono ridotti  per la mia porzione): 250 gr di zucchine - 250 gr di ricotta - 250 gr di farina - 1 uovo - un cucchiaio di formaggio grattugiato - noce moscata q.b. - sale q.b.\nPreparazione: grattugiare le zucchine in una  ciotola, salare e lasciare  così  per qualche minuto, sopra un colino, in modo che perdano l'acqua di vegetazione.\nIn un'altra ciotola mettere la ricotta, l'uovo, il formaggio  grattugiato, un pizzico di sale, un po' di noce moscata. Amalgamare con una forchetta,  poi aggiungere le zucchine ben strizzate, e mescolare. \nIncorporare la farina poco alla volta, sempre mescolando.Quando l'impasto prende consistenza , lavoriamolo sulla spianatoia,  aggiungendo un po' di farina se necessario.\nQuando il composto risulterà  morbido ma non troppo appiccicoso, stenderlo col mattarello  fino ad uno spessore di un paio di centimetri.\nCon un coltello tagliare tante strisce, che andranno arrotolate col palmo delle mani. Dalle strisce ritagliare tanti pezzetti che saranno gli gnocchi. \nTuffarli poi in una pentola con acqua bollente salata,  un po' alla volta, e quando vengono a galla condirli come si preferisce, per esempio burro e salvia, o nel modo più  tradizionale, con un sughetto di burro pomodoro e basilico.( io ho preferito quest'ultimo).","note":"","tags":[],"_importId":11989},{"nome":"GNOCCHI RICOTTA E SPINACI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":600.0,"unit":"g","name":"spinaci"},{"qty":250.0,"unit":"g","name":"ricotta"},{"qty":80.0,"unit":"g","name":"farina"},{"qty":50.0,"unit":"g","name":"grana grattugiato"},{"qty":50.0,"unit":"g","name":"pangrattato"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":null,"unit":"q.b.","name":"olio extravergine di oliva"},{"qty":null,"unit":"q.b.","name":"noce moscata"},{"qty":null,"unit":"q.b.","name":"sale"}],"procedimento":"Gnudi  250g ricotta  300g spinaci 50g farina   55g parmigiano 1 uovo sale pepe  noce moscata condimento  burro e salvia 😉\nPreparazione:\nScola la ricotta e mettila in una ciotola capiente.\nUnisci il pangrattato, il grana grattugiato, l’uovo e la noce moscata. Mescola bene.\nIn una padella, scalda un po' di olio e cuoci gli spinaci (freschi o scongelati) finché l’acqua non evapora.\nAggiungi gli spinaci al composto di ricotta e mescola. Aggiungi anche la farina.\nForma dei piccoli gnocchi allungati con le mani, poi passali nella farina e adagiali su un piatto.\nCuoci i malfatti in acqua bollente per 3-4 minuti. Scolali e condiscili con burro fuso e parmigiano.\n\nBuon appetito!","note":"","tags":[],"_importId":14282},{"nome":"Gnocchi","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Gnocchi...\n\n340 gr di patate lesse e 85 gr di farina , più quella per la spianatoia","note":"","tags":[],"_importId":12303},{"nome":"Grattugia 🥒 tre zucchine","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"zucchine medie"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":80.0,"unit":"g","name":"formaggio grattugiato"},{"qty":4.0,"unit":"cucchiaio","name":"pangrattato"},{"qty":1.0,"unit":"n°","name":"d’aglio tritato"},{"qty":null,"unit":"q.b.","name":"prezzemolo tritato"},{"qty":null,"unit":"q.b.","name":"sale e pepe"}],"procedimento":"Olio extravergine d’oliva per cuocere\nPreparazione:\n1. Lava e grattugia le zucchine con una grattugia a fori larghi.\n2. Strizzale bene con le mani o un canovaccio per eliminare l’acqua in eccesso.\n3. Raccogli le zucchine in una ciotola, aggiungi uova, formaggio, pangrattato, aglio (se gradito), prezzemolo, sale e pepe.\n4. Mescola fino a ottenere un composto morbido ma compatto; se serve aggiungi altro pangrattato.\n5. Con le mani leggermente unte, forma le polpette e passale nel pangrattato per una panatura croccante.\n6. Per la cottura in forno: disponile su una teglia con carta forno, spennella con un filo d’olio e cuoci a 200°C per 20-25 minuti, girandole a metà cottura.\n7. In alternativa, cuoci in padella con poco olio caldo, dorandole uniformemente su tutti i lati.","note":"","tags":[],"_importId":14897},{"nome":"Guarda di","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1,"unit":"n°","name":"uovo"},{"qty":1,"unit":"n°","name":"cucchiaio di latte"},{"qty":1,"unit":"n°","name":"cucchiaio di farina"},{"qty":0.5,"unit":"n°","name":"cucchiaio di eritritolo"}],"procedimento":"Monta l’albume con una frusta elettrica. Sbatti il tuorlo con farina, l’eritritolo, il lievito e il latte. Unisci poi l’albume montato con movimenti dal basso verso l’alto. Cuoci in padella da entrambi i lati per qualche minuto aggiungendo qualche goccia d’acqua e coprendo con un coperchio.\n👉🏻io nel video ho raddoppiato la dose\nProvali e fammi sapere!✨","note":"","tags":[],"_importId":13088},{"nome":"Hai mai provato la torta chiffon giapponese? È soffice","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Hai mai provato la torta chiffon giapponese? È soffice, leggera e non contiene farina di grano. Perfetta per chi vuole un dolce senza glutine, facile da preparare in casa.\nRispetto alla classica chiffon cake americana, questa versione si fa con amido di mais o farina di riso. “Assenza di farina di grano, sostituita con amido di mais o farina di riso. ”\nLa torta viene cotta in uno stampo con il foro centrale, senza imburrarlo. Poi si lascia raffreddare capovolta per mantenerla alta e morbida.\nPer prepararla servono: 6 uova, 130g di zucchero, 80ml di olio di semi, 100ml d’acqua, 120g di amido di mais o farina di riso, 1 cucchiaino di lievito per dolci, 1 cucchiaino di succo di limone o cremor tartaro, un pizzico di sale. Se vuoi, aggiungi anche vaniglia.\nSbatti i tuorli con metà zucchero finché sono chiari. Aggiungi olio, acqua, vaniglia e l’amido setacciato col lievito. In un’altra ciotola, monta gli albumi con il limone, sale e il resto dello zucchero.\nUnisci gli albumi al composto, mescolando delicatamente. Versa nello stampo (senza imburrare) e cuoci a 160°C per circa 50-60 minuti. Una volta pronta, capovolgi lo stampo e lascia raffreddare completamente.\nServila semplice, con zucchero a velo, panna montata, frutti di bosco o crema vegetale.\nUn dolce che può piacere a tutti, anche a chi cerca qualcosa di più leggero e digeribile.\n#tortachiffon","note":"","tags":[],"_importId":14531},{"nome":"Hamburger di ceci","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione: 20 min\n\t\tCottura: 5 min\n\t\tDosi per: 8 pezzi\n\t\tCosto: molto basso\nPresentazione\n  L'hamburger di ceci è un piatto unico vegetariano a base di ceci molto saporito che ben si presta a sostituire il classico hamburger di carne.\n\nNoi vi presentiamo una versione dell'hamburger di ceci servita con lattuga, pomodori, maionese e ketchup. Ma l'hamburger di ceci può essere preparato con svariati ingredienti tra salse, formaggi e condimenti vari e proprio per questo è una ricetta che ben si può adattare ai propri gusti personali senza mai sbagliare.\n\nL'hamburger di ceci è il piatto ideale per i vegetariani che non mangiano i classici hamburger americani di carne e per chi ha voglia di assaggiare una ricetta diversa dal solito e particolare.\n\nL'hamburger di ceci può essere preparato con i ceci già cotti in scatola, oppure se avete in casa i ceci al naturale, potete farli stare una notte in ammollo, poi scolarli, lessarli e frullarli.\nIngredienti per 8 hamburger\nCeci precotti 500 g\nUova (medie) 2\nSenape 2 cucchiaini\nScalogno 1\nAglio 1 spicchio\nZenzero fresco (da grattugiare) 1 pizzico\nPancarrè 2 fette\nSale fino q.b.\nPepe nero q.b.\nPangrattato (facoltativo) 2 cucchiai\nPER ACCOMPAGNARE\nPanini da hamburger 8\nInsalata q.b.\nPomodori q.b.\nSalsa ketchup q.b.\nMaionese q.b.\n\nPreparazione\n  Scolate bene i ceci già cotti (1), metteteli poi in un frullatore con l’aglio, lo scalogno tritato, la senape, le uova, lo zenzero, il pancarré a cubetti, il sale e il pepe (2). Azionate il frullatore fino ad ottenere una massa granulosa: a questo punto estraete metà del composto e ponetelo in una ciotola (3).\n  Frullate quindi l'altra metà fino a che diventi una crema liscia e omogenea (4). Mettete la crema ottenuta in una ciotola ed unitevi l’altra metà granulosa, amalgamando per bene i due composti. Se avete utilizzato ceci in scatola, aggiungete un paio di cucchiai di pangrattato, in modo da rendere l'impasto un po' più asciutto. Con l’impasto ottenuto formate 8 hamburger (5) che andrete a cuocere su di una bistecchiera ben calda (6), rigirandoli su entrambi i lati. Servite gli hamburger di ceci ben caldi accompagnandoli con lattuga, pomodori, maionese e ketchup e i classici panini da hamburger.","note":"","tags":[],"_importId":972},{"nome":"Ho fatto la crema al limone suggerita da Teresa De","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ho fatto la crema al limone suggerita da Teresa De Masi. Molto buona e freschissima. Ho seguito alla lettera le istruzioni e devo dire che si prepara in tempi celeri.\nApprovata, grazie Teresa! \nPer chi non ricordasse, metto le dosi:\n50 ml succo di limone filtrato;\n250 ml di acqua;\n50 gr. di burro facoltativo ( io l'ho messo)\n50 gr. di amido di grano ( io ho usato la frumina);\n180 gr. di zucchero semolato ( non è troppo);\nLa scorza di un limone grattugiata ( io l'ho messa intera).\nMescolare a freddo tutti gli ingredienti tranne il succo di limone che verrà aggiunto alla fine, fuori dal fuoco,  quando la crema è pronta ( al primo sbuffo).\nBuona domenica a tutti 🤗","note":"","tags":[],"_importId":14483},{"nome":"Ho lasciato 13 ore il prefermento (18.50-07.50)","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Poi ultimo giorno fuori dal frigo per 8 ore prima di infornare\n  Su pietra refrattaria lasciata in forno da mezz’ora a 240 gradi\nCotto in 55 minuti \nMettere in basso la griglia sennò brucial","note":"","tags":[],"_importId":7966},{"nome":"Ho voluto riprovare a fare di  Vittorio Viarengo , il","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: 210 gr di acqua-  270 gr di farina 0-  3 gr lievito secco- 6 gr di sale - 3gr di zucchero o malto\nPreparazione: sciogliere il lievito nell'acqua a 30 gradi di temperatura, aggiungere lo zucchero mescolare bene. Poi unire la farina e il sale dopo la farina, per non farlo andare a contatto col lievito. Mescolare tutto per un minuto, fino ad ottenere un impasto grezzo e disuniforme. Rovesciare l'impasto sulla spianatoia infarinata, poi metterlo in un contenitore unto di olio ben coperto, e metterlo a lievitare per 90 minuti fino al raddoppio (forno spento e luce accesa).\nCon una spatola di silicone raschiare tutto l'impasto dal contenitore, ripiegando l'impasto verso il centro, girando tutto intorno  al bordo del contenitore. Ripetere due volte per sviluppare il glutine. Depositare uno strato di farina spesso un centimetro sulla tavola,  e rovesciarvi sopra la pagnotta dalla parte superiore. Ritagliare un pezzo di carta forno un po'  più  largo della pentola che verrà  usata per la cottura  (di 20 cm circa di diametro. Io ho usato una pentola di ghisa). Adagiare la carta sul fondo, e spolverizzatela con farina di granturco, depositare la pagnotta nella pentola, con la parte bella rivolta verso l'alto  incoperchiare  e metterla a lievitare  per 20 minuti sempre nel forno spento con la luce accesa. Con la lametta fare dei tagli sulla superficie della pagnotta profondo 2 cm, coprire col coperchio, e riposo di 10 minuti a temperatura ambiente. Cuocere poi a 240-250 gradi in forno preriscaldato, con il coperchio ben chiuso, per 10 minuti circa, poi abbassare il forno a 180 gradi, togliere il coperchio, e cuocere per 30-40 minuti. Se il pane dopo cotto si rammollisce, toglierlo dalla pentola, metterlo sulla griglia del forno,  abbassare a 150 gradi, \nsocchiudere a spiffero  la porta del forno e lasciare asciugare il pane per 15-20 minuti.","note":"","tags":[],"_importId":8160},{"nome":"https://fb.watch/oh5H4sKhmn/","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"uova medie a temperatura ambiente","sezione":"Per la pasta frolla"},{"qty":50.0,"unit":"g","name":"zucchero","sezione":"Per la pasta frolla"},{"qty":80.0,"unit":"ml","name":"olio di semi girasole","sezione":"Per la pasta frolla"},{"qty":8.0,"unit":"g","name":"lievito per dolci","sezione":"Per la pasta frolla"},{"qty":320.0,"unit":"g","name":"farina 00","sezione":"Per la pasta frolla"},{"qty":2.0,"unit":"n°","name":"mele grattugiate e cotte in padella con:","sezione":"Per il Ripieno"},{"qty":1.0,"unit":"cucchiaio","name":"burro","sezione":"Per il Ripieno"},{"qty":2.0,"unit":"cucchiaio","name":"zucchero","sezione":"Per il Ripieno"},{"qty":1,"unit":"n°","name":"po’ di cannella","sezione":"Per il Ripieno"},{"qty":1.0,"unit":"n°","name":"albumi","sezione":"Per la glassa"},{"qty":125.0,"unit":"g","name":"zucchero a velo","sezione":"Per la glassa"}],"procedimento":"Cuocere in forno preriscaldato staticoa 180 C° per 35-40 minuti \nBuon appetito ❤️ grazie per la visione ❤️","note":"","tags":[],"_importId":11420},{"nome":"Ieri mi son divertita a preparare la","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ieri mi son divertita a preparare la\nCROCCANTELLA  ALLA ZUCCA\n e vi assicuro che non è  niente male.\nSi può  offrire con l'aperitivo e si accompagna perfettamente con salumi o formaggi.\nIngredienti (come mio solito ho preparato mezza dose di questa che vi do, e  me ne sono pentita): 250 gr  di zucca pulita e fatta a dadini - 240 gr di farina 00 - 300 gr di acqua - 2 cucchiaini di sale - rosmarino q.b.\nPer lo stampo di 28-30 cm farina q.b. - olio evo qb.\nPer la superficie: farina di mais q.b. - olio evo q.b.\nPreparazione: viene benissimo usando solo le mani . In ciotola mettere la farina e l'acqua e mescolare con un cucchiaio, poi unire il sale e gli aghi di rosmarino fresco tagliuzzati ( avrei dovuto metterne di più). Amalgamare tutto, poi unire i dadini di zucca e incorporarli bene. 0liare una teglia tonda da 28-30 cm e spolverare con la farina. Versarvi il composto preparato e livellare bene ,  poi  coprirlo con la farina di mais , condire con olio e cuocere in forno preriscaldato a 200 gradi, per 50 minuti, poi proseguire la cottura per 10 minuti in forno ventilato.","note":"","tags":[],"_importId":9909},{"nome":"Il mio primo esperimento di Chiffon cake all'arancia","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Il mio primo esperimento di Chiffon cake all'arancia con la ricetta di Filomena Strusi.\nStampo da 24 cm, cotta a 160° statico  per 90 minuti.\nHo sostituito l'acqua con succo d'arancia e aggiunto scorza d'arancia all'impasto.\nNiente male!!!\nCHIFFON CAKE\n285 g farina\n300 g zucchero di canna o 285 g zucchero semolato\n6 tuorli (usate uova grandi)\n340/370 g di albumi\n195 ml acqua\n120 olio di semi di mais/girasole/arachidi \n1 bustina di lievito per dolci\n1 bustina di cremor tartaro da 8 g \npizzico di sale\nscorza di limone\nvaniglia\nProcedimento\nPre riscaldate il forno a 160° \"statico\"\nUnite  : farina setacciata con lievito, metà zucchero, olio ,acqua , tuorli sale e aromi ,in una ciotola, potete mescolare con una frusta a mano, non serve montare come il pandispagna...\nIn un'altra ciotola montiamo gli albumi a neve \"FERMISSIMA\" con il cremor tartaro e l'altra metà dello zucchero..dev'essere bella tosta \n..quindi aggiungiamoli lentamente nell'altro impasto, mescolando lentamente dall'alto verso il basso,senza smontare il composto che deve risultare bello spumoso..\nVersare il composto ben amalgamato, nello stampo originale o in una teglia per torta (in alto trovate le dimensioni da usare con questa dose ) senza imburrare eh.-.è importantissimo!!!!\nInfornate ,sul primo ripiano in basso a 150/160° per 90/95 minuti ,senza alzare la temperatura gli ultimi minuti 😊\nPrima di sfornate,fate la prova \"sfrigolio\" che consiste nel poggiare la mano delicatamente sulla superficie della chiffon, se sfrigola, come se friggesse, vuol dire che deve cuocere ancora un po' \n\nTrascorso questo tempo, la chiffon va fatta raffreddare nella teglia capovolta, appesa, nel senso che non deve poggiare sulla grata insomma.\nLo stampo americano è munito di tre piedini,che permette appunto di tenerla capovolta senza toccare la base di appoggio, ma vi consiglio di mettere un bicchiere nella parte centrale, altrimenti la base rimovibile schiaccera'  la base\nNel caso invece si usasse una teglia senza buco di alluminio o antiaderente, si dovranno usare dei rialzi come tazzine, o dei cucchiai di legno o ,come fa qualcuno, delle stecche di legno , nelle foto potrete vedere il mio metodo casalingo :D\nUna volta raffreddata, potrà essere sformata, magari aiutandosi con la lama del coltello che verrà passato intorno al bordo della teglia..\nSe invece si staccasse subito, vorrà dire che la chiffon doveva cuocere ancora qualche altro minuto..","note":"","tags":[],"_importId":13557},{"nome":"Il Pesto che Farà Crollare le Tue Certezze","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"zucchine medie"},{"qty":50.0,"unit":"g","name":"pistacchi non salati"},{"qty":10.0,"unit":"n°","name":"menta fresca"},{"qty":5.0,"unit":"n°","name":"basilico"},{"qty":1.0,"unit":"n°","name":"aglio piccolo"},{"qty":5.0,"unit":"cucchiaio","name":"olio extra vergine d'oliva"},{"qty":null,"unit":"q.b.","name":"sale e pepe"},{"qty":1.0,"unit":"n°","name":"cubetto di ghiaccio"}],"procedimento":"Procedimento:\n\n1.\tLava bene le zucchine e tagliale a pezzetti. Sbollentale per 2 minuti in acqua bollente e poi tuffale in acqua e ghiaccio. Questo è il mio trucco per mantenere un colore brillante e una consistenza perfetta.\n\n2.\tInserisci nel frullatore le zucchine scolate, i pistacchi, la menta, il basilico, l'aglio, il sale e il pepe.\n\n3.\tFrulla il tutto aggiungendo a filo l'olio d'oliva e il cubetto di ghiaccio. Continua fino a ottenere una crema liscia e omogenea.\n\n4.\tServi subito sulla pasta calda o conserva in un barattolo in frigo, coprendo la superficie con un filo d'olio.\n\nIl risultato ti lascerà senza parole.\n\n#ScienzaDellaNutrizione #Longevità #SaluteVegana","note":"","tags":[],"_importId":14944},{"nome":"Il profumo di limone","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Procedimento ✍🏻\nFrulla i biscotti e mescola con il burro fuso. Compatta nello stampo formando uno strato uniforme su base e bordi. Metti in freezer. Cuoci i mirtilli con 20 g zucchero finché morbidi, frulla fino a purea liscia. In una ciotola monta formaggio, zucchero a velo e panna freddissima fino a crema soda. Ammolla 8 g gelatina in acqua fredda per 10 min.\nPreleva 1/3 della crema più 2 cucchiai e tienila da parte in frigo: servirà per lo strato al limone. Alla crema rimasta aggiungi la purea di mirtilli e lo yogurt, mescolando delicatamente dal basso verso l’alto. Sciogli la gelatina in 40 g panna bollente e incorpora con cura. Versa il composto ai mirtilli in una sac à poche. Inserisci un coppapasta al centro dello stampo e distribuisci la crema ai mirtilli intorno. Livella e lascia in frigo almeno 2 ore. Ammolla 4 g gelatina, scioglila in 20 g panna bollente. Riprendi la crema al limone, unisci scorza grattugiata e limoncello, poi incorpora la gelatina sciolta. Rimuovi delicatamente il coppapasta e versa la crema al limone al centro. Livella la superficie e poni in frigo 6-8 ore. Estrai dallo stampo, decora il bordo con un po’ di panna montata usando uno stencil. Decora con mirtilli freschi e servi!","note":"","tags":[],"_importId":14956},{"nome":"IL SEGRETO che ti lascerà a bocca aperta!","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"- 200 ml latte caldo - 50 g zucchero - 7 g lievito secco attivo - 2 uova grandi (temperatura ambiente) - 4 g sale - 550 g farina - 85 g burro non salato (ammorbidito) - Scorza di 1 limone Ripieno: - 30 g uvetta dorata - 30 g uvetta scura - 75 g noci tritate - 25 g zucchero\nIstruzioni:\n1. In una ciotola grande, mescola il latte caldo con lo zucchero e il lievito secco attivo. Lascia riposare per 10 minuti finché il lievito non inizia a schiumare.\n2. Aggiungi le uova, il sale, la farina, il burro ammorbidito e la scorza di limone all'impasto. Lavora gli ingredienti fino a ottenere un impasto omogeneo.\n3. Copri l'impasto con un canovaccio pulito e lascialo lievitare in un luogo caldo per circa 1 ora, finché raddoppia di volume.\n4. Nel frattempo, prepara il ripieno mescolando insieme l'uvetta dorata, l'uvetta scura, le noci tritate e lo zucchero.\n5. Una volta che l'impasto ha lievitato, stendilo su una superficie infarinata formando un rettangolo.\n6. Distribuisci uniformemente il ripieno sulla superficie dell'impasto.\n7. Arrotola l'impasto partendo dal lato lungo per formare un grande rotolo.\n8. Taglia il rotolo a fette spesse e disponile su una teglia rivestita di carta forno.\n9. Copri le fette con un canovaccio e lasciale lievitare per altri 30 minuti.\n10. Preriscalda il forno a 180°C e inforna i rotoli per circa 25-30 minuti, finché sono dorati.\nPorzioni: 8-10\nTempo di preparazione: 20 minuti\nTempo di cottura: 25-30 minuti\nTempo totale: circa 2 ore","note":"","tags":[],"_importId":14767},{"nome":"Il Signor Gnocco fritto 🙈","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina"},{"qty":125.0,"unit":"ml","name":"latte"},{"qty":125.0,"unit":"n°","name":"acqua frizzante"},{"qty":3.0,"unit":"cucchiaino","name":"da caffè di olio evo..se preferite lo strutto"},{"qty":1.0,"unit":"cucchiaino","name":"aceto"}],"procedimento":"Il Signor Gnocco fritto 🙈\nOra scrivo la ricetta la solita ricetta \n500 g farina \n125 ml latte \n125 acqua frizzante \n3 cucchiaini da caffè di olio evo..se preferite lo strutto \n1 cucchiaino di aceto \nSale \nFritto nel olio di arachidi..se preferite lo strutto .\nImpastare bene. Tirare la pasta con la macchina fatte tre passaggi . 1 , 3 , 5","note":"","tags":[],"_importId":14788},{"nome":"Il tiramisù è uno dei dolci più diffusi al mondo ma","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Il tiramisù è uno dei dolci più diffusi al mondo ma nasconde un'insidia non trascurabile: l'uso delle uova a crudo che, come risaputo, possono rivelarsi potenzialmente pericolose...allora come ovviare? Con una \"pate  à bombe\" veloce e sicura: mettete in un pentolino 65 gr. Di zucchero e 40 di acqua...fate bollire portando, con l'uso di un termometro a 121 gradi ...intanto che lo sciroppo raggiunge questa temperatura, montate i rossi con il restante zucchero usando fruste elettriche...a temperatura di 121 gradi raggiunta, aumentate la velocità delle fruste e versate contemporaneamente a filo lo sciroppo...e ora sì che le vostre uova saranno sicure!...lo stesso procedimento si usa anche per gli albumi che però devono essere montati prima a neve ben ferma..❤❤","note":"","tags":[],"_importId":7691},{"nome":"Il Tortino Patate Broccoletti e Salsiccia,è un secondo","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":". di broccoletti siciliani lessi"},{"qty":2.0,"unit":"n°","name":"salsicce"},{"qty":5.0,"unit":"n°","name":"patate grandi"},{"qty":1.0,"unit":"n°","name":"mozzarella grande o 2 piccole"},{"qty":3.0,"unit":"cucchiaio","name":"farina"},{"qty":50.0,"unit":"g","name":". di burro"},{"qty":250.0,"unit":"ml","name":"latte"}],"procedimento":"PROCEDIMENTO:\nPreparate la besciamella.\nIn un pentolino,mettete il burro,fatelo sciogliere e poi aggiungete la farina,mescolate,non fate formare grumi,poi aggiungete il latte,mescolate,sempre sul fuoco,fino a che prende la giusta consistenza,a quel punto,la vostra besciamella è pronta.Sbucciate le patate e tagliatele a fettine con la una mandolina,devono essere sottilissime.In una padella,fate rosolare le salsicce fatte a pezzetti con un filo d’olio,appena saranno belle colorate,unite i broccoletti(già lessati in precedenza) e regolate di sale , mescolate bene il tutto e fate cuocere ancora per 7/8 minuti , aggiungete mezzo bicchiere d’acqua.Spegnete il fuoco e aggiungeteci dentro la besciamella.Iniziate a comporre il vostro tortino.Io ho usato una teglia tonda da 30 cm. circa.Versate sul fondo della teglia un filo d’olio evo,coprite poi il tutto con le patate,aggiungete un pò del condimento,la mozzarella tagliata a pezzetti e una spolverata di parmiggiano e continuate cosi’ con gli strati,fino a che finite tutte le patate.Infornate nel forno ben caldo a 180 gradi per irca 35 minuti.Fate la prova della forchetta come nelle torte.Gustate il vostro tortino caldo e filante.","note":"","tags":[],"_importId":403},{"nome":"Il vero strudel di mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Il vero strudel di mele, da sempre realizzato a casa mia con una sorta di pasta frolla, tante mele Renetta Melinda nel ripieno e la salsa vaniglia a fianco. La ricetta non è mai stata cambiata per la sua bontà e perfezione di consistenze. \nIn questo video vi spiego come farlo al meglio, i passaggi della pasta, quanto e come stenderla, l’importanza della Renetta per ottenere un ripieno cremoso, non troppo umido e ben bilanciato. \nE se fai colare un po’ di salsa vaniglia a fianco alla fetta raggiungi l’apice della bontà. \nNessun segreto nascosto e sarà la vostra ricetta preferita, ne sono certo. ❤️\n280 g farina\n1 uovo\n50 g zucchero\n60 ml latte\n60 g di burro morbido\n1 cucchiaino di lievito per dolci\n5 mele “Renetta Melinda”\n80 g zucchero\n60 g uvetta\n1 cucchiaio colmo cannella\n50 g di pinoli\n40 ml di rum\n1 scorza e succo di mezzo limone\n60 g pangrattato \n40 g burro \nPER COMPLETARE:\n20 g burro\nZucchero a velo\nLasciare riposare la pasta almeno 30 minuti in frigo\nLasciare riposare il ripieno 20 minuti prima di aggiungere il ripieno, per fare in modo che i sapori si amalgamino al meglio\nAttendere almeno 40 minuti prima di servire lo strudel. \nPer la salsa alla vaniglia incidere una bacca di vaniglia, prelevare i semi e sbatterli in un pentolino a fuoco spento assieme a 4 tuorli, 70 g di zucchero e un pizzico di sale. Aggiungere 200 ml di panna fresca, 150 ml di latte e il baccello di vaniglia svuotato. Accendere la fiamma e cuocere a fuoco basso continuando a mescolare fino a raggiungere gli 83 gradi. Se non avete il termometro attendete che la salsa si addensi leggermente (dovrà nappare il cucchiaio).\nSpegnete immediatamente e lasciate intiepidire. È ottima anche fredda di frigo.\n@melinda.valdinon #Melinda #adv  #InCollaborazioneCon #ricette   https://www..com/share/r/1cUjkjFZTG/?mibextid=wwXIfr","note":"","tags":[],"_importId":15755},{"nome":"Impasto a 8 ore di lievitazione.","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":"farina caputo nuvola,"},{"qty":350.0,"unit":"g","name":"farina tipo 1,"}],"procedimento":"400gr farina di semola per pizza La Molisana, (in totale -48gr farina) —>-16gr—>384gr\n6gr lievito di birra (72gr lievito madre) \n30gr di sale,\n2 cucchiai d'olio evo,\n700ml acqua, (-24gr)—>676gr\nHo fatto 3 pieghe a distanza di 20 minuti,\n3 ore di lievitazione,\nStaglio in 7 panelli da 270gr circa\nAltre 4 ore di lievitazione. \nIl pubblico mi ha applaudito🤣🤣🤣\n Standing Ovation💪\nBuon appetito❤️","note":"","tags":[],"_importId":15566},{"nome":"Impasto dello strudel","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"cucchiaio","name":"olio d'oliva o burro fuso"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":100.0,"unit":"ml","name":"acqua tiepida"},{"qty":1.0,"unit":"cucchiaino","name":"aceto"}],"procedimento":"Procedimento:\n1. Preparare l'impasto:\n   - In una ciotola, setaccia la farina e aggiungi il sale. Fai un buco al centro e versa l'olio (o il burro fuso), l'uovo, l'aceto e un po' di acqua tiepida.\n   - Mescola con una forchetta fino a ottenere un composto grezzo, quindi inizia a impastare a mano sulla superficie di lavoro.\n   - Continua a impastare aggiungendo gradualmente altra acqua tiepida, fino a ottenere un impasto morbido ma non appiccicoso. L'impasto dovrebbe risultare elastico e liscio.\n   - Copri l'impasto con un canovaccio umido o avvolgilo nella pellicola trasparente e lascia riposare per almeno 30 minuti. Questo permetterà al glutine di rilassarsi, facilitando la stesura.\n2. Stendere l'impasto:\n   - Dopo il riposo, spolvera la superficie di lavoro con un po' di farina e inizia a stendere l'impasto con un mattarello. L'impasto dello strudel deve essere steso il più sottile possibile, quasi trasparente.\n   - Se preferisci, puoi stendere l'impasto su un canovaccio pulito, sollevandolo delicatamente dal bordo mentre lo stendi. Questo ti aiuterà a ottenere una forma regolare e a non rompere l’impasto.\n   - L’impasto è pronto quando raggiunge lo spessore desiderato (circa 1 mm di spessore).\n3. Farcia e cottura:\n   - A questo punto, l’impasto è pronto per essere farcito. Puoi scegliere di preparare un **strudel dolce** con mele, uvetta, cannella e noci, oppure un **strudel salato** con spinaci, ricotta, formaggi, funghi o carne macinata.\n   - Distribuisci la farcia sulla superficie dell'impasto e arrotola delicatamente come un rotolo, sigillando bene i bordi.\n   - Spennella la superficie con un po' di burro fuso e cuoci in forno preriscaldato a 180°C per circa 30-40 minuti, o fino a quando l’impasto risulta dorato e croccante.\n Consigli:\n- Se desideri un risultato ancora più croccante, puoi cuocere lo strudel su una teglia foderata con carta forno.\n- Per uno strudel salato: usa ingredienti come ricotta, prosciutto cotto, formaggi a pasta filata, zucchine grigliate o funghi trifolati per un gusto ricco e saporito.\n- Per una versione più leggera: puoi usare l'olio al posto del burro, sia nell'impasto che per spennellare.\nL'impasto dello strudel, così preparato, è estremamente versatile e può essere personalizzato in base ai tuoi gusti, sia per piatti dolci che salati. Buon appetito!","note":"","tags":[],"_importId":13741},{"nome":"Impasto diretto 22h di lievitazione","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":550.0,"unit":"g","name":"farina 00 caputo pizzeria"},{"qty":350.0,"unit":"g","name":"acqua"},{"qty":1.65,"unit":"g","name":"lievito birra fresco"},{"qty":14.0,"unit":"g","name":"sale"}],"procedimento":"Impasto in planetaria per 10 minuti poi due riposi da 30 minuti con pieghe di rinforzo tra un riposo e l'altro.\nPuntata in frigo per 12h in frigo e poi  3 ore  a temperatura ambiente.\nFormatura panetti da 300 grammi.\nLievitazione panetti per 4 ore a temperatura ambiente e 3 ore in frigo.\nCottura 360 gradi in forno elettrico tranne l'ultima (margherita) a 420 gradi","note":"","tags":[],"_importId":15477},{"nome":"Impasto mille bolle","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Aggiungere ancora dell’acqua, fino a superare di alcuni centimetri il livello delle verdure. Salare e impepare e lasciare cuocere per 15-20 minuti, fino a quando la zuppa si restringe. Non dovrà essere né troppo asciutta, né troppo brodosa, per cui, se dovesse mancare il liquido, aggiungere altra acqua.  Lavare il prezzemolo, spezzettarlo grossolanamente e mettere anche questo in pentola. Intanto, lasciare scaldare una piastra e poggiarvi sopra le fette di pane, lasciandole tostare a fiamma moderata, da tutti e due i lati.   Una volta che la Zuppa con ceci zucca e patate sarà pronta, servitela calda, accompagnandola con i crostini di pane. Vedrete che bontà e, inoltre, scalderà le vostre mani e il vostro cuore. Buon appetito!","note":"","tags":[],"_importId":13519},{"nome":"IMPASTO SALATO \"FAVOLOSO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Una ricetta davvero particolare - eredità della mamma di Adriana di Massimo - che non è una pasta sfoglia nè una pasta brisè ma con una lavorabilità, consistenza e gusto favoloso (appunto!).\n250 g farina 0 - 150 g ricotta vaccina - 125 g burro a pomata - sale fino\nTogliere il burro dal frigorifero almeno 3 ore prima di iniziare la preparazione. \nFare una fontana con la farina setacciata e versare al centro il burro, la ricotta e una piccola presa di sale.\nLavorare inizialmente gli ingredienti con una forchetta, poi continuare con le mani - non serve una lunga lavorazione è sufficiente che gli ingredienti si omogeneizzino per bene e che il panetto risulti liscio e compatto.\nLasciarlo riposare in pellicola per 30 minuti a temperatura ambiente.\nStenderlo con l'ausilio del matterello. L'impasto è favoloso perchè non attaccherà al piano di lavoro, non si spaccherà, nè si straccerà. Sarà facile lavorarlo e spostarlo sulla teglia.\nL'impasto è ottimo per qualsiasi tipo di torta salata!","note":"","tags":[],"_importId":11033},{"nome":"Ines Troiano ciao","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ines Troiano ciao! Per il polpettone di melanzana ho seguito grossomodo la ricetta di Renata Briano. \nCipolla bianca tritata a soffriggere in olio evo, ci aggiungo melanzana a cubettini e il sale e faccio appassire. Deve venire tutto morbido.\nPatate lesse (3, 4 dipende dalle dimensioni) schiaccio la patata, aggiungo le melanzane con la cipolla che ho schiacciato con la forchetta, uova bio (possono essere 2 ma anche 3, che le bio del super son sempre piccoline) parmigiano grattugiato, un bel po' di maggiorana fresca tritata, regolo di sale. Mescoli bene.\nTortiera oliata e passata di pan grattato. Livelli il composto, deve stare basso, olio a giro sopra con spolverata di pan grattato. \nForno 180° il tempo che ci vuole, tipo 25/30 minuti, poi vado ad occhio.\nA noi di casa piace tanto.\nManuela Taddei ciao. La torta di zucchine trombetta è fatta seguendo la ricetta della nonna (di Ceriana) di una mia cara amica: \nVado sempre ad occhio. \nFaccio una pasta matta con farina (in questo caso ho usato la semi integrale perchè avevo quella), acqua di bottiglia tiepida, olio abbondante, sale. Faccio riposare il tempo di preparare il ripieno TUTTO A CRUDO. \nGrattugio una grande zucchina trombetta lavata e asciugata. Se la buccia è diventata spessa la pelo, se no ce la lascio.  \nUnisco una cipolla bianca grattugiata, sale, olio d'oliva nostrano, parmigiano abbondante, uova bio( 2 o 3 dipende da quanto la si fa grande) e un cucchiaio di riso crudo. \nTiro la sfoglia, stendo in tortiera oliata, metto ripieno e seconda sfoglia sopra ben pennellata di olio in superficie. Poi ci faccio i buchini con la forchetta. Io metto in forno ventilato a 180°.   Anche sulla tempistica del forno vado  ad occhio. Quando è dorata sforno.   \nveloce e buonissima.","note":"","tags":[],"_importId":14934},{"nome":"Infuso di foglie di carciofo","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"ml","name":"acqua bollire"}],"procedimento":"Infuso di foglie di carciofo\n\n250 ml acqua bollire\n1,5 o 2 cucchiai da tavola in infusione spegnendo gas\nPer 10 min coperto\nFiltrare \nBere","note":"","tags":[],"_importId":1145},{"nome":"INGREDIENTES","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"kilo de carne de res molida"},{"qty":2.0,"unit":"n°","name":"huevos"},{"qty":1.0,"unit":"n°","name":"taza de pan molido"},{"qty":2.0,"unit":"n°","name":"cucharaditas de sal"},{"qty":1.0,"unit":"n°","name":"cucharadita de pimienta"},{"qty":1.0,"unit":"n°","name":"cucharada de ajo en polvo"},{"qty":2.0,"unit":"n°","name":"tazas de espinacas"}],"procedimento":"En un recipiente grande mezclar la carne molida, huevos, pan molido, sal, pimienta y ajo en polvo. Mezclar hasta que esten bien combinados. \nColocar la mezcla anterior en una charola para hornear mediana forrada con papel aluminio  y distribuir la mezcla de carne uniformemente. \nColocar el jamón, queso, y espinacas encima de la carne.\nLevantar la carne cuidadosamente y formar un rollo ayudándose con el papel aluminio para facilitar este paso al enrollar.\nEn otra charola forrada con aluminio colocar las rebanadas de tocino lado a lado una encima de la otra. Poner el rollo de carne encima de estas. \nEnrollar la carne con el tocino una vez más cuidadosamente. Hornear forrado de aluminio por 25 minutos.\nIncremente la temperatura a 500 ˚F / 260˚ C. remover el papel aluminio y hornear por 20 minutos más hasta que el tocino tome un color dorado y esté crujiente. \nDeje enfriar, rebane y sirva!","note":"","tags":[],"_importId":1056},{"nome":"INGREDIENTI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":180.0,"unit":"g","name":"farina di mandorle 400 g ricotta vaccina 4 uova medie"},{"qty":null,"unit":"q.b.","name":"1 cucchiaio di liquore limoncello zucchero a velo"}],"procedimento":"in una ciotola, versare lo zucchero e le uova e lavorare con un cucchiaio fino a ottenere il doppio del volume;\n\t\tAggiungere la ricotta setacciata e la farina di mandorle, il pizzico del sale, la buccia grattugiata di limone e il liquore;\nMescolare bene con una spatola senza smontare l’impasto: è questo il passaggio più delicato della ricetta;\n\t\tVersare il composto in una teglia, di 20 cm di diametro, foderata con carta da forno;\n\t\tCuocere in forno preriscaldato a 180 gradi per circa 50 minuti, fino a ottenere un bel colore nocciola (suggeriamo di fare la prova dello stecchino per verificare la cottura);\n\t\tSforniamo la nostra torta, facciamo raffreddare  completamente e successivamente spolverare con abbondante zucchero a velo.\n\t\tSi consiglia di tagliarla a quadrotti: ogni boccone è pura dolcezza e... Buona Merenda!\n\t\tTROPPO BUONA!","note":"","tags":[],"_importId":12712},{"nome":"INGREDIENTI (16 Veneziane alla crema)","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"400 g. di farina manitoba 100 g. di zucchero 10 g. di miele di acacia 150 g. di tuorli (ca. 9 tuorli medi) 75 ml. di latte 200 g. di burro morbido 1 stecca di vaniglia (o 2 bustine di vanillina) 9 g. di sale 5 g. di scorza di limone grattugiata (2 limoni) 8 g. di scorza di arancia candita 2 gocce di essenza di arancia\n250 ml di latte 25 g. di farina 70 g. di zucchero 2 tuorli 1 cucchiaino raso di bucc
