esto messaggio al mondo intero. Facendo questo troverai forti resistenze.\nAscoltate bene e fate attenzione a quello che dico: gli uomini devono essere corretti. Con umili suppliche, dovete chiedere perdono per i peccati commessi e che potete commettere. Vuoi che ti dia un segnale affinché ognuno accetti le mie parole che, dal tuo intermediario, dico al genere umano. Hai visto il prodigio del sole e tutti, credenti, miscredenti, contadini, cittadini, saggi, giornalisti, laici, preti, lo hanno visto tutti.\nUna grande punizione cadrà sul genere umano intero, non oggi né domani, ma nella seconda metà del XX secolo. L ' avevo già rivelato ai bambini Melania e Maximino, in ′′ la Salette \", e oggi lo ripeto a te perché il genere umano ha peccato e ha calpestato il dono che gli concede. Da nessuna parte del mondo esiste l'ordine e Satana regna sulle più alte postazioni determinando il piano delle cose.\n′′ poiché gli uomini sono guidati dal demonio, seminando odio e vendetta ovunque\nGli uomini fabbricano armi mortali che possono distruggere il mondo in pochi minuti.\nMetà dell'umanità può essere spaventosamente distrutta\nCi saranno conflitti tra ordini religiosi\nDio consentirà a tutti i fenomeni naturali come fumo, grandine, freddo, acqua, fuoco, riempimenti, terremoti, tempo inclemente, disastri terribili e inverni estremamente freddi come quelli di questi tempi di finire con la terra poco a poco,\nCi saranno malattie senza cura, la gente prende in giro i santi e la chiesa.\nCi saranno omicidi fuori controllo, la gente si ucciderà a vicenda, molte persone soffriranno.\nAlcuni fenomeni naturali avverranno prima del 2005 e continueranno da lì in poi con maggiore intensità e distruzione, il clima cambierà improvvisamente, clima estremo.\nNon sopravviveranno, mancanza di carità verso il prossimo e non amatevi l'un l'altro come mio figlio li ha amati.\nMolti vorranno essere tra i morti, poiché milioni di persone perderanno la vita in pochi secondi e soffriranno troppo, arriveranno nuove forme di vita e contribuiranno alla distruzione per ottenere più potere per loro e procreare la loro nuova razza.\nLe punizioni davanti a noi sulla Terra sono inimmaginabili, ma arriveranno senza dubbio.\nDio aiuta il mondo, ma chi non di testimonianza di fedeltà e fedeltà verso El sarà distrutto in modo irrimediabile, poiché molti gli hanno già voltato le spalle e lui non può fare nulla di fronte a questo ′′\nPadre Agostino, che risiede a Fatima, ha ricevuto il permesso da Papa Paolo VI, di visitare la sorella Lucia.\nIl padre Agostino esprime che lei lo ha ricevuto molto congoiato, con le lacrime agli occhi gli ha detto:\n′′ Padre, la Madonna è molto triste perché nessuno si è interessato alla sua profezia del 1917, alla gente non interessa questa profezia.\nCosì, mentre i buoni devono percorrere una strada stretta; i cattivi stanno percorrendo un sentiero ampio che li porta direttamente alla distruzione e credi, padre, che la punizione arriverà molto presto a partire dal 2006 e arriverà senza potersi fermare. lo.\nMolte anime possono perdersi e molte nazioni e stati scompariranno dalla Terra; il mondo può essere perso per sempre.\nÈ giunto il momento per tutti di trasmettere il messaggio di Nostra Signora ai suoi familiari, ai suoi amici e al mondo intero.\nSiamo vicini all'ultimo minuto, all'ultimo giorno e la catastrofe sta arrivando.\n(ATTENZIONE) CHE CI ASPETTI?\nOvunque si parla di pace e sicurezza, ma la punizione arriverà senza nulla che possa fermarlo.\nUNA GUERRA SENZA SENTITO PROVOCERÀ UNA DISTRUZIONE NUCLEARE.\nQuesta guerra può distruggere tutto, sarà un disastro.\nL ' oscurità cadrà poi su di noi per 72 ore (3 giorni) e la terza parte che sopravviverà  queste 72 ore di buio e sacrificio; inizierà a vivere in una nuova era.\nIn una notte molto fredda, 10 minuti prima di mezzanotte\nUN GRANDE TERREMOTO stravolgerà la terra per 8 ore\nI buoni, quelli che diffondono la profezia della Vergine di Fatima,\nNON DEVONO TEMERE, ma gli altri subiranno le conseguenze di ignorare questo avviso, il terremoto causerà la distruzione di gran parte della terra, alcune parti si separeranno e causerà grande disastro!.\n. COSA FARE? ..\nMamma Lucia dice che la Vergine chiede:\n.\n′′ Non uscite di casa e non fate entrare nessuno estraneo, arriveranno persone nuove e sconosciute che sembrano buone e diranno di unirsi a loro, alla loro nuova razza e forma di vita, non fate caso!..\nQueste nuove ' ' persone ' ' approfitteranno della catastrofe che avverrà nel mondo (terra)....\nLa madre Lucia procede secondo quanto le è stato rivelato:\nAffinché voi vi prepariate e possiate rimanere vivi, come i miei figli che lo siete; vi darò i seguenti segnali :.\nLa notte sarà molto fredda Soffieranno venti forti ..\nCi sarà angoscia e presto inizierà un terremoto che farà tremare fortemente la Terra. ..\nA casa chiudi porte e finestre e non parlare con nessuno che non sia dentro di lei. ..\nNon guardare fuori, non essere curioso, perché questa sarà l'ira del Signore. ..\nAccendete candele benedette, perché per tre giorni nessun'altra luce potrà illuminare. ..\nIl movimento sarà così violento che sposterà la terra di 23 gradi e poi ritornerà alla sua posizione normale. ..\nPoi arriverà una totale e totale oscurità che coprirà tutta la Terra. Ogni spirito maligno sarà sciolto facendo molto male alle anime che non hanno voluto ascoltare questo messaggio e a coloro che non vogliono pentirsi. ..\nTutto sarà buio e apparirà in cielo una grande croce mistica, per ricordarci il prezzo che tuo Figlio ha pagato per la nostra redenzione..\nMamma Lucia continua a riferire quello che la Vergine le ha affidato Implorate il prossimo :.\n′′ O Dio perdona i nostri peccati, salvaci dal fuoco dell'inferno e porta in cielo tutte le anime, specialmente le più bisognose della tua misericordia \"..\nColoro che credono nel messaggio che Dio invia e portano il messaggio agli altri, non devono temere nulla nel Grande Giorno del Signore. ..\nColoro che tacciono ora saranno responsabili di questo gran numero di anime perse per ignoranza. ..\nQuando la Terra non trema più, coloro che ancora non credono nel nostro Signore moriranno terribilmente. .. Il vento porterà gas e innaffierà ovunque. ..\nCosì sorgerà il sole. .. Molti possono vivere dopo questa catastrofe Una volta iniziato, non devono guardare fuori per nessun motivo, perché Dio non vuole che nessuno dei suoi figli veda quando punire questi peccatori, non vuole che vedano come soffrono e non vuole che vedano il dolore che provoca loro queste persone cattive. ..\nSi deve capire che Dio permette a tutto questo di passare e si deve capire che Dio punirà tutte le persone che non l'hanno ascoltato, questo dice questo testo ed è per questo che è stato causato tanto panico, poiché Dio scatenerà la sua rabbia incontrollabile incontra di tutti coloro che stanno facendo del male al mondo. ..\nRicordatevi che la parola di Dio non è una minaccia, ma una buona notizia speciale ;. Forse Dio lo permette, perché lui vuole salvarli per Lui. Se hai letto, dai un Amen\nDicono che ogni battito del tuo cuore è Dio che dice di amarti. Ti sei mai fermato a pensare quante volte te l'ha detto oggi? Se ami Dio, lascialo fare Un Amen è condividi in 4 gruppi su  e se ti vergogni di Dio guarda... Ricorda: Dio ha detto: se mi neghi tra gli uomini, ti negherò davanti al padre...\nAmen. Amen.","note":"","tags":[],"_importId":8346},{"nome":"Ti consiglio vivamente il nostro nuovo libro!!","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"patate, pesate da crude"},{"qty":75.0,"unit":"g","name":"fecola di patate"},{"qty":null,"unit":"q.b.","name":"sale"}],"procedimento":"Ti consiglio vivamente il nostro nuovo libro!!\n\nINGREDIENTI\n\n250g patate, pesate da crude (vanno bollite per circa 15 minuti)\n75g fecola di patate\nSale q.b\n\nFai piadine cotte in padella","note":"","tags":[],"_importId":16057},{"nome":"TIRAMISÙ  NEL BICCHIERE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"il caffè  decaffeinato, oppure il caffè  d'orzo, lo possono gustare anche i bambini.\nIngredienti per 4 persone  (  io che faccio sempre metà  dose, mi sono accorta di aver riempito 3 bicchieri abbastanza grandi  con questa dose):  200 ml di panna fresca - 400 gr di mascarpone - 80 gr di zucchero a velo  - 8 savoiardi ( io, come son solita fare col Tiramisu', ho usato i Pavesini, e invece di 2 per bicchiere, ne ho usati 8, perché  li ho accoppiati) - 3 tazzine di caffè  forte.\nDecorazione: a piacere o con chicchi di caffè,  o con gocce di cioccolato, più del  cacao amaro per lo spolvero.\nPreparazione: innanzi tutto preparare il caffè  , dolcificarlo, e metterlo a freddare. \nIn una ciotola mescolare la panna fredda, il mascarpone, lo zucchero a velo, e montare tutto con le fruste elettriche. Dividere i savoiardi a metà,  affinché entrino nel bicchiere , bagnarli nel caffè  freddato, e sul fondo del bicchiere mettere le due metà. Riempire il sac a' poche  con la crema preparata e coprire i biscotti,  poi altre due metà  di savoiardi inzuppati nel caffè,  e altra crema sopra. Terminato questo lavoro, decorare con chicchi di caffè  o gocce di cioccolata, poi mettere i bicchieri in frigo   per almeno mezz'ora . Al momento di servire , come si fa col Tiramisu', spolverare con cacao amaro servendosi di un passino, naturalmente dopo il riposo in frigo. E che sia per tutti voi un buon 2 giugno!","note":"","tags":[],"_importId":10757},{"nome":"Torta al latte caldo","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":170.0,"unit":"g","name":"farina 00"},{"qty":16.0,"unit":"g","name":"lievito per dolci"},{"qty":160.0,"unit":"g","name":"zucchero"},{"qty":3.0,"unit":"n°","name":"uova a temperatura ambiente"},{"qty":60.0,"unit":"g","name":"burro"},{"qty":120.0,"unit":"ml","name":"latte"}],"procedimento":"Preparazione\nCOME FARE LA TORTA AL LATTE CALDO\n\n  In una boule iniziamo a montare le uova con lo zucchero [1] per almeno 10 minuti, fino a quando il composto non avrà raddoppiato il suo volume. Dovete ricavare una crema chiara e spumosa. [2]\n\n  A questo punto setacciamo la farina e con l'aiuto di una spatola la amalgamiamo per bene nell'impasto [3]. Aggiungiamo il lievito, anch'esso setacciato, e mescoliamo con delicatezza [4]. \n\n  In un pentolino scaldiamo il latte con il burro [5]: non deve raggiungere l'ebollizione, ma solo essere abbastanza caldo. Quando il burro è sciolto [6]\n\n  iniziamo ad aggiungere il latte all'impasto [7], pian piano e continuando a mescolare [8].\n\n  Imburriamo e infariniamo una teglia da 22 cm a cerniera, e cuociamo in forno ventilato per circa 35 minuti a 150° (o forno statico a 170° per 40-45 minuti) [9]. A cottura ultimata, lasciamo raffreddare, cospargiamo di zucchero a velo [10]\n\n  e la nostra torta al latte caldo è pronta da servire","note":"","tags":[],"_importId":693},{"nome":"TORTA AL LIMONE più buona del mondo Si SCIOGLIE IN","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":50.0,"unit":"g","name":"zucchero"},{"qty":40.0,"unit":"g","name":"amido di mais"},{"qty":300.0,"unit":"ml","name":"latte"},{"qty":2.0,"unit":"n°","name":"uova","sezione":"Impasto"},{"qty":100.0,"unit":"g","name":"zucchero","sezione":"Impasto"},{"qty":120.0,"unit":"ml","name":"olio di semi","sezione":"Impasto"},{"qty":120.0,"unit":"ml","name":"latte","sezione":"Impasto"},{"qty":220.0,"unit":"g","name":"farina","sezione":"Impasto"},{"qty":15.0,"unit":"g","name":"lievito per dolci","sezione":"Impasto"},{"qty":22.0,"unit":"n°","name":"cm","sezione":"Decorazione"}],"procedimento":"TORTA AL LIMONE più buona del mondo Si SCIOGLIE IN BOCCA facilissima e buonissima 😋🍰🍰\n\nCiao a tutti! Oggi prepareremo insieme una deliziosa torta con crema pasticcera al limone. È un dolce soffice e ricco di sapore. Cominciamo!\n\nIngredienti:\nCrema Pasticcera al Limone:\n1 uovo\n50 g zucchero\n40 g amido di mais\nSucco di 1 limone\nScorza di limone\n300 ml latte\nImpasto:\n2 uova\n100 g zucchero\nZucchero vanigliato\n120 ml olio di semi\n120 ml latte\n220 g farina\n15 g lievito per dolci\nDecorazione:\nMarmellata (a piacere)\nCocco grattugiato\nStampo:\n22 cm","note":"","tags":[],"_importId":11970},{"nome":"Torta al radicchio e mela","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Radicchio a striscette con scalogno tritato goccia olio e sale e pizzico zucchero cuoccio per 15 min circa\nFaccio purè \nProsciutto cotto tritato\nFormaggio grattugiato\nUn uovo\nMescolare bene tutto\nPasta beise poi sopra uno strato del tutto poi fettine di fontal o altro poi altro strato\nCopro tutto con fettine sottili di mela \nIn forno a 180 gradi per 40/45 min circa","note":"","tags":[],"_importId":666},{"nome":"TORTA AL RUM","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Lui ci spiega che si tratta di una torta semplice, un po ' la versione della torta della nonna,  ma ha solo bisogno di una tortiera a forma di ciambella, che consente al calore di raggiungere tutto l'impasto per far lievitare al massimo la torta.\nIngredienti: 160 gr di farina 00  - 100 gr di fecola di patate, o amido di mais - 330 gr di zucchero - 14 gr di lievito per torte  - 4 gr di sale - 5 uova intere -\n70 gr di olio di  girasole - 90 gr di latte   -  80 gr di Rum  - 2 gr aroma di vaniglia .\nFarcitura : 125 gr di burro - 60 gr di acqua - 70 gr di zucchero - 80 gr di Rum - 2 gr aroma vaniglia.\nRifinitura : 10 gr di zucchero a velo.\nPreparazione: versare nella ciotola della impastatrice  tutti gli ingredienti asciutti e iniziare ad impastare. In una ciotola a parte,\nunire tutti gli ingredienti liquidi,  olio, uova  latte, vaniglia mescolati a parte, versare metà  dei liquidi nella impastatrice,  impastare per 2 minuti , poi versare i rimanenti, la \n raschiatura del.limone e continuare ad impastare per un po', fino ad ottenere una pastella liquida.\nImburrare per bene uno stampo a ciambella di 25 cm di diametro,  versarvi il composto, e far cuocere  in forno preriscaldato a 180 gradi, per 45 -50 minuti.\nMentre la ciambella cuoce, preparare la farcitura: in ciotola \nunire gli elementi liquidi,   il Rum,l'acqua, lo zucchero e l'aroma di vaniglia. Poi versarli in un pentolino, unire il burro  e far cuocere a fuoco medio, fino a che il.burro e lo zucchero non si siano sciolti. Spegnere e far freddare.\nFare poi la prova stecchino con la Torta, e se esce asciutto la torta è  pronta.\n Fare tanti  buchini sopra la Torta, per permettere alla farcitura di essere assorbita.\nVersare pian piano la farcitura sulla torta, e anche intorno ai bordi, in modo che la farcitura passi anche  sotto.\nCoprire con pellicola e farla riposare 12 -24  ore.\nPoi la si rovescia su un piatto da portata,  si guarnisce con lo zucchero a velo, e si serve.\nChe ne pensate? Provate a farla.","note":"","tags":[],"_importId":15025},{"nome":"Torta all'arancia","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"zucchero a velo"}],"procedimento":"Preparazione\nCome preparare la Torta all'arancia\n  Per preparare la torta all’arancia iniziate grattugiando la scorza di 2 arance (1), poi dividetele a metà (2) e spremetene il succo (3) avendo cura di filtrarlo attraverso un colino per trattenere eventuali residui filamentosi, vi serviranno 180 gr di succo per la preparazione.\n  Ora occupatevi dell’impasto: setacciate in una ciotola la farina 00 (4) e il lievito chimico per dolci in polvere (5). Ora versate lo zucchero nella ciotola di una planetaria (6),\n  unite il burro a temperatura ambiente tagliato a cubetti (7) e azionate la macchina con la frusta, fino ad ottenere un composto gonfio e cremoso. Mentre la planetaria è in funzione aggiungete anche le uova (a temperatura ambiente) una per volta (8), la scorza delle arance grattugiata (9)\n  e unite anche le polveri setacciate, un cucchiaio alla volta (10). Una volta che l’impasto avrà assorbito tutta la farina , versate a filo il succo dell’arancia senza spegnere la macchina (11). Quando il composto risulterà omogeneo, spegnete la planetaria e versate l’impasto ottenuto all’interno di una tortiera del diametro di 24 cm (12) precedentemente imburrata e foderata con carta da forno.\n  A questo punto (13) cuocete la torta all’arancia in forno statico preriscaldato a 170° per 35 minuti. A cottura ultimata sfornate la torta, lasciatela intiepidire (14) e poi sformatela su un piatto di portata e spolverizzate la superficie con zucchero a velo a piacere. La torta all’arancia è ora pronta per essere gustata (15)!","note":"","tags":[],"_importId":546},{"nome":"TORTA ALLA ZUCCA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Stampo 16-18 cm🥧 Cuocere in forno statico a 170° per circa 30-40 minuti, fino a quando si forma una leggera crosticina, la torta rimarrà morbida e cremosa. Fatela raffreddare bene prima di sfornare.\nTRUCCHETTI & NOTE✨\n⁃ L’impasto crudo è come una mousse al cioccolato e può esser gustato anche senza cottura.\n⁃ Come qualità di zucca vi consiglio: delica, violina, butternut o moscata.\n ⁃  Per cuocerla tagliate la zucca in pezzi lasciando la buccia e disponetela su di una teglia avvolgendola in carta forno. Fatela cuocere in forno o in friggitrice ad aria a 200° per circa 30 minuti fino a quando controllando la cottura con una lama di coltello la polpa non risulterà morbida. Con un cucchiaio ricavate la polpa. Mettetela in un colino e fate raffreddare bene. \n👉🏻🔎 Ricetta completa su www.chiarapassion.com  🔗Link in bio oppure scrivendo su Google 💻 CHIARAPASSION \nSvelate l’ingrediente segreto solo alla fine🤫\nDOLCE VITA\nEnrica","note":"","tags":[],"_importId":13050},{"nome":"Torta alle nocciole","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"nocciole tostate"},{"qty":4.0,"unit":"n°","name":"uova"},{"qty":150.0,"unit":"g","name":"zucchero"}],"procedimento":"Come preparare la Torta alle nocciole\n\t\tScalda il forno a 180° C Imburra e infarina una teglia da 24 cm oppure fodera l’interno con un foglio di carta forno; gratta la scorza di un’arancia o un limone e tienila da parte.  \n\t\tSe le nocciole che hai acquistato non sono già tostate, scalda una padella antiaderente e falle tostare per un paio di minuti al massimo. Trasferiscile poi in un mixer e tritale alla massima potenza. Separa i tuorli dagli albumi in due ciotole.  \n\t\tMonta i tuorli con lo zucchero per almeno 5 minuti, dovrai ottenere una crema chiara e ben spumosa. Ora unisci le nocciole tritate e la scorza grattata insieme all’essenza di vaniglia, mescola con cura, il composto sarà abbastanza denso ma cremoso, non ti preoccupare è giusto così!\n\t\tOra monta gli albumi con un pizzico di sale a neve fermissima, e incorporali al composto cremoso di nocciole, un poco alla volta, con dei movimenti dal basso verso l’alto. Ci vuole un pochino di pazienza, dovranno essere amalgamati perfettamente all’impasto, che a questo punto vedrai, diventerà molto meno denso.  \n\t\tVersa il tutto nella teglia e inforna per 30 minuti, ogni forno è diverso quindi controlla sempre ma NON prima che sia trascorsa mezz’ora. Fai la prova dello stecchino infilzandolo al centro, se esce bagnato devi prolungare di qualche minuto, se esce asciutto, puoi sfornare. In genere comunque, non ci voigliono più di 35 minuti per questa torta.  \n\t\tUna volta sfornata, lasciala freddare completamente prima di sformarla dalla teglia. Puoi scegliere di decorarla con delle nocciole tritare come ho fatto io, oppure con dello zucchero a velo. Se desideri darle un tocco di golosità in più, puoi abbinare del gelato, della crema pasticcera al caffè, oppure della panna.","note":"","tags":[],"_importId":9839},{"nome":"Torta alle nocciole senza glutine","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"uova"},{"qty":140.0,"unit":"g","name":"zucchero"},{"qty":30.0,"unit":"g","name":"amido di mais"},{"qty":100.0,"unit":"g","name":"farina di riso"},{"qty":100.0,"unit":"g","name":"nocciole o farina di nocciole"}],"procedimento":"Preparazione: \nPer preparare questa torta alle nocciole senza glutine, che altro non è che un pan di Spagna, iniziate montando per bene le uova con lo zucchero e la vaniglia fin quando otterrete un composto ben areato e che “scriverà”, intanto riducete le nocciole in polvere con un mixer e setacciate l’amido di mais e la farina di riso. \nQuando le uova saranno ben montate, aggiungete tutte le polveri e mescolate con una spatola con movimenti delicati dal basso verso l’alto per non smontare tutto. \nVersate l’impasto in una tortiera imburrata e infarinata da 20 cm e infornate per circa 30 minuti a 170 °C, preferibilmente in forno statico. \nLasciate raffreddare completamente, decorate a piacere ed eccola pronta per essere gustata! #cucchiaiodargento #ricettadelgiorno #ricettedelgiorno","note":"","tags":[],"_importId":14031},{"nome":"TORTA ALL’ACQUA E CACAO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":25.0,"unit":"g","name":"cacao amaro in polvere"},{"qty":150.0,"unit":"g","name":"zucchero"},{"qty":250.0,"unit":"g","name":"acqua"},{"qty":50.0,"unit":"ml","name":"olio di semi"},{"qty":1.0,"unit":"bustina","name":"lievito in polvere per dolci"}],"procedimento":"La torta all’acqua al cacao è talmente veloce da preparare che la prima cosa che dovrete fare è quella di accendere il forno a 180 °C.\n\t\tIn una ciotola setacciate la farina, quindi aggiungete il cacao e infine il lievito. Miscelate le polveri insieme. In un’altra ciotola sciogliete a freddo lo zucchero nell’acqua, basterà mescolare per qualche secondo affinchè lo zucchero si disciolga completamente nel liquido.\n\t\tUnite infine anche l’olio, quindi versate i liquidi nelle farine sempre mescolando con un cucchiaio o meglio una frusta a mano, fino a quando otterrete una crema omogenea e senza grumi.\n\t\tRivestite uno stampo di circa 20 cm con della carta da forno e versate il composto della torta all’acqua al cacao nello stampo. Infornate nel forno già caldo e lasciate cuocere per circa 40 minuti. Alla fine controllatene la cottura con uno stecco di legno o uno spaghetto, dovrà uscire pulito e asciutto. Sfornate la torta, lasciatela raffreddare completamente, infine tiratela fuori dallo stampo e servite.\nAncora più light!\nSe volete preparare una torta all’acqua al cacao ancora più leggera diminuite l’olio a 40 ml e lo zucchero a 120 g.","note":"","tags":[],"_importId":12108},{"nome":"Torta Barozzi","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"cioccolato fondente 🍫"},{"qty":150.0,"unit":"g","name":"zucchero semolato"},{"qty":100.0,"unit":"g","name":"mandorle 🌰"},{"qty":80.0,"unit":"g","name":"burro 🧈"},{"qty":4.0,"unit":"n°","name":"uova 🥚"},{"qty":1.0,"unit":"n°","name":"tazza di caffè ☕"},{"qty":1.0,"unit":"bicchiere","name":"no di rum 🥃"},{"qty":1.0,"unit":"pizzico","name":"sale 🧂"}],"procedimento":"- Sciogli a bagnomaria il cioccolato fondente insieme al burro, mescolando fino a ottenere un composto liscio e omogeneo. Lascia intiepidire. 🍫🧈\n2️⃣ **Preparare i tuorli**:\n   - Separa i tuorli dagli albumi e monta i tuorli con lo zucchero fino a ottenere un composto chiaro e spumoso.\n   - Aggiungi al composto il cioccolato fuso con il burro, le mandorle tritate finemente, il rum e il caffè. ☕🥃\n3️⃣ **Montare gli albumi**:\n   - Monta gli albumi a neve con un pizzico di sale fino a ottenere una consistenza soda. 🥚🧂\n4️⃣ **Unire gli ingredienti**:\n   - Incorpora delicatamente gli albumi montati al composto di cioccolato, mescolando dal basso verso l’alto per non smontarli. 🍶\n5️⃣ **Cottura**:\n   - Versa l’impasto in una teglia rivestita di carta forno e livella la superficie.\n   - Cuoci in forno statico preriscaldato a 180°C per circa 30 minuti. La torta deve rimanere leggermente umida all'interno. 🔥⏲️\n6️⃣ **Raffreddamento**:\n   - Una volta sfornata, lascia raffreddare completamente la torta prima di tagliarla a quadrotti.\nLa tua **Torta Barozzi** è pronta per essere gustata! Un dolce ricco e aromatico, perfetto per una pausa golosa o da servire come dessert dopo cena. 🍫\n💡 **Consigli e Astuzie**:\n- **Mandorle**: Tostale leggermente prima di tritarle per un sapore più intenso e aromatico. 🌰\n- **Cottura perfetta**: Evita di cuocere troppo la torta; deve mantenere una consistenza umida all'interno. Controlla la cottura inserendo uno stecchino: se esce ancora leggermente umido, la torta è perfetta! 🔥\n- **Conservazione**: La torta si conserva a temperatura ambiente per 2-3 giorni, coperta con pellicola o sotto una campana di vetro. 🥄\nBuon divertimento in cucina e buon appetito! 🍫✨","note":"","tags":[],"_importId":13584},{"nome":"Torta briosh","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":450.0,"unit":"g","name":"farina di tipo 1 + quella per la spianatoia"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":150.0,"unit":"ml","name":"latte"},{"qty":80.0,"unit":"g","name":"zucchero semolato"},{"qty":25.0,"unit":"g","name":"lievito di birra fresco"},{"qty":80.0,"unit":"g","name":"burro + quello per i fiocchetti"},{"qty":1,"unit":"n°","name":"pizzico di sale"}],"procedimento":"La quantità di lievito indicata nella ricetta può essere diminuita aumentando i tempi di lievitazione. Più tempo avete a disposizione, meno lievito potete mettere. 25 g sono per una preparazione piuttosto veloce.\nL’impasto di questa brioche può essere realizzato a mano o con una planetaria o qualsiasi altro mixer. Io ho usato il Bimby impastando a velocità Spiga.\nPROCEDIMENTO\n\nIn una piccola ciotola, sciogliere il lievito nel latte tiepido insieme a 30 g di zucchero semolato. Lasciare riposare finché si sarà formata una leggera schiuma in superficie.\n  Nel frattempo, sciogliere il burro nel forno a microonde o a bagnomaria e lasciarlo raffreddare.\nLavorare la farina con le uova, il restante zucchero (50 g) ed il latte mescolato al lievito.\nAggiungere il sale ed il burro ormai freddo.\n  Impastare il tutto fino ad ottenere un composto morbido e leggermente appiccicoso. Trasferirlo sulla spianatoia infarinata, lavorarlo ancora e modellare una palla.\nMetterla in una ciotola infarinata e lasciarla lievitare per un paio di ore in un luogo tiepido e al riparo da correnti d’aria. Dovrà raddoppiare il suo volume.\n  Trascorso il tempo della lievitazione, trasferire l’impasto in una teglia del diametro di 26 cm precedentemente imburrata ed infarinata. Coprire e lasciar lievitare per un’altra ora.\n  Cospargere con dello zucchero di canna.\n  Cuocere la brioche in forno statico preriscaldato a 200° per 18/20 minuti.\nLasciarla raffreddare prima di toglierla dallo stampo.\nPer renderla ancora più golosa, si può accompagnare la torta brioche con una salsa di frutta, con della nutella o con della crema pasticciera. Io l’ho mangiata sempre da sola!","note":"","tags":[],"_importId":611},{"nome":"TORTA BURABACIO di Biscotto Clandestino","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00"},{"qty":125.0,"unit":"g","name":"burro fuso tiepido"},{"qty":130.0,"unit":"g","name":"zucchero a velo"},{"qty":125.0,"unit":"g","name":"amaretti secchi tritati"},{"qty":70.0,"unit":"g","name":"nocciole tostate tritate"},{"qty":50.0,"unit":"g","name":"tuorli"},{"qty":20.0,"unit":"g","name":"rum o brandy o latte"},{"qty":5.0,"unit":"g","name":"lievito"},{"qty":3.0,"unit":"n°","name":"tuorli"},{"qty":80.0,"unit":"g","name":"zucchero"},{"qty":50.0,"unit":"g","name":"farina setacciata"},{"qty":0.5,"unit":"L","name":"latte bollente"}],"procedimento":"Preparate la crema pasticcera. Scaldiamo il latte con gli aromi senza però farlo bollire(vaniglia o limone), la vaniglia va incisa e i semini prelevati, versate tutto nel liquido, ma ricordatevi poi di gettare via la bacca o le bucce di limone una volta pronta la crema.\nLavorate i tuorli con lo zucchero, unite la farina, il sale, amalgamare bene, versate il latte, mescolate bene e riportate sul fuoco basso, sempre mescolando portate a bollore, una volta raggiunta la temperatura, prima di spegnere aspettate 5 minuti, la bollitura elimina l’amido e questo vi consentirà di avere una crema più vellutata (non usate il contenitore dove avete scaldato il latte, lavatelo, o vi si attacca la crema).\nUna volta pronta, facciamo freddare il tutto, mescolando di tanto in tanto per non far formare la patina, come si intiepidisce la versiamo all’interno della torta.\nImburrate e infarinate una tortiera con stampo a cerniera da 26 cm, accendete il forno e portatelo a una temperatura di 160 gradi avendo l'accortezza di inserire la leccarda. \nIn un recipiente versare lo zucchero, la farina, gli amaretti, le nocciole, il lievito, mescolare affinché tutto sia distribuito in maniera omogenea.\nIn un bicchiere unire tuorli e rum (o latte o brandy) sbattere leggermente il tutto, unire alla farina, aggiungere il burro, iniziare ad amalgamare con una spatola di silicone, finire poi con le mani.\nPrendete un po' di impasto e iniziare a ricoprire il fondo della tortiera, creando anche un piccolo bordo ai lati per contenere la crema che andremo ad adagiare successivamente.\nUna volta fatto ciò, premere leggermente l'impasto per dare compattezza, solo ora aggiungere la crema pasticcera, avendo l'accortezza di metterla ovunque.\nRicoprire a pioggia (senza premere) con l'impasto rimasto.\nCuoce in un'ora in modalità ventilata, deve essere dorata e staccata dai bordi per essere cotta.\nÈ molto delicata, una volta sfornata togliere subito il cerchio laterale lasciar freddare, se proverete a togliere quando sarà ancora tiepida vi si romperà.\nCome si fredda, metterla su una grata ad asciugare, aspettare almeno 12 ore prima di mangiarla.\nSpolverizzate con zucchero a velo e mangiate\n❤️","note":"","tags":[],"_importId":11984},{"nome":"Torta carote salata","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Pasta brise' con sopra tutte qste verdure stufate per circa 20 min con un po' di olio\nScalogno\nCipolla tropea \nsalvia 3foglie\nBasilico un ciuffetto\nDue porri\nUn gambo di sedano a fette sottili\nCarote almeno 6 a fette sottili\nPatate 1 a fette sottili\nCoprire la torta con qlche cucchiaio di besciamella a cui è stato aggiunto un uovo.\nCospargere di formaggio parmigiano grattugiato.\nInfornare in forno caldo a 180gradi per 35/40 minuti.","note":"","tags":[],"_importId":509},{"nome":"torta con crema e ricotta","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":180.0,"unit":"g","name":"farina 00"},{"qty":50.0,"unit":"g","name":"zucchero"},{"qty":50.0,"unit":"g","name":"olio di semi"},{"qty":1.0,"unit":"cucchiaino","name":"lievito per dolci"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":250.0,"unit":"g","name":"latte","sezione":"Per la crema"},{"qty":1.0,"unit":"n°","name":"tuorlo d'uovo","sezione":"Per la crema"},{"qty":50.0,"unit":"g","name":"zucchero","sezione":"Per la crema"},{"qty":1.0,"unit":"pizzico","name":"vanillina","sezione":"Per la crema"},{"qty":25.0,"unit":"g","name":"amido di mais","sezione":"Per la crema"}],"procedimento":"- 80 g di ricotta (da aggiungere dopo la cottura della crema)\nIstruzioni:\n\n1. Preparazione della crema:\n- In una pentola, unire il latte, il tuorlo d'uovo, lo zucchero, la vanillina e l'amido di mais.\n- Mescolare bene fino a ottenere un composto omogeneo.\n- Portare il composto a bollore a fuoco medio-basso, mescolando continuamente per evitare che si formino grumi.\n- Una volta raggiunto il bollore, cuocere per qualche minuto finché la crema si addensa.\n- Rimuovere dal fuoco e lasciar raffreddare completamente.\n- Una volta fredda, aggiungere la ricotta e mescolare bene fino a ottenere una crema liscia. Mettere da parte.\n\n2. Preparazione dell'impasto:\n- In una ciotola, mescolare la farina con lo zucchero e il lievito.\n- Aggiungere l'uovo e l'olio di semi, e impastare fino a ottenere un composto omogeneo.\n- Stendere l'impasto con un mattarello fino a ottenere una sfoglia che sia sufficiente per foderare una teglia da 20 cm di diametro. Assicurarsi di fare dei buchetti sulla base della pasta una volta stesa nella teglia.\n\n3. Assemblaggio:\n- Versare la crema preparata sulla base di pasta nella teglia preparata.\n- Con l'impasto rimasto, fare delle strisce e disporle sopra la crema in modo decorativo.\n\n4. Cottura:\n- Preriscaldare il forno a 180°C (forno statico).\n- Cuocere la torta nel forno preriscaldato per circa 30 minuti, o fino a quando la superficie risulta dorata e la pasta è cotta.\n\n5. Servire:\n- Una volta cotta, lasciare raffreddare la torta nella teglia per alcuni minuti.\n- Trasferirla su una gratella e lasciarla raffreddare completamente prima di servire.\n\nQuesta torta con crema e ricotta è perfetta per essere gustata come dessert o per una merenda speciale. Buon appetito!","note":"","tags":[],"_importId":12581},{"nome":"TORTA CON MARMELLATA DI ARANCE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"farina 00"},{"qty":100.0,"unit":"g","name":"amido di mais"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":50.0,"unit":"dl","name":"olio semi"}],"procedimento":"55gr cioccolato fondente sciolto al microonde poi aggiungere 50 gr di yogurt 0.1% grassi\n2 cucchiaini bicarbonato (10 gr)\nZucchero a velo per decorare o crema ganache al cioccolato \nAccendo il Forno a 180gradi\nMescolo bene Zucchero + tuorli\nAggiungo olio e crema marroni\nPoi farina con bicarbonato setacciati\nInfine gli albumi montati a neve ben ferma con pizzico di sale\nCuocere in forno per circa un’ora \nEstrarre dal forno e dopo 10  minuti bagnare la superficie con un bicchierino di brandy \nLasciar raffreddare per mezz’ora su grata\nQuando è fredda cospargere di zucchero a velo o coprire con la crema ganache al cioccolato.\nÈ molto buona anche così: tagliare una fetta e metterci un leggero strato di nutella o altra crema spalmabile","note":"","tags":[],"_importId":14638},{"nome":"Torta con marmellata: ricetta e preparazione","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":50.0,"unit":"g","name":"fecola di patate"},{"qty":160.0,"unit":"g","name":"zucchero"},{"qty":120.0,"unit":"g","name":"burro"},{"qty":50.0,"unit":"g","name":"latte"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":8.0,"unit":"g","name":"lievito in polvere per dolci"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":180.0,"unit":"g","name":"marmellata di albicocche"}],"procedimento":"La Torta alla marmellata si fa in 15 minuti ed è subito pronta da infornare. Ho scelto di preparare la torta con marmellata di albicocche, ma potete utilizzare anche la marmellata di fragole o la marmellata di ciliegie, o quella che preferite! Anche le composte di frutta vanno benissimo: anzi, sono più ricche di frutta e più compatte e tendono a scendere ancora meno nell’impasto.\nAl posto della fecola di patate, potete utilizzare anche l’amido di mais (maizena), entrambi rendono la torta ancora più soffice.\nSe volete preparare la Torta con marmellata senza burro, sostituite il burro con 100 grammi di olio di semi (girasole, arachide, ecc…).\n  Per realizzare la Torta morbida alla marmellata, estraete il burro almeno 1 ora prima della preparazione, in modo che diventi morbido.\nAccendete il forno statico a 170°C\nIn una scodella inserite le uova intere con lo zucchero e un pizzico di sale e iniziate a montarle utilizzando le fruste elettriche o la frusta della planetaria. Saranno sufficienti 3-4 minuti.\nUnite anche il latte, la scorza grattugiata di 1 limone e il burro morbido a pezzetti. Frullate il tutto con le fruste, solo per amalgamare gli ingredienti.\nIncorporate anche la farina setacciata con la fecola e il lievito, in più riprese, amalgamando sempre con le fruste. Ripulite bene le polveri dai bordi della ciotola, utilizzando una spatola. L’impasto della torta con marmellata è pronto: dovrà risultare morbido e denso.\nOleate leggermente una tortiera apribile da 24 cm e fate aderire bene un disco di carta da forno sul fondo (adagiate un foglio tra i due pezzi dallo stampo, chiudetelo, ed eliminate l’eccesso di carta che fuoriesce) e applicate delle strisce di carta forno sui bordi, leggermente inumidite e strizzate, in modo che aderiscano bene. Utilizzo la carta nello stampo, per evitare che la marmellata si bruci a contatto con lo stampo, se dovesse fuoriuscire.\nVersate l’impasto all’interno della tortiera e livellate con una spatola.\nAdagiate la marmellata in una ciotolina, pesata. Prelevatene mezzo cucchiaino alla volta e fatelo scendere sopra l’impasto, creando dei mucchietti su tutta la superficie, come vedete in foto. Mettendone poca alla volta, tenderà a scendere meno in cottura e ve la troverete anche in superficie e nel centro del dolce.\nCon uno stecco di legno da spiedino, create dei cerchietti sulla superficie, in modo da mischiare leggermente l’impasto alla marmellata. La punta dello stecco dovrà rimane in superficie, senza scendere troppo.\nInfornate la Torta con marmellata nel forno statico preriscaldato a 170°C per 45 minuti. Fate la prova stecchino. Gli ultimi 15 minuti, coprite con un foglio di carta stagnola, per evitare che la marmellata in superficie si bruci.\nUna volta pronta, lasciatela intiepidire nel suo stampo. Poi trasferitela sul piatto da portata e, se vi piace, decoratela con poco zucchero a velo. La Torta alla marmellata è davvero carina anche così, al naturale.\nOra potrete gustarvi la vostra Torta morbida alla marmellata, con il suo sapore semplice e genuino, in tutta la sua bontà! Posso dirvi che l’adoro? Uno dei dolci alla marmellata più buoni che abbia mai fatto!\nConservazione\nLa Torta con marmellata si conserva a temperatura ambiente per 3 giorni. Vi consiglio di lasciarla nel suo stampo e coprire tutto con della pellicola trasparente. Si può anche congelare.\nLeyla consiglia…\nAl posto della scorza grattugiata del limone, potete utilizzare i semi estratti da una bacca di vaniglia oppure 1 cucchiaino di estratto di vaniglia.\nScegliete la confettura che preferite per poter realizzare la Torta soffice con marmellata: in ogni caso sarà un successo!","note":"","tags":[],"_importId":11856},{"nome":"TORTA DA BANANE 🍌","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":70.0,"unit":"g","name":"zucchero"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":150.0,"unit":"g","name":"farina 00"},{"qty":50.0,"unit":"g","name":"fecola di patate o amido di mais"},{"qty":10.0,"unit":"g","name":"cucchiaini bicarbonato"},{"qty":3.0,"unit":"n°","name":"banane"},{"qty":60.0,"unit":"g","name":"olio di semi di arachidi"}],"procedimento":"Procedimento:\nAccendere forno a 180 gradi \nUova a temperatura ambiente \nZucchero + tuorli\nOlio\nBanane frullate (qualche goccia di limone per non annerirle)\nFarina e fecola e bicarbonato setacciati\nIncorporare delicatamente gli albumi montati a neve ferma.\nIn forno caldo a 180 gradi per circa 50 minuti \n(Fare la prova stecchino  per verificare se è  ben cotto.)\nSpegnere il forno\nEstrarre dopo 5 minuti \nTrasferire la torta leggermente intiepidita su una gratella.\nE buon appetito 😋","note":"","tags":[],"_importId":9889},{"nome":"Torta degli Angeli: Soffice e Leggera come una Nuvola ☁️🍰","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"uova"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"cucchiaino","name":"zucchero vanigliato"},{"qty":90.0,"unit":"ml","name":"olio di semi"},{"qty":200.0,"unit":"g","name":"amido di mais"},{"qty":1.0,"unit":"n°","name":"cucchiaio"}],"procedimento":"Preparazione:\n\nPreparare l’impasto\nInizia rompendo le uova in una ciotola capiente. Con l'aiuto delle fruste elettriche, monta le uova insieme allo zucchero e allo zucchero vanigliato. Continua a lavorare il composto fino a ottenere una consistenza chiara e spumosa. Questo passaggio è fondamentale, poiché un impasto ben montato garantirà una torta soffice e leggera, come una nuvola.\n\nAggiungi l'olio\nVersa l'olio di semi a filo, continuando a mescolare delicatamente per farlo amalgamare uniformemente all'impasto. L'olio renderà la torta ancora più morbida e umida, senza appesantirla.\n\nIncorporare gli ingredienti secchi\nIn un'altra ciotola, setaccia l'amido di mais e il lievito in polvere per dolci. Unisci questi ingredienti secchi poco alla volta al composto di uova, mescolando delicatamente con una spatola. È importante non usare le fruste per questa fase, così da non compromettere la consistenza leggera del dolce.\n\nPreparare per la cottura\nPrendi una teglia rotonda del diametro di 18 cm e rivestila con carta da forno o ungila leggermente. Versa l’impasto nella teglia, livellando la superficie con una spatola per ottenere una cottura uniforme.\n\nCuocere la torta\nPreriscalda il forno a 180°C e inforna la torta. Cuoci per 35-40 minuti, ma fai attenzione: ogni forno è diverso. Per essere sicuro che la torta sia cotta, infilza uno stecchino nel centro; se esce asciutto, la torta è pronta.\n\nDecorare e servire\nUna volta sfornata, lascia raffreddare completamente la torta nella teglia, poi sformala delicatamente. Spolvera la superficie con zucchero a velo per un tocco finale che dona eleganza alla presentazione. La torta degli Angeli è perfetta nella sua semplicità, ma puoi sempre aggiungere una decorazione extra, se lo desideri.\n\nConsigli:\nPer arricchire l’aroma, puoi aggiungere un pizzico di scorza di limone o di arancia all’impasto, che darà freschezza e un profumo irresistibile.\nSe vuoi renderla ancora più golosa, accompagna la torta con una salsa ai frutti di bosco o una cremosa crema al limone.\nQuesta torta è perfetta per ogni momento della giornata: dalla colazione alla merenda, fino a un dessert leggero ma raffinato. Ogni morso sarà una dolce nuvola! ☁️🍴","note":"","tags":[],"_importId":13563},{"nome":"Torta della nonna","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"burro","sezione":"Per la pasta frolla"},{"qty":450.0,"unit":"g","name":"farina","sezione":"Per la pasta frolla"},{"qty":160.0,"unit":"g","name":"zucchero","sezione":"Per la pasta frolla"},{"qty":2.0,"unit":"n°","name":"uova","sezione":"Per la pasta frolla"},{"qty":1.0,"unit":"cucchiaino","name":"polvere di limone / scorza di limone grattugiata","sezione":"Per la pasta frolla"},{"qty":330.0,"unit":"g","name":"latte","sezione":"Per la crema pasticcera"},{"qty":100.0,"unit":"g","name":"zucchero","sezione":"Per la crema pasticcera"},{"qty":4.0,"unit":"n°","name":"tuorli","sezione":"Per la crema pasticcera"},{"qty":55.0,"unit":"g","name":"farina","sezione":"Per la crema pasticcera"},{"qty":1.0,"unit":"bustina","name":"vanillina","sezione":"Per la crema pasticcera"},{"qty":30.0,"unit":"g","name":"pinoli","sezione":"Per la crema pasticcera"},{"qty":null,"unit":"q.b.","name":"zucchero a velo","sezione":"Per la crema pasticcera"}],"procedimento":"Preparazione:\nProcedimento tradizionale\nPreparare la pasta frolla.\nCon l’aiuto di un mixer, frullare il burro e la farina, fino ad ottenere un composto sabbioso. Trasferire il composto su una spianatoia e formare una fontana, all’interno della quale andrete a versare lo zucchero, le uova e la polvere di limone. Amalgamare il tutto fino a che l’impasto non risulterà omogeneo e compatto.\nFar riposare la pasta in frigorifero per almeno un’ora, avvolta con la pellicola trasparente.\nPreparare la crema pasticcera.\nIn un pentolino, portare ad ebollizione il latte (ne dovrete tenere da parte mezzo bicchiere) e la vanillina. Non appena il latte sfiorerà il bollore, spegnere il fornello e lasciare riposare per circa 10 minuti.\nNel frattempo montare i tuorli con lo zucchero, nei quali andrete a versare il bicchiere di latte tenuto da parte e la farina setacciata.\nAmalgamare bene tutti gli ingredienti e, con l’aiuto di un mestolo, trasferirli all’interno del pentolino contente il latte, far bollire fino a che non si addensa. Potrete scegliere voi la densità della crema, aumentando o diminuendo il tempo di cottura. Vi consiglio di preparare una crema piuttosto densa. Girare continuamente per evitare che la crema si attacchi al fondo della pentola. Far raffreddare coperto con pellicola trasparente.\nComporre il dolce.\nDividere la pasta frolla in due parti. Stendere una delle due metà, aiutandovi con la carta forno (vedi video-tutorial), fino allo spessore di 2-3 mm, ed adagiarla all’interno di una teglia da forno. Bucherellare la superficie della pasta con i rebbi di una forchetta. Ripetere la stessa operazione anche con l’altra metà di pasta frolla e tenere da parte.\nVersare all’interno dello stampo anche la crema pasticcera fredda e ricoprire con la pasta frolla tenuta da parte e bucherellare con i rebbi di una forchetta. Adagiare i pinoli sulla superficie della crostata ed infornare a 160° per circa 45 minuti, dopodichè portare la temperatura a 170° e terminare la cottura per ulteriori 10 minuti circa. Prima di sfornare la torta della nonna, fare la prova dello stecchino per verificarne la cottura.\nProcedimento bimby\nPreparare la pasta frolla.\nInserire tutti gli ingredienti necessari per la preparazione della pasta frolla nel boccale del bimby ed impastare per 25 sec. – vel. 5.\nTrasferire il preparato su una spianatoia infarinata e terminare a mano l’impasto, fino a che non risulterà omogeneo e compatto.\nFar riposare la pasta in frigorifero per almeno un’ora, avvolta con la pellicola trasparente.\nPreparare la crema pasticcera.\nInserire tutti gli ingredienti nel bocccale del bimby e cuocere per 7 min. – 90° – vel. 4.\nTrasferire la crema pasticcera in una ciotola e coprire con pellicola trasparente. Far raffreddare.\nComporre il dolce.\nDividere la pasta frolla in due parti. Stendere una delle due metà, aiutandovi con la carta forno (vedi video-tutorial), fino allo spessore di 2-3 mm, ed adagiarla all’interno di una teglia da forno. Bucherellare la superficie della pasta con i rebbi di una forchetta. Ripetere la stessa operazione anche con l’altra metà di pasta frolla e tenere da parte.\nVersare all’interno dello stampo anche la crema pasticcera fredda e ricoprire con la pasta frolla tenuta da parte e bucherellare con i rebbi di una forchetta. Adagiare i pinoli sulla superficie della crostata ed infornare a 160° per circa 45 minuti, dopodichè portare la temperatura a 170° e terminare la cottura per ulteriori 10 minuti circa. Prima di sfornare la torta della nonna, fare la prova dello stecchino per verificarne la cottura.","note":"","tags":[],"_importId":111},{"nome":"Torta della nonna: la ricetta originale","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per la pasta frolla450 g di farina 00 200 g di burro 160 g di zucchero semolato 2 uova medie scorza grattugiata di 1 limone biologico 1 presa di sale 1/2 cucchiaino di lievito per dolci\nPer la crema pasticcera750 g di latte fresco intero 225 g di zucchero semolato 35 g di amido di mais 30 g di farina 00 3 uova + 1 tuorlo 1 cucchiaio di estratto di vaniglia (o i semi di una bacca)\nPer completare80 g di pinoli zucchero a velo q.b.\nProcedimento\nIniziate la realizzazione della torta della nonna preparando la pasta frolla. Mettete il burro freddo di frigo tagliato a pezzi e la farina nella ciotola di un robot da cucina. Azionate le lame fino ad ottenere un composto sabbioso. Trasferite questo composto su una spianatoia, create un buco al centro e versate lo zucchero, le uova e la scorza del limone. Lavorate brevemente con le mani senza surriscaldare l'impasto e solo per il tempo necessario per farlo compattare. Formate un panetto, appiattitelo leggermente, rivestitelo con pellicola trasparente e trasferitelo in frigo a rassodare per almeno 30 minuti.\n\nNel frattempo realizzate la crema pasticciera. Versate il latte in un pentolino dal fondo spesso e aggiungete l'estratto di vaniglia o i semi della bacca. Portate il latte a leggero bollore. In una ciotola rompete le uova e aggiungete il tuorlo. Versate anche lo zucchero e iniziate a mescolare. Setacciate la farina e l'amido di mais e uniteli alle uova.\nQuando il latte sta per bollire allontanatelo dal fuoco e versatene un po' sul composto a base di uova. Mescolate bene quindi rimettete il pentolino sul fuoco e versatevi all'interno tutto il composto con le uova. Fate cuocere la crema pasticciera su fiamma bassa mescolando continuamente per evitare la formazione di grumi. La crema sarà pronta quando si sarà addensata e velerà il cucchiaio. Trasferite la crema pasticciera in una pirofila bassa e ampia, coprite con pellicola trasparente a contatto (per impedire la formazione della pellicina) e lasciate raffreddare a temperatura ambiente.\n\nPreriscaldate il forno a 160°C in modalità statica. Estraete la frolla dal frigo e infarinate leggermente il piano di lavoro. Stendete la pasta frolla con un matterello allo spessore di 4-5 millimetri e dividitela in due cerchi di cui uno leggermente più grande dell'altro. Con il disco più grande di pasta frolla rivestite il fondo e i bordi di uno stampo precedentemente imburrato e infarinato facendola aderire bene.\nBucherellate il fondo della frolla con i rebbi di una forchetta, quindi versate la crema pasticcera ormai fredda che avrete rimescolato con una frusta. Livellate bene la superficie della crema con un cucchiaio poi copritela con il restante disco di pasta frolla. Sigillate bene i bordi e passate con il matterello sullo stampo per eliminare eventuale pasta frolla in eccesso. Bucherellate la superficie della torta della nonna con la forchetta, spennellate con pochissima acqua quindi distribuite i pinoli.\nInfornate la torta per 50 minuti posizionandola nel ripiano più basso del forno. Trascorso questo tempo portate la temperatura del forno a 180°C, spostate la torta nel ripiano centrale e fate cuocere per ulteriori 10 minuti. La torta della nonna è cotta quando è dorata in superficie, si gonfia leggermente e i pinoli risultano un po' tostati.\nSfornatela e lasciatela raffreddare nella teglia per almeno 8-10 ore. Solo quando sarà completamente fredda sformatela delicatamente, spolverizzatela con lo zucchero a velo e servitela tagliandola a fette.\nCome conservare la torta della nonna\nSe non fa eccessivamente caldo, la torta della nonna si conserva per 2/3 giorni a temperatura ambiente. Sarebbe meglio in ogni caso conservarla in frigo ma bisogna tener presente che in questo caso la crema perderà un po' della sua morbidezza.","note":"","tags":[],"_importId":9861},{"nome":"Torta delle monache","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Con le fruste elettriche, montare le uova con lo zucchero fino a ottenere un composto liscio, spumoso e chiaro. \nIn un piatto schiacciare la ricotta con una forchetta. Metterla nella ciotola con le uova. Unire anche la farina di mandorle e la scorza grattugiata del limone e incorporare con una spatola, con movimenti delicati dal basso verso l’alto. \nTrasferire nella tortiera rivestita di carta forno e cuocere 30 minuti a 160°C, forno statico, e poi alzare la temperatura a 180°C per altri 10 minuti o fino a doratura. \nFare raffreddare e servire a quadrotti dopo aver spolverato con zucchero a velo.","note":"","tags":[],"_importId":14613},{"nome":"Torta delle Monache senza farina e lievito: un dolce antico","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Torta delle Monache senza farina e lievito: un dolce antico, soffice e profumatissimo https://blog.giallozafferano.it/renatabriano/ricetta-torta-delle-monache-senza-farina-e-senza-lievito/","note":"","tags":[],"_importId":16235},{"nome":"TORTA DI  BANANE E CIOCCOLATO.","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: 2 (3 o 4) banane mature - 200 gr di farina 00 - 60 gr di olio di semi di girasole - 150 gr di zucchero (60)  - 2 uova grandi a temperatura ambiente - 200 gr di yogurt  greco a temperatura ambiente (io no)  - 16 gr di lievito per torte (10 gr bicarbonato) - vaniglia - 3 cucchiai di gocce di cioccolato - zucchero a velo per guarnire.\nPreparazione: montare in ciotola con le fruste elettriche le uova intere a temperatura ambiente con lo zucchero, fino ad avere un composto ben spumoso, poi unire l'olio a filo, lo yogurt  pure a temperatura ambiente . Setacciare la farina con il lievito, e unirla un po' alla volta dall'alto verso il basso, possibilmente a mano con una spatola. \nSbucciare le banane, tagliarle a dadini, e unirle con delicatezza al composto preparato, assieme a due cucchiai colmi di gocce di cioccolato, sempre mescolando dal basso verso l'alto. Versare tutto in una tortiera a cerniera, foderata  di carta forno, e una  volta ben livellato il composto,  cospargere la superficie  con un altro cucchiaio di gocce di cioccolata. Infornare in forno statico preriscaldato a 180 gradi, per  circa 40 minuti, fino a doratura. \nFreddare 10 minuti in teglia , poi sistemare su un piatto da portata.","note":"","tags":[],"_importId":9689},{"nome":"Torta di arance 🍊🍊🍊🍊🍊🍊🍊🍊🍊🍊🍊","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"uova"},{"qty":100.0,"unit":"n°","name":"zucchero"},{"qty":80.0,"unit":"g","name":"olio"},{"qty":200.0,"unit":"n°","name":"farina"},{"qty":1.0,"unit":"bustina","name":"lievito 8gr"},{"qty":175.0,"unit":"n°","name":"forno per 35/40min"},{"qty":2.0,"unit":"cucchiaio","name":"zucchero"},{"qty":2.0,"unit":"cucchiaio","name":"farina"},{"qty":200.0,"unit":"ml","name":"succo arancia"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":50.0,"unit":"g","name":"amido mais"},{"qty":100.0,"unit":"g","name":"olio semi"},{"qty":1.0,"unit":"n°","name":"arancia frullata"},{"qty":2.0,"unit":"n°","name":"cucchiaini"},{"qty":3.0,"unit":"n°","name":"uova"}],"procedimento":"Torta di arance 🍊🍊🍊🍊🍊🍊🍊🍊🍊🍊🍊\n\n3 uova\n100 zucchero \nSucco arancia 80gr\nBuccia arancia\n80gr olio\n200 farina\n1 bustina lievito 8gr\n\n175 forno per 35/40min\n\nCrema\n2cucchiai zucchero\n2 cucchiai farina\n200ml succo arancia\n\nNUOVA RICETTA \n\n100 gr zucchero \n200 gr farina 00\n50 gr amido mais\n100 gr olio semi\n1 arancia frullata\n2 cucchiaini (10 gr) bicarbonato \n3 uova","note":"","tags":[],"_importId":6433},{"nome":"Torta di carote","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"carote"},{"qty":80.0,"unit":"g","name":"olio di semi"},{"qty":100.0,"unit":"g","name":"succo d’arancia"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":200.0,"unit":"g","name":"zucchero"},{"qty":100.0,"unit":"g","name":"farina di mandorle"},{"qty":155.0,"unit":"g","name":"farina 00"},{"qty":50.0,"unit":"g","name":"fecola di patate"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":1.0,"unit":"pizzico","name":"sale"}],"procedimento":"Torta di carote\n\nIngredienti:\nper uno stampo a ciambella di 24 cm di diametro\n250 g di carote (al netto della buccia)\n80 g di olio di semi\n100 g di succo d’arancia\n3 uova (circa 162 g)\n200 g di zucchero\n100 g di farina di mandorle\n155 g di farina 00\n50 g di fecola di patate (sostituibile con amido di mais o frumina)\n1 bustina di lievito per dolci (16 g)\nscorza di 1 arancia\n1 pizzico di sale","note":"","tags":[],"_importId":1098},{"nome":"Torta di carote nocciole e arance","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina"},{"qty":250.0,"unit":"g","name":"carote"},{"qty":100.0,"unit":"g","name":"zucchero demerara"},{"qty":70.0,"unit":"g","name":"olio di semi"},{"qty":150.0,"unit":"g","name":"latte di soia"},{"qty":150.0,"unit":"g","name":"nocciole + 30 g sopra"},{"qty":80.0,"unit":"g","name":"spremuta d’arancia"},{"qty":16.0,"unit":"g","name":"lievito per dolci"},{"qty":1.0,"unit":"cucchiaio","name":"cacao amaro in polvere"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"},{"qty":1.0,"unit":"pizzico","name":"sale"}],"procedimento":"PROCEDIMENTO\nLava, pela le carote e grattugiale grossolanamente. \nTrita le nocciole finemente.\nIn una ciotola mischia la farina con il lievito, le nocciole tritate, le carote, lo zucchero, la buccia grattugiata, la vaniglia, un pizzico di sale e mescola. Aggiungi il latte, l’olio e il succo dell’arancia. Mescola per amalgamare. \nTrita molto grossolanamente le nocciole restanti. \nVersa il composto nello stampo, dai una spolverata di cacao e copri con le nocciole. In forno a 180 °C per 45-50 minuti. Dopo 30 minuti copri con alluminio per evitare che le nocciole si scuriscano troppo. Fai la prova stecchino prima di toglierla dal forno.","note":"","tags":[],"_importId":16265},{"nome":"TORTA DI CASTAGNE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"uova + zucchero 85 gr"},{"qty":150.0,"unit":"g","name":"esubero"},{"qty":100.0,"unit":"g","name":"olio semi"},{"qty":100.0,"unit":"g","name":"farina  + 2 cucchiaini bicarbonato"}],"procedimento":"TORTA DI CASTAGNE \n\n3 uova + zucchero 85 gr\n150gr esubero\n100gr olio semi\nCrema castagne \n100gr farina  + 2 cucchiaini bicarbonato \n\nVerso nella tortiera e cuocio in forno a 180 gradi per 1 ora","note":"","tags":[],"_importId":7954},{"nome":"TORTA DI CREMA DI MARRONI CON CREMA GANACHE AL CIOCCOLATO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"panna"},{"qty":1.0,"unit":"n°","name":"burro"},{"qty":1.0,"unit":"cucchiaino","name":"miele"},{"qty":200.0,"unit":"g","name":"cioccolato fondente"}],"procedimento":"TORTA DI CREMA DI MARRONI CON CREMA GANACHE AL CIOCCOLATO \nIngredienti \nCrema di marroni\nZucchero \nUova\nOlio di semi di arachidi \nSale\nFarina00\nBicarbonato\nBrandy Vecchia Romagna\n200gr panna\n1 noce di burro \n1 cucchiaino di miele \n200gr cioccolato fondente \n\nCROSTATA MELE E MARMELLATA DI ALBICOCCHE \nIngredienti \nMarmellata di albicocche \nAmaretti\nMele \nZucchero \nOlio di semi di arachidi \nFarina00\nLievito in polvere per dolci\nUova\nLimone\n\nTARALLI MG\nIngredienti \nFarina0\nEsubero di lievito madre\nOlio extravergine d’oliva \nVino bianco \nSale","note":"","tags":[],"_importId":9955},{"nome":"TORTA DI GRANO SARACENO CON FARCIA AI MIRTILLI 🍇✨","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"1️⃣ Preriscalda il forno a 180°C e prepara uno stampo per torta da 24 cm, imburrandolo e infarinandolo leggermente.  \n2️⃣ In una ciotola capiente, monta le uova con lo zucchero di canna fino ad ottenere un composto chiaro e spumoso.  \n3️⃣ Aggiungi l’olio di semi (o il burro fuso) e lo yogurt bianco al composto di uova, mescolando bene per amalgamare.  \n4️⃣ Setaccia insieme la farina di grano saraceno, la farina di mandorle, il lievito e un pizzico di sale. Aggiungi la scorza di limone o la vaniglia naturale.  \n5️⃣ Incorpora gradualmente gli ingredienti secchi nel composto liquido, mescolando con cura fino ad ottenere un impasto omogeneo.  \n6️⃣ Se desideri una torta più soffice, unisci un cucchiaio di miele e mescola bene.  \n7️⃣ Versa l’impasto nello stampo preparato e livellalo con una spatola.  \n8️⃣ Cuoci in forno preriscaldato per circa 40 minuti; verifica la cottura infilando uno stecchino al centro: dovrà uscire asciutto.  \n9️⃣ Sforna la torta e lasciala raffreddare completamente su una gratella.  \n🔟 Una volta fredda, taglia la torta a metà orizzontalmente con un coltello lungo e spalma uniformemente la confettura di mirtilli sulla base.  \n1️⃣1️⃣ Ricopri con l’altra metà della torta e spolvera la superficie con zucchero a velo.  \n1️⃣2️⃣ Decora con mirtilli freschi e foglie di menta per un effetto elegante e fresco.  \n1️⃣3️⃣ Servi a fette per colazione, merenda o come dolce da credenza.  \nBuon appetito! ❤️","note":"","tags":[],"_importId":15802},{"nome":"Torta di Mandorle","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":170.0,"unit":"g","name":"mandorle sgusciate"},{"qty":70.0,"unit":"g","name":"zucchero"},{"qty":40.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"cucchiaino","name":"lievito in polvere per dolci"}],"procedimento":"Dovrete ottenere una granella grossolana e non molto fine, nemmeno una farina: in questo modo la granella conferirà un sapore e una consistenza eccezionali.\nMontate le uova intere con lo zucchero fino ad ottenere un composto spumoso e chiaro: azionate le fruste ad alta velocità in modo da far incorporare aria alle uova. Non serve separare i tuorli dagli albumi.\nAggiungete le mandorle tritate e incorporatele.\nAggiungete la farina e il lievito e ultimate l’impasto mescolando bene gli ingredienti così da ottenere una consistenza fluida e corposa.\nVersate l’impasto in uno stampo da 20 cm imburrato e infarinato oppure rivestito di carta forno sul fondo. Procedete alla cottura della torta di mandorle.\nCOME CUOCERE LA TORTA DI MANDORLE\n\t\tPreriscaldate il forno a 180° in modalità statica e cuocete la torta alle mandorle nel ripiano centrale per 40 minuti, facendo sempre la prova stecchino per verificare la cottura.  Fate raffreddare bene la torta prima di levarla dallo stampo: spolverizzatela con zucchero a velo.","note":"","tags":[],"_importId":9840},{"nome":"Torta di mandorle e carote","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina 00 il viaggiator goloso®"},{"qty":250.0,"unit":"g","name":"carote"},{"qty":100.0,"unit":"g","name":"mandorle di avola il viaggiator goloso®"},{"qty":3.0,"unit":"n°","name":"uova il viaggiator goloso®"},{"qty":1.0,"unit":"n°","name":"arancia grande"},{"qty":150.0,"unit":"g","name":"olio di semi"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":16.0,"unit":"g","name":"lievito per dolci"},{"qty":null,"unit":"q.b.","name":"zucchero a velo"}],"procedimento":"Procedimento\n1\nFar bollire 100 g di mandorle con la buccia per qualche minuto, per poi spellarle e tritarle finemente in un mixer.\n2\nLavare e spellare le carote. Tritarle finemente in un mixer e aggiungere l’olio, continuando a miscelare finché non otterremo una crema liscia e omogenea.\n3\nIn una boule, montare le uova intere insieme allo zucchero alla massima velocità, per 10 minuti fino a ottenere un composto spumoso. In seguito, aggiungere al composto la crema di carote e la buccia grattugiata dell’arancia.\n4\nMescolare bene finché le carote non verranno assorbite. Unire, poco per volta la farina 00, le mandorle tritate in precedenza, il lievito, un pizzico di sale e amalgamare bene il tutto. Aggiungere il succo dell’arancia e mescolare nuovamente.\n5\nPrendere una tortiera dal diametro di 24 cm e cospargerla di olio di semi (o burro) e farina. Versare il composto e infornare a 180° in modalità ventilata, per 45-50 minuti.\n6\nRicordiamo che l’interno rimarrà umido, quindi lo stecchino utilizzato per valutare la cottura non sarà mai perfettamente asciutto. Una volta cotta, cospargere la torta con lo zucchero a velo e servire.","note":"","tags":[],"_importId":9881},{"nome":"Torta di Mandorle e Cocco Senza Farina","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1,"unit":"n°","name":"pizzico di sale"}],"procedimento":"Istruzioni:\n1. Inizia preriscaldando il forno a 180°C e rivestendo una teglia con carta da forno.\n2. In una grande ciotola, combina le mandorle tritate, il cocco grattugiato, lo zucchero, il lievito e il sale. Mescola bene per amalgamare gli ingredienti secchi.\n3. In un'altra ciotola, sbatti le uova con l'estratto di vaniglia fino ad ottenere un composto leggero e spumoso.\n4. Aggiungi lentamente gli ingredienti secchi al composto di uova, mescolando fino a ottenere un impasto omogeneo e ben incorporato.\n5. Versa l'impasto nella teglia preparata, livellando la superficie con una spatola.\n6. Inforna per 25-30 minuti o finché la torta non è dorata e uno stuzzicadenti inserito al centro esce pulito.\n7. Lascia raffreddare la torta nella teglia prima di trasferirla su un piatto da portata.\n8. Se desideri, spolvera la torta con zucchero a velo prima di servire.\n\nInformazioni Nutrizionali:\nPreparazione: 15 minuti | Cottura: 25-30 minuti.\nOgni fetta contiene circa 250 calorie, con un buon apporto di proteine e fibre grazie alle mandorle e al cocco. Questa deliziosa torta è perfetta per chi cerca un dolce leggero e gustoso, con il vantaggio di essere anche completamente priva di glutine.","note":"","tags":[],"_importId":14100},{"nome":"Torta di Mazzini","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"confezione di pasta sfoglia frolla"},{"qty":85.0,"unit":"g","name":"mandorle pelate"},{"qty":85.0,"unit":"g","name":"zucchero"},{"qty":2.0,"unit":"n°","name":"uova freschissime"},{"qty":1.0,"unit":"n°","name":"limone biologico"}],"procedimento":"Procedimento\nFrullare nel mixer le mandorle con un cucchiaio di zucchero, prelevato dalla quantità totale e aggiungervi la scorza grattugiata del limone.\nMontare a neve ben ferma gli albumi.\nMontare lo zucchero con i tuorli delle uova, aggiungervi le mandorle, un cucchiaino di succo di limone, gli albumi montati a neve  e mescolare delicatamente.\nSistemare la pasta sfoglia nella tortiera, distribuirvi sopra il composto ed eliminare i bordi in eccesso lasciando comunque un paio di cm, perché in cottura il composto di mandorle tende ad aumentare. \nCuocere in forno già caldo a 180° per circa mezz’ora, se la superficie si dovesse scurire troppo coprire con un foglio di carta di alluminio.\nServirla cosparsa di zucchero a velo.","note":"","tags":[],"_importId":10363},{"nome":"Torta di mele (mg)","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":90.0,"unit":"g","name":"zucchero, canna"},{"qty":3,"unit":"n°","name":"uova"},{"qty":350.0,"unit":"g","name":"mela frullata con buccia di limone e succo di limone"},{"qty":100.0,"unit":"g","name":"frutta secca mista"},{"qty":10.0,"unit":"g","name":"bicarbonato di sodio"}],"procedimento":"150 g di farine: 70 g di farina 00 e i restanti di farina di riso o amido di mais\nCannella a piacere\nUn pizzico di sale negli albumi, prima di montarli","note":"","tags":[],"_importId":16755},{"nome":"TORTA DI MELE 3 STRATI Streusel di mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":115.0,"unit":"g","name":"burro"},{"qty":450.0,"unit":"g","name":"mele"},{"qty":175.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"cucchiaino","name":"cannella in polvere"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":115.0,"unit":"g","name":"zucchero di canna"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":null,"unit":"cucchiaino","name":"latte"},{"qty":115.0,"unit":"g","name":"farina"},{"qty":85.0,"unit":"g","name":"burro"},{"qty":85.0,"unit":"g","name":"zucchero di canna"}],"procedimento":"Imburrate uno stampo a cerniera del diametro di 23 cm. Per la copertura di Streusel, in una terrina lavorate a mano la farina setacciata con il burro fino ad ottenere un composto granuloso. Aggiungete lo zucchero, continuate a lavorare con le mani e mette da parte.\nSbucciate, private dei semi e affettate le mele. Per la torta, setacciate la farina in una terrina con la cannella e il sale. In un’altra sbattete il burro con lo zucchero finchè non saranno spumosi. Incorporatevi poco alla volta le uova e un pò di farina per non fare impazzire il composto. Aggiungete la miscela di farina rimasta insieme al latte.\nVersate il composto nello stampo e livellatene la superficie. Non preoccupatevi se l’impasto sembrerà poco, livellatelo per bene, gonfierà. Coprite con le mele affettate creand così un secondo strato ed infine coprirete tutto con lo streusel. Fate cuocere in forno statico a 180°C per 1 ora, finchè la torta non sarà dorata e soda al tatto. Lasciate raffreddare nello stampo prima di sformare. Spolverizzate di zucchero a velo e servite.\nIngredienti: \n180 g di zucchero senza l’uso del bimby zucchero a velo\n350 g di farina “00”\n8 g di lievito per dolci\n1200 g di mele\n170 g di burro freddo\n1/2 cucchiaino di cannella in polvere\nProcedimento: in una ciotola mettete la farina e 60 g di zucchero a velo, il lievito e il burro tagliato a pezzi e impastate velocemente.\nOra prendete 2/3 dell’impasto e stendetelo su di una teglia, da cm 20×20 io non l’avevo e ho usto uno stampo da cm 26, dopodiche fatelo riposare in frigorifero.\nOra con il resto dell’impasto riducetelo in briciole e mettetelo in congelatore, nel frattempo affettate le mele sottilmente e mettetele in una ciotola facendole insaporire insieme allo zucchero a velo rimasto e la cannella.\nTogliete lo stampo dal frigorifero e versateci le mele pressandole con forza sulla base dell’impasto per livellare la superficie, quindi tritate con con un mixer l’impasto congelato econ le briciole coprite le fettine di mele.\nQuindi cuocete in forno caldo a 160°C sino a quando vedrete la vostra torta di mele dei tantra dorata, ci vorranno circa 65/ 60 minuti.","note":"","tags":[],"_importId":246},{"nome":"TORTA DI MELE CON FARINA DI FARRO E","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"mele"},{"qty":120.0,"unit":"g","name":"farina di farro integrale macinata a pietra"},{"qty":100.0,"unit":"g","name":"yogurt bianco"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":60.0,"unit":"g","name":"olio di cocco"},{"qty":80.0,"unit":"g","name":"miele millefiori"},{"qty":8.0,"unit":"g","name":"lievito per dolci"},{"qty":1.0,"unit":"cucchiaio","name":"zucchero di canna"},{"qty":1.0,"unit":"n°","name":"limone, solo il succo"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"}],"procedimento":"Procedimento:\nCome prima cosa sbucciamo le mele, facciamole a fettine oppure a tocchetti, irroriamole col succo di limone e un cucchiaio di zucchero di canna.\nIn una terrina capiente sbattiamo l’uovo con l’estratto di vaniglia e il miele con una frusta manuale, poi aggiungiamo lo yogurt e  incorporiamo per bene. Sciogliamo l’olio di cocco (il mio si è solidificato quindi andava fuso) a bagnomaria e uniamo anche quest’ultimo al composto.\n\nSetacciamo il lievito nella farina e aggiungiamo questi due ingredienti poco per volta all’impasto, usando sempre una frusta manuale.\n\nQuando il composto si presenta bello liscio e corposo aggiungiamo le mele.\nNon resta che rivestire di carta forno uno stampo a cerniera di 18 cm e versare al suo interno l’impasto appena realizzato.\nDiamogli qualche colpetto per uniformare le superficie e portiamo in forno ventilato a 170 gradi (se statico a 180). Lasciamo cuocere per 35/40 minuti. Facciamo sempre la prova stecchino.\n\nQuando la nostra torta è pronta, lasciamo raffreddare completamente prima toglierla dallo stampo e cospargerla con zucchero a velo.\n\nQuesta torta mangiata fredda da frigo è ancora più buona!\nAuguro a tutti voi buon appetito e alla prossima ricetta!\nVi aspetto sulla mia pagina  – “Pane e Mortadella”","note":"","tags":[],"_importId":11851},{"nome":"Torta di mele cremosa","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":130.0,"unit":"g","name":"farina 00"},{"qty":2.0,"unit":"n°","name":"uova grandi"},{"qty":120.0,"unit":"g","name":"zucchero semolato"},{"qty":4.0,"unit":"n°","name":"mele golden grandi"},{"qty":300.0,"unit":"ml","name":"latte"},{"qty":60.0,"unit":"g","name":"burro"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"}],"procedimento":"Procedimento\n\nSbucciate le mele e tagliatele a fettine sottili, irrorate con un po’ di succo di limone e zucchero e mettete da parte.\nSciogliete il burro in un pentolino e mettete da parte.\nMontate le uova insieme allo zucchero semolato fino ad ottenere un composto chiaro e spumoso.\nAggiungete delicatamente il latte continuando a montare con le fruste elettriche, il composto vi apparirà molto liquido, è normale!\nAggiungete la farina 00, il lievito setacciati in più riprese continuando a montare con le fruste.\nUnite la cannella ed il burro, continuando a montare fino ad incorporarlo del tutto.\nAggiungete le mele tagliate a fettine mettendone alcune da parte per la superficie.\nTrasferite il composto in una teglia da 24 cm ben imburrata, aggiungete le mele tagliate a fettine sulla superficie e cospargete con zucchero di canna.\nCuocete a 200° per circa 50- 55 minuti, in questo caso la prova stecchino sarà inutile perchè non sarà mai asciutto grazie alla cremosità delle mele. Il mio consiglio è di controllare spesso durante gli ultimi minuti di cottura, se dovesse scurirsi troppo coprire con carta argentata.\nTrascorso il tempo necessario sfornate la torta di mele cremosa e fate riposare, il mio consiglio è di prepararla come sempre il giorno prima! Con il tempo si assesta e diventa più buona, meglio farla raffreddare completamente e gustarla dopo tempo!","note":"","tags":[],"_importId":398},{"nome":"TORTA DI MELE E MASCARPONE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: 250 gr di mascarpone  - 150 gr di zucchero - 250 gr di farina - 4 uova - una bustina di lievito per torte  - 3 mele golden.\nPreparazione : montare le uova con lo zucchero, aggiungere il mascarpone e lavorare fino ad incorporarlo del tutto, ottenendo.un composto liscio e cremoso . Unire la farina setacciata col lievito e lavorare ancora.\nSbucciare le mele e tagliarle a dadini poi unirle al composto, mescolando delicatamente a mano.Versare tutto in una tortiera già  imburrata e infarinata.\n( io l'ho versata nei pirottini di carta). \nMettere in forno preriscaldato a 180 gradi,  per un'ora circa..","note":"","tags":[],"_importId":9880},{"nome":"Torta di mele e noci senza burro","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina"},{"qty":150.0,"unit":"g","name":"zucchero a velo"},{"qty":150.0,"unit":"g","name":"olio evo"},{"qty":5.0,"unit":"n°","name":"uova"},{"qty":1,"unit":"n°","name":"bustina di lievito"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":3.0,"unit":"n°","name":"mele"},{"qty":12.0,"unit":"n°","name":"noci"},{"qty":200.0,"unit":"g","name":"marmellata di pesche"}],"procedimento":"Impastare gli ingredienti della pasta come per una normale frolla. Il risultato sarà un impasto più morbido, ma che non deve risultare appiccicoso, eventualmente aggiungere uno  o due cucchiai di farina. Lasciare riposare in frigo per almeno 30 minuti. Nel frattempo preparare il ripieno. Sbucciare le mele, tagliarle a cubetti e farle cuocere alcuni minuti con il succo di limone, la cannella e la marmellata. Unire per ultimo i gherigli di noce spezzettati grossolanamente. In una teglia, foderata da carta da forno, creare un guscio con i 2/3 dell’impasto. Versarvi all’interno il ripieno (lasciato intiepidire) coprire uniformemente la superficie con la restante pasta facendola passare nello schiaccia patate. Cuocere in forno preriscaldato per 40/45 minuti a 180°. Far raffreddare la torta sul’apposita gratella e spolverarla di zucchero a velo prima di servirla.","note":"","tags":[],"_importId":115},{"nome":"Torta di mele e uvetta.","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti:3 uova,5 mele golden,30 ml di latte,cannella,150 gr di uvetta ,6 cucchiai di zucchero,150 gr di burro,6 cucchiai di farina,1 bustina di lievito.\nSciogliere il burro aggiungere le uova con lo zucchero sbattere bene.\nAggiungere il latte,la farina setacciata con il lievito e dei pizzichi di cannella. \nMettere l'uvetta precedentemente ammollata. \nInfine le mele a fettine o a pezzetti.\nLa torta va cotta dai 30 /40 minuti a 180 °.","note":"","tags":[],"_importId":10002},{"nome":"Torta di mele integrale","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"farina 00"},{"qty":150.0,"unit":"g","name":"farina integrale"},{"qty":100.0,"unit":"g","name":"zucchero di canna"},{"qty":100.0,"unit":"ml","name":"olio di semi"},{"qty":250.0,"unit":"ml","name":"latte"},{"qty":1,"unit":"n°","name":"pizzico di sale"},{"qty":2.0,"unit":"n°","name":"mele"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":2,"unit":"n°","name":"cucchiai di zucchero di canna"},{"qty":1,"unit":"n°","name":"manciata di mandorle a lamelle"}],"procedimento":"In una ciotola miscelate le farine con lo zucchero (100 g), il lievito, la buccia di limone grattugiata e un pizzico di sale. Unite, mescolando, il latte e l’olio. Amalgamate bene.\nSbucciate una mela e mezza, tagliate a fettine sottili, e aggiungetele all’impasto. Versate il composto nello stampo imburrato e infarinato oppure rivestito di carta da forno.\nTagliate la mezza mela rimasta a fettine sottili e sistematele sulla superficie della torta inserendole di taglio tutto intorno (vedrete che bell’effetto). Cospargete con due cucchiai di zucchero di canna e qualche lamella di mandorle.\nInfornate in forno caldo a 175 °C per 35/40 minuti.\nSfornate e fate raffreddare prima di servire.","note":"","tags":[],"_importId":42},{"nome":"Torta di Mele Leggerissima 🍏🍰","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"mele"},{"qty":120.0,"unit":"g","name":"zucchero"},{"qty":100.0,"unit":"g","name":"farina"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":60.0,"unit":"ml","name":"olio di semi"},{"qty":60.0,"unit":"ml","name":"latte"}],"procedimento":"Preparazione:\n\n1. Preparazione delle mele:\n- Sbuccia le mele e tagliale a fettine sottili.\n- Metti le fettine di mela in una ciotola e irrorale con un po' di succo di limone per evitare che anneriscano.\n- In una padella, metti 2 cucchiai di zucchero e le mele, cuoci a fuoco medio finché non appassiscono.\n\n2. Preparazione dell'impasto:\n- In una ciotola grande, sbatti le uova con lo zucchero fino a ottenere un composto spumoso e chiaro.\n- Aggiungi gradualmente l'olio e il latte, alternando con la farina setacciata e il lievito. Mescola bene fino a ottenere un impasto omogeneo.\n\n3. Assemblaggio della torta:\n- Ungi una teglia per torte e cospargila leggermente di farina.\n- Versa l'impasto nella teglia e disponi sopra le fettine di mela.\n\n4. Cottura:\n- Cuoci in forno preriscaldato a 180°C per circa 40 minuti o fino a quando uno stuzzicadenti inserito nel centro della torta non esce pulito.\n\n5. Finitura e servizio:\n- Lascia raffreddare la torta nella teglia per qualche minuto, poi trasferiscila su una griglia per farla raffreddare completamente.\n- Prima di servire, spolverizza la superficie con zucchero a velo.\n\nQuesta torta di mele leggerissima è perfetta per un dessert dopo cena o per accompagnare il tè del pomeriggio. Buon appetito! 🍏🍰\n\n  Torta di Mele Leggerissima 🍏🍰\n\nIngredienti:\n\n- 3 mele\n- 120 g di zucchero\n- 100 g di farina\n- 1 bustina di lievito per dolci\n- 2 uova\n- 60 ml di olio di semi\n- 60 ml di latte\n- Zucchero a velo (per decorare)\n\nPreparazione:\n\n1. Preparazione delle mele:\n- Sbuccia le mele e tagliale a fettine sottili.\n- Metti le fettine di mela in una ciotola e irrorale con un po' di succo di limone per evitare che anneriscano.\n- In una padella, metti 2 cucchiai di zucchero e le mele, cuoci a fuoco medio finché non appassiscono.\n\n2. Preparazione dell'impasto:\n- In una ciotola grande, sbatti le uova con lo zucchero fino a ottenere un composto spumoso e chiaro.\n- Aggiungi gradualmente l'olio e il latte, alternando con la farina setacciata e il lievito. Mescola bene fino a ottenere un impasto omogeneo.\n\n3. Assemblaggio della torta:\n- Ungi una teglia per torte e cospargila leggermente di farina.\n- Versa l'impasto nella teglia e disponi sopra le fettine di mela.\n\n4. Cottura:\n- Cuoci in forno preriscaldato a 180°C per circa 40 minuti o fino a quando uno stuzzicadenti inserito nel centro della torta non esce pulito.\n\n5. Finitura e servizio:\n- Lascia raffreddare la torta nella teglia per qualche minuto, poi trasferiscila su una griglia per farla raffreddare completamente.\n- Prima di servire, spolverizza la superficie con zucchero a velo.\n\nQuesta torta di mele leggerissima è perfetta per un dessert dopo cena o per accompagnare il tè del pomeriggio. Buon appetito! 🍏🍰","note":"","tags":[],"_importId":12506},{"nome"
