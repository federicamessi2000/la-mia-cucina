:"Torta di mele sbriciolata: la ricetta facile per un","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Tagliate le mele a pezzetti e mettetele in una casseruola con il succo di limone, lo zucchero e l’amido.\nCuocere a fuoco basso per 10 minuti, mescolando di tanto in tanto.\nLasciare raffreddare.\nOra preparate la pasta frolla mescolando la farina, la fecola, lo zucchero e la vaniglia.\nAggiungete poi il burro a pezzetti, quindi lavorate con le mani per amalgamare gli ingredienti.\nAggiungete anche i tuorli e mescolate fino ad ottenere un composto sabbioso.\nCon questo composto formate una base in uno stampo e appiattitela con un cucchiaio.\nAggiungere le mele precedentemente cotte.\nRicoprire quindi con altra pasta sbriciolata.\nCuocere in forno statico preriscaldato a 180 gradi per 45 minuti.\nDecorare con zucchero a velo\n  Ciò di cui hai bisogno è 1 tazza e 3/4 di farina per tutti gli usi e 1 cucchiaio.\nlievito in polvere, 2 cucchiaini\ntre grandi uova\n1 tazza di zucchero, semolato\n1 tazza di panna acida o yogurt bianco\nMezzo cucchiaino di sale`\nquarto di cucchiaino di vaniglia\n1/3 tazza di olio vegetale\nuna tazza e mezza di mirtilli, freschi o congelati, e due cucchiaini di scorza di limone\nSciroppo di limone zuccherato\nsucco di limone, 2-3 cucchiai\nZucchero a velo setacciato, misura 1 tazza\nPreparare la pagnotta al limone e mirtilli in modo semplice\nPer iniziare, riscaldare il forno a 350 gradi.\nPreparare una teglia ungendone l’interno e l’esterno.\nPer il pane setacciare insieme tutti gli ingredienti secchi.\nRaccogli tutti gli ingredienti bagnati in una grande ciotola e mescola per unirli.\nUna pagnotta di mirtilli al limone\njuin 30, 2024 par admin\nRaccogli tutti gli ingredienti bagnati in una grande ciotola e mescola per unirli.\nI componenti secchi vanno aggiunti gradualmente.\nUnisci i mirtilli e la farina in una bacinella separata; quindi, unire gradualmente i due ingredienti alla pastella.\nUna volta pronta la padella, versare l’impasto.\nContinuare a cuocere per 50-55 minuti. Si capisce quando il pane è cotto quando uno stuzzicadenti esce pulito.\nSfornatelo e mettetelo da parte a raffreddare per una decina di minuti.\nLasciare raffreddare il pane su una gratella dopo averlo tolto dallo stampo.\nSciogliere lo zucchero a velo nel succo di limone in un pentolino a fuoco basso. Abbassare la fiamma e cuocere a fuoco lento per tre minuti.\nInserisci uno stuzzicadenti in ogni angolo e fessura del pane per creare dei buchi.\nApplicare lo sciroppo di limone sulla superficie e sui lati con un pennello da cucina.\nAttendere 15 minuti prima di tagliare e servire.","note":"","tags":[],"_importId":13681},{"nome":"TORTA DI MELLE DELLA NONNA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":130.0,"unit":"g","name":"farina di mandorle"},{"qty":100.0,"unit":"g","name":"farina di riso"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":60.0,"unit":"g","name":"margarina vegetale o un’altra alternativa al burro"},{"qty":80.0,"unit":"g","name":"eritritolo"},{"qty":4.0,"unit":"n°","name":"mele"},{"qty":300.0,"unit":"g","name":"bevanda vegetale"},{"qty":12.0,"unit":"g","name":"lievito in polvere per dolci"},{"qty":null,"unit":"q.b.","name":"cannella"}],"procedimento":"TORTA DI MELLE DELLA NONNA\n\nINGREDIENTI\n\n130 g farina di mandorle\n100 g farina di riso\n2 uova\n60 g margarina vegetale o un’altra alternativa al burro \n80 g eritritolo\n4 mele\n300 g bevanda vegetale\n12 g lievito in polvere per dolci\nCannella q.b\n\nCottura: forno statico preriscaldato a 180° per 40 minuti.\nDimensione stampo: 24 cm.","note":"","tags":[],"_importId":16195},{"nome":"Torta di pane al latte in pochi minuti in padella","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"pane raffermo"},{"qty":250.0,"unit":"ml","name":"latte"},{"qty":2.0,"unit":"n°","name":"uova medie"},{"qty":6.0,"unit":"cucchiaio","name":"olio extra vergine d’oliva"},{"qty":2.0,"unit":"pizzico","name":"sale"},{"qty":100.0,"unit":"g","name":"pomodorini"},{"qty":100.0,"unit":"g","name":"mozzarella"}],"procedimento":"Molto veloce da realizzare con pochissimi ingredienti che sicuramente tutti abbiamo nelle nostre credenze.\nIniziamo con far ammollare il pane, ottimo anche quello avanzato, in una ciotola in cui abbiamo versato del latte.\nQuindi lo strizziamo e lo poniamo in una ciotola. Mettiamo le uova e due pizzichi di sale, lavorandolo con le mani.\nIn una padella antiaderente, versiamo i cucchiai d’olio extra vergine d’oliva. Stendiamo metà del composto di pane.\nCopriamo tutto il fondo, poi su, distribuiamo pomodorini tagliati a metà. Quindi la mozzarella tagliata a piccoli pezzetti.\nInfine copriamo per bene il tutto con l’altra metà dell’impasto di pane. Comprimendo con il dorso di un cucchiaio.\nCuociamo a fuoco basso per 20 minuti. Avendo cura di capovolgerlo, con l’ausilio di un piatto, a metà cottura.\nLasciamo riposare 15 minuti, capovolgendo poi di nuovo la nostra torta di pane. Abbiamo preparato un piatto economico.\nDa approntare in poco tempo. Ottenendo un fantastico risultato. Lascerà più che soddisfatti tutti coloro che l’assaggeranno.\nIn più, per preparare questa torta rustica, non dovremo utilizzare in alcun modo il forno risparmiando gas e calore.\nSe vi farà piacere, potrete inviarmi le foto dei vostri risultati. Le posterò molto volentieri nella mia pagina.","note":"","tags":[],"_importId":10961},{"nome":"TORTA DI PANE RAFFERMO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":"pane raffermo"},{"qty":75.0,"unit":"g","name":"zucchero"},{"qty":30.0,"unit":"g","name":"pinoli"},{"qty":35.0,"unit":"g","name":"uvetta ammollata nella grappa"},{"qty":600.0,"unit":"ml","name":"latte"},{"qty":20.0,"unit":"g","name":"cacao amaro"},{"qty":20.0,"unit":"g","name":"canditi all’arancia"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":2.0,"unit":"n°","name":"mele medie o la frutta che preferite"}],"procedimento":"Ammollare il pane nel ro per almeno 30 minuti.\n * Trascorso il tempo di riposo, stendi l'impasto su un piano leggermente infarinato fino ad ottenere uno spessore di circa 3-4 mm.\n * Rivesti con la pasta una tortiera a cerniera (circa 22-24 cm di diametro) imburrata e infarinata, facendo risalire i bordi di circa 2-3 cm.\n * Buccherella il fondo della base con una forchetta.\n * Metti la tortiera in frigorifero mentre prepari il ripieno.\nPreparazione del ripieno:\n * In una ciotola, mescola la ricotta ben scolata con lo zucchero semolato fino ad ottenere un composto cremoso.\n * Aggiungi le uova una alla volta, mescolando bene dopo ogni aggiunta.\n * Incorpora l'amido di mais setacciato e mescola fino ad ottenere un composto liscio.\n * Aggiungi la scorza grattugiata e il succo di limone e mescola.\n * In una piccola ciotola, infarina leggermente l'uvetta. Questo aiuterà a distribuirla uniformemente nel ripieno.\n * Aggiungi l'uvetta infarinata al composto di ricotta e mescola delicatamente per incorporarla.\nAssemblaggio e cottura:\n * Versa il ripieno di ricotta nella base della torta.\n * Livella delicatamente la superficie con una spatola.\n * Cuoci in forno statico preriscaldato a 180°C per circa 50-60 minuti, o fino a quando il ripieno sarà sodo al tatto e leggermente dorato. Il tempo di cottura può variare a seconda del forno.\n * Una volta cotta, sforna la torta e lasciala raffreddare completamente nella tortiera prima di aprirla.\n * Se desideri, spolvera la superficie con zucchero a velo prima di servire.\nLa torta di ricotta e uvetta è ottima servita fredda o a temperatura ambiente. Buon appetito!","note":"","tags":[],"_importId":14358},{"nome":"TORTA DI RISO SALATA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Angelo ci racconta che da ragazzino, finite le scuole, lo mandavano a passare l'estate dai nonni ad Alice di Gavi  in provincia di Alessandria, dove ogni anno si svolgeva la Sagra della Torta di Riso.\nIngredienti: per la Sfoglia: acqua 150 ml - olio 30 gr.- farina 300 gr - sale 4 gr.\nRipieno: 1 litro di acqua - 20 gr di sale grosso - 120 ml di latte - 300 gr di riso Carnaroli - 80 gr di parmigiano grattato, di cui 40 gr dentro al riso in cottura e 40 gr sopra alla torta - una bustina di zafferano - 40 gr di burro - 1 uovo - 60 gr di olio di semi.- noce moscata.\nPreparazione: mettere nella impastatrice acqua olio e sale, mescolare, poi unire la farina e impastare. La sfoglia è  pronta quando l'impasto si stacca dalle pareti della ciotola.\nFare una pagnotta con l'impasto, coprire con la pellicola, e far riposare.\nIntanto in una pentola mettere a bollire l'acqua con il sale e il latte, poi cuocere il riso per 3/4 minuti, poi unire il burro, il grana, un uovo e lo zafferano e portare a cottura al dente.\nStendere la sfoglia col mattarello,  e coprire una teglia da 37 cm, facendo debordare la pasta. Dentro sistemare  il riso cotto, a cui è  stato aggiunto l'olio di semi, e livellare bene, poi ripiegare I bordi della pasta, sul ripieno. Sopra mettere il parmigiano rimasto e cuocere in forno preriscaldato a 190 gradi per 30 minuti fino a doratura.  Far freddare prima di consumarla.\nGrazie Angelo per questi tuoi ricordi!","note":"","tags":[],"_importId":9877},{"nome":"Torta di Rose Mantovana 🌹🍰**","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina 00"},{"qty":120.0,"unit":"g","name":"zucchero semolato"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":100.0,"unit":"g","name":"burro"},{"qty":130.0,"unit":"ml","name":"latte"}],"procedimento":"Torta di Rose Mantovana 🌹🍰**\nUn classico elegante e profumato, perfetto per le occasioni speciali o per coccolarsi a colazione. Con il suo aspetto incantevole a forma di bouquet e l’impasto soffice farcito con crema al burro, questa torta conquisterà tutti al primo sguardo… e al primo morso!\n**📝 Ingredienti per l’impasto:**\n500 g di farina 00\n120 g di zucchero semolato\nScorza di un limone grattugiata\n2 uova\n100 g di burro (scio osto. Prendete la marmellata e distribuitela a cucchiaiate sulla torta. Attenzione: il fatto che la marmellata resti in mezzo all’impasto piùttosto che andare sul fondo dipenderà dalla sua densità. Scegliete, dunque, una composta o confettura di albicocche non molto densa o “allungatela” con un po’ di acqua tiepida.\nInfornate in forno già caldo a 180° per circa 30 minuti (forno statico, posizione centrale). Sfornate la Torta Cesira con yogurt, mandorle e marmellata e fate completamente raffreddare. poi spolverate con abbondante zucchero a velo ed un po’di mandorle in scaglie e servite.\n\n180 gradi 50 min\n\nCon dentro pinoli e uvetta\nCon le mele sopra poi marmellata albicocche e grani di zucchero \n180 gradi 60 min + 15 min ventola","note":"","tags":[],"_importId":871},{"nome":"Torta mele","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"30 min cuocere mele con buccia a fette \nLimone o arancia\n1 hg zucchero\n2 tuorli \nZucchero \nSale\nDiventa Spuma\nAlbumi montati a neve\nFarine setacciate con lievito\nAmalgamo fino ad 1 bicchiere di latte\nAggiungo albumi\nStrato pasta sotto\nPoi mele\nPoi strato pasta\n40 min 175gradi\n1 kg zucchero","note":"","tags":[],"_importId":1143},{"nome":"TORTA MELE E RICOTTA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti per uno stampo da 20/22: 250 gr farina 00 250 gr ricotta 150 gr zucchero 50 ml latte 2 uova intere 1 bustina di lievito per dolci 2 mele grandi zucchero di canna zucchero a velo\nProcedimento per fare la torta mele e ricotta:\n\nMettete la farina in una ciotola insieme alla ricotta, le uova, il latte e lo zucchero e mescolate in modo da amalgamare tutto il composto. Unite per ultimo anche il lievito per dolci e mescolate in modo che non ci siano grumi. Va bene anche un cucchiaio. Unite una delle due mele sbucciate e tagliate a dadini e uniformate tutto. Versate il composto in una teglia con carta forno oppure oleata o imburrata e livellate la superficie. Decor o ci aggiungiamo la farina setacciata,il lievito per dolci,la buccia di limone grattugiata e mescoliamo il tutto con lo sbattitore per 1 minuto.Infine versiamo nel composto ottenuto i pezzettini di nocipesche e con una spatola mescoliamo delicatamente il tutto fino ad amalgamare tutti gli ingredienti.Adesso versiamo il nostro impasto in una teglia diametro 24 cm precedentemente imburrata ed infarinata ed inforniamo a 180 gradi in forno statico preriscaldato per circa 25 minuti(il tempo di cottura può variare a seconda del tipo di forno utilizzato).Una volta pronta la nostra torta la lasciamo raffreddare e poi la decoriamo con una spolverata di zucchero a velo e qualche foglia di menta.\n\nBUON APPETITO\n\nVideo ricetta nel primo commento ☺️👇👇👇\n\n  https://youtu.be/gdWy27Xs1cs","note":"","tags":[],"_importId":7563},{"nome":"TORTA ORTIGARA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":170.0,"unit":"g","name":"farina 00"},{"qty":170.0,"unit":"g","name":"zucchero"},{"qty":150.0,"unit":"g","name":"burro fuso"},{"qty":100.0,"unit":"g","name":"farina di mandorle"},{"qty":2.0,"unit":"n°","name":"uova intere + 1 tuorlo"},{"qty":1,"unit":"n°","name":"cucchiaiata di mandorle"},{"qty":8.0,"unit":"g","name":"lievito per dolci"}],"procedimento":"Sbattere con una frusta a mano le  uova con lo zucchero,  unire il burro fuso sempre mescolando, quindi unire le farine, il lievito e la scorza di limone. Mescolare bene fino ad ottenere un composto omogeneo. \nRiscaldare il forno a 175 gradi. Imburrare e infarinare uno stampo di cm 24 circa, versare il composto e cospargerlo con le mandorle. Cuocere per 35 minuti.  Sfornare, far raffreddare e cospargere con abbondante zucchero a velo. \nSe non si ha la farina di mandorle si può frullare molto finemente 100 gr di mandorle spellate con 20 gr di zucchero presi dai 170 da utilizzare","note":"","tags":[],"_importId":12471},{"nome":"Torta prugne e mandorle","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":80.0,"unit":" "},{"qty":30.0,"unit":"n°","name":"min in frigo coperto con telo"}],"procedimento":"Dopo divido in 3 le due parti facendo delle palline in tutto saranno 6 e le lascio riposare 30 minuti coperte\nTeglia 26 cm\nStendiamo i tre palline più grandi molto sottili aiutandoci con la semola e in modo che siano più grandi della base della teglia per fare i bordi\nTra i tre dischi di pasta spennelliamo con olio extravergine d’oliva e li mettiamo uno sopra l’altro\n  Sull’ultimo strato non metto olio ma il ripieno di spinaci e ricotta.\nLo stesso procedimento con le tre palline più piccole \nRipieghiamo il bordo con la pasta sotto su qlla sopra \nSpennello con soluzione olio e acqua in egual misura e bucherello con forchetta \n  Forno 180 gradi per 50 minuti \n  ( lievito madre consigli e ricette canale )","note":"","tags":[],"_importId":16146},{"nome":"TORTA SALATA CON FARINA DI CECI E SCAROLE 🫒✨","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":125.0,"unit":"g","name":"farina 00","sezione":"Per la pasta"},{"qty":125.0,"unit":"g","name":"farina di ceci","sezione":"Per la pasta"},{"qty":100.0,"unit":"ml","name":"acqua","sezione":"Per la pasta"},{"qty":90.0,"unit":"ml","name":"olio extravergine d’oliva","sezione":"Per la pasta"},{"qty":1.0,"unit":"kg","name":"scarola","sezione":"Per il ripieno"},{"qty":2.0,"unit":"n°","name":"aglio","sezione":"Per il ripieno"},{"qty":2.0,"unit":"cucchiaio","name":"capperi","sezione":"Per il ripieno"},{"qty":3.0,"unit":"n°","name":"acciughe","sezione":"Per il ripieno"},{"qty":150.0,"unit":"g","name":"olive nere","sezione":"Per il ripieno"},{"qty":200.0,"unit":"g","name":"provolone","sezione":"Per il ripieno"},{"qty":4.0,"unit":"cucchiaio","name":"olio","sezione":"Per il ripieno"}],"procedimento":"PROCEDIMENTO\nMescola acqua e olio, aggiungi farina di ceci, poi farina 00 e sale. Lavora fino a ottenere un panetto morbido e lascia riposare 30 minuti.\nPrepara il ripieno facendo soffriggere aglio, acciughe, olive e capperi. Aggiungi la scarola e falla appassire finché asciutta.\nStendi l’impasto, rivesti una tortiera da 24 cm, bucherella il fondo e distribuisci il ripieno. Completa con provolone grattugiato e cuoci a 180°C per 30 minuti.\n\nSalvala per provarla questo weekend 💛\n\n#tortasalata #ricettefacili #farinadiceci #cucinaitaliana","note":"","tags":[],"_importId":16325},{"nome":"TORTA SALATA PASTA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 0"},{"qty":100.0,"unit":"g","name":"vino bianco"},{"qty":30.0,"unit":"ml","name":"olio"},{"qty":150.0,"unit":"g","name":"esubero"},{"qty":200.0,"unit":"g","name":"farina 0"},{"qty":80.0,"unit":"g","name":"vino bianco"},{"qty":25.0,"unit":"g","name":"olio"},{"qty":190.0,"unit":"n°","name":"con ventola per 10 min circa"}],"procedimento":"TORTA SALATA PASTA\n\n300 gr farina 0\n100 gr vino bianco \n30 ml olio\nSale 1 cucchiaino \n\nOppure\n\n150 gr esubero \n200 gr farina 0\n80 gr vino bianco \n25 gr olio \nSale 1 cucchiaino\n\nImpastare il tutto per almeno 5 min o finché non sarà amalgamato\n\nFare piano sotto e sopra\nRiposo 15/20 minuti \n\nSpessore 5\nPosizione 2 partendo dall’alto \n190 con ventola per 10 min circa","note":"","tags":[],"_importId":8015},{"nome":"Torta salata patate rosse","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":2.0,"unit":"n°","name":"patate bollite"}],"procedimento":"Torta salata patate rosse\n\nRadicchio\nRicotta\nNoci\nProsciutto cotto poco o pancetta \nPatate dolci\nFormaggio grattugiato \n\nTorta asparagi o carciofi \nFontina\nUova\nRicotta\nParmigiano reggiano \nAsparagi (circa 10) o carciofi (almeno 3)\nSpeck 1/2 hg\n2 Patate bollite","note":"","tags":[],"_importId":9553},{"nome":"Torta soffice alle fragole e ricotta","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"cestino di fragole"},{"qty":250.0,"unit":"g","name":"ricotta"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":190.0,"unit":"g","name":"farina di riso impasto io"},{"qty":30.0,"unit":"g","name":"fecola di patate impasto io"},{"qty":30.0,"unit":"g","name":"amido di tapioca impasto io"},{"qty":200.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":1.0,"unit":"cucchiaio","name":"maraschino"}],"procedimento":"Procedimento\n\nCon l’aiuto delle fruste elettriche montate le uova con lo zucchero , fino a renderle chiare e spumose.\n\nUnite la ricotta e il maraschino e continuate a mescolare con le fruste.\n\nSetacciare le farine e il lievito e unitele al composto di uova , un po per volta. Mescolate con un cucchiaio o paletta per dolci.\n\nVersate il composto in una tortiera da 24 foderata con carta da forno.\n\nLavate e tagliate a metà le fragole.\n\nDisponete le fragole sull’ impasto formando dei raggi.\n\nInfornate la torta a 180° per 40/ 45 minuti\n\nSfornate e lasciatela raffreddare prima di decorarla con dello zucchero a velo","note":"","tags":[],"_importId":1268},{"nome":"TORTA SOFFICISSIMA AGLI AGRUMI","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"– 1 bicchiere di latte – 2 di zucchero (bicchiere da usare come misura) – 3 uova – 3 bicchieri di farina – 1 vanillina – 1 bustina di lievito – 1/2 bicchiere di olio di semi – essenza vaniglia – succo di 2 arance piccole – succo di 1/2 limone – scorza di 1 limone\nPROCEDIMENTO :\nLavorate in una ciotola le uova e lo zucchero con uno sbattitore elettrico alla massima velocità almeno per 10 minuti fino a renderle belle spumose e schiarite. Aggiungete ora un bicchiere di latte e pian piano la farina a pioggia e il lievito setacciati , unite poi l’olio la scorza del limone e il succo delle arance e del limone. Continuate a lavorare benissimo il composto che dovrà presentarsi cremoso fluido e senza grumi. Imburrate e infarinate una tortiera 24 cm. e versate il composto livellatelo bene con un cucchiaio , infornate a 180 gradi per 40-45 minuti circa a forno statico ( consiglio sempre la prova stecchino). Una volta pronta fattela raffreddare bene prima di sformarla perché è molto soffice e spolveratela con abbondante zucchero a velo vedrete è una vera delizia !","note":"","tags":[],"_importId":955},{"nome":"TORTA SUPER SOFFICE ALLE MELE 🍏 🍎","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"1 kg dimele tagliate a cubetti Tre uova intere 170 di zucchero 1 bustina di lievito 150 di burro fuso 180 di latte intero 300 di Farina 00  1 limone 150 gr di uva passa ...\n Mescolare zucchero e uova per 10 minuti, aggiungere tutti gli ingredienti e frullare, nel frattempo tagliare a pezzetti le mele e irrorarle col succo del limone, lavare le uvette e asciugarle...mettere tutto assieme e mescolare per bene...a questo punto mettere l'impasto in una tortiera da cm 28 dopo aver messo la carta forno, mettere  a 180 gradi in forno modalita' statico...55 minuti","note":"","tags":[],"_importId":7522},{"nome":"Torta, zucca, gorgonzola e noci... Due dischi di","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Torta, zucca, gorgonzola e noci... Due dischi di sfoglia, zucca, gorgonzola,noci, un po' di parmigiano,sale, olio, origano!\nFaccio cuocere le fette di zucca in forno a 180/200, per 20/30 minuti, con sopra sale e una spruzzata di olio, poi le stendo sulla sfoglia dopo averla bucherellata, aggiungo il gorgonzola,le noci,il parmigiano metto l' origano e ancora una spruzzata di olio, copro con l' altra sfoglia, faccio qualche foro con la forchetta e ungo bene la sfoglia, inforno a 220 gradi per una ventina di minuti! Siate generosi  con il gorgonzola e le noci!","note":"","tags":[],"_importId":15413},{"nome":"TORTELLINI ALLA BOLOGNESE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"logna 100 gr- prosciutto crudo 100 gr- petto di tacchino o pollo 50 gr- burro gr 20- due uova- noce moscata- sale e pepe- circa due litri di ottimo brodo di carne (manzo \no cappone)\nPreparazione: tagliare a dadini la lonza e il petto di  tacchino  o pollo, poi farli rosolare nel burro, lasciandoli cuocere per circa 10 minuti. Passare tutto nel mixer insieme con il prosciutto e la mortadella. Incorporarvi le due uova, il sale e il pepe necessario, un.pizzico di noce moscata ,159 gr di parmigiano, impastare il tutto molto bene.\nPreparare la pasta per la sfoglia,farla riposare un po', poi tirare una sfoglia sottile e con uno stampino fare dei tondi di 4 cm. Al centro di ogni dischetto mettere un poco di composto, poi ripiegare in due la pasta, facendo combaciare i margini, prendendola bene ai bordi affinche' il ripieno non esca. Piegare poi il tortellino attorno al dito indice, e sovrapporre.le due punte, prendendole affinché  restino ben unite unite. Preparandoli un giorno per l'altro vanno disposti ben ordinati e non sovrapposti, su un telo infarinato posto sopra un vassoio o due.\nAl momento di servirli mettere sul fuoco la pentola con il brodo, e quando alzerà  il bollore versare in esso i tortellini, mescolarli con delicatezza, e cuocerli per due o  tre minuti. Si servono al dente, accompagnandoli con parmigiano grattugiato, e del buon Lambrusco.","note":"","tags":[],"_importId":8097},{"nome":"TORTINI DI CARCIOFI","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":null,"unit":"q.b.","name":"sale"},{"qty":null,"unit":"q.b.","name":"pepe nero"},{"qty":null,"unit":"q.b.","name":"olio extravergine d'oliva (evo) per gli stampini -"}],"procedimento":"Pe realizzare la ricetta dei tortini di carciofi, innanzitutto bisogna pulire per bene gli ortaggi, eliminando le foglie più esterne, quindi togliere le punte più dure, tagliarli a metà e eliminare la barbetta al loro interno. Fatto ciò tuffare i carciofi in abbondante acqua salata e sbollentarli per 10 minuti circa. Trascorso questo tempo trasferirli, in acqua fredda. \n\t\t2 A questo punto scolate i carciodfi e metteteli in un boccale assieme alla ricotta di pecora e frullate il tutto per bene.    \n\t\t3 Alla crema ottenuta, aggiungete la ricotta, il parmigiano e aggiustate di sale e pepe.  Negli stampini monoporzione, mettere un filo di olio e passate del pan grattato, quindi riempiteli con la crema di carciofi e cospargete la superficie con del pangrattato e del parmigiano grattugiato.  \n\t\t4 Infornate a 180°C per 20 minuti, ma questo potrebbe dipendere dal forno, quindi controllare la loro doratura. Sfornate, sformate e serviteli tiepidi.","note":"","tags":[],"_importId":2740},{"nome":"Tortino di pane: l'idea geniale per riciclare il pane","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"GLI INGREDIENTI pane raffermo 1 bicchiere di latte 40g di parmigiano sale q.b. pepe q.b. pomodorini olio d'oliva q.b. 100g di prosciutto cotto 150g di formaggio origano \nLA PREPARAZIONE \nTagliate il pane a pezzetti, versateci sopra il latte e lasciatelo in ammollo per qualche minuto. Aggiungete l'uovo, il sale, il pepe e amalgamate il tutto. Versate metà del composto in una pentola oleata, aggiungete il prosciutto cotto, il formaggio filante, i pomodorini, un goccio d'olio d'oliva e l'origano. Ricoprite con il restante impasto e cuocete circa 5 minuti per lato.","note":"","tags":[],"_importId":73},{"nome":"TRECCIA CON UVETTA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":100.0,"unit":"g","name":"zucchero semolato"}],"procedimento":"un pizzico di sale... sciogliere 180gr lievito madre in  140gr di latte tiepido (115gr se uso miele invece dello zucchero), 1 cucchiaino di estratto di vaniglia (arancia 1/2 fialetta) buccia limone grattugiata e 2 uova... infine aggiungere 80 gr di burro morbido a pezzetti poco per volta...\nLa ricetta, unire in sequenza : 330 gr di farina 00 (260gr) setacciata con 200gr di farina Manitoba (150gr), 100 gr di zucchero semolato, un pizzico di sale... sciogliere 15 gr di lievito di birra fresco (180gr lievito madre) in 200 ml di latte tiepido (140gr latte tiepido), 1 cucchiaino di estratto di vaniglia (arancia 1/2 fialetta) e 2 uova... infine aggiungere 80 gr di burro morbido a pezzetti poco per volta... lavorare bene (io ho usato la planetaria) fino a incordatura ( circa 15/20 minuti), l’impasto si deve staccare dalla ciotola e rimanere attorno al gancio foglia... mettere il composto in ciotola leggermente imburrata, coprire con pellicola e metterlo in forno spento con luce accesa fino al raddoppio... \n[ho fatto come per il pane cioè ho fatto riposare 15 min poi 3 volte le pieghe poi dopo un’ora messo in frigo fino al giorno dopo. Almeno 5 ore in forno con luce accesa.\nmettere l’impasto sulla spianatoia leggermente infarinata e dividerlo in 3 parti uguali... tirarle leggermente disporre al centro un po' di confettura a piacere (uvetta) ... unire i lembi e saldare bene con dei pizzicotti... formare  la treccia(al centro ho messo un bicchiere rivestito di stagnola per mantenere il buco centrale) metterla su carta forno nella leccarda del forno, coprire con uno stampo e lasciare riposare 1 ora... spennellare bene tutta la treccia con uovo e latte... infornare a 180 gradi per circa 25 (30) minuti... lasciare raffreddare possibilmente 😂  e servire!!!","note":"","tags":[],"_importId":12696},{"nome":"TROFIE DI CASTAGNE CON FONDUTA DI MONTEBORE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":"farina di castagne"},{"qty":250.0,"unit":"g","name":"farina 00"},{"qty":250.0,"unit":"g","name":"acqua"}],"procedimento":"TROFIE DI CASTAGNE CON FONDUTA DI MONTEBORE\n350gr farina di castagne \n250gr farina 00\n250 gr acqua \nCondimento 80gr Montebore di 1/2stagionatura e una noce di burro\nFinitura 1 tartufo bianco e 1 cucchiaio farina di castagne tostata","note":"","tags":[],"_importId":7823},{"nome":"TUFFO NELLA SEMOLA / SEMOLINA BREAD","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Come primo impasto con la tuffante, ho optato per un pane di semola. Più esattamente:\n85% semola rimacinata\n15% tipo 00 bio \n80% acqua\n30% lievito madre solido\n2% sale\n4 ore a 27 gradi e 15 ore a 3 gradi.\nBuonissimo come solo la semola sa essere ♡\nTrovate la guida completa per fare un pane ad alta idratazione con lievito madre, su ➡ www.panbrioche.com\n#pastamadre #lievitomadre #lievitonaturale #sourdough #wildfermentation #longfermentation #semola #semolina #tartinbread #opencrumb #missbakerpro","note":"","tags":[],"_importId":8505},{"nome":"TUORLI\t4 • 750 kcal","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":20.0,"unit":"g","name":"cacao amaro"}],"procedimento":"Dividete gli albumi dai tuorli e versateli in due ciotole separate (1). In una ciotola montate a neve gli albumi con la metà dello zucchero, nell'altra montate tuorli con lo zucchero restante. Aggiungete l'essenza di vaniglia e montate fino a che il composto non risulterà chiaro e spumoso. Unite i tuorli agli albumi un po' per volta con l'aiuto di una spatola, alternate l’aggiunta della farina setacciata insieme al cucchiaino di lievito e alla fecola (2). Amalgamate il composto, con un delicato movimento dall'alto verso il basso, facendo attenzione a non smontarlo. Versate il composto su una teglia rivestita di carta forno(3) livellandolo con una spatola.\n456\nInfornate in forno statico a 220° per 6/7 minuti, senza aprire mai il forno. Disponete la pasta biscotto su di un piano e ricopritela con un altro foglio di carta forno. Rovesciatela  e staccate la carta forno usata in cottura (4). Versate un cucchiaino di zucchero sulla superficie se dovesse risultare appiccicosa (5). Farcite la pasta biscotto con la marmellata di fragole (6).\n789\nArrotolate la pasta biscotto farcita e ricopritela con della pellicola trasparente (7). Riponetela in frigo per un paio d'ore prima di tagliarla a fette, dopodiché spolverizzate il rotolo alla marmellata con lo zucchero a velo (8) e poi tagliatelo a fette per ottenere le girelle (9) da servire.\ncontinua su: https://cucina.fanpage.it/rotolo-alla-marmellata-ricetta/\nhttp://cucina.fanpage.it/","note":"","tags":[],"_importId":4815},{"nome":"Tutte noi abbiamo a che fare tutti i giorni o quasi","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Tutte noi abbiamo a che fare tutti i giorni o quasi con l’organizzazione della casa e soprattutto ci occupiamo della pulizia di quest’ultima.\nSicuramente siamo sempre in grado di far fronte a questo impegno e di certo abbiamo le nostre abitudini, che a volte derivano direttamente da consigli o modi di fare imparati a nostra volta dai nostri genitori o dai nostri nonni, ma non sempre sono i migliori modo in assoluto.\nAbbia scovato che ci sono dei trucchi molto semplici, economici e veloci per facilitare la pulizia dei taglieri che usiamo tutti i giorni, delle teglie per il forno, per eliminare il calcare dalla nostra doccia, pulire efficacemente i materassi su cui dormiamo, i nostri forni a microonde, gli spazzolini da denti di grandi e piccini, i nostri amati tosta pane, il forno, le tapparelle e le imposte e addirittura i nostri quadri e dipinti.\nScopriamo insieme come pulire al meglio questi 10 oggetti.\nLa doccia.\n  Spesso e volentieri facciamo ricorso all’uso di spray specifici per togliere il calcare, ma a volte questo non basta e la rosa della nostra doccia rimane nelle stesse condizioni prima che ci mettessimo all’opera. Ma esiste un modo semplice ed efficace per risolvere questo problema.\nBasterà prendere un sacchetto di plastica per gli alimenti, mettervi all’interno dell’aceto bianco, infilarlo sulla rosa della doccia e chiuderlo bene con un filo. Lasciate passare qualche ora e poi passate una spugna umida e vedrete che risulterà come nuovo.\n  I materassi.\nI materassi di casa sono sempre stati uno degli oggetti che più creano problemi, vi si accumula polvere, acari e residui di pelle morta. Non sempre sappiamo come agire. Ora vi sveliamo un trucco semplicissimo che vi aiuterà ad eliminare tutti questi elementi. Per prima cosa date una passata al materasso con l’aspirapolvere poi cospargete l’intera superficie del materasso con il bicarbonato di sodio, lasciate che agisca per circa un paio d’ore e poi ripassate nuovamente l’aspirapolvere e otterrete così una pulizia efficace del vostro materasso.\n  I taglieri.\n  A volte si pensa che basta passare una spugna per eliminare lo sporco dai nostri taglieri da cucina, ma in realtà non è così. Infatti esiste un modo facile, veloce ed economico per pulirli a fondo e per disinfettarli. Basterà che vi procuriate un limone e del sale da cucina. Tagliate il limone, cospargete l’intera superficie del tagliere con il sale e poi utilizzando il limone tagliato sfregate l’intera superficie. Una volta compiuta questa operazione risciacquate con abbondante acqua aiutandovi con una spugna pulita. In questo modo tutti i residui che si possono essere incastrati nelle venature del legno se ne andranno e voi avrete un tagliere pulito e disinfettato.\nForno a microonde.\nQuasi tutti noi abbiamo in casa il forno a microonde, ma molto spesso ci dimentichiamo di pulirlo e in questo modo si possono formare residui di cibo e incrostazioni. Ma c’è un modo molto semplice ed efficace per pulire alla perfezione il vostro elettrodomestico. Basterà che mettiate all’interno del microonde un contenitore con dell’acqua e dell’aceto, accendiate l’elettrodomestico alla massima temperatura per almeno 2 minuti. Una volta trascorso questo tempo aprite lo sportello, togliete il contenitore e asciugate con un panno, in questo modo avrete un microonde pulito, disinfettato e splendente.\n Gli spazzolini da denti.\nLa prima regola che bisognerebbe seguire è quella che lo spazzolino va cambiato almeno ogni tre mesi, ma questo non è abbastanza. Difatti si dovrebbe pulire regolarmente, visto l’utilizzo quotidiano che se ne fa. Per fare questo il metodo è semplicissimo: riempite un bicchiere pulito con dell’aceto bianco, immergete il vostro spazzolino e lasciatelo in ammollo per qualche ora, dopo di che risciacquate e il gioco è fatto.\n  Tostapane\n  Normalmente pensiamo che per pulire il nostro tosta pane basti capovolgerlo e scuoterlo in modo tale che i residui al suo interno fuoriescano, ma raramente pensiamo alla sua pulizia esterna. Per questa basterà prendere del cremor tartaro, un po’ d’acqua e con una spugnetta sfregate molto bene l’esterno del tostapane. Tornerà ad essere lucido e splendente come se fosse nuovo. Per quanto riguarda l’interno i modelli che ci sono ora in commercio normalmente hanno dei cassettini estraibili e questo ci permetterà di rimuovere completamente briciole e residui interni.\n  Forno\n  La pulizia del forno di solito è un po’ l’incubo di tutte noi donne, anche perché di solito usiamo prodotti chimici e in più ci vuole molto tempo. Ecco qui un metodo semplice, veloce ed ecologico. Prendete del bicarbonato di sodio e mescolatelo con pochissima acqua e mescolate fino a formare una pasta piuttosto densa. Con l’aiuto di una spugnetta spargetelo su tutta la superficie interna e lasciate agire questa pasta per tutta una notte. Il mattino successivo spruzzate dell’aceto e pulite il tutto con un panno bagnato, e una volta rimosso tutto il composto di bicarbonato accendete il forno per una ventina di minuti a temperatura bassa in modo tale che si asciughi: avrete così un forno come nuovo!\n  Tapparelle ed persiane.\n  La pulizia delle tapparelle o delle persiane è un lavoro noioso e lungo, ma esiste un modo molto semplice e veloce per eseguire questa operazione. Prendete una calza di cotone e imbevetela di acqua e aceto e poi infilatela sulla vostra mano. Passatela sulle vostre tapparelle o persiane e in questo modo semplice eliminerete tutta la polvere e lo sporco residuo. Per asciugarla utilizzate un altro calzino asciutto e il gioco sarà fatto.\n  Quadri e dipinti.\n  Di solito non è nelle nostre abitudini pensare di pulire i quadri e dipinti se non passando magari velocemente uno straccio per la polvere, ma dovete sapere che c’è un metodo ancora più efficace per pulire questi oggetti. Basterà prendere una fetta di pane e usando il lato della mollica passatelo sui vostri quadri, riuscirete a rimuovere a fondo ogni traccia di polvere e in pochissimo tempo!\n  Teglie.\n  Di solito tentiamo di pulire le nostre teglie da forno, utilizzando tanto tempo e sfregando molto con spugnetta e detersivo per le stoviglie. Ma esiste un modo molto più pratico e facile per fare questa operazione. Prendete una tazza e riempitela per un quarto con il bicarbonato di sodio e aggiungete dell’acqua ossigenata quanto basta per ottenere una pasta morbida. Prendete una spugnetta e sfregate bene le vostre teglie, lasciate agire per qualche ora e poi risciacquate sotto acqua corrente e asciugate, in questo modo le vostre teglie risplenderanno!","note":"","tags":[],"_importId":444},{"nome":"TuttoSemola","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"semola rimacinata \"la molisana\""},{"qty":400.0,"unit":"g","name":"acqua"},{"qty":12.0,"unit":"g","name":"sale"},{"qty":100.0,"unit":"g","name":"licoli"}],"procedimento":"PROCEDIMENTO:\n\nAutolisi con tutta l'acqua per 2 ore (con il gancio a foglia per 3 minuti)\n\nDopo il tempo autolico, inserire i 100gr di licoli \n\n*(con  madre solida 150g) resta tutto invariato con una piccola variante di idro, altrimenti togliere 30gr di semola dal totale.\n\n*Con il lievito di birra: fare un poolish con: 50gr di semola, 50 gr di acqua e 2gr di ldbf) mescolare bene e farlo raddoppiare.\n\nPortare a incordatura (impasto morbido, elastico ma, resistente (orientativamente 7/10min) a velocità 3/4\n\nRiposo della massa di 30/40min\n\nLaminazione, allargare l'impasto delicatamente sul piano di lavoro, lasciare all'aria 3min poi piegare a fazzoletto (piega)\n\nRiporre nel contenitore oleato per 40min.\n\nDopo il riposo di 40 min, fare una piega in ciotola (qualsiasi tipo di piega va benissimo, dobbiamo dare struttura all'impasto)\n\nPortare al raddoppio completo la massa.\n\nRibaltare sul piano di lavoro cosparso di farina di riso, preforma e lasciare all'aria 30/40min\n\nFormare il filone e riporlo nel cestino (il mio da 25cm ma, va bene anche un 28.\n\nLasciare 2ore a TA e metterlo in frigo avvolto da un canovaccio (pulito) cit.\n\nValutare la crescita (non con l'orologio, valutare con gli occhi il suo volume (deve essere ciccione) non esagerare, indicativamente 10/12 ore\n\nCOTTURA: preriscaldare il forno a 250 (statico)\n\nA temperatura avvenuta, ribaltare il pane , incidere e infornare abbassando la temperatura a 220 per 40min,\n\nDopo i 40 minuti di cottura, togliere il coperchio e proseguire a 175 per 15min\n\nPer terminare, gli ultimi 15min a 150 con funzione ventilata e sportello semichiuso.","note":"","tags":[],"_importId":16126},{"nome":"Un buongiorno con i miei KRAPFEN CON CREMA PASTICCERA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina “0”"},{"qty":4.0,"unit":"g","name":"lievito secco di birra o 14g di lievito fresco di birra"},{"qty":60.0,"unit":"g","name":"zucchero biondo di canna"},{"qty":190.0,"unit":"ml","name":"latte intero fresco a temperatura ambiente"},{"qty":2.0,"unit":"n°","name":"uova a temperatura ambiente"},{"qty":1.0,"unit":"cucchiaino","name":"semi di bacca di vaniglia o estratto di vaniglia"},{"qty":1.0,"unit":"cucchiaio","name":"liquore all’anice"},{"qty":6.0,"unit":"g","name":"sale fino"},{"qty":100.0,"unit":"g","name":"burro morbido a temperatura ambiente"}],"procedimento":"Nella ciotola della planetaria metto la farina e il lievito secco e mescolo con la frusta, ( se si usa il lievito fresco va sciolto in 50ml di latte tiepido preso dai 190ml negli ingredienti.\nMetto il gancio, aggiungo tutti gli altri ingredienti tranne il sale e il burro.\nAziono la macchina e appena i liquidi sono assorbiti, aggiungo il sale e lascio lavorare la macchina per 5’ finché l’impasto è liscio.\nOra inizio ad aggiungere il burro a pezzetti, in 3 volte continuando ad impastare.\nNON AGGIUNGERE PEZZI DI BURRO SE IL PRECEDENTE NON È STATO ASSORBITO DALL’IMPASTO.\nFormo una palla sulla spianatoia con l’aiuto del tarocco, la pongo in ciotola, la sigillo con pellicola e la metto in frigorifero per 12 ore a lievitare.\nTrascorso il tempo, stendo l’impasto sul piano leggermente infarinato, allo spessore di 2cm. Ritaglio i krapfen con un coppapasta di diametro 8cm, li adagio su placca con carta forno li copro con pellicola leggermente infarinata e li lascio lievitare per 3 ore in forno spento portato precedentemente a temperatura 40 gradi.\nLi spennello con poco latte tiepido e li inforno a 180 gradi statico o 160 ventilato per 15 minuti.\nProva stecchino.\nAppena tiepidi, con sac á poche li riempio di crema pasticcera.\nLi spolvero con abbondante zucchero a velo e li servo.😋😋😋","note":"","tags":[],"_importId":9922},{"nome":"Una crostata che ti farà sentire in paradiso: crosta","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina"},{"qty":125.0,"unit":"g","name":"burro freddo a cubetti"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":1.0,"unit":"n°","name":"tuorlo"},{"qty":1.0,"unit":"cucchiaino","name":"estratto di vaniglia"},{"qty":500.0,"unit":"g","name":"ricotta"},{"qty":100.0,"unit":"g","name":"zucchero a velo"},{"qty":2.0,"unit":"cucchiaio","name":"marmellata di albicocche"}],"procedimento":"Istruzioni:\n1. In una ciotola grande, unisci la farina e lo zucchero. Aggiungi il burro freddo e lavora con la punta delle dita fino a ottenere un composto sabbioso.\n2. Aggiungi l'uovo, il tuorlo e l'estratto di vaniglia, impastando fino a formare una palla liscia. Avvolgi l'impasto nella pellicola trasparente e metti in frigorifero per 30 minuti.\n3. Nel frattempo, prepara il ripieno: in un frullatore, unisci la ricotta, lo zucchero a velo e la scorza di limone. Frulla fino a ottenere una crema omogenea.\n4. Preriscalda il forno a 180°C. Stendi l'impasto su una superficie infarinata fino a ottenere uno spessore di circa 5 mm.\n5. Rivesti uno stampo per crostata con l'impasto, lascia un bordo e bucherella il fondo con una forchetta. Distribuisci la marmellata di albicocche sul fondo e poi versa la crema di ricotta sopra.\n6. Con l'impasto avanzato, crea delle strisce e disponile a griglia sopra il ripieno.\n7. Cuoci in forno per 30-35 minuti o fino a quando la crostata è dorata. Lascia raffreddare prima di servire.\n\nLa crostata paradiso è perfetta da gustare fresca. Puoi conservarla in frigorifero per 2-3 giorni.","note":"","tags":[],"_importId":16092},{"nome":"Una crostata da amare al primo morso 🥰","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina 00","sezione":"Per la frolla"},{"qty":150.0,"unit":"g","name":"burro","sezione":"Per la frolla"},{"qty":90.0,"unit":"g","name":"zucchero","sezione":"Per la frolla"},{"qty":1.0,"unit":"n°","name":"uovo","sezione":"Per la frolla"},{"qty":1.0,"unit":"pizzico","name":"sale","sezione":"Per la frolla"},{"qty":25.0,"unit":"g","name":"farina 00","sezione":"Per il frangipane alle noci"},{"qty":100.0,"unit":"g","name":"noci finemente grattugiate","sezione":"Per il frangipane alle noci"},{"qty":50.0,"unit":"g","name":"zucchero","sezione":"Per il frangipane alle noci"},{"qty":100.0,"unit":"g","name":"burro","sezione":"Per il frangipane alle noci"},{"qty":1.0,"unit":"n°","name":"uovo","sezione":"Per il frangipane alle noci"},{"qty":null,"unit":"q.b.","name":"confettura di mirtilli","sezione":"Per il frangipane alle noci"},{"qty":2.0,"unit":"cucchiaio","name":"zucchero","sezione":"Per le roselline di mela"},{"qty":null,"unit":"q.b.","name":"zucchero a velo","sezione":"Per le roselline di mela"},{"qty":250.0,"unit":"g","name":"farina 00","sezione":"per la frolla"},{"qty":150.0,"unit":"g","name":"burro","sezione":"per la frolla"},{"qty":90.0,"unit":"g","name":"zucchero","sezione":"per la frolla"},{"qty":1.0,"unit":"n°","name":"uovo","sezione":"per la frolla"},{"qty":1,"unit":"n°","name":"pizzico di sale","sezione":"per la frolla"},{"qty":25.0,"unit":"g","name":"farina 00","sezione":"per il frangipane alle noci"},{"qty":100.0,"unit":"g","name":"noci grattugiate finemente","sezione":"per il frangipane alle noci"},{"qty":50.0,"unit":"g","name":"zucchero","sezione":"per il frangipane alle noci"},{"qty":100.0,"unit":"g","name":"burro","sezione":"per il frangipane alle noci"},{"qty":1.0,"unit":"n°","name":"uovo","sezione":"per il frangipane alle noci"},{"qty":null,"unit":"q.b.","name":"confettura di mirtilli","sezione":"per il frangipane alle noci"},{"qty":2.0,"unit":"cucchiaio","name":"zucchero","sezione":"per le roselline di mela"},{"qty":null,"unit":"q.b.","name":"zucchero a velo","sezione":"per le roselline di mela"}],"procedimento":"Preparazione\nper la frolla \nIn planetaria impastate con la foglia il burro e lo zucchero, unite l’uovo ed impastate bene. Infine aggiungete la farina e il pizzico di sale lavorando abbastanza velocemente. Avvolgete con pellicola e conservate in frigorifero 5/6 ore.\nper il frangipane alle noci\nMontate il burro morbido con lo zucchero, aggiungete l’uovo e continuate a montare fino a quando il composto non sarà spumoso. A mano delicatamente aggiungete le polveri.\nper le roselline di mela\nTagliate le mele a metà e con l’aiuto di una mandolina tagliatele a fettine sottili. Mettete le fettine di mela in un pentolino con lo zucchero, il succo di limone e coprite con dell’acqua. Cucinatele per pochi minuti, spegnete e scolate. Sistemate 5/6 fettine di mela  sul di  un piano di lavoro uno accanto all’altra sovrapponendole leggermente. Arrotolatele su se stesse a formare delle roselline. Potete farle anche un pò piu grandi sovrapponendo piu fettine.\nper la composizione\nTirate dal frigo la frolla e stendetela. Foderate il fondo e il bordo di uno stampo tondo da 22 cm. Bucherellate con i rebbi di una forchetta il fondo e stendete un velo di confettura di mirtilli. Distribuite il frangipane e sopra le roselline di mela.\nInfornate a 180 gradi per 30/40 minuti sino a doratura. Sfornate e lasciate raffreddare su una gratella. Una volta raffreddata spolverizzate con dello zucchero a velo.","note":"","tags":[],"_importId":16067},{"nome":"Una torta salata originale","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":550.0,"unit":"g","name":"patate"},{"qty":50.0,"unit":"g","name":"zucca"},{"qty":100.0,"unit":"g","name":"pangrattato"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":60.0,"unit":"g","name":"parmigiano grattugiato"},{"qty":150.0,"unit":"g","name":"prosciutto cotto"},{"qty":150.0,"unit":"g","name":"scamorza"}],"procedimento":"Procedimento \n\nLessate le patate e la zucca in acqua leggermente salata finché diventano morbide. Scolatele e schiacciatele bene con una forchetta o uno schiacciapatate. \n\nIn una ciotola, unite patate e zucca, insieme a uovo, pangrattato, parmigiano, un pizzico di sale e un filo d’olio. Mescolate fino a ottenere un impasto omogeneo e compatto. \n\nRivestite una teglia rotonda con carta forno e stendete l’impasto in modo uniforme, creando la base della torta. \n\nAggiungete sopra le fette di prosciutto cotto, la scamorza e una spolverata di parmigiano. \n\nInfornate a 180°C per circa 10 minuti, finché la superficie risulta dorata e il formaggio fuso. Sfornate, lasciate intiepidire leggermente e servite a fette.","note":"","tags":[],"_importId":15820},{"nome":"Uova, zucchero e latte. In pochi minuti avrete","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":4.0,"unit":"n°","name":"uova grandi"},{"qty":200.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"L","name":"latte intero"}],"procedimento":"Preparazione:\n1. Preriscalda il forno a 180°C.\n2. In una ciotola capiente, sbatti le uova con lo zucchero fino a ottenere un composto chiaro e spumoso.\n3. Riscalda il latte fino a che è caldo al tatto, ma senza portarlo a ebollizione.\n4. Versa lentamente il latte caldo nel composto di uova e zucchero, mescolando continuamente.\n5. Imburra o fodera con carta forno una teglia rotonda (meglio se a cerniera) e versa all’interno il composto.\n6. Cuoci a bagnomaria: metti la teglia in una teglia più grande con acqua calda fino a metà altezza.\n7. Inforna per 45-60 minuti, finché il dolce non si è rassodato ma resta leggermente tremolante al centro.\n8. Fai raffreddare completamente, poi metti in frigo per almeno 4 ore (meglio tutta la notte).\n9. Prima di servire, puoi spolverare con zucchero a velo se ti piace.","note":"","tags":[],"_importId":15048},{"nome":"Usate la ricotta al posto delle patate","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione:\n1- Trasferite la ricotta in una ciotola ricoperta di carta assorbente e fatela asciugare bene.\n2-Aggiungere due cucchiai di parmigiano grattugiato e l'uovo.\n3- Lavorare gli ingredienti con una spatola fino ad ottenere un composto spumoso e omogeneo.\n4-Aggiungere un po' di farina alla volta.\n5- Aggiungetelo poco alla volta al composto e continuate fino a terminare la farina.\n6- Lavorare prima con la spatola e poi velocemente con le mani.\n7- Formate un impasto liscio e omogeneo e trasferitelo su un piano di lavoro infarinato.\n8- Separare le porzioni di impasto e formare dei filoni di 2 cm di diametro.\n9- Con l'aiuto di una spatola, ricavare degli gnocchi lunghi circa 2 cm.\n10- Con una forchetta, fai dei solchi negli gnocchi arrotolandoli. Lasciateli asciugare per mezz'ora e poi lessateli per un paio di minuti in acqua bollente salata.\n11- Quando salgono a galla, li scoliamo e li condiamo con olio e parmigiano. Impiattare e servire immediatamente.","note":"","tags":[],"_importId":14232},{"nome":"VELLUTATA  DI ASPARAGI","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"tratta dal libro di Benedetta Fatto in casa, che me lo ha suggerito, e vi assicuro che non è  niente male, in questo periodo di tempo piovoso e uggioso. \nIngredienti per 4 persone: ( questa che vi do' è  la ricetta fatta con un mazzetto di asparagi, quindi usando tutti gli asparagi, ma io ho usato SOLO I GAMBI che ho scartato facendo ieri la frittata).\n500 gr di asparagi - olio evo q b. - mezza cipolla - sale - un litro di acqua  - 100 gr di formaggio spalmabile  - 2 cucchiai di fecola di patate. \nDopo aver lavato gli asparagi ed aver eliminato la parte più  dura del gambo ( a questo  punto ieri li ho conservati accuratamente), LI TAGLIAMO A PEZZETTI E LI RACCOGLIAMO IN UNA CASSERUOLA  CON OLIO CIPOLLA E SALE. AGGIUNGIAMO L'ACQUA E LI FACCIAMO CUOCERE , POI UNIAMO IL FORMAGGIO SPALMABILE, E  FRULLIAMO COL MINIPIMER FINO AD OTTENERE UNA CREMA, UNENDO 2 CUCCHIAI ABBONDANTI  DI FECOLA DI PATATE,  PER FARLA ADDENSARE. CUOCERE PER ALTRI 4-5 MINUTI \nMESCOLANDO CON UNA FRUSTA.\nLA VELLUTATA A QUESTO PUNTO È  PRONTA E VA ACCOMPAGNATA O CON PANE TOSTATO O CROSTINI.\nPraticamente ho scritto in lettere maiuscole tutta la parte che in pratica ho fatto io,  solo con i gambi che di solito si buttano nella spazzatura,  per cui, se utilizzate gli asparagi per fare un risotto o una pastasciutta, provate  a non gettare i gambi, ma a farvi questa deliziosa vellutata.","note":"","tags":[],"_importId":10723},{"nome":"Vellutata di ceci e castagne","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"ceci"},{"qty":150.0,"unit":"g","name":"castagne"},{"qty":2.0,"unit":"n°","name":"patate medie"},{"qty":4.0,"unit":"cucchiaio","name":"olio extravergine d'oliva"},{"qty":1.0,"unit":"n°","name":"scalogno"},{"qty":1.0,"unit":"n°","name":"rosmarino"},{"qty":1.0,"unit":"n°","name":"l brodo vegetale"}],"procedimento":"Preparazione\n\t\tPuoi utilizzare i ceci già prelessati oppure quelli secchi, che però dovrai mettere in ammollo in acqua fredda la sera prima per circa 10 ore (quindi fino alla mattina seguente) e poi lessarli in abbondante acqua fino a renderli morbidi, ma non sfatti.\n\t\tIncidi le castagne sulla pancia con un coltellino, quindi trasferiscile in una tazza e mettila nel microonde, con accanto un’altra tazza di uguale misura riempita con acqua. Cuoci alla massima potenza per 5 minuti, dopodiché tira fuori tutto e trasferisci le castagne, che saranno perfettamente cotte, in un sacchetto di carta lasciandole intiepidire, quindi sbucciale e tienile da parte. Se non hai il microonde puoi semplicemente lessarle: incidi la pancia con un coltellino, tuffale in un tegame coprendole totalmente d’acqua, unisci una foglia di alloro, e dal bollore conta 30 minuti circa.\n\t\tIn una casseruola versa l’olio extra vergine con lo scalogno affettato finemente, lascia soffriggere per due minuti insieme a un rametto di rosmarino, quindi unisci le patate sbucciate e tagliate a cubetti piccoli. Aggiusta di sale e pepe, mescola e fai insaporire 5 minuti.\n\n\t\tOra versa il brodo vegetale caldo e lascia cuocere con il coperchio per 10 minuti, quindi unisci i ceci già lessati e le castagne bollite sgusciate, terminando la cottura per altri dieci minuti circa, o almeno fino a quando le patate non saranno morbide al pizzico della forchetta.\n\t\tRiduci tutto in crema con un frullatore ad immersione, impiatta la vellutata di ceci e castagne ben calda, unisci un filo d’olio d’oliva sopra ogni piatto e magari quache crostino di pane. Buon appetito!\nNote\nPuoi conservare la vellutata di ceci e castagne in frigorifero, in una casseruola con il coperchio, in modo da poterla scaldare all’occorrenza.\nSe vuoi arricchire la tua vellutata, aggiungi in ogni piatto della pancetta abbrustolita o della salsiccia rosolata sbriciolata, cotta a parte.","note":"","tags":[],"_importId":9883},{"nome":"Veneziane appena sfornate","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per l'impasto: 250 gr di farina manitoba, 10gr di lievito di birra fresco, 60 gr di zucchero più 1 cucchiaio, 50 ml di panna liquida, 90 ml di latte, 1uovo ed 1 tuorlo,buccia di arancia o limone\nPer la crema 2 tuorli, 60 gr di zucchero, 35 di farina, 250 ml di latte.e poi zucchero in\ngranella\nScaldare il latte a temperatura corporea e sciogliere dentro il lievito ed il cucchiaio di zucchero. Mescolare la farina setacciata, con il latte e lievito, i 60gr di zucchero, le scorzette,l'uovo, la panna e lavorare per 15 min a mano o in planetaria\n(Dopo 10 minuti ho sostituito la foglia con il gancio)\nVersare l'impasto su un piano infarinato,fare una palla lavorandolo brevemente e mettere a lievitare coperto a raddoppio\nPreparare la crema pasticcera e farla\nraffreddare\nFare 10 palline e metterle su carta forno a lievitare ancora a raddoppio, poi fare una fossetta, mettere la crema la granella e pennellare con il rosso d'uovo in forno statico a 180 gradi per circa 20 min","note":"","tags":[],"_importId":13114},{"nome":"Vi mando le foto della mia casetta","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"pangrattato"},{"qty":100.0,"unit":"g","name":"parmigiano reggiano"},{"qty":1.0,"unit":"n°","name":"aglio"}],"procedimento":"Versate il pangrattato e il parmigiano grattugiato in una ciotola. Unite l’olio extravergine di oliva la scorza di limone e amalgamate bene. Aggiungete un pizzico di sale e Se volete aggiungete un po’ di pepe. Lavorate bene il composto con le dita in modo che diventi sbricioloso e poi utilizzatelo come preferite.  \n\t\tCOME UTILIZZARLO: Sbattete l’uovo in una ciotolina a parte e passate la fettina di carne, di pollo, il filetto di pesce o la verdura che preferite nell’uovo sbattuto. Impanate bene la fettina in modo che la panatura aderisca bene. ——————-————————\n\t\tPassate tutte le fette di petto di pollo non battute quindi abbastanza spesse nel latte e, se avete tempo, lasciatele in ammollo per qualche minuto. Scolate le fette di petto di pollo dal latte e passatele nella farina. \n  Passate le fette di pollo nell’uovo sbattuto con una forchetta. Impanate tutte le fette di petto di pollo nella panatura perfetta della nonna premendo bene con le mani in modo da farla aderire bene. \n\t\tMettete tutte le fette di pollo impanate su una teglia con carta forno. Spruzzate tutte le cotolette di pollo con olio extravergine di oliva e cuocetele in forno preriscaldato a 200° per 30 minuti circa fino a che risulteranno cotte e dorate. Sfornate le cotolette di pollo al forno e servitele calde, croccanti e fumanti. \n\t\tVARIANTI E CONSIGLI Potete invece che fare le fette di pollo tagliare il pollo a bocconcini. Potete anche non passarle prima nella farina e nell’uovo ma ovviamente la panatura si staccherà più facilmente. Potete farle anche fritte ma cuoceranno in meno tempo. Salatele solo a fine cottura e comunque controllate prima di salare perchè la panatura è già molto saporita.","note":"","tags":[],"_importId":13401},{"nome":"Visto che in casa si sta bene col forno acceso...nel","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"PREFERMENTO: 40 gr di pasta madre solida ( o liquida) - 160 gr di acqua - 200 gr di farina forte - 2 gr di zucchero.\nImpastare e mettere a lievitare , e praticamente il prefermento deve arrivare al massimo del suo sviluppo, per cui è bene farlo lievitare  una notte , 10-12 ore, e la temperatura non deve superare i 24 gradi.\nCIABATTA: 400 gr di prefermento - 200 gr di acqua + 50-80 gr di acqua da unire col sale - 400 gr di farina di farro bio - 20.gr di olio evo - 3 gr di zucchero - 15-20 gr di sale.\nPREPARAZIONE:  sciogliere lievito e zucchero in 200 gr di acqua in ciotola o nella ciotola della impastatrice. Iniziare ad impastare versando poco a poco la farina fino a quando non sia ben assorbita.Quando l'impasto inizia ad incordarsi, e si stacca dalle pareti, aggiungere i restanti 50-80 gr di acqua assieme al sale e continuare ad impastare fino ad avere un impasto liscio ed omogeneo. Farlo lievitare ben coperto per 20 minuti. Piegarlo su se stesso. Farlo poi levitare ancora  in un contenitore unto di olio, chiudere col coperchio in modo che non faccia la crosta, e far lievitare fino al raddoppio per circa 4-5 ore.\nCospargere la spianatoia di semola, per non fare attaccare la pasta, poi rovesciare sopra la pasta, e darle una forma rettangolare. Fare una piega a tre, spolverare anche le mani di semola e premere delicatamente l'impasto. Coprire con pellicola e con un telo, e far lievitare un'ora. Tagliare l'impasto  in rettangoli di circa 100 -150 gr. Capovolgerli sulla spianatoia spolverando tutto con la semola. Far poi lievitare i vari pezzi su una teglia coperta di carta forno, e spolverata di semola. Coprire e far lievitare per altre 2 ore. Accendere  il forno al massimo (250 gradi). Mettere nel forno un pentolino con  poca acqua bollente. Cuocere le ciabattine nel forno preriscaldato  per circa 18 \nminuti . Se invece si vuol fare un'unica ciabatta grossa da circa 500 gr , cuocerla per circa 40 minuti.\nUna volta sfornate  far freddare le Ciabattine su una gratella prima di mangiarle","note":"","tags":[],"_importId":11844},{"nome":"Voglia di una brioche morbida e soffice","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina"},{"qty":100.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"bustina","name":"lievito di birra"},{"qty":2.0,"unit":"n°","name":"uova"},{"qty":1.0,"unit":"n°","name":"yogurt naturale"},{"qty":100.0,"unit":"ml","name":"latte tiepido"},{"qty":80.0,"unit":"g","name":"burro morbido"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":1.0,"unit":"n°","name":"tuorlo d'uovo"}],"procedimento":"1. In una ciotola, mescolare il lievito con il latte tiepido. Lasciare riposare per 10 minuti finché il composto non diventa schiumoso.\n2. In una grande insalatiera, mescolare la farina, lo zucchero e il sale. Aggiungere il composto di uova, yogurt e lievito. Impastate fino ad ottenere un impasto omogeneo.\n3. Aggiungere il burro morbido a pezzetti. Continuare ad impastare per circa 10 minuti fino a quando l'impasto risulterà morbido ed elastico.\n4. Coprire l'impasto con un canovaccio e lasciarlo lievitare in un luogo tiepido per circa 1 ora e 30 minuti, finché non raddoppierà di volume.\n5. Riprendere l'impasto e modellarlo come si desidera (trecce, palline, ecc.). Disporre la brioche in uno stampo imburrato.\n6. Lasciare lievitare nuovamente per 30 minuti.\n7. Preriscalda il forno a 180°C. Spennellare la brioche con il tuorlo d'uovo sbattuto per ottenere un bel colore dorato.\n8. Cuocere per 25-30 minuti fino a quando la brioche sarà dorata.\nLasciare raffreddare leggermente prima di servire. Questa morbida brioche allo yogurt è perfetta da gustare al naturale o con un tocco di marmellata. Godere!\n#ricetta_deliziosa","note":"","tags":[],"_importId":13220},{"nome":"Voglia di una focaccia golosa e irresistibile","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":400.0,"unit":"g","name":"farina manitoba"},{"qty":50.0,"unit":"g","name":"olio evo"},{"qty":250.0,"unit":"g","name":"acqua"},{"qty":16.0,"unit":"g","name":"sale"},{"qty":600.0,"unit":"g","name":"stracchino o crescenza"}],"procedimento":"In una ciotola capiente, unisci la farina manitoba, l'olio evo, l'acqua e il sale. Impasta fino ad ottenere un impasto omogeneo.\nTrasferisci l'impasto su una spianatoia leggermente infarinata e lavorare per qualche minuto fino a ottenere un impasto liscio ed elastico, dividilo in due parti uguali, copri con un panno e fallo riposare per 30 minuti. Stendi con un mattarello fino a formare due sfoglie sottili. Ungi bene una teglia da 30x40 cm con un po' di olio e adagia una delle sfoglie di impasto. Distribuisci uniformemente il formaggio stracchino o crescenza sulla sfoglia. Copri con la seconda sfoglia di impasto e sigilla bene i bordi.\nFai dei tagli sulla superficie della focaccia per far fuoriuscire il formaggio durante la cottura. Inforna a 200°C in forno ventilato  già preriscaldato sul fondo del forno per 10 minuti continua la cottura per altri 10 minuti a 250 gradi nel forno ventilato nella posizione centrale e gli ultimi 5 minuti a 200gradi \"il cambio di temperatura si fa con la focaccia in forno\"  fino a quando la superficie sarà dorata e croccante. Sforna la focaccia e servirla calda, tagliata a quadrotti. Buon appetito!😋","note":"","tags":[],"_importId":14881},{"nome":"zenzfla1w_x.gif","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"una vecchina piccola piccola ed un vecchino piccolo piccolo. Alla vecchina piccola piccola venne voglia di impastare un omino di pan di zenzero. Stese la pasta e ritagliò la figura dell’omino, mise due chicchi di uva passa per occhi, mente peperite per i denti e mise della glassa sulla sua testa per fargli i capelli\nPoi prese l’omino e lo mise nel forno e quando sentì un buon odore, aprì il portello del forno per dare un’occhiatina e...  --- Hoooplà! - - -\nL'omino di pan di zenzero saltò fuori dal forno.. \"Fermati! Fermati, omino di pan di zenzero!\" disse la vecchina. \"Voglio mangiarti!\"\n\"No!\" disse l'omino di pan di zenzero \"Io posso scappare via!\" \n\"Scappa, scappa, più forte che puoi!\nNon potete prendermi, io sono l'omino di pan di zenzero!\"\nE corse via!\nCorse finchè fu fuori, dove vide il vecchino piccolo piccolo.  Il vecchino piccolo piccolo disse, \" Fermati! Fermati piccolo omino di pan di zenzero! Io voglio mangiarti! \"\nEd il piccolo omino di pan di zenzero disse: \" NO! Sono riuscito a scappare dalla vecchina, e posso scappare via anche da te!\n\"Scappa, scappa, più forte che puoi!\nNon potete prendermi, io sono l'omino di pan di zenzero!\"\nE corse via!\nScappò finchè arrivò al porcile.\nEd il maiale disse:\n\"(Oink Oink) - - \" Fermati! Fermati, omino di pan di zenzero! Io voglio mangiarti! \"\nMa l'omino di pan di zenzero disse, \" NO! Sono riuscito a scappare dalla vecchina piccola piccola, sono scappato via dal vecchino piccolo piccolo e posso scappare via anche da te!\"\n\"Scappa, scappa, più forte che puoi!\nNon potete prendermi, io sono l'omino di pan di zenzero!\"\nE corse via!\nScappò finchè arrivò ad una casa. E davanti alla casa c’era un cane. Ed il cane disse, \" FERMATI! Fermatelo stoooooooooop , fermatelo fermatelo !\nFermate il piccolo omino di pan di zenzero!\nVoglio mangiarlo! \"Ma l'omino di pan di zenzero disse:\n\"NO! Sono riuscito a scappare dalla vecchina piccola piccola, sono scappato via dal vecchino piccolo piccolo e posso scappare via anche da te!\"\n\"Scappa, scappa, più forte che puoi!\nNon potete prendermi, io sono l'omino di pan di zenzero!\"\nE corse via!\nScappò finchè arrivò ad un campo pieno di mucche.\nE le mucche dissero,\n\" Mooooo! Stoooooooop! Stoooooooop piccolo omino di pan di zenzero. Vogliamo mangiarti! \"\nMa L’omino di pan di zenzero disse, NO! Sono riuscito a scappare dalla vecchina piccola piccola, sono scappato via dal vecchino piccolo piccolo , da un maiale e da un cane e posso scappare via anche da te!\"\n\"Scappa, scappa, più forte che puoi! Non potete prendermi, io sono l'omino di pan di zenzero!\"\nE corse via!\nScappò finchè arrivò ad un fiume.\nE vicino al fiume c’era una volpe. La volpe disse:\n\"Ciao piccolo omino di pan di zenzero. \"\nL’omino di pan di zenzero disse:\n\"CIAO! Sono riuscito a scappare dalla vecchina piccola piccola, sono riuscito a scappare dal vecchino piccolo piccolo, da un maiale, da un cane e dalle mucche e posso scappare via anche da te!\n\"Scappa, scappa, più forte che puoi! Non potete prendermi, io sono l'omino di pan di zenzero!\"\n\"Ma,\" disse la volpe, \"Io non corro mai. E poi non voglio mangiarti!\"  L’omino di pan di zenzero disse:\n\"Scappa, scappa, più forte che puoi! Non potete prendermi, io sono l'omino di pan di zenzero!\"\nLa volpe disse, \"Scappa quanto ti pare, Io non ti rincorrerò. Ma mi piacerebbe farti una domanda.\"\nL’omino di pan di zenzero disse, \"Cosa?\"\nLa volpe disse, \"Come pensi che farai ad attraversare il fiume senza bagnarti? Io penso che se ti bagnerai ti scioglierai non credi?\"\nL’omino di pan di zenzero non disse nulla, ma guardò il fiume pensieroso.\nLa volpe disse, \"Ho un’idea.\"\nL’omino di pan di zenzero disse, \"Quale?\"\nLa volpe disse, \"Volevo attraversare il fiume a nuoto proprio adesso. Se vuoi, potresti montare sulla mia coda.\"\nL’omino di pan di zenzero disse \"OK\", e si aggrappò alla coda della volpe. La volpe cominciò ad entrare nell’acqua.\nDopo pochi passi, la volpe disse, \"Oh, piccolo omino di pan di zenzero. L’acqua sta diventando piuttosto profonda. Ho paura che tu ti bagni. Perchè non ti arrampichi sulla mia groppa?\" L’omino di pan di zenzero guardò, e disse, \"Accidenti, l’acqua sta diventando davvero piuttosto profonda\", e si arrampicò sulla groppa della volpe.\nDopo qualche passo ancora, la volpe disse, \"Oh, piccolo omino di pan di zenzero, l’acqua sta diventando ancora più profonda, ho paura che tu ti bagni. Perchè non ti arrampichi sul mio collo?\" L’omino di pan di zenzero guardò e disse, \"Accidenti l’acqua è davvero profonda\", e si arrampicò sul collo della volpe.\nDopo qualche passo ancora, la volpe disse, \"Oh, piccolo omino di pan di zenzero, l’acqua sta diventando sempre più profonda, ho paura che tu ti bagni. Perchè non ti arrampichi sulla mia testa?\" L’omino di pan di zenzero guardò, e disse, \"Accidenti, l’acqua sta diventando davvero molto profonda\", e si arrampicò sulla testa della volpe.\nDopo qualche passo ancora, la volpe disse, \"Oh, piccolo omino di pan di zenzero, l’acqua sta diventando davvero molto profonda, ho paura che tu ti bagni. perchè non ti arrampichi sul mio naso?\" L’omino di pan di zenzero guardò e disse, \"Accidenti, l’acqua è davvero molto profonda\", e si arrampicò sul naso della volpe.\nE la volpe fece-- GNAMMM!—e quella fu la fine dell’omino di pan di zenzero.\nwebbot CLIENTSIDE bot=\"Ws3FpEx\" MODULEID=\"'Giocomania home (Project)\\menu_storie_off.xws'\" PREVIEW=\"<img src='../../Menu/menu_storie.gif?0066380E' editor='Webstyle3' border='0'>\" startspan","note":"","tags":[],"_importId":450},{"nome":"Zeppole impasto con olio senza burro cotte al forno","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"farina 00"},{"qty":700.0,"unit":"ml","name":"acqua"},{"qty":250.0,"unit":"ml","name":"olio extra vergine di oliva"},{"qty":1.0,"unit":"cucchiaio","name":"zucchero"}],"procedimento":"10/12 uova medie (il numero delle uova dipende dal loro peso e da quante ne riceve l’impasto)\nun pizzico di sale fino\ncarta forno\nsac à poche con beccuccio grande a stella\ncrema pasticcera  RICETTA QUI \namarene sciroppate\nzucchero a velo\nSetacciare la farina\nIn una pentola alta aggiungere l’acqua, l’olio, il sale, lo zucchero e portare a bollore\nQuando l’acqua bolle, allontanare la pentola dal fuoco e versare tutta la farina mescolando velocemente per amalgamare il tutto\nCon un cucchiaio di legno continuare a mescolare sino ad ottenere una palla ben amalgamata, compatta e liscia. Far raffreddare\nQuando l’impasto sarà freddo, trasferirlo in una ciotola capiente e iniziare ad incorporare le uova uno per volta. E’ importante che l’uovo aggiunto venga ben “assimilato” all’impasto mescolando con un cucchiaio di legno o anche con lo sbattitore elettrico e solo quando sarà completamente assorbito si potrà aggiungere l’altro uovo\nPer questo impasto occorrono circa 12 uova medie. Un SEGRETO ci permette di stabilire quante uova aggiungere all’impasto delle zeppole: il composto deve risultare appiccicoso e deve poter cadere “pesantemente” dal cucchiaio, inoltre deve risultare molto liscio, ben amalgamato e cremoso (domani inserisco anche la video ricetta per  vedere la giusta consistenza delle zeppole perfette). Attenzione a non aggiungere neanche un uovo in più!\nPortare il forno a 200°C e rivestire con carta forno una placca\nTrasferire l’impasto nella sac à poche con beccuccio grande a stella formare le zeppole con movimento a spirale avendo cura di fare un secondo giro per renderle più gonfie in cottura\nCuocere in forno già caldo per i primi 7 minuti a 200°C, abbassare il forno e continuare la cottura a 180°C per altri 25 minuti circa. Le zeppole al forno senza burro devono risultare gonfie, dorate e ben asciutte\nSfornare e far raffreddare completamente.\nDividere le zeppole a metà con un coltello ben affilato, farcire con crema pasticcera (ricetta della crema QUI) utilizzando una sac à poche con beccuccio medio a stella, chiudere la zeppola e fare un giro di crema anche sopra decorando con amarene e zucchero a velo\nLe zeppole sono pronte per essere gustate.\nCrema pasticcera al limone ricetta facile e veloce\nIngredienti:\n500 ml di latte\n3 tuorli\n3 cucchiai colmi di zucchero semolato\n3 cucchiai di farina 00\nscorza di limone\nProcedimento:\nIn una ciotola lavorare con uno sbattitore elettrico o una frusta lo zucchero con i tuorli sino ad ottenere un composto chiaro e spumoso.\nUnire la farina setacciata al composto e continuare a lavorare.\nA questo punto incorporare il latte a filo e continuare a mescolare, questa è l’operazione più importante. Il latte va unito un po’ per volta per non creare grumi; appena il latte versato si incorpora al composta se ne aggiunge altro.\nVersare tutto il contenuto in una pentola alta,  portare sul fuoco e unire la scorza di limone tagliata grossolanamente ( sarà più facile allontanarla a fine cottura)\nMescolando in continuazione con un cucchiaio di legno o una frusta, far cuocere a fuoco basso la crema.\nSarà pronta appena diventerà densa.\nPer renderla ancora più densa e corposa continuare la cottura ancora un po’ continuando a mescolare.\nTrasferire la crema in una ciotola e farla raffreddare avendo cura di mescolarla energicamente più volte per evitare il formarsi della pellicina. Una volta fredda chiudere ermeticamente e conservare in frigo sino al suo utilizzo. Si conserva per 2/3 giorni e si può congelare.","note":"","tags":[],"_importId":759},{"nome":"ZUCCHINE RIPIENE ALLA LIGURE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"600 g Zucchine - 100 g Parmigiano grattugiato - 50 g Ricotta - 2 fette di pane casereccio ammollato nel latte - 1 cipolla - 1 Uovo - Pangrattato - Olio evo - Sale - le foglioline di 5 ciuffi di maggiorana\nSbollentare per 10 minuti le zucchine spuntate in acqua leggermente salata a bollore. Scolare le zucchine, tagliarle a metà e scavarle. \nTritare la polpa delle zucchine. Scaldare due cucchiai di olio evo in una padella e cuocere la cipolla tritata fino a doratura quindi aggiungere la polpa delle zucchine da cuocere 10 minuti salando leggermente. \nMettetere la polpa cotta in una ciotola e aspettare che intiepidisca.\nUnire in seguito il parmigiano grattugiato, il pane ben strizzato dal latte, la ricotta, le foglioline di maggiorana tritate e l'uovo. Mescolare bene e aggiungete un pochino di pangrattato in modo da compattare bene tutto il ripieno.\nRiempire le zucchine scavate con il ripieno e disporle in una pirofila coperta da carta forno e unta con un giro d'olio. Cospargere la superficie delle zucchine di pangrattato e da un filo di olio  e infornare per circa 35 minuti in forno preriscaldato ventilato a 180°.","note":"","tags":[],"_importId":11032},{"nome":"ZUCCOTTO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Procedimento\nPER IL PAN DI SPAGNA Step 1 Montate le uova con lo zucchero e un pizzico di sale, finché non saranno molto gonfie e quasi bianche. Incorporate la farina setacciata, mescolando dal basso verso l’alto, per non sgonfiare il composto. Step 2 Versatelo in uno stampo a cerniera imburrato e infarinato (ø 26 cm) e infornate a 180 °C per 35-40 minuti. Sfornate il pan di Spagna, toglietelo dallo stampo e lasciatelo raffreddare per almeno 1 ora (ideale prepararlo il giorno prima).\nPER IL RIPIENO Step 3 Scaldate il cacao con lo zucchero semolato, 1/2 bicchierino di rum, 1/2 di Cognac e 1/2 di acqua. Cuocete per circa 10-15 minuti, fino a ottenere uno sciroppo. Spegnete e lasciate raffreddare completamente. Step 4 Lavorate la ricotta con lo zucchero a velo, mescolandola con una frusta. Montate la panna e incorporatela alla ricotta. Step 5 Tagliuzzate i canditi e il cioccolato. Mescolate 1⁄3 del composto di ricotta con lo sciroppo di cacao. Incorporate i canditi e il cioccolato al composto rimanente.\nPER COMPLETARE Step 6 Tagliate il pan di Spagna in fette rettangolari spesse 1,5 cm, parallele al diametro. Dividetele lungo la diagonale ottenendo dei triangoli. Step 7 Disponeteli con la punta nel centro di uno stampo semisferico (capacità 2 litri), a raggiera, fino a ricoprire tutta la superficie: se si crea qualche zona vuota, riempitela con ritagli di pan di Spagna. Rifilate i bordi. Step 8 Mescolate l’alchermes con il liquore all’arancia e con esso spennellate abbondantemente il pan di Spagna. Step 9 Riempite lo zuccotto prima con il ripieno ai canditi, poi con quello al cacao. Chiudete con uno strato di fette di pan di Spagna, quindi riponete lo zuccotto in freezer per almeno 4 ore. Toglietelo dal freezer 1 ora prima di servirlo. Step 10 Da sapere: il nome potrebbe derivare dallo «zucchetto», il copricapo dei prelati fiorentini del XVI secolo, di cui lo zuccotto imita la forma. Secondo l’associazione Gelatieri Artigiani Fiorentini, invece, il dolce, chiamato storicamente Elmo di Caterina in onore di Caterina de’ Medici, si preparava in origine negli elmi chiodati, gli «zuccotti», usati dalla fanteria di quel tempo.","note":"","tags":[],"_importId":10972},{"nome":"Zuppa di Cipolle con Zola e","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":800.0,"unit":"g","name":"cipolle bianche intere"},{"qty":3.0,"unit":"cucchiaio","name":"farina 00"},{"qty":1.0,"unit":"cucchiaino","name":"zucchero di canna"},{"qty":150.0,"unit":"ml","name":"vino bianco"},{"qty":null,"unit":"ml","name":"brodo vegetale"},{"qty":2.0,"unit":"cucchiaio","name":"olio evo"},{"qty":20.0,"unit":"g","name":"burro"},{"qty":12.0,"unit":"n°","name":"fettine di baguette"},{"qty":100.0,"unit":"g","name":"gorgonzola"},{"qty":60.0,"unit":"g","name":"formaggio grana"},{"qty":4.0,"unit":"cucchiaio","name":"aceto balsamico di modena igp aquila oro de nigris"}],"procedimento":"Procedimento:\nPulite le cipolle, tagliatele a fettine sottili e tritatele grossolanamente a coltello.\nInserite in una casseruola capiente l’olio, il burro e le cipolle e fatele appassire lentamente su fiamma bassa, mescolando spesso per circa 10 minuti.\nAggiungete la farina e lo zucchero, continuate la cottura per due minuti mescolando spesso affinché il composto non si attacchi e poi sfumate con il vino bianco.\nQuando il liquido sarà evaporato, aggiungete il brodo, coprite con coperchio e continuate la cottura su fiamma lenta, mescolando di tanto in tanto.\nIntanto predisponete il pane e il formaggio grana grattugiato. Sistemate 2 fettine di pane sul fondo di quattro cocotte da zuppa in ceramica.\nQuando la zuppa risulterà cremosa ma ancora morbida, scaldate il forno ventilato a 200-210°C: distribuite la zuppa nelle ciotole e guarnite con una fettina di pane, il formaggio grana e delle quenelle di gorgonzola.\nInfornate circa 10-12 minuti e fate dorare il formaggio in superficie – potrete usare anche la funzione grill se l’avete – poi sfornate e servite calda con del rosmarino e un giro abbondante di Aceto Balsamico di Modena IGP Aquila Oro De Nigris.","note":"","tags":[],"_importId":12220},{"nome":"ZUPPA INGLESE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ingredienti: ( mi riferisco molto alla vecchia tradizione, l'uso del cioccolato ancora non c'era, e l'interno bicolore non  si faceva. Di rigore non si usavano i savoiardi come si fa attualmente, ma solo Pizza Battuta o.Pan di Spagna, che io ho scelto di fare in casa)\nPan di Spagna: 4 uova- 150 gr di zucchero semolato- 100 gr di farina - 50 gr di frumina- \n un pizzico di sale\nCrema Pasticcera : 4 tuorli d'uovo- 500.ml di latte intero- 150 gr di zucchero- 20 gr di amido.di.mais- 20 gr di farina - un pizzico di sale- buccia di un limone bio.\nBagna: un.bicchiere di.liquore alchermes- un bicchiere di sciroppo di zucchero (100 gr di acqua e 40 gr di zucchero, bolliti per far scioglierlo zucchero, e freddati).\nPreparazione : forno acceso a 180 gradi. Uova a temperatura ambiente messe intere nella planetaria con lo zucchero e con la frusta battere minimo 15  minuti, senza smettere, per ottenere un composto spumoso e leggero. Mai aver fretta con questo tipo di dolce. Setacciare farina e sale, e unire delicatamente, lavoro che faccio a mano, per non smontare la massa. Versare in uno stampo di 20-22 cm di diametro precedentemente imburrato,  cuocere nel forno ormai caldo mettendo la teglia con estrema delicatezza, per 30.minuti, e fare la prova stecchino prima di sfornare.  Lasciar intiepidire poi metterla ad asciugare su una gratella.\nPassiamo alla crema, che immagino tutte sappiate fare, per cui io che parlo di dolci del tempo che fu, vi insegno a guadagnare in velocità,  usando il microonde.  Inserire tutti gli ingredienti in un pirex che li contenga e con le fruste elettriche o un frullatore a immersione, mescolare perfettamente per evitare i grumi. Inserire il recipiente nel forno alla massima potenza,  e fare andare per 7 minuti, calcolando che negli ultimi 4 minuti per tre volte bisogna aprire il forno e mescolare con forza. Far poi intiepidire la crema coperta da pellicola a contatto per non farla rovinare .\nSiamo arrivati alla composizione del dolce. Ho foderato con la carta pellicola un recipiente adatto a contenere il dolce, ho tagliato il Pan di Spagna a strisce larghe un dito. Ho cominciato a preparare la bagna  dove unendo il liquore alchermes con lo sciroppo di zucchero ( vedi sopra). Velocemente ho immerso le fette di Pan di Spagna e subito foderato lo stampo, coprendo base bordi. Con l'aiuto di un mestolo ho versato la crema tiepida fino ad arrivare circa alla metà  del contenitore, e l'ho coperta con altre fette di Pan di Spagna,  e qui avrei dovuto bagnare anche queste,ma mi sono accorta  solo ora di non averlo fatto e chiedo venia...\nChi volesse fare l'interno a due colori, a questo punto può unire alla crema restante del cacao setacciato, se no, come nel mio caso copre con l'altra
