scorza arancia  bio grattata - olio di semi.\nPreparazione: per prima cosa tostare  i pistacchi e poi ripassarli in padella con un po' di olio e far freddare. In planetaria mettere le due farine, il lievito madre,  (Io ho usato la pasta   rinfrescata al mattino presto) il succo dell'arancia e gran parte dell'acqua.\nMescolare,  poi quando l'acqua è  assorbita, unire il sale e l'acqua restante. Mescolare ancora poi unire l'olio di semi e lavorare fino ad assorbimento, poi unire  l'arancia candita, la scorza grattata e i pistacchi preparati. Fare una palla e sistemarla in un contenitore unto e chiuso, per 12 ore nel frigo.\nDopo le 12 ore dividere la pasta in due parti uguali e preparare due filoni su una teglia da forno coperta da un canovaccio, tenendo in alto la cucitura,  tenendoli separati e coperti, a temperatura ambiente per 4 ore. Passate le 4 ore fare sopra delle incisioni dopo averli  ribaltati sulla teglia da cottura , foderata da carta forno.  Cuocere a 240 gradi per 20 minuti , poi abbassare a 200 gradi  per  altri 20 minuti. Freddare su griglia.","note":"","tags":[],"_importId":9072},{"nome":"PANE IN CASSETTA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina 00 di ottima qualità"},{"qty":250.0,"unit":"g","name":"farina manitoba"},{"qty":250.0,"unit":"ml","name":"latte"},{"qty":60.0,"unit":"ml","name":"olio evo di ottima qualità"},{"qty":1.0,"unit":"cucchiaino","name":"miele"},{"qty":15.0,"unit":"g","name":"sale fino marino"}],"procedimento":"Procedimento:\nIniziate la preparazione del Pane in cassetta fatto in casa inserendo dentro una ciotola il latte con il lievito e il miele. Con una frusta o una forchetta mescolate il tutto e create una soluzione grigiastra e omogenea. Inserite la farina manitoba e mescolate creando una pastella, quindi aggiungete il sale e l’olio evo. Incorporate gli ingredienti e inserite mano a mano l’altra farina 00, fino ad ottenere un composto lavorabile a mano.\nQuando avrete ottenuto un impasto omogeneo ed elastico lavoratelo per 10 minuti a mano su una spianatoia quindi lasciatelo levitare per 2 ore almeno dentro la ciotola ricoperto da pellicola trasparente per alimenti. Passato il tempo riversatelo sulla spianatoia, sgonfiatelo leggermente e lavoratelo giusto il necessario per dargli la forma ovale.\nA questo punto inseritelo dentro uno stampo (va benissimo la teglia di alluminio rettangolare con i bordi alti) rivestita di carta forno e lasciatelo lievitare fino a che non raddoppia di nuovo il volume (circa 1 oretta in invero, 30 minuti in estate). Infornate il Pane in cassetta fatto in casa a 180°C per circa 20 – 25 minuti, ponendolo per primi 15 minuti sulla parte bassa del forno, poi nel mezzo fino ad ultimare la cottura. Quando sarà cotto lasciatelo intiepidire e mettetelo dentro una sacchetto di plastica alimentare fino al momento dell’utilizzo.","note":"","tags":[],"_importId":3365},{"nome":"PANE IN PADELLA SENZA LIEVITO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina 0","sezione":"Impasto"},{"qty":100.0,"unit":"ml","name":"acqua","sezione":"Impasto"},{"qty":1.0,"unit":"cucchiaio","name":"olio evo","sezione":"Impasto"},{"qty":1.0,"unit":"cucchiaino","name":"sale","sezione":"Impasto"}],"procedimento":"Amalgamare bene tutti gli ingredienti e formare un panetto; lasciare riposare 30 minuti infine formare circa 7 palline che successivamente appiattirete con l'aiuto di un mattarello. Scaldare una padella a fiamma media, mettere il pane e coprire con il coperchio finché non inizierà a gonfiare poi girarlo un paio di volte x lato . Io li ho farciti con pomodoro e mozzarella ma voi potete scegliere quello che più vi piace.","note":"","tags":[],"_importId":7475},{"nome":"PANE PALLONCINO","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":190.0,"unit":"g","name":"farina 0"},{"qty":150.0,"unit":"g","name":"yogurt greco"},{"qty":1.0,"unit":"cucchiaino","name":"bicarbonato di sodio"},{"qty":4.0,"unit":"g","name":"sale"}],"procedimento":"Preparazione:\n1. In una ciotola mescolate yogurt greco, farina, sale e bicarbonato. Impastate fino a ottenere un panetto omogeneo.\n2. Coprite il panetto con pellicola trasparente e lasciate riposare per 30 minuti.\n3. Dividete l’impasto in 4 parti, formate delle palline e stendetele con un matterello, senza renderle troppo sottili.\n4. Coprite i dischi con un canovaccio e lasciate riposare per almeno 30 minuti.\n5. Scaldate bene una padella antiaderente e cuocete un disco alla volta.\n6. Quando iniziano a formarsi bolle in superficie, girate il pane più volte finché si gonfia come un palloncino.\n7. Tagliate un’estremità e farcite con gli ingredienti che preferite.\nFacile, veloce e super soffice!","note":"","tags":[],"_importId":14501},{"nome":"Pane palloncino: in padella","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Pane palloncino: in padella, senza lievito e con quella tasca perfetta da riempire come vuoi\nTempi\nPreparazione: 15 minuti\n\nRiposo: 1 ora\n\nCottura: 10 minuti\n\nTempo totale: circa 1 ora e 25 minuti\n\nPorzioni\n\nPer 4 persone\n\nCalorie\n\nCirca 170-190 kcal per panino, senza farcitura\n\nIngredienti\n\n150 g di yogurt greco\n\n190 g di farina tipo 1 o tipo 2\n\n6 g di sale fino\n\n3 g di bicarbonato\n\nPreparazione\n\n1. Prepara l’impasto\n\nIn una ciotola metto lo yogurt greco, la farina, il sale e il bicarbonato.\n\nMescolo prima con una forchetta, giusto per far stare insieme gli ingredienti, poi trasferisco tutto sul piano di lavoro.\n\n2. Lavora il panetto\n\nImpasto con le mani per qualche minuto.\n\nNon deve venire per forza liscissimo o perfetto, anzi, resta abbastanza rustico e va bene così.\n\nQuando l’impasto sta insieme, formo un panetto.\n\n3. Primo riposo\n\nMetto il panetto in una ciotola, lo copro e lo lascio riposare per almeno 30 minuti.\n\nQuesto passaggio aiuta l’impasto a rilassarsi e poi si stende meglio.\n\n4. Dividi e forma le palline\n\nTrascorso il tempo, divido l’impasto in 4 parti più o meno uguali.\n\nCon ogni pezzo formo una pallina.\n\n5. Stendi i dischi\n\nCon il mattarello stendo ogni pallina fino a ottenere dei dischi non troppo sottili.\n\nMeglio non assottigliarli troppo, altrimenti rischiano di non gonfiarsi bene in cottura.\n\n6. Secondo riposo\n\nCopri i dischi con un canovaccio pulito e lasciali riposare per altri 30 minuti.\n\nAnche questo piccolo riposo fa la differenza.\n\n7. Cuoci in padella\n\nScaldo molto bene una padella, meglio se antiaderente.\n\nCuocio un disco alla volta, girandolo spesso. Dopo poco inizierà a gonfiarsi e a creare quella bella camera d’aria interna che lo fa sembrare un palloncino.\n\nQuando è ben gonfio e dorato, lo tolgo dalla padella e continuo allo stesso modo con gli altri.\n\n8. Crea la tasca\n\nUna volta cotti, con delle forbici da cucina faccio un piccolo taglio su un lato, così si forma la tasca da farcire.\n\nCome servirlo\n\nQuesto pane in padella senza lievito è perfetto:\n\nal posto del pane classico\n\nfarcito per una cena veloce\n\ncome pranzo da portare fuori\n\noppure come spuntino salato\n\nSta benissimo con farciture semplici come:\n\nprosciutto crudo, mozzarella e rucola\n\nformaggi spalmabili e verdure grigliate\n\nhummus e insalata\n\npollo, pomodoro e lattuga\n\nConsigli utili\n\nLa padella deve essere ben calda, altrimenti non si gonfia bene.\n\nNon stendere i dischi troppo sottili.\n\nSe vuoi una consistenza ancora più morbida, una volta cotti puoi coprirli con un canovaccio per qualche minuto.\n\nQuesto è uno di quei pani furbi che salvo sempre mentalmente per le sere in cui non so cosa fare ma voglio qualcosa di buono, pratico e riempibile. E il fatto che si gonfi così in padella ogni volta dà anche una piccola soddisfazione in più.","note":"","tags":[],"_importId":16505},{"nome":"PANE RUSTICO","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Russell Wieck kg 1 farina di semola rimacinata la molisana 750 acqua minerale fredda 5 gr lievito di birra fresco 1 cucchiaino di miele 20 gr sale versare tutta l'acqua tranne 50 gr il lievito e il miele poi versare poco x volta la farina chiudendo l'impasto riposa 30 minuti adesso fare dei giri di piega poco x volta la rimanente acqua insieme con il sale riposa 15 minuti fare dei giri di piega questo per tre volte coprire con pellicola aspettare il raddoppio poi versare su spianatoia infarinata dividere in sei parti pezzettature circa 280 gr in forma ovale infarinare sopra e mettere su teglia con carta forno aspettare il raddoppio preriscaldare il forno alla massima temperatura per 20 minuti infornare sotto 10 minuti al centro altri 10 minuti e 3 minuti ventilato solo sopra ( considerando il tempo del mio forno)","note":"","tags":[],"_importId":9666},{"nome":"PANINI PER HAMBURGER","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":470.0,"unit":"g","name":"farina 0"},{"qty":120.0,"unit":"g","name":"farina manitoba"},{"qty":50.0,"unit":"g","name":"farina tipo 1 molino bogetto"},{"qty":4.0,"unit":"g","name":"lievito di birra fresco"},{"qty":250.0,"unit":"g","name":"acqua"},{"qty":125.0,"unit":"g","name":"yogurt bianco"},{"qty":100.0,"unit":"g","name":"olio semi"},{"qty":40.0,"unit":"g","name":"zucchero"},{"qty":10.0,"unit":"g","name":"sale"}],"procedimento":"Sciogliere il lievito nell’acqua, aggiungere yogurt, olio, zucchero, farina e per ultimo il sale. \nImpastare fino ad ottenere un panetto liscio. Fare 3 giri di pieghe ogni mezz’ora. \nLasciar riposare a temperatura ambiente per circa 2 ore e mezzo e poi in frigo per circa 3-4 ore.\nFar lievitare fuori dal frigo per circa 8 ore.\nFormare delle palline da circa 120 gr e far lievitare ancora fino a quasi il raddoppio.\nCuocere in forno preriscaldato statico (con pentolino d’acqua calda) a 200 gradi per 15 minuti e poi ventilato a 180 gradi fino a doratura.","note":"","tags":[],"_importId":7813},{"nome":"Panini pub con farina Caputo pizzeria","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Lievito madre 180gr\nFarina -120gr —> 500-120  Liquidi -60gr—> 300-60  gr latte","note":"","tags":[],"_importId":13055},{"nome":"Pansoffoce all’arancia","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina di riso"},{"qty":100.0,"unit":"g","name":"fecola di patate"},{"qty":125.0,"unit":"g","name":"bevanda vegetale"},{"qty":125.0,"unit":"g","name":"succo d’arancia"},{"qty":100.0,"unit":"g","name":"olio d’oliva o di cocco"},{"qty":100.0,"unit":"g","name":"eritritolo oppure zucchero di canna"},{"qty":1.0,"unit":"bustina","name":"lievito per dolci"},{"qty":50.0,"unit":"g","name":"gocce di cioccolato fondente"},{"qty":150.0,"unit":"g","name":"succo di arancia"},{"qty":10.0,"unit":"g","name":"amido di mais"},{"qty":1.0,"unit":"cucchiaio","name":"eritritolo o zucchero di canna"}],"procedimento":"*  Prepara il pansoffice: in una ciotola unisci la bevanda vegetale, il succo d’arancia, l’eritritolo e la scorza grattugiata e frulla brevemente con un mixer a immersione fino a ottenere una base liscia e omogenea.\n*  Aggiungi la farina di riso, la fecola, il lievito e le gocce di cioccolato, mescolando con una spatola fino a ottenere un impasto fluido e senza grumi.\n*  Versa il composto nello stampo rettangolare da 12x21 cm rivestito con carta forno, decora la superficie con altre gocce di cioccolato e cuoci in forno statico a 200°C per 20 minuti, poi abbassa a 180°C e prosegui per altri 20 minuti, verificando la cottura con uno stecchino\n* Prepara la glassa sciogliendo l’amido di mais nel succo d’arancia freddo, aggiungi l’eritritolo e porta sul fuoco mescolando finché si addensa leggermente. Una volta sfornato, lascia intiepidire il pansoffice e versa la salsa calda sulla superficie prima di servirlo.","note":"","tags":[],"_importId":16190},{"nome":"PASTA  FROLLA  ALLA  RICOTTA  🥚🥚🥚","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Ricetta : impastare 500 gr  di farina 00 , 180 gr di ricotta scolata bene, 200 gr di zucchero, 2 tuorli, 1 uovo, 2 cucchiaini di lievito in polvere per dolci , succo di mezzo limone (se occorre qualche cucchiaio di acqua fredda.) Impastare, avvolgere nella pellicola trasparente e riposare in frigo per almeno 1 ora. Stendere e foderarci 1 stampo unto e infarinato di 27 cm di diametro. Farcire  a piacere e cuocere a 180 gradi. 😋","note":"","tags":[],"_importId":11389},{"nome":"Pasta brise","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per prima cosa stendete la pasta frolla ( per la ricetta) se dovete realizzare una preparazione dolce, o la pasta brisèe ( per la ricetta) per le preparazioni salate, disponete il panetto di pasta frolla su una spianatoia leggermente infarinata e stendetela con il matterello a uno spessore molto sottile, circa 3-4 mm (1), quindi avvolgetela attorno al mattarello infarinato (2) e adagiatela su una tortiera antiaderente (3), noi abbiamo usato una tortiera di 24 cm per questa dose di pasta frolla.\n  Fatela aderire bene alla tortiera (4), per aiutarvi con questa operazione potete prendere un avanzo di impasto dargli la forma di una pallina e ricoprirlo con la pellicola (5) e utilizzatelo per far aderire la frolla perfettamente, basterà esercitare una leggera pressione sia sui bordi che sul fondo (6).\n  Quindi con il mattarello fate pressione sui bordi superiori della tortiera in modo da staccare la pasta frolla in eccesso ed eliminatela (7-8); potete anche tagliare la pasta frolla in eccesso con un coltellino. A questo punto fate riposare la pasta frolla in frigorifero per 30 minuti, o 15 minuti in freezer, per fare in modo che la pasta si rassodi e tenga meglio la forma. \nEstraete la teglia dal frigorifero e coi rebbi di una forchetta bucherellate il fondo della frolla (9), ma state attenti a non andare troppo in profondità altrimenti bucherete il fondo e rischierete di far uscire il ripieno.\n  Posizionate la teglia sopra la carta forno e con una matita tracciate la circonferenza della teglia (10), quindi ritagliate (11) e mettete il cerchio così ottenuto all’interno della teglia (12)\n  e sistematelo in modo tale da ricoprire anche i bordi (13). Quindi mettete all’interno i legumi secchi (14), e compattateli ben all'interno della taglia (15): i fagioli dovranno arrivare fino ai bordi, in modo da diffondere bene su tutta la superficie il calore del forno.\n  Quindi infornate la pasta per circa 15-20 minuti in forno già caldo a 200 gradi (16). Sformatela e eliminate i legumi e la carta forno (17), a questo punto i bordi saranno ben dorati ma non il fondo (18) e infornate di nuovo per 10-15 minuti alla stessa temperatura in modo che la pasta si asciughi e diventi dorata.\n  Estraete la base dal forno (19) e  spennellatela con l’uovo sbattuto sulla base per isolare il ripieno (20-21), infornatela in forno caldo per un paio di minuti in modo che l’uovo formi una patina isolante. A questo punto la vostra base è pronta per essere riempita con della crema pasticcera o della marmellata!\nOra che la base è pronta perché non provare questa golosissima Crostata di frutta, oppure una deliziosa Quiche Lorraine","note":"","tags":[],"_importId":2787},{"nome":"Pasta frolla all'acqua","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":120.0,"unit":"g","name":"fecola di patate"},{"qty":110.0,"unit":"ml","name":"acqua"},{"qty":30.0,"unit":"ml","name":"olio di semi"},{"qty":80.0,"unit":"g","name":"zucchero"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":1.0,"unit":"bustina","name":"vanillina"}],"procedimento":"1 cucchiaino di lievito vanigliatoPreparazionePer iniziare la preparazione della pasta frolla all’acqua dovete partire mischiando insieme acqua e olio in una ciotola. Quando avrete amalgamato i due ingredienti potete aggiungere lo zucchero, un pizzico di sale e la scorza di limone grattugiato. Aggiungete anche gli ingredienti secchi, che avrete precedentemente setacciato per evitare la formazione di spiacevoli grumi nel vostro composto, e lavorate per alcuni minuti energicamente. Utilizzate una planetaria con apposito gancio oppure lavorate a mano sul piano di lavoro infarinato fino a quando avrete ottenuto un panetto perfettamente omogeneo, elastico e compatto. Riducete la pasta frolla all’acqua in una palla e fatela riposare coperta con della pellicola trasparente per una decina di minuti, giusto il tempo di distendersi per bene.","note":"","tags":[],"_importId":882},{"nome":"PASTA MATTA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":250.0,"unit":"g","name":"farina 00"},{"qty":10.0,"unit":"g","name":"vino bianco"},{"qty":45.0,"unit":"g","name":"olio extravergine d’oliva"},{"qty":90.0,"unit":"g","name":"acqua"}],"procedimento":"La pasta matta è un impasto estremamente facile e veloce, si realizza in pochi minuti.\nMettete la farina setacciata in una ciotola, allargatela al centro in modo da creare una conca in cui versare l’acqua, l’olio, il vino e il sale. Iniziate ad impastare con una forchetta, poi, appena diventa più consistente trasferite il composto sulla spianatoia e lavoratelo con le mani fino ad ottenere un panetto liscio, omogeneo e morbido ma non appiccicoso.\nN.B. Nella mia ricetta ho dosato l’acqua in base alla farina che ho utilizzato, ogni farina ha un potere di assorbimento diverso quindi dosate l’acqua in base alla necessità che avete, è probabile che a voi ne occorra un cucchiaio in più o in meno.\nAvvolgete il panetto con la pellicola alimentare e fatelo riposare, a temperatura ambiente, per 30 minuti, se avete tempo anche 1 ora.\nTrascorso il tempo di riposo stendetela in una sfoglia sottile senza aggiungere farina. Se usate una spianatoia in legno infarinatela leggermente.\nLa pasta matta è pronta, utilizzatela per preparare torte salate, strudel, panzerotti al forno o rustici.\nConsigli\nCome conservare la pasta matta\nSi può conservare in frigo per un paio di giorni avvolta nella pellicola alimentare. E’ importante farla acclimatare prima di utilizzarla, quando la stendete deve essere a temperatura ambiente.\nCome utilizzare la pasta matta\nPotete utilizzarla per tantissime preparazioni, è estremamente versatile, inoltre può essere stesa (come la sfoglia) ad uno spessore di 1/2 mm senza rompersi. E’ perfetta per cornetti, salatini, rustici, strudel e torte salate. Se diminuite la quantità di sale è perfetta anche per ricette dolci.\nEsiste una pasta matta dolce?\nLa pasta matta è una base neutra, se volete utilizzarla per piatti salati mettete 5 g di sale, se volete utilizzarla per ricette dolci come lo strudel mettete solo un pizzico di sale oppure eliminatelo completamente se non vi piace. Volendo potete mettere un cucchiaino di zucchero, gestitela come preferite e a vostro gusto.\nPosso fare la pasta matta con l’olio di semi?\nSì, potete utilizzare un altro olio che non sia extravergine di oliva ma il sapore sarà decisamente meno gradevole. Nelle torte salate vi consiglio l’olio di oliva.","note":"","tags":[],"_importId":10181},{"nome":"PASTA MATTA (base perfetta per torte salate) 🌱","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 0"},{"qty":150.0,"unit":"ml","name":"acqua"},{"qty":4.0,"unit":"cucchiaio","name":"olio"},{"qty":1.0,"unit":"n°","name":"presa di sale"}],"procedimento":"Procedimento\nUnisci tutti gli ingredienti e impasta fino ad ottenere un panetto liscio e morbido.\nLascialo riposare qualche minuto, poi stendilo e usalo come base.\n\nPer il ripieno ho usato scarola e uvetta (prima cotti in padella), ma puoi davvero sbizzarrirti con quello che hai in frigo 🫶\n\n👉 In forno a 180° per circa 40 minuti\n\nSemplice, veloce e sempre una garanzia 💛\n\n#cena #pranzo #pastamatta #tortasalata #ricettevegane","note":"","tags":[],"_importId":16542},{"nome":"Pasta matta: ingredienti e preparazione","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":61.0,"unit":"g","name":"esubero"},{"qty":160.0,"unit":"n°","name":"liquidi.   143 liquidi"},{"qty":70.0,"unit":"n°","name":"olio semi"}],"procedimento":"73 vino) Infarinate il piano di lavoro e mettetevi all’opera; setacciate la farina direttamente in una terrina. In un’altra ciotola, unite vino e olio, quindi incorporate la farina, amalgamando man mano con un mestolo di legno. Fatelo poco alla volta per farla assorbire bene, quando l’impasto appare ben sodo e compatto, spostatevi sulla spianatoia e lavorate il tutto direttamente con le mani.\nA questo punto, a seconda della ricetta che intendete realizzare, inserite il sale o lo zucchero e impastate con energia per qualche minuto, fino a quando la consistenza risulta ben morbido e per nulla appiccicoso. Ecco, allora, pronta la vostra pasta matta.\nOra, se desiderate portare in tavola un dolce, stendetela con il mattarello. Foderate una tortiera da crostata con la carta apposita e ricopritela con l’impasto, facendolo aderire perfettamente al fondo e ai bordi. Bucherellatela con i rebbi della forchetta e farcitela con marmellata a piacere, crema pasticcera e mele, nutella e quant’altro più vi piaccia. Infornatela per 35 minuti a 180°.\nSe, invece, preferite dedicarvi alla realizzazione di salatini sfiziosi, assottigliatela fino ad ottenere uno spessore inferiore al centimetro, quindi tagliatela a listarelle e avvolgetela intorno ai wurstel. Infornateli per una buona mezz’ora a 180°…\nBuon appetito!","note":"","tags":[],"_importId":10359},{"nome":"Pasta per strudel austriaco con burro e riposo in pentola","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":75.0,"unit":"ml","name":"acqua tiepida"},{"qty":50.0,"unit":"g","name":"burro fuso"}],"procedimento":"In una scodella mettete la farina e il sale, aggiungete il burro fuso e amalgamate. Poi aggiungete l’acqua tiepida a filo. Lavorate a mano o nella planetaria (frusta K o a foglia)  fino ad ottenere un impasto compatto e elastico.\nIn una pentola portate dell’acqua fino al bollore. Gettate l’acqua calda e mettete l’impasto nella pentola calda, avvolto nella carta da forno. Coprite con un coperchio e lasciate riposare l’impasto per 30 minuti. Trascorso il tempo potete utilizzare subito l’impasto.\nPasta matta per strudel senza burro\nINGREDIENTI (dose per 1 strudel, ca. 230 g.)\n150 g di farina\n80 g di acqua tiepida\n1 cucchiaino di olio\n1 cucchiaino di aceto di vino bianco\n1 pizzico di sale\nolio per spennellare\nAmalgamate la farina, l’olio, l’aceto e il pizzico di sale e aggiungete a filo l’acqua tiepida. Impastate a mano o nella planetaria finchè avrete un impasto liscio e perfettamente omogeneo (pochi minuti).\nSpennellate una terrina con pochissimo olio, adagiate la Pasta per strudel e spennellate la superficie di olio (poco poco). Sigillate la terrina con della pellicola trasparente e lasciatela riposare 30 minuti a temperatura ambiente prima di utilizzarla.\nOvviamente non lieviterà, ma diventerà solo più morbida e perfettamente lavorabile.\nCon questo impasto ho preparato lo Strudel di albicocche e lo Strudel di ciliegie e amaretti.\nDa non perdere lo speciale RICETTE STRUDEL con tanti ripieni diversi !\nNota: Ricetta originale del 16.06.2014 – ora in versione aggiornata.\nTorna alla HOME PAGE Per non perdere nessuna ricetta, metti il “mi piace” QUI sulla mia pagina  e QUI sul mio profilo .","note":"","tags":[],"_importId":10255},{"nome":"Pasta per tortelli","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Pasta per tortelli\nRegola\nFarina 00\n25% di semola","note":"","tags":[],"_importId":12140},{"nome":"Pasta torta salata prosciutto cotto e ricotta","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Pasta torta salata prosciutto cotto e ricotta \n\nLievito madre 144gr\nFarina 154gr\nAcqua tiepida 72gr\nOlio 60 gr\nZucchero 1/2 cucchiaino \nSale 1 cucchiaino","note":"","tags":[],"_importId":8321},{"nome":"Paste di mandorle","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"è una ricetta facilissima e dal risultato garantito. I pasticcini ti rimangono morbidissimi.\nHo messo in una ciotola 150 gr. di farina di mandorle, 100 gr. di zucchero e una fialetta di aroma alla mandorla. Ho mescolato tutto. Ho aggiunto due albumi leggermente sbattuti (non devono essere montati a neve!!! ) e ho impastato bene il tutto. Ho fatto riposare per un'ora in frigorifero. Ho poi formato dodici palline e le ho passate in un pochino di zucchero a velo. Ho messo le palline in una teglia con carta da forno e le ho decorate con ciliegie candite, mandorle e granella di pistacchi premendo un pochino al centro (in questo modo i pasticcini prenderanno la forma giusta.) Ho cotto in forno a 180° per circa 14/15 minuti. Controllate verso fine cottura perché i pasticcini non devono scurirsi e devono rimanere morbidi.","note":"","tags":[],"_importId":12959},{"nome":"PASTIERA NAPOLETANA.","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Frolla: 300 gr di farina 00 - 150 gr di burro o strutto - 150 gr di zucchero - 3 tuorli  \nRipieno: 200 gr di grano precotto - 200 gr di latte-   300 gr di ricotta vaccina - 170 gr di zucchero - 3 tuorli.- 3 albumi a neve - una fialetta di aroma di arancia - un pizzicone di cannella - 100 gr d canditi misti di arancio e cedro - buccia di limone.\nPreparazibone: per la frolla io di solito  metto tutto nel.mixer e dopo pochissimo si ha una palla di frolla, che avvolta in pellicola metto a riposare in frigo anche un'ora.\nRipieno: in un pentolino versare il latte, il grano, la cannella, un pezzetto di buccia di limone. Mescolare , portare sul fuoco , e continuare a mescolare per una decina di minuti, fino a che il.latte non si sia assorbito. Freddare completamente. Amalgamare poi la ricotta, lo zucchero e i tuorli. Montare a neve gli albumi  e incorporarli poco per volta assieme all'aroma di arancia. Ultimare con i canditi.\nUngere e infarinare uno stampo a cerniera, stendere col mattarello due terzi di pasta frolla , e trasferirlo nella tortiera. Tagliare i bordi in eccesso col coltello, e versarvi il ripieno. \nCon la pasta rimasta ricavare delle strisce tipo  crostata.\nMettere in forno statico\npreriscaldato a 180 gradi per un'ora e 15 minuti. Non toglierla dallo stampo se non è  completamente fredda e mangiarla preferibilmente il giorno dopo.","note":"","tags":[],"_importId":10424},{"nome":"Per 2 Babka (da 20 cm)","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":600.0,"unit":"g","name":"farina media forza"},{"qty":175.0,"unit":"g","name":"latte"},{"qty":15.0,"unit":"g","name":"lievito di birra fresco"},{"qty":65.0,"unit":"g","name":"zucchero"},{"qty":3.0,"unit":"n°","name":"uova"},{"qty":3.0,"unit":"g","name":"sale"},{"qty":170.0,"unit":"g","name":"burro morbido"},{"qty":1.0,"unit":"cucchiaio","name":"miele"},{"qty":180.0,"unit":"g","name":"cioccolato fondente","sezione":"Per il ripieno"},{"qty":85.0,"unit":"g","name":"burro","sezione":"Per il ripieno"},{"qty":100.0,"unit":"g","name":"zucchero a velo","sezione":"Per il ripieno"},{"qty":40.0,"unit":"g","name":"cacao amaro","sezione":"Per il ripieno"},{"qty":200.0,"unit":"g","name":"acqua","sezione":"Per lo sciroppo"},{"qty":200.0,"unit":"g","name":"zucchero","sezione":"Per lo sciroppo"},{"qty":1.0,"unit":"n°","name":"stecca di cannella","sezione":"Per lo sciroppo"}],"procedimento":"Per 2 Babka (da 20 cm)\n600 g farina media forza (13 g proteine)\n175 g latte\n15 g lievito di birra fresco\n65 g zucchero\n3 uova\n3 g sale\n170 g burro morbido \n1 cucchiaio miele\nVaniglia\nPer il ripieno\n180 g cioccolato fondente\n85 g burro\n100 g zucchero a velo\n40 g cacao amaro\nSale\nPer lo sciroppo\n200 g acqua\n200 g zucchero\n1 stecca di cannella","note":"","tags":[],"_importId":13317},{"nome":"Per chi mi ha chiesto la ricetta..Buon appetito..😋😋😋","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Aggiungete l'olio, il malto (o lo zucchero)\nAggiungete meta' della farina ed iniziate ad impastare. Se non avete l'impastatrice potete impastarla a mano come spiegato in questo altro articolo. Quando la farina e' assorbita aggiungete il sale, in questo modo il lievito non viene a contatto diretto con il sale che lo brucerebbe , Impastate 12-15 minuti a seconda dell'impastatrice fino a quando la pasta non si stacca bene dai bordi e l'impasto e' liscio ed elastico.\nRovesciate l'impasto sul tavolo, dategli una forma simile alla teglie che userete, nel mio caso rettangolare. Cospargete la superficie di farina\nCoprite con pellicola trasparente in modo che non faccia la crosta\nCoprite con un panno per tenerla al caldo\nLasciate lievitare 30 minuti, Schiacciate la pasta\nPiegatela in 2 o tre Schiacciatela nuovamente.\nCospargete la superficie di farina\nCoprite con pellicola trasparente in modo che non faccia la crosta\nCoprite con un panno per tenerla al caldo\nLasciate lievitare 30 minuti, Oliate bene le teglie. Io uso 15-20 g di olio per una teglia 30x40 cm Stirate la pasta con il mattarello, Disponete la pasta sulla teglia senza piegarla\nLa pasta deve coprire quasi tutta la superficie. Non e' un problema se no la copre completamente perche' la pasta si allarghera' durante la terza lievitazione, Cospargete la superficie con il sale. Questo passaggio serve sia per dare gusto alla focaccia, sia per evitare le la superficie faccia la crosta che rovinerebbe la stesura e cottura .Se avete del sale grosso, potete usarlo per migliorare ulteriormente il gusto. Fate lievitare 30 minuti. Io specialmente in inverno metto i miei impasti a lievitare nel forno spento con la luce accesa che mantiene una temperatura di circa 30 c. Inoltre metto un pentolino di acqua bollente per aumentare l'umidita', Versate 20 g di acqua sulla superficie. Questa penetrera' nei buchi e li manterra' umidi e gustosi. Fate attenzione a non fare passare l'acqua sotto la pasta o vi si attacchera', Cospargete bene acqua e olio Imprimete la superficie della focaccia energeticamente con i polpastrelli delle dita. \nAggiungete un po' di olio e sale e mischiate bene. \nCuocete la focaccia a 220°-240° c per 12-14 minuti. Se avete il forno ventilato, cuocete a 200°- 220° oppure 2-3 minuti in meno alla stessa temperatura.","note":"","tags":[],"_importId":15022},{"nome":"Per due strudel di 30 cm circa","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":150.0,"unit":"g","name":"farina 00 per dolci"},{"qty":150.0,"unit":"g","name":"farina integrale"},{"qty":1,"unit":"n°","name":"cucchiaio miele acacia"},{"qty":1.0,"unit":"bustina","name":"vanillina"},{"qty":7.0,"unit":"n°","name":"mele"},{"qty":1.0,"unit":"cucchiaio","name":"zucchero grezzo di canna"},{"qty":5.0,"unit":"n°","name":"o 6 prugne  secche tagliate a pezzi"}],"procedimento":"Per due strudel di 30 cm circa\n\n150 gr farina 00 per dolci\n150 gr farina integrale \n1 uovo lievemente sbattuto in tazzina caffè con pizzico di sale\nOlio semi circa quanto uovo\nUn cucchiaio miele acacia\n1 bustina vanillina \nBuccia grattugiata limone 🍋 o arancia🍊 \nLatte se necessario per impastare\n\n7 mele\nPinoli\nUvetta \nFrutti rossi\nPane grattugiato \nMarmellata\n1 cucchiaio zucchero grezzo di canna (facoltativo)\nBuccia grattugiata e succo limone 🍋 o arancia 🍊 \n5 o 6 Prugne  secche tagliate a pezzi","note":"","tags":[],"_importId":6025},{"nome":"Per la base e il crumble da mettere sulla superficie:","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina di kamut o farro"},{"qty":1.0,"unit":"n°","name":"uovo"},{"qty":100.0,"unit":"g","name":"philadelphia light congelato a pezzetti"},{"qty":100.0,"unit":"g","name":"eritritolo"},{"qty":10.0,"unit":"g","name":"lievito per dolci"}],"procedimento":"Mescolate farina , eritritolo e lievito , aggiungete la Philadelphia congelata sbriciolandola con le dita e mescolate, poi aggiungete l uovo e se c’è bisogno un po’ di albume del brik ottenendo un impasto grossolano e granuloso, mettetene da parte un terzo , il resto foderate o ungete una tortiera di diametro 18 massimo 20 cm e mettete il resto dell impasto creandola base e i lati( ho messo foto) con l aiuto del dorso di un cucchiaio bagnandolo spesso nel latte ( io uso quello di mandorle senza zuccheri aggiunti)\nPoi preparate le pesche \n3 pesche spelate e tagliate a pezzettini \n2/3 cucchiai di eritritolo \nSucco di limone \nCaramellate le pesche con tutti gli ingredienti in una padella per circa 10 minuti, scolate dal sughetto ma tenetelo non buttatelo\nMettete le pesche nella tortiera sulla base\nCrema di ricotta \n350 gr di ricotta protein\n15 gr amido mais\n1 uovo \n70 gr eritritolo \nMescolate tutti gli ingredienti fino ad ottenere un composto liscio senza grumi e versate sulle pesche \nOra versate il sughetto nel crumble tenuto da parte e ricoprite la superficie sbriciolando sopra , io ho aggiunto anche 20 gr di nocciole tritate e 5/6 amaretti piccoli sbriciolati \nIn forno a 180 gr ventilato per 45/50 minuti \nLasciare raffreddare prima di togliere la tortiera lo\nCon gli ingredienti originali questa torta faceva la bellezza di 4800 calorie , con le mie modifiche ne fa 1600/1700😎","note":"","tags":[],"_importId":15178},{"nome":"Per la colazione di domani ho preparato una super","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per la colazione di domani ho preparato una super torta di mele morbida e profumata 🍎🍏🍎🍏🍎\nEcco come l'ho preparata \n4 uova intere\n300 grammi di farina 00\n140 grammi di olio di girasole\n140 grammi di latte\n160 grammi di zucchero\n la buccia di un limone grattugiato\nuna bustina di vanillina\ncannella a sentimento \nuna bustina di lievito per dolci\n400 grammi di mele pesate a pezzetti piccoli spruzzate con succo di limone \n2 mele per la decorazione \nMontare le uova con lo zucchero, aggiungere olio e latte mescolando aggiungere il limone grattugiato, vanillina e cannella mescolare ,aggiungere la farina mescolando aggiungere il lievito per dolci mescolando \nAggiungere le mele sbucciate e tagliate a pezzetti\nMescolate bene \nImburrate e infarinate uno stampo da 26 centimetri,aggiungete l'impasto \nDecorate con le mele a fettine spolverate con un po' di zucchero di canna \nCuocere in forno preriscaldato statico a 180 gradi per 45minuti","note":"","tags":[],"_importId":15450},{"nome":"Per la Colazione di Domenica: TORTA ALLE CAROTE E MELE","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per la Colazione di Domenica: TORTA ALLE CAROTE E MELE senza zucchero e burro. 6 porzioni. Preparazione: Unire 120g di farina d’avena, tipo 1 o integrale + 4g di lievito per dolci + 1 uovo + 50ml di latte o bevanda vegetale + 150g di yogurt greco bianco magro o yogurt di soia, 200g di carote crude e 2 mele, prima tritate nel mixer + scorza d'arancia + se volete dei semi di una bacca di vaniglia.. Versate tutto all’interno di una teglia coperta da da forno (io ho usato uno stampo da 14cm) e cuocete in forno a 180 gradi per 25 minuti! per 1 fetta (in totale escono 6 fette) : proteine 7g - grassi 1.5g - carboidrati 16g - calorie 100.","note":"","tags":[],"_importId":13673},{"nome":"Per la Torta di Grano Saraceno","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":150.0,"unit":"g","name":"grano saracenoacquista","sezione":"Per la Torta di Grano Saraceno"},{"qty":150.0,"unit":"g","name":"nocciole tostateacquista","sezione":"Per la Torta di Grano Saraceno"},{"qty":3.0,"unit":"n°","name":"uova","sezione":"Per la Torta di Grano Saraceno"},{"qty":150.0,"unit":"g","name":"zucchero","sezione":"Per la Torta di Grano Saraceno"},{"qty":150.0,"unit":"g","name":"burro","sezione":"Per la Torta di Grano Saraceno"},{"qty":8.0,"unit":"g","name":"lievito in polvere per dolciacquista","sezione":"Per la Torta di Grano Saraceno"},{"qty":1.0,"unit":"n°","name":"scorza di limone","sezione":"Per la Torta di Grano Saraceno"},{"qty":250.0,"unit":"g","name":"confettura di ribes","sezione":"Per la Torta di Grano Saraceno"}],"procedimento":"PREPARAZIONE IMPASTO TORTA GRANO SARACENO\nCome prima cosa separa i tuorli dagli albumi. Poi monta a neve gli albumi con 50 g di zucchero presi dal totale ed una volta pronti mettili da parte. In un’altra ciotola lavora il burro morbido con il restante zucchero (100 g) ed un pizzico di sale fino ad avere un composto chiaro e spumoso. A questo punto inizia ad aggiungere al composto di burro e zucchero i tuorli uno alla volta. Devi ottenere un composto omogenea. Infine aggiungi la farina di grano saraceno e il lievito e mescola con una spatola. Il composto risulterà molto corposo: è normale.\n\nTORTA GRANO SARACENO – STEP 2\nAggiungi all’impasto con Grano Saraceno appena preparato la mela grattugiata, la buccia di limone grattugiata, le nocciole tritate (o la farina di nocciole) e mescola con una spatola. Per ultimo unisci gli albumi montati ed incorporali con una spatola delicatamente al composto. Prendi uno stampo diametro 20 cm imburrato ed infarinato (per versione senza glutine utilizza maizena) e versa all’interno il composto. Cuoci in forno statico preriscaldato a 170° gradi per circa 40-45 minuti. Per verificare, fate sempre la prova stecchino prima di sfornare.\n\nFARCITURA TORTA MIRTILLI GRANO SARACENO\nQuando la torta si sarà completamente raffreddata tagliala a metà con un coltello affilato in modo da ottenere due dischi. Farcisci con una abbondante dose di confettura di Mirtilli Rossi (o Ribes Rossi o Mirtilli), ne servirà circa 250 g circa. Poi ricomponi la torta posizionando sopra il secondo disco di torta di Grano Saraceno. La torta di Mirtilli con Grano Saraceno è pronta per essere servita! Puoi spolverizzarla a piacere con zucchero a velo.","note":"","tags":[],"_importId":13942},{"nome":"Per me è il comfort food per eccellenza","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Bollente d’inverno e appena tiepida d’estate, e’ molto più buona se preparata in anticipo, anche il giorno prima\nLa “tardura” o stracciatella:\nper un uovo, si sbatte con la forchetta aggiungendo due cucchiai di parmigiano e due di pane grattugiato, un pizzico di sale e noce moscata a piacere. Si aspetta almeno una decina di minuti. Quando il brodo bolle, si butta tutto insieme e si mescola. Si fa cuocere per una decina di minuti, si spegne e si fa riposare.\nMeno laboriosa dei passatelli, ma il gusto è praticamente uguale.\nSul brodo non mi pronuncio, ognuno faccia come vuole dal cappone al dado. Per il mio nipotino uso quello di verdure.\nPS: ho cercato nel web e la tardura romagnola come la mia ha il pangrattato, invece la stracciatella non è tipica romagnola e il pangrattato non ce l’ha","note":"","tags":[],"_importId":14718},{"nome":"Per preparare la salsa broccomole hai bisogno di","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Per preparare la salsa broccomole hai bisogno di qualche broccolo grande, senza gambo, da frullare. Hai bisogno inoltre di aglio, formaggio cremoso light, mezzo avocado, prezzemolo, il succo di 2 limoni, un pizzico di sale e di pepe. Frulla tutti gli ingredienti fra loro fino ad ottenere una preparazione dalla consistenza omogenea.\nPuoi servire la salsa broccomole come antipasto, oppure usarla per condire alcuni piatti. Il sapore è gustosissimo, e la preparazione è davvero versatile. Si tratta di una ricetta semplice ed economica, che può aggiungere un pizzico di novità ai tuoi pranzi o alle tue cene.","note":"","tags":[],"_importId":10389},{"nome":"Pere all' amaretto","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione: 20 min\n\t\tCottura: 70 min\n\t\tDosi per: 4 persone\n\t\tCosto: basso\nPresentazione\nQuesto delizioso dessert da servire caldo, è un goloso connubio di sapori che si sposano molto bene tra loro e vanno a formare un gradito fine pasto. \nLe morbide pere cotte al forno e gli amaretti mischiati al liquore e al miele che fanno da ripieno, sono già da sé molto invitanti, ma il tocco finale è dato dalla salsa calda che avvolge questo meraviglioso dessert, una sorta di caramello aromatizzato al Brandy che si prepara con il fondo di cottura delle pere per conferire una nota fruttata.\nServite le pere all'amaretto come dolce al cucchiaio per concludere in modo raffinato e goloso le vostre cene speciali!\n\nIngredienti per le pere\nPere kaiser grosse 4\nAmaretti 200 g\nMiele 1 cucchiaio\nAmaretto (liquore) ½ bicchierino\nBurro 20 g\nPanna fresca liquida 10 g\nPER LA SALSA CALDA\nBrandy 1 bicchierino\nZucchero 50 g\n\nPreparazione\n  Per realizzare le pere all’amaretto, tenete da parte 4 amaretti interi e pestate i restanti con un batticarne (1), riducendoli in briciole finissime potete fare questa operazione anche con il mixer; poi metteteli in una terrina (2) e aggiungete il liquore all’amaretto (3),\n\n  la panna (4) e il miele (5), mescolate con un cucchiaio fino ad amalgamare gli ingredienti (6).\n  Intanto lavate le pere e staccate loro la calotta (7), e con l’apposito utensile, togliete il torsolo (8), allargando ulteriormente la cavità centrale e adagiatele  in una teglia o pirofila da forno, dove possano restare in piedi e ravvicinate; poi, con l'aiuto di un cucchiaino farcite le pere con l'impasto degli amaretti (9).\n  versate due dita d’acqua nella teglia (10) e mettete il burro sparso sul fondo della teglia (11). Introducete le pere nel forno statico preriscaldato a 180°, e cuocetele per circa 1 ora (oppure in forno ventilato a 160° per 50 minuti) (12).\n  A cottura ultimata toglietele dal forno le pere all’amaretto e ponetele in un piatto da portata avendo cura di tenere da parte il fondo di cottura (13).  Preparate ora la salsa per accompagnare le pere: mettete il fondo di cottura delle pere in un tegamino sul fuoco e restringetelo leggermente a fuoco basso, unendo il brandy (14) e lo zucchero (15),\n  cuocete fino a quando il liquido si sarà addensato e lo zucchero comincerà a caramellarsi (16). A questo punto spegnete il fuoco, ponete su ciascuna pera un amaretto intero (17) e versate il caramello sulle pere all’amaretto ancora calde, gustate subito le vostre golose pere all'amaretto!","note":"","tags":[],"_importId":166},{"nome":"peredienti per 1 v8s0.","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"In cucina non ne posso fare a meno del dado vegetale,l'ho finito e stamattina ripreparato,ottimo per mille usi,genuino e in frigo dura per mesi.\nIngredienti e dosi nella prima foto,io preparo doppia dose per averne un bel barattolo da più di un kg.\nFrullo fine tutti gli ingredienti a parte sale,olio,vino e formaggio,verso il trito in una padella aggiungo il sale il vino e l'olio,faccio cuocere mescolando spesso finché  diventa un composto asciutto e compatto,rimetto ancora caldo nel mixer,aggiungo il formaggio e omogenizzo il tutto,metto in un barattolo di vetro e una volta raffreddato chiudo e conservo in frigorifero","note":"","tags":[],"_importId":15364},{"nome":"Pesto di limoni🍋buonissimo","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":3.0,"unit":"n°","name":"limoni grossi non trattati"},{"qty":120.0,"unit":"ml","name":"olio evo"},{"qty":100.0,"unit":"g","name":"parmigiano stagionato 36 mesi"},{"qty":80.0,"unit":"g","name":"pinoli"},{"qty":10.0,"unit":"n°","name":"basilico fresco"},{"qty":7.0,"unit":"g","name":"sale"},{"qty":1.0,"unit":"n°","name":"etto d'aglio"},{"qty":null,"unit":"q.b.","name":"pepe nero"}],"procedimento":"Pesto di limoni🍋buonissimo \nIngredienti\n3 limoni grossi non trattati\n120 ml di olio evo\n100 g di parmigiano stagionato 36 mesi\n80 g di pinoli\n10 foglie di basilico fresco\n7 g di sale\n1 spicchietto d'aglio (facoltativo)\nPepe nero q.b.","note":"","tags":[],"_importId":14081},{"nome":"PESTO DI MELANZANE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":1.0,"unit":"n°","name":"melanzana grande"},{"qty":40.0,"unit":"g","name":"mandorle"}],"procedimento":"40 g di parmigiano grattugiato (i vegani e vegetariani possono usare quello apposta)\nUn ciuffetto di prezzemolo \n1/2 spicchio di aglio\nOlio extravergine d’oliva q.b.\nSale e pepe q.b.\nProcedimento:\n\nLavate e asciugate la melanzana.\nSistemate la melanzana sulla teglia del forno, al centro, ricoperta da carta forno.\nBucherellate la melanzana con uno stecchino.\nCuocete la melanzana in forno preriscaldato a 200 gradi per 50 minuti fino a quando la polpa risulterà morbida.\nMettete le mandorle in una padella antiaderente e lasciale tostare su fuoco dolce per qualche minuto mescolando spesso.\nSpegnete il gas e fate raffreddare la padella.\nSfornate la melanzana, sbucciatela e prelevate la polpa.\nMettete le mandorle tostate in un mixer; unite il parmigiano grattugiato, la polpa di melanzana, l’aglio, il prezzemolo, sale, pepe e olio.\n\nFrullate fino ad ottenere una consistenza cremosa e granulosa.\n\nTrasferite il pesto in un vasetto di vetro, aggiungete ancora un filo di olio di oliva e servite.\nIl pesto di melanzane si conserva in frigo in un contenitore a chiusura ermetica ricoperto con un filo di olio per uno o due giorni al massimo.","note":"","tags":[],"_importId":9580},{"nome":"PESTO DI ZUCCHINE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"zucchine"},{"qty":3.0,"unit":"cucchiaio","name":"pinoli"},{"qty":1.0,"unit":"mazzetto","name":"basilico"},{"qty":1.0,"unit":"n°","name":"aglio"},{"qty":null,"unit":"q.b.","name":"sale"},{"qty":150.0,"unit":"ml","name":"olio extravergine di oliva"}],"procedimento":"80 g di parmigiano  grattugiato oppure metà parmigiano grattugiato e metà pecorino grattugiato \nProcedimento:\nLavate bene le zucchine poi togliete le estremità spuntandole. Grattugiate le zucchine con una grattugia a fori larghi e mettetele in un colino; aggiungete del sale fino poi appoggiate il colino su una ciotola e lasciate scolare l’acqua in eccesso per circa 30 minuti.\n\nStrizzate bene le zucchine e mettetele in un mixer, aggiungete il basilico, i pinoli, lo spicchio di aglio, il parmigiano grattugiato, metà dell’olio extravergine d’oliva e iniziate a frullare a scatti; aggiungete il resto dell’olio man mano e frullate sempre a scatti fino ad ottenere un composto denso e cremoso.\n\nIl vostro pesto è pronto per essere utilizzato.\n\nPotete conservare il pesto di zucchine in frigorifero mettendolo in vasetti di vetro avendo cura di coprire la superficie con un filo di olio di oliva e chiudendoli ermeticamente. Il pesto di zucchine in frigorifero durerà per massimo 4 giorni.\n\nPotete anche congelare il vostro pesto di zucchine in piccole porzioni magari mettendolo nelle forme per il ghiaccio; durerà per massimo 3/4 mesi.","note":"","tags":[],"_importId":9593},{"nome":"Pezzatura","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":"– 100% farina di semola di grano duro rimacinata"},{"qty":400.0,"unit":"g","name":"– 80% acqua naturale"},{"qty":167.0,"unit":"g","name":"– 33% pasta madre al secondo rinfresco"},{"qty":100.0,"unit":"g","name":"– 20% patate"},{"qty":50.0,"unit":"g","name":"– 10% olio extravergine d’oliva"},{"qty":10.0,"unit":"g","name":"– 2% sale marino fine"}],"procedimento":"PROCEDIMENTO\n\t\tPrimo giorno\n\t\tOre 8.00\n\t\tFate il primo rinfresco alla vostra pasta madre, con rapporto 1.1, a 27°C per tre ore e mezza.\n\t\tOre 12.00\n\t\tFate il secondo rinfresco alla vostra pasta madre, come sopra.\n\t\tOre 12.30\n\t\tIntanto che il lievito matura e cresce, mettete la farina in autolisi. Versate nel recipiente dell’impastatrice, o se preferite in una ciotola a parte, tutta la farina e tutta l’acqua (se preferite potete lasciare un po’ d’acqua da parte per aggiungerla nelle fasi successive). Lavorate bene il tutto, in modo che non resti un granello di farina asciutto. Coprite e lasciate così fino a che non sarà pronto il lievito.\n\t\tOra occupatevi delle patate. Mettete a bollire l’acqua e intanto pelate le patate. Le patate vanno pesate a crudo e senza buccia, e immerse nell’acqua quando questa è già bollente. Se le inserite che l’acqua è ancora fredda ci sarà eccessiva dispersione dei nutrienti e degli aromi della patata nell’acqua (utile solo quando dovete fare il brodo!) perdendo in sapore.\n\t\tOre 13.30\n\t\tUna volta cotte (ci vorrà circa un’ora) tagliatele a pezzetti e lasciatele raffreddare\n\t\tAppena fredde riducetele in purea o pressandole con le mani o con un passapatate.\n\t\tOre 15.30\n\t\tQuando il lievito sarà pronto (avrà raggiunto due volte e mezzo il volume iniziale, o almeno raddoppiato), versatelo a pezzetti nell’impastatrice insieme alla farina in autolisi e iniziate ad impastare. Quando vi sembra adeguatamente incorporato (ovvero quando l’impasto risulterà omogeneo, non necessariamente incordato) inserite le patate (mi raccomando, non devono essere calde! vanno inserite a temperatura ambiente). A questo punto continuate a impastare fino a che l’impasto non risulterà liscio e omogeneo, mediamente incordato.\n\t\tNon ci dovrebbe volere più di 10 minuti in tutto.\n\t\tLasciate riposare l’impasto, coperto, per circa 30 minuti. Se nella stanza è freddo, anche 40 minuti, se è molto caldo, 20 sono sufficienti.\n\t\tOre 16.00\n\t\tA questo punto versate il sale nell’impasto. Se avete tenuto un po’ d’acqua da parte potete versarlo insieme all’acqua (o dentro l’acqua), altrimenti distribuitelo a pioggia su tutta la superficie.\n\t\tRicordatevi che il sale è igroscopico, quindi scomporrà temporaneamente la maglia glutinica che in questa fase è già piuttosto formata. È normale.\n\t\tAvviate l’impastatrice e procedete fino a piena incordatura.\n\t\tUna volta che l’impasto è ben incordato, inserite l’olio a filo. Fatelo assorbire completamente tendendo l’incordatura e chiedendo a 24-26°C.\n\t\tA questo punto se avete intenzione di aggiungere della farcitura nell’impasto, come olive o altro, è il momento di farlo. Il mio suggerimento è di procedere a mano e incorporare il tutto a mezzo di pieghe, evitando l’impastatrice. Il fatto è che abbiamo a che fare con un impasto molto delicato, ed è facile stracciarlo e rovinarlo, anche se poi (a me è successo) durante il riposo in massa si riprende.\n\t\tOre 16.30\n\t\tDovreste aver ottenuto un impasto molto soffice, liscio, setoso, delicato ma asciutto. Se lo prendete in mano supera la prova velo e non vi lascia le mani o la ciotola sporche.\n\t\tVersate l’impasto in una ciotola abbastanza capiente da tenere due volte il suo volume. Fate un giro di pieghe per creare un po’ di tensione esterna e dargli una forma ordinata. E mettetelo a riposo a 24-26°C per circa due ore.\n\t\tAppena l’impasto si sarà rilassato e disteso, segnate con un pezzo di scotch o un pennarello il livello a cui è. Dovrà arrivare al raddoppio o subito prima.\n\t\tOgni mezz’ora fategli un giro di pieghe.\n\nFoto\n\n\t\t18.30\n\t\tTrascorse le due ore, riponete la ciotola con l’impasto in frigorifero a 5°C e lasciatelo lì fino alla mattina successiva. \n\t\tLa temperatura del frigo è importante, perché se è più bassa rallenterà di più lo sviluppo dell’impasto, se è più alta lo velocizzerà. Vanno bene anche altre temperature, ma se sono diverse da quella da me indicata i tempi saranno sensibilmente inferiori o superiori.\n\n\t\tSecondo giorno\n\t\tOre 8.00\n\t\tTogliete la ciotola con l’impasto dal frigorifero. Osservate di quanto è cresciuta. Dovrebbe aver aumentato il suo volume iniziale di almeno il 60-80%. Posizionatela a 24-26°C finché non avrà raggiunto il raddoppio o quasi. Potrebbero volerci altre 2-3 ore.\n\t\t(Se volete cuocere le Pucce salentine con lievito madre in serata potete lasciarle in frigorifero più tempo, fino a raddoppio o fino a quando volete voi. L’importante è che raggiunga il doppio del volume iniziale e non vada oltre).\n\t\tOre 11.00\n\t\tÈ ora di formare le Pucce!\n\t\tRibaltiamo l’impasto su un piano leggermente infarinato con farina di semola rimacinata, e con un tagliapasta stagliamo e pesiamo pezzature di 120 g, o a piacere. In questa fase cercate di non schiacciare e toccare troppo l’impasto.\n\t\tProcedete fino a che non avrete stagliato tutto.\n\t\tA questo punto procedete alla pre-formatura, che consiste nel tirare nel creare delle piccole palline, tirando i lembi al centro dell’impasto, e poi capovolgendolo procedere alla pirlatura per creare tensione esterna. Ripeto, in questa fase, l’impasto non va sgonfiato.\n\t\tA questo punto prepariamo una ciotola con dentro della farina di semola rimacinata, la stessa usata per l’impasto. Prendiamo il nostro panetto, lo impaniamo bene su tutti i lati, e qui esercitiamo una leggera pressione in modo da schiacciarlo leggermente. Dovrà assomigliare un piccolo disco e non più a una pallina.\n\t\tPosizioniamolo su un foglio di carta da forno o foglio riutilizzabile in silicone, e procedete allo stesso modo con tutti gli altri panetti.\nFoto\n\n\t\tOre 11.30\n\t\tTerminata la formatura, lasciate lievitare le vostre pucce a 26°C per un paio d’ore. Se l’ambiente è più freddo allungate i tempi. Se è più caldo accorciateli.\n\t\tPer capire se sono pronte affidatevi alla prova dito. Qui l’esperienza con gli impasti e anche con questo tipo di formatura, fa la sua parte.\n\t\tOre 12.30\n\t\tUn’ora prima di infornare (e se non sapete quando sarà il momento dell’inforno, giocate d’anticipo) accendete il forno a 250°C statico e scaldate bene la vostra pietra refrattaria (potete seguire la guida specifica Pane su pietra refrattaria, tecnica di cottura). Se non ce l’avete va bene anche la teglia, ma non darà lo stesso risultato. Preparate anche una ciotola per l’acqua per gestire l’umidità in cottura, e se ce l’avete lo spruzzino per vaporizzare.\n\t\tOre 13.30\n\t\tUna volte pronte, le pucce vanno infornate!\n\t\tCon l’aiuto di una pala da pane o da pizza, prendetele su insieme alla carta forno sottostante, in modo da non toccarle direttamente e non muoverle, e posizionatele nel forno ben caldo. Inserite sul fondo la ciotola dell’acqua e vaporizzate le pareti (non le Pucce) con un po’ di acqua.\n\t\tChiudete subito il portello del forno e attendete 10 minuti prima di aprire il portello, fare fuoriuscire l’umidità, togliere la ciotola dell’acqua e abbassare la temperatura a 220°C. \n\t\tA questo punto dovrebbero arrivare a fine cottura in altri 10 massimo 15 minuti.\n\n\t\tOre 14.00\n\t\tUtilizzate un termometro alimentare a sonda per verificare che al cuore abbiano raggiunto (e non superato) i 94°C. Al che sfornate!\nCome dovrebbero essere le vostre Pucce salentine con lievito madre\nDovreste avere davanti a voi delle Pucce salentine con lievito madre tonde, rigonfie verso l’alto, polverose di farina, ruvide e croccanti esternamente, leggerissime e soffici all’interno. L’alveolatura non deve essere necessariamente pronunciata (anzi, quelle originali sono vuote dentro – e se le volete così vanno schiacciate molto bene in fase di formatura, anche con un matterello), tuttavia se vengono toccate poco e lievitano in modo adeguato possono risultare molto ariose. La crosta dovrà apparire dorata, leggermene bruna ma non troppo. Il bianco pallido è concesso solo in caso di accumulo eccessivo di farina da “panatura”. Ciò che più colpisce e deve colpire però è il profumo, l’aroma, il gusto. Se il vostro lievito è in forma vi restituirà tanto umami, amplificando tutti i singoli ingrendienti in un’armonia di sapori con pochi eguali. E davvero non esagero.\n\nIl giudizio finale e definitivo poi lo darete una volta che avrete farcito le vostre Pucce salentine con lievito madre. Perché con i giusti ingredienti, come un letto di zucchine grigliate, una fetta di prosciutto crudo ben stagionato, un cucchiaio di burrata e due mezzi pomodorini essiccati… beh, resterete senza parole.\n\nConclusioni\nSe non si è capito, adoro questo pane! Sicuramente si gioca il podio tra i miei proferiti! Non so dire se sia la ricetta in sé, o la qualità che ho raggiunto col lievito madre. Immagino una somma di cose. Ma vi invito a provare queste Pucce salentine con lievito madre, e dirmi la vostra. Io ne sono letteralmente stregata.\n\nSe poi c’è qualche pugliese all’ascolto e può darmi conferma della “bontà” della ricetta, o dirmi quali modifiche ci farebbe per renderla ancora più simile all’originale, io accolgo volentieri il confronto 🙂\nIn ogni caso, se la provate fatemi sapere, e magari condividete la foto su  mettendo un tag a Pan Brioche! Così potrò vedere e commentare 🙂","note":"","tags":[],"_importId":8503},{"nome":"PIADINA con esubero di lievito madre","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":150.0,"unit":"g","name":"esubero di lievito madre"},{"qty":150.0,"unit":"g","name":"farina 0 manitoba"},{"qty":75.0,"unit":"g","name":"acqua"},{"qty":30.0,"unit":"g","name":"olio"},{"qty":1.0,"unit":"cucchiaino","name":"sale"},{"qty":0.5,"unit":"cucchiaino","name":"bicarbonato"}],"procedimento":"Acqua + olio + sale + bicarbonato: mescolare bene\nAggiungere poco alla volta la farina e in mezzo il lievito madre\nImpastare bene anche aggiungendo farina se necessario \nLasciare riposare 15 minuti \nDividere in tre parti e stendere bene\nCirca 135 gr ciascuna piadina\nScaldare la padella e poi adagiare la piadina ( meglio non mettere olio sulla padella) \nCuocere 2 o 3 min per parte bucherellando con forchetta \nPer 4 persone ovvero 4 piadine\n200 gr esubero di lievito madre\n200 gr farina 0 manitoba\n100 gr acqua \n40 gr olio \n1 cucchiaino sale\n1/2 cucchiaino bicarbonato \nPer 5 persone ovvero 5 piadine\n250 gr esubero di lievito madre\n250 gr farina 0 manitoba\n125 gr acqua \n50 gr olio \n1 cucchiaino sale\n1/2 cucchiaino bicarbonato \nPer 6 persone ovvero 6 piadine\n300 gr esubero di lievito madre\n300 gr farina 0 manitoba\n150 gr acqua \n60 gr olio \n1 cucchiaino sale\n1/2 cucchiaino bicarbonato","note":"","tags":[],"_importId":7886},{"nome":"Piadina fatta in casa senza strutto","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":300.0,"unit":"g","name":"farina 00"},{"qty":150.0,"unit":"ml","name":"circa di acqua a temperatura ambiente"},{"qty":2.0,"unit":"cucchiaio","name":"olio di oliva"},{"qty":1.0,"unit":"pizzico","name":"sale"},{"qty":0.5,"unit":"cucchiaino","name":"bicarbonato"}],"procedimento":"Formate una palla, avvolgetela in un sacchetto per alimenti e lasciate riposare per 30 minuti \nTrascorso il tempo di riposo, rimuovete l’impasto dal sacchettino e formate un salsicciotto (7), poi dividetelo in 6 porzioni uguali (8). Date a ogni porzione di impasto la forma di una pallina lavorandola per circa 30 secondi in modo che diventi liscia e uniforme, poi avvolgetele nuovamente con un sacchetto per alimenti e lasciatele riposare per altri 30 minuti \nTrascorso il tempo di riposo, infarinate leggermente il piano da lavoro (10) e tirate le palline con un mattarello fino a uno spessore di 2-3 mm (11). Scaldate bene una piastra e nel frattempo stendete ulteriormente le piadine, poi coppatele con un coppapasta del diametro di 22 cm \nOra cuocete le piadine su un lato per 2 minuti, ruotandole continuamente con una mano per assicurare una cottura uniforme (13), poi giratele e cuocetele per 2 minuti anche sull’altro lato (14), fino a che non risulteranno leggermente dorate. Una volta cotte, impilate le vostre piadine una sull’altra e farcitele ancora calde","note":"","tags":[],"_importId":1087},{"nome":"Piadina Romagnola","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Preparazione: 30 min\n\t\tCottura: 4 min\n\t\tDosi per: 6 pezzi\n\t\tCosto: molto basso\n\t\tNOTA: + 1 h totale di riposo dell’impasto\nPresentazione\n  E’ la regina dello street food italiano ed è amata da milioni di persone in tutto il mondo: stiamo parlando della piadina romagnola, una ricetta povera dalle origini antichissime, che si presta ad essere farcita con qualsiasi ingrediente vi suggerisca la vostra immaginazione. Dai più tradizionali come crudo, rucola e squacquerone, ai più innovativi come hummus, tofu o insalata di pollo, il risultato sarà sempre super appetitoso! Perfetta come piatto unico per un pranzo informale, la piadina può essere utilizzata anche per creare sfiziosi stuzzichini da servire come antipasto, come i rotolini con salmone, avocado e crema allo yogurt, oppure per realizzare un altro must della cucina romagnola, il crescione. Date sfogo alla fantasia e create la vostra piadina preferita… che sia dolce o salata, con la nostra ricetta non potrete sbagliare!\n\nIngredienti per 6 piadine del diametro di 22 cm\nFarina 00 500 g\nStrutto 125 g\nAcqua a temperatura ambiente 170 g\nSale fino 15 g\nBicarbonato 1,5 cucchiaini\n\nPreparazione\nCome preparare la Piadina Romagnola\n  Per realizzare la piadina romagnola, preparate l’impasto unendo in una ciotola la farina, il sale (1), lo strutto (2) e il bicarbonato (3).\n  Iniziate a impastare e aggiungete l’acqua in 3 volte (4), poi trasferite il composto sul piano da lavoro (5) e continuate a lavorare fino ad ottenere un impasto omogeneo. Formate una palla, avvolgetela in un sacchetto per alimenti e lasciate riposare per 30 minuti (6).\n  Trascorso il tempo di riposo, rimuovete l’impasto dal sacchettino e formate un salsicciotto (7), poi dividetelo in 6 porzioni uguali (8). Date a ogni porzione di impasto la forma di una pallina lavorandola per circa 30 secondi in modo che diventi liscia e uniforme, poi avvolgetele nuovamente con un sacchetto per alimenti e lasciatele riposare per altri 30 minuti (9).\n  Trascorso il tempo di riposo, infarinate leggermente il piano da lavoro (10) e tirate le palline con un mattarello fino a uno spessore di 2-3 mm (11). Scaldate bene una piastra e nel frattempo stendete ulteriormente le piadine, poi coppatele con un coppapasta del diametro di 22 cm (12).\n  Ora cuocete le piadine su un lato per 2 minuti, ruotandole continuamente con una mano per assicurare una cottura uniforme (13), poi giratele e cuocetele per 2 minuti anche sull’altro lato (14), fino a che non risulteranno leggermente dorate. Una volta cotte, impilate le vostre piadine una sull’altra e farcitele ancora calde (15)!","note":"","tags":[],"_importId":3674},{"nome":"PINSA ROMANA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"secondo le istruzioni di Angelo Simonini , che ce la insegnò anni fa. Ricordo che non l'avevo mai sentita nominare, e mi telefonò  proprio Angelo per avere dei ragguagli.dato che ero di Roma, ma  anche io non l'avevo mai sentita nominare, trovai un negozio dove si faceva solo la Pinsa, e la comperai per assaggiarla,  chiedendo spiegazioni.  Scoprii anche che era una moda del momento, e che con gli antichi Romani non aveva nulla a che fare,vista anche la presenza della farina di soia.\nIngredienti:  650 gr di farina tipo 0 di forza ( Manitoba) - 20 gr di farina di soia - 30 gr di farina di riso  - 500 gr di acqua - 2 gr di lievito secco - 10 gr di olio evo - 10 gr di sale.\nFarina -48 gr \nLiquidi -24gr\nLievito madre 50% 72gr\nPreparazione: in una ciotola mettere il mix di farine (Manitoba, riso e soia).\nNella ciotola della impastatrice versare  l'80 % dell'acqua fredda (400 gr), unire il lievito e mescolare, poi metà  farina ed iniziare ad impastare , fino a quando  la farina venga assorbita. Poi unire il sale e la restante farina. Quando l'impasto ha assorbito tutta l'acqua, aggiungere a filo l'acqua tenuta da parte, e a seguire, sempre a filo unire l'olio. Una volta che anche  l'olio sia assorbito, fermare l'impastatrice, attendere 30', e in questo tempo , dare un giro di impastatrice ogni 10 minuti  ( processo di ventilazione per rendere l'impasto più incordabile).\nDato l'ultimo giro, trasferire l'impasto  in una ciotola unta di olio, sigillare e mettere in frigo a 5 gradi per 24 ore.\nRiprendere l'impasto e fare inizialmente 3 palline dai 190 ai 250 gr. ( il resto rimetterlo in frigo).\n Sistemarle   in contenitori ben unti, chiuderle ermeticamente e farle lievitare al raddoppio.\nUna volta che gli impasti si siano ben lievitati, stendere ognuno su un tappeto di farina di riso, e usando i polpastrelli delle mani, dare alla pinsa una forma ovale e ungerla con olio. Condire a piacere e infornare con la pala,  una pinsa alla volta, sulla pietra refrattaria del forno preriscaldato a 200 -300  gradi ( se possibile anche di più) con anche il grill acceso per circa 2-5 minuti. ( il mio forno a gas alla grazia se arriva a 240 gradi e la cottura è  stata molto più  lunga).l","note":"","tags":[],"_importId":10207},{"nome":"Piove da ieri sera🌧in montagna e' arrivata la neve e","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Piove da ieri sera🌧in montagna e' arrivata la neve e quindi anche qui la temperatura si e' abbassata😔  Per merenda..una bella e fumante mela cotta al forno🍎😉😂brioche mela🍎🍏challah\nRicetta: Per ottenere 7 brioche mela da 140g.\n300g di farina 0 forte o Manitoba\n250 g di farina 00\n4 g di lievito di birra secco  \n1 cucchiaino da tè di miele\n190/200 g di acqua tiepida\n60 g di zucchero\n40 g di olio di mais\n50 g di burro freschissimo\n1 uovo intero + 1 tuorlo (70 g)\n6 g di sale\nbuccia gratuggiata di limone e arancia. \nX spennellare la superfice: 1 tuorlo allungato con 1 cucchiaino d'acqua e qualche goccia di limone o rum.\nA piacere zucchero a velo per splolverizzare. \nPreparare il lievitino con l'acqua, il lievito, il miele e qualche cucchiaio di farina presa dal totale..lasciar lievitare per 30 minuti. Unire tutti gli ingredienti al lievitino ed impastare fino ad ottenere un composto liscio e compatto, formare una palla e metterla a lievitare in un contenitore capiente leggermente oliato, coprire con pellicola e lasciar lievitare in un posto tiepido fino a raddoppio..io 5 ore. \nSgonfiare l'impasto e dividerlo in 7 pezzi da 140 g l'uno, formare dei filoncini lunghi 45 cm. Appiattire i filoncini fino ad ottenere un rettangolo di circa 50 x 6, tagliare a metà nel senso della lunghezza lasciando unita una parte per 12 cm, arrotolare su se stesso partendo dalla parte unita e fermarsi a 6/7 cm dalle estremità che diventeranno le 2 foglie, aprire i 2 rotolini verso l'esterno ( vedi foto sequenza) Adagiare su placche da forno rivestite di carta forno, coprire con pellicola e lasciar riposare per 15/20 minuti, prima di infornare spennellare la superfice con il tuorlo sbattuto con l'acqua e il limone o rum.\nInfornare a 175' ( forno già caldo) cuocere per 25 minuti, se tende a scurire coprire con un foglio di alluminio. Sfornare su di una gratella.. una volta fredde spolverizzare a piacere con zucchero a velo oppure spennellare con miele leggermente allungato con acqua per renderle lucide.","note":"","tags":[],"_importId":7779},{"nome":"PITA","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Angela Serci 250 grammi di farina 0 250 grammi di Manitoba 300 ml di acqua 4 grammi di lievito disidratato  10 grammi di sale 30 ml di olio evo 😉🍀🍀🍀\nAnch'io uso ricetta simile. 500 farina, 325 acqua tiepida, 1 cucchiaio d'olio, 2 cucchiaino raso lievito birra secco e 2 cucchiaini sale. Faccio lievitare per 1ora e mezza - 2. Faccio un filone e taglio a pezzettini, formò palline, schiaccio con le mani e metto su una bistecchiera liscia a fuoco basso e ultimamente ci metto un coperchio, anzi una padella rovesciata. Sotto alla pentola metto un diffusore. C'è un aspetto negativo, è così buono che io e mio marito c'è lo mangiamo tutto e lo devo rifare ogni giorno. E i nostri chili aumentano","note":"","tags":[],"_importId":6966},{"nome":"PIZZA","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":500.0,"unit":"g","name":". di farina manitoba"},{"qty":350.0,"unit":"ml","name":"acqua a temperatura ambiente"},{"qty":4.0,"unit":"g","name":". di lievito di birra"},{"qty":15.0,"unit":"g","name":". di sale"},{"qty":20.0,"unit":"ml","name":"olio extravergine di oliva"}],"procedimento":"Mettete la farina manitoba nella planetaria, aggiungete l’acqua, il lievito sgranato e l’olio. Lavorate l’impasto per 5 minuti e poi aggiungete il sale. Continuate ad impastare per altri 5-10 minuti finchè non otterrete una palla liscia ed omogenea. L’impasto potete prepararlo anche a mano.\nPer ottenere una pizza più soffice e meno croccante, utilizzate solo 300 ml di acqua. Se invece volete una pizza ancora più croccante, utilizzate 300 ml di acqua e 50 ml di latte a temperatura ambiente.\nSpennellate un contenitore capiente con un velo di olio e adagiate l’impasto della pizza. Spolverate la superficie dell’impasto con un pochino di farina. Coprite con la pellicola trasparente e mettete l’impasto nella parte bassa del frigo per tutta la notte. In frigo i lieviti inizieranno piano piano a lavorare. Alla mattina troverete l’impasto solo leggermente aumentato.\nTirate fuori il contenitore dell’impasto e lasciatelo a temperatura ambiente senza toccarlo per 5 ore(es. dalle 9.00 alle 14.00). Aprite la pellicola trasparente, muovete leggermente l’impasto solo per ristabilire i lieviti all’interno, spolverate la superficie con ancora un po’ di farina e ricoprite con la pellicola trasparente. Lasciate lievitare ancora per 3 ore (es. dalle 14.00 alle 17.00).\nL’impasto della pizza che vi sto proponendo è per 3 pizze tonde oppure 1 teglia e mezza(rettangolare). La pizza verrà di media altezza, soffice e, allo stesso tempo, croccante.\nTrascorso il tempo, dividete l’impasto in 3 panetti o palline e lasciateli lievitare su una superficie ricoperta di farina per 2 ore (es. dalle 17.20 alle 19.20). Coprite le palline con della pellicola trasparente. Se utilizzate la teglia dividete gli impasti in due: 1/3 e 2/3. Quindi da un impasto di ca. 900 g. vi verrà un panetto più piccolo da 300 g. e uno più grande da 600 g.\nTrascorsa anche questa lievitazione, potete procedere alla stesura della pizza.\nAccendete il forno a 220°\nPrendete la teglia e imburratela. Preferisco utilizzare il burro al posto dell’olio per un discorso di gusto. Se non vi piace, procedete con il filo di olio.\nLe teglie per pizza da forno, quelle apposite, non necessitano né di burro né di olio.\nInfarinate la superficie di lavoro e prendete il primo panetto. Le pizze, che siano tonde o rettangolari, vanno stese sul piano di lavoro con molta cura e delicatezza e non sopra alla teglia. Vietatissimo il mattarello che ucciderebbe tutto il lavoro di lievitazione.\nCon i polpastrelli iniziate a premere in più punti del panetto in modo che si allarghi piano piano. Poi iniziate a portare l’impasto verso l’esterno, sollevandolo e lasciando “fare” alla forza di gravità. Ho guardato anche dei video su come fanno i pizzaioli veri, ma purtroppo, non sono arrivata a questo punto.\nQuando l’impasto sarà abbastanza allargato, appoggiatelo sulla teglia (tonda o rettangolare) e con i polpastrelli portate l’impasto dove manca, lasciando il bordo più spesso del resto della pizza.\nUna volta steso l’impasto della pizza, aggiungete sulla superficie il pomodoro condito e lasciate lievitare 10 minuti. Se la pizza vi piace abbastanza alta, potete farla lievitare anche 30-40 minuti.\nFarcite la pizza come più vi piace e infornate a 220° per ca. 13 minuti nel forno preriscaldato.","note":"","tags":[],"_importId":845},{"nome":"PIZZA CON LIEVITO MADRE","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":12.0,"unit":"g","name":"lievito madre"},{"qty":8.0,"unit":"g","name":"farina -> 472gr farina"},{"qty":4.0,"unit":"g","name":"acqua —>246gr acqua"}],"procedimento":"PIZZA CON LIEVITO MADRE \n\n  12 gr lievito madre\n-8 gr farina -> 472gr farina\n-4 gr acqua —>246gr Acqua","note":"","tags":[],"_importId":7991},{"nome":"Pizza del sabato sera in compagnia degli amici con","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Procedimento:\n1. Creazione “Biga”;\n2. Riposo per 18 ore a 18°C \n    (in alternativa frigo per 24 ore);\n3. Chiusura con ingredienti \"Rinfresco”;\n4. Riposo per 20 minuti;\n5. Staglio panetti da 270 g \n    ( circa 6 panetti);\n6. Lievitazione in frigo per 6 ore e 1-2  \n    ore a temperatura ambiente \n    ( fino al raddoppio );\n7. Condimento/Topping;\n8. Cottura in forno a gas.\n\nBuon appetito!","note":"","tags":[],"_importId":15507},{"nome":"Pizza idratazione 80%","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":435.0,"unit":"g","name":"farina -10gr—>425gr."},{"qty":348.0,"unit":"g","name":"acqua -5gr—>343gr"},{"qty":17.0,"unit":"g","name":"sale"},{"qty":14.0,"unit":"g","name":"lievito madre al 50%"}],"procedimento":"ho fatto 3 giri di pieghe ogni 20 minuti, poi lasciata un'oretta a temperatura ambiente prima di mettere in frigo\n18 ore di frigo, tirata fuori, fatto un giro di pieghe, 6 ore di appretto a temperatura ambiente, condita e cotta nel forno di casa statico alla massima temperatura! 😉\n435:348=100:x\nX=348x100:435\nX=80\n425:343=100:x","note":"","tags":[],"_importId":8254},{"nome":"Pizza lievito madreBassa Tempo di preparazione: 10","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Pizza lievito madreBassa Tempo di preparazione: 10 minuti + 24 ore di lievitazione\nIngredienti per la pizza con lievito madre per 4 persone: – 250 gr di farina tipo 0; – 250 gr di farina manitoba; – 150 gr di lievito madre; – 2 cucchiaini di sale; – 1 pizzico di zucchero; – 250 ml di acqua tiepida; – 50 ml di olio extravergine d’oliva\nPreparazione: Sciogliete il lievito madre e il pizzico di zucchero in una terrina, aggiungendo l’acqua tiepida.\nUna volta che il lievito sarà sciolto, aggiungete nella terrina anche le farine mescolate, il sale e l’olio. Mescolate bene, finchè l’impasto non raggiunge la consistenza desiderata (io faccio diventare l’impasto molle, perchè poi mi resta molto elastico).\nUna volta ottenuto l’impasto, copritelo con la pellicola trasparente per alimenti e mettetelo in frigo, a riposare per 24 ore. Le basse temperature rallentano l’azione del lievito, dando il tempo all’impasto di maturare e migliorare le caratteristiche organolettiche del prodotto finale.\nTrascorse le 24 ore, stendete l’impasto nella teglia e infornatelo (non serve farlo lievitare ulteriormente).\nEcco, la vostra pizza con lievito madre è pronta per essere usata, quindi… Buona pizza a tutti! \n  “Potete preparare la pizza con lievito madre anche con la planetaria” Ecco come procedere: Montate il gancio impastatore. Versate il lievito madre sciolto con l’acqua e lo zucchero nella ciotola della planetaria, aggiungete le due farine e lavorate per qualche minuto a velocità bassa.\nAggiungete il sale e l’olio, portate a velocità media e impastate per altri 10 minuti. Si formerà un impasto che si attorciglierà intorno al gangio, staccandosi dalle pareti della ciotola (detto incordatura).\nA questo punto procedete con la lievitazione, come descritto sopra.\nCome conservare l’impasto della pizza con lievito madre: Se volete preparare la pizza con il lievito madre in abbondanza e conservarla, potete tranquillamente dividere l’impasto nelle porzioni che desiderate, metterle in un contenitore di plastica a chiusura ermetica e congelarlo. Quando vorrete riutilizzarlo, tirate fuori dal frigo l’impasto e, quando si sarà completamente scongelato, stendetelo e preparate la vostra pizza con lievito madre.","note":"","tags":[],"_importId":163},{"nome":"PIZZA NAPOLI 3","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":36.0,"unit":"g","name":"lievito madre"},{"qty":null,"unit":"g","name":"farina w260"},{"qty":268.0,"unit":"g","name":"acqua"},{"qty":8.0,"unit":"g","name":"sale"}],"procedimento":"lievitazione lenta puo’ essere effettuata a temperatura ambiente per 6-8 ore a seconda di temperatura e quantità di lievito, sia mettendo le palle di pizza in frigo a 5c per 1-3 giorni. Io tipicamente le faccio lievitare a temperatura ambiente per qualche ora (almeno 2) poi le metto in frigo per almeno 1 giorno, ma anche fino a 3-4 giorni. Quando le voglio cuocere, tiro fuori le palline dal frigo, finisco la lievitazione, stiro la pasta, condisco ed inforno. Uno spettacolo di gusto!!\nRicetta Pizza Fatta in Casa Perfetta (con Video) - VivaLaFocaccia\nCi vogliono almeno 8 ore fuori dal frigo \n10.30-19.00\nCuocere 240 gradi per 10 min poi mozzarella","note":"","tags":[],"_importId":8002},{"nome":"PIZZA PAOLO ORRU 🍕","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":350.0,"unit":"g","name":"farina 0"},{"qty":150.0,"unit":"g","name":"farina manitoba"},{"qty":100.0,"unit":"g","name":"farina tipo 1 molino bogetto"},{"qty":350.0,"unit":"ml","name":"acqua"},{"qty":1.0,"unit":"cucchiaino","name":"miele"},{"qty":3.0,"unit":"cucchiaio","name":"olio evo"},{"qty":5.0,"unit":"g","name":"lievito di madre secco"},{"qty":11.0,"unit":"g","name":"sale"},{"qty":2.0,"unit":"g","name":"iri di pieghe ogni mezz’ora","sezione":"Impasto"},{"qty":8.0,"unit":"n°","name":"ore a temperatura ambiente","sezione":"Impasto"}],"procedimento":"PIZZA PAOLO ORRU 🍕 \n350 gr di farina 0\n150 gr farina manitoba\n100 gr farina tipo 1 Molino Bogetto\n350 ml acqua\n1 cucchiaino di miele\n3 cucchiai olio evo\n5 gr di lievito di madre secco\n11 gr sale\n\nImpasto \n2 giri di pieghe ogni mezz’ora\n8 ore a temperatura ambiente\nmaturazione in frigo per circa 11 ore\nformatura dei panetti \nappretto per 4 ore\nstesura e cottura padella/forno con pietra refrattaria","note":"","tags":[],"_importId":7818},{"nome":"Pizza tipo SPONTINI 🤗","fonte":"mamma","addedBy":"La mamma","ingredienti":[],"procedimento":"Pizza in teglia con lievito madre, fatta a mano 😍😍😍😍.. non pensavo di poter raggiungere questo risultato... 🥳🥳🥳\n600gr di farina 00 w330\n100 gr semola rimacinata\n480 ml di acqua\n250gr lievito madre rinfrescato\n12 gr di sale\nPizza più grande:\n933gr farina\n640 gr acqua \n333gr. Lievito madre 50%\n16 gr sale\nMetto a rinfrescare il lievito madre e al raddoppio, sciolgo il LM nell acqua.\nVerso tutto nelle farine.\nMescolo tutto,alla fine sale e olio con tanto buon olio di gomito, 💪😝😝, fino ad incordatura continuo a mescolare..(20 min)\nFaccio riposare l impasto 15 minuti.\nInizio 3 giri di pieghe ogni 30 minuti.\nLascio riposare un’ora a TA.\nPoi in frigo circa 15 ore,.\nTiro fuori 5 ore prima di cuocere, stagliando i panetti, di circa 650 gr ciascuna\nInforno nel forno di casa a massima temperatura 250°C,per circa 10 minuti...e BUON APPETITO😋😋😋😋\nAlla mattina rinfresco lievito madre due volte\n9.30 e 14.30 (ora ne rinfresco 150gr)\n18.55 impasto (20 min)\nRiposo 15 min\n19.30 prima piega\n20.00seconda\n20.30 terza\n21.00in frigo (22.00)\n12.00 giorno dopo tolgo dal frigo \nLo divido in due\nStaglio\n12.00 diviso in due (circa 700gr)\nFatto panetti\nCoperti in teglia con domopac\nIn forno con luce accesa \nFino 15.00\nStendo\nPoi in forno con luce accesa fino alle 18.30\nPoi cottura 250 per 10/12 min poi mozzarella ( cottura totale 15 min circa)\nMettere su grata\n700:480=100:x\nX=480x100:700\nX=68.5%\n1 pizza dosi:\n420 gr farina\n288 gr acqua \n150 gr lievito madre \n7 gr sale","note":"","tags":[],"_importId":15030},{"nome":"Pizzette al taglio sarde.","fonte":"mamma","addedBy":"La mamma","ingredienti":[{"qty":200.0,"unit":"g","name":"farina 00"},{"qty":100.0,"unit":"g","name":"semola rimacinata"},{"qty":200.0,"unit":"g","name":"farina manitoba"},{"qty":300.0,"unit":"g","name":"acqua"}],"procedimento":"70 gr lievito madre (5 gr lievito o anche molto meno, allungando i tempi di lievitazione)\n1 cucchiaino di zucchero\n12 gr sale\n3 cucchiai olio evo\nper condire:\npomodori pelati\nsale\nzucchero\norigano\nmozzarella\ncapperi\nimpastare, versare sulla spianatoia un po’ unta d’olio e fare qualche piega col tarocco (Impasto molto idratato, non aggiungere farina).\nFar riposare per mezz’ora, altre pieghe, far riposare 30 minuti e poi altre pieghe in ciotola (unta).\nFar lievitare per circa 6 ore (al raddoppio).\nUngere poco la leccarda ricoperta di cartaforno, stendere l’impasto , coprire con pellicola e far lievitare per circa 2 h.\nPreriscaldare il forno statico a circa 200 gradi, condire col sugo e cuocere per circa 25 minuti.\nAggiungere la mozzarella (ed eventuali altri condimenti) e far sciogliere (altri circa 5 minuti).\nTagliare e ripiegare come le classiche pizzette al taglio sarde.","note":"","tags":[],"_importId":777
